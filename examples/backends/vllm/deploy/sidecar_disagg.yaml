#
# Disaggregated 1P1D serving via the vLLM gRPC sidecar.
#
# Two worker pods, each running an engine + sidecar container pair:
#   VllmSidecarDecodeWorker : decode engine (kv_consumer) + decode sidecar
#   VllmSidecarPrefillWorker: prefill engine (kv_producer) + prefill sidecar
#
# Each engine runs `vllm-rs serve` (Rust frontend + managed Python EngineCore)
# and derives its KV role from kv_transfer_config.kv_role (kv_producer
# -> PREFILL, kv_consumer -> DECODE). KV moves over NIXL directly between the
# two engines; the sidecars only relay kv_transfer_params across the Dynamo boundary.
# Each engine+sidecar pair shares a pod network namespace, so the sidecar
# reaches its engine over 127.0.0.1:50051. The sidecar is given ONLY the
# endpoint and discovers its role from the engine.
# Requires the custom sidecar image described in deploy/README.md.
apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: vllm-sidecar-disagg
spec:
  components:
    - name: Frontend
      type: frontend
      replicas: 1
      podTemplate:
        spec:
          containers:
            - name: main
              image: my-registry/vllm-sidecar-runtime:my-tag
    - name: VllmSidecarDecodeWorker
      type: worker
      replicas: 1
      podTemplate:
        spec:
          containers:
            # Endpoint-only; role is configured explicitly as decode.
            - name: main
              image: my-registry/vllm-sidecar-runtime:my-tag
              command: [dynamo-vllm-sidecar]
              args:
                - --grpc-endpoint
                - 127.0.0.1:50051
                - --disaggregation-mode
                - decode
              envFrom:
                - secretRef:
                    name: hf-token-secret
              resources:
                requests:
                  ephemeral-storage: 2Gi
            - name: vllm-engine
              image: my-registry/vllm-sidecar-runtime:my-tag
              command:
                - vllm-rs
                - serve
                - Qwen/Qwen3-0.6B
                - --grpc-port
                - "50051"
                - --enforce-eager
                - --kv-transfer-config
                - '{"kv_connector":"NixlConnector","kv_role":"kv_consumer"}'
              resources:
                limits:
                  nvidia.com/gpu: "1"
    - name: VllmSidecarPrefillWorker
      type: worker
      replicas: 1
      podTemplate:
        spec:
          containers:
            # Endpoint-only; role is configured explicitly as prefill.
            - name: main
              image: my-registry/vllm-sidecar-runtime:my-tag
              command: [dynamo-vllm-sidecar]
              args:
                - --grpc-endpoint
                - 127.0.0.1:50051
                - --disaggregation-mode
                - prefill
              envFrom:
                - secretRef:
                    name: hf-token-secret
              resources:
                requests:
                  ephemeral-storage: 2Gi
            - name: vllm-engine
              image: my-registry/vllm-sidecar-runtime:my-tag
              command:
                - vllm-rs
                - serve
                - Qwen/Qwen3-0.6B
                - --grpc-port
                - "50051"
                - --enforce-eager
                - --kv-transfer-config
                - '{"kv_connector":"NixlConnector","kv_role":"kv_producer"}'
                - --kv-events-config
                - '{"publisher":"zmq","topic":"kv-events","endpoint":"tcp://*:20081","enable_kv_cache_events":true}'
              resources:
                limits:
                  nvidia.com/gpu: "1"
