apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: gpu-template
spec:
  spec:
    devices:
      requests:
        - name: gpu
          exactly:
            deviceClassName: gpu.intel.com
            count: 1
---
apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: qwen
spec:
  backendFramework: vllm
  components:
  - name: Epp
    type: epp
    replicas: 1
    eppConfig:
      config:
        plugins:
        - type: disagg-profile-handler
        - name: prefill-filter
          parameters:
            allowsNoLabel: false
            label: nvidia.com/dynamo-component-type
            validValues:
            - prefill
          type: label-filter
        - name: decode-filter
          parameters:
            allowsNoLabel: false
            label: nvidia.com/dynamo-component-type
            validValues:
            - decode
          type: label-filter
        - name: picker
          type: max-score-picker
        - name: dyn-prefill
          type: dyn-prefill-scorer
        - name: dyn-decode
          type: dyn-decode-scorer
        schedulingProfiles:
        - name: prefill
          plugins:
          - pluginRef: prefill-filter
            weight: 1
          - pluginRef: dyn-prefill
            weight: 1
          - pluginRef: picker
            weight: 1
        - name: decode
          plugins:
          - pluginRef: decode-filter
            weight: 1
          - pluginRef: dyn-decode
            weight: 1
          - pluginRef: picker
            weight: 1
    podTemplate:
      spec:
        containers:
        - name: main
          env:
          - name: DYN_KV_CACHE_BLOCK_SIZE
            value: "16"
          - name: DYN_MODEL_NAME
            value: Qwen/Qwen3-0.6B
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: nvcr.io/nvidia/ai-dynamo/epp-image:my-tag
          imagePullPolicy: IfNotPresent
  - name: VllmDecodeWorker
    type: decode
    replicas: 1
    sharedMemorySize: 2Gi
    frontendSidecar: sidecar-frontend
    podTemplate:
      spec:
        resourceClaims:
        - name: gpu
          resourceClaimTemplateName: gpu-template
        containers:
        - name: main
          args:
          - python3 -m dynamo.vllm --model $MODEL_PATH --served-model-name $SERVED_MODEL_NAME
            --tensor-parallel-size 1 --data-parallel-size 1 --disaggregation-mode
            decode --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_consumer","kv_buffer_device":"xpu"}'
            --gpu-memory-utilization 0.50 --max-model-len 16384 --block-size 16
          command:
          - /bin/sh
          - -c
          env:
          - name: SERVED_MODEL_NAME
            value: Qwen/Qwen3-0.6B
          - name: MODEL_PATH
            value: Qwen/Qwen3-0.6B
          - name: VLLM_TARGET_DEVICE
            value: xpu
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime-xpu:my-tag
          imagePullPolicy: IfNotPresent
          resources:
            claims:
            - name: gpu
          workingDir: /workspace/examples/backends/vllm
        - name: sidecar-frontend
          args:
          - -m
          - dynamo.frontend
          - --router-mode
          - direct
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:my-tag
  - name: VllmPrefillWorker
    type: prefill
    replicas: 1
    sharedMemorySize: 2Gi
    frontendSidecar: sidecar-frontend
    podTemplate:
      spec:
        resourceClaims:
        - name: gpu
          resourceClaimTemplateName: gpu-template
        containers:
        - name: main
          args:
          - python3 -m dynamo.vllm --model $MODEL_PATH --served-model-name $SERVED_MODEL_NAME
            --tensor-parallel-size 1 --data-parallel-size 1 --disaggregation-mode
            prefill --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_buffer_device":"xpu"}'
            --gpu-memory-utilization 0.50 --max-model-len 16384 --enable-prefix-caching
            --block-size 16 --kv-events-config '{"enable_kv_cache_events":true}'
          command:
          - /bin/sh
          - -c
          env:
          - name: SERVED_MODEL_NAME
            value: Qwen/Qwen3-0.6B
          - name: MODEL_PATH
            value: Qwen/Qwen3-0.6B
          - name: VLLM_TARGET_DEVICE
            value: xpu
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime-xpu:my-tag
          imagePullPolicy: IfNotPresent
          resources:
            claims:
            - name: gpu
          workingDir: /workspace/examples/backends/vllm
        - name: sidecar-frontend
          args:
          - -m
          - dynamo.frontend
          - --router-mode
          - direct
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:my-tag
