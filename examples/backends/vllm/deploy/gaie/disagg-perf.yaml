apiVersion: batch/v1
kind: Job
metadata:
  name: qwen-06b-disagg-perf
spec:
  backoffLimit: 1
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app: qwen-06b-disagg-perf
    spec:
      restartPolicy: Never
      containers:
      - command:
        - /bin/sh
        - -c
        - |
          apt-get update && apt-get install -y curl jq procps git && apt-get clean
          pip install git+https://github.com/ai-dynamo/aiperf.git@54cd6dc820bff8bfebc875da104e59d745e14f75;
          echo "aiperf installation completed";
          sysctl -w net.ipv4.ip_local_port_range="1024 65000"
          export COLUMNS=200
          EPOCH=$(date +%s)

          wait_for_model_ready() {
            echo "Waiting for model '$TARGET_MODEL' at $GATEWAY_URL/v1/models (checking every 5s)..."
            while ! curl -s "$GATEWAY_URL/v1/models" | jq -e --arg model "$TARGET_MODEL" '.data[]? | select(.id == $model)' >/dev/null 2>&1; do
                echo "[$(date '+%H:%M:%S')] Model not ready yet, retrying $GATEWAY_URL/v1/models"
                sleep 5
            done
            echo "Model '$TARGET_MODEL' is now available!"
            curl -s "$GATEWAY_URL/v1/models" | jq .
          }

          run_perf() {
            local concurrency=$1
            local isl=$2
            local osl=$3
            key=concurrency_${concurrency}
            export ARTIFACT_DIR="${ROOT_ARTIFACT_DIR}/${EPOCH}_${JOB_NAME}/${key}"
            mkdir -p "$ARTIFACT_DIR"
            echo "ARTIFACT_DIR: $ARTIFACT_DIR"
            aiperf profile --artifact-dir $ARTIFACT_DIR \
                --model $TARGET_MODEL \
                --tokenizer $TARGET_MODEL \
                --endpoint-type chat \
                --endpoint /v1/chat/completions \
                --streaming \
                --url $GATEWAY_URL \
                --synthetic-input-tokens-mean $isl \
                --synthetic-input-tokens-stddev 0 \
                --output-tokens-mean $osl \
                --output-tokens-stddev 0 \
                --extra-inputs "max_tokens:$osl" \
                --extra-inputs "min_tokens:$osl" \
                --extra-inputs "ignore_eos:true" \
                --extra-inputs "{\"nvext\":{\"ignore_eos\":true}}" \
                --extra-inputs "repetition_penalty:1.0" \
                --extra-inputs "temperature:0.0" \
                --concurrency $concurrency \
                --request-count $((10*concurrency)) \
                --warmup-request-count $concurrency \
                --num-dataset-entries 12800 \
                --random-seed 100 \
                --workers-max $concurrency \
                -H 'Authorization: Bearer NOT USED' \
                -H 'Accept: text/event-stream' \
                --record-processors 32 \
                --ui simple
            echo "ARTIFACT_DIR: $ARTIFACT_DIR"
            ls -la $ARTIFACT_DIR
          }

          #### Actual execution ####
          wait_for_model_ready
          mkdir -p "${ROOT_ARTIFACT_DIR}/${EPOCH}_${JOB_NAME}"
          TOTAL_CONCURRENCY=$((CONCURRENCY_PER_GPU * DEPLOYMENT_GPU_COUNT))
          echo "Calculated total concurrency: $TOTAL_CONCURRENCY (${CONCURRENCY_PER_GPU} per GPU x ${DEPLOYMENT_GPU_COUNT} GPUs)"

          cat > "${ROOT_ARTIFACT_DIR}/${EPOCH}_${JOB_NAME}/input_config.json" <<EOF
          {
            "gpu_count": $DEPLOYMENT_GPU_COUNT,
            "concurrency_per_gpu": $CONCURRENCY_PER_GPU,
            "total_concurrency": $TOTAL_CONCURRENCY,
            "mode": "$DEPLOYMENT_MODE",
            "isl": $ISL,
            "osl": $OSL,
            "gateway_url": "$GATEWAY_URL",
            "model": "$TARGET_MODEL"
          }
          EOF

          run_perf $TOTAL_CONCURRENCY $ISL $OSL
          echo "done with concurrency $TOTAL_CONCURRENCY"
        env:
        - name: TARGET_MODEL
          value: "Qwen/Qwen3-0.6B"
        - name: GATEWAY_URL
          value: "http://inference-gateway.kgateway-system.svc.cluster.local:80"
        - name: CONCURRENCY_PER_GPU
          value: "4"
        - name: DEPLOYMENT_GPU_COUNT
          value: "2"
        - name: ISL
          value: "1024"
        - name: OSL
          value: "256"
        - name: DEPLOYMENT_MODE
          value: disagg-gaie
        - name: AIPERF_HTTP_CONNECTION_LIMIT
          value: "200"
        - name: JOB_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['job-name']
        - name: ROOT_ARTIFACT_DIR
          value: /tmp/perf
        - name: HF_HOME
          value: /tmp/hf-cache
        - name: PYTHONUNBUFFERED
          value: "1"
        image: python:3.12-slim
        imagePullPolicy: IfNotPresent
        name: perf
        securityContext:
          privileged: true
        workingDir: /workspace
