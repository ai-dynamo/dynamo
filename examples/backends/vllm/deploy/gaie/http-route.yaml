# Apply with `kubectl apply -n <ns> -f http-route.yaml`, where <ns> is the
# namespace that contains both the `inference-gateway` Gateway (created by
# deploy/inference-gateway/scripts/install_gaie_crd_agentgateway.sh) and the
# `qwen-pool` InferencePool (created by the operator from disagg.yaml).
#
# If the Gateway is in a different namespace, add `namespace: <gw-ns>` under
# parentRefs. If the InferencePool is in a different namespace, add
# `namespace: <pool-ns>` under backendRefs.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qwen-route
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: inference-gateway
  rules:
    - backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: qwen-pool
          port: 8000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        request: 300s
