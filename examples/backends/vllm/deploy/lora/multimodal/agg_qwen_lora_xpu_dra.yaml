#
# Aggregated Intel XPU deployment for Qwen3-VL with dynamic LoRA adapters.
# Complete the MinIO setup, adapter upload, and DynamoModel registration in
# this directory before applying.

apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: gpu-template
spec:
  spec:
    devices:
      requests:
        - name: gpu
          exactly:
            deviceClassName: gpu.intel.com
            count: 1
---
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: agg-qwen-multimodal-lora-xpu-dra
spec:
  services:
    Frontend:
      envFromSecret: hf-token-secret
      componentType: frontend
      replicas: 1
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:my-tag
          env:
            - name: DYN_REQUEST_PLANE
              value: tcp
            - name: MODEL_PATH
              value: Qwen/Qwen3-VL-2B-Instruct
    VllmWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      replicas: 1
      modelRef:
        name: Qwen/Qwen3-VL-2B-Instruct
      extraPodSpec:
        resourceClaims:
          - name: gpu
            resourceClaimTemplateName: gpu-template
        # Uncomment if the XPU device nodes require group access.
        # securityContext:
        #   runAsUser: 1000
        #   runAsGroup: 1000
        #   supplementalGroups:
        #     - 44
        #     - 991
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime-xpu:my-tag
          workingDir: /workspace/examples/backends/vllm
          resources:
            claims:
              - name: gpu
          env:
            - name: VLLM_TARGET_DEVICE
              value: xpu
            - name: DYN_REQUEST_PLANE
              value: tcp
            - name: DYN_LORA_ENABLED
              value: "true"
            - name: DYN_LORA_PATH
              value: /tmp/dynamo_loras_multimodal
            - name: DYN_SYSTEM_ENABLED
              value: "true"
            - name: DYN_SYSTEM_PORT
              value: "9090"
            - name: AWS_ENDPOINT
              value: http://minio:9000
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              value: us-east-1
            - name: AWS_ALLOW_HTTP
              value: "true"
            - name: BUCKET_NAME
              value: my-loras
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --model
            - Qwen/Qwen3-VL-2B-Instruct
            - --enable-multimodal
            - --enable-lora
            - --max-lora-rank
            - "64"
            - --max-model-len
            - "8192"
            - --max-num-batched-tokens
            - "8192"
