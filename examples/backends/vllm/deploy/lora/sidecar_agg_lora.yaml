# Requires the custom sidecar image described in ../README.md.

apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: vllm-sidecar-agg-lora
spec:
  components:
    - name: Frontend
      type: frontend
      replicas: 1
      podTemplate:
        spec:
          containers:
            - name: main
              image: my-registry/vllm-sidecar-runtime:my-tag
              envFrom:
                - secretRef:
                    name: hf-token-secret
    - name: VllmSidecarWorker
      type: worker
      replicas: 1
      podTemplate:
        spec:
          volumes:
            - name: lora-cache
              emptyDir: {}
          containers:
            - name: main
              image: my-registry/vllm-sidecar-runtime:my-tag
              command: [dynamo-vllm-sidecar]
              args: [--grpc-endpoint, 127.0.0.1:50051]
              envFrom:
                - secretRef:
                    name: hf-token-secret
              env:
                - name: DYN_LORA_ENABLED
                  value: "true"
                - name: DYN_LORA_PATH
                  value: /var/cache/dynamo/loras
                - name: DYN_SYSTEM_ENABLED
                  value: "true"
                - name: DYN_SYSTEM_PORT
                  value: "8081"
              resources:
                requests:
                  ephemeral-storage: 2Gi
              volumeMounts:
                - name: lora-cache
                  mountPath: /var/cache/dynamo/loras
            - name: vllm-engine
              image: my-registry/vllm-sidecar-runtime:my-tag
              command:
                - vllm-rs
                - serve
                - Qwen/Qwen3-0.6B
                - --grpc-port
                - "50051"
                - --enforce-eager
                - --enable-lora
                - --max-loras
                - "4"
                - --max-lora-rank
                - "64"
              resources:
                limits:
                  nvidia.com/gpu: "1"
              volumeMounts:
                - name: lora-cache
                  mountPath: /var/cache/dynamo/loras
