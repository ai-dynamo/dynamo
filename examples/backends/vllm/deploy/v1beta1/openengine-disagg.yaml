# Prerequisite: create a ReadWriteMany PVC named vllm-openengine-lora-cache.

apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: vllm-openengine-disagg
spec:
  backendFramework: vllm
  components:
  - name: Frontend
    podTemplate:
      spec:
        containers:
        - args: [python3 -m dynamo.frontend --router-mode kv --http-port 8000]
          command: [/bin/sh, -c]
          env:
          - name: DYN_NAMESPACE
            value: dynamo
          image: my-registry/dynamo-openengine-sidecar:my-tag
          name: main
    replicas: 1
    type: frontend
  - name: PrefillWorker
    podTemplate:
      spec:
        containers:
        - args: [--openengine-endpoint, http://127.0.0.1:50051, --expected-engine, vllm, --expected-schema-release, b0cf2a4826d246192dc65b055dab6d2b38d2d67e]
          command: [dynamo-openengine-sidecar]
          env:
          - name: DYN_NAMESPACE
            value: dynamo
          - name: DYN_SYSTEM_PORT
            value: "8081"
          - name: DYN_LORA_ENABLED
            value: "true"
          - name: DYN_LORA_PATH
            value: /lora-cache
          - {name: HF_HOME, value: /model-cache}
          image: my-registry/dynamo-openengine-sidecar:my-tag
          name: main
          resources:
            limits: {cpu: "2", memory: 4Gi}
            requests: {cpu: "1", memory: 2Gi}
          volumeMounts:
          - {mountPath: /lora-cache, name: lora-cache}
          - {mountPath: /model-cache, name: model-cache}
        - args:
          - Qwen/Qwen3-0.6B
          - --host
          - 127.0.0.1
          - --port
          - "8001"
          - --openengine-host
          - 127.0.0.1
          - --openengine-port
          - "50051"
          - --enable-lora
          - --max-loras
          - "4"
          - --kv-transfer-config
          - '{"kv_connector":"NixlConnector","kv_role":"kv_producer","kv_load_failure_policy":"fail"}'
          - --kv-events-config
          - '{"enable_kv_cache_events":true,"publisher":"zmq","endpoint":"tcp://127.0.0.1:5557","topic":"kv-events"}'
          command: [vllm, serve]
          env:
          - {name: HF_HOME, value: /model-cache}
          - {name: VLLM_USE_RUST_FRONTEND, value: "1"}
          - name: VLLM_NIXL_SIDE_CHANNEL_HOST
            valueFrom:
              fieldRef: {fieldPath: status.podIP}
          - {name: VLLM_NIXL_SIDE_CHANNEL_PORT, value: "5600"}
          - {name: OPENENGINE_SCHEMA_RELEASE, value: b0cf2a4826d246192dc65b055dab6d2b38d2d67e}
          image: my-registry/vllm-openengine:my-tag
          name: engine
          resources:
            limits: {nvidia.com/gpu: "1"}
            requests: {nvidia.com/gpu: "1"}
          volumeMounts:
          - {mountPath: /lora-cache, name: lora-cache}
          - {mountPath: /model-cache, name: model-cache}
        volumes:
        - name: lora-cache
          persistentVolumeClaim: {claimName: vllm-openengine-lora-cache}
        - {emptyDir: {}, name: model-cache}
    replicas: 1
    type: prefill
  - name: DecodeWorker
    podTemplate:
      spec:
        containers:
        - args: [--openengine-endpoint, http://127.0.0.1:50051, --expected-engine, vllm, --expected-schema-release, b0cf2a4826d246192dc65b055dab6d2b38d2d67e]
          command: [dynamo-openengine-sidecar]
          env:
          - name: DYN_NAMESPACE
            value: dynamo
          - name: DYN_SYSTEM_PORT
            value: "8082"
          - name: DYN_LORA_ENABLED
            value: "true"
          - name: DYN_LORA_PATH
            value: /lora-cache
          - {name: HF_HOME, value: /model-cache}
          image: my-registry/dynamo-openengine-sidecar:my-tag
          name: main
          resources:
            limits: {cpu: "2", memory: 4Gi}
            requests: {cpu: "1", memory: 2Gi}
          volumeMounts:
          - {mountPath: /lora-cache, name: lora-cache}
          - {mountPath: /model-cache, name: model-cache}
        - args:
          - Qwen/Qwen3-0.6B
          - --host
          - 127.0.0.1
          - --port
          - "8001"
          - --openengine-host
          - 127.0.0.1
          - --openengine-port
          - "50051"
          - --enable-lora
          - --max-loras
          - "4"
          - --kv-transfer-config
          - '{"kv_connector":"NixlConnector","kv_role":"kv_consumer","kv_load_failure_policy":"fail"}'
          - --kv-events-config
          - '{"enable_kv_cache_events":true,"publisher":"zmq","endpoint":"tcp://127.0.0.1:5557","topic":"kv-events"}'
          command: [vllm, serve]
          env:
          - {name: HF_HOME, value: /model-cache}
          - {name: VLLM_USE_RUST_FRONTEND, value: "1"}
          - name: VLLM_NIXL_SIDE_CHANNEL_HOST
            valueFrom:
              fieldRef: {fieldPath: status.podIP}
          - {name: VLLM_NIXL_SIDE_CHANNEL_PORT, value: "5600"}
          - {name: OPENENGINE_SCHEMA_RELEASE, value: b0cf2a4826d246192dc65b055dab6d2b38d2d67e}
          image: my-registry/vllm-openengine:my-tag
          name: engine
          resources:
            limits: {nvidia.com/gpu: "1"}
            requests: {nvidia.com/gpu: "1"}
          volumeMounts:
          - {mountPath: /lora-cache, name: lora-cache}
          - {mountPath: /model-cache, name: model-cache}
        volumes:
        - name: lora-cache
          persistentVolumeClaim: {claimName: vllm-openengine-lora-cache}
        - {emptyDir: {}, name: model-cache}
    replicas: 1
    type: decode
