apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: gpu-template
spec:
  spec:
    devices:
      requests:
      - name: gpu
        exactly:
          deviceClassName: gpu.intel.com
          count: 1
---
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: vllm-agg-xpu-dra
spec:
  services:
    Frontend:
      envFromSecret: hf-token-secret
      componentType: frontend
      replicas: 1
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:my-tag
          imagePullPolicy: IfNotPresent
          env:
          - name: DYN_NAMESPACE_PREFIX
            value: default-vllm-agg-xpu-dra
    VllmDecodeWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      replicas: 1
      resources:
        requests:
          custom:
            ephemeral-storage: 2Gi
      extraPodSpec:
        securityContext:
          supplementalGroups:
          - 991
        volumes:
        - name: dev-dri
          hostPath:
            path: /dev/dri
            type: Directory
        resourceClaims:
        - name: gpu
          resourceClaimTemplateName: gpu-template
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:my-tag
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
          volumeMounts:
          - name: dev-dri
            mountPath: /dev/dri
          resources:
            claims:
            - name: gpu
          env:
          - name: DYN_HEALTH_CHECK_ENABLED
            value: 'true'
          - name: VLLM_TARGET_DEVICE
            value: xpu
          workingDir: /workspace/examples/backends/vllm
          command:
          - python3
          - -m
          - dynamo.vllm
          args:
          - --model
          - Qwen/Qwen3-0.6B
          - --enforce-eager
          - --block-size
          - '64'
