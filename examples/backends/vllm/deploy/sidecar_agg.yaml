#
# Aggregated serving via the OpenEngine sidecar.
#
# Each worker pod runs TWO containers sharing the pod network (localhost):
#   - vllm-engine  : `vllm-rs serve` (Rust frontend + managed Python EngineCore)
#                    exposing the OpenEngine gRPC server (GPU)
#   - mainContainer: the Dynamo vLLM sidecar worker, an OpenEngine client (CPU)
#
# The sidecar reaches the engine over 127.0.0.1:50051 because containers in the
# same pod share a network namespace. The engine owns the GPU; the sidecar is
# CPU-only. The sidecar is given ONLY the OpenEngine endpoint and discovers the
# model and role from the engine over OpenEngine RPCs. The image below bundles
# both vllm and dynamo for convenience; in a real split you would use a
# vllm-only image for the engine and a dynamo-only image for the sidecar.
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: vllm-sidecar-agg
spec:
  services:
    Frontend:
      envFromSecret: hf-token-secret
      componentType: frontend
      replicas: 1
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:my-tag
    VllmSidecarWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      replicas: 1
      resources:
        requests:
          custom:
            # Increase this value for larger models
            ephemeral-storage: "2Gi"
      extraPodSpec:
        # Engine container: holds the GPU and runs the Rust vLLM server.
        containers:
          - name: vllm-engine
            image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:my-tag
            command:
              - vllm-rs
              - serve
              - Qwen/Qwen3-0.6B
              - --openengine-host
              - 127.0.0.1
              - --openengine-port
              - "50051"
              - --enforce-eager
            resources:
              limits:
                nvidia.com/gpu: "1"
        # Sidecar container (Dynamo worker): CPU-only OpenEngine client.
        # Endpoint-only; model and role are discovered from the engine.
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:my-tag
          workingDir: /workspace/examples/backends/vllm
          command:
            - dynamo-vllm-sidecar
          args:
            - --openengine-endpoint
            - 127.0.0.1:50051
