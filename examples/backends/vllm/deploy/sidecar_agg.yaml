#
# Aggregated serving via the vLLM gRPC sidecar.
#
# Each worker pod runs TWO containers sharing the pod network (localhost):
#   - vllm-engine  : `vllm-rs serve` (Rust frontend + managed Python EngineCore)
#                    exposing the vLLM gRPC server (GPU)
#   - mainContainer: the Dynamo vLLM sidecar worker, an vLLM gRPC client (CPU)
#
# The sidecar reaches the engine over 127.0.0.1:50051 because containers in the
# same pod share a network namespace. The engine owns the GPU; the sidecar is
# CPU-only. The sidecar is given ONLY the vLLM gRPC endpoint and discovers the
# model and role from the vLLM gRPC API. This template requires the custom
# sidecar image described in deploy/README.md; the standard vllm-runtime image
# does not install vllm-rs or dynamo-vllm-sidecar.
apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: vllm-sidecar-agg
spec:
  components:
    - name: Frontend
      type: frontend
      replicas: 1
      podTemplate:
        spec:
          containers:
            - name: main
              image: my-registry/vllm-sidecar-runtime:my-tag
              envFrom:
                - secretRef:
                    name: hf-token-secret
    - name: VllmSidecarWorker
      type: worker
      replicas: 1
      podTemplate:
        spec:
          containers:
            # Sidecar container (Dynamo worker): CPU-only vLLM gRPC client.
            # Endpoint-only; model and role are discovered from the engine.
            - name: main
              image: my-registry/vllm-sidecar-runtime:my-tag
              command: [dynamo-vllm-sidecar]
              args: [--grpc-endpoint, 127.0.0.1:50051]
              envFrom:
                - secretRef:
                    name: hf-token-secret
              resources:
                requests:
                  ephemeral-storage: 2Gi
            # Engine container: holds the GPU and runs the Rust vLLM server.
            - name: vllm-engine
              image: my-registry/vllm-sidecar-runtime:my-tag
              command:
                - vllm-rs
                - serve
                - Qwen/Qwen3-0.6B
                - --grpc-port
                - "50051"
                - --enforce-eager
              resources:
                limits:
                  nvidia.com/gpu: "1"
