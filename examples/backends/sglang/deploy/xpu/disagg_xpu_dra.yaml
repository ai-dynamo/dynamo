apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: gpu-template
spec:
  spec:
    devices:
      requests:
        - name: gpu
          exactly:
            deviceClassName: gpu.intel.com
            count: 1
---
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: sglang-disagg-xpu-dra
spec:
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      extraPodSpec:
        mainContainer:
          image: docker.io/library/dynamo-sglang-xpu:latest
          imagePullPolicy: IfNotPresent
    decode:
      envFromSecret: hf-token-secret
      componentType: worker
      subComponentType: decode
      replicas: 1
      resources:
        requests:
          custom:
            ephemeral-storage: "2Gi"
      extraPodSpec:
        hostIPC: true
        resourceClaims:
          - name: gpu
            resourceClaimTemplateName: gpu-template
        # Uncomment if needed for your environment
        # securityContext:
        #   runAsUser: 1000
        #   runAsGroup: 1000
        #   supplementalGroups:
        #     - 44    # video group
        #     - 991   # render group
        mainContainer:
          image: docker.io/library/dynamo-sglang-xpu:latest
          imagePullPolicy: IfNotPresent
          resources:
            claims:
              - name: gpu
          env:
            - name: UCX_TLS
              value: "ze_ipc,ze_copy,tcp,cma,sysv,posix,self"
          workingDir: /workspace/examples/backends/sglang
          command:
            - python3
            - -m
            - dynamo.sglang
          args:
            - --model-path
            - Qwen/Qwen3-0.6B
            - --served-model-name
            - Qwen/Qwen3-0.6B
            - --page-size
            - "16"
            - --tp
            - "1"
            - --trust-remote-code
            - --skip-tokenizer-init
            - --enable-metrics
            - --device
            - xpu
            - --disable-cuda-graph
            - --grammar-backend
            - none
            - --disaggregation-mode
            - decode
            - --disaggregation-transfer-backend
            - nixl
            - --disaggregation-bootstrap-port
            - "12345"
            - --host
            - "0.0.0.0"
    prefill:
      envFromSecret: hf-token-secret
      componentType: worker
      subComponentType: prefill
      replicas: 1
      resources:
        requests:
          custom:
            ephemeral-storage: "2Gi"
      extraPodSpec:
        hostIPC: true
        resourceClaims:
          - name: gpu
            resourceClaimTemplateName: gpu-template
        # Uncomment if needed for your environment
        # securityContext:
        #   runAsUser: 1000
        #   runAsGroup: 1000
        #   supplementalGroups:
        #     - 44    # video group
        #     - 991   # render group
        mainContainer:
          image: docker.io/library/dynamo-sglang-xpu:latest
          imagePullPolicy: IfNotPresent
          resources:
            claims:
              - name: gpu
          env:
            - name: UCX_TLS
              value: "ze_ipc,ze_copy,tcp,cma,sysv,posix,self"
          workingDir: /workspace/examples/backends/sglang
          command:
            - python3
            - -m
            - dynamo.sglang
          args:
            - --model-path
            - Qwen/Qwen3-0.6B
            - --served-model-name
            - Qwen/Qwen3-0.6B
            - --page-size
            - "16"
            - --tp
            - "1"
            - --trust-remote-code
            - --skip-tokenizer-init
            - --enable-metrics
            - --device
            - xpu
            - --disable-cuda-graph
            - --grammar-backend
            - none
            - --disaggregation-mode
            - prefill
            - --disaggregation-transfer-backend
            - nixl
            - --disaggregation-bootstrap-port
            - "12345"
            - --host
            - "0.0.0.0"
            - --port
            - "40000"