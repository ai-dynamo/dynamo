# Prerequisite: create a ReadWriteMany PVC named sglang-openengine-lora-cache.

apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: sglang-openengine-disagg
spec:
  backendFramework: sglang
  components:
  - name: Frontend
    podTemplate:
      spec:
        containers:
        - args: [python3 -m dynamo.frontend --router-mode kv --http-port 8000]
          command: [/bin/sh, -c]
          env:
          - {name: DYN_NAMESPACE, value: dynamo}
          image: my-registry/dynamo-openengine-sidecar:my-tag
          name: main
    replicas: 1
    type: frontend
  - name: PrefillWorker
    podTemplate:
      spec:
        containers:
        - args: [--openengine-endpoint, http://127.0.0.1:50051, --expected-engine, sglang, --expected-schema-release, b0cf2a4826d246192dc65b055dab6d2b38d2d67e]
          command: [dynamo-openengine-sidecar]
          env:
          - {name: DYN_NAMESPACE, value: dynamo}
          - {name: DYN_SYSTEM_PORT, value: "8081"}
          - {name: DYN_LORA_ENABLED, value: "true"}
          - {name: DYN_LORA_PATH, value: /lora-cache}
          - {name: HF_HOME, value: /model-cache}
          image: my-registry/dynamo-openengine-sidecar:my-tag
          name: main
          resources:
            limits: {cpu: "2", memory: 4Gi}
            requests: {cpu: "1", memory: 2Gi}
          volumeMounts:
          - {mountPath: /lora-cache, name: lora-cache}
          - {mountPath: /model-cache, name: model-cache}
        - args:
          - --model-path
          - Qwen/Qwen3-0.6B
          - --served-model-name
          - Qwen/Qwen3-0.6B
          - --host
          - 0.0.0.0
          - --port
          - "8001"
          - --openengine-host
          - 0.0.0.0
          - --openengine-port
          - "50051"
          - --page-size
          - "16"
          - --enable-lora
          - --disaggregation-mode
          - prefill
          - --disaggregation-transfer-backend
          - nixl
          - --disaggregation-bootstrap-port
          - "8998"
          - --kv-events-config
          - '{"publisher":"zmq","endpoint":"tcp://*:5557","topic":""}'
          command: [python3, -m, sglang.launch_server]
          env:
          - {name: HF_HOME, value: /model-cache}
          - {name: OPENENGINE_SCHEMA_RELEASE, value: b0cf2a4826d246192dc65b055dab6d2b38d2d67e}
          - name: OPENENGINE_ADVERTISED_HOST
            valueFrom:
              fieldRef: {fieldPath: status.podIP}
          image: my-registry/sglang-openengine:my-tag
          name: engine
          resources:
            limits: {nvidia.com/gpu: "1"}
            requests: {nvidia.com/gpu: "1"}
          volumeMounts:
          - {mountPath: /lora-cache, name: lora-cache}
          - {mountPath: /model-cache, name: model-cache}
        volumes:
        - name: lora-cache
          persistentVolumeClaim: {claimName: sglang-openengine-lora-cache}
        - {emptyDir: {}, name: model-cache}
    replicas: 1
    type: prefill
  - name: DecodeWorker
    podTemplate:
      spec:
        containers:
        - args: [--openengine-endpoint, http://127.0.0.1:50051, --expected-engine, sglang, --expected-schema-release, b0cf2a4826d246192dc65b055dab6d2b38d2d67e]
          command: [dynamo-openengine-sidecar]
          env:
          - {name: DYN_NAMESPACE, value: dynamo}
          - {name: DYN_SYSTEM_PORT, value: "8082"}
          - {name: DYN_LORA_ENABLED, value: "true"}
          - {name: DYN_LORA_PATH, value: /lora-cache}
          - {name: HF_HOME, value: /model-cache}
          image: my-registry/dynamo-openengine-sidecar:my-tag
          name: main
          resources:
            limits: {cpu: "2", memory: 4Gi}
            requests: {cpu: "1", memory: 2Gi}
          volumeMounts:
          - {mountPath: /lora-cache, name: lora-cache}
          - {mountPath: /model-cache, name: model-cache}
        - args:
          - --model-path
          - Qwen/Qwen3-0.6B
          - --served-model-name
          - Qwen/Qwen3-0.6B
          - --host
          - 0.0.0.0
          - --port
          - "8001"
          - --openengine-host
          - 0.0.0.0
          - --openengine-port
          - "50051"
          - --page-size
          - "16"
          - --enable-lora
          - --disaggregation-mode
          - decode
          - --disaggregation-transfer-backend
          - nixl
          - --disaggregation-bootstrap-port
          - "8998"
          - --kv-events-config
          - '{"publisher":"zmq","endpoint":"tcp://*:5557","topic":""}'
          command: [python3, -m, sglang.launch_server]
          env:
          - {name: HF_HOME, value: /model-cache}
          - {name: OPENENGINE_SCHEMA_RELEASE, value: b0cf2a4826d246192dc65b055dab6d2b38d2d67e}
          - name: OPENENGINE_ADVERTISED_HOST
            valueFrom:
              fieldRef: {fieldPath: status.podIP}
          image: my-registry/sglang-openengine:my-tag
          name: engine
          resources:
            limits: {nvidia.com/gpu: "1"}
            requests: {nvidia.com/gpu: "1"}
          volumeMounts:
          - {mountPath: /lora-cache, name: lora-cache}
          - {mountPath: /model-cache, name: model-cache}
        volumes:
        - name: lora-cache
          persistentVolumeClaim: {claimName: sglang-openengine-lora-cache}
        - {emptyDir: {}, name: model-cache}
    replicas: 1
    type: decode
