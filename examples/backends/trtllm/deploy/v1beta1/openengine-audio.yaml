# Phi-4 multimodal audio is aggregate-only for this milestone. The engine config
# enables the model's bundled speech-lora and its exact TRT/HF module mapping.
# The sidecar leaves audio URLs/data URIs encoded for TRT-LLM to fetch/decode.
# Prerequisite: populate a PVC named `trtllm-openengine-phi4-model` with a raw
# git clone of microsoft/Phi-4-multimodal-instruct at the claim root. TRT-LLM's
# Phi-4-MM loader does not support the Hugging Face snapshot layout.

apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: trtllm-openengine-audio
spec:
  backendFramework: trtllm
  components:
  - name: Frontend
    podTemplate:
      spec:
        containers:
        - args:
          - python3 -m dynamo.frontend --router-mode round-robin --http-port 8000
          command: [/bin/sh, -c]
          env:
          - name: DYN_NAMESPACE
            value: dynamo
          image: my-registry/dynamo-openengine-sidecar:my-tag
          name: main
    replicas: 1
    type: frontend
  - name: OpenEngineWorker
    podTemplate:
      spec:
        containers:
        - args:
          - --openengine-endpoint
          - http://127.0.0.1:50051
          - --expected-engine
          - tensorrt_llm
          command: [dynamo-openengine-sidecar]
          env:
          - name: DYN_NAMESPACE
            value: dynamo
          - name: DYN_SYSTEM_PORT
            value: "8081"
          - name: DYN_LORA_ENABLED
            value: "false"
          image: my-registry/dynamo-openengine-sidecar:my-tag
          name: main
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: "1"
              memory: 2Gi
        - args:
          - /models/phi-4-multimodal-instruct
          - --backend
          - pytorch
          - --host
          - 127.0.0.1
          - --port
          - "8001"
          - --config
          - /workspace/examples/backends/trtllm/engine_configs/phi-4-multimodal-instruct/audio.yaml
          - --openengine-host
          - 127.0.0.1
          - --openengine-port
          - "50051"
          command: [trtllm-serve]
          env:
          - name: HF_HOME
            value: /model-cache
          - name: OPENENGINE_SCHEMA_RELEASE
            value: cea19cb06acf03c911b84d5c147e519b60dd92a6
          image: my-registry/tensorrtllm-openengine:my-tag
          name: engine
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
          volumeMounts:
          - mountPath: /models/phi-4-multimodal-instruct
            name: phi4-model
            readOnly: true
          - mountPath: /model-cache
            name: model-cache
        volumes:
        - name: phi4-model
          persistentVolumeClaim:
            claimName: trtllm-openengine-phi4-model
        - emptyDir: {}
          name: model-cache
    replicas: 1
    type: worker
