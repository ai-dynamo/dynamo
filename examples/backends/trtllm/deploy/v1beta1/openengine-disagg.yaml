# Prerequisite: create a ReadWriteMany PVC named
# `trtllm-openengine-lora-cache` in the deployment namespace. Both pods mount
# the same claim so an adapter downloaded by either CPU sidecar is immediately
# visible to both TRT-LLM roles.

apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: trtllm-openengine-disagg
spec:
  backendFramework: trtllm
  components:
  - name: Frontend
    podTemplate:
      spec:
        containers:
        - args:
          - python3 -m dynamo.frontend --router-mode kv --http-port 8000
          command: [/bin/sh, -c]
          env:
          - name: DYN_NAMESPACE
            value: dynamo
          image: my-registry/dynamo-openengine-sidecar:my-tag
          name: main
    replicas: 1
    type: frontend
  - name: ContextWorker
    podTemplate:
      spec:
        containers:
        - args: [--openengine-endpoint, http://127.0.0.1:50051, --expected-engine, tensorrt_llm]
          command: [dynamo-openengine-sidecar]
          env:
          - name: DYN_NAMESPACE
            value: dynamo
          - name: DYN_SYSTEM_PORT
            value: "8081"
          - name: DYN_LORA_ENABLED
            value: "true"
          - name: DYN_LORA_PATH
            value: /lora-cache
          image: my-registry/dynamo-openengine-sidecar:my-tag
          name: main
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
          - mountPath: /lora-cache
            name: lora-cache
        - args:
          - Qwen/Qwen3-0.6B
          - --backend
          - pytorch
          - --host
          - 127.0.0.1
          - --port
          - "8001"
          - --config
          - /workspace/examples/backends/trtllm/engine_configs/qwen3/prefill-lora.yaml
          - --server_role
          - CONTEXT
          - --openengine-port
          - "50051"
          - --openengine-host
          - 127.0.0.1
          command: [trtllm-serve]
          env:
          - name: HF_HOME
            value: /model-cache
          - name: OPENENGINE_SCHEMA_RELEASE
            value: cea19cb06acf03c911b84d5c147e519b60dd92a6
          image: my-registry/tensorrtllm-openengine:my-tag
          name: engine
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
          volumeMounts:
          - mountPath: /lora-cache
            name: lora-cache
          - mountPath: /model-cache
            name: model-cache
        volumes:
        - name: lora-cache
          persistentVolumeClaim:
            claimName: trtllm-openengine-lora-cache
        - emptyDir: {}
          name: model-cache
    replicas: 1
    type: prefill
  - name: GenerationWorker
    podTemplate:
      spec:
        containers:
        - args: [--openengine-endpoint, http://127.0.0.1:50052, --expected-engine, tensorrt_llm]
          command: [dynamo-openengine-sidecar]
          env:
          - name: DYN_NAMESPACE
            value: dynamo
          - name: DYN_SYSTEM_PORT
            value: "8082"
          - name: DYN_LORA_ENABLED
            value: "true"
          - name: DYN_LORA_PATH
            value: /lora-cache
          image: my-registry/dynamo-openengine-sidecar:my-tag
          name: main
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
          - mountPath: /lora-cache
            name: lora-cache
        - args:
          - Qwen/Qwen3-0.6B
          - --backend
          - pytorch
          - --host
          - 127.0.0.1
          - --port
          - "8002"
          - --config
          - /workspace/examples/backends/trtllm/engine_configs/qwen3/decode-lora.yaml
          - --server_role
          - GENERATION
          - --openengine-port
          - "50052"
          - --openengine-host
          - 127.0.0.1
          command: [trtllm-serve]
          env:
          - name: HF_HOME
            value: /model-cache
          - name: OPENENGINE_SCHEMA_RELEASE
            value: cea19cb06acf03c911b84d5c147e519b60dd92a6
          image: my-registry/tensorrtllm-openengine:my-tag
          name: engine
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
          volumeMounts:
          - mountPath: /lora-cache
            name: lora-cache
          - mountPath: /model-cache
            name: model-cache
        volumes:
        - name: lora-cache
          persistentVolumeClaim:
            claimName: trtllm-openengine-lora-cache
        - emptyDir: {}
          name: model-cache
    replicas: 1
    type: decode
