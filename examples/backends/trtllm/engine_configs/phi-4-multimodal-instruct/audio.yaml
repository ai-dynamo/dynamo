# Phi-4 multimodal implements audio through the model's bundled speech-lora.
# These mappings match Phi4MMForCausalLM.lora_config() in the local TRT-LLM
# fork. Keep the model's speech-lora directory beside the base checkpoint.
tensor_parallel_size: 1
enable_attention_dp: false
max_num_tokens: 1024
max_batch_size: 4
max_seq_len: 4096
trust_remote_code: true
backend: pytorch
enable_chunked_prefill: true

kv_cache_config:
  free_gpu_memory_fraction: 0.60

lora_config:
  lora_ckpt_source: hf
  swap_gate_up_proj_lora_b_weight: false
  max_loras: 2
  max_cpu_loras: 2
  max_lora_rank: 320
  lora_target_modules:
  - attn_qkv
  - attn_dense
  - mlp_gate_up
  - mlp_4h_to_h
  trtllm_modules_to_hf_modules:
    attn_qkv: qkv_proj
    attn_dense: o_proj
    mlp_gate_up: gate_up_proj
    mlp_4h_to_h: down_proj
