apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: fastvideo-agg
spec:
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      envs:
        - name: DYN_DISCOVERY_BACKEND
          value: kubernetes
      extraPodSpec:
        mainContainer:
          image: my-registry/fastvideo-runtime:my-tag
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
          command:
            - python
            - -m
            - dynamo.frontend
          args:
            - --http-port
            - "8000"

    FastVideoWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      replicas: 1
      sharedMemory:
        size: 8Gi
      resources:
        limits:
          gpu: "1"
        requests:
          gpu: "1"
      envs:
        - name: DYN_DISCOVERY_BACKEND
          value: kubernetes
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: expandable_segments:True
      extraPodSpec:
        mainContainer:
          image: my-registry/fastvideo-runtime:my-tag
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
          securityContext:
            capabilities:
              add:
                - SYS_PTRACE
          command:
            - python
            - -m
            - dynamo.fastvideo
          args:
            - --model-path
            - Wan-AI/Wan2.1-T2V-1.3B-Diffusers
