# Experimental: this configuration uses kv_load_ratio and requires an AI Configurator release
# that provides aiconfigurator.sdk.memory. It fails closed in the default Planner/Profiler image,
# which currently retains AI Configurator 0.9.

search_space:
  deployment_mode: [disagg]
  backend: [sglang]
  parallel_configs: []

  model_name: zai-org/GLM-5-FP8
  hardware_sku: b200_sxm
  gpu_budget: 72
  context_length: 2048

  router_mode: [round_robin]
  planner_scaling_policy: [disabled]

workload:
  isl: 1024
  osl: 1024
  kv_load_ratio: [0.0, 1.0]
  num_request_ratio: 10

goal:
  target: pareto
  pareto_objectives: [throughput_per_gpu, throughput_per_user]

sweep:
  max_rounds: 80
  parallel_evals: 8
  candidates_per_round: 8
  max_eval_seconds: 600
