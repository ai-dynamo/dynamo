[package]
name = "voice-agent-realtime"
version = "0.1.0"
edition = "2024"
publish = false

[workspace]

[[bin]]
name = "voice-agent-realtime-frontend"
path = "src/bin/frontend.rs"

[dependencies]
anyhow = "1"
async-stream = "0.3"
async-trait = "0.1"
dynamo-protocols = { path = "../../../lib/protocols" }
dynamo-llm = { path = "../../../lib/llm", default-features = false }
dynamo-runtime = { path = "../../../lib/runtime" }
futures = "0.3"
serde_json = "1"
tokio = { version = "=1.48.0", features = [
    "io-util",
    "macros",
    "net",
    "rt-multi-thread",
    "signal",
    "sync",
    "time",
] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
