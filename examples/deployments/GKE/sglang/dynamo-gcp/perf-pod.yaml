# Long-lived AIPerf pod for manual benchmarks against both aggregated and disaggregated FP8 (v0.9.1).
# Deploy: kubectl apply -f benchmarks/perf-pod-agg-disagg-fp8.yaml -n dynamo-system
# Exec:   kubectl exec -it perf-agg-disagg-fp8 -n dynamo-system -- bash
#
# Then run aiperf against either deployment, e.g.:
#   # Aggregated
#   aiperf profile --url "http://$ENDPOINT_AGG" --artifact-dir "$ROOT_ARTIFACT_DIR/perf-agg-fp8/concurrency_10" \
#     --model "$TARGET_MODEL" --tokenizer "$TOKENIZER_PATH" --endpoint-type chat --endpoint /v1/chat/completions \
#     --streaming --synthetic-input-tokens-mean $ISL --synthetic-input-tokens-stddev 0 \
#     --output-tokens-mean $OSL --output-tokens-stddev 0 \
#     --extra-inputs "max_tokens:$OSL" --extra-inputs "min_tokens:$OSL" --extra-inputs "ignore_eos:true" \
#     --extra-inputs "repetition_penalty:1.0" --extra-inputs "temperature:0.0" \
#     --concurrency 10 --request-count 100 --warmup-request-count 10 \
#     --num-dataset-entries 12800 --random-seed 100 --workers-max 10 \
#     --record-processors 32 --request-timeout-seconds 21600 --no-server-metrics --ui simple
#
#   # Disaggregated
#   aiperf profile --url "http://$ENDPOINT_DISAGG" --artifact-dir "$ROOT_ARTIFACT_DIR/perf-disagg-fp8-roce/concurrency_10" \
#     ... (same flags as above)
apiVersion: v1
kind: Pod
metadata:
  name: perf-agg-disagg-fp8
  namespace: dynamo-system
  labels:
    app: perf-agg-disagg-fp8
spec:
  restartPolicy: Never
  containers:
  - name: perf
    image: python:3.12-slim
    imagePullPolicy: IfNotPresent
    command:
    - /bin/bash
    - -c
    - |
      apt-get update -qq && apt-get install -y -qq git curl jq procps >/dev/null && apt-get clean
      pip install -q "git+https://github.com/ai-dynamo/aiperf.git@main"
      exec sleep infinity
    env:
    - name: TARGET_MODEL
      value: deepseek-ai/DeepSeek-V3.1
    - name: ENDPOINT_AGG
      value: sglang-dsv31-aggregated-frontend.dynamo-system.svc.cluster.local:8000
    - name: ENDPOINT_DISAGG
      value: sglang-disagg-1p1d-roce-frontend.dynamo-system.svc.cluster.local:8000
    - name: ISL
      value: "1000"
    - name: OSL
      value: "250"
    - name: TOKENIZER_PATH
      value: /opt/model-cache/hub/models--deepseek-ai--DeepSeek-V3.1/snapshots/c0781d039fb7a1ba2abc4add0bdc293e92d2b8db
    - name: ROOT_ARTIFACT_DIR
      value: /opt/model-cache
    - name: HF_HOME
      value: /opt/model-cache
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: AIPERF_SERVICE_PROFILE_START_TIMEOUT
      value: "600"
    resources:
      requests:
        memory: "12Gi"
      limits:
        memory: "24Gi"
    securityContext:
      privileged: true
    volumeMounts:
    - name: deepseek-v31-model-rwx
      mountPath: /opt/model-cache
    - name: results
      mountPath: /workspace/results
    workingDir: /workspace
  imagePullSecrets:
  - name: hf-token-secret
  volumes:
  - name: deepseek-v31-model-rwx
    persistentVolumeClaim:
      claimName: deepseek-v31-model-rwx
  - name: results
    emptyDir: {}
