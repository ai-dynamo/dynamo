# Aggregated SGLang deployment using nvidia/DeepSeek-V3.1-NVFP4 (same layout as sglang-dsv31-aggregated).
# Model must be on PVC (loaded via model-load-deepseek-v31-nvfp4).
# Deploy: kubectl apply -f sglang-dsv31-aggregated-nvfp4.yaml -n dynamo-system
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: sglang-dsv31-aggregated-nvfp4
  namespace: dynamo-system
  annotations:
    nvidia.com/enable-grove: "false"
spec:
  backendFramework: sglang
  envs:
  - name: HF_HOME
    value: /opt/model-cache
  - name: NCCL_DEBUG
    value: INFO
  - name: NCCL_DEBUG_SUBSYS
    value: INIT,ENV
  - name: NCCL_SHIMNET_GUEST_CONFIG_CHECKER_DISABLE
    value: "1"
  pvcs:
  - create: false
    name: deepseek-v31-model-rwx
  services:
    Frontend:
      componentType: frontend
      envs:
      - name: DYN_ROUTER_MODE
        value: kv
      extraPodSpec:
        initContainers:
        - name: fix-permissions
          image: busybox
          command:
          - sh
          - -c
          - mkdir -p /opt/model-cache/hub && chmod -R 777 /opt/model-cache
          securityContext:
            runAsUser: 0
          volumeMounts:
          - name: deepseek-v31-model-rwx
            mountPath: /opt/model-cache
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:0.8.1
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      replicas: 1
      volumeMounts:
      - name: deepseek-v31-model-rwx
        mountPoint: /opt/model-cache
    worker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodSpec:
        nodeSelector:
          nvidia.com/gpu.product: NVIDIA-B200
        initContainers:
        - name: fix-permissions
          image: busybox
          command:
          - sh
          - -c
          - mkdir -p /opt/model-cache/hub && chmod -R 777 /opt/model-cache
          securityContext:
            runAsUser: 0
          volumeMounts:
          - name: deepseek-v31-model-rwx
            mountPath: /opt/model-cache
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:0.8.1
          workingDir: /workspace/examples/backends/sglang
          command:
          - /bin/sh
          - -c
          args:
          - |
            sleep $((RANDOM % 30))
            export LD_LIBRARY_PATH=/usr/local/nvidia/lib64:$LD_LIBRARY_PATH
            export PATH=$PATH:/usr/local/nvidia/bin:/usr/local/nvidia/lib64
            /sbin/ldconfig 2>/dev/null || true
            nvidia-smi
            exec python3 -m dynamo.sglang \
              --model-path nvidia/DeepSeek-V3.1-NVFP4 \
              --served-model-name nvidia/DeepSeek-V3.1-NVFP4 \
              --attention-backend trtllm_mla \
              --quantization modelopt_fp4 \
              --moe-runner-backend flashinfer_trtllm \
              --kv-cache-dtype fp8_e4m3 \
              --enable-symm-mem \
              --moe-dense-tp-size 1 \
              --tp 8 \
              --ep-size 8 \
              --trust-remote-code \
              --skip-tokenizer-init \
              --host 0.0.0.0 \
              --mem-fraction-static 0.85 \
              --max-running-requests 24
          env:
          - name: SGLANG_MOE_NVFP4_DISPATCH
            value: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /live
              port: 9090
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /live
              port: 9090
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 600
          resources:
            limits:
              networking.gke.io.networks/rdma-0: "1"
              networking.gke.io.networks/rdma-1: "1"
              networking.gke.io.networks/rdma-2: "1"
              networking.gke.io.networks/rdma-3: "1"
              networking.gke.io.networks/rdma-4: "1"
              networking.gke.io.networks/rdma-5: "1"
              networking.gke.io.networks/rdma-6: "1"
              networking.gke.io.networks/rdma-7: "1"
      replicas: 1
      resources:
        limits:
          gpu: "8"
      sharedMemory:
        size: 80Gi
      volumeMounts:
      - name: deepseek-v31-model-rwx
        mountPoint: /opt/model-cache
