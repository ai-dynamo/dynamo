# 1P1D disagg with NCCL-test-aligned RoCE settings (single decode pool; NVLS/MNNVL off, IB, GID_INDEX=3, etc.).
# Use when 1P2D has RoCE/latency issues; same RoCE config, decode multinode nodeCount: 1.
# Deploy with: kubectl apply -f sglang-disagg-dsv31-nixl-1p1d-roce.yaml -n dynamo-system
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: sglang-disagg-1p1d-roce
  namespace: dynamo-system
  annotations:
    nvidia.com/enable-grove: "true"
spec:
  backendFramework: sglang
  envs:
  - name: HF_HOME
    value: /opt/model-cache
  - name: NCCL_DEBUG
    value: INFO
  - name: NCCL_DEBUG_SUBSYS
    value: INIT,ENV
  - name: NCCL_SHIMNET_GUEST_CONFIG_CHECKER_DISABLE
    value: "1"
  - name: GLOO_SOCKET_IFNAME
    value: eth0
  - name: NCCL_SOCKET_IFNAME
    value: eth0
  # From nccl-test-b200-2node: connectivity
  - name: NCCL_NET
    value: IB
  - name: NCCL_IB_HCA
    value: mlx5_0,mlx5_1,mlx5_2,mlx5_3,mlx5_4,mlx5_5,mlx5_6,mlx5_7
  # Blackwell: MNNVL on; NVLS off; CuMem off
  - name: NCCL_CUMEM_ENABLE
    value: "0"
  - name: NCCL_NVLS_ENABLE
    value: "0"
  - name: NCCL_MNNVL_ENABLE
    value: "1"
  - name: MC_FORCE_MNNVL
    value: "1"
  # From nccl-test-b200-2node: GKE RoCE v2
  - name: NCCL_IB_GID_INDEX
    value: "3"
  - name: NCCL_IB_TC
    value: "41"
  - name: NCCL_IB_TIMEOUT
    value: "22"
  - name: NCCL_IB_RETRY_CNT
    value: "7"
  - name: SGLANG_DISAGGREGATION_WAITING_TIMEOUT
    value: "600"
  - name: SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT
    value: "600"
  - name: TORCH_DISTRIBUTED_DEFAULT_TIMEOUT
    value: "1800"
  - name: PYTHONUNBUFFERED
    value: "1"
  - name: DYN_SKIP_SGLANG_LOG_FORMATTING
    value: "1"
  - name: SGLANG_ENABLE_JIT_DEEPGEMM
    value: "false"
  - name: SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE
    value: "100000"
  - name: SGLANG_USE_MESSAGE_QUEUE_BROADCASTER
    value: "0"
  - name: SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK
    value: "1"
  - name: DYN_REQUEST_PLANE
    value: tcp
  - name: SGLANG_ENABLE_SPEC_V2
    value: "1"
  - name: UCX_TLS
    value: "cuda_ipc,rc,cuda_copy,tcp,self"
  - name: UCX_LOG_LEVEL
    value: "INFO"

  pvcs:
  - create: false
    name: deepseek-v31-model-rwx
  services:
    Frontend:
      componentType: frontend
      envs:
      - name: DYN_ROUTER_MODE
        value: kv
      extraPodSpec:
        hostIPC: true
        hostPID: true
        initContainers:
        - name: fix-permissions
          image: busybox
          command:
          - sh
          - -c
          - mkdir -p /opt/model-cache/hub && chmod -R 777 /opt/model-cache
          securityContext:
            runAsUser: 0
          volumeMounts:
          - name: deepseek-v31-model-rwx
            mountPath: /opt/model-cache
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:0.9.1
          securityContext:
            capabilities:
              add: [ "IPC_LOCK" ]
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      replicas: 1
      volumeMounts:
      - name: deepseek-v31-model-rwx
        mountPoint: /opt/model-cache
    prefill:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodMetadata:
        labels:
          nvidia-nsight-profile: "enabled"
        annotations:
          networking.gke.io/default-interface: "eth0"
          networking.gke.io/interfaces: '[{"interfaceName":"eth0","network":"default"},{"interfaceName":"rdma0","network":"rdma-0"},{"interfaceName":"rdma1","network":"rdma-1"},{"interfaceName":"rdma2","network":"rdma-2"},{"interfaceName":"rdma3","network":"rdma-3"},{"interfaceName":"rdma4","network":"rdma-4"},{"interfaceName":"rdma5","network":"rdma-5"},{"interfaceName":"rdma6","network":"rdma-6"},{"interfaceName":"rdma7","network":"rdma-7"}]'
      extraPodSpec:
        hostIPC: true
        hostPID: true
        nodeSelector:
          nvidia.com/gpu.product: NVIDIA-B200
        initContainers:
        - name: fix-permissions
          image: busybox
          command:
          - sh
          - -c
          - mkdir -p /opt/model-cache/hub && chmod -R 777 /opt/model-cache
          securityContext:
            runAsUser: 0
          volumeMounts:
          - name: deepseek-v31-model-rwx
            mountPath: /opt/model-cache
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:0.9.1
          securityContext:
            capabilities:
              add: [ "IPC_LOCK" ]
          workingDir: /workspace/examples/backends/sglang
          command:
          - /bin/sh
          - -c
          args:
          - |
            sleep $((RANDOM % 60))
            export LD_LIBRARY_PATH=/usr/local/nvidia/lib64:$LD_LIBRARY_PATH
            export PATH=$PATH:/usr/local/nvidia/bin:/usr/local/nvidia/lib64
            /sbin/ldconfig 2>/dev/null || true
            nvidia-smi topo -m
            exec python3 -m dynamo.sglang \
              --model-path deepseek-ai/DeepSeek-V3.1 \
              --served-model-name deepseek-ai/DeepSeek-V3.1 \
              --tp 8 \
              --dp 8 \
              --ep-size 8 \
              --enable-dp-attention \
              --enable-dp-lm-head \
              --trust-remote-code \
              --disaggregation-mode prefill \
              --disaggregation-bootstrap-port 30001 \
              --disaggregation-transfer-backend nixl \
              --host 0.0.0.0 \
              --mem-fraction-static 0.85 \
              --max-running-requests 512 \
              --watchdog-timeout 1000000 \
              --max-prefill-tokens 32768 \
              --chunked-prefill-size 32768 \
              --disable-cuda-graph \
              --load-balance-method round_robin \
              --stream-interval 30 \
              --enable-flashinfer-allreduce-fusion \
              --disable-radix-cache

          readinessProbe:
            tcpSocket:
              port: 30001
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            tcpSocket:
              port: 30001
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            tcpSocket:
              port: 30001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 180
      replicas: 1
      resources:
        limits:
          gpu: "8"
          custom:
            networking.gke.io.networks/rdma-0: "1"
            networking.gke.io.networks/rdma-1: "1"
            networking.gke.io.networks/rdma-2: "1"
            networking.gke.io.networks/rdma-3: "1"
            networking.gke.io.networks/rdma-4: "1"
            networking.gke.io.networks/rdma-5: "1"
            networking.gke.io.networks/rdma-6: "1"
            networking.gke.io.networks/rdma-7: "1"
        requests:
          gpu: "8"
          cpu: "8"
          memory: 712Gi
          custom:
            networking.gke.io.networks/rdma-0: "1"
            networking.gke.io.networks/rdma-1: "1"
            networking.gke.io.networks/rdma-2: "1"
            networking.gke.io.networks/rdma-3: "1"
            networking.gke.io.networks/rdma-4: "1"
            networking.gke.io.networks/rdma-5: "1"
            networking.gke.io.networks/rdma-6: "1"
            networking.gke.io.networks/rdma-7: "1"
      sharedMemory:
        size: 80Gi
      subComponentType: prefill
      volumeMounts:
      - name: deepseek-v31-model-rwx
        mountPoint: /opt/model-cache
    decode:
      componentType: worker
      envFromSecret: hf-token-secret
      # No multinode: single decode pool (1P1D). CRD requires nodeCount >= 2 if multinode is set.
      extraPodMetadata:
        labels:
          nvidia-nsight-profile: "enabled"
        annotations:
          networking.gke.io/default-interface: "eth0"
          networking.gke.io/interfaces: '[{"interfaceName":"eth0","network":"default"},{"interfaceName":"rdma0","network":"rdma-0"},{"interfaceName":"rdma1","network":"rdma-1"},{"interfaceName":"rdma2","network":"rdma-2"},{"interfaceName":"rdma3","network":"rdma-3"},{"interfaceName":"rdma4","network":"rdma-4"},{"interfaceName":"rdma5","network":"rdma-5"},{"interfaceName":"rdma6","network":"rdma-6"},{"interfaceName":"rdma7","network":"rdma-7"}]'
      extraPodSpec:
        hostIPC: true
        hostPID: true
        nodeSelector:
          nvidia.com/gpu.product: NVIDIA-B200
        initContainers:
        - name: fix-permissions
          image: busybox
          command:
          - sh
          - -c
          - mkdir -p /opt/model-cache/hub && chmod -R 777 /opt/model-cache
          securityContext:
            runAsUser: 0
          volumeMounts:
          - name: deepseek-v31-model-rwx
            mountPath: /opt/model-cache
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:0.9.1
          securityContext:
            capabilities:
              add: [ "IPC_LOCK" ]
          workingDir: /workspace/examples/backends/sglang
          command:
          - /bin/sh
          - -c
          args:
          - |
            sleep $((RANDOM % 60))
            export LD_LIBRARY_PATH=/usr/local/nvidia/lib64:$LD_LIBRARY_PATH
            export PATH=$PATH:/usr/local/nvidia/bin:/usr/local/nvidia/lib64
            /sbin/ldconfig 2>/dev/null || true
            nvidia-smi topo -m
            exec python3 -m dynamo.sglang \
              --model-path deepseek-ai/DeepSeek-V3.1 \
              --served-model-name deepseek-ai/DeepSeek-V3.1 \
              --tp 8 \
              --dp 8 \
              --enable-dp-attention \
              --enable-dp-lm-head \
              --ep-size 8 \
              --enable-dp-lm-head \
              --trust-remote-code \
              --skip-tokenizer-init \
              --disaggregation-mode decode \
              --disaggregation-bootstrap-port 30001 \
              --disaggregation-transfer-backend nixl \
              --host 0.0.0.0 \
              --mem-fraction-static 0.85 \
              --max-prefill-tokens 32768 \
              --chunked-prefill-size 32768 \
              --max-running-requests 512 \
              --cuda-graph-max-bs 512 \
              --watchdog-timeout 1000000 \
              --stream-interval 30 \
              --prefill-round-robin-balance \
              --enable-flashinfer-allreduce-fusion \
              --disable-radix-cache \
              --speculative-algorithm EAGLE \
              --speculative-num-steps 2 \
              --speculative-eagle-topk 1 \
              --speculative-num-draft-tokens 3
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /live
              port: 9090
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /live
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 300
      replicas: 1
      resources:
        limits:
          gpu: "8"
          custom:
            networking.gke.io.networks/rdma-0: "1"
            networking.gke.io.networks/rdma-1: "1"
            networking.gke.io.networks/rdma-2: "1"
            networking.gke.io.networks/rdma-3: "1"
            networking.gke.io.networks/rdma-4: "1"
            networking.gke.io.networks/rdma-5: "1"
            networking.gke.io.networks/rdma-6: "1"
            networking.gke.io.networks/rdma-7: "1"
        requests:
          gpu: "8"
          cpu: "8"
          memory: 712Gi
          custom:
            networking.gke.io.networks/rdma-0: "1"
            networking.gke.io.networks/rdma-1: "1"
            networking.gke.io.networks/rdma-2: "1"
            networking.gke.io.networks/rdma-3: "1"
            networking.gke.io.networks/rdma-4: "1"
            networking.gke.io.networks/rdma-5: "1"
            networking.gke.io.networks/rdma-6: "1"
            networking.gke.io.networks/rdma-7: "1"
      sharedMemory:
        size: 80Gi
      subComponentType: decode
      volumeMounts:
      - name: deepseek-v31-model-rwx
        mountPoint: /opt/model-cache
