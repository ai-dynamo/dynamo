# NVFP4 GAIE Aggregated — sglang-runtime:1.0.0, EPP dp-main, tracing, KV routing
# Deploy: kubectl apply -f dgd-agg-gaie.yaml -n dynamo-system
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: sglang-dsv31-nvfp4-agg-gaie
  namespace: dynamo-system
  annotations:
    nvidia.com/enable-grove: "false"
spec:
  backendFramework: sglang
  envs:
  - name: HF_HOME
    value: /opt/model-cache
  - name: NCCL_DEBUG
    value: INFO
  - name: NCCL_DEBUG_SUBSYS
    value: INIT,ENV
  - name: NCCL_SHIMNET_GUEST_CONFIG_CHECKER_DISABLE
    value: "1"
  - name: NCCL_CUMEM_ENABLE
    value: "0"
  - name: NCCL_NVLS_ENABLE
    value: "0"
  - name: NCCL_MNNVL_ENABLE
    value: "1"
  - name: MC_FORCE_MNNVL
    value: "1"
  - name: DYN_SKIP_SGLANG_LOG_FORMATTING
    value: "1"
  - name: SGLANG_ENABLE_SPEC_V2
    value: "1"
  - name: SGLANG_ENABLE_JIT_DEEPGEMM
    value: "true"
  - name: SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK
    value: "1"
  - name: DYN_LOGGING_JSONL
    value: "true"
  - name: OTEL_EXPORT_ENABLED
    value: "true"
  - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
    value: "http://otel-collector.dynamo-system.svc.cluster.local:4317"
  - name: OTEL_SERVICE_NAME
    value: "dynamo-worker-nvfp4-agg-gaie"
  pvcs:
  - create: false
    name: deepseek-v31-model-rwx
  services:
    Epp:
      envFromSecret: hf-token-secret
      componentType: epp
      replicas: 1
      volumeMounts:
      - name: deepseek-v31-model-rwx
        mountPoint: /opt/model-cache
      extraPodSpec:
        mainContainer:
          # Substitute REGION / PROJECT_ID / REPO_NAME (see gaie/README "Building the Custom EPP Image").
          image: REGION-docker.pkg.dev/PROJECT_ID/REPO_NAME/dynamo-epp:latest
          env:
          - name: DYN_DECODE_FALLBACK
            value: "true"
          - name: DYN_KV_CACHE_BLOCK_SIZE
            value: "128"
          - name: DYN_MODEL_NAME
            value: "nvidia/DeepSeek-V3.1-NVFP4"
          - name: DYN_ENFORCE_DISAGG
            value: "false"
          - name: DYN_NAMESPACE_PREFIX
            value: "dynamo-system-sglang-dsv31-nvfp4-agg-gaie"
      eppConfig:
          config:
            plugins:
            - type: disagg-profile-handler
            - name: decode-filter
              type: label-filter
              parameters:
                label: "nvidia.com/dynamo-sub-component-type"
                validValues:
                - "decode"
                allowsNoLabel: true
            - name: picker
              type: max-score-picker
            - name: dyn-decode
              type: dyn-decode-scorer
            schedulingProfiles:
            - name: decode
              plugins:
              - pluginRef: decode-filter
                weight: 1
              - pluginRef: dyn-decode
                weight: 1
              - pluginRef: picker
                weight: 1
    worker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodSpec:
        nodeSelector:
          nvidia.com/gpu.product: NVIDIA-B200
        initContainers:
        - name: fix-permissions
          image: busybox
          command: ["sh", "-c", "mkdir -p /opt/model-cache/hub && chmod -R 777 /opt/model-cache"]
          securityContext:
            runAsUser: 0
          volumeMounts:
          - name: deepseek-v31-model-rwx
            mountPath: /opt/model-cache
        containers:
        - name: frontend
          image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:1.0.0
          command:
          - python3
          args:
          - -m
          - dynamo.frontend
          - --router-mode
          - direct
          ports:
          - containerPort: 8000
            name: http
            protocol: TCP
          envFrom:
          - secretRef:
              name: hf-token-secret
          env:
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: POD_UID
            valueFrom:
              fieldRef:
                fieldPath: metadata.uid
          - name: DYNAMO_PORT
            value: "8000"
          - name: DYN_HTTP_PORT
            value: "8000"
          - name: HF_HOME
            value: /opt/model-cache
          - name: DYN_DISCOVERY_BACKEND
            value: "kubernetes"
          - name: DYN_NAMESPACE
            value: "dynamo-system-sglang-dsv31-nvfp4-agg-gaie"
          - name: DYN_NAMESPACE_PREFIX
            value: "dynamo-system-sglang-dsv31-nvfp4-agg-gaie"
          - name: DYN_COMPONENT
            value: "frontend"
          - name: DYN_PARENT_DGD_K8S_NAME
            value: "sglang-dsv31-nvfp4-agg-gaie"
          - name: DYN_PARENT_DGD_K8S_NAMESPACE
            value: "dynamo-system"
          - name: DYN_ROUTER_MODE
            value: "kv"
          volumeMounts:
          - name: deepseek-v31-model-rwx
            mountPath: /opt/model-cache
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:1.0.0
          workingDir: /workspace/examples/backends/sglang
          command: ["/bin/sh", "-c"]
          args:
          - |
            sleep $((RANDOM % 30))
            export LD_LIBRARY_PATH=/usr/local/nvidia/lib64:$LD_LIBRARY_PATH
            export PATH=$PATH:/usr/local/nvidia/bin:/usr/local/nvidia/lib64
            /sbin/ldconfig 2>/dev/null || true
            nvidia-smi
            exec python3 -m dynamo.sglang \
              --model-path nvidia/DeepSeek-V3.1-NVFP4 \
              --served-model-name nvidia/DeepSeek-V3.1-NVFP4 \
              --attention-backend trtllm_mla \
              --quantization modelopt_fp4 \
              --moe-runner-backend flashinfer_trtllm \
              --kv-cache-dtype fp8_e4m3 \
              --enable-symm-mem \
              --moe-dense-tp-size 1 \
              --tp 8 \
              --ep-size 8 \
              --trust-remote-code \
              --host 0.0.0.0 \
              --mem-fraction-static 0.85 \
              --max-running-requests 24 \
              --kv-events-config '{"publisher":"zmq","topic":"kv-events","endpoint":"tcp://*:5557"}'
          env:
          - name: SGLANG_MOE_NVFP4_DISPATCH
            value: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /live
              port: 9090
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /live
              port: 9090
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 600
          resources:
            limits:
              networking.gke.io.networks/rdma-0: "1"
              networking.gke.io.networks/rdma-1: "1"
              networking.gke.io.networks/rdma-2: "1"
              networking.gke.io.networks/rdma-3: "1"
              networking.gke.io.networks/rdma-4: "1"
              networking.gke.io.networks/rdma-5: "1"
              networking.gke.io.networks/rdma-6: "1"
              networking.gke.io.networks/rdma-7: "1"
      replicas: 1
      resources:
        limits:
          gpu: "8"
      sharedMemory:
        size: 80Gi
      volumeMounts:
      - name: deepseek-v31-model-rwx
        mountPoint: /opt/model-cache
