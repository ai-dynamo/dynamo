apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: ${CLUSTER_NAME}
  region: ${AWS_REGION}

availabilityZones:
${EKS_CP_AZS}

autoModeConfig:
  enabled: true

addonsConfig:
  disableDefaultAddons: true

addons:
  - name: aws-efs-csi-driver
    version: latest
    useDefaultPodIdentityAssociations: true
