apiVersion: apps/v1
kind: Deployment
metadata:
  name: runtime-free-selector
  labels:
    app.kubernetes.io/name: runtime-free-selector
    app.kubernetes.io/part-of: runtime-free-router-sglang
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: runtime-free-selector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: runtime-free-selector
        app.kubernetes.io/part-of: runtime-free-router-sglang
    spec:
      containers:
        - name: selector
          image: dynamo-image
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - -m
            - dynamo.select_service
          args:
            - --port
            - "8092"
          ports:
            - name: http
              containerPort: 8092
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: runtime-free-selector
  labels:
    app.kubernetes.io/name: runtime-free-selector
    app.kubernetes.io/part-of: runtime-free-router-sglang
spec:
  selector:
    app.kubernetes.io/name: runtime-free-selector
  ports:
    - name: http
      port: 8092
      targetPort: http
