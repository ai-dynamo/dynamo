default_policy_class: cached
uncached_isl_policy_class_tiers:
  - min_tokens: 0
    policy_class: cached
  - min_tokens: 3072
    policy_class: uncached
policy_classes:
  - name: cached
    queue_policy: wspt
    quantum: 2048
    request_queue_limit: 8192
    cached_token_queue_limit: 16777216
  - name: uncached
    queue_policy: fcfs
    quantum: 512
    request_queue_limit: 4096
    token_queue_limit: 8388608
  - name: latency
    queue_policy: wspt
    quantum: 4096
    request_queue_limit: 2048

models:
  example/large-model:
    default_policy_class: latency
    policy_classes:
      - name: latency
        queue_policy: wspt
        quantum: 4096
        request_queue_limit: 2048
      - name: batch
        queue_policy: fcfs
        quantum: 1024
        token_queue_limit: 4194304
