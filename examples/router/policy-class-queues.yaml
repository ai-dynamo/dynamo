default_policy_class: uncached
policy_classes:
  - name: uncached
    queue_policy: fcfs
    quantum: 512
    prefill_busy_threshold: 32768
    prefill_busy_threshold_frac: 1.0
    request_queue_limit: 4096
    token_queue_limit: 8388608
  - name: cached
    queue_policy: wspt
    quantum: 2048
    prefill_busy_threshold_frac: 2.0
    request_queue_limit: 8192
    cached_token_queue_limit: 16777216

models:
  example/large-model:
    default_policy_class: latency
    policy_classes:
      - name: latency
        queue_policy: wspt
        quantum: 4096
        prefill_busy_threshold: 16384
        request_queue_limit: 2048
      - name: batch
        queue_policy: fcfs
        quantum: 1024
        prefill_busy_threshold_frac: 0.75
        token_queue_limit: 4194304
