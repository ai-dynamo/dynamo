default_policy_class: cached
uncached_isl_policy_class_tiers:
  - min_tokens: 0
    policy_class: cached
  - min_tokens: 3072
    policy_class: uncached
policy_classes:
  - name: cached
    queue_policy: wspt
    quantum: 2048
    request_queue_limit_per_worker: 1024
    cached_token_queue_limit_per_worker: 2097152
  - name: uncached
    queue_policy: fcfs
    quantum: 512
    request_queue_limit_per_worker: 512
    raw_isl_token_queue_limit_per_worker: 1048576
  - name: latency
    queue_policy: wspt
    quantum: 4096
    request_queue_limit_per_worker: 256

models:
  example/large-model:
    default_policy_class: latency
    policy_classes:
      - name: latency
        queue_policy: wspt
        quantum: 4096
        request_queue_limit_per_worker: 256
      - name: batch
        queue_policy: fcfs
        quantum: 1024
        raw_isl_token_queue_limit_per_worker: 524288
