#
# Tested with dynamo 1.0 (TRT-LLM PyTorch backend).
#
# Dynamo 0.9.1 compatibility notes:
#   - Change image tags from :1.0.0 to :0.9.1
#   - Change --dyn-reasoning-parser from nemotron_nano to deepseek_r1
#     (nemotron_nano reasoning parser is broken in 0.9.1)
#   - With deepseek_r1 parser, enable_thinking: false will not work correctly
#   - Add enable_block_reuse: false to kv_cache_config (required in 0.9.1;
#     1.0 genuinely supports block reuse for Mamba hybrid cache)
#
apiVersion: v1
kind: ConfigMap
metadata:
  name: nemotron-super-config
data:
  config.yaml: |
    backend: pytorch
    tensor_parallel_size: 4
    moe_expert_parallel_size: 1
    enable_attention_dp: false
    enable_chunked_prefill: true
    max_batch_size: 16
    max_num_tokens: 8192
    trust_remote_code: true
    kv_cache_config:
      free_gpu_memory_fraction: 0.85
      # Block reuse is supported for Mamba hybrid cache in 1.0.
      # In 0.9.1, block reuse was not supported and enable_block_reuse: false
      # must be set explicitly, otherwise startup fails with:
      #   "mamba hybrid cache requires block reuse to be disabled"
    cuda_graph_config:
      max_batch_size: 16
---
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: nemotron-super-fp8-trtllm-agg
spec:
  backendFramework: trtllm
  pvcs:
    - name: model-cache
      create: false
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      extraPodSpec:
        mainContainer:
          # Approximate KV-aware routing: uses prefix hashing to route
          # requests to workers likely to have relevant KV cache, without
          # requiring KV events from the backend.
          args:
          - python3 -m dynamo.frontend --router-mode kv --no-kv-events --http-port 8000
          command:
          - /bin/sh
          - -c
          image: nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.0.0
    TrtllmWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      replicas: 1
      resources:
        limits:
          gpu: "4"
        requests:
          gpu: "4"
      volumeMounts:
        - name: model-cache
          mountPoint: /opt/models
      sharedMemory:
        size: 16Gi
      extraPodSpec:
        mainContainer:
          startupProbe:
            httpGet:
              path: /health
              port: 9090
            periodSeconds: 10
            timeoutSeconds: 10
            # TRT-LLM startup is slow (~7 min) due to CUDA graph compilation
            failureThreshold: 600
          image: nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.0.0
          env:
          - name: HF_HOME
            value: "/opt/models"
          - name: ENGINE_ARGS
            value: "/opt/dynamo/configs/config.yaml"
          - name: MODEL_PATH
            value: "nvidia/nemotron-super-rl-030326-FP8"
          command:
          - /bin/sh
          - -c
          args:
          - |
            python3 -m dynamo.trtllm \
              --model-path "${MODEL_PATH}" \
              --served-model-name "${MODEL_PATH}" \
              --extra-engine-args "${ENGINE_ARGS}" \
              --dyn-tool-call-parser nemotron_nano \
              --dyn-reasoning-parser nemotron_nano
            # In 0.9.1, use --dyn-reasoning-parser deepseek_r1 instead
            # (nemotron_nano reasoning parser is broken in 0.9.1).
          volumeMounts:
          - mountPath: /opt/dynamo/configs
            name: nemotron-super-config
            readOnly: true
        volumes:
        - configMap:
            name: nemotron-super-config
          name: nemotron-super-config
