apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: gpt-oss-120b-vllm-snapshot-gms
  annotations:
    nvidia.com/enable-grove: "false"
spec:
  backendFramework: vllm
  components:
    - name: Frontend
      replicas: 1
      type: frontend
      podTemplate:
        spec:
          containers:
            - name: main
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime-nightly:20260717-5930e58
              imagePullPolicy: Always
              command:
                - python3
              env:
                - name: HF_HOME
                  value: /model-store
                - name: HF_HUB_OFFLINE
                  value: "1"
                - name: TRANSFORMERS_OFFLINE
                  value: "1"
              envFrom:
                - secretRef:
                    name: hf-token-secret
              volumeMounts:
                - name: model-cache
                  mountPath: /model-store
          volumes:
            - name: model-cache
              persistentVolumeClaim:
                claimName: model-cache
    - name: VllmWorker
      replicas: 0
      type: worker
      experimental:
        gpuMemoryService:
          mode: IntraPod
          deviceClassName: gpu.nvidia.com
          extraClientContainers:
            - gms-loader
        checkpoint:
          enabled: true
          startupPolicy: WaitForCheckpoint
          deletionPolicy: Delete
          job:
            gmsClientContainers:
              - gms-saver
            podTemplate:
              spec:
                securityContext:
                  fsGroup: 1000
                  fsGroupChangePolicy: OnRootMismatch
                containers:
                  - name: gms-saver
                    image: nvcr.io/nvidia/ai-dynamo/vllm-runtime-nightly:20260717-5930e58
                    imagePullPolicy: Always
                    command:
                      - /bin/sh
                      - -c
                    args:
                      - |
                        set -eu
                        checkpoint_dir="/checkpoints/${CHECKPOINT_ID}/gms/versions/${ARTIFACT_VERSION}"
                        mkdir -p "${checkpoint_dir}"
                        exec python3 -m gpu_memory_service.cli.snapshot.saver \
                          --checkpoint-dir "${checkpoint_dir}"
                    env:
                      - name: CHECKPOINT_ID
                        valueFrom:
                          fieldRef:
                            fieldPath: metadata.labels['nvidia.com/snapshot-checkpoint-id']
                      - name: ARTIFACT_VERSION
                        valueFrom:
                          fieldRef:
                            fieldPath: metadata.annotations['nvidia.com/snapshot-artifact-version']
                    volumeMounts:
                      - name: checkpoint-storage
                        mountPath: /checkpoints
                    securityContext:
                      runAsUser: 0
      podTemplate:
        spec:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
          runtimeClassName: nvidia
          nodeSelector:
            nvidia.com/gpu.product: NVIDIA-B200
          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule
          containers:
            - name: main
              # Build and publish this placeholder from the matching vLLM runtime.
              image: registry.example.com/dynamo/vllm-placeholder:20260717-5930e58
              imagePullPolicy: Always
              command:
                - python3
                - -m
                - dynamo.vllm
              args:
                - --model
                - openai/gpt-oss-120b
                - --load-format
                - gms
                - --dyn-tool-call-parser
                - harmony
                - --dyn-reasoning-parser
                - gpt_oss
              env:
                - name: HF_HOME
                  value: /model-store
                - name: HF_HUB_OFFLINE
                  value: "1"
                - name: TRANSFORMERS_OFFLINE
                  value: "1"
                - name: VLLM_ENGINE_READY_TIMEOUT_S
                  value: "7200"
              envFrom:
                - secretRef:
                    name: hf-token-secret
              resources:
                limits:
                  nvidia.com/gpu: "1"
              volumeMounts:
                - name: model-cache
                  mountPath: /model-store
              securityContext:
                runAsUser: 0
                capabilities:
                  add:
                    - SYS_PTRACE
            - name: gms-loader
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime-nightly:20260717-5930e58
              imagePullPolicy: Always
              command:
                - /bin/sh
                - -c
              args:
                - |
                  set -eu
                  checkpoint_dir="/checkpoints/${CHECKPOINT_ID}/gms/versions/${ARTIFACT_VERSION}"
                  python3 -m gpu_memory_service.cli.snapshot.loader \
                    --checkpoint-dir "${checkpoint_dir}" \
                    --transfer-backend nixl
                  exec sleep infinity
              env:
                - name: CHECKPOINT_ID
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.labels['nvidia.com/snapshot-checkpoint-id']
                - name: ARTIFACT_VERSION
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['nvidia.com/snapshot-artifact-version']
              volumeMounts:
                - name: checkpoint-storage
                  mountPath: /checkpoints
              securityContext:
                runAsUser: 0
          volumes:
            - name: model-cache
              persistentVolumeClaim:
                claimName: model-cache
            - name: checkpoint-storage
              persistentVolumeClaim:
                claimName: snapshot-pvc
