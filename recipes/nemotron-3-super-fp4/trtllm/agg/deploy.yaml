apiVersion: v1
kind: ConfigMap
metadata:
  name: nemotron-super-fp4-config
data:
  config.yaml: |
    backend: pytorch
    max_batch_size: 8
    max_num_tokens: 8192
    max_seq_len: 1048576
    tensor_parallel_size: 1
    moe_expert_parallel_size: 1
    enable_attention_dp: false
    enable_chunked_prefill: true
    pipeline_parallel_size: 1
    stream_interval: 1
    print_iter_log: true
    moe_config:
      backend: CUTLASS
    kv_cache_config:
      dtype: fp8
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.9
      mamba_ssm_cache_dtype: float16
      mamba_ssm_stochastic_rounding: true
      mamba_ssm_philox_rounds: 5
    cuda_graph_config:
      enable_padding: true
      max_batch_size: 8
    speculative_config:
      decoding_type: MTP
      num_nextn_predict_layers: 3
      allow_advanced_sampling: true
    trust_remote_code: true
---
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: nemotron-super-fp4-trtllm-agg
spec:
  backendFramework: trtllm
  pvcs:
    - name: model-cache
      create: false
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      volumeMounts:
        - name: model-cache
          mountPoint: /opt/models
      extraPodSpec:
        mainContainer:
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 120
          image: nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:my-tag
          command:
            - /bin/sh
            - -c
          args:
            - python3 -m dynamo.frontend --router-mode round-robin --http-port 8000
          env:
            - name: HF_HOME
              value: /opt/models
    TrtllmWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      replicas: 1
      resources:
        limits:
          gpu: "1"
        requests:
          gpu: "1"
      volumeMounts:
        - name: model-cache
          mountPoint: /opt/models
      sharedMemory:
        size: 16Gi
      extraPodSpec:
        mainContainer:
          startupProbe:
            httpGet:
              path: /health
              port: 9090
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 600
          image: nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:my-tag
          env:
            - name: HF_HOME
              value: /opt/models
            - name: TLLM_ALLOW_LONG_MAX_MODEL_LEN
              value: "1"
            - name: ENGINE_ARGS
              value: /opt/dynamo/configs/config.yaml
            - name: MODEL_PATH
              value: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
          command:
            - /bin/sh
            - -c
          args:
            - |
              python3 -m dynamo.trtllm \
                --model-path "${MODEL_PATH}" \
                --served-model-name "${MODEL_PATH}" \
                --extra-engine-args "${ENGINE_ARGS}" \
                --tensor-parallel-size 1 \
                --expert-parallel-size 1 \
                --dyn-tool-call-parser nemotron_nano \
                --dyn-reasoning-parser nemotron_nano
          volumeMounts:
            - mountPath: /opt/dynamo/configs
              name: nemotron-super-fp4-config
              readOnly: true
          workingDir: /workspace/examples/backends/trtllm
        volumes:
          - configMap:
              name: nemotron-super-fp4-config
            name: nemotron-super-fp4-config
