#
# Accuracy CANARY — the real correctness gate for disagg.
#
# GDN conv/recurrent-state corruption over the NIXL connector is SILENT:
# the server stays healthy and returns tokens, they're just wrong past the
# prefill boundary. So a crash-free disagg run proves nothing. We run GSM8K
# (lm-eval-harness, same eval vLLM PR #41869 validated on) against BOTH the
# `disagg` and `agg` frontends and compare exact-match pass rates:
#
#   disagg pass-rate ~= agg pass-rate   -> NIXL GDN-state transfer is good
#   disagg materially below agg (>2-3%) -> PR #41869 path misbehaving here
#
# Source hw/<hw>.env, export the per-config values, and render with envsubst
# before kubectl apply (the restricted allow-list keeps the in-pod
# ${FRONTEND}/${RUN_LABEL}/${MODEL_NAME} refs literal) — see README -> Usage:
#
#   set -a; . hw/h100.env; set +a
#   export BENCH_ACC_POD=qwen35-disagg-acc BENCH_FRONTEND=qwen35-disagg-frontend \
#          BENCH_RUN_LABEL=disagg
#   envsubst '$HW_NODE_SELECTOR $HW_TOLERATIONS $BENCH_ACC_POD $BENCH_FRONTEND $BENCH_RUN_LABEL' \
#     < accuracy-job.yaml | kubectl -n <ns> apply -f -
apiVersion: v1
kind: Pod
metadata:
  name: ${BENCH_ACC_POD}
  labels:
    app.kubernetes.io/name: qwen3.5-397b-a17b
    app.kubernetes.io/component: accuracy
    app.kubernetes.io/managed-by: dynamo-recipe
spec:
  restartPolicy: Never
  nodeSelector: ${HW_NODE_SELECTOR}
  tolerations: ${HW_TOLERATIONS}
  containers:
    - name: accuracy
      image: python:3.11
      command:
        - /bin/bash
        - -lc
        - |
          set -euo pipefail
          apt update && apt install -y --no-install-recommends curl jq
          pip install --no-cache-dir 'lm-eval[api]'

          echo "Waiting for model '${MODEL_NAME}' at http://${FRONTEND}:8000/v1/models ..."
          until curl -s "http://${FRONTEND}:8000/v1/models" \
              | jq -e --arg m "${MODEL_NAME}" '.data[]? | select(.id == $m)' >/dev/null 2>&1; do
            echo "[$(date '+%H:%M:%S')] not ready, sleeping 10s"
            sleep 10
          done
          echo "Model '${MODEL_NAME}' is ready."

          OUT="/perf-cache/accuracy/${RUN_LABEL}"
          mkdir -p "${OUT}"
          echo "GSM8K (limit=${LIMIT}) against ${FRONTEND} -> ${OUT}"

          lm_eval \
            --model local-chat-completions \
            --model_args "model=${MODEL_NAME},base_url=http://${FRONTEND}:8000/v1/chat/completions,num_concurrent=${ACC_CONCURRENCY},timeout=600,max_retries=3,tokenized_requests=False" \
            --tasks gsm8k \
            --limit "${LIMIT}" \
            --apply_chat_template \
            --output_path "${OUT}"

          echo "===== GSM8K result (${RUN_LABEL}) ====="
          find "${OUT}" -name 'results*.json' -exec cat {} \; | jq '.results.gsm8k'
          echo "Accuracy run complete. Results in ${OUT}"
          sleep 3600
      env:
        - name: MODEL_NAME
          value: Qwen/Qwen3.5-397B-A17B-FP8
        - name: FRONTEND
          value: ${BENCH_FRONTEND}
        - name: RUN_LABEL
          value: ${BENCH_RUN_LABEL}
        - name: LIMIT
          value: "200"
        - name: ACC_CONCURRENCY
          value: "16"
      resources:
        requests:
          cpu: "4"
          memory: 8Gi
        limits:
          cpu: "8"
          memory: 16Gi
      volumeMounts:
        - name: shared-model-cache
          mountPath: /perf-cache
          subPath: qwen35-bench/perf-cache
  volumes:
    - name: shared-model-cache
      persistentVolumeClaim:
        claimName: shared-model-cache
