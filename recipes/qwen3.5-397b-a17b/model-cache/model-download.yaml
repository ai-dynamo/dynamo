#
# Download Qwen/Qwen3.5-397B-A17B-FP8 (~400 GB FP8) into shared-model-cache
# at the standard HF_HOME path, so weights land at
# /home/dynamo/.cache/huggingface/hub/models--Qwen--Qwen3.5-397B-A17B-FP8/
# and the worker pods (HF_HUB_OFFLINE=1) find them there.
#
# FSx needs >=500 GB free for this checkpoint. If the repo is gated,
# uncomment the envFrom: hf-token-secret block (see README → HF token).
apiVersion: batch/v1
kind: Job
metadata:
  name: qwen35-model-download
  labels:
    app.kubernetes.io/name: qwen3.5-397b-a17b
    app.kubernetes.io/component: model-download
    app.kubernetes.io/managed-by: dynamo-recipe
spec:
  backoffLimit: 3
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qwen3.5-397b-a17b
        app.kubernetes.io/component: model-download
    spec:
      restartPolicy: Never
      containers:
        - name: model-download
          image: python:3.10-slim
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command: ["sh", "-c"]
          # If the checkpoint is gated, provide HF_TOKEN via a secret:
          # envFrom:
          #   - secretRef:
          #       name: hf-token-secret
          env:
            - name: MODEL_NAME
              value: "Qwen/Qwen3.5-397B-A17B-FP8"
            - name: HF_HOME
              value: /home/dynamo/.cache/huggingface
            # Uses up to 64 GB RAM for XET buffers; set "0" on low-memory nodes (8 GB cap): https://huggingface.co/docs/hub/en/xet/using-xet-storage#download-buffers
            - name: HF_XET_HIGH_PERFORMANCE
              value: "1"
            - name: MODEL_REVISION
              value: "main"
          args:
            - |
              set -eux
              pip install --no-cache-dir huggingface_hub==1.11.0
              hf download "$MODEL_NAME" --revision "$MODEL_REVISION"
          resources:
            requests:
              cpu: "2"
              memory: "64Gi"
            limits:
              cpu: "8"
              memory: "64Gi"
          volumeMounts:
            - name: shared-model-cache
              mountPath: /home/dynamo/.cache/huggingface
      volumes:
        - name: shared-model-cache
          persistentVolumeClaim:
            claimName: shared-model-cache
