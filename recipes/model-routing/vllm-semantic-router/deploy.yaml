apiVersion: v1
kind: ConfigMap
metadata:
  name: model-routing-envoy
  labels:
    app.kubernetes.io/name: vllm-semantic-router
    app.kubernetes.io/managed-by: dynamo-recipe
data:
  envoy.yaml: |
    admin:
      access_log_path: /dev/stdout
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901
    static_resources:
      listeners:
        - name: ingress
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8080
          per_connection_buffer_limit_bytes: 52428800
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: model_routing
                    stream_idle_timeout: 600s
                    route_config:
                      name: upstream
                      virtual_hosts:
                        - name: gateway
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: /
                              route:
                                cluster: agentgateway
                                timeout: 600s
                    http_filters:
                      - name: envoy.filters.http.lua
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                          inline_code: |
                            function envoy_on_request(handle)
                              handle:headers():remove("x-selected-model")
                              handle:headers():remove("x-dynamo-client-protocol")
                              handle:headers():remove("x-original-path")
                              handle:headers():remove("x-forwarded-path")
                            end
                      - name: envoy.filters.http.ext_proc
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                          grpc_service:
                            envoy_grpc:
                              cluster_name: semantic-router
                            timeout: 60s
                          failure_mode_allow: false
                          allow_mode_override: true
                          message_timeout: 60s
                          processing_mode:
                            request_header_mode: SEND
                            response_header_mode: SEND
                            request_body_mode: BUFFERED
                            response_body_mode: NONE
                            request_trailer_mode: SKIP
                            response_trailer_mode: SKIP
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
        - name: agentgateway
          connect_timeout: 5s
          type: STRICT_DNS
          dns_lookup_family: V4_ONLY
          load_assignment:
            cluster_name: agentgateway
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: model-routing-gateway
                          port_value: 80
        - name: semantic-router
          connect_timeout: 5s
          type: STRICT_DNS
          dns_lookup_family: V4_ONLY
          http2_protocol_options: {}
          load_assignment:
            cluster_name: semantic-router
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: semantic-router
                          port_value: 50051
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-routing-envoy
  labels:
    app.kubernetes.io/name: vllm-semantic-router
    app.kubernetes.io/managed-by: dynamo-recipe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-routing-envoy
  template:
    metadata:
      labels:
        app: model-routing-envoy
        app.kubernetes.io/name: vllm-semantic-router
        app.kubernetes.io/managed-by: dynamo-recipe
    spec:
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.36.4@sha256:ae31562b8cede20913a2d3d6a4f44c8479a50551e033cb8ef7bb8e38cec4b573
          args: [-c, /etc/envoy/envoy.yaml, --log-level, info]
          ports:
            - name: http
              containerPort: 8080
            - name: admin
              containerPort: 9901
          readinessProbe:
            httpGet:
              path: /ready
              port: admin
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /ready
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /etc/envoy
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: model-routing-envoy
---
apiVersion: v1
kind: Service
metadata:
  name: model-routing-envoy
  labels:
    app.kubernetes.io/name: vllm-semantic-router
    app.kubernetes.io/managed-by: dynamo-recipe
spec:
  type: ClusterIP
  selector:
    app: model-routing-envoy
  ports:
    - name: http
      port: 80
      targetPort: http
