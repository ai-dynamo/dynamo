apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayParameters
metadata:
  name: model-routing-gateway
  labels:
    app.kubernetes.io/name: vllm-semantic-router
    app.kubernetes.io/managed-by: dynamo-recipe
spec:
  service:
    spec:
      type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: model-routing-gateway
  labels:
    app.kubernetes.io/name: vllm-semantic-router
    app.kubernetes.io/managed-by: dynamo-recipe
spec:
  gatewayClassName: agentgateway
  infrastructure:
    parametersRef:
      group: agentgateway.dev
      kind: AgentgatewayParameters
      name: model-routing-gateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: model-routing-small
  labels:
    app.kubernetes.io/name: vllm-semantic-router
    app.kubernetes.io/managed-by: dynamo-recipe
spec:
  parentRefs:
    - name: model-routing-gateway
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
          headers:
            - name: x-selected-model
              type: Exact
              value: Qwen/Qwen3.5-122B-A10B-FP8
      backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: model-routing-small-pool
          port: 8000
      timeouts:
        request: 600s
---
