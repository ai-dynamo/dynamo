apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: model-routing-small
  labels:
    app.kubernetes.io/name: vllm-semantic-router
    app.kubernetes.io/managed-by: dynamo-recipe
spec:
  backendFramework: vllm
  components:
    - name: Epp
      type: epp
      replicas: 1
      minAvailable: 1
      podTemplate:
        spec:
          imagePullSecrets:
            - name: ngc-secret
          containers:
            - name: main
              image: ishandhanani/dynamo-epp:dyn-3380-protocol-passthrough@sha256:c3c15aafaaf8c036aaf20de8dcac857ced901c571e438a0b0281e0fd65b1acc4
              env:
                - name: DYN_KV_CACHE_BLOCK_SIZE
                  value: "16"
                - name: DYN_MODEL_NAME
                  value: Qwen/Qwen3.5-122B-A10B-FP8
                - name: DYN_DECODE_FALLBACK
                  value: "true"
      eppConfig:
        configMapRef:
          name: model-routing-small-epp
          key: epp-config-dynamo.yaml
    - name: VllmDecodeWorker
      type: decode
      replicas: 1
      minAvailable: 1
      sharedMemorySize: 64Gi
      frontendSidecar: sidecar-frontend
      podTemplate:
        spec:
          imagePullSecrets:
            - name: ngc-secret
          nodeSelector:
            nvidia.com/gpu.product: NVIDIA-B200
          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule
          volumes:
            - name: model-cache
              persistentVolumeClaim:
                claimName: shared-model-cache
          containers:
            - name: main
              image: nvcr.io/nvstaging/ai-dynamo/vllm-runtime:1.3.0-rc1
              workingDir: /workspace/examples/backends/vllm
              command: [python3, -m, dynamo.vllm]
              args:
                - --model
                - Qwen/Qwen3.5-122B-A10B-FP8
                - --served-model-name
                - Qwen/Qwen3.5-122B-A10B-FP8
                - --tensor-parallel-size
                - "8"
                - --gpu-memory-utilization
                - "0.9"
                - --max-model-len
                - "262144"
                - --max-num-seqs
                - "32"
                - --language-model-only
                - --enable-prefix-caching
                - --kv-events-config
                - '{"enable_kv_cache_events":true}'
                - --block-size
                - "16"
                - --dyn-tool-call-parser
                - qwen3_coder
                - --dyn-reasoning-parser
                - qwen3
              env:
                - name: HF_HOME
                  value: /opt/models
                - name: HF_HUB_OFFLINE
                  value: "1"
                - name: TRANSFORMERS_OFFLINE
                  value: "1"
                - name: DYN_STORE_KV
                  value: mem
              envFrom:
                - secretRef:
                    name: hf-token-secret
              resources:
                requests:
                  nvidia.com/gpu: "8"
                  memory: 512Gi
                limits:
                  nvidia.com/gpu: "8"
              # FlashInfer 0.6.12 creates MoE cubin symlinks in its package directory.
              securityContext:
                runAsUser: 0
              startupProbe:
                httpGet:
                  path: /live
                  port: 9090
                periodSeconds: 30
                timeoutSeconds: 10
                failureThreshold: 80
              volumeMounts:
                - name: model-cache
                  mountPath: /opt/models
            - name: sidecar-frontend
              image: nvcr.io/nvstaging/ai-dynamo/vllm-runtime:1.3.0-rc1
              args:
                - -m
                - dynamo.frontend
                - --router-mode
                - direct
                - --enable-anthropic-api
                - --strip-anthropic-preamble
                - --enable-streaming-tool-dispatch
---
