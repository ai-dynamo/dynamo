apiVersion: v1
kind: ConfigMap
metadata:
  name: glm52-agg-h200-agentic-sglang-config
  labels:
    app.kubernetes.io/name: glm52-agg-h200-agentic
    app.kubernetes.io/part-of: dynamo
data:
  agg.yaml: |-
    model-path: zai-org/GLM-5.2-FP8
    served-model-name: zai-org/GLM-5.2
    trust-remote-code: true
    quantization: fp8
    kv-cache-dtype: fp8_e4m3
    context-length: 250000
    mem-fraction-static: 0.90
    speculative-algorithm: EAGLE
    speculative-num-steps: 3
    speculative-eagle-topk: 1
    speculative-num-draft-tokens: 4
    tensor-parallel-size: 8
    ep-size: 8
    attention-backend: dsa
    dsa-prefill-backend: flashmla_kv
    enable-prefill-cp: true
    cp-strategy: interleave
    moe-a2a-backend: none
    fp8-gemm-backend: flashinfer_deepgemm
    watchdog-timeout: 3600
    enable-metrics: true
    kv-events-config:
      publisher: zmq
      topic: kv-events
      endpoint: tcp://*:5557
    model-loader-extra-config:
      enable_multithread_load: true
      num_threads: 32
---
apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: glm52-agg-h200-agentic
spec:
  backendFramework: sglang
  components:
    - name: Frontend
      type: frontend
      podTemplate:
        spec:
          containers:
            - name: main
              command:
                - python3
              args:
                - -m
                - dynamo.frontend
                - --trust-remote-code
              env:
                - name: POD_UID
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.uid
                - name: DYN_ROUTER_MODE
                  value: kv
              image: nvcr.io/nvstaging/nim/alexandrem:sglang-glm5.2-rc10
              imagePullPolicy: Always
              resources: {}
      replicas: 1

    - name: agg
      type: worker
      sharedMemorySize: 64Gi
      podTemplate:
        spec:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: nvidia.com/gpu.product
                        operator: In
                        values:
                          - NVIDIA-H200
          containers:
            - name: main
              args:
                - --config
                - /etc/sglang/agg.yaml
                - --dyn-tool-call-parser
                - glm47
                - --dyn-reasoning-parser
                - glm45
              command:
                - python3
                - -m
                - dynamo.sglang
              env:
                - name: POD_UID
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.uid
                - name: HF_HOME
                  value: /model-cache
                - name: PYTHONUNBUFFERED
                  value: "1"
                - name: DYN_FORWARDPASS_METRIC_PORT
                  value: ""
                # Synthetic MTP acceptance length for performance benchmarking.
                # - name: SGLANG_SIMULATE_ACC_LEN
                #   value: "2.69"
                # - name: SGLANG_SIMULATE_ACC_METHOD
                #   value: match-expected
                # - name: SGLANG_SIMULATE_ACC_TOKEN_ID
                #   value: "32"
              envFrom:
                - secretRef:
                    name: hf-token-secret
              image: nvcr.io/nvstaging/nim/alexandrem:sglang-glm5.2-rc10
              imagePullPolicy: Always
              resources:
                requests:
                  nvidia.com/gpu: "8"
                  memory: 1Ti
                limits:
                  nvidia.com/gpu: "8"
                  memory: 1Ti
              securityContext:
                runAsUser: 0
                capabilities:
                  add:
                    - IPC_LOCK
                    - SYS_PTRACE
                    - SYS_RESOURCE
              startupProbe:
                failureThreshold: 120
                httpGet:
                  path: /live
                  port: 9090
                periodSeconds: 60
                timeoutSeconds: 20
              volumeMounts:
                - mountPath: /etc/sglang
                  name: sglang-config
                  readOnly: true
                - mountPath: /model-cache
                  name: model-cache
              workingDir: /workspace/
          volumes:
            - name: sglang-config
              configMap:
                name: glm52-agg-h200-agentic-sglang-config
            - name: model-cache
              persistentVolumeClaim:
                claimName: model-cache
          tolerations:
            - key: nvidia.com/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule
      replicas: 1
