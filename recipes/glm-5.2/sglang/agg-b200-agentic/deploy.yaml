#
# GLM-5.2 NVFP4 aggregated serving on one B200x4 node via SGLang + Dynamo.
#
# For synthetic MTP acceptance-length benchmarking, uncomment the
# SGLANG_SIMULATE_ACC_* environment variables below.
apiVersion: v1
kind: ConfigMap
metadata:
  name: glm52-agg-b200-agentic-sglang-config
  labels:
    app.kubernetes.io/name: glm52-agg-b200-agentic
    app.kubernetes.io/part-of: dynamo
data:
  agg.yaml: |-
    model-path: nvidia/GLM-5.2-NVFP4
    served-model-name: zai-org/GLM-5.2
    trust-remote-code: true
    tensor-parallel-size: 4
    data-parallel-size: 4
    enable-dp-attention: true
    moe-runner-backend: flashinfer_trtllm
    moe-a2a-backend: none
    fp4-gemm-backend: flashinfer_trtllm
    enable-symm-mem: true
    speculative-attention-mode: decode
    quantization: modelopt_fp4
    kv-cache-dtype: fp8_e4m3
    context-length: 500000
    speculative-algorithm: EAGLE
    speculative-num-steps: 3
    speculative-eagle-topk: 1
    speculative-num-draft-tokens: 4
    max-running-requests: 128
    cuda-graph-max-bs: 128
    mem-fraction-static: 0.93
    enable-dp-lm-head: true
    enable-metrics: true
    speculative-moe-runner-backend: flashinfer_cutlass
    speculative-moe-a2a-backend: none
    enable-flashinfer-allreduce-fusion: true
    hicache-size: 200
    enable-hierarchical-cache: true
    model-loader-extra-config:
      enable_multithread_load: true
      num_threads: 32
---
apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: glm52-agg-b200-agentic
spec:
  backendFramework: sglang
  components:
    - name: Frontend
      type: frontend
      podTemplate:
        spec:
          containers:
            - name: main
              command:
                - python3
              args:
                - -m
                - dynamo.frontend
                - --trust-remote-code
              env:
                - name: POD_UID
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.uid
                - name: DYN_ROUTER_MODE
                  value: kv
              image: nvcr.io/nvstaging/nim/alexandrem:sglang-glm5.2
              imagePullPolicy: Always
              resources: {}
      replicas: 1

    - name: agg
      type: worker
      sharedMemorySize: 64Gi
      podTemplate:
        spec:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: nvidia.com/gpu.product
                        operator: In
                        values:
                          - NVIDIA-B200
          containers:
            - name: main
              args:
                - --config
                - /etc/sglang/agg.yaml
                - --dyn-tool-call-parser
                - glm47
                - --dyn-reasoning-parser
                - glm45
              command:
                - python3
                - -m
                - dynamo.sglang
              env:
                - name: POD_UID
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.uid
                - name: HF_HOME
                  value: /model-cache
                # Synthetic MTP acceptance length for performance benchmarking.
                # - name: SGLANG_SIMULATE_ACC_LEN
                #   value: "2.69"
                # - name: SGLANG_SIMULATE_ACC_METHOD
                #   value: match-expected
                # - name: SGLANG_SIMULATE_ACC_TOKEN_ID
                #   value: "32"
              envFrom:
                - secretRef:
                    name: hf-token-secret
              image: nvcr.io/nvstaging/nim/alexandrem:sglang-glm5.2
              imagePullPolicy: Always
              resources:
                requests:
                  nvidia.com/gpu: "4"
                  memory: 1Ti
                limits:
                  nvidia.com/gpu: "4"
                  memory: 1Ti
              securityContext:
                runAsUser: 0
                capabilities:
                  add:
                    - IPC_LOCK
                    - SYS_PTRACE
                    - SYS_RESOURCE
              startupProbe:
                failureThreshold: 120
                httpGet:
                  path: /live
                  port: 9090
                periodSeconds: 60
                timeoutSeconds: 20
              volumeMounts:
                - mountPath: /etc/sglang
                  name: sglang-config
                  readOnly: true
                - mountPath: /model-cache
                  name: model-cache
              workingDir: /workspace/
          volumes:
            - name: sglang-config
              configMap:
                name: glm52-agg-b200-agentic-sglang-config
            - name: model-cache
              persistentVolumeClaim:
                claimName: model-cache
          tolerations:
            - key: nvidia.com/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule
      replicas: 1
