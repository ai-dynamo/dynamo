#
# GLM-5.2 NVFP4 aggregated serving on one B200x4 node via SGLang + Dynamo.
#
# The worker intentionally simulates MTP acceptance length 2.69 for performance
# benchmarking. Remove the SGLANG_SIMULATE_ACC_* variables for quality
# evaluation.
apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: glm52-agg-b200-agentic
spec:
  backendFramework: sglang
  components:
    - name: Frontend
      type: frontend
      podTemplate:
        spec:
          containers:
            - name: main
              command:
                - python3
              args:
                - -m
                - dynamo.frontend
                - --trust-remote-code
              env:
                - name: POD_UID
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.uid
                - name: DYN_ROUTER_MODE
                  value: kv
              image: nvcr.io/nvidia/ai-dynamo/sglang-runtime-nightly:20260701-5245c0f
              resources: {}
      replicas: 1

    - name: agg
      type: worker
      sharedMemorySize: 64Gi
      podTemplate:
        spec:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: nvidia.com/gpu.product
                        operator: In
                        values:
                          - NVIDIA-B200
          containers:
            - name: main
              args:
                - --model-path=nvidia/GLM-5.2-NVFP4
                - --served-model-name=nvidia/GLM-5.2-NVFP4
                - --trust-remote-code
                - --tp-size=4
                - --dp-size=4
                - --enable-dp-attention
                - --moe-runner-backend=flashinfer_trtllm
                - --moe-a2a-backend=none
                - --fp4-gemm-backend=flashinfer_trtllm
                - --enable-symm-mem
                - --speculative-attention-mode=decode
                - --quantization=modelopt_fp4
                - --kv-cache-dtype=fp8_e4m3
                - --context-length=500000
                - --speculative-algorithm=EAGLE
                - --speculative-num-steps=3
                - --speculative-eagle-topk=1
                - --speculative-num-draft-tokens=4
                - --max-running-requests=128
                - --cuda-graph-max-bs=128
                - --mem-fraction-static=0.93
                - --enable-dp-lm-head
                - --enable-metrics
                - --speculative-moe-runner-backend=flashinfer_cutlass
                - --speculative-moe-a2a-backend=none
                - --enable-flashinfer-allreduce-fusion
                - --hicache-size=200
                - --enable-hierarchical-cache
                - '--model-loader-extra-config={"enable_multithread_load": true, "num_threads": 32}'
                - --dyn-tool-call-parser
                - glm47
                - --dyn-reasoning-parser
                - glm45
              command:
                - python3
                - -m
                - dynamo.sglang
              env:
                - name: POD_UID
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.uid
                - name: HF_HOME
                  value: /model-cache
                - name: HF_HUB_CACHE
                  value: /model-cache/hub
                - name: CUDA_CACHE_PATH
                  value: /tmp/compilation-cache/cuda
                - name: CUDA_CACHE_MAXSIZE
                  value: "4294967296"
                - name: FLASHINFER_CACHE_DIR
                  value: /tmp/compilation-cache/flashinfer
                - name: SGLANG_CACHE_DIR
                  value: /tmp/compilation-cache/sglang
                - name: SGLANG_DG_CACHE_DIR
                  value: /tmp/compilation-cache/deepgemm
                - name: TRITON_CACHE_DIR
                  value: /tmp/compilation-cache/triton
                - name: TORCHINDUCTOR_CACHE_DIR
                  value: /tmp/compilation-cache/torchinductor
                - name: TORCH_EXTENSIONS_DIR
                  value: /tmp/compilation-cache/torch-extensions
                - name: XDG_CACHE_HOME
                  value: /tmp/compilation-cache/xdg
                - name: SGLANG_SIMULATE_ACC_LEN
                  value: "2.69"
                - name: SGLANG_SIMULATE_ACC_METHOD
                  value: match-expected
                - name: SGLANG_SIMULATE_ACC_TOKEN_ID
                  value: "32"
              envFrom:
                - secretRef:
                    name: hf-token-secret
              image: nvcr.io/nvidia/ai-dynamo/sglang-runtime-nightly:20260701-5245c0f
              resources:
                requests:
                  nvidia.com/gpu: "4"
                  memory: 900Gi
                limits:
                  nvidia.com/gpu: "4"
                  memory: 1Ti
              securityContext:
                runAsUser: 0
                capabilities:
                  add:
                    - IPC_LOCK
                    - SYS_RESOURCE
              startupProbe:
                failureThreshold: 120
                httpGet:
                  path: /live
                  port: 9090
                periodSeconds: 60
                timeoutSeconds: 20
              volumeMounts:
                - mountPath: /model-cache
                  name: model-cache
              workingDir: /workspace/
          volumes:
            - name: model-cache
              persistentVolumeClaim:
                claimName: model-cache
          tolerations:
            - key: nvidia.com/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule
      replicas: 1
