#
# GKE RoCE addon (Kustomize Component) for a Dynamo DynamoGraphDeployment.
#
# Adds the RoCEv2 KV-transfer layer (UCX over RoCE) to the disaggregated workers on
# a GKE A4X (GB200 NVL72) RDMA pool:
#   - networking.gke.io.networks/rdma-{0..3}[.IP] device requests
#   - networking.gke.io/interfaces annotation (the webhook reads it to attach the NICs)
#   - NCCL_SOCKET_IFNAME + NCCL_CROSS_NIC
#   - privileged securityContext + IPC_LOCK (required to register CUDA VRAM with the NIC)
#
# Usage — wrap your DGD and pull this component in:
#   # my-deploy/kustomization.yaml
#   resources:
#     - my-dgd.yaml
#   components:
#     - <path-or-git-url>/recipes/addons/kustomize/gke-roce
#
# ─────────────────────────────────────────────────────────────────────────────
# SERVICE NAMES: targets `VllmPrefillWorker` / `VllmDecodeWorker` (the vLLM disagg
# recipes). For other worker names (TRT-LLM uses `prefill`/`decode`), copy this dir
# and retarget:
#   sed -i 's/VllmPrefillWorker/prefill/g; s/VllmDecodeWorker/decode/g' kustomization.yaml
# ─────────────────────────────────────────────────────────────────────────────
#
# No UCX_NET_DEVICES pin: on A4X, UCX auto-probe binds the 4 RoCE NICs (rc_mlx5 over
# mlx5_0..3) on its own. The rdma-{0..3} resources + the interfaces annotation are the
# A4X RDMA-pool contract (4 NICs); they are cluster-specific — match them to your pool's
# network attachment definitions.
#
# NOT included (set these in your base DGD):
#   - an RDMA-capable image,
#   - the engine's NIXL UCX backend (vLLM default),
#   - the GKE GIB/NCCL plugin + driver host mounts (/usr/local/gib, /usr/local/nvidia)
#     the workers need for RoCE NCCL.

apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  # --- RDMA network resources + interfaces annotation + privileged sc (strategic merge) ---
  - target:
      group: nvidia.com
      kind: DynamoGraphDeployment
    patch: |-
      apiVersion: nvidia.com/v1alpha1
      kind: DynamoGraphDeployment
      metadata:
        name: gke-roce-addon  # ignored — selection is via `target`
      spec:
        services:
          VllmPrefillWorker:
            extraPodMetadata:
              annotations:
                networking.gke.io/default-interface: "eth0"
                networking.gke.io/interfaces: |
                  [{"interfaceName":"eth0","network":"default"},
                   {"interfaceName":"eth2","network":"rdma-0"},
                   {"interfaceName":"eth3","network":"rdma-1"},
                   {"interfaceName":"eth4","network":"rdma-2"},
                   {"interfaceName":"eth5","network":"rdma-3"}]
            resources:
              limits:
                custom:
                  networking.gke.io.networks/rdma-0: "1"
                  networking.gke.io.networks/rdma-1: "1"
                  networking.gke.io.networks/rdma-2: "1"
                  networking.gke.io.networks/rdma-3: "1"
                  networking.gke.io.networks/rdma-0.IP: "1"
                  networking.gke.io.networks/rdma-1.IP: "1"
                  networking.gke.io.networks/rdma-2.IP: "1"
                  networking.gke.io.networks/rdma-3.IP: "1"
              requests:
                custom:
                  networking.gke.io.networks/rdma-0: "1"
                  networking.gke.io.networks/rdma-1: "1"
                  networking.gke.io.networks/rdma-2: "1"
                  networking.gke.io.networks/rdma-3: "1"
                  networking.gke.io.networks/rdma-0.IP: "1"
                  networking.gke.io.networks/rdma-1.IP: "1"
                  networking.gke.io.networks/rdma-2.IP: "1"
                  networking.gke.io.networks/rdma-3.IP: "1"
            extraPodSpec:
              mainContainer:
                securityContext:
                  privileged: true
                  capabilities:
                    add: [IPC_LOCK, SYS_PTRACE]
          VllmDecodeWorker:
            extraPodMetadata:
              annotations:
                networking.gke.io/default-interface: "eth0"
                networking.gke.io/interfaces: |
                  [{"interfaceName":"eth0","network":"default"},
                   {"interfaceName":"eth2","network":"rdma-0"},
                   {"interfaceName":"eth3","network":"rdma-1"},
                   {"interfaceName":"eth4","network":"rdma-2"},
                   {"interfaceName":"eth5","network":"rdma-3"}]
            resources:
              limits:
                custom:
                  networking.gke.io.networks/rdma-0: "1"
                  networking.gke.io.networks/rdma-1: "1"
                  networking.gke.io.networks/rdma-2: "1"
                  networking.gke.io.networks/rdma-3: "1"
                  networking.gke.io.networks/rdma-0.IP: "1"
                  networking.gke.io.networks/rdma-1.IP: "1"
                  networking.gke.io.networks/rdma-2.IP: "1"
                  networking.gke.io.networks/rdma-3.IP: "1"
              requests:
                custom:
                  networking.gke.io.networks/rdma-0: "1"
                  networking.gke.io.networks/rdma-1: "1"
                  networking.gke.io.networks/rdma-2: "1"
                  networking.gke.io.networks/rdma-3: "1"
                  networking.gke.io.networks/rdma-0.IP: "1"
                  networking.gke.io.networks/rdma-1.IP: "1"
                  networking.gke.io.networks/rdma-2.IP: "1"
                  networking.gke.io.networks/rdma-3.IP: "1"
            extraPodSpec:
              mainContainer:
                securityContext:
                  privileged: true
                  capabilities:
                    add: [IPC_LOCK, SYS_PTRACE]

  # --- NCCL RoCE env (JSON6902 append — preserves the worker's existing env) ---
  - target:
      group: nvidia.com
      kind: DynamoGraphDeployment
    patch: |-
      - op: add
        path: /spec/services/VllmPrefillWorker/extraPodSpec/mainContainer/env/-
        value: { name: NCCL_SOCKET_IFNAME, value: "eth0" }
      - op: add
        path: /spec/services/VllmPrefillWorker/extraPodSpec/mainContainer/env/-
        value: { name: NCCL_CROSS_NIC, value: "0" }
      - op: add
        path: /spec/services/VllmDecodeWorker/extraPodSpec/mainContainer/env/-
        value: { name: NCCL_SOCKET_IFNAME, value: "eth0" }
      - op: add
        path: /spec/services/VllmDecodeWorker/extraPodSpec/mainContainer/env/-
        value: { name: NCCL_CROSS_NIC, value: "0" }
