#
# Nscale InfiniBand addon (Kustomize Component) for a Dynamo DynamoGraphDeployment.
#
# Adds the NDR-IB KV-transfer layer (UCX over InfiniBand) to the disaggregated workers:
#   - rdma/ib device request (RDMA shared-device-plugin slot → /dev/infiniband/*)
#   - UCX_NET_DEVICES pinned to the compute fabric (LOAD-BEARING + CLUSTER-SPECIFIC)
#   - privileged securityContext + IPC_LOCK (required to register CUDA VRAM with the HCA)
#
# Usage — wrap your DGD and pull this component in:
#   # my-deploy/kustomization.yaml
#   resources:
#     - my-dgd.yaml
#   components:
#     - <path-or-git-url>/recipes/addons/kustomize/nscale-ib
#
# ─────────────────────────────────────────────────────────────────────────────
# SERVICE NAMES: targets `VllmPrefillWorker` / `VllmDecodeWorker` (the vLLM disagg
# recipes). For other worker names (TRT-LLM uses `prefill`/`decode`), copy this dir
# and retarget:
#   sed -i 's/VllmPrefillWorker/prefill/g; s/VllmDecodeWorker/decode/g' kustomization.yaml
# ─────────────────────────────────────────────────────────────────────────────
#
# UCX_NET_DEVICES is BOTH load-bearing AND cluster-specific on Nscale. The cluster
# has two IB fabrics: a 400G/MTU-4096 compute fabric (mlx5_0..5,10,11) and a
# 100G/MTU-512 side fabric (mlx5_6..9). UCX auto-probe mixes the two and KV transfer
# fails at the first send (NIXL_ERR_REMOTE_DISCONNECT) — the workers don't run without
# the pin. The list below is for this cluster's topology; derive yours from `ibv_devinfo`
# (keep only the compute-fabric HCAs).
#
# NOT included (set these in your base DGD):
#   - an RDMA-capable image,
#   - the engine's NIXL UCX backend (vLLM default; or `"backends":["UCX"]`),
#   - the /dev/infiniband + /dev/shm volume mounts the workers need.

apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  # --- rdma/ib device resource + privileged securityContext (strategic merge) ---
  - target:
      group: nvidia.com
      kind: DynamoGraphDeployment
    patch: |-
      apiVersion: nvidia.com/v1alpha1
      kind: DynamoGraphDeployment
      metadata:
        name: nscale-ib-addon  # ignored — selection is via `target`
      spec:
        services:
          VllmPrefillWorker:
            resources:
              limits:
                custom:
                  rdma/ib: "1"
              requests:
                custom:
                  rdma/ib: "1"
            extraPodSpec:
              mainContainer:
                securityContext:
                  privileged: true
                  capabilities:
                    add: [IPC_LOCK, SYS_PTRACE]
          VllmDecodeWorker:
            resources:
              limits:
                custom:
                  rdma/ib: "1"
              requests:
                custom:
                  rdma/ib: "1"
            extraPodSpec:
              mainContainer:
                securityContext:
                  privileged: true
                  capabilities:
                    add: [IPC_LOCK, SYS_PTRACE]

  # --- UCX compute-fabric pin (JSON6902 append — preserves the worker's existing env) ---
  - target:
      group: nvidia.com
      kind: DynamoGraphDeployment
    patch: |-
      - op: add
        path: /spec/services/VllmPrefillWorker/extraPodSpec/mainContainer/env/-
        value: { name: UCX_NET_DEVICES, value: "mlx5_0:1,mlx5_1:1,mlx5_2:1,mlx5_3:1,mlx5_4:1,mlx5_5:1,mlx5_10:1,mlx5_11:1" }
      - op: add
        path: /spec/services/VllmDecodeWorker/extraPodSpec/mainContainer/env/-
        value: { name: UCX_NET_DEVICES, value: "mlx5_0:1,mlx5_1:1,mlx5_2:1,mlx5_3:1,mlx5_4:1,mlx5_5:1,mlx5_10:1,mlx5_11:1" }
