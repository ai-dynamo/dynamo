#
# Nebius InfiniBand addon (Kustomize Component) for a Dynamo DynamoGraphDeployment.
#
# Adds the NDR-IB KV-transfer layer (UCX over InfiniBand) to the disaggregated workers:
#   - rdma/ib device request (RDMA shared-device-plugin slot → /dev/infiniband/*)
#   - NCCL_SOCKET_IFNAME (control-plane iface)
#   - privileged securityContext + IPC_LOCK (required to register CUDA VRAM with the HCA)
#
# Usage — wrap your DGD and pull this component in:
#   # my-deploy/kustomization.yaml
#   resources:
#     - my-dgd.yaml
#   components:
#     - <path-or-git-url>/recipes/addons/kustomize/nebius-ib
#
# ─────────────────────────────────────────────────────────────────────────────
# SERVICE NAMES: targets `VllmPrefillWorker` / `VllmDecodeWorker` (the vLLM disagg
# recipes). For other worker names (TRT-LLM uses `prefill`/`decode`), copy this dir
# and retarget:
#   sed -i 's/VllmPrefillWorker/prefill/g; s/VllmDecodeWorker/decode/g' kustomization.yaml
# ─────────────────────────────────────────────────────────────────────────────
#
# No UCX_NET_DEVICES pin: all 8 ConnectX-7 HCAs (mlx5_0..7) are NDR-IB compute fabric
# and there is no side fabric to exclude, so UCX auto-probe binds the right NICs on its
# own. (One rdma/ib slot grants the pod /dev/infiniband/* for all 8 HCAs; it is a
# device-plugin slot count, NOT an HCA count — leave it at "1".)
#
# NOT included (set these in your base DGD):
#   - an RDMA-capable image,
#   - the engine's NIXL UCX backend (vLLM default; or `"backends":["UCX"]`),
#   - the /dev/infiniband + /dev/shm volume mounts the workers need.

apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  # --- rdma/ib device resource + privileged securityContext (strategic merge) ---
  - target:
      group: nvidia.com
      kind: DynamoGraphDeployment
    patch: |-
      apiVersion: nvidia.com/v1alpha1
      kind: DynamoGraphDeployment
      metadata:
        name: nebius-ib-addon  # ignored — selection is via `target`
      spec:
        services:
          VllmPrefillWorker:
            resources:
              limits:
                custom:
                  rdma/ib: "1"
              requests:
                custom:
                  rdma/ib: "1"
            extraPodSpec:
              mainContainer:
                securityContext:
                  privileged: true
                  capabilities:
                    add: [IPC_LOCK, SYS_PTRACE]
          VllmDecodeWorker:
            resources:
              limits:
                custom:
                  rdma/ib: "1"
              requests:
                custom:
                  rdma/ib: "1"
            extraPodSpec:
              mainContainer:
                securityContext:
                  privileged: true
                  capabilities:
                    add: [IPC_LOCK, SYS_PTRACE]

  # --- NCCL control-plane iface (JSON6902 append — preserves the worker's existing env) ---
  - target:
      group: nvidia.com
      kind: DynamoGraphDeployment
    patch: |-
      - op: add
        path: /spec/services/VllmPrefillWorker/extraPodSpec/mainContainer/env/-
        value: { name: NCCL_SOCKET_IFNAME, value: "eth0" }
      - op: add
        path: /spec/services/VllmDecodeWorker/extraPodSpec/mainContainer/env/-
        value: { name: NCCL_SOCKET_IFNAME, value: "eth0" }
