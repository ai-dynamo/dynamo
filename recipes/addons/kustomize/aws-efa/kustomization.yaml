#
# AWS EFA addon (Kustomize Component) for a Dynamo DynamoGraphDeployment.
#
# Adds the EFA / libfabric KV-transfer layer to the disaggregated workers:
#   - vpc.amazonaws.com/efa device request
#   - libfabric EFA-provider env (FI_*)
#   - NIXL libfabric-backend selection (DYN_KVBM_NIXL_BACKEND_*)
#   - privileged securityContext + IPC_LOCK (required for fi_mr_reg on CUDA VRAM)
#
# Usage — wrap your DGD and pull this component in:
#   # my-deploy/kustomization.yaml
#   resources:
#     - my-dgd.yaml
#   components:
#     - <path-or-git-url>/recipes/addons/kustomize/aws-efa
#
# ─────────────────────────────────────────────────────────────────────────────
# SERVICE NAMES: this targets `VllmPrefillWorker` and `VllmDecodeWorker` — the
# names used by the Dynamo vLLM disagg recipes (the majority). Kustomize cannot
# patch a CRD's nested per-service fields without naming the service, so if your
# DGD uses different worker names (e.g. TRT-LLM recipes use `prefill`/`decode`),
# copy this dir and retarget:
#   sed -i 's/VllmPrefillWorker/prefill/g; s/VllmDecodeWorker/decode/g' kustomization.yaml
# ─────────────────────────────────────────────────────────────────────────────
#
# NOT included (engine-specific — set these in your base DGD):
#   - an EFA-capable image (libfabric + the EFA provider baked in),
#   - the engine's NIXL backend (vLLM: `--kv-transfer-config … "backends":["LIBFABRIC"]`;
#     TRT-LLM: `cache_transceiver_config.backend`).
#
# EFA count: 16 = the NUMA-local EFA NICs for a 4-GPU (TP=4) worker on p5.48xlarge
# (32 EFA / 8 GPU = 4 per GPU). Adjust to match your worker's GPU count.

apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  # --- EFA device resource + privileged securityContext (strategic merge) ---
  - target:
      group: nvidia.com
      kind: DynamoGraphDeployment
    patch: |-
      apiVersion: nvidia.com/v1alpha1
      kind: DynamoGraphDeployment
      metadata:
        name: efa-addon  # ignored — selection is via `target`
      spec:
        services:
          VllmPrefillWorker:
            resources:
              limits:
                custom:
                  vpc.amazonaws.com/efa: "16"
              requests:
                custom:
                  vpc.amazonaws.com/efa: "16"
            extraPodSpec:
              mainContainer:
                securityContext:
                  privileged: true
                  capabilities:
                    add: [IPC_LOCK, SYS_PTRACE]
          VllmDecodeWorker:
            resources:
              limits:
                custom:
                  vpc.amazonaws.com/efa: "16"
              requests:
                custom:
                  vpc.amazonaws.com/efa: "16"
            extraPodSpec:
              mainContainer:
                securityContext:
                  privileged: true
                  capabilities:
                    add: [IPC_LOCK, SYS_PTRACE]

  # --- EFA / libfabric env (JSON6902 append — preserves the worker's existing env) ---
  - target:
      group: nvidia.com
      kind: DynamoGraphDeployment
    patch: |-
      - op: add
        path: /spec/services/VllmPrefillWorker/extraPodSpec/mainContainer/env/-
        value: { name: DYN_KVBM_NIXL_BACKEND_LIBFABRIC, value: "true" }
      - op: add
        path: /spec/services/VllmPrefillWorker/extraPodSpec/mainContainer/env/-
        value: { name: DYN_KVBM_NIXL_BACKEND_UCX, value: "false" }
      - op: add
        path: /spec/services/VllmPrefillWorker/extraPodSpec/mainContainer/env/-
        value: { name: FI_PROVIDER, value: "efa" }
      - op: add
        path: /spec/services/VllmPrefillWorker/extraPodSpec/mainContainer/env/-
        value: { name: FI_EFA_USE_DEVICE_RDMA, value: "1" }
      - op: add
        path: /spec/services/VllmPrefillWorker/extraPodSpec/mainContainer/env/-
        value: { name: FI_EFA_ENABLE_SHM_TRANSFER, value: "0" }
      - op: add
        path: /spec/services/VllmPrefillWorker/extraPodSpec/mainContainer/env/-
        value: { name: FI_LOG_LEVEL, value: "warn" }
      - op: add
        path: /spec/services/VllmDecodeWorker/extraPodSpec/mainContainer/env/-
        value: { name: DYN_KVBM_NIXL_BACKEND_LIBFABRIC, value: "true" }
      - op: add
        path: /spec/services/VllmDecodeWorker/extraPodSpec/mainContainer/env/-
        value: { name: DYN_KVBM_NIXL_BACKEND_UCX, value: "false" }
      - op: add
        path: /spec/services/VllmDecodeWorker/extraPodSpec/mainContainer/env/-
        value: { name: FI_PROVIDER, value: "efa" }
      - op: add
        path: /spec/services/VllmDecodeWorker/extraPodSpec/mainContainer/env/-
        value: { name: FI_EFA_USE_DEVICE_RDMA, value: "1" }
      - op: add
        path: /spec/services/VllmDecodeWorker/extraPodSpec/mainContainer/env/-
        value: { name: FI_EFA_ENABLE_SHM_TRANSFER, value: "0" }
      - op: add
        path: /spec/services/VllmDecodeWorker/extraPodSpec/mainContainer/env/-
        value: { name: FI_LOG_LEVEL, value: "warn" }
