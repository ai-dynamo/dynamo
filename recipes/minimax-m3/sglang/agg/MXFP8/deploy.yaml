apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: m3-sglang-mxfp8-tp4-defaultthinking
  namespace: ibhosale-dynamo
spec:
  backendFramework: sglang
  envs:
    - name: HF_HOME
      value: /model-cache
    - name: HF_HUB_CACHE
      value: /model-cache/hub
    - name: HF_HUB_OFFLINE
      value: "1"
    - name: TRANSFORMERS_OFFLINE
      value: "1"
    - name: FLASHINFER_DISABLE_VERSION_CHECK
      value: "1"
    - name: FLASHINFER_WORKSPACE_BASE
      value: /model-cache
    - name: SGLANG_ENABLE_JIT_DEEPGEMM
      value: "1"
    - name: NCCL_CUMEM_ENABLE
      value: "1"
    - name: GLOO_SOCKET_IFNAME
      value: eth0
    - name: NVIDIA_GDRCOPY
      value: "1"
    - name: TORCHINDUCTOR_CACHE_DIR
      value: /scratch/torchinductor-cache
    - name: TRITON_CACHE_DIR
      value: /scratch/triton-cache
    - name: PYTHONUNBUFFERED
      value: "1"
  pvcs:
    - name: shared-model-cache
      create: false
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      extraPodSpec:
        nodeSelector:
          kubernetes.io/arch: arm64
        tolerations:
          - operator: Exists
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:1.3.0-minimax-m3-dev.1
          imagePullPolicy: Always
          command:
            - python3
            - -m
            - dynamo.frontend
          args:
            - --http-port
            - "8000"
            - --model-name
            - minimax-m3-preview
            - --model-path
            - /model-cache/ibhosale-custom-model/payload
            - --dyn-chat-processor
            - sglang
          env:
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: DYN_SYSTEM_USE_ENDPOINT_HEALTH_STATUS
              value: "[]"
            - name: DYN_SYSTEM_STARTING_HEALTH_STATUS
              value: ready
            - name: DYN_HEALTH_CHECK_ENABLED
              value: "false"
            - name: PYTHONUNBUFFERED
              value: "1"
          securityContext:
            runAsUser: 0
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 360
          volumeMounts:
            - mountPath: /model-cache
              name: shared-model-cache
            - mountPath: /scratch
              name: scratch
        imagePullSecrets:
          - name: acr-token-secret
        volumes:
          - name: shared-model-cache
            persistentVolumeClaim:
              claimName: shared-model-cache
          - name: scratch
            emptyDir: {}
    decode:
      componentType: worker
      replicas: 1
      resources:
        limits:
          gpu: "4"
        requests:
          custom:
            ephemeral-storage: 4000Gi
      sharedMemory:
        size: 200Gi
      extraPodSpec:
        nodeSelector:
          cloud.google.com/gke-ephemeral-storage-local-ssd: "true"
          kubernetes.io/arch: arm64
          nvidia.com/gpu.product: NVIDIA-GB200
        tolerations:
          - operator: Exists
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:1.3.0-minimax-m3-dev.1
          imagePullPolicy: Always
          workingDir: /workspace
          command:
            - bash
            - -lc
          args:
            - >-
              ulimit -l unlimited || true;
              ulimit -n 1048576 || true;
              echo "===== MiniMax M3 SGLang MXFP8 TP=4 defaultthinking image launch =====";
              date -u +%Y-%m-%dT%H:%M:%SZ;
              echo "MODEL_PATH=/model-cache/ibhosale-custom-model/payload";
              echo "SERVED_MODEL_NAME=minimax-m3-preview";
              echo "TP_SIZE=4";
              readlink -f /model-cache/ibhosale-custom-model/payload || true;
              find -L /model-cache/ibhosale-custom-model/payload -maxdepth 1 -type f -name '*.safetensors' | wc -l || true;
              du -shL /model-cache/ibhosale-custom-model/payload || true;
              nvidia-smi --query-gpu=index,name,memory.total,memory.used --format=csv,noheader || true;
              exec python3 -m dynamo.sglang
              --model-path /model-cache/ibhosale-custom-model/payload
              --served-model-name minimax-m3-preview
              --page-size 16
              --tp 4
              --trust-remote-code
              --enable-metrics
              --mem-fraction-static 0.80
              --quantization mxfp8
              --attention-backend flashinfer
              --mm-attention-backend flashinfer_cudnn
              --moe-runner-backend deep_gemm
              --dtype bfloat16
              --chunked-prefill-size 8192
              --dyn-reasoning-parser minimax-m3
              --dyn-tool-call-parser minimax-m3-nom
              --model-loader-extra-config '{"enable_multithread_load": true, "num_threads": 32}'
              --watchdog-timeout 3600
              --host 0.0.0.0
              --port 30000
          env:
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
          resources:
            requests:
              cpu: "32"
              memory: 256Gi
            limits:
              cpu: "64"
              memory: 512Gi
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
                - SYS_RESOURCE
            runAsUser: 0
          startupProbe:
            httpGet:
              path: /live
              port: 9090
            failureThreshold: 720
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: /model-cache
              name: shared-model-cache
            - mountPath: /scratch
              name: scratch
        imagePullSecrets:
          - name: acr-token-secret
        volumes:
          - name: shared-model-cache
            persistentVolumeClaim:
              claimName: shared-model-cache
          - name: scratch
            emptyDir: {}
