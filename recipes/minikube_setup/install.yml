---
- name: Install Minikube
  hosts: all
  become: yes
  gather_facts: yes
  vars:
    minikube_download_url: "https://github.com/kubernetes/minikube/releases/latest/download/minikube-linux-amd64"
    system_bin_dir: "/usr/local/bin"
  tasks:
    - name: Check if Minikube is already installed
      command: minikube version
      register: minikube_version_check
      failed_when: false
      changed_when: false
      become: no

    - name: Download and install Minikube binary
      get_url:
        url: "{{ minikube_download_url }}"
        dest: "{{ system_bin_dir }}/minikube"
        mode: '0755'
        owner: root
        group: root
      when: minikube_version_check.rc != 0

    - name: Verify Minikube installation
      command: minikube version
      register: minikube_verify
      changed_when: false
      become: no

    - name: Display Minikube version
      debug:
        msg: "Minikube installed successfully: {{ minikube_verify.stdout }}"
      become: no
