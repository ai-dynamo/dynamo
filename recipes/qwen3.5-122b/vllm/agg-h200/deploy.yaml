#
# Qwen3.5-122B-A10B-FP8 — aggregated H200, tp1 + MTP(nst=3), Dynamo KV-aware routing.
# 1 frontend (DYN_ROUTER_MODE=kv) + N tp1 workers. Deploy replicas>=2 so the router
# has replicas to route shared prefixes across; a full 8x H200 node runs replicas: 8.
#
# The worker's --speculative-config is sourced from the ConfigMap below via env:
#   - key `speculative-config`           = REAL MTP (production; ships active).
#   - key `speculative-config-synthetic` = forced AL=2.937 (measured on SpeedBench), for
#     representative throughput benchmarking on synthetic traces (mooncake). Do NOT ship it.
# To benchmark, set the worker's SPECULATIVE_CONFIG configMapKeyRef.key to
# `speculative-config-synthetic`. See perf/README.md.
apiVersion: v1
kind: ConfigMap
metadata:
  name: qwen35-122b-a10b-fp8-tp1mtp-config
  labels:
    app.kubernetes.io/name: qwen35-122b-a10b-fp8-tp1mtp-agg-h200
    app.kubernetes.io/part-of: dynamo
data:
  speculative-config: |-
    {
      "method": "mtp",
      "num_speculative_tokens": 3,
      "moe_backend": "triton"
    }
  speculative-config-synthetic: |-
    {
      "method": "mtp",
      "num_speculative_tokens": 3,
      "moe_backend": "triton",
      "rejection_sample_method": "synthetic",
      "synthetic_acceptance_length": 2.937
    }
---
apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: qwen35-122b-a10b-fp8-tp1mtp-agg-h200
  labels:
    app.kubernetes.io/name: qwen35-122b-a10b-fp8-tp1mtp-agg-h200
    app.kubernetes.io/part-of: dynamo
spec:
  backendFramework: vllm
  components:
    - name: Frontend
      type: frontend
      replicas: 1
      podTemplate:
        spec:
          imagePullSecrets:
            - name: nvcr-secret
          containers:
            - name: main
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.3.0
              command:
                - python3
              args:
                - -m
                - dynamo.frontend
                - --trust-remote-code
              env:
                - name: POD_UID
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.uid
                - name: DYN_ROUTER_MODE
                  value: kv
              resources: {}
              workingDir: /workspace
              startupProbe:
                httpGet:
                  path: /health
                  port: 8000
                periodSeconds: 10
                timeoutSeconds: 60
                failureThreshold: 60
    - name: agg
      type: worker
      replicas: 2
      podTemplate:
        spec:
          imagePullSecrets:
            - name: nvcr-secret
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: nvidia.com/gpu.product
                        operator: In
                        values:
                          - NVIDIA-H200
          tolerations:
            - key: nvidia.com/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule
          volumes:
            - name: model-cache
              persistentVolumeClaim:
                claimName: model-cache
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 16Gi
          containers:
            - name: main
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.3.0
              command:
                - python3
                - -m
                - dynamo.vllm
              args:
                - --model
                - Qwen/Qwen3.5-122B-A10B-FP8
                - --served-model-name
                - Qwen/Qwen3.5-122B-A10B-FP8
                - --trust-remote-code
                - --moe-backend
                - triton
                - --dyn-tool-call-parser
                - qwen3_coder
                - --dyn-reasoning-parser
                - qwen3
                - --tensor-parallel-size
                - "1"
                - --kv-cache-dtype
                - auto
                - --enable-prefix-caching
                - --mamba-ssm-cache-dtype
                - float16
                - --max-model-len
                - "262144"
                - --max-num-seqs
                - "128"
                - --max-num-batched-tokens
                - "16384"
                - --gpu-memory-utilization
                - "0.95"
                # MTP (nst=3) sourced from the ConfigMap (real MTP by default). Needs
                # gpu-memory-utilization 0.95 at full 262k ctx; for a non-speculative deploy
                # drop this arg + the SPECULATIVE_CONFIG env and set utilization back to 0.92.
                - --speculative-config=$(SPECULATIVE_CONFIG)
                # Publish per-worker KV cache events so the frontend KV router lands each
                # request on the replica already holding its prefix.
                - --kv-events-config
                - '{"publisher":"zmq","topic":"kv-events","endpoint":"tcp://*:5557","enable_kv_cache_events":true}'
              env:
                - name: POD_UID
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.uid
                # Swap key to `speculative-config-synthetic` (AL=2.937) for representative
                # benchmarking on synthetic traces; ship `speculative-config`.
                - name: SPECULATIVE_CONFIG
                  valueFrom:
                    configMapKeyRef:
                      name: qwen35-122b-a10b-fp8-tp1mtp-config
                      key: speculative-config
                - name: HF_HOME
                  value: /model-cache
                - name: HF_HUB_OFFLINE
                  value: "1"
                - name: HF_MODULES_CACHE
                  value: /tmp/hf_modules
                - name: TRITON_CACHE_DIR
                  value: /tmp/.triton-cache
                - name: VLLM_CONFIG_ROOT
                  value: /tmp/vllm-config
                - name: VLLM_CACHE_ROOT
                  value: /tmp/vllm-cache
              resources:
                requests:
                  nvidia.com/gpu: "1"
                  memory: 64Gi
                limits:
                  nvidia.com/gpu: "1"
              securityContext:
                runAsUser: 0
              startupProbe:
                httpGet:
                  path: /live
                  port: 9090
                periodSeconds: 30
                timeoutSeconds: 20
                failureThreshold: 60
              volumeMounts:
                - name: model-cache
                  mountPath: /model-cache
                - name: dshm
                  mountPath: /dev/shm
              workingDir: /workspace/
