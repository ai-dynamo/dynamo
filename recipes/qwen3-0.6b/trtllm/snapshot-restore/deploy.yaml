# Experimental Dynamo Snapshot restore recipe for Qwen3-0.6B with TensorRT-LLM.
#
# This recipe uses DynamoCheckpoint Auto mode: the operator starts a checkpoint
# job for TRTLLMWorker, waits for it to become Ready, and then restores the DGD
# worker from that checkpoint. Use a snapshot placeholder image for the worker
# and the matching runtime/frontend image for the frontend. The image tags below
# are examples from a build-on-demand run; replace them with the tags for the
# Dynamo/TRTLLM revision being tested.
#
# Requirements validated for the single-GPU TRTLLM path:
# - Run the normal TRTLLM entrypoint. Do not wrap it in cuda-checkpoint
#   --launch-job; the snapshot-agent drives CRIU/cuda-checkpoint externally.
# - Keep the TRTLLM engine config conservative enough for a small smoke test.
# - Force OpenMPI away from TCP BTL on the pod IP. CRIU tcpClose handles
#   established sockets, but it does not remove listening sockets, so a PodIP
#   listener in the checkpoint will not restore correctly after the placeholder
#   pod receives a different IP. For one GPU, self/vader is sufficient.
# - /dev/net/tun is not required when the PodIP listener is avoided.
apiVersion: v1
kind: ConfigMap
metadata:
  name: trtllm-qwen3-0-6b-snapshot-engine-config
data:
  trtllm-qwen3-0-6b-snapshot.yaml: |
    tensor_parallel_size: 1
    moe_expert_parallel_size: 1
    enable_attention_dp: false
    max_num_tokens: 1024
    max_batch_size: 1
    trust_remote_code: true
    backend: pytorch
    enable_chunked_prefill: false
    kv_cache_config:
      free_gpu_memory_fraction: 0.10
---
apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: qwen3-0-6b-trtllm-snapshot-restore
  annotations:
    nvidia.com/enable-grove: "false"
spec:
  backendFramework: trtllm
  components:
    - name: Frontend
      type: frontend
      replicas: 1
      podTemplate:
        spec:
          imagePullSecrets:
            - name: acr-token-secret
            - name: ngc-secret
          containers:
            - name: main
              image: dynamoci.azurecr.io/ai-dynamo/dynamo:ba811fb275fef4c2f246f98bc6e29b8c00bea89f-trtllm-runtime
              imagePullPolicy: IfNotPresent
    - name: TRTLLMWorker
      type: worker
      replicas: 1
      experimental:
        checkpoint:
          mode: Auto
      podTemplate:
        spec:
          runtimeClassName: nvidia
          nodeSelector:
            nvidia.com/gpu.present: "true"
          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule
          imagePullSecrets:
            - name: acr-token-secret
            - name: ngc-secret
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
          volumes:
            - name: hf-cache
              persistentVolumeClaim:
                claimName: model-cache
            - name: criu-work
              emptyDir: {}
            - name: engine-config
              configMap:
                name: trtllm-qwen3-0-6b-snapshot-engine-config
          containers:
            - name: main
              image: dynamoci.azurecr.io/ai-dynamo/dynamo:eb04a4ec6f0eef05df6eebb14a38a099b52c075b-trtllm-placeholder
              imagePullPolicy: IfNotPresent
              workingDir: /workspace/
              command:
                - python3
                - -m
                - dynamo.trtllm
              args:
                - --model-path
                - Qwen/Qwen3-0.6B
                - --served-model-name
                - Qwen/Qwen3-0.6B
                - --extra-engine-args
                - /workspace/trtllm-qwen3-0-6b-snapshot.yaml
              envFrom:
                - secretRef:
                    name: hf-token-secret
              env:
                - name: HF_HOME
                  value: /home/dynamo/.cache/huggingface
                - name: HF_HUB_OFFLINE
                  value: "0"
                - name: TRANSFORMERS_OFFLINE
                  value: "0"
                - name: HF_HUB_DISABLE_TELEMETRY
                  value: "1"
                - name: DO_NOT_TRACK
                  value: "1"
                - name: TRTLLM_NO_USAGE_STATS
                  value: "1"
                - name: TELEMETRY_DISABLED
                  value: "true"
                - name: NVIDIA_DRIVER_CAPABILITIES
                  value: all
                - name: TOKENIZERS_PARALLELISM
                  value: "false"
                - name: TLLM_WORKER_USE_SINGLE_PROCESS
                  value: "1"
                # Snapshot restore needs a stable process/network shape. Keep
                # TRT-LLM/OpenMPI in single-process, loopback/local transport
                # mode so CRIU does not capture a listening socket bound to the
                # checkpoint pod IP, which changes after restore.
                - name: UCX_TLS
                  value: tcp,self
                - name: OMPI_MCA_oob_tcp_if_include
                  value: lo
                - name: OMPI_MCA_pml
                  value: ob1
                - name: OMPI_MCA_btl
                  value: self,vader
                - name: OMPI_MCA_btl_tcp_if_include
                  value: lo
                - name: PMIX_MCA_ptl_tcp_if_include
                  value: lo
                - name: PRTE_MCA_oob_tcp_if_include
                  value: lo
              resources:
                requests:
                  cpu: "4"
                  memory: 16Gi
                  nvidia.com/gpu: "1"
                  ephemeral-storage: 10Gi
                limits:
                  cpu: "8"
                  memory: 32Gi
                  nvidia.com/gpu: "1"
              volumeMounts:
                - name: hf-cache
                  mountPath: /home/dynamo/.cache/huggingface
                - name: criu-work
                  mountPath: /var/criu-work
                - name: engine-config
                  mountPath: /workspace/trtllm-qwen3-0-6b-snapshot.yaml
                  subPath: trtllm-qwen3-0-6b-snapshot.yaml
