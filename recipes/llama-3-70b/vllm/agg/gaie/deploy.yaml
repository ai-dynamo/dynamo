apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: llama3-70b-agg
spec:
  backendFramework: vllm
  components:
  - name: Epp
    type: epp
    replicas: 1
    podTemplate:
      spec:
        containers:
        - name: main
          env:
          - name: DYN_KV_CACHE_BLOCK_SIZE
            value: "128"
          - name: DYN_MODEL_NAME
            value: RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic
          - name: DYN_DECODE_FALLBACK
            value: "true"
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: nvcr.io/nvidia/ai-dynamo/dynamo-frontend:1.2.1
  - name: VllmDecodeWorker
    type: decode
    replicas: 1
    sharedMemorySize: 20Gi
    frontendSidecar: sidecar-frontend
    podTemplate:
      spec:
        containers:
        - name: main
          args:
          - python3 -m dynamo.vllm --model $MODEL_PATH --served-model-name $SERVED_MODEL_NAME
            --tensor-parallel-size 4 --data-parallel-size 1 --gpu-memory-utilization
            0.90 --no-enable-prefix-caching --block-size 128
          command:
          - /bin/sh
          - -c
          env:
          - name: SERVED_MODEL_NAME
            value: RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic
          - name: MODEL_PATH
            value: RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic
          - name: HF_HOME
            value: /opt/models
          - name: DYN_STORE_KV
            value: mem
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.1
          resources:
            limits:
              nvidia.com/gpu: "4"
            requests:
              nvidia.com/gpu: "4"
          volumeMounts:
          - mountPath: /opt/models
            name: model-cache
          workingDir: /workspace/examples/backends/vllm
        - name: sidecar-frontend
          args:
          - -m
          - dynamo.frontend
          - --router-mode
          - direct
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.1
        volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache
