# DeepSeek-R1 NVFP4 disaggregated WideEP on 10x GB200 (40 GPUs), tuned for ISL/OSL=8192/1024.
#
# Topology: 2 prefill (CTX) workers, each on 1 GB200 node, DEP4 (TP=4 EP=4 ADP).
#           1 decode  (GEN) worker on 8 GB200 nodes, DEP32 (TP=32 EP=32 ADP).
# GEN MoE: TRTLLM with EPLB. CTX MoE: default backend.
# KV cache: FP8. Speculative decoding: MTP with 1 next-N predict layer.
#
# Instructions:
# 1. kubectl apply -f ../../../../model-cache/model-cache.yaml -n <namespace>
# 2. kubectl apply -f ../../../../model-cache/model-download.yaml -n <namespace>
# 3. kubectl apply -f deploy.yaml -n <namespace>
# 4. kubectl apply -f perf.yaml -n <namespace>

apiVersion: v1
kind: ConfigMap
metadata:
  name: prefill-config
data:
  prefill_config.yaml: |
    max_batch_size: 1
    max_num_tokens: 8448
    max_seq_len: 9423
    tensor_parallel_size: 4
    moe_expert_parallel_size: 4
    enable_attention_dp: true
    pipeline_parallel_size: 1
    cuda_graph_config: null
    print_iter_log: true
    disable_overlap_scheduler: true
    kv_cache_config:
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.75
      dtype: fp8
    cache_transceiver_config:
      max_tokens_in_buffer: 8448
      backend: DEFAULT
    speculative_config:
      decoding_type: MTP
      num_nextn_predict_layers: 1
---

apiVersion: v1
kind: ConfigMap
metadata:
  name: decode-config
data:
  decode_config_dep32.yaml: |
    tensor_parallel_size: 32
    moe_expert_parallel_size: 32
    enable_attention_dp: true
    enable_lm_head_tp_in_adp: true
    pipeline_parallel_size: 1
    max_batch_size: 256
    max_num_tokens: 512
    max_seq_len: 9423
    cuda_graph_config:
      enable_padding: true
      batch_sizes:
      - 1
      - 2
      - 4
      - 8
      - 16
      - 32
      - 64
      - 128
      - 256
    print_iter_log: true
    kv_cache_config:
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.6
      dtype: fp8
    moe_config:
      backend: TRTLLM
      load_balancer:
        num_slots: 288
        layer_updates_per_iter: 1
    cache_transceiver_config:
      max_tokens_in_buffer: 8448
      backend: DEFAULT
    stream_interval: 100
    num_postprocess_workers: 4
    speculative_config:
      decoding_type: MTP
      num_nextn_predict_layers: 1
---

# numNodes = prefill_replicas + decode_nodeCount = 2 + 8 = 10.
apiVersion: resource.nvidia.com/v1beta1
kind: ComputeDomain
metadata:
  name: trtllm-test-compute-domain
spec:
  numNodes: 10
  channel:
    resourceClaimTemplate:
      name: trtllm-test-compute-domain-channel
---

apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: trtllm-disagg-multinode
spec:
  pvcs:
    - name: model-cache
      create: false
  envs:
    - name: NCCL_MNNVL_ENABLE
      value: "1"
    - name: NCCL_CUMEM_ENABLE
      value: "1"
    - name: TLLM_LOG_LEVEL
      value: "info"
    - name: TRTLLM_MOE_ENABLE_ALLTOALL_WITHOUT_ALLGATHER
      value: "1"
    - name: TRTLLM_ENABLE_PDL
      value: "1"
    - name: TRTLLM_SERVER_DISABLE_GC
      value: "1"
    - name: TRTLLM_WORKER_DISABLE_GC
      value: "1"
    - name: MIMALLOC_PURGE_DELAY
      value: "0"
  backendFramework: trtllm
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      volumeMounts:
        - name: model-cache
          mountPoint: /model-cache
      extraPodSpec:
        tolerations: []
        affinity: {}
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.3.0
          env:
            - name: HF_HOME
              value: /model-cache
          args:
          - |
            python3 -m dynamo.frontend --http-port 8000
          command:
          - /bin/sh
          - -c
    prefill:
      componentType: worker
      subComponentType: prefill
      replicas: 2
      volumeMounts:
        - name: model-cache
          mountPoint: /model-cache
      sharedMemory:
        size: 800Gi
      resources:
        requests:
          cpu: "130"
          memory: "850Gi"
        limits:
          cpu: "130"
          memory: "850Gi"
          gpu: "4"
        claims:
          - name: compute-domain-channel
      extraPodSpec:
        tolerations: []
        affinity: {}
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.3.0
          workingDir: /workspace/components/backends/trtllm
          startupProbe:
            httpGet:
              path: /live
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 600
          volumeMounts:
            - name: prefill-config-volume
              mountPath: /config
          command:
          - /bin/sh
          - -c
          args:
          - >-
            python3 -m dynamo.trtllm
            --model-path /model-cache/deepseek-r1-fp4
            --served-model-name deepseek-ai/DeepSeek-R1
            --extra-engine-args /config/prefill_config.yaml
            --disaggregation-mode prefill
        resourceClaims:
          - name: compute-domain-channel
            resourceClaimTemplateName: trtllm-test-compute-domain-channel
        volumes:
          - name: prefill-config-volume
            configMap:
              name: prefill-config
    decode:
      componentType: worker
      subComponentType: decode
      replicas: 1
      volumeMounts:
        - name: model-cache
          mountPoint: /model-cache
      multinode:
        nodeCount: 8
      sharedMemory:
        size: 800Gi
      resources:
        requests:
          cpu: "130"
          memory: "850Gi"
        limits:
          cpu: "130"
          memory: "850Gi"
          gpu: "4"
        claims:
          - name: compute-domain-channel
      extraPodSpec:
        tolerations: []
        affinity: {}
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.3.0
          workingDir: /workspace/components/backends/trtllm
          startupProbe:
            httpGet:
              path: /live
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 600
          volumeMounts:
            - name: decode-config-volume
              mountPath: /config
          command:
          - /bin/sh
          - -c
          args:
          - >-
            python3 -m dynamo.trtllm
            --model-path /model-cache/deepseek-r1-fp4
            --served-model-name deepseek-ai/DeepSeek-R1
            --extra-engine-args /config/decode_config_dep32.yaml
            --disaggregation-mode decode
        resourceClaims:
          - name: compute-domain-channel
            resourceClaimTemplateName: trtllm-test-compute-domain-channel
        volumes:
          - name: decode-config-volume
            configMap:
              name: decode-config
