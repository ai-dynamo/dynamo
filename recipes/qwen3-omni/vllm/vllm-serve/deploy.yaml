#
# Upstream `vllm-omni serve` baseline for DYN-2581 agg-vs-disagg benchmarking.
# Plain k8s Deployment + Service — no Dynamo frontend / router. Used as the
# reference point that the dynamo agg + disagg topologies are compared against.
# Sized for 2x NVIDIA H200 (141 GB HBM3e).
apiVersion: v1
kind: Service
metadata:
  name: vllm-serve-qwen3-omni
spec:
  selector:
    app: vllm-serve-qwen3-omni
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-serve-qwen3-omni
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-serve-qwen3-omni
  template:
    metadata:
      labels:
        app: vllm-serve-qwen3-omni
    spec:
      imagePullSecrets:
        - name: nvcr-imagepullsecret
      containers:
        - name: vllm-omni
          image: nvcr.io/nvstaging/ai-dynamo/vllm-runtime:nightly-20260429-5ab60a5
          command: ["bash", "-lc"]
          # NB: vllm-omni serve auto-discovers the model's modality stages from
          # the checkpoint and does NOT take --output-modalities (that flag is
          # dynamo.vllm.omni-only).
          args:
            - >-
              vllm-omni serve
              Qwen/Qwen3-Omni-30B-A3B-Instruct
              --port 8000
              --trust-remote-code
          env:
            - name: HF_HOME
              value: /home/dynamo/.cache/huggingface
            - name: FLASHINFER_DISABLE_VERSION_CHECK
              value: "1"
            - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
              value: "1"
          envFrom:
            - secretRef:
                name: hf-token-secret
          ports:
            - containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: "2"
              memory: "300Gi"
            requests:
              nvidia.com/gpu: "2"
              memory: "200Gi"
          volumeMounts:
            - name: model-cache
              mountPath: /home/dynamo/.cache/huggingface
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
