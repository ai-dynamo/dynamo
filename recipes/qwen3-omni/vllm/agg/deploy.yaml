#
# Aggregated Qwen3-Omni-MoE deployment for DYN-2581 agg-vs-disagg benchmarking.
# Single AsyncOmni instance — text + audio output served from one endpoint.
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: agg-qwen3-omni
spec:
  pvcs:
  - create: false
    name: model-cache
  - create: false
    name: compilation-cache
  services:
    Frontend:
      componentType: frontend
      envs:
        - name: HF_HOME
          value: /home/dynamo/.cache/huggingface
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.2
          workingDir: /workspace
          command:
            - python3
            - -m
            - dynamo.frontend
      replicas: 1
      subComponentType: null
    VllmOmniWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      volumeMounts:
      - name: model-cache
        mountPoint: /home/dynamo/.cache/huggingface
      - name: compilation-cache
        mountPoint: /home/dynamo/.cache/vllm
        useAsCompilationCache: true
      extraPodSpec:
        mainContainer:
          args:
          - --model
          - Qwen/Qwen3-Omni-30B-A3B-Instruct
          - --output-modalities
          - text,audio
          - --media-output-fs-url
          - file:///tmp/dynamo_media
          - --trust-remote-code
          command:
          - python3
          - -m
          - dynamo.vllm.omni
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.2
          env:
          - name: DYN_HEALTH_CHECK_ENABLED
            value: "false"
          - name: HF_HOME
            value: /home/dynamo/.cache/huggingface
          - name: FLASHINFER_DISABLE_VERSION_CHECK
            value: "1"
          - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
            value: "1"
          workingDir: /workspace
      replicas: 1
      resources:
        limits:
          gpu: "2"
          memory: "200Gi"
        requests:
          gpu: "2"
          memory: "150Gi"
