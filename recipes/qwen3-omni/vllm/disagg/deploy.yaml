#
# Disaggregated Qwen3-Omni-MoE deployment for DYN-2581 agg-vs-disagg benchmarking.
# Three stage workers (thinker / talker / code2wav) + omni router + frontend.
# Stage config mounted from the qwen3-omni-stage-config ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: qwen3-omni-stage-config
data:
  qwen3_omni_moe.yaml: |
    # Branch-pinned copy of vllm_omni's qwen3_omni_moe.yaml (see
    # examples/backends/vllm/launch/stage_configs/qwen3_omni_moe.yaml in this repo).
    # Kept inline here so the disagg deploy is self-contained on a fresh cluster.
    async_chunk: false
    stage_args:
      - stage_id: 0
        stage_type: llm
        runtime:
          devices: "0"
        engine_args:
          model_stage: thinker
          max_num_seqs: 64
          model_arch: Qwen3OmniMoeForConditionalGeneration
          worker_type: ar
          scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
          gpu_memory_utilization: 0.9
          enforce_eager: false
          trust_remote_code: true
          engine_output_type: latent
          distributed_executor_backend: "mp"
          enable_prefix_caching: false
          max_num_batched_tokens: 32768
          hf_config_name: thinker_config
          tensor_parallel_size: 1
        final_output: true
        final_output_type: text
        is_comprehension: true
        default_sampling_params:
          temperature: 0.4
          top_p: 0.9
          top_k: 1
          max_tokens: 2048
          seed: 42
          detokenize: True
          repetition_penalty: 1.05
      - stage_id: 1
        stage_type: llm
        runtime:
          devices: "0"  # within the talker pod CUDA_VISIBLE_DEVICES already isolates
        engine_args:
          model_stage: talker
          max_num_seqs: 64
          model_arch: Qwen3OmniMoeForConditionalGeneration
          worker_type: ar
          scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
          gpu_memory_utilization: 0.6
          enforce_eager: false
          trust_remote_code: true
          engine_output_type: latent
          enable_prefix_caching: false
          max_num_batched_tokens: 32768
          distributed_executor_backend: "mp"
          hf_config_name: talker_config
        engine_input_source: [0]
        custom_process_input_func: vllm_omni.model_executor.stage_input_processors.qwen3_omni.thinker2talker
        default_sampling_params:
          temperature: 0.9
          top_k: 50
          max_tokens: 4096
          seed: 42
          detokenize: False
          repetition_penalty: 1.05
          stop_token_ids: [2150]
      - stage_id: 2
        stage_type: llm
        runtime:
          devices: "0"
        engine_args:
          model_stage: code2wav
          max_num_seqs: 32
          model_arch: Qwen3OmniMoeForConditionalGeneration
          worker_type: generation
          scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
          enforce_eager: true
          trust_remote_code: true
          async_scheduling: false
          enable_prefix_caching: false
          engine_output_type: audio
          gpu_memory_utilization: 0.1
          distributed_executor_backend: "mp"
          max_num_batched_tokens: 1000000
          hf_config_name: thinker_config
        engine_input_source: [1]
        custom_process_input_func: vllm_omni.model_executor.stage_input_processors.qwen3_omni.talker2code2wav
        final_output: true
        final_output_type: audio
        default_sampling_params:
          temperature: 0.0
          top_p: 1.0
          top_k: -1
          max_tokens: 65536
          seed: 42
          detokenize: True
          repetition_penalty: 1.1
    runtime:
      enabled: true
      defaults:
        window_size: -1
        max_inflight: 1
      edges:
        - from: 0
          to: 1
          window_size: -1
        - from: 1
          to: 2
          window_size: -1
---
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: disagg-qwen3-omni
spec:
  pvcs:
  - create: false
    name: model-cache
  - create: false
    name: compilation-cache
  services:
    Frontend:
      componentType: frontend
      envs:
        - name: HF_HOME
          value: /home/dynamo/.cache/huggingface
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.2
          workingDir: /workspace
          command:
            - python3
            - -m
            - dynamo.frontend
      replicas: 1
      subComponentType: null

    OmniRouter:
      componentType: worker
      envFromSecret: hf-token-secret
      volumeMounts:
      - name: model-cache
        mountPoint: /home/dynamo/.cache/huggingface
      extraPodSpec:
        mainContainer:
          args:
          - --model
          - Qwen/Qwen3-Omni-30B-A3B-Instruct
          - --omni-router
          - --stage-configs-path
          - /etc/dynamo/stage_configs/qwen3_omni_moe.yaml
          - --output-modalities
          - text,audio
          - --media-output-fs-url
          - file:///tmp/dynamo_media
          - --trust-remote-code
          command:
          - python3
          - -m
          - dynamo.vllm.omni
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.2
          env:
          - name: DYN_HEALTH_CHECK_ENABLED
            value: "false"
          - name: HF_HOME
            value: /home/dynamo/.cache/huggingface
          - name: FLASHINFER_DISABLE_VERSION_CHECK
            value: "1"
          - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
            value: "1"
          workingDir: /workspace
          volumeMounts:
          - name: stage-config
            mountPath: /etc/dynamo/stage_configs
        volumes:
        - name: stage-config
          configMap:
            name: qwen3-omni-stage-config
      replicas: 1
      resources:
        limits:
          cpu: "4"
          memory: "16Gi"
        requests:
          cpu: "2"
          memory: "8Gi"

    OmniThinker:
      componentType: worker
      envFromSecret: hf-token-secret
      volumeMounts:
      - name: model-cache
        mountPoint: /home/dynamo/.cache/huggingface
      - name: compilation-cache
        mountPoint: /home/dynamo/.cache/vllm
        useAsCompilationCache: true
      extraPodSpec:
        mainContainer:
          args:
          - --model
          - Qwen/Qwen3-Omni-30B-A3B-Instruct
          - --stage-id
          - "0"
          - --stage-configs-path
          - /etc/dynamo/stage_configs/qwen3_omni_moe.yaml
          - --output-modalities
          - text,audio
          - --media-output-fs-url
          - file:///tmp/dynamo_media
          - --trust-remote-code
          command:
          - python3
          - -m
          - dynamo.vllm.omni
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.2
          env:
          - name: DYN_HEALTH_CHECK_ENABLED
            value: "false"
          - name: HF_HOME
            value: /home/dynamo/.cache/huggingface
          - name: FLASHINFER_DISABLE_VERSION_CHECK
            value: "1"
          - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
            value: "1"
          workingDir: /workspace
          volumeMounts:
          - name: stage-config
            mountPath: /etc/dynamo/stage_configs
        volumes:
        - name: stage-config
          configMap:
            name: qwen3-omni-stage-config
      replicas: 1
      resources:
        limits:
          gpu: "1"
          memory: "150Gi"
        requests:
          gpu: "1"
          memory: "100Gi"

    OmniTalker:
      componentType: worker
      envFromSecret: hf-token-secret
      volumeMounts:
      - name: model-cache
        mountPoint: /home/dynamo/.cache/huggingface
      - name: compilation-cache
        mountPoint: /home/dynamo/.cache/vllm
        useAsCompilationCache: true
      extraPodSpec:
        mainContainer:
          args:
          - --model
          - Qwen/Qwen3-Omni-30B-A3B-Instruct
          - --stage-id
          - "1"
          - --stage-configs-path
          - /etc/dynamo/stage_configs/qwen3_omni_moe.yaml
          - --output-modalities
          - text,audio
          - --media-output-fs-url
          - file:///tmp/dynamo_media
          - --trust-remote-code
          command:
          - python3
          - -m
          - dynamo.vllm.omni
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.2
          env:
          - name: DYN_HEALTH_CHECK_ENABLED
            value: "false"
          - name: HF_HOME
            value: /home/dynamo/.cache/huggingface
          - name: FLASHINFER_DISABLE_VERSION_CHECK
            value: "1"
          - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
            value: "1"
          workingDir: /workspace
          volumeMounts:
          - name: stage-config
            mountPath: /etc/dynamo/stage_configs
        volumes:
        - name: stage-config
          configMap:
            name: qwen3-omni-stage-config
      replicas: 1
      resources:
        limits:
          gpu: "1"
          memory: "150Gi"
        requests:
          gpu: "1"
          memory: "100Gi"

    OmniCode2Wav:
      componentType: worker
      envFromSecret: hf-token-secret
      volumeMounts:
      - name: model-cache
        mountPoint: /home/dynamo/.cache/huggingface
      extraPodSpec:
        mainContainer:
          args:
          - --model
          - Qwen/Qwen3-Omni-30B-A3B-Instruct
          - --stage-id
          - "2"
          - --stage-configs-path
          - /etc/dynamo/stage_configs/qwen3_omni_moe.yaml
          - --output-modalities
          - text,audio
          - --media-output-fs-url
          - file:///tmp/dynamo_media
          - --trust-remote-code
          command:
          - python3
          - -m
          - dynamo.vllm.omni
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.2
          env:
          - name: DYN_HEALTH_CHECK_ENABLED
            value: "false"
          - name: HF_HOME
            value: /home/dynamo/.cache/huggingface
          - name: FLASHINFER_DISABLE_VERSION_CHECK
            value: "1"
          - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
            value: "1"
          workingDir: /workspace
          volumeMounts:
          - name: stage-config
            mountPath: /etc/dynamo/stage_configs
        volumes:
        - name: stage-config
          configMap:
            name: qwen3-omni-stage-config
      replicas: 1
      resources:
        limits:
          gpu: "1"
          memory: "100Gi"
        requests:
          gpu: "1"
          memory: "50Gi"
