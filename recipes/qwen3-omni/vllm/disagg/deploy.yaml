#
# Disaggregated Qwen3-Omni-MoE deployment for DYN-2581 agg-vs-disagg benchmarking.
#
# IMPORTANT: this recipe is intentionally a single-Pod, single-container deployment
# rather than a DynamoGraphDeployment with one service per stage. The Qwen3-Omni
# stage YAML uses the SharedMemoryConnector (intra-process /dev/shm) for stage-to-stage
# transfers, so all stage workers + the router + the frontend MUST live in the same
# OS instance to share /dev/shm. Splitting them across Pods would break the SHM
# connector hand-off.
#
# The container runs a wrapper that mirrors examples/backends/vllm/launch/disagg_omni_qwen3.sh:
#   stage 0 (thinker, GPU 0) -> stage 1 (talker, GPU 1) -> stage 2 (code2wav, GPU 1)
#   + omni router (CPU) + dynamo frontend (CPU, port 8000)
# Sized for 2x NVIDIA H200 (141 GB HBM3e).
apiVersion: v1
kind: ConfigMap
metadata:
  name: qwen3-omni-stage-config
data:
  qwen3_omni_moe.yaml: |
    # Branch-pinned copy of vllm_omni's qwen3_omni_moe.yaml; matches
    # examples/backends/vllm/launch/stage_configs/qwen3_omni_moe.yaml.
    async_chunk: false
    stage_args:
      - stage_id: 0
        stage_type: llm
        runtime:
          devices: "0"
        engine_args:
          model_stage: thinker
          max_num_seqs: 64
          model_arch: Qwen3OmniMoeForConditionalGeneration
          worker_type: ar
          scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
          gpu_memory_utilization: 0.9
          enforce_eager: false
          trust_remote_code: true
          engine_output_type: latent
          distributed_executor_backend: "mp"
          enable_prefix_caching: false
          max_num_batched_tokens: 32768
          hf_config_name: thinker_config
          tensor_parallel_size: 1
        final_output: true
        final_output_type: text
        is_comprehension: true
        default_sampling_params:
          temperature: 0.4
          top_p: 0.9
          top_k: 1
          max_tokens: 2048
          seed: 42
          detokenize: True
          repetition_penalty: 1.05
      - stage_id: 1
        stage_type: llm
        runtime:
          devices: "1"
        engine_args:
          model_stage: talker
          max_num_seqs: 64
          model_arch: Qwen3OmniMoeForConditionalGeneration
          worker_type: ar
          scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
          gpu_memory_utilization: 0.6
          enforce_eager: false
          trust_remote_code: true
          engine_output_type: latent
          enable_prefix_caching: false
          max_num_batched_tokens: 32768
          distributed_executor_backend: "mp"
          hf_config_name: talker_config
        engine_input_source: [0]
        custom_process_input_func: vllm_omni.model_executor.stage_input_processors.qwen3_omni.thinker2talker
        default_sampling_params:
          temperature: 0.9
          top_k: 50
          max_tokens: 4096
          seed: 42
          detokenize: False
          repetition_penalty: 1.05
          stop_token_ids: [2150]
      - stage_id: 2
        stage_type: llm
        runtime:
          devices: "1"
        engine_args:
          model_stage: code2wav
          max_num_seqs: 32
          model_arch: Qwen3OmniMoeForConditionalGeneration
          worker_type: generation
          scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
          enforce_eager: true
          trust_remote_code: true
          async_scheduling: false
          enable_prefix_caching: false
          engine_output_type: audio
          gpu_memory_utilization: 0.1
          distributed_executor_backend: "mp"
          max_num_batched_tokens: 1000000
          hf_config_name: thinker_config
        engine_input_source: [1]
        custom_process_input_func: vllm_omni.model_executor.stage_input_processors.qwen3_omni.talker2code2wav
        final_output: true
        final_output_type: audio
        default_sampling_params:
          temperature: 0.0
          top_p: 1.0
          top_k: -1
          max_tokens: 65536
          seed: 42
          detokenize: True
          repetition_penalty: 1.1
    runtime:
      enabled: true
      defaults:
        window_size: -1
        max_inflight: 1
      edges:
        - from: 0
          to: 1
          window_size: -1
        - from: 1
          to: 2
          window_size: -1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: qwen3-omni-disagg-launcher
data:
  launch.sh: |
    #!/bin/bash
    set -e
    trap 'echo Cleaning up...; kill 0' EXIT

    MODEL="${MODEL:-Qwen/Qwen3-Omni-30B-A3B-Instruct}"
    STAGE_CONFIG="/etc/dynamo/stage_configs/qwen3_omni_moe.yaml"

    export FLASHINFER_DISABLE_VERSION_CHECK=1
    export VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
    export HF_HOME=/home/dynamo/.cache/huggingface

    OMNI_FLAGS=(
      --model "$MODEL"
      --stage-configs-path "$STAGE_CONFIG"
      --output-modalities text,audio
      --media-output-fs-url file:///tmp/dynamo_media
      --trust-remote-code
    )

    echo "[disagg] starting Stage 0 (thinker, GPU 0)..."
    CUDA_VISIBLE_DEVICES=0 DYN_SYSTEM_PORT=8081 \
      python3 -m dynamo.vllm.omni --stage-id 0 "${OMNI_FLAGS[@]}" &
    sleep 30

    echo "[disagg] starting Stage 1 (talker, GPU 1)..."
    CUDA_VISIBLE_DEVICES=1 DYN_SYSTEM_PORT=8082 \
      python3 -m dynamo.vllm.omni --stage-id 1 "${OMNI_FLAGS[@]}" &
    sleep 30

    echo "[disagg] starting Stage 2 (code2wav, GPU 1)..."
    CUDA_VISIBLE_DEVICES=1 DYN_SYSTEM_PORT=8083 \
      python3 -m dynamo.vllm.omni --stage-id 2 "${OMNI_FLAGS[@]}" &
    sleep 30

    echo "[disagg] starting Router..."
    DYN_SYSTEM_PORT=8084 \
      python3 -m dynamo.vllm.omni --omni-router "${OMNI_FLAGS[@]}" &
    sleep 5

    echo "[disagg] starting Frontend on :8000..."
    exec python3 -m dynamo.frontend
---
apiVersion: v1
kind: Service
metadata:
  name: disagg-qwen3-omni
spec:
  selector:
    app: disagg-qwen3-omni
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: disagg-qwen3-omni
spec:
  replicas: 1
  selector:
    matchLabels:
      app: disagg-qwen3-omni
  template:
    metadata:
      labels:
        app: disagg-qwen3-omni
    spec:
      imagePullSecrets:
        - name: nvcr-dynamo-dev-pullsecret
      # See vllm-serve/deploy.yaml for rationale — same PVC-ownership story.
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: omni-disagg
          image: nvcr.io/nvidian/dynamo-dev/dynamo:vllm-runtime-ptarasiewicz-vllm0.20-omni-tzhouam-rebase-714694f8
          command: ["bash", "/etc/dynamo/launcher/launch.sh"]
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: hf-token-secret
          env:
            - name: DYN_HEALTH_CHECK_ENABLED
              value: "false"
          resources:
            limits:
              nvidia.com/gpu: "2"
              memory: "300Gi"
            requests:
              nvidia.com/gpu: "2"
              memory: "200Gi"
          volumeMounts:
            - name: stage-config
              mountPath: /etc/dynamo/stage_configs
            - name: launcher
              mountPath: /etc/dynamo/launcher
            - name: model-cache
              mountPath: /home/dynamo/.cache/huggingface
            - name: compilation-cache
              mountPath: /home/dynamo/.cache/vllm
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: stage-config
          configMap:
            name: qwen3-omni-stage-config
        - name: launcher
          configMap:
            name: qwen3-omni-disagg-launcher
            defaultMode: 0755
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache
        - name: compilation-cache
          persistentVolumeClaim:
            claimName: compilation-cache
        # SharedMemoryConnector handoff between stages — large enough to hold
        # thinker latents + talker codec codes for the full max_num_seqs batch.
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
