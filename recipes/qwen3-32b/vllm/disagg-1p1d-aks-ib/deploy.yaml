#
# Qwen3-32B BF16 disagg, 1 prefill + 1 decode, cross-node over Azure AKS InfiniBand.
# Purpose: measure NIXL KV-transfer bandwidth over the UCX/IB backend on
# Standard_ND96isr_* SKUs (8x ConnectX-7 NDR, one NIC per GPU, 3.2 Tb/s/VM).
# Topology: TP=8 prefill on node A, TP=8 decode on node B (pod anti-affinity).
# Cluster: dynamo-aks-dev (A100 80GB SXM4, 8x mlx5_ib0..7) or dynamo-aks-exp (same shape).
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: q32b-1p1d-aks-ib
spec:
  pvcs:
  - create: false
    name: shared-model-cache
  services:
    Frontend:
      componentType: frontend
      envs:
        - name: HF_HOME
          value: /shared-models
      extraPodSpec:
        # Frontend pulls the same 15 GB vllm-runtime image as workers. AKS default-pool
        # nodes (123 GiB OS disk) hit kubelet ephemeral-storage eviction during extraction.
        # Pin Frontend to the GPU node pools (1744 GiB disk) and tolerate the GPU taint
        # — Frontend doesn't request GPU resources so it doesn't consume one.
        tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: agentpool
                  operator: In
                  values: [a100a, a100b]
        mainContainer:
          # vllm-runtime:1.1.1 has a built-in ENTRYPOINT — overriding it crashes the Rust binary.
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          workingDir: /workspace
      replicas: 1
      resources:
        requests: { cpu: "4" }
        limits:   { cpu: "8" }
      subComponentType: null
      volumeMounts:
      - name: shared-model-cache
        mountPoint: /shared-models

    VllmPrefillWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodMetadata:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "19090"
          prometheus.io/path: "/metrics"
      extraPodSpec:
        tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        affinity:
          # Pin both workers to the same agentpool: AKS-dev has TWO A100 pools
          # (a100a, a100b) on SEPARATE IB partitions (pkey 0x8019 vs 0x8018).
          # Cross-pool RDMA handshake fails. Pin to a100a (2 schedulable nodes, 8 GPUs each).
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: agentpool
                  operator: In
                  values: [a100a]
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                - key: nvidia.com/dynamo-component-type
                  operator: In
                  values: [prefill, decode]
              topologyKey: kubernetes.io/hostname
        mainContainer:
          command: [python3, -m, dynamo.vllm]
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          workingDir: /workspace
          args:
          # Pass local snapshot path so fetch_model() short-circuits (model exists on PVC).
          # Avoids ModelExpress -> HF rate-limit. served-model-name keeps OpenAI-API identity.
          - --model
          - /shared-models/hub/models--Qwen--Qwen3-32B/snapshots/9216db5781bf21249d130ec9da846c4624c16137
          - --served-model-name
          - Qwen/Qwen3-32B
          - --disaggregation-mode
          - prefill
          - --kv-transfer-config
          - '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_connector_extra_config":{"backends":["UCX"]}}'
          - --tensor-parallel-size
          - '8'
          - --no-enable-log-requests
          - --gpu-memory-utilization
          - '0.90'
          - --async-scheduling
          - --block-size
          - '64'
          - --hf-overrides
          - '{"rope_scaling":{"rope_type":"yarn","factor":4.0,"original_max_position_embeddings":32768},"max_position_embeddings":131072}'
          - --max-model-len
          - '131072'
          securityContext:
            privileged: true
            runAsUser: 0
            capabilities:
              add: [IPC_LOCK, SYS_PTRACE]
          env:
          # --- NIXL telemetry (transport-neutral) ---
          - { name: NIXL_TELEMETRY_ENABLE,          value: "y" }
          - { name: NIXL_TELEMETRY_EXPORTER,        value: "prometheus" }
          - { name: NIXL_TELEMETRY_PROMETHEUS_PORT, value: "19090" }
          # NIXL backend: runtime defaults to UCX when DYN_KVBM_NIXL_BACKEND_LIBFABRIC
          # is unset, so no explicit selector env is needed here.
          # --- UCX over InfiniBand (8 ConnectX-7 rails: mlx5_ib0..mlx5_ib7) ---
          - { name: UCX_TLS,                value: "rc,cuda_copy,cuda_ipc" }
          # At TP=8, UCX tries to DMA-BUF-register each KV buffer on every listed device
          # (8 ranks x 8 devices = 64 registrations) and rank 2 -> mlx5_7 times out at kernel level.
          # Limiting to 4 devices keeps total registrations at 32 (same as known-working TP=4 case).
          - { name: UCX_NET_DEVICES,        value: "mlx5_0:1,mlx5_1:1,mlx5_2:1,mlx5_3:1" }
          - { name: UCX_IB_GPU_DIRECT_RDMA, value: "yes" }
          - { name: UCX_RNDV_THRESH,        value: "8192" }
          # --- NCCL over the same 8 IB rails; eth0 is control plane only ---
          - { name: NCCL_IB_HCA,            value: "mlx5_0,mlx5_1,mlx5_2,mlx5_3,mlx5_4,mlx5_5,mlx5_6,mlx5_7" }
          - { name: NCCL_IB_DISABLE,        value: "0" }
          - { name: NCCL_IB_GID_INDEX,      value: "3" }
          - { name: NCCL_SOCKET_IFNAME,     value: "eth0" }
          - { name: NCCL_DEBUG,             value: "WARN" }
          # --- Dynamo / vLLM ---
          - { name: DYN_HEALTH_CHECK_ENABLED, value: "false" }
          - { name: HF_HOME,                  value: /shared-models }
          - { name: VLLM_LOGGING_LEVEL,       value: "INFO" }
          volumeMounts:
          - { name: ib,  mountPath: /dev/infiniband }
          - { name: shared-model-cache, mountPath: /shared-models }
        volumes:
        - { name: ib,  hostPath: { path: /dev/infiniband } }
        - { name: shared-model-cache, persistentVolumeClaim: { claimName: shared-model-cache } }
      replicas: 1
      resources:
        limits:
          gpu: '8'
          custom:
            rdma/shared_ib: "1"
        requests:
          gpu: '8'
          custom:
            rdma/shared_ib: "1"
            ephemeral-storage: "2Gi"
      subComponentType: prefill
      volumeMounts:
      - name: shared-model-cache
        mountPoint: /shared-models

    VllmDecodeWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodMetadata:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "19090"
          prometheus.io/path: "/metrics"
      extraPodSpec:
        tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        affinity:
          # Pin both workers to the same agentpool: AKS-dev has TWO A100 pools
          # (a100a, a100b) on SEPARATE IB partitions (pkey 0x8019 vs 0x8018).
          # Cross-pool RDMA handshake fails. Pin to a100a (2 schedulable nodes, 8 GPUs each).
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: agentpool
                  operator: In
                  values: [a100a]
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                - key: nvidia.com/dynamo-component-type
                  operator: In
                  values: [prefill, decode]
              topologyKey: kubernetes.io/hostname
        mainContainer:
          command: [python3, -m, dynamo.vllm]
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          workingDir: /workspace
          args:
          - --model
          - /shared-models/hub/models--Qwen--Qwen3-32B/snapshots/9216db5781bf21249d130ec9da846c4624c16137
          - --served-model-name
          - Qwen/Qwen3-32B
          - --disaggregation-mode
          - decode
          - --kv-transfer-config
          - '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_connector_extra_config":{"backends":["UCX"]}}'
          - --tensor-parallel-size
          - '8'
          - --no-enable-log-requests
          - --gpu-memory-utilization
          - '0.90'
          - --no-enable-prefix-caching
          - --async-scheduling
          - --block-size
          - '64'
          - --hf-overrides
          - '{"rope_scaling":{"rope_type":"yarn","factor":4.0,"original_max_position_embeddings":32768},"max_position_embeddings":131072}'
          - --max-model-len
          - '131072'
          securityContext:
            privileged: true
            runAsUser: 0
            capabilities:
              add: [IPC_LOCK, SYS_PTRACE]
          env:
          - { name: NIXL_TELEMETRY_ENABLE,          value: "y" }
          - { name: NIXL_TELEMETRY_EXPORTER,        value: "prometheus" }
          - { name: NIXL_TELEMETRY_PROMETHEUS_PORT, value: "19090" }
          - { name: UCX_TLS,                value: "rc,cuda_copy,cuda_ipc" }
          # At TP=8, UCX tries to DMA-BUF-register each KV buffer on every listed device
          # (8 ranks x 8 devices = 64 registrations) and rank 2 -> mlx5_7 times out at kernel level.
          # Limiting to 4 devices keeps total registrations at 32 (same as known-working TP=4 case).
          - { name: UCX_NET_DEVICES,        value: "mlx5_0:1,mlx5_1:1,mlx5_2:1,mlx5_3:1" }
          - { name: UCX_IB_GPU_DIRECT_RDMA, value: "yes" }
          - { name: UCX_RNDV_THRESH,        value: "8192" }
          - { name: NCCL_IB_HCA,            value: "mlx5_0,mlx5_1,mlx5_2,mlx5_3,mlx5_4,mlx5_5,mlx5_6,mlx5_7" }
          - { name: NCCL_IB_DISABLE,        value: "0" }
          - { name: NCCL_IB_GID_INDEX,      value: "3" }
          - { name: NCCL_SOCKET_IFNAME,     value: "eth0" }
          - { name: NCCL_DEBUG,             value: "WARN" }
          - { name: DYN_HEALTH_CHECK_ENABLED, value: "false" }
          - { name: HF_HOME,                  value: /shared-models }
          - { name: VLLM_LOGGING_LEVEL,       value: "INFO" }
          volumeMounts:
          - { name: ib,  mountPath: /dev/infiniband }
          - { name: shared-model-cache, mountPath: /shared-models }
        volumes:
        - { name: ib,  hostPath: { path: /dev/infiniband } }
        - { name: shared-model-cache, persistentVolumeClaim: { claimName: shared-model-cache } }
      replicas: 1
      resources:
        limits:
          gpu: '8'
          custom:
            rdma/shared_ib: "1"
        requests:
          gpu: '8'
          custom:
            rdma/shared_ib: "1"
            ephemeral-storage: "2Gi"
      subComponentType: decode
      volumeMounts:
      - name: shared-model-cache
        mountPoint: /shared-models
