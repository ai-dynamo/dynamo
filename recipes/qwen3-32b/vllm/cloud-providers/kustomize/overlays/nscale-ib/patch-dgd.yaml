apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: q32b-1p1d-cloud-provider
spec:
  services:
    VllmPrefillWorker:
      extraPodSpec:
        tolerations: &gpuTolerations
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        mainContainer:
          env: &nscaleEnvironment
            - name: GPU_MEMORY_UTILIZATION
              value: "0.70"
            # Compute-fabric NICs only; mlx5_6..9 are side fabric on the referenced Nscale nodes.
            - name: UCX_NET_DEVICES
              value: mlx5_0:1,mlx5_1:1,mlx5_2:1,mlx5_3:1,mlx5_4:1,mlx5_5:1,mlx5_10:1,mlx5_11:1
            - name: NIXL_LOG_LEVEL
              value: INFO
          volumeMounts: &ibVolumeMounts
            - name: model-cache
              mountPath: /model-cache
            - name: ib
              mountPath: /dev/infiniband
            - name: shm
              mountPath: /dev/shm
        volumes: &ibVolumes
          - name: model-cache
            persistentVolumeClaim:
              claimName: model-cache
          - name: ib
            hostPath:
              path: /dev/infiniband
          - name: shm
            emptyDir:
              medium: Memory
              sizeLimit: 64Gi
      resources:
        limits:
          custom:
            rdma/ib: "1"
        requests:
          custom:
            rdma/ib: "1"
    VllmDecodeWorker:
      extraPodSpec:
        tolerations: *gpuTolerations
        mainContainer:
          env: *nscaleEnvironment
          volumeMounts: *ibVolumeMounts
        volumes: *ibVolumes
      resources:
        limits:
          custom:
            rdma/ib: "1"
        requests:
          custom:
            rdma/ib: "1"
