apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: q32b-1p1d-cloud-provider
spec:
  services:
    Frontend:
      resources:
        requests:
          custom:
            ephemeral-storage: 30Gi
    VllmPrefillWorker:
      extraPodSpec:
        tolerations: &gpuTolerations
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        mainContainer:
          env:
            - name: UCX_NET_DEVICES
              value: mlx5_0:1,mlx5_1:1,mlx5_2:1,mlx5_3:1
            - name: UCX_IB_GPU_DIRECT_RDMA
              value: "yes"
            - name: NCCL_SOCKET_IFNAME
              value: eth0
            - name: MODEL_NAME
              value: Qwen/Qwen3-32B
            - name: SERVED_MODEL_NAME
              value: Qwen/Qwen3-32B
            - name: KV_TRANSFER_CONFIG
              value: '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_connector_extra_config":{"backends":["UCX"]}}'
            - name: TENSOR_PARALLEL_SIZE
              value: "4"
            - name: GPU_MEMORY_UTILIZATION
              value: "0.90"
            - name: BLOCK_SIZE
              value: "64"
            - name: HF_OVERRIDES
              value: '{"rope_scaling":{"rope_type":"yarn","factor":4.0,"original_max_position_embeddings":32768},"max_position_embeddings":131072}'
            - name: MAX_MODEL_LEN
              value: "131072"
            - name: NIXL_TELEMETRY_ENABLE
              value: "y"
            - name: NIXL_TELEMETRY_EXPORTER
              value: prometheus
            - name: NIXL_TELEMETRY_PROMETHEUS_PORT
              value: "19090"
            - name: DYN_HEALTH_CHECK_ENABLED
              value: "false"
            - name: HF_HOME
              value: /model-cache
            - name: VLLM_LOGGING_LEVEL
              value: INFO
            - name: NCCL_DEBUG
              value: WARN
          volumeMounts: &aksVolumeMounts
            - name: model-cache
              mountPath: /model-cache
            - name: ib
              mountPath: /dev/infiniband
        volumes: &aksVolumes
          - name: model-cache
            persistentVolumeClaim:
              claimName: model-cache
          - name: ib
            hostPath:
              path: /dev/infiniband
      resources:
        limits:
          custom:
            rdma/shared_ib: "1"
        requests:
          custom:
            rdma/shared_ib: "1"
    VllmDecodeWorker:
      extraPodSpec:
        tolerations: *gpuTolerations
        mainContainer:
          env:
            - name: UCX_NET_DEVICES
              value: mlx5_0:1,mlx5_1:1,mlx5_2:1,mlx5_3:1
            - name: UCX_IB_GPU_DIRECT_RDMA
              value: "yes"
            - name: NCCL_SOCKET_IFNAME
              value: eth0
            - name: MODEL_NAME
              value: Qwen/Qwen3-32B
            - name: SERVED_MODEL_NAME
              value: Qwen/Qwen3-32B
            - name: KV_TRANSFER_CONFIG
              value: '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_connector_extra_config":{"backends":["UCX"]}}'
            - name: TENSOR_PARALLEL_SIZE
              value: "4"
            - name: GPU_MEMORY_UTILIZATION
              value: "0.90"
            - name: BLOCK_SIZE
              value: "64"
            - name: HF_OVERRIDES
              value: '{"rope_scaling":{"rope_type":"yarn","factor":4.0,"original_max_position_embeddings":32768},"max_position_embeddings":131072}'
            - name: MAX_MODEL_LEN
              value: "131072"
            - name: NIXL_TELEMETRY_ENABLE
              value: "y"
            - name: NIXL_TELEMETRY_EXPORTER
              value: prometheus
            - name: NIXL_TELEMETRY_PROMETHEUS_PORT
              value: "19090"
            - name: DYN_HEALTH_CHECK_ENABLED
              value: "false"
            - name: HF_HOME
              value: /model-cache
            - name: VLLM_LOGGING_LEVEL
              value: INFO
            - name: NCCL_DEBUG
              value: WARN
          volumeMounts: *aksVolumeMounts
        volumes: *aksVolumes
      resources:
        limits:
          custom:
            rdma/shared_ib: "1"
        requests:
          custom:
            rdma/shared_ib: "1"
