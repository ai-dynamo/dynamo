apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: q32b-1p1d-cloud-provider
spec:
  services:
    VllmPrefillWorker:
      extraPodSpec:
        mainContainer:
          env: &efaEnvironment
            - name: KV_TRANSFER_CONFIG
              value: '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_connector_extra_config":{"backends":["LIBFABRIC"]}}'
            - name: DYN_KVBM_NIXL_BACKEND_LIBFABRIC
              value: "true"
            - name: DYN_KVBM_NIXL_BACKEND_UCX
              value: "false"
            - name: FI_PROVIDER
              value: efa
            - name: FI_EFA_USE_DEVICE_RDMA
              value: "1"
            - name: FI_EFA_ENABLE_SHM_TRANSFER
              value: "0"
            - name: FI_LOG_LEVEL
              value: warn
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1-efa-amd64
      resources:
        limits:
          custom:
            vpc.amazonaws.com/efa: "16"
        requests:
          custom:
            vpc.amazonaws.com/efa: "16"
    VllmDecodeWorker:
      extraPodSpec:
        mainContainer:
          env: *efaEnvironment
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1-efa-amd64
      resources:
        limits:
          custom:
            vpc.amazonaws.com/efa: "16"
        requests:
          custom:
            vpc.amazonaws.com/efa: "16"
