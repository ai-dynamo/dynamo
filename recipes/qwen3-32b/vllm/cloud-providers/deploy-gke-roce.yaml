# Qwen3-32B BF16 disagg, 1 prefill + 1 decode, with provider-specific RDMA in overlays.
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: q32b-1p1d-cloud-provider
spec:
  pvcs:
  - create: false
    name: model-cache
  services:
    Frontend:
      componentType: frontend
      envs:
      - name: HF_HOME
        value: /model-cache
      extraPodSpec:
        imagePullSecrets:
        - name: nvcr-pull-secret
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/dynamo-frontend:1.1.1
          securityContext:
            runAsUser: 0
          volumeMounts:
          - mountPath: /model-cache
            name: model-cache
          workingDir: /workspace
        volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache
      replicas: 1
      resources:
        limits:
          cpu: "8"
        requests:
          cpu: "4"
      subComponentType: null
    VllmDecodeWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodMetadata:
        annotations:
          networking.gke.io/default-interface: eth0
          networking.gke.io/interfaces: |
            [{"interfaceName":"eth0","network":"default"},
             {"interfaceName":"eth2","network":"rdma-0"},
             {"interfaceName":"eth3","network":"rdma-1"},
             {"interfaceName":"eth4","network":"rdma-2"},
             {"interfaceName":"eth5","network":"rdma-3"}]
          prometheus.io/path: /metrics
          prometheus.io/port: "19090"
          prometheus.io/scrape: "true"
      extraPodSpec:
        imagePullSecrets:
        - name: nvcr-pull-secret
        mainContainer:
          args:
          - |
            exec python3 -m dynamo.vllm \
              --model "${MODEL_NAME}" \
              --served-model-name "${SERVED_MODEL_NAME}" \
              --disaggregation-mode decode \
              --kv-transfer-config "${KV_TRANSFER_CONFIG}" \
              --tensor-parallel-size "${TENSOR_PARALLEL_SIZE}" \
              --no-enable-log-requests \
              --gpu-memory-utilization "${GPU_MEMORY_UTILIZATION}" \
              --no-enable-prefix-caching \
              --async-scheduling \
              --block-size "${BLOCK_SIZE}" \
              --hf-overrides "${HF_OVERRIDES}" \
              --max-model-len "${MAX_MODEL_LEN}"
          command:
          - /bin/sh
          - -lc
          env:
          - name: KV_TRANSFER_CONFIG
            value: '{"kv_connector":"NixlConnector","kv_role":"kv_both"}'
          - name: NCCL_SOCKET_IFNAME
            value: eth0
          - name: NCCL_CROSS_NIC
            value: "0"
          - name: MODEL_NAME
            value: Qwen/Qwen3-32B
          - name: SERVED_MODEL_NAME
            value: Qwen/Qwen3-32B
          - name: TENSOR_PARALLEL_SIZE
            value: "4"
          - name: GPU_MEMORY_UTILIZATION
            value: "0.90"
          - name: BLOCK_SIZE
            value: "64"
          - name: HF_OVERRIDES
            value: '{"rope_scaling":{"rope_type":"yarn","factor":4.0,"original_max_position_embeddings":32768},"max_position_embeddings":131072}'
          - name: MAX_MODEL_LEN
            value: "131072"
          - name: NIXL_TELEMETRY_ENABLE
            value: "y"
          - name: NIXL_TELEMETRY_EXPORTER
            value: prometheus
          - name: NIXL_TELEMETRY_PROMETHEUS_PORT
            value: "19090"
          - name: DYN_HEALTH_CHECK_ENABLED
            value: "false"
          - name: HF_HOME
            value: /model-cache
          - name: VLLM_LOGGING_LEVEL
            value: INFO
          - name: NCCL_DEBUG
            value: WARN
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          securityContext:
            capabilities:
              add:
              - IPC_LOCK
              - SYS_PTRACE
            privileged: true
            runAsUser: 0
          volumeMounts:
          - mountPath: /usr/local/gib
            name: gib
          - mountPath: /usr/local/nvidia
            name: nvidia
          - mountPath: /model-cache
            name: model-cache
          workingDir: /workspace
        tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Exists
        - effect: NoSchedule
          key: kubernetes.io/arch
          operator: Equal
          value: arm64
        volumes:
        - hostPath:
            path: /home/kubernetes/bin/gib
          name: gib
        - hostPath:
            path: /home/kubernetes/bin/nvidia
          name: nvidia
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache
      replicas: 1
      resources:
        limits:
          custom:
            networking.gke.io.networks/rdma-0: "1"
            networking.gke.io.networks/rdma-0.IP: "1"
            networking.gke.io.networks/rdma-1: "1"
            networking.gke.io.networks/rdma-1.IP: "1"
            networking.gke.io.networks/rdma-2: "1"
            networking.gke.io.networks/rdma-2.IP: "1"
            networking.gke.io.networks/rdma-3: "1"
            networking.gke.io.networks/rdma-3.IP: "1"
          gpu: "4"
        requests:
          custom:
            ephemeral-storage: 2Gi
            networking.gke.io.networks/rdma-0: "1"
            networking.gke.io.networks/rdma-0.IP: "1"
