#
# Qwen3-32B BF16 disagg, 1 prefill + 1 decode, cross-node over Azure AKS InfiniBand.
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: q32b-1p1d-aks-ib
spec:
  pvcs:
  - create: false
    name: shared-model-cache
  services:
    Frontend:
      componentType: frontend
      envs:
        - name: HF_HOME
          value: /shared-models
      extraPodSpec:
        # Tolerate the GPU taint so Frontend can land on either CPU or GPU pool —
        # no agentpool pinning. Scheduler picks based on the ephemeral-storage
        # request below (which excludes too-small-disk nodes regardless of cloud).
        tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          workingDir: /workspace
      replicas: 1
      resources:
        # ephemeral-storage request: the vllm-runtime:1.1.1 image is ~15 GB
        # registry, ~30 GB extracted. 30Gi here excludes nodes that don't have
        # enough disk to extract+hold the image cleanly (avoids the kubelet
        # image-GC eviction loop seen on AKS-dev system-pool 123-GiB nodes).
        # Tune up if your cluster's GPU pool nodes have <60 GiB allocatable.
        requests: { cpu: "4", ephemeral-storage: "30Gi" }
        limits:   { cpu: "8" }
      subComponentType: null
      volumeMounts:
      - name: shared-model-cache
        mountPoint: /shared-models

    VllmPrefillWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodMetadata:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "19090"
          prometheus.io/path: "/metrics"
      extraPodSpec:
        tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        affinity:
          # No nodeAffinity / agentpool pinning — recipe is portable across any
          # AKS cluster. The GPU resource request below ensures workers only land
          # on GPU-capable nodes (the actual constraint, not pool names).
          # Per-cluster override: on multi-pool clusters where GPU pools live on
          # SEPARATE IB partitions (different pkeys → cross-pool RDMA handshake
          # may fail), add a nodeAffinity selecting one specific pool. Whether
          # cross-pool actually fails is cluster-specific — verify on your
          # cluster before adding pinning (we have not verified it on dynamo-aks-dev
          # but documented it as a hypothesis).
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                - key: nvidia.com/dynamo-component-type
                  operator: In
                  values: [prefill, decode]
              topologyKey: kubernetes.io/hostname
        mainContainer:
          command: [python3, -m, dynamo.vllm]
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          workingDir: /workspace
          args:
          - --model
          - Qwen/Qwen3-32B
          - --served-model-name
          - Qwen/Qwen3-32B
          - --disaggregation-mode
          - prefill
          - --kv-transfer-config
          - '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_connector_extra_config":{"backends":["UCX"]}}'
          - --tensor-parallel-size
          - '4'
          - --no-enable-log-requests
          - --gpu-memory-utilization
          - '0.90'
          - --async-scheduling
          - --block-size
          - '64'
          - --hf-overrides
          - '{"rope_scaling":{"rope_type":"yarn","factor":4.0,"original_max_position_embeddings":32768},"max_position_embeddings":131072}'
          - --max-model-len
          - '131072'
          securityContext:
            privileged: true
            runAsUser: 0
            capabilities:
              add: [IPC_LOCK, SYS_PTRACE]
          env:
          # --- NIXL telemetry (transport-neutral) ---
          - { name: NIXL_TELEMETRY_ENABLE,          value: "y" }
          - { name: NIXL_TELEMETRY_EXPORTER,        value: "prometheus" }
          - { name: NIXL_TELEMETRY_PROMETHEUS_PORT, value: "19090" }
          # NIXL backend: runtime defaults to UCX when DYN_KVBM_NIXL_BACKEND_LIBFABRIC
          # is unset, so no explicit selector env is needed here.
          # --- UCX over InfiniBand (8 ConnectX-6/CX-7 rails: mlx5_0..mlx5_7) ---
          # NOTE: don't set UCX_TLS. UCX needs internal transports (notably ud_mlx5
          # for active-messages wireup) that an explicit allowlist almost always
          # omits, breaking transport selection. Let UCX auto-probe.
          # NOTE: no UCX_NET_DEVICES. Verified at both TP=4 and TP=8 via smoke tests:
          #   - 2026-05-28 (TP=4): all 4 ranks "Backend UCX was instantiated"; single
          #     inference agent_rx 0 → 4 MiB.
          #   - 2026-05-29 (TP=8): all 8 ranks "Backend UCX was instantiated"; KV cache
          #     registered (62.51 GiB/rank, 2,048,384 tokens). No DMA-BUF kernel timeout.
          # The 8-ranks × 8-NICs = 64-registrations DMA-BUF kernel timeout is specific
          # to an EXPLICIT 8-NIC UCX_NET_DEVICES list. UCX auto-probe is smarter — it
          # appears to do per-rank-preferred registration that stays under the kernel
          # threshold. The 1.88 GB/s Mooncake number in the README was collected with
          # the prior 4-NIC explicit list (2026-05-27); the recipe now ships without
          # UCX_NET_DEVICES at any TP — see README "Test trail" block.
          - { name: UCX_IB_GPU_DIRECT_RDMA, value: "yes" }
          # NOTE: no UCX_RNDV_THRESH. The "=8192" value was cargo-culted with no
          # test record; removing it produced no behavioral change (smoke verified
          # 2026-05-29). UCX defaults are fine here.
          # --- NCCL: env loaded but IB transport never exercised in 1P1D ---
          # Intra-pod TP collectives = NVLink/P2P (single-node ring; verified
          # 2026-05-29 with NCCL_DEBUG=INFO: 24 P2P channels, 0 IB channels).
          # Cross-pod KV transfer = NIXL/UCX, not NCCL. So NCCL_IB_GID_INDEX is
          # *moot* in this pattern — was previously set to 3 on RoCEv2 convention
          # but link bring-up doesn't happen and the value isn't read by any
          # active code path. Dropped 2026-05-29.
          - { name: NCCL_IB_HCA,            value: "mlx5_0,mlx5_1,mlx5_2,mlx5_3,mlx5_4,mlx5_5,mlx5_6,mlx5_7" }
          - { name: NCCL_IB_DISABLE,        value: "0" }
          - { name: NCCL_SOCKET_IFNAME,     value: "eth0" }
          - { name: NCCL_DEBUG,             value: "WARN" }
          # --- Dynamo / vLLM ---
          - { name: DYN_HEALTH_CHECK_ENABLED, value: "false" }
          - { name: HF_HOME,                  value: /shared-models }
          - { name: VLLM_LOGGING_LEVEL,       value: "INFO" }
          volumeMounts:
          - { name: ib,  mountPath: /dev/infiniband }
          - { name: shared-model-cache, mountPath: /shared-models }
        volumes:
        - { name: ib,  hostPath: { path: /dev/infiniband } }
        - { name: shared-model-cache, persistentVolumeClaim: { claimName: shared-model-cache } }
      replicas: 1
      resources:
        limits:
          gpu: '4'
          custom:
            rdma/shared_ib: "1"
        requests:
          gpu: '4'
          custom:
            rdma/shared_ib: "1"
            ephemeral-storage: "2Gi"
      subComponentType: prefill
      volumeMounts:
      - name: shared-model-cache
        mountPoint: /shared-models

    VllmDecodeWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodMetadata:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "19090"
          prometheus.io/path: "/metrics"
      extraPodSpec:
        tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        affinity:
          # No nodeAffinity / agentpool pinning — recipe is portable across any
          # AKS cluster. The GPU resource request below ensures workers only land
          # on GPU-capable nodes (the actual constraint, not pool names).
          # Per-cluster override: on multi-pool clusters where GPU pools live on
          # SEPARATE IB partitions (different pkeys → cross-pool RDMA handshake
          # may fail), add a nodeAffinity selecting one specific pool. Whether
          # cross-pool actually fails is cluster-specific — verify on your
          # cluster before adding pinning (we have not verified it on dynamo-aks-dev
          # but documented it as a hypothesis).
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                - key: nvidia.com/dynamo-component-type
                  operator: In
                  values: [prefill, decode]
              topologyKey: kubernetes.io/hostname
        mainContainer:
          command: [python3, -m, dynamo.vllm]
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          workingDir: /workspace
          args:
          - --model
          - /shared-models/hub/models--Qwen--Qwen3-32B/snapshots/9216db5781bf21249d130ec9da846c4624c16137
          - --served-model-name
          - Qwen/Qwen3-32B
          - --disaggregation-mode
          - decode
          - --kv-transfer-config
          - '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_connector_extra_config":{"backends":["UCX"]}}'
          - --tensor-parallel-size
          - '4'
          - --no-enable-log-requests
          - --gpu-memory-utilization
          - '0.90'
          - --no-enable-prefix-caching
          - --async-scheduling
          - --block-size
          - '64'
          - --hf-overrides
          - '{"rope_scaling":{"rope_type":"yarn","factor":4.0,"original_max_position_embeddings":32768},"max_position_embeddings":131072}'
          - --max-model-len
          - '131072'
          securityContext:
            privileged: true
            runAsUser: 0
            capabilities:
              add: [IPC_LOCK, SYS_PTRACE]
          env:
          - { name: NIXL_TELEMETRY_ENABLE,          value: "y" }
          - { name: NIXL_TELEMETRY_EXPORTER,        value: "prometheus" }
          - { name: NIXL_TELEMETRY_PROMETHEUS_PORT, value: "19090" }
          # NOTE: no UCX_TLS — see prefill block; let UCX auto-probe.
          # NOTE: no UCX_NET_DEVICES — see prefill block. Auto-probe verified at
          # both TP=4 (2026-05-28) and TP=8 (2026-05-29) on AKS-dev a100a.
          - { name: UCX_IB_GPU_DIRECT_RDMA, value: "yes" }
          # NOTE: no UCX_RNDV_THRESH. The "=8192" value was cargo-culted with no
          # test record; removing it produced no behavioral change (smoke verified
          # 2026-05-29). UCX defaults are fine here.
          - { name: NCCL_IB_HCA,            value: "mlx5_0,mlx5_1,mlx5_2,mlx5_3,mlx5_4,mlx5_5,mlx5_6,mlx5_7" }
          - { name: NCCL_IB_DISABLE,        value: "0" }
          - { name: NCCL_IB_GID_INDEX,      value: "3" }
          - { name: NCCL_SOCKET_IFNAME,     value: "eth0" }
          - { name: NCCL_DEBUG,             value: "WARN" }
          - { name: DYN_HEALTH_CHECK_ENABLED, value: "false" }
          - { name: HF_HOME,                  value: /shared-models }
          - { name: VLLM_LOGGING_LEVEL,       value: "INFO" }
          volumeMounts:
          - { name: ib,  mountPath: /dev/infiniband }
          - { name: shared-model-cache, mountPath: /shared-models }
        volumes:
        - { name: ib,  hostPath: { path: /dev/infiniband } }
        - { name: shared-model-cache, persistentVolumeClaim: { claimName: shared-model-cache } }
      replicas: 1
      resources:
        limits:
          gpu: '4'
          custom:
            rdma/shared_ib: "1"
        requests:
          gpu: '4'
          custom:
            rdma/shared_ib: "1"
            ephemeral-storage: "2Gi"
      subComponentType: decode
      volumeMounts:
      - name: shared-model-cache
        mountPoint: /shared-models
