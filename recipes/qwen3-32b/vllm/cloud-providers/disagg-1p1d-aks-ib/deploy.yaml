#
# Qwen3-32B BF16 disagg, 1 prefill + 1 decode, cross-node over Azure AKS InfiniBand.
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: q32b-1p1d-aks-ib
spec:
  pvcs:
  - create: false
    name: shared-model-cache
  services:
    Frontend:
      componentType: frontend
      envs:
        - name: HF_HOME
          value: /shared-models
      extraPodSpec:
        # Tolerate the GPU taint so Frontend can land on either CPU or GPU pool —
        # no agentpool pinning. Scheduler picks based on the ephemeral-storage
        # request below (which excludes too-small-disk nodes regardless of cloud).
        tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          workingDir: /workspace
      replicas: 1
      resources:
        # ephemeral-storage request: the vllm-runtime:1.1.1 image is ~15 GB
        # registry, ~30 GB extracted. 30Gi here excludes nodes that don't have
        # enough disk to extract+hold the image cleanly (avoids the kubelet
        # image-GC eviction loop seen on small-disk CPU-pool nodes).
        # Tune up if your cluster's GPU pool nodes have <60 GiB allocatable.
        requests: { cpu: "4", custom: { ephemeral-storage: "30Gi" } }
        limits:   { cpu: "8" }
      subComponentType: null
      volumeMounts:
      - name: shared-model-cache
        mountPoint: /shared-models

    VllmPrefillWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodMetadata:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "19090"
          prometheus.io/path: "/metrics"
      extraPodSpec:
        tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        affinity:
          # No nodeAffinity / agentpool pinning — recipe is portable across any
          # AKS cluster. The GPU resource request below ensures workers only land
          # on GPU-capable nodes (the actual constraint, not pool names).
          # Per-cluster override: on multi-pool clusters where GPU pools live on
          # SEPARATE IB partitions (different pkeys → cross-pool RDMA handshake
          # may fail), add a nodeAffinity selecting one specific pool. Whether
          # cross-pool actually fails is cluster-specific — verify on your
          # cluster before adding pinning.
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                # Both workers are componentType: worker (the operator puts
                # prefill/decode on the sub-component-type label, not here), so match
                # "worker" to repel the two onto separate nodes for cross-node KV.
                - key: nvidia.com/dynamo-component-type
                  operator: In
                  values: [worker]
              topologyKey: kubernetes.io/hostname
        mainContainer:
          command: [python3, -m, dynamo.vllm]
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          workingDir: /workspace
          args:
          - --model
          - Qwen/Qwen3-32B
          - --served-model-name
          - Qwen/Qwen3-32B
          - --disaggregation-mode
          - prefill
          - --kv-transfer-config
          - '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_connector_extra_config":{"backends":["UCX"]}}'
          - --tensor-parallel-size
          - '4'
          - --no-enable-log-requests
          - --gpu-memory-utilization
          - '0.90'
          - --async-scheduling
          - --block-size
          - '64'
          - --hf-overrides
          - '{"rope_scaling":{"rope_type":"yarn","factor":4.0,"original_max_position_embeddings":32768},"max_position_embeddings":131072}'
          - --max-model-len
          - '131072'
          securityContext:
            privileged: true
            runAsUser: 0
            capabilities:
              add: [IPC_LOCK, SYS_PTRACE]
          env:
          # --- NIXL telemetry (transport-neutral) ---
          - { name: NIXL_TELEMETRY_ENABLE,          value: "y" }
          - { name: NIXL_TELEMETRY_EXPORTER,        value: "prometheus" }
          - { name: NIXL_TELEMETRY_PROMETHEUS_PORT, value: "19090" }
          # NIXL backend: runtime defaults to UCX when DYN_KVBM_NIXL_BACKEND_LIBFABRIC
          # is unset, so no explicit selector env is needed here.
          # --- UCX over InfiniBand ---
          # Do not set UCX_TLS: an explicit transport allowlist can omit the internal
          # transports UCX needs for connection wireup. Let UCX choose transports.
          # UCX_NET_DEVICES is required: it restricts KV transfer to the compute-fabric
          # NICs (mlx5_0..3). Without it, UCX auto-probe may bind a non-compute
          # (side-fabric) NIC, which sharply degrades KV-transfer performance and leaves
          # the NIXL KV-bandwidth telemetry counter reading zero.
          - { name: UCX_NET_DEVICES,        value: "mlx5_0:1,mlx5_1:1,mlx5_2:1,mlx5_3:1" }
          - { name: UCX_IB_GPU_DIRECT_RDMA, value: "yes" }
          # --- NCCL: IB transport is not exercised in 1P1D. Intra-pod TP collectives
          # use NVLink/P2P; cross-pod KV transfer uses NIXL/UCX, not NCCL. ---
          - { name: NCCL_IB_HCA,            value: "mlx5_0,mlx5_1,mlx5_2,mlx5_3,mlx5_4,mlx5_5,mlx5_6,mlx5_7" }
          - { name: NCCL_IB_DISABLE,        value: "0" }
          - { name: NCCL_SOCKET_IFNAME,     value: "eth0" }
          - { name: NCCL_DEBUG,             value: "WARN" }
          # --- Dynamo / vLLM ---
          - { name: DYN_HEALTH_CHECK_ENABLED, value: "false" }
          - { name: HF_HOME,                  value: /shared-models }
          - { name: VLLM_LOGGING_LEVEL,       value: "INFO" }
          volumeMounts:
          - { name: ib,  mountPath: /dev/infiniband }
          - { name: shared-model-cache, mountPath: /shared-models }
        volumes:
        - { name: ib,  hostPath: { path: /dev/infiniband } }
        - { name: shared-model-cache, persistentVolumeClaim: { claimName: shared-model-cache } }
      replicas: 1
      resources:
        limits:
          gpu: '4'
          custom:
            rdma/shared_ib: "1"
        requests:
          gpu: '4'
          custom:
            rdma/shared_ib: "1"
            ephemeral-storage: "2Gi"
      subComponentType: prefill
      volumeMounts:
      - name: shared-model-cache
        mountPoint: /shared-models

    VllmDecodeWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodMetadata:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "19090"
          prometheus.io/path: "/metrics"
      extraPodSpec:
        tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        affinity:
          # No nodeAffinity / agentpool pinning — recipe is portable across any
          # AKS cluster. The GPU resource request below ensures workers only land
          # on GPU-capable nodes (the actual constraint, not pool names).
          # Per-cluster override: on multi-pool clusters where GPU pools live on
          # SEPARATE IB partitions (different pkeys → cross-pool RDMA handshake
          # may fail), add a nodeAffinity selecting one specific pool. Whether
          # cross-pool actually fails is cluster-specific — verify on your
          # cluster before adding pinning.
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                # Both workers are componentType: worker (the operator puts
                # prefill/decode on the sub-component-type label, not here), so match
                # "worker" to repel the two onto separate nodes for cross-node KV.
                - key: nvidia.com/dynamo-component-type
                  operator: In
                  values: [worker]
              topologyKey: kubernetes.io/hostname
        mainContainer:
          command: [python3, -m, dynamo.vllm]
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          workingDir: /workspace
          args:
          - --model
          - Qwen/Qwen3-32B
          - --served-model-name
          - Qwen/Qwen3-32B
          - --disaggregation-mode
          - decode
          - --kv-transfer-config
          - '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_connector_extra_config":{"backends":["UCX"]}}'
          - --tensor-parallel-size
          - '4'
          - --no-enable-log-requests
          - --gpu-memory-utilization
          - '0.90'
          - --no-enable-prefix-caching
          - --async-scheduling
          - --block-size
          - '64'
          - --hf-overrides
          - '{"rope_scaling":{"rope_type":"yarn","factor":4.0,"original_max_position_embeddings":32768},"max_position_embeddings":131072}'
          - --max-model-len
          - '131072'
          securityContext:
            privileged: true
            runAsUser: 0
            capabilities:
              add: [IPC_LOCK, SYS_PTRACE]
          env:
          - { name: NIXL_TELEMETRY_ENABLE,          value: "y" }
          - { name: NIXL_TELEMETRY_EXPORTER,        value: "prometheus" }
          - { name: NIXL_TELEMETRY_PROMETHEUS_PORT, value: "19090" }
          # UCX over InfiniBand — see prefill block. UCX_NET_DEVICES is required:
          # it pins KV transfer to the compute-fabric NICs (mlx5_0..3); without it,
          # auto-probe may bind a non-compute NIC, degrading performance and zeroing
          # the NIXL KV-bandwidth telemetry counter. Do not set UCX_TLS.
          - { name: UCX_NET_DEVICES,        value: "mlx5_0:1,mlx5_1:1,mlx5_2:1,mlx5_3:1" }
          - { name: UCX_IB_GPU_DIRECT_RDMA, value: "yes" }
          - { name: NCCL_IB_HCA,            value: "mlx5_0,mlx5_1,mlx5_2,mlx5_3,mlx5_4,mlx5_5,mlx5_6,mlx5_7" }
          - { name: NCCL_IB_DISABLE,        value: "0" }
          - { name: NCCL_IB_GID_INDEX,      value: "3" }
          - { name: NCCL_SOCKET_IFNAME,     value: "eth0" }
          - { name: NCCL_DEBUG,             value: "WARN" }
          - { name: DYN_HEALTH_CHECK_ENABLED, value: "false" }
          - { name: HF_HOME,                  value: /shared-models }
          - { name: VLLM_LOGGING_LEVEL,       value: "INFO" }
          volumeMounts:
          - { name: ib,  mountPath: /dev/infiniband }
          - { name: shared-model-cache, mountPath: /shared-models }
        volumes:
        - { name: ib,  hostPath: { path: /dev/infiniband } }
        - { name: shared-model-cache, persistentVolumeClaim: { claimName: shared-model-cache } }
      replicas: 1
      resources:
        limits:
          gpu: '4'
          custom:
            rdma/shared_ib: "1"
        requests:
          gpu: '4'
          custom:
            rdma/shared_ib: "1"
            ephemeral-storage: "2Gi"
      subComponentType: decode
      volumeMounts:
      - name: shared-model-cache
        mountPoint: /shared-models
