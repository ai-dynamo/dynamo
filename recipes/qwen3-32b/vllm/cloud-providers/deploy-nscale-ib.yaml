# Qwen3-32B BF16 disagg, 1 prefill + 1 decode, with provider-specific RDMA in overlays.
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: q32b-1p1d-cloud-provider
spec:
  pvcs:
  - create: false
    name: model-cache
  services:
    Frontend:
      componentType: frontend
      envs:
      - name: HF_HOME
        value: /model-cache
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/dynamo-frontend:1.1.1
          securityContext:
            runAsUser: 0
          volumeMounts:
          - mountPath: /model-cache
            name: model-cache
          workingDir: /workspace
        volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache
      replicas: 1
      resources:
        limits:
          cpu: "8"
        requests:
          cpu: "4"
      subComponentType: null
    VllmDecodeWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodMetadata:
        annotations:
          prometheus.io/path: /metrics
          prometheus.io/port: "19090"
          prometheus.io/scrape: "true"
      extraPodSpec:
        mainContainer:
          args:
          - |
            exec python3 -m dynamo.vllm \
              --model "${MODEL_NAME}" \
              --served-model-name "${SERVED_MODEL_NAME}" \
              --disaggregation-mode decode \
              --kv-transfer-config "${KV_TRANSFER_CONFIG}" \
              --tensor-parallel-size "${TENSOR_PARALLEL_SIZE}" \
              --no-enable-log-requests \
              --gpu-memory-utilization "${GPU_MEMORY_UTILIZATION}" \
              --no-enable-prefix-caching \
              --async-scheduling \
              --block-size "${BLOCK_SIZE}" \
              --hf-overrides "${HF_OVERRIDES}" \
              --max-model-len "${MAX_MODEL_LEN}"
          command:
          - /bin/sh
          - -lc
          env:
          - name: GPU_MEMORY_UTILIZATION
            value: "0.70"
          - name: UCX_NET_DEVICES
            value: mlx5_0:1,mlx5_1:1,mlx5_2:1,mlx5_3:1,mlx5_4:1,mlx5_5:1,mlx5_10:1,mlx5_11:1
          - name: NIXL_LOG_LEVEL
            value: INFO
          - name: MODEL_NAME
            value: Qwen/Qwen3-32B
          - name: SERVED_MODEL_NAME
            value: Qwen/Qwen3-32B
          - name: KV_TRANSFER_CONFIG
            value: '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_connector_extra_config":{"backends":["UCX"]}}'
          - name: TENSOR_PARALLEL_SIZE
            value: "4"
          - name: BLOCK_SIZE
            value: "64"
          - name: HF_OVERRIDES
            value: '{"rope_scaling":{"rope_type":"yarn","factor":4.0,"original_max_position_embeddings":32768},"max_position_embeddings":131072}'
          - name: MAX_MODEL_LEN
            value: "131072"
          - name: NIXL_TELEMETRY_ENABLE
            value: "y"
          - name: NIXL_TELEMETRY_EXPORTER
            value: prometheus
          - name: NIXL_TELEMETRY_PROMETHEUS_PORT
            value: "19090"
          - name: DYN_HEALTH_CHECK_ENABLED
            value: "false"
          - name: HF_HOME
            value: /model-cache
          - name: VLLM_LOGGING_LEVEL
            value: INFO
          - name: NCCL_DEBUG
            value: WARN
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          securityContext:
            capabilities:
              add:
              - IPC_LOCK
              - SYS_PTRACE
            privileged: true
            runAsUser: 0
          volumeMounts:
          - mountPath: /model-cache
            name: model-cache
          - mountPath: /dev/infiniband
            name: ib
          - mountPath: /dev/shm
            name: shm
          workingDir: /workspace
        tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Exists
        volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache
        - hostPath:
            path: /dev/infiniband
          name: ib
        - emptyDir:
            medium: Memory
            sizeLimit: 64Gi
          name: shm
      replicas: 1
      resources:
        limits:
          custom:
