#
# Qwen3-32B BF16 disagg, 1 prefill + 1 decode, cross-node over Nscale NDR InfiniBand.
#
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: q32b-1p1d-nscale-ib
spec:
  pvcs:
  - create: false
    name: shared-model-cache
  services:
    Frontend:
      componentType: frontend
      envs:
        - name: HF_HOME
          value: /shared-models
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/dynamo-frontend:1.1.1
          workingDir: /workspace
      replicas: 1
      resources:
        requests: { cpu: "4" }
        limits:   { cpu: "8" }
      subComponentType: null
      volumeMounts:
      - name: shared-model-cache
        mountPoint: /shared-models

    VllmPrefillWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodMetadata:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "19090"
          prometheus.io/path: "/metrics"
      extraPodSpec:
        tolerations:
        - { key: nvidia.com/gpu, operator: Exists, effect: NoSchedule }
        mainContainer:
          command: [python3, -m, dynamo.vllm]
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          workingDir: /workspace
          args:
          - --model
          - Qwen/Qwen3-32B
          - --disaggregation-mode
          - prefill
          - --kv-transfer-config
          - '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_connector_extra_config":{"backends":["UCX"]}}'
          - --tensor-parallel-size
          - '4'
          - --no-enable-log-requests
          - --gpu-memory-utilization
          - '0.70'
          - --async-scheduling
          - --block-size
          - '64'
          - --hf-overrides
          - '{"rope_scaling":{"rope_type":"yarn","factor":4.0,"original_max_position_embeddings":32768},"max_position_embeddings":131072}'
          - --max-model-len
          - '131072'
          securityContext:
            privileged: true
            runAsUser: 0
            capabilities:
              add: [IPC_LOCK, SYS_PTRACE]
          env:
          # --- NIXL telemetry + UCX defaults (no explicit backend toggle: UCX is the default) ---
          - { name: NIXL_TELEMETRY_ENABLE,           value: "y" }
          - { name: NIXL_TELEMETRY_EXPORTER,         value: "prometheus" }
          - { name: NIXL_TELEMETRY_PROMETHEUS_PORT,  value: "19090" }
          # --- UCX IB: explicit NIC list is LOAD-BEARING on Nscale ---
          # Side fabric (mlx5_6..9) must be excluded: mixing fabrics caused
          # NIXL_ERR_REMOTE_DISCONNECT at first transfer in earlier experiments.
          - { name: UCX_NET_DEVICES,    value: "mlx5_0:1,mlx5_1:1,mlx5_2:1,mlx5_3:1,mlx5_4:1,mlx5_5:1,mlx5_10:1,mlx5_11:1" }
          - { name: NIXL_LOG_LEVEL,     value: "INFO" }
          # - { name: UCX_LOG_LEVEL,      value: "debug" }
          # - { name: UCX_RNDV_SCHEME,    value: "get_zcopy" }
          # - { name: UCX_RNDV_THRESH,    value: "0" }
          # --- Dynamo / vLLM ---
          - { name: DYN_HEALTH_CHECK_ENABLED,  value: "false" }
          - { name: HF_HOME,                   value: /shared-models }
          - { name: VLLM_LOGGING_LEVEL,        value: "INFO" }
          volumeMounts:
          - { name: ib,  mountPath: /dev/infiniband }
          - { name: shm, mountPath: /dev/shm }
        volumes:
        - name: ib
          hostPath: { path: /dev/infiniband }
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 64Gi }
      replicas: 1
      resources:
        limits:
          gpu: '4'
          custom:
            rdma/ib: "1"
        requests:
          gpu: '4'
          custom:
            rdma/ib: "1"
            ephemeral-storage: "2Gi"
      subComponentType: prefill
      volumeMounts:
      - name: shared-model-cache
        mountPoint: /shared-models

    VllmDecodeWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodMetadata:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "19090"
          prometheus.io/path: "/metrics"
      extraPodSpec:
        tolerations:
        - { key: nvidia.com/gpu, operator: Exists, effect: NoSchedule }
        mainContainer:
          command: [python3, -m, dynamo.vllm]
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          workingDir: /workspace
          args:
          - --model
          - Qwen/Qwen3-32B
          - --disaggregation-mode
          - decode
          - --kv-transfer-config
          - '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_connector_extra_config":{"backends":["UCX"]}}'
          - --tensor-parallel-size
          - '4'
          - --no-enable-log-requests
          - --gpu-memory-utilization
          - '0.70'
          - --no-enable-prefix-caching
          - --async-scheduling
          - --block-size
          - '64'
          - --hf-overrides
          - '{"rope_scaling":{"rope_type":"yarn","factor":4.0,"original_max_position_embeddings":32768},"max_position_embeddings":131072}'
          - --max-model-len
          - '131072'
          securityContext:
            privileged: true
            runAsUser: 0
            capabilities:
              add: [IPC_LOCK, SYS_PTRACE]
          env:
          - { name: NIXL_TELEMETRY_ENABLE,           value: "y" }
          - { name: NIXL_TELEMETRY_EXPORTER,         value: "prometheus" }
          - { name: NIXL_TELEMETRY_PROMETHEUS_PORT,  value: "19090" }
          # --- UCX IB minimal symmetric (see prefill block) ---
          - { name: UCX_NET_DEVICES,        value: "mlx5_0:1,mlx5_1:1,mlx5_2:1,mlx5_3:1,mlx5_4:1,mlx5_5:1,mlx5_10:1,mlx5_11:1" }
          - { name: NIXL_LOG_LEVEL,         value: "INFO" }
          # - { name: UCX_LOG_LEVEL,          value: "debug" }
          # - { name: UCX_RNDV_SCHEME,        value: "get_zcopy" }
          # - { name: UCX_RNDV_THRESH,        value: "0" }
          - { name: NCCL_DEBUG,             value: "WARN" }
          - { name: DYN_HEALTH_CHECK_ENABLED,  value: "false" }
          - { name: HF_HOME,                   value: /shared-models }
          - { name: VLLM_LOGGING_LEVEL,        value: "INFO" }
          volumeMounts:
          - { name: ib,  mountPath: /dev/infiniband }
          - { name: shm, mountPath: /dev/shm }
        volumes:
        - name: ib
          hostPath: { path: /dev/infiniband }
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 64Gi }
      replicas: 1
      resources:
        limits:
          gpu: '4'
          custom:
            rdma/ib: "1"
        requests:
          gpu: '4'
          custom:
            rdma/ib: "1"
            ephemeral-storage: "2Gi"
      subComponentType: decode
      volumeMounts:
      - name: shared-model-cache
        mountPoint: /shared-models
