#
# Qwen3-32B BF16 disagg, 1 prefill + 1 decode, cross-node over Nscale NDR InfiniBand.
# Purpose: measure NIXL KV-transfer bandwidth over UCX/IB backend on Blackwell (B200).
# Topology: TP=4 prefill on node A, TP=4 decode on node B (pod anti-affinity).
# Each worker requests rdma/ib: "1" which (per NVIDIA Network Operator shared-device
# plugin convention) grants access to all 8 NDR HCAs via /dev/infiniband/*.
#
# Hardware: Nscale dynamo-nscale-dev-cluster, 8x B200 (192 GB HBM) + 8x NDR IB per node.
# Image: standard vllm-runtime:1.1.1 (vLLM v0.19.0, CUDA 12.9) — covers SM 10.0 (B200).
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: q32b-1p1d-nscale-ib
spec:
  pvcs:
  - create: false
    name: shared-model-cache
  services:
    Frontend:
      componentType: frontend
      envs:
        - name: HF_HOME
          value: /shared-models
      extraPodSpec:
        mainContainer:
          # The vllm-runtime:1.1.1 image has a built-in ENTRYPOINT for the frontend
          # role. Explicit `python -m dynamo.frontend` makes the Rust binary parse
          # those as args and crash with "Unknown arguments specified".
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          workingDir: /workspace
      replicas: 1
      resources:
        requests: { cpu: "4" }
        limits:   { cpu: "8" }
      subComponentType: null
      volumeMounts:
      - name: shared-model-cache
        mountPoint: /shared-models

    VllmPrefillWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodMetadata:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "19090"
          prometheus.io/path: "/metrics"
      extraPodSpec:
        tolerations:
        - { key: nvidia.com/gpu, operator: Exists, effect: NoSchedule }
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                - key: nvidia.com/dynamo-component-type
                  operator: In
                  values: [worker]
              topologyKey: kubernetes.io/hostname
        mainContainer:
          command: [python3, -m, dynamo.vllm]
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          workingDir: /workspace
          args:
          - --model
          - Qwen/Qwen3-32B
          - --disaggregation-mode
          - prefill
          - --kv-transfer-config
          - '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_connector_extra_config":{"backends":["UCX"]}}'
          - --tensor-parallel-size
          - '4'
          - --no-enable-log-requests
          - --gpu-memory-utilization
          - '0.70'
          - --async-scheduling
          - --block-size
          - '64'
          - --hf-overrides
          - '{"rope_scaling":{"rope_type":"yarn","factor":4.0,"original_max_position_embeddings":32768},"max_position_embeddings":131072}'
          - --max-model-len
          - '131072'
          securityContext:
            privileged: true
            runAsUser: 0
            capabilities:
              add: [IPC_LOCK, SYS_PTRACE]
          env:
          # --- NIXL telemetry + UCX defaults (no explicit backend toggle: UCX is the default) ---
          - { name: NIXL_TELEMETRY_ENABLE,           value: "y" }
          - { name: NIXL_TELEMETRY_EXPORTER,         value: "prometheus" }
          - { name: NIXL_TELEMETRY_PROMETHEUS_PORT,  value: "19090" }
          # --- UCX IB minimal symmetric (exp9, 2026-05-28) ---
          # Symmetric minimal config: only MX_RDMA_NIC_PIN=auto + NIXL_LOG_LEVEL.
          # UCX_NET_DEVICES, UCX_LOG_LEVEL, UCX_RNDV_SCHEME, UCX_RNDV_THRESH all
          # commented out on BOTH sides — let UCX auto-probe everything end-to-end.
          # Tests whether the previous failures were caused by overrestrictive
          # UCX env on Nscale's specific fabric (vs the cluster-side issue).
          # exp10 2026-05-28: ib-probe showed 12 raw mlx5 NICs, in two fabrics.
          # mlx5_0..5 + mlx5_10..11 = compute IB (MTU 4096, GUID prefix 605e6503).
          # mlx5_6..9 = SIDE fabric (MTU 512, vendor 8c913a03). Previous 0..7 list
          # mixed compute with side — cross-rank handshake via side NICs likely
          # what caused the disconnects.
          - { name: UCX_NET_DEVICES,    value: "mlx5_0:1,mlx5_1:1,mlx5_2:1,mlx5_3:1,mlx5_4:1,mlx5_5:1,mlx5_10:1,mlx5_11:1" }
          - { name: MX_RDMA_NIC_PIN,    value: "auto" }
          - { name: NIXL_LOG_LEVEL,     value: "INFO" }
          # - { name: UCX_LOG_LEVEL,      value: "debug" }
          # - { name: UCX_RNDV_SCHEME,    value: "get_zcopy" }
          # - { name: UCX_RNDV_THRESH,    value: "0" }
          # --- Dynamo / vLLM ---
          - { name: DYN_HEALTH_CHECK_ENABLED,  value: "false" }
          - { name: HF_HOME,                   value: /shared-models }
          - { name: VLLM_LOGGING_LEVEL,        value: "INFO" }
          volumeMounts:
          - { name: ib,  mountPath: /dev/infiniband }
          - { name: shm, mountPath: /dev/shm }
        volumes:
        - name: ib
          hostPath: { path: /dev/infiniband }
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 64Gi }
      replicas: 1
      resources:
        limits:
          gpu: '4'
          custom:
            rdma/ib: "1"
        requests:
          gpu: '4'
          custom:
            rdma/ib: "1"
            ephemeral-storage: "2Gi"
      subComponentType: prefill
      volumeMounts:
      - name: shared-model-cache
        mountPoint: /shared-models

    VllmDecodeWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodMetadata:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "19090"
          prometheus.io/path: "/metrics"
      extraPodSpec:
        tolerations:
        - { key: nvidia.com/gpu, operator: Exists, effect: NoSchedule }
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                - key: nvidia.com/dynamo-component-type
                  operator: In
                  values: [worker]
              topologyKey: kubernetes.io/hostname
        mainContainer:
          command: [python3, -m, dynamo.vllm]
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          workingDir: /workspace
          args:
          - --model
          - Qwen/Qwen3-32B
          - --disaggregation-mode
          - decode
          - --kv-transfer-config
          - '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_connector_extra_config":{"backends":["UCX"]}}'
          - --tensor-parallel-size
          - '4'
          - --no-enable-log-requests
          - --gpu-memory-utilization
          - '0.70'
          - --no-enable-prefix-caching
          - --async-scheduling
          - --block-size
          - '64'
          - --hf-overrides
          - '{"rope_scaling":{"rope_type":"yarn","factor":4.0,"original_max_position_embeddings":32768},"max_position_embeddings":131072}'
          - --max-model-len
          - '131072'
          securityContext:
            privileged: true
            runAsUser: 0
            capabilities:
              add: [IPC_LOCK, SYS_PTRACE]
          env:
          - { name: NIXL_TELEMETRY_ENABLE,           value: "y" }
          - { name: NIXL_TELEMETRY_EXPORTER,         value: "prometheus" }
          - { name: NIXL_TELEMETRY_PROMETHEUS_PORT,  value: "19090" }
          # --- UCX IB minimal symmetric (see prefill block) ---
          # exp10 2026-05-28: ib-probe showed 12 raw mlx5 NICs on Nscale, in two
          # fabrics: mlx5_0..5 + mlx5_10..11 are compute IB (MTU 4096); mlx5_6..9
          # are a SIDE fabric (MTU 512, different vendor GUID prefix). Previous
          # recipe wrongly included mlx5_6 + mlx5_7 — cross-rank handshake via
          # those side-fabric NICs is likely what triggered the disconnects.
          - { name: UCX_NET_DEVICES,        value: "mlx5_0:1,mlx5_1:1,mlx5_2:1,mlx5_3:1,mlx5_4:1,mlx5_5:1,mlx5_10:1,mlx5_11:1" }
          - { name: MX_RDMA_NIC_PIN,        value: "auto" }
          - { name: NIXL_LOG_LEVEL,         value: "INFO" }
          # - { name: UCX_LOG_LEVEL,          value: "debug" }
          # - { name: UCX_RNDV_SCHEME,        value: "get_zcopy" }
          # - { name: UCX_RNDV_THRESH,        value: "0" }
          - { name: NCCL_DEBUG,             value: "WARN" }
          - { name: DYN_HEALTH_CHECK_ENABLED,  value: "false" }
          - { name: HF_HOME,                   value: /shared-models }
          - { name: VLLM_LOGGING_LEVEL,        value: "INFO" }
          volumeMounts:
          - { name: ib,  mountPath: /dev/infiniband }
          - { name: shm, mountPath: /dev/shm }
        volumes:
        - name: ib
          hostPath: { path: /dev/infiniband }
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 64Gi }
      replicas: 1
      resources:
        limits:
          gpu: '4'
          custom:
            rdma/ib: "1"
        requests:
          gpu: '4'
          custom:
            rdma/ib: "1"
            ephemeral-storage: "2Gi"
      subComponentType: decode
      volumeMounts:
      - name: shared-model-cache
        mountPoint: /shared-models
