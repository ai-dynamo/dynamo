#
# Qwen3-32B BF16 disagg, 1 prefill + 1 decode, cross-node over Nebius NDR InfiniBand.
# Purpose: measure NIXL KV-transfer bandwidth over the UCX/IB backend on Nebius MK8S.
# Topology: TP=4 prefill + TP=4 decode. TP=4 is the cross-CSP family standard.
# Each worker gets `rdma/ib: 1` — the Network Operator's RDMA shared-device-plugin
# slot count (NOT an HCA count). One slot grants the pod access to all 8 HCAs via
# /dev/infiniband/*. 8 x NDR400 = 3.2 Tb/s aggregate per H200 node.
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: q32b-1p1d-nebius-ib
spec:
  pvcs:
  - create: false
    name: model-cache
  services:
    Frontend:
      componentType: frontend
      envs:
        - name: HF_HOME
          value: /model-cache
      extraPodSpec:
        mainContainer:
          # The vllm-runtime:1.1.1 image has a built-in ENTRYPOINT for the frontend
          # role. Explicit `python -m dynamo.frontend` makes the Rust binary parse
          # those as args and crash with "Unknown arguments specified".
          image: nvcr.io/nvidia/ai-dynamo/dynamo-frontend:1.1.1
          workingDir: /workspace
          # On a fresh empty PVC, the image's default user can't create /model-cache/hub
          # for tokenizer registration → Permission denied (os error 13) → `/v1/models`
          # stays empty. Workers run as root because they request privileged. Frontend
          # needs runAsUser: 0 to write to the same PVC mount.
          securityContext:
            runAsUser: 0
          volumeMounts:
          - { name: model-cache, mountPath: /model-cache }
        volumes:
        - { name: model-cache, persistentVolumeClaim: { claimName: model-cache } }
      replicas: 1
      resources:
        requests: { cpu: "4" }
        limits:   { cpu: "8" }
      subComponentType: null

    VllmPrefillWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodMetadata:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "19090"
          prometheus.io/path: "/metrics"
      extraPodSpec:
        mainContainer:
          command: [python3, -m, dynamo.vllm]
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          workingDir: /workspace
          args:
          - --model
          - Qwen/Qwen3-32B
          - --disaggregation-mode
          - prefill
          - --kv-transfer-config
          - '{"kv_connector":"NixlConnector","kv_role":"kv_both"}'
          - --tensor-parallel-size
          - '4'
          - --no-enable-log-requests
          - --gpu-memory-utilization
          - '0.90'
          - --async-scheduling
          - --block-size
          - '64'
          - --hf-overrides
          - '{"rope_scaling":{"rope_type":"yarn","factor":4.0,"original_max_position_embeddings":32768},"max_position_embeddings":131072}'
          - --max-model-len
          - '131072'
          securityContext:
            privileged: true
            runAsUser: 0
            capabilities:
              add: [IPC_LOCK, SYS_PTRACE]
          env:
          # --- NIXL telemetry (transport-neutral) ---
          - { name: NIXL_TELEMETRY_ENABLE,          value: "y" }
          - { name: NIXL_TELEMETRY_EXPORTER,        value: "prometheus" }
          - { name: NIXL_TELEMETRY_PROMETHEUS_PORT, value: "19090" }
          # NIXL backend: runtime defaults to UCX when DYN_KVBM_NIXL_BACKEND_LIBFABRIC
          # is unset, so no explicit selector env is needed here.
          # --- UCX over NDR InfiniBand (8 ConnectX-7 HCAs: mlx5_0..mlx5_7) ---
          # Don't set UCX_TLS — an explicit transport allowlist can omit the internal
          # transports UCX needs for wireup. Let UCX auto-probe the NIC set (all 8 HCAs
          # are NDR-IB compute; there is no side fabric to exclude).
          # --- NCCL: IB transport not exercised in 1P1D (TP uses NVLink/P2P); eth0 is control plane only ---
          - { name: NCCL_SOCKET_IFNAME,     value: "eth0" }
          - { name: NCCL_DEBUG,             value: "WARN" }
          # --- Dynamo / vLLM ---
          - { name: DYN_HEALTH_CHECK_ENABLED, value: "false" }
          - { name: HF_HOME,                  value: /model-cache }
          - { name: VLLM_LOGGING_LEVEL,       value: "INFO" }
          volumeMounts:
          - { name: ib,  mountPath: /dev/infiniband }
          - { name: shm, mountPath: /dev/shm }
        volumes:
        - { name: ib,  hostPath: { path: /dev/infiniband } }
        - { name: shm, emptyDir: { medium: Memory, sizeLimit: 64Gi } }
      replicas: 1
      resources:
        limits:
          gpu: '4'
          custom:
            rdma/ib: "1"
        requests:
          gpu: '4'
          custom:
            rdma/ib: "1"
            ephemeral-storage: "2Gi"
      subComponentType: prefill
      volumeMounts:
      - name: model-cache
        mountPoint: /model-cache

    VllmDecodeWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodMetadata:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "19090"
          prometheus.io/path: "/metrics"
      extraPodSpec:
        mainContainer:
          command: [python3, -m, dynamo.vllm]
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          workingDir: /workspace
          args:
          - --model
          - Qwen/Qwen3-32B
          - --disaggregation-mode
          - decode
          - --kv-transfer-config
          - '{"kv_connector":"NixlConnector","kv_role":"kv_both"}'
          - --tensor-parallel-size
          - '4'
          - --no-enable-log-requests
          - --gpu-memory-utilization
          - '0.90'
          - --no-enable-prefix-caching
          - --async-scheduling
          - --block-size
          - '64'
          - --hf-overrides
          - '{"rope_scaling":{"rope_type":"yarn","factor":4.0,"original_max_position_embeddings":32768},"max_position_embeddings":131072}'
          - --max-model-len
          - '131072'
          securityContext:
            privileged: true
            runAsUser: 0
            capabilities:
              add: [IPC_LOCK, SYS_PTRACE]
          env:
          - { name: NIXL_TELEMETRY_ENABLE,          value: "y" }
          - { name: NIXL_TELEMETRY_EXPORTER,        value: "prometheus" }
          - { name: NIXL_TELEMETRY_PROMETHEUS_PORT, value: "19090" }
          # NOTE: no UCX_TLS — see prefill block; let UCX auto-probe.
          - { name: UCX_RNDV_THRESH,        value: "8192" }
          - { name: NCCL_SOCKET_IFNAME,     value: "eth0" }
          - { name: NCCL_DEBUG,             value: "WARN" }
          - { name: DYN_HEALTH_CHECK_ENABLED, value: "false" }
          - { name: HF_HOME,                  value: /model-cache }
          - { name: VLLM_LOGGING_LEVEL,       value: "INFO" }
          volumeMounts:
          - { name: ib,  mountPath: /dev/infiniband }
          - { name: shm, mountPath: /dev/shm }
        volumes:
        - { name: ib,  hostPath: { path: /dev/infiniband } }
        - { name: shm, emptyDir: { medium: Memory, sizeLimit: 64Gi } }
      replicas: 1
      resources:
        limits:
          gpu: '4'
          custom:
            rdma/ib: "1"
        requests:
          gpu: '4'
          custom:
            rdma/ib: "1"
            ephemeral-storage: "2Gi"
      subComponentType: decode
      volumeMounts:
      - name: model-cache
        mountPoint: /model-cache
