#
# DynamoGraphDeployment for deepseek-ai/DeepSeek-V4-Flash on vLLM PR #40760.
#
# Image:   nvcr.io/nvidian/dynamo-dev/biswa:vllm-dsv4-7d4572f9aa
#          (dynamo runtime layered on vllm/vllm-openai:deepseekv4-cu130)
# Cluster: dynamo-nscale-dev-cluster, 1x NVIDIA-B200 node (4 of 8 GPUs used)
# Model:   loaded from the shared-model-cache PVC
#          (hub/models--deepseek-ai--DeepSeek-V4-Flash)
# Shape:   aggregated (no P/D disagg), DP=4 + EP across 4 B200 GPUs
#          (recipe: "DP=4 ... uses 4 of 8 GPUs per replica on H200/B200/B300")
#
# Deploy:
#   kubectl apply -f vllm-dgd.yaml -n <your-namespace>
# Smoke test:
#   kubectl port-forward svc/vllm-dsv4-flash-frontend 8000:8000 -n <your-namespace>
#   curl http://localhost:8000/v1/chat/completions -H 'Content-Type: application/json' \
#     -d '{"model":"deepseek-ai/DeepSeek-V4-Flash","messages":[{"role":"user","content":"Hello"}]}'

apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: vllm-dsv4-flash
spec:
  backendFramework: vllm
  pvcs:
    - name: shared-model-cache
      create: false
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      volumeMounts:
        - name: shared-model-cache
          mountPoint: /models
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidian/dynamo-dev/biswa:vllm-dsv4-7d4572f9aa
          env:
            # Use the shared cache and skip any HF re-download on the frontend
            # so our injected chat_template (in tokenizer_config.json) persists.
            - name: HF_HOME
              value: /models
            - name: HF_HUB_OFFLINE
              value: "1"
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 360

    decode:
      componentType: worker
      subComponentType: decode
      replicas: 1
      resources:
        limits:
          gpu: "4"
      volumeMounts:
        - name: shared-model-cache
          mountPoint: /models
      sharedMemory:
        size: 200Gi
      extraPodSpec:
        nodeSelector:
          nvidia.com/gpu.product: NVIDIA-B200
        tolerations:
          - key: nvidia.com/gpu
            operator: Equal
            value: "true"
            effect: NoSchedule
        mainContainer:
          image: nvcr.io/nvidian/dynamo-dev/biswa:vllm-dsv4-7d4572f9aa
          workingDir: /workspace
          startupProbe:
            httpGet:
              path: /health
              port: 9090
            periodSeconds: 10
            timeoutSeconds: 10
            # 60 min max to load weights + warm cudagraphs on first launch.
            failureThreshold: 360
          env:
            # vLLM needs HF resolution off-disk; point to the PVC mount.
            - name: HF_HOME
              value: /models
            - name: HF_HUB_OFFLINE
              value: "1"
            # dsv4 engine init is slow (weight load + flashinfer autotune).
            - name: VLLM_ENGINE_READY_TIMEOUT_S
              value: "3600"
            # Stabilize DP dummy inputs (matches deepseek-r1 recipe).
            - name: VLLM_RANDOMIZE_DP_DUMMY_INPUTS
              value: "1"
            - name: VLLM_SKIP_P2P_CHECK
              value: "1"
            - name: NCCL_CUMEM_ENABLE
              value: "1"
            - name: GLOO_SOCKET_IFNAME
              value: eth0
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --model
            - deepseek-ai/DeepSeek-V4-Flash
            - --served-model-name
            - deepseek-ai/DeepSeek-V4-Flash
            # --- DeepSeek-V4 base args (from the vLLM recipe) ---
            - --trust-remote-code
            - --kv-cache-dtype
            - fp8
            - --block-size
            - "256"
            # --- Parallelism: single-node DEP on 8 B200 GPUs ---
            - --tensor-parallel-size
            - "1"
            - --data-parallel-size
            - "4"
            - --enable-expert-parallel
            # --- Tokenizer mode (DeepSeek-V4 specific) ---
            # NOTE: --tool-call-parser, --enable-auto-tool-choice, --reasoning-parser
            # are frontend-only args and not accepted by dynamo.vllm worker.
            # Wire them into the dynamo frontend separately if needed.
            - --tokenizer-mode
            - deepseek_v4
            # --- Blackwell-specific FP4 indexer cache ---
            - --attention-config
            - '{"use_fp4_indexer_cache":true}'
            # --- Single-node DEP compilation config from the recipe ---
            - --compilation-config
            - '{"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"]}'
            - --max-num-seqs
            - "256"
