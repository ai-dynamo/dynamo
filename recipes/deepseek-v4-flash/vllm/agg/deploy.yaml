#
# Plain vLLM deployment for deepseek-ai/DeepSeek-V4-Flash
# Single node, 8x B200 GPUs, DP=4, no Dynamo CRD.
#
# Model is pre-loaded in the shared-model-cache PVC.
# Deploy:
#   kubectl apply -f deploy.yaml -n <your-namespace>
# Test:
#   kubectl port-forward svc/deepseek-v4-flash-vllm 8000:8000 -n <your-namespace>
#   curl http://localhost:8000/v1/chat/completions \
#     -H "Content-Type: application/json" \
#     -d '{"model":"deepseek-ai/DeepSeek-V4-Flash","messages":[{"role":"user","content":"Hello"}]}'

apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepseek-v4-flash-vllm
  labels:
    app: deepseek-v4-flash-vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deepseek-v4-flash-vllm
  template:
    metadata:
      labels:
        app: deepseek-v4-flash-vllm
    spec:
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-B200
      containers:
        - name: vllm
          image: vllm/vllm-openai:deepseekv4-cu129
          ports:
            - name: http
              containerPort: 8000
          env:
            # Point HF to the shared model cache; disable any download attempts.
            - name: HF_HOME
              value: /models
            - name: HF_HUB_OFFLINE
              value: "1"
            # Give the engine up to 1 hour to load the model weights.
            - name: VLLM_ENGINE_READY_TIMEOUT_S
              value: "3600"
          args:
            - --model
            - deepseek-ai/DeepSeek-V4-Flash
            # Required for DeepSeek architectures.
            - --trust-remote-code
            # FP4+FP8 mixed checkpoint — use FP8 KV cache.
            - --kv-cache-dtype
            - fp8
            - --block-size
            - "256"
            # DP=4 on 8-GPU node: 2 GPUs per replica, full model per replica.
            - --data-parallel-size
            - "4"
            # Blackwell-specific FP4 indexer cache for attention.
            - "--attention_config.use_fp4_indexer_cache=True"
            # CUDAGraph mode tuned for aggregated (non-disaggregated) serving.
            - --compilation-config
            - '{"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"]}'
          resources:
            limits:
              nvidia.com/gpu: "8"
          volumeMounts:
            - name: shared-model-cache
              mountPath: /models
              readOnly: true
            - name: dshm
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            # Allow up to 60 min for model load (360 × 10s).
            periodSeconds: 10
            failureThreshold: 360
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10
      volumes:
        - name: shared-model-cache
          persistentVolumeClaim:
            claimName: shared-model-cache
        # Shared memory required for multi-process GPU communication.
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 200Gi
---
apiVersion: v1
kind: Service
metadata:
  name: deepseek-v4-flash-vllm
spec:
  selector:
    app: deepseek-v4-flash-vllm
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
