# Update storageClassName to match your cluster: kubectl get storageclass
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 800Gi
  storageClassName: "your-storage-class-name"
---
# Optional: cache JIT-compiled kernels across restarts (~10-15 min saved per cold start).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: compilation-cache
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 100Gi
  storageClassName: "your-storage-class-name"
