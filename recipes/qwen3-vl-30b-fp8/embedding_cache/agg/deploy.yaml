#
# Plain Deployments bypassing Grove/MNNVL to allow 4 workers on 1 node.
# Uses etcd for dynamo service discovery instead of DynamoGraphDeployment operator.
#
# Toggle embedding cache:
#   cache ON:  DYN_MULTIMODAL_EMBEDDING_CACHE_GB = "10" (or any non-zero value)
#   cache OFF: DYN_MULTIMODAL_EMBEDDING_CACHE_GB = "0"
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen3-vl-agg-worker
  labels:
    app: qwen3-vl-agg-worker
spec:
  replicas: 4
  selector:
    matchLabels:
      app: qwen3-vl-agg-worker
  template:
    metadata:
      labels:
        app: qwen3-vl-agg-worker
    spec:
      tolerations:
        - key: "dedicated"
          value: "user-workload"
          effect: "NoSchedule"
          operator: "Equal"
        - key: "dedicated"
          value: "user-workload"
          effect: "NoExecute"
          operator: "Equal"
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      nodeSelector:
        workload: qiwa-agg-benchmark
      imagePullSecrets:
        - name: nvcrimagepullsecret
      containers:
        - name: worker
          image: nvcr.io/nvstaging/ai-dynamo/vllm-runtime:1.0.0rc8-arm64
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail

              SITE_PACKAGES="$(python3 -c 'import pathlib, vllm; print(pathlib.Path(vllm.__file__).resolve().parent.parent)')"
              cd "${SITE_PACKAGES}"
              curl -sL https://github.com/vllm-project/vllm/pull/34182.diff | patch -p1
              curl -sL https://github.com/vllm-project/vllm/pull/34783.diff | python3 -c "
              import sys
              chunks = sys.stdin.read().split('diff --git ')
              filtered = [c for c in chunks if c.startswith('a/vllm/')]
              print(''.join('diff --git ' + c for c in filtered))
              " | patch -p1
              cd /workspace

              python3 -m dynamo.vllm \
                --model Qwen/Qwen3-VL-30B-A3B-Instruct-FP8 \
                --enable-multimodal \
                --tensor-parallel-size 1 \
                --gpu-memory-utilization 0.85 \
                --max-model-len 16384 \
                --disable-log-requests \
                --enable-prefix-caching \
                --multimodal-embedding-cache-capacity-gb "${DYN_MULTIMODAL_EMBEDDING_CACHE_GB}"
          env:
            - name: HF_HOME
              value: /home/dynamo/.cache/huggingface
            - name: DYN_REQUEST_PLANE
              value: tcp
            - name: DYN_VLLM_EMBEDDING_TRANSFER_MODE
              value: nixl-write
            - name: DYN_MULTIMODAL_EMBEDDING_CACHE_GB
              value: "10"  # DYN_MULTIMODAL_EMBEDDING_CACHE_GB
            - name: DYN_DISCOVERY_BACKEND
              value: etcd
            - name: ETCD_ENDPOINTS
              value: http://dynamo-platform-etcd:2379
            - name: DYN_NAMESPACE
              value: qwen3-vl-agg
            - name: DYN_EVENT_PLANE
              value: zmq
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: model-cache
              mountPath: /home/dynamo/.cache/huggingface
            - name: compilation-cache
              mountPath: /home/dynamo/.cache/vllm
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache
        - name: compilation-cache
          persistentVolumeClaim:
            claimName: compilation-cache
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen3-vl-agg-frontend
  labels:
    app: qwen3-vl-agg-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwen3-vl-agg-frontend
  template:
    metadata:
      labels:
        app: qwen3-vl-agg-frontend
    spec:
      tolerations:
        - key: "dedicated"
          value: "user-workload"
          effect: "NoSchedule"
          operator: "Equal"
        - key: "dedicated"
          value: "user-workload"
          effect: "NoExecute"
          operator: "Equal"
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      nodeSelector:
        workload: qiwa-agg-benchmark
      imagePullSecrets:
        - name: nvcrimagepullsecret
      containers:
        - name: frontend
          image: nvcr.io/nvstaging/ai-dynamo/vllm-runtime:1.0.0rc8-arm64
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
          command:
            - /bin/bash
            - -lc
          args:
            - |
              python3 -m dynamo.frontend \
                --model-name Qwen/Qwen3-VL-30B-A3B-Instruct-FP8
          env:
            - name: HF_HOME
              value: /home/dynamo/.cache/huggingface
            - name: DYN_REQUEST_PLANE
              value: tcp
            - name: DYN_DISCOVERY_BACKEND
              value: etcd
            - name: ETCD_ENDPOINTS
              value: http://dynamo-platform-etcd:2379
            - name: DYN_NAMESPACE
              value: qwen3-vl-agg
            - name: DYN_EVENT_PLANE
              value: zmq
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "1"
            limits:
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: qwen3-vl-agg-frontend
spec:
  selector:
    app: qwen3-vl-agg-frontend
  ports:
    - port: 8000
      targetPort: 8000
      name: http
