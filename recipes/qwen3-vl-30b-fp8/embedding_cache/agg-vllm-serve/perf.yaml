#
# Runs cache_on vs cache_off interleaved per dataset/concurrency for realtime comparison.
# For each (dataset, concurrency): run cache_on, then cache_off, back-to-back.
#
# Requires: ServiceAccount with permissions to patch and restart the vllm-serve deployment.
#
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agg-vllm-serve-1gpu-benchmark-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agg-vllm-serve-1gpu-benchmark-role
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agg-vllm-serve-1gpu-benchmark-binding
subjects:
  - kind: ServiceAccount
    name: agg-vllm-serve-1gpu-benchmark-sa
roleRef:
  kind: Role
  name: agg-vllm-serve-1gpu-benchmark-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Pod
metadata:
  name: agg-vllm-serve-1gpu-benchmark
  labels:
    app: benchmark
spec:
  serviceAccountName: agg-vllm-serve-1gpu-benchmark-sa
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 0
  nodeSelector:
    workload: qiwa-agg-vllm-serve-benchmark
  tolerations:
    - key: "dedicated"
      value: "user-workload"
      effect: "NoSchedule"
    - key: "dedicated"
      value: "user-workload"
      effect: "NoExecute"
  containers:
    - name: benchmark
      image: nvcr.io/nvstaging/ai-dynamo/vllm-runtime:1.0.0rc8-arm64
      imagePullPolicy: IfNotPresent
      command:
        - /bin/bash
        - -lc
        - |
          set -euo pipefail

          apt update && apt install -y curl jq
          pip install aiperf
          curl -LO "https://dl.k8s.io/release/v1.31.0/bin/linux/arm64/kubectl" \
            && chmod +x kubectl && mv kubectl /opt/dynamo/venv/bin/

          wait_for_model() {
            echo "Waiting for model '${MODEL_NAME}' at http://${FRONTEND}:8000/v1/models..."
            until curl -s "http://${FRONTEND}:8000/v1/models" \
              | jq -e --arg model "${MODEL_NAME}" '.data[]? | select(.id == $model)' >/dev/null 2>&1; do
              echo "[$(date '+%H:%M:%S')] Model not ready, retrying in 5s..."
              sleep 5
            done
            echo "Model '${MODEL_NAME}' is ready."

            echo "Waiting for all ${EXPECTED_REPLICAS} replicas to be ready..."
            until [ "$(kubectl get pods -l app=${DEPLOYMENT} \
              --field-selector=status.phase=Running -o json \
              | jq '[.items[] | select(.status.containerStatuses[]?.ready==true)] | length')" \
              -ge "${EXPECTED_REPLICAS}" ]; do
              echo "[$(date '+%H:%M:%S')] Replicas not all ready, retrying in 10s..."
              sleep 10
            done
            echo "All ${EXPECTED_REPLICAS} replicas are ready."
          }

          restart_deployment() {
            echo "Restarting deployment to clear embedding cache..."
            kubectl rollout restart deployment/${DEPLOYMENT}
            kubectl rollout status deployment/${DEPLOYMENT} --timeout=600s
            wait_for_model
          }

          set_cache_and_restart() {
            local gb=$1
            echo "Setting DYN_MULTIMODAL_EMBEDDING_CACHE_GB=${gb} on deployment..."
            kubectl set env deployment/${DEPLOYMENT} DYN_MULTIMODAL_EMBEDDING_CACHE_GB="${gb}"
            kubectl rollout status deployment/${DEPLOYMENT} --timeout=600s
            wait_for_model
          }

          run_one() {
            local mode=$1 ds=$2 conc=$3
            RUN_DIR="${ARTIFACT_BASE_DIR}/${mode}/${ds}/c${conc}"
            mkdir -p "${RUN_DIR}"

            echo "=== Running: ${mode} ${ds} concurrency=${conc} ==="
            aiperf profile \
              --model "${MODEL_NAME}" \
              --input-file "${DATASET_DIR}/${ds}.jsonl" \
              --custom-dataset-type single_turn \
              --url "http://${FRONTEND}:8000" \
              --streaming \
              --ui-type none \
              --request-count "${REQUEST_COUNT}" \
              --concurrency "${conc}" \
              --warmup-request-count "${WARMUP_REQUEST_COUNT}" \
              --artifact-dir "${RUN_DIR}" \
              --extra-inputs "max_tokens:${MAX_TOKENS}" \
              --extra-inputs "min_tokens:${MAX_TOKENS}" \
              --extra-inputs "ignore_eos:true"

            echo "Done: ${RUN_DIR}"
          }

          DATASETS=(
            "1000req_1img_200pool_400word_base64"
            "1000req_1img_200pool_400word_http"
            "1000req_2img_200pool_400word_base64"
            "1000req_2img_200pool_400word_http"
            "1000req_4img_200pool_400word_base64"
            "1000req_4img_200pool_400word_http"
            "1000req_8img_200pool_400word_base64"
            "1000req_8img_200pool_400word_http"
          )
          CONCURRENCIES=(4 8 16 32 64 128)

          # Wait for datasets
          for ds in "${DATASETS[@]}"; do
            until [ -f "${DATASET_DIR}/${ds}.jsonl" ]; do
              echo "Waiting for ${ds}.jsonl ..."
              sleep 15
            done
          done

          wait_for_model

          for ds in "${DATASETS[@]}"; do
            for conc in "${CONCURRENCIES[@]}"; do
              # cache_on: set cache, restart, run
              set_cache_and_restart "${CACHE_GB}"
              run_one cache_on "${ds}" "${conc}"

              # cache_off: set cache=0, restart, run
              set_cache_and_restart 0
              run_one cache_off "${ds}" "${conc}"
            done
          done

          # Restore cache setting
          set_cache_and_restart "${CACHE_GB}"

          echo "All runs complete. Artifacts in ${ARTIFACT_BASE_DIR}"
          sleep 3600
      env:
        - name: MODEL_NAME
          value: Qwen/Qwen3-VL-30B-A3B-Instruct-FP8
        - name: FRONTEND
          value: agg-vllm-serve-1gpu
        - name: DEPLOYMENT
          value: agg-vllm-serve-1gpu
        - name: CACHE_GB
          value: "10"
        - name: MAX_TOKENS
          value: "150"
        - name: REQUEST_COUNT
          value: "1000"
        - name: WARMUP_REQUEST_COUNT
          value: "3"
        - name: DATASET_DIR
          value: /perf-cache-tmp/datasets
        - name: EXPECTED_REPLICAS
          value: "1"
        - name: ARTIFACT_BASE_DIR
          value: /perf-cache-tmp/artifacts/fp8/gb200-1gpu/agg-vllm-serve
      resources:
        requests:
          cpu: "8"
          memory: 16Gi
        limits:
          cpu: "16"
          memory: 32Gi
      volumeMounts:
        - name: perf-cache-tmp
          mountPath: /perf-cache-tmp
  volumes:
    - name: perf-cache-tmp
      persistentVolumeClaim:
        claimName: perf-cache-tmp
  restartPolicy: Never
