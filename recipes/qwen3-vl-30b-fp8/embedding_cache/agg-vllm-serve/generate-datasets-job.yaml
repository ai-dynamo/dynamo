apiVersion: batch/v1
kind: Job
metadata:
  name: agg-vllm-serve-1gpu-generate-datasets
spec:
  backoffLimit: 1
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app: generate-datasets
    spec:
      restartPolicy: Never
      tolerations:
        - key: "dedicated"
          value: "user-workload"
          effect: "NoSchedule"
        - key: "dedicated"
          value: "user-workload"
          effect: "NoExecute"
      imagePullSecrets:
        - name: nvcrimagepullsecret
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      containers:
        - name: generate-datasets
          image: nvcr.io/nvstaging/ai-dynamo/vllm-runtime:1.0.0rc8-arm64
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail

              GENERATOR_MAIN="/workspace/benchmarks/multimodal/jsonl/main.py"
              OUTPUT_DIR="/perf-cache-tmp/datasets"

              if [[ ! -f "${GENERATOR_MAIN}" ]]; then
                echo "Generator not found at ${GENERATOR_MAIN}"
                exit 1
              fi

              mkdir -p "${OUTPUT_DIR}"

              for IMAGES_PER_REQ in 1 2 4 8; do
                for IMAGE_MODE in base64 http; do
                  OUTPUT_FILE="${OUTPUT_DIR}/1000req_${IMAGES_PER_REQ}img_800pool_400word_${IMAGE_MODE}.jsonl"
                  if [[ -f "${OUTPUT_FILE}" ]]; then
                    echo "Skipping ${OUTPUT_FILE} (already exists)"
                    continue
                  fi
                  echo "Generating ${OUTPUT_FILE} (images-per-request=${IMAGES_PER_REQ}, mode=${IMAGE_MODE})"
                  python3 "${GENERATOR_MAIN}" \
                    -n 1000 \
                    --images-per-request "${IMAGES_PER_REQ}" \
                    --images-pool 800 \
                    --user-text-tokens 400 \
                    --image-mode "${IMAGE_MODE}" \
                    --image-dir /perf-cache-tmp/images \
                    -o "${OUTPUT_FILE}"
                done
              done

              echo "Dataset generation complete in ${OUTPUT_DIR}"
          volumeMounts:
            - name: perf-cache-tmp
              mountPath: /perf-cache-tmp
      volumes:
        - name: perf-cache-tmp
          persistentVolumeClaim:
            claimName: perf-cache-tmp
