#
# Runs cache_on vs cache_off with a concurrency sweep (32, 64, 128) across all datasets.
# cache_on: restarts prefill worker between runs (deployment already has cache enabled).
# cache_off: patches DynamoGraphDeployment CRD to set cache=0, then sweeps.
#
# Requires: ServiceAccount with permissions to restart deployments and patch the CRD.
#
apiVersion: v1
kind: ServiceAccount
metadata:
  name: benchmark-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: benchmark-restart-role
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["nvidia.com"]
    resources: ["dynamographdeployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: benchmark-restart-binding
subjects:
  - kind: ServiceAccount
    name: benchmark-sa
roleRef:
  kind: Role
  name: benchmark-restart-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Pod
metadata:
  name: qwen3-vl-disagg-gb200-benchmark
  labels:
    app: benchmark
spec:
  serviceAccountName: benchmark-sa
  tolerations:
    - key: "dedicated"
      value: "user-workload"
      effect: "NoSchedule"
    - key: "dedicated"
      value: "user-workload"
      effect: "NoExecute"
  containers:
    - name: benchmark
      image: bitnami/kubectl:1.31.0
      command:
        - /bin/bash
        - -lc
        - |
          set -euo pipefail

          apt update && apt install -y curl jq python3 python3-pip
          pip install --break-system-packages aiperf

          wait_for_model() {
            echo "Waiting for model '${MODEL_NAME}' at http://${FRONTEND}:8000/v1/models..."
            until curl -s "http://${FRONTEND}:8000/v1/models" \
              | jq -e --arg model "${MODEL_NAME}" '.data[]? | select(.id == $model)' >/dev/null 2>&1; do
              echo "[$(date '+%H:%M:%S')] Model not ready, retrying in 5s..."
              sleep 5
            done
            echo "Model '${MODEL_NAME}' is ready."
          }

          restart_worker() {
            echo "Restarting prefill worker deployment..."
            kubectl rollout restart deployment/${PREFILL_DEPLOYMENT}
            kubectl rollout status deployment/${PREFILL_DEPLOYMENT} --timeout=600s
            echo "Restarting decode worker deployment..."
            kubectl rollout restart deployment/${DECODE_DEPLOYMENT}
            kubectl rollout status deployment/${DECODE_DEPLOYMENT} --timeout=600s
            wait_for_model
          }

          set_cache_gb() {
            local gb=$1
            echo "Patching DynamoGraphDeployment: DYN_MULTIMODAL_EMBEDDING_CACHE_GB=${gb}"
            kubectl patch dynamographdeployment/${GRAPH_DEPLOYMENT} --type=json \
              -p "[{\"op\":\"replace\",\"path\":\"/spec/services/VllmPrefillWorker/extraPodSpec/mainContainer/env/${CACHE_ENV_INDEX}/value\",\"value\":\"${gb}\"}]"
            kubectl rollout status deployment/${PREFILL_DEPLOYMENT} --timeout=600s
            kubectl rollout status deployment/${DECODE_DEPLOYMENT} --timeout=600s
            wait_for_model
          }

          run_sweep() {
            local mode=$1
            for ds in "${DATASETS[@]}"; do
              for conc in "${CONCURRENCIES[@]}"; do
                RUN_DIR="${ARTIFACT_BASE_DIR}/${mode}/${ds}/c${conc}"
                mkdir -p "${RUN_DIR}"

                restart_worker

                echo "=== Running: ${mode} ${ds} concurrency=${conc} ==="
                aiperf profile \
                  --model "${MODEL_NAME}" \
                  --input-file "${DATASET_DIR}/${ds}.jsonl" \
                  --custom-dataset-type single_turn \
                  --url "http://${FRONTEND}:8000" \
                  --streaming \
                  --ui-type none \
                  --request-count "${REQUEST_COUNT}" \
                  --concurrency "${conc}" \
                  --warmup-request-count "${WARMUP_REQUEST_COUNT}" \
                  --artifact-dir "${RUN_DIR}" \
                  --extra-inputs "max_tokens:${MAX_TOKENS}" \
                  --extra-inputs "min_tokens:${MAX_TOKENS}" \
                  --extra-inputs "ignore_eos:true"

                echo "Done: ${RUN_DIR}"
              done
            done
          }

          DATASETS=(
            "1000req_1img_200pool_400word_http"
            # "1000req_1img_500pool_400word_http"
            # "1000req_1img_800pool_400word_http"
          )
          CONCURRENCIES=(32 64 128)

          # Wait for datasets
          for ds in "${DATASETS[@]}"; do
            until [ -f "${DATASET_DIR}/${ds}.jsonl" ]; do
              echo "Waiting for ${ds}.jsonl ..."
              sleep 15
            done
          done

          # Phase 1: cache_on (deployment already has cache enabled)
          wait_for_model
          run_sweep cache_on

          # Phase 2: cache_off (patch CRD to disable cache, then sweep)
          set_cache_gb 0
          run_sweep cache_off

          # Restore cache setting
          set_cache_gb "${CACHE_GB}"

          echo "All runs complete. Artifacts in ${ARTIFACT_BASE_DIR}"
          sleep 3600
      env:
        - name: MODEL_NAME
          value: Qwen/Qwen3-VL-30B-A3B-Instruct-FP8
        - name: FRONTEND
          value: qwen3-vl-disagg-gb200-0-frontend
        - name: GRAPH_DEPLOYMENT
          value: qwen3-vl-disagg-gb200
        - name: PREFILL_DEPLOYMENT
          value: qwen3-vl-disagg-gb200-0-vllmprefillworker
        - name: DECODE_DEPLOYMENT
          value: qwen3-vl-disagg-gb200-0-vllmdecodeworker
        - name: CACHE_ENV_INDEX
          value: "3"  # index of DYN_MULTIMODAL_EMBEDDING_CACHE_GB in deploy.yaml prefill env array
        - name: CACHE_GB
          value: "10"
        - name: MAX_TOKENS
          value: "150"
        - name: REQUEST_COUNT
          value: "1000"
        - name: WARMUP_REQUEST_COUNT
          value: "3"
        - name: DATASET_DIR
          value: /perf-cache/datasets
        - name: ARTIFACT_BASE_DIR
          value: /perf-cache/artifacts/fp8/gb200/disagg
      resources:
        requests:
          cpu: "8"
          memory: 16Gi
        limits:
          cpu: "16"
          memory: 32Gi
      volumeMounts:
        - name: perf-cache
          mountPath: /perf-cache
  volumes:
    - name: perf-cache
      persistentVolumeClaim:
        claimName: perf-cache
  restartPolicy: Never
