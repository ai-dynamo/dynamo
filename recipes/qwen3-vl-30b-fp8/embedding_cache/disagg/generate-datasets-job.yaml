apiVersion: batch/v1
kind: Job
metadata:
  name: qwen3-vl-30b-fp8-generate-datasets-http
spec:
  backoffLimit: 1
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app: generate-datasets
    spec:
      restartPolicy: Never
      tolerations:
        - key: "dedicated"
          value: "user-workload"
          effect: "NoSchedule"
        - key: "dedicated"
          value: "user-workload"
          effect: "NoExecute"
      imagePullSecrets:
        - name: nvcrimagepullsecret
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      containers:
        - name: generate-datasets
          image: nvcr.io/nvstaging/ai-dynamo/vllm-runtime:1.0.0rc8-arm64
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail

              GENERATOR_MAIN="/workspace/benchmarks/multimodal/jsonl/main.py"
              OUTPUT_DIR="/perf-cache-tmp/datasets"

              if [[ ! -f "${GENERATOR_MAIN}" ]]; then
                echo "Generator not found at ${GENERATOR_MAIN}"
                exit 1
              fi

              mkdir -p "${OUTPUT_DIR}"

              for MODE in http base64; do
                for IMGS in 1 3; do
                  OUTPUT_FILE="${OUTPUT_DIR}/1000req_${IMGS}img_200pool_400word_${MODE}.jsonl"
                  if [[ -f "${OUTPUT_FILE}" ]]; then
                    echo "Skipping ${OUTPUT_FILE} (already exists)"
                    continue
                  fi
                  EXTRA_ARGS=""
                  if [[ "${MODE}" == "base64" ]]; then
                    EXTRA_ARGS="--image-dir /perf-cache-tmp/images"
                  fi
                  echo "Generating ${OUTPUT_FILE} (images=${IMGS}, pool=200, mode=${MODE})"
                  python3 "${GENERATOR_MAIN}" \
                    -n 1000 \
                    --images-per-request "${IMGS}" \
                    --images-pool 200 \
                    --user-text-tokens 400 \
                    --image-mode "${MODE}" \
                    ${EXTRA_ARGS} \
                    -o "${OUTPUT_FILE}"
                done
              done

              echo "Dataset generation complete in ${OUTPUT_DIR}"
          volumeMounts:
            - name: perf-cache
              mountPath: /perf-cache-tmp
      volumes:
        - name: perf-cache
          persistentVolumeClaim:
            claimName: perf-cache-tmp
