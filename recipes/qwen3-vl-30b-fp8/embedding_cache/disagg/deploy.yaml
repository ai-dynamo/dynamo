#
# Disaggregated prefill/decode deployment with embedding cache.
#
# Toggle embedding cache:
#   cache ON:  DYN_MULTIMODAL_EMBEDDING_CACHE_GB = "4"  (or any non-zero value)
#   cache OFF: DYN_MULTIMODAL_EMBEDDING_CACHE_GB = "0"
#
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: qwen3-vl-disagg-gb200
spec:
  pvcs:
    - create: false
      name: model-cache
    - create: false
      name: compilation-cache
  services:
    Frontend:
      componentType: frontend
      envs:
        - name: HF_HOME
          value: /home/dynamo/.cache/huggingface
        - name: DYN_REQUEST_PLANE
          value: tcp
      extraPodSpec:
        tolerations:
          - key: "dedicated"
            value: "user-workload"
            effect: "NoSchedule"
            operator: "Equal"
          - key: "dedicated"
            value: "user-workload"
            effect: "NoExecute"
            operator: "Equal"
        mainContainer:
          image: nvcr.io/nvstaging/ai-dynamo/vllm-runtime:1.0.0rc8-arm64
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
      replicas: 1
      resources:
        requests:
          cpu: "1"
        limits:
          cpu: "1"
      subComponentType: null

    VllmPrefillWorker:
      componentType: worker
      subComponentType: prefill
      envFromSecret: hf-token-secret
      extraPodSpec:
        tolerations:
          - key: "dedicated"
            value: "user-workload"
            effect: "NoSchedule"
            operator: "Equal"
          - key: "dedicated"
            value: "user-workload"
            effect: "NoExecute"
            operator: "Equal"
          - key: "nvidia.com/gpu"
            operator: "Exists"
            effect: "NoSchedule"
        mainContainer:
          command:
            - /bin/bash
            - -lc
          args:
            - |
              python3 -m dynamo.vllm \
                --model Qwen/Qwen3-VL-30B-A3B-Instruct-FP8 \
                --enable-multimodal \
                --route-to-encoder \
                --multimodal-worker \
                --enable-mm-embeds \
                --tensor-parallel-size 1 \
                --gpu-memory-utilization 0.85 \
                --max-model-len 16384 \
                --disable-log-requests \
                --enable-prefix-caching \
                --multimodal-embedding-cache-capacity-gb "${DYN_MULTIMODAL_EMBEDDING_CACHE_GB}" \
                --disaggregation-mode prefill \
                --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both"}' \
                --block-size 128
          image: nvcr.io/nvstaging/ai-dynamo/vllm-runtime:1.0.0rc8-arm64
          imagePullPolicy: IfNotPresent
          env:
            - name: HF_HOME
              value: /home/dynamo/.cache/huggingface
            - name: DYN_REQUEST_PLANE
              value: tcp
            - name: DYN_VLLM_EMBEDDING_TRANSFER_MODE
              value: nixl-write
            - name: DYN_MULTIMODAL_EMBEDDING_CACHE_GB
              value: "10"  # DYN_MULTIMODAL_EMBEDDING_CACHE_GB
          workingDir: /workspace
      replicas: 1
      resources:
        limits:
          gpu: "1"
        requests:
          gpu: "1"
      sharedMemory:
        size: 80Gi
      volumeMounts:
        - name: model-cache
          mountPoint: /home/dynamo/.cache/huggingface
        - name: compilation-cache
          mountPoint: /home/dynamo/.cache/vllm
          useAsCompilationCache: true

    VllmDecodeWorker:
      componentType: worker
      subComponentType: decode
      envFromSecret: hf-token-secret
      extraPodSpec:
        tolerations:
          - key: "dedicated"
            value: "user-workload"
            effect: "NoSchedule"
            operator: "Equal"
          - key: "dedicated"
            value: "user-workload"
            effect: "NoExecute"
            operator: "Equal"
          - key: "nvidia.com/gpu"
            operator: "Exists"
            effect: "NoSchedule"
        mainContainer:
          command:
            - /bin/bash
            - -lc
          args:
            - |
              python3 -m dynamo.vllm \
                --model Qwen/Qwen3-VL-30B-A3B-Instruct-FP8 \
                --enable-multimodal \
                --tensor-parallel-size 1 \
                --gpu-memory-utilization 0.85 \
                --max-model-len 16384 \
                --disable-log-requests \
                --no-enable-prefix-caching \
                --disaggregation-mode decode \
                --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both"}' \
                --block-size 128
          image: nvcr.io/nvstaging/ai-dynamo/vllm-runtime:1.0.0rc8-arm64
          imagePullPolicy: IfNotPresent
          env:
            - name: HF_HOME
              value: /home/dynamo/.cache/huggingface
            - name: DYN_REQUEST_PLANE
              value: tcp
          workingDir: /workspace
      replicas: 1
      resources:
        limits:
          gpu: "1"
        requests:
          gpu: "1"
      sharedMemory:
        size: 80Gi
      volumeMounts:
        - name: model-cache
          mountPoint: /home/dynamo/.cache/huggingface
        - name: compilation-cache
          mountPoint: /home/dynamo/.cache/vllm
          useAsCompilationCache: true
