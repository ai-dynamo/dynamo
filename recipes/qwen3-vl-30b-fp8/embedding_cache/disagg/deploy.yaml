#
# Disaggregated E+PD (Encode + PrefillDecode) deployment with embedding cache.
# Encode worker runs on a separate GPU; PD worker routes to encoder for embeddings.
#
# Toggle embedding cache:
#   cache ON:  DYN_MULTIMODAL_EMBEDDING_CACHE_GB = "10" (or any non-zero value)
#   cache OFF: DYN_MULTIMODAL_EMBEDDING_CACHE_GB = "0"
#
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: qwen3-vl-disagg-gb200
spec:
  pvcs:
    - create: false
      name: model-cache-tmp
  services:
    Frontend:
      componentType: frontend
      envs:
        - name: HF_HOME
          value: /home/dynamo/.cache/huggingface
        - name: DYN_REQUEST_PLANE
          value: tcp
      extraPodSpec:
        tolerations:
          - key: "dedicated"
            value: "user-workload"
            effect: "NoSchedule"
            operator: "Equal"
          - key: "dedicated"
            value: "user-workload"
            effect: "NoExecute"
            operator: "Equal"
        mainContainer:
          image: nvcr.io/nvstaging/ai-dynamo/vllm-runtime:1.0.0rc8-arm64
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
      replicas: 1
      resources:
        requests:
          cpu: "1"
        limits:
          cpu: "1"
      subComponentType: null

    VllmEncodeWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodSpec:
        tolerations:
          - key: "dedicated"
            value: "user-workload"
            effect: "NoSchedule"
            operator: "Equal"
          - key: "dedicated"
            value: "user-workload"
            effect: "NoExecute"
            operator: "Equal"
          - key: "nvidia.com/gpu"
            operator: "Exists"
            effect: "NoSchedule"
        mainContainer:
          command:
            - /bin/bash
            - -lc
          args:
            - |
              python3 -m dynamo.vllm \
                --multimodal-encode-worker \
                --enable-multimodal \
                --model Qwen/Qwen3-VL-30B-A3B-Instruct-FP8 \
                --gpu-memory-utilization 0.9
          image: nvcr.io/nvstaging/ai-dynamo/vllm-runtime:1.0.0rc8-arm64
          imagePullPolicy: IfNotPresent
          env:
            - name: HF_HOME
              value: /home/dynamo/.cache/huggingface
            - name: DYN_REQUEST_PLANE
              value: tcp
            - name: ENABLE_ENCODER_CACHE
              value: "0"
          workingDir: /workspace
      replicas: 1
      resources:
        limits:
          gpu: "1"
        requests:
          gpu: "1"
      subComponentType: null
      volumeMounts:
        - name: model-cache-tmp
          mountPoint: /home/dynamo/.cache/huggingface

    VllmPDWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodSpec:
        tolerations:
          - key: "dedicated"
            value: "user-workload"
            effect: "NoSchedule"
            operator: "Equal"
          - key: "dedicated"
            value: "user-workload"
            effect: "NoExecute"
            operator: "Equal"
          - key: "nvidia.com/gpu"
            operator: "Exists"
            effect: "NoSchedule"
        mainContainer:
          command:
            - /bin/bash
            - -lc
          args:
            - |
              python3 -m dynamo.vllm \
                --route-to-encoder \
                --multimodal-worker \
                --enable-multimodal \
                --enable-mm-embeds \
                --model Qwen/Qwen3-VL-30B-A3B-Instruct-FP8 \
                --max-model-len 16384 \
                --gpu-memory-utilization 0.9 \
                --disable-log-requests \
                --no-enable-prefix-caching \
                --multimodal-embedding-cache-capacity-gb "${DYN_MULTIMODAL_EMBEDDING_CACHE_GB}"
          image: nvcr.io/nvstaging/ai-dynamo/vllm-runtime:1.0.0rc8-arm64
          imagePullPolicy: IfNotPresent
          env:
            - name: HF_HOME
              value: /home/dynamo/.cache/huggingface
            - name: DYN_REQUEST_PLANE
              value: tcp
            - name: DYN_VLLM_EMBEDDING_TRANSFER_MODE
              value: nixl-write
            - name: DYN_MULTIMODAL_EMBEDDING_CACHE_GB
              value: "10"  # DYN_MULTIMODAL_EMBEDDING_CACHE_GB
          workingDir: /workspace
      replicas: 1
      resources:
        limits:
          gpu: "1"
        requests:
          gpu: "1"
      subComponentType: null
      volumeMounts:
        - name: model-cache-tmp
          mountPoint: /home/dynamo/.cache/huggingface
