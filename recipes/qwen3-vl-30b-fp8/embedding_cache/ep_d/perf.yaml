#
# EP+D benchmark: 12 datasets x 5 request rates x 2 cache modes = 120 runs.
# Patches DynamoGraphDeployment CRD to toggle embedding cache on EP worker.
#
apiVersion: v1
kind: ServiceAccount
metadata:
  name: epd-benchmark-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: epd-benchmark-role
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["nvidia.com"]
    resources: ["dynamographdeployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: epd-benchmark-binding
subjects:
  - kind: ServiceAccount
    name: epd-benchmark-sa
roleRef:
  kind: Role
  name: epd-benchmark-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Pod
metadata:
  name: qwen3-vl-epd-gb200-benchmark
  labels:
    app: benchmark
spec:
  serviceAccountName: epd-benchmark-sa
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 0
  nodeSelector:
    workload: qiwa-ep-d
  tolerations:
    - key: "dedicated"
      value: "user-workload"
      effect: "NoSchedule"
    - key: "dedicated"
      value: "user-workload"
      effect: "NoExecute"
  containers:
    - name: benchmark
      image: python:3.11
      command:
        - /bin/bash
        - -lc
        - |
          set -euo pipefail

          apt update && apt install -y curl jq
          pip install aiperf
          curl -sLO "https://dl.k8s.io/release/v1.31.0/bin/linux/arm64/kubectl" \
            && chmod +x kubectl && mv kubectl /usr/local/bin/

          wait_for_model() {
            echo "Waiting for model '${MODEL_NAME}' at http://${FRONTEND}:8000/v1/models..."
            until curl -s "http://${FRONTEND}:8000/v1/models" \
              | jq -e --arg model "${MODEL_NAME}" '.data[]? | select(.id == $model)' >/dev/null 2>&1; do
              echo "[$(date '+%H:%M:%S')] Model not ready, retrying in 5s..."
              sleep 5
            done
            echo "Model '${MODEL_NAME}' is ready."
          }

          wait_for_pod_ready() {
            local label=$1
            echo "Waiting for pod with label ${label} to be ready..."
            until kubectl get pod -l "${label}" -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null | grep -q true; do
              sleep 5
            done
            echo "Pod ${label} is ready."
          }

          wait_for_all_pods_ready() {
            local label=$1
            local expected=$2
            echo "Waiting for all ${expected} pods with label ${label} to be ready..."
            until [ "$(kubectl get pods -l "${label}" \
              --field-selector=status.phase=Running -o json \
              | jq '[.items[] | select(.status.containerStatuses[]?.ready==true)] | length')" \
              -ge "${expected}" ]; do
              echo "[$(date '+%H:%M:%S')] Not all ${expected} pods ready, retrying in 10s..."
              sleep 10
            done
            echo "All ${expected} pods with label ${label} are ready."
          }

          restart_workers() {
            echo "Restarting EP worker pod..."
            kubectl delete pod -l nvidia.com/dynamo-component=${EP_COMPONENT} --wait=true
            echo "Restarting Decode worker pods..."
            kubectl delete pod -l nvidia.com/dynamo-component=${DECODE_COMPONENT} --wait=true
            wait_for_pod_ready "nvidia.com/dynamo-component=${EP_COMPONENT}"
            wait_for_all_pods_ready "nvidia.com/dynamo-component=${DECODE_COMPONENT}" "${DECODE_REPLICAS}"
            wait_for_model
          }

          set_cache_gb() {
            local gb=$1
            echo "Patching DynamoGraphDeployment: DYN_MULTIMODAL_EMBEDDING_CACHE_GB=${gb}"
            kubectl patch dynamographdeployment/${GRAPH_DEPLOYMENT} --type=json \
              -p "[{\"op\":\"replace\",\"path\":\"/spec/services/VllmEPWorker/extraPodSpec/mainContainer/env/${CACHE_ENV_INDEX}/value\",\"value\":\"${gb}\"}]"
            sleep 5
            # Delete old EP pod to free GPU for the new revision
            # (rolling update deadlocks because new pod can't get GPU while old holds it)
            echo "Deleting old EP worker pod to free GPU..."
            kubectl delete pod -l nvidia.com/dynamo-component=${EP_COMPONENT} --wait=true
            wait_for_pod_ready "nvidia.com/dynamo-component=${EP_COMPONENT}"
            wait_for_all_pods_ready "nvidia.com/dynamo-component=${DECODE_COMPONENT}" "${DECODE_REPLICAS}"
            wait_for_model
          }

          run_one() {
            local mode=$1 ds=$2 rate=$3
            RUN_DIR="${ARTIFACT_BASE_DIR}/${mode}/${ds}/r${rate}"
            mkdir -p "${RUN_DIR}"

            echo "=== Running: ${mode} ${ds} request_rate=${rate} ==="
            aiperf profile \
              --model "${MODEL_NAME}" \
              --input-file "${DATASET_DIR}/${ds}.jsonl" \
              --custom-dataset-type single_turn \
              --url "http://${FRONTEND}:8000" \
              --streaming \
              --ui-type none \
              --request-count "${REQUEST_COUNT}" \
              --request-rate "${rate}" \
              --warmup-request-count "${WARMUP_REQUEST_COUNT}" \
              --artifact-dir "${RUN_DIR}" \
              --extra-inputs "max_tokens:${MAX_TOKENS}" \
              --extra-inputs "min_tokens:${MAX_TOKENS}" \
              --extra-inputs "ignore_eos:true"

            echo "Done: ${RUN_DIR}"
          }

          DATASETS=(
            "1000req_1img_200pool_400word_base64"
            "1000req_1img_200pool_400word_http"
            "1000req_1img_500pool_400word_base64"
            "1000req_1img_500pool_400word_http"
            "1000req_1img_800pool_400word_base64"
            "1000req_1img_800pool_400word_http"
            "1000req_2img_400pool_400word_base64"
            "1000req_2img_400pool_400word_http"
            "1000req_2img_1000pool_400word_base64"
            "1000req_2img_1000pool_400word_http"
            "1000req_2img_1600pool_400word_base64"
            "1000req_2img_1600pool_400word_http"
          )
          REQUEST_RATES=(4 8 16 32 64)

          # Wait for datasets
          for ds in "${DATASETS[@]}"; do
            until [ -f "${DATASET_DIR}/${ds}.jsonl" ]; do
              echo "Waiting for ${ds}.jsonl ..."
              sleep 15
            done
          done

          wait_for_model

          for ds in "${DATASETS[@]}"; do
            for rate in "${REQUEST_RATES[@]}"; do
              # cache_on: set cache, restart, run
              set_cache_gb "${CACHE_GB}"
              restart_workers
              run_one cache_on "${ds}" "${rate}"

              # cache_off: set cache=0, restart, run
              set_cache_gb 0
              restart_workers
              run_one cache_off "${ds}" "${rate}"
            done
          done

          # Restore cache setting
          set_cache_gb "${CACHE_GB}"

          echo "All runs complete. Artifacts in ${ARTIFACT_BASE_DIR}"
          sleep 3600
      env:
        - name: MODEL_NAME
          value: Qwen/Qwen3-VL-30B-A3B-Instruct-FP8
        - name: FRONTEND
          value: qwen3-vl-epd-gb200-frontend
        - name: GRAPH_DEPLOYMENT
          value: qwen3-vl-epd-gb200
        - name: EP_COMPONENT
          value: VllmEPWorker
        - name: DECODE_COMPONENT
          value: VllmDecodeWorker
        - name: DECODE_REPLICAS
          value: "3"
        - name: CACHE_ENV_INDEX
          value: "3"  # index of DYN_MULTIMODAL_EMBEDDING_CACHE_GB in deploy.yaml EP worker env array
        - name: CACHE_GB
          value: "10"
        - name: MAX_TOKENS
          value: "150"
        - name: REQUEST_COUNT
          value: "1000"
        - name: WARMUP_REQUEST_COUNT
          value: "5"
        - name: DATASET_DIR
          value: /perf-cache-tmp/datasets
        - name: ARTIFACT_BASE_DIR
          value: /perf-cache-tmp/artifacts/fp8/gb200/ep_d
      resources:
        requests:
          cpu: "8"
          memory: 16Gi
        limits:
          cpu: "16"
          memory: 32Gi
      volumeMounts:
        - name: perf-cache-tmp
          mountPath: /perf-cache-tmp
  volumes:
    - name: perf-cache-tmp
      persistentVolumeClaim:
        claimName: perf-cache-tmp
  restartPolicy: Never
