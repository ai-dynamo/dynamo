#
# EP+D (Encode+Prefill combined, Decode separate) deployment with embedding cache.
# 1 EP worker (encode+prefill on 1 GPU) + 3 Decode workers (1 GPU each) = 4 GPUs total.
#
# Toggle embedding cache:
#   cache ON:  DYN_MULTIMODAL_EMBEDDING_CACHE_GB = "10" (or any non-zero value)
#   cache OFF: DYN_MULTIMODAL_EMBEDDING_CACHE_GB = "0"
#
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: qwen3-vl-epd-gb200
  annotations:
    nvidia.com/enable-grove: "false"
spec:
  pvcs:
    - create: false
      name: model-cache-tmp
  services:
    Frontend:
      componentType: frontend
      envs:
        - name: HF_HOME
          value: /home/dynamo/.cache/huggingface
        - name: DYN_REQUEST_PLANE
          value: tcp
      extraPodSpec:
        nodeSelector:
          workload: qiwa-ep-d
        tolerations:
          - key: "dedicated"
            value: "user-workload"
            effect: "NoSchedule"
            operator: "Equal"
          - key: "dedicated"
            value: "user-workload"
            effect: "NoExecute"
            operator: "Equal"
        mainContainer:
          image: nvcr.io/nvstaging/ai-dynamo/vllm-runtime:1.0.0rc8-arm64
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
      replicas: 1
      resources:
        requests:
          cpu: "8"
      subComponentType: null

    VllmEPWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodSpec:
        nodeSelector:
          workload: qiwa-ep-d
        tolerations:
          - key: "dedicated"
            value: "user-workload"
            effect: "NoSchedule"
            operator: "Equal"
          - key: "dedicated"
            value: "user-workload"
            effect: "NoExecute"
            operator: "Equal"
          - key: "nvidia.com/gpu"
            operator: "Exists"
            effect: "NoSchedule"
        mainContainer:
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail

              SITE_PACKAGES="$(python3 -c 'import pathlib, vllm; print(pathlib.Path(vllm.__file__).resolve().parent.parent)')"
              cd "${SITE_PACKAGES}"
              curl -sL https://github.com/vllm-project/vllm/pull/34182.diff | patch -p1
              curl -sL https://github.com/vllm-project/vllm/pull/34783.diff | python3 -c "
              import sys
              chunks = sys.stdin.read().split('diff --git ')
              filtered = [c for c in chunks if c.startswith('a/vllm/')]
              print(''.join('diff --git ' + c for c in filtered))
              " | patch -p1
              cd /workspace

              python3 -m dynamo.vllm \
                --multimodal-worker \
                --disaggregation-mode prefill \
                --enable-multimodal \
                --enable-mm-embeds \
                --model Qwen/Qwen3-VL-30B-A3B-Instruct-FP8 \
                --max-model-len 16384 \
                --gpu-memory-utilization 0.9 \
                --disable-log-requests \
                --multimodal-embedding-cache-capacity-gb "${DYN_MULTIMODAL_EMBEDDING_CACHE_GB}" \
                --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both"}'
          image: nvcr.io/nvstaging/ai-dynamo/vllm-runtime:1.0.0rc8-arm64
          imagePullPolicy: IfNotPresent
          env:
            - name: HF_HOME
              value: /home/dynamo/.cache/huggingface
            - name: DYN_REQUEST_PLANE
              value: tcp
            - name: DYN_VLLM_EMBEDDING_TRANSFER_MODE
              value: nixl-write
            - name: DYN_MULTIMODAL_EMBEDDING_CACHE_GB
              value: "10"  # DYN_MULTIMODAL_EMBEDDING_CACHE_GB
          workingDir: /workspace
      replicas: 1
      resources:
        limits:
          gpu: "1"
        requests:
          gpu: "1"
      subComponentType: null
      volumeMounts:
        - name: model-cache-tmp
          mountPoint: /home/dynamo/.cache/huggingface

    VllmDecodeWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodSpec:
        nodeSelector:
          workload: qiwa-ep-d
        tolerations:
          - key: "dedicated"
            value: "user-workload"
            effect: "NoSchedule"
            operator: "Equal"
          - key: "dedicated"
            value: "user-workload"
            effect: "NoExecute"
            operator: "Equal"
          - key: "nvidia.com/gpu"
            operator: "Exists"
            effect: "NoSchedule"
        mainContainer:
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail

              SITE_PACKAGES="$(python3 -c 'import pathlib, vllm; print(pathlib.Path(vllm.__file__).resolve().parent.parent)')"
              cd "${SITE_PACKAGES}"
              curl -sL https://github.com/vllm-project/vllm/pull/34182.diff | patch -p1
              curl -sL https://github.com/vllm-project/vllm/pull/34783.diff | python3 -c "
              import sys
              chunks = sys.stdin.read().split('diff --git ')
              filtered = [c for c in chunks if c.startswith('a/vllm/')]
              print(''.join('diff --git ' + c for c in filtered))
              " | patch -p1
              cd /workspace

              python3 -m dynamo.vllm \
                --multimodal-decode-worker \
                --enable-multimodal \
                --enable-mm-embeds \
                --model Qwen/Qwen3-VL-30B-A3B-Instruct-FP8 \
                --max-model-len 16384 \
                --gpu-memory-utilization 0.9 \
                --disable-log-requests \
                --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both"}'
          image: nvcr.io/nvstaging/ai-dynamo/vllm-runtime:1.0.0rc8-arm64
          imagePullPolicy: IfNotPresent
          env:
            - name: HF_HOME
              value: /home/dynamo/.cache/huggingface
            - name: DYN_REQUEST_PLANE
              value: tcp
          workingDir: /workspace
      replicas: 3
      resources:
        limits:
          gpu: "1"
        requests:
          gpu: "1"
      subComponentType: null
      volumeMounts:
        - name: model-cache-tmp
          mountPoint: /home/dynamo/.cache/huggingface
