# Minimal single-node Kimi K2.5 GMS shadow-failover recipe for the PR #8572
# reduction stack.
#
# Intended code stack:
# - Dynamo branch: schwinns/kimi-minimal-pr8572-clean-20260423
# - TRT-LLM branch: schwinns/kimi-minimal-filelock-stack-20260423
#
# Deliberate constraints for the first proof:
# - CUDA graphs disabled
# - TRT-LLM autotuner disabled
# - no KV-shrink cheat knobs
# - same-process executor enabled to avoid the old MPI bootstrap seam
#
# Before apply:
# - replace both REPLACE_WITH_RUNTIME_IMAGE values with the same pushed runtime image
#   (prefer a digest-pinned nvcr.io/nvidian/dynamo-dev/schwinns:...@sha256:... ref)
# - apply with: kubectl --context <ctx> -n schwinns apply -f <this file>

apiVersion: v1
kind: ConfigMap
metadata:
  name: kimi-k25-failover-minimal-pr8572-config
data:
  config.yaml: |
    backend: pytorch
    trust_remote_code: true
    allreduce_strategy: NCCL
    enable_autotuner: false
    max_num_tokens: 8192
    enable_chunked_prefill: false
    enable_attention_dp: false
    max_batch_size: 8
    disable_overlap_scheduler: true
    cuda_graph_config: null
    kv_cache_config:
      dtype: fp8
      enable_block_reuse: true
      free_gpu_memory_fraction: 0.75
    moe_config:
      backend: TRTLLM
      max_num_tokens: 2048
    moe_expert_parallel_size: 8
    num_postprocess_workers: 8
    print_iter_log: true
    stream_interval: 10
    tensor_parallel_size: 8
    speculative_config:
      decoding_type: Eagle
      max_draft_len: 3
      speculative_model_dir: /opt/models/hub/models--nvidia--Kimi-K2.5-Thinking-Eagle3/snapshots/0b0c6ac039089ad2c2418c91c039553381a302d9
      allow_advanced_sampling: true
---
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: kimi-k25-failover-pr8572
  annotations:
    nvidia.com/dynamo-kube-discovery-mode: container
spec:
  backendFramework: trtllm
  services:
    Frontend:
      envFromSecret: hf-token-secret
      componentType: frontend
      replicas: 1
      extraPodSpec:
        imagePullSecrets:
          - name: ngc-secret
        mainContainer:
          image: REPLACE_WITH_RUNTIME_IMAGE
          command:
            - /bin/sh
            - -c
          args:
            - python3 -m dynamo.frontend --router-mode kv --router-reset-states --http-port 8000 --discovery-backend kubernetes --request-plane nats
    TRTLLMWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      replicas: 1
      resources:
        limits:
          gpu: "8"
        requests:
          custom:
            ephemeral-storage: "4Gi"
      sharedMemory:
        size: 179Gi
      gpuMemoryService:
        enabled: true
      failover:
        enabled: true
      extraPodSpec:
        imagePullSecrets:
          - name: ngc-secret
        mainContainer:
          image: REPLACE_WITH_RUNTIME_IMAGE
          workingDir: /workspace/
          command:
            - /bin/sh
            - -c
          args:
            - |
              python3 -m dynamo.trtllm \
                --model "${MODEL_NAME}" \
                --served-model-name "${SERVED_MODEL_NAME}" \
                --extra-engine-args "${ENGINE_ARGS}" \
                --load-format gms \
                --gms-shadow-mode \
                --discovery-backend kubernetes \
                --request-plane nats \
                --publish-events-and-metrics \
                --kv-block-size 32 \
                --dyn-tool-call-parser kimi_k2 \
                --dyn-reasoning-parser kimi_k25
          env:
            - name: MODEL_NAME
              value: nvidia/Kimi-K2.5-NVFP4
            - name: SERVED_MODEL_NAME
              value: nvidia/Kimi-K2.5-NVFP4
            - name: ENGINE_ARGS
              value: /opt/dynamo/configs/config.yaml
            - name: HF_HOME
              value: /opt/models
            - name: NCCL_DEBUG
              value: INFO
            - name: TRTLLM_ENABLE_PDL
              value: "1"
            - name: ENABLE_CONFIGURABLE_MOE
              value: "1"
            - name: TLLM_LOG_LEVEL
              value: INFO
            - name: TLLM_WORKER_USE_SINGLE_PROCESS
              value: "1"
            - name: MPI4PY_MPIABI
              value: openmpi
            - name: OMPI_MCA_coll_ucc_enable
              value: "0"
            - name: OMPI_MCA_coll_hcoll_enable
              value: "0"
            - name: OMPI_MCA_pml
              value: ob1
            - name: OMPI_MCA_btl
              value: "self,tcp"
          volumeMounts:
            - name: llm-config
              mountPath: /opt/dynamo/configs
              readOnly: true
            - name: hf-cache
              mountPath: /opt/models
        volumes:
          - name: llm-config
            configMap:
              name: kimi-k25-failover-minimal-pr8572-config
          - name: hf-cache
            persistentVolumeClaim:
              claimName: shared-model-cache
        nodeSelector:
          gds-test: "true"
        tolerations:
          - effect: NoSchedule
            key: schwinns-dra-reserved
            operator: Equal
            value: "true"
          - effect: NoSchedule
            key: nvidia.com/gpu
            operator: Exists
          - effect: NoSchedule
            key: dra
            operator: Exists
