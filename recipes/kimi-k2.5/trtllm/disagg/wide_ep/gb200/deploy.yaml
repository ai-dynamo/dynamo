# Kimi-K2.5 NVFP4 disaggregated WideEP on 10x GB200 (40 GPUs), tuned for ISL/OSL=8192/1024.
#
# Topology: 2 prefill (CTX) workers, each on 1 GB200 node, DEP4 (TP=4 EP=4 ADP).
#           1 decode  (GEN) worker on 8 GB200 nodes, DEP32 (TP=32 EP=32 ADP).
# MoE: CUTEDSL on both CTX and GEN. KV cache: FP8. No speculative decoding
# (Kimi-K2.5 has no MTP layers).
#
# Instructions:
# 1. kubectl apply -f ../../../../model-cache/model-cache.yaml -n <namespace>
# 2. kubectl apply -f ../../../../model-cache/nvidia/model-download.yaml -n <namespace>
# 3. kubectl apply -f deploy.yaml -n <namespace>
# 4. kubectl apply -f perf.yaml -n <namespace>

apiVersion: v1
kind: ConfigMap
metadata:
  name: kimi-prefill-config
data:
  prefill.yaml: |
    backend: pytorch
    trust_remote_code: true
    max_batch_size: 2
    max_num_tokens: 8768
    max_seq_len: 9216
    tensor_parallel_size: 4
    moe_expert_parallel_size: 4
    pipeline_parallel_size: 1
    enable_attention_dp: true
    enable_lm_head_tp_in_adp: true
    disable_overlap_scheduler: true
    cuda_graph_config: null
    print_iter_log: true
    kv_cache_config:
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.6
      dtype: fp8
    moe_config:
      backend: CUTEDSL
      use_low_precision_moe_combine: true
    cache_transceiver_config:
      max_tokens_in_buffer: 16384
      backend: DEFAULT
---

apiVersion: v1
kind: ConfigMap
metadata:
  name: kimi-decode-config
data:
  decode.yaml: |
    backend: pytorch
    trust_remote_code: true
    tensor_parallel_size: 32
    moe_expert_parallel_size: 32
    pipeline_parallel_size: 1
    enable_attention_dp: true
    enable_lm_head_tp_in_adp: true
    max_batch_size: 256
    max_num_tokens: 256
    max_seq_len: 9216
    cuda_graph_config:
      enable_padding: true
      batch_sizes:
      - 1
      - 2
      - 4
      - 8
      - 16
      - 32
      - 64
      - 128
      - 256
    print_iter_log: true
    kv_cache_config:
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.8
      dtype: fp8
    moe_config:
      backend: CUTEDSL
      use_low_precision_moe_combine: true
    cache_transceiver_config:
      max_tokens_in_buffer: 16384
      backend: DEFAULT
    stream_interval: 100
    num_postprocess_workers: 4
---

# numNodes = prefill_replicas + decode_nodeCount = 2 + 8 = 10.
apiVersion: resource.nvidia.com/v1beta1
kind: ComputeDomain
metadata:
  name: kimi-k25-disagg-compute-domain
spec:
  numNodes: 10
  channel:
    resourceClaimTemplate:
      name: kimi-k25-disagg-compute-domain-channel
---

apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: kimi-k25-disagg
spec:
  pvcs:
    - name: model-cache
      create: false
  envs:
    - name: NCCL_MNNVL_ENABLE
      value: "1"
    - name: NCCL_CUMEM_ENABLE
      value: "1"
    - name: TLLM_LOG_LEVEL
      value: "info"
    - name: TRTLLM_MOE_ENABLE_ALLTOALL_WITHOUT_ALLGATHER
      value: "1"
    - name: TRTLLM_ENABLE_PDL
      value: "1"
    - name: TRTLLM_SERVER_DISABLE_GC
      value: "1"
    - name: TRTLLM_WORKER_DISABLE_GC
      value: "1"
  backendFramework: trtllm
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      volumeMounts:
        - name: model-cache
          mountPoint: /opt/models
      extraPodSpec:
        tolerations: []
        affinity: {}
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.0.2
          env:
            - name: HF_HOME
              value: /opt/models
          args:
          - |
            python3 -m dynamo.frontend --http-port 8000
          command:
          - /bin/sh
          - -c
    prefill:
      componentType: worker
      subComponentType: prefill
      replicas: 2
      envFromSecret: hf-token-secret
      volumeMounts:
        - name: model-cache
          mountPoint: /opt/models
      sharedMemory:
        size: 800Gi
      resources:
        requests:
          cpu: "130"
          memory: "850Gi"
        limits:
          cpu: "130"
          memory: "850Gi"
          gpu: "4"
        claims:
          - name: compute-domain-channel
      extraPodSpec:
        tolerations: []
        affinity: {}
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.0.2
          workingDir: /workspace/components/backends/trtllm
          startupProbe:
            httpGet:
              path: /live
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 600
          env:
            - name: HF_HOME
              value: /opt/models
          volumeMounts:
            - name: prefill-config-volume
              mountPath: /config
          command:
          - /bin/sh
          - -c
          args:
          - >-
            python3 -m dynamo.trtllm
            --model-path nvidia/Kimi-K2.5-NVFP4
            --served-model-name nvidia/Kimi-K2.5-NVFP4
            --extra-engine-args /config/prefill.yaml
            --disaggregation-mode prefill
            --dyn-reasoning-parser kimi_k25
            --dyn-tool-call-parser kimi_k2
        resourceClaims:
          - name: compute-domain-channel
            resourceClaimTemplateName: kimi-k25-disagg-compute-domain-channel
        volumes:
          - name: prefill-config-volume
            configMap:
              name: kimi-prefill-config
    decode:
      componentType: worker
      subComponentType: decode
      replicas: 1
      envFromSecret: hf-token-secret
      volumeMounts:
        - name: model-cache
          mountPoint: /opt/models
      multinode:
        nodeCount: 8
      sharedMemory:
        size: 800Gi
      resources:
        requests:
          cpu: "130"
          memory: "850Gi"
        limits:
          cpu: "130"
          memory: "850Gi"
          gpu: "4"
        claims:
          - name: compute-domain-channel
      extraPodSpec:
        tolerations: []
        affinity: {}
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.0.2
          workingDir: /workspace/components/backends/trtllm
          startupProbe:
            httpGet:
              path: /live
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 600
          env:
            - name: HF_HOME
              value: /opt/models
          volumeMounts:
            - name: decode-config-volume
              mountPath: /config
          command:
          - /bin/sh
          - -c
          args:
          - >-
            python3 -m dynamo.trtllm
            --model-path nvidia/Kimi-K2.5-NVFP4
            --served-model-name nvidia/Kimi-K2.5-NVFP4
            --extra-engine-args /config/decode.yaml
            --disaggregation-mode decode
            --dyn-reasoning-parser kimi_k25
            --dyn-tool-call-parser kimi_k2
        resourceClaims:
          - name: compute-domain-channel
            resourceClaimTemplateName: kimi-k25-disagg-compute-domain-channel
        volumes:
          - name: decode-config-volume
            configMap:
              name: kimi-decode-config
