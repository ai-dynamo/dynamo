apiVersion: v1
kind: ConfigMap
metadata:
  name: prefill-config
data:
  prefill.yaml: |
    backend: pytorch
    trust_remote_code: true
    tensor_parallel_size: 2
    moe_tensor_parallel_size: 2
    moe_expert_parallel_size: 1
    enable_attention_dp: false
    enable_chunked_prefill: false
    kv_cache_config:
      enable_block_reuse: true
      free_gpu_memory_fraction: 0.7
      dtype: fp8
    cache_transceiver_config:
      backend: DEFAULT
    cuda_graph_config:
      enable_padding: true
      max_batch_size: 2
    disable_overlap_scheduler: true
    print_iter_log: false
    # Required on Blackwell (SM100+): default CUTLASS backend falls through to a
    # Hopper-specific JIT path on SM100 with TRT-LLM 1.3.x. DEEPGEMM is the workaround.
    moe_config:
      backend: DEEPGEMM
      max_num_tokens: 8192
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: decode-config
data:
  decode.yaml: |
    backend: pytorch
    trust_remote_code: true
    tensor_parallel_size: 4
    moe_expert_parallel_size: 4
    moe_tensor_parallel_size: 1
    enable_attention_dp: false
    enable_chunked_prefill: false
    kv_cache_config:
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.95
      dtype: fp8
    cache_transceiver_config:
      backend: DEFAULT
    cuda_graph_config:
      enable_padding: true
      max_batch_size: 512
    disable_overlap_scheduler: false
    print_iter_log: false
    # Required on Blackwell (SM100+): default CUTLASS backend falls through to a
