apiVersion: v1
kind: Pod
metadata:
  name: qwen3-vl-30b-disagg-e-pd-benchmark-cache-off
  labels:
    app: benchmark
spec:
  containers:
    - name: benchmark
      image: python:3.11
      command:
        - /bin/bash
        - -lc
        - |
          set -euo pipefail
          ulimit -n 1048576
          ulimit -u 65536

          apt update && apt install -y tmux curl jq
          pip install aiperf

          echo "Waiting for model '${MODEL_NAME}' at http://${FRONTEND}:8000/v1/models..."
          until curl -s "http://${FRONTEND}:8000/v1/models" | jq -e --arg model "${MODEL_NAME}" '.data[]? | select(.id == $model)' >/dev/null 2>&1; do
            echo "[$(date '+%H:%M:%S')] Model not ready, retrying in 5s..."
            sleep 5
          done
          echo "Model '${MODEL_NAME}' is ready."

          mkdir -p "${ARTIFACT_BASE_DIR}"
          mkdir -p "${DATASET_DIR}"

          tags=(r00 r10 r25 r50 r75)
          missing=1
          until [ "${missing}" -eq 0 ]; do
            missing=0
            for tag in "${tags[@]}"; do
              input_file="${DATASET_DIR}/qwen3_vl_500req_3img_${tag}.jsonl"
              if [ ! -f "${input_file}" ]; then
                missing=1
                break
              fi
            done
            if [ "${missing}" -eq 1 ]; then
              echo "Waiting for datasets to appear in ${DATASET_DIR} ..."
              sleep 15
            fi
          done

          for tag in "${tags[@]}"; do
            input_file="${DATASET_DIR}/qwen3_vl_500req_3img_${tag}.jsonl"
            run_name="${CACHE_MODE}_${tag}"
            run_dir="${ARTIFACT_BASE_DIR}/${run_name}"
            mkdir -p "${run_dir}"

            echo "Running benchmark ${run_name} ..."
            aiperf profile \
              --model "${MODEL_NAME}" \
              --input-file "${input_file}" \
              --custom-dataset-type single_turn \
              --shared-system-prompt-length "${SYSTEM_PROMPT_TOKENS}" \
              --url "http://${FRONTEND}:8000" \
              --streaming \
              --ui-type none \
              --request-count "${REQUEST_COUNT}" \
              --concurrency "${CONCURRENCY}" \
              --request-rate "${REQUEST_RATE}" \
              --request-rate-mode constant \
              --warmup-request-count "${WARMUP_REQUEST_COUNT}" \
              --warmup-duration "${WARMUP_DURATION}" \
              --artifact-dir "${run_dir}" \
              --extra-inputs "max_tokens:${MAX_TOKENS}" \
              --extra-inputs "min_tokens:${MAX_TOKENS}" \
              --extra-inputs "ignore_eos:true"
          done

          echo "All runs complete. Artifacts in ${ARTIFACT_BASE_DIR}"
          sleep 3600
      env:
        - name: MODEL_NAME
          value: Qwen/Qwen3-VL-30B-A3B-Instruct
        - name: FRONTEND
          value: qwen3-vl-30b-disagg-e-pd-cache-off-frontend
        - name: CACHE_MODE
          value: cache_off
        - name: SYSTEM_PROMPT_TOKENS
          value: "160"
        - name: MAX_TOKENS
          value: "500"
        - name: REQUEST_COUNT
          value: "500"
        - name: CONCURRENCY
          value: "32"
        - name: REQUEST_RATE
          value: "32"
        - name: WARMUP_REQUEST_COUNT
          value: "50"
        - name: WARMUP_DURATION
          value: "60"
        - name: DATASET_DIR
          value: /perf-cache/datasets
        - name: ARTIFACT_BASE_DIR
          value: /perf-cache/artifacts/qwen3_vl_30b_encoder_cache/disagg_e_pd
      resources:
        requests:
          cpu: "8"
          memory: 16Gi
        limits:
          cpu: "16"
          memory: 32Gi
      volumeMounts:
        - name: perf-cache
          mountPath: /perf-cache
  volumes:
    - name: perf-cache
      persistentVolumeClaim:
        claimName: perf-cache
  restartPolicy: Never
