apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: qwen3-vl-30b-disagg-ep-d-cache-on
spec:
  pvcs:
    - create: false
      name: model-cache
    - create: false
      name: compilation-cache
  services:
    Frontend:
      componentType: frontend
      envs:
        - name: HF_HOME
          value: /home/dynamo/.cache/huggingface
        - name: DYN_REQUEST_PLANE
          value: tcp
      extraPodSpec:
        mainContainer:
          image: dynamo:latest-vllm-runtime
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
      replicas: 1
      resources:
        requests:
          cpu: "8"
        limits:
          cpu: "8"
      subComponentType: null

    VllmEpWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodSpec:
        mainContainer:
          args:
            - --multimodal-worker
            - --disaggregation-mode
            - prefill
            - --enable-multimodal
            - --enable-mm-embeds
            - --model
            - Qwen/Qwen3-VL-30B-A3B-Instruct
            - --tensor-parallel-size
            - "1"
            - --gpu-memory-utilization
            - "0.85"
            - --enable-prefix-caching
            # In EP mode (no route-to-encoder), this enables Dynamo ec_both embedding cache path.
            - --multimodal-embedding-cache-capacity-gb
            - "10"
            - --kv-transfer-config
            - '{"kv_connector":"NixlConnector","kv_role":"kv_both"}'
            - --kv-events-config
            - '{"publisher":"zmq","topic":"kv-events","endpoint":"tcp://*:20080","enable_kv_cache_events":true}'
          command:
            - python3
            - -m
            - dynamo.vllm
          image: dynamo:latest-vllm-runtime
          imagePullPolicy: IfNotPresent
          env:
            - name: HF_HOME
              value: /home/dynamo/.cache/huggingface
            - name: DYN_REQUEST_PLANE
              value: tcp
            - name: DYN_VLLM_EMBEDDING_TRANSFER_MODE
              value: nixl-write
          workingDir: /workspace
      replicas: 4
      resources:
        limits:
          gpu: "1"
        requests:
          gpu: "1"
      subComponentType: prefill
      volumeMounts:
        - name: model-cache
          mountPoint: /home/dynamo/.cache/huggingface
        - name: compilation-cache
          mountPoint: /home/dynamo/.cache/vllm
          useAsCompilationCache: true

    VllmDecodeWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodSpec:
        mainContainer:
          args:
            - --multimodal-decode-worker
            - --enable-multimodal
            - --enable-mm-embeds
            - --model
            - Qwen/Qwen3-VL-30B-A3B-Instruct
            - --tensor-parallel-size
            - "1"
            - --gpu-memory-utilization
            - "0.85"
            - --enable-prefix-caching
            - --kv-transfer-config
            - '{"kv_connector":"NixlConnector","kv_role":"kv_both"}'
            - --kv-events-config
            - '{"publisher":"zmq","topic":"kv-events","endpoint":"tcp://*:20084","enable_kv_cache_events":true}'
          command:
            - python3
            - -m
            - dynamo.vllm
          image: dynamo:latest-vllm-runtime
          imagePullPolicy: IfNotPresent
          env:
            - name: HF_HOME
              value: /home/dynamo/.cache/huggingface
            - name: DYN_REQUEST_PLANE
              value: tcp
            - name: DYN_VLLM_EMBEDDING_TRANSFER_MODE
              value: nixl-write
          workingDir: /workspace
      replicas: 4
      resources:
        limits:
          gpu: "1"
        requests:
          gpu: "1"
      subComponentType: decode
      volumeMounts:
        - name: model-cache
          mountPoint: /home/dynamo/.cache/huggingface
        - name: compilation-cache
          mountPoint: /home/dynamo/.cache/vllm
          useAsCompilationCache: true
