apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: qwen3-vl-agg
spec:
  pvcs:
    - create: false
      name: model-cache
    - create: false
      name: compilation-cache
  services:
    Frontend:
      componentType: frontend
      envs:
        - name: HF_HOME
          value: /home/dynamo/.cache/huggingface
        - name: DYN_REQUEST_PLANE
          value: tcp
      extraPodSpec:
        mainContainer:
          # Use a patched image for agg encoder-cache flows (ec_both support).
          image: <your-dynamo-image>
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
      replicas: 1
      resources:
        requests:
          cpu: "8"
        limits:
          cpu: "8"
      subComponentType: null

    VllmWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      extraPodSpec:
        mainContainer:
          command:
            - /bin/bash
            - -lc
          args:
            - |
              python3 -m dynamo.vllm \
                --model Qwen/Qwen3-VL-30B-A3B-Instruct \
                --enable-multimodal \
                --tensor-parallel-size 1 \
                --gpu-memory-utilization 0.85 \
                --max-model-len 16384 \
                --disable-log-requests \
                --enable-prefix-caching \
                --multimodal-embedding-cache-capacity-gb "${MM_EMBEDDING_CACHE_GB}"
          # Use a patched image for agg encoder-cache flows (ec_both support).
          image: <your-dynamo-image>
          imagePullPolicy: IfNotPresent
          env:
            - name: HF_HOME
              value: /home/dynamo/.cache/huggingface
            - name: DYN_REQUEST_PLANE
              value: tcp
            - name: DYN_VLLM_EMBEDDING_TRANSFER_MODE
              value: nixl-write
            - name: MM_EMBEDDING_CACHE_GB
              value: "0"
          workingDir: /workspace
      replicas: 8
      resources:
        limits:
          gpu: "1"
        requests:
          gpu: "1"
      subComponentType: null
      volumeMounts:
        - name: model-cache
          mountPoint: /home/dynamo/.cache/huggingface
        - name: compilation-cache
          mountPoint: /home/dynamo/.cache/vllm
          useAsCompilationCache: true
