apiVersion: batch/v1
kind: Job
metadata:
  name: model-download
spec:
  backoffLimit: 3
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app: model-download
    spec:
      restartPolicy: Never
      containers:
        - name: model-download
          image: python:3.10-slim
          command: ["sh", "-c"]
          envFrom:
            - secretRef:
                name: hf-token-secret
          env:
            - name: HF_HOME
              value: /model-store
            # Default "0" = portable: XET buffers cap ~8 GB so the Job schedules on standard CPU nodes.
            # For faster downloads on nodes with >=64Gi allocatable RAM, set "1" AND raise the memory
            # request/limit below to "64Gi": https://huggingface.co/docs/hub/en/xet/using-xet-storage#download-buffers
            - name: HF_XET_HIGH_PERFORMANCE
              value: "0"
          args:
            - |
              set -eux
              pip install --no-cache-dir huggingface_hub==1.11.0 click==8.1.8
              # Remove the download that does not apply to your SKU:
              hf download --max-workers 4 nvidia/DeepSeek-V4-Pro-NVFP4   # B200 recipes (NVFP4)
              hf download --max-workers 4 deepseek-ai/DeepSeek-V4-Pro     # H200 recipes (public)
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
            limits:
              cpu: "8"
              memory: "16Gi"
          volumeMounts:
            - name: model-cache
              mountPath: /model-store
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache
