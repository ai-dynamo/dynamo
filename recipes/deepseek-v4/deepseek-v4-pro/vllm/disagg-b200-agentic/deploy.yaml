apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: dsv4-pro-disagg-b200-agentic
spec:
  backendFramework: vllm
  pvcs:
  - name: model-cache
    create: false
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      extraPodSpec:
        mainContainer:
          # TODO(post-PR): swap for the Dynamo CI deepseek-v4 vllm-runtime tag once built.
          image: nvcr.io/nvstaging/nim/sungsooh:dsv4-dynamo-vllm-cu130-v0240-dynmain-4a8c55b3-nopatch-20260702
          workingDir: /workspace
          command:
          - /bin/bash
          - -lc
          args:
          - |
            python3 -m dynamo.frontend \
              --router-mode kv \
              --router-kv-events \
              --kv-cache-block-size 256 \
              --router-reset-states \
              --http-host 0.0.0.0 \
              --http-port 8000
    VllmPrefillWorker:
      componentType: worker
      subComponentType: prefill
      replicas: 1
      volumeMounts:
      - name: model-cache
        mountPoint: /model-cache
      resources:
        requests:
          gpu: "8"
          rdma/ib: "8"
        limits:
          gpu: "8"
          rdma/ib: "8"
      extraPodSpec:
        volumes:
        - name: shared-memory
          emptyDir:
            medium: Memory
            sizeLimit: 200Gi
        nodeSelector:
          nvidia.com/gpu.product: NVIDIA-B200
        runtimeClassName: nvidia
        mainContainer:
          # TODO(post-PR): swap for the Dynamo CI deepseek-v4 vllm-runtime tag once built.
          image: nvcr.io/nvstaging/nim/sungsooh:dsv4-dynamo-vllm-cu130-v0240-dynmain-4a8c55b3-nopatch-20260702
          workingDir: /workspace
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              add:
              - IPC_LOCK
              - SYS_RESOURCE
          volumeMounts:
          - name: shared-memory
            mountPath: /dev/shm
          env:
          - name: HF_HOME
            value: /model-cache
          - name: HF_HUB_CACHE
            value: /model-cache
          - name: HF_HUB_OFFLINE
            value: "1"
          - name: TRANSFORMERS_OFFLINE
            value: "1"
          - name: VLLM_SKIP_P2P_CHECK
            value: "1"
          - name: NCCL_CUMEM_ENABLE
            value: "1"
          - name: NCCL_IB_DISABLE
            value: "0"
          - name: VLLM_ALLREDUCE_USE_FLASHINFER
            value: "1"
          # Per-rank GPU->NIC PCIe map (vLLM #42083), REQUIRED for GDR. Cluster-specific:
          # value below is the nscale B200 map we benchmarked (regenerate per node:
          # lspci for GPU BDF; readlink /sys/class/infiniband/<mlx5_X>/device for NIC BDF).
          - name: VLLM_GPU_NIC_PCIE_MAPPING
            value: "00000000:18:00.0=0000:19:00.0,00000000:29:00.0=0000:2a:00.0,00000000:3A:00.0=0000:3b:00.0,00000000:4B:00.0=0000:4c:00.0,00000000:9A:00.0=0000:9b:00.0,00000000:AA:00.0=0000:ab:00.0,00000000:BA:00.0=0000:bc:00.0,00000000:CA:00.0=0000:cb:00.0"
          - name: VLLM_NIC_SELECTION_VARS
            value: "UCX_NET_DEVICES:1"
          - name: UCX_TLS
            value: rc_x,rc,cuda_copy,cuda_ipc
          - name: UCX_IB_ADDR_TYPE
            value: eth  # fabric-specific: eth=RoCE. For InfiniBand use ib_global (or auto); "ib" is NOT valid (valid: ib_local|ib_site_local|ib_global|eth|auto)
          - name: UCX_IB_REG_METHODS
            value: odp,rcache
          - name: UCX_RNDV_SCHEME
            value: get_zcopy
          - name: UCX_RNDV_THRESH
            value: "0"
          - name: UCX_MEMTYPE_CACHE
            value: "y"
          command:
          - /bin/bash
          - -lc
          args:
          - |
            set -Eeuo pipefail
            ulimit -l unlimited
            ulimit -n 1048576
            python3 -m dynamo.vllm \
              --model nvidia/DeepSeek-V4-Pro-NVFP4 \
              --served-model-name nvidia/DeepSeek-V4-Pro-NVFP4 \
              --trust-remote-code \
              --kv-cache-dtype fp8 \
              --block-size 256 \
              --gpu-memory-utilization 0.9348 \
              --max-model-len 1048576 \
              --max-num-batched-tokens 16384 \
              --enable-expert-parallel \
              --tensor-parallel-size 8 \
              --no-scheduler-reserve-full-isl \
              --attention-config '{
                  "use_fp4_indexer_cache": true
                }' \
              --moe-backend flashinfer_trtllm \
              --tokenizer-mode deepseek_v4 \
              --dyn-tool-call-parser deepseek_v4 \
              --dyn-reasoning-parser deepseek_v4 \
              --no-async-scheduling \
              --enable-prefix-caching \
              --kv-transfer-config '{
                  "kv_connector": "NixlConnector",
                  "kv_role": "kv_both",
                  "kv_buffer_device": "cuda"
                }' \
              --disaggregation-mode prefill \
              --kv-events-config '{
                  "publisher": "zmq",
                  "topic": "kv-events",
                  "endpoint": "tcp://*:5571",
                  "enable_kv_cache_events": true
                }'
    VllmDecodeWorker:
      componentType: worker
      subComponentType: decode
      replicas: 1
      volumeMounts:
      - name: model-cache
        mountPoint: /model-cache
      resources:
        requests:
          gpu: "8"
          rdma/ib: "8"
        limits:
          gpu: "8"
          rdma/ib: "8"
      extraPodSpec:
        volumes:
        - name: shared-memory
          emptyDir:
            medium: Memory
            sizeLimit: 200Gi
        nodeSelector:
          nvidia.com/gpu.product: NVIDIA-B200
        runtimeClassName: nvidia
        mainContainer:
          # TODO(post-PR): swap for the Dynamo CI deepseek-v4 vllm-runtime tag once built.
          image: nvcr.io/nvstaging/nim/sungsooh:dsv4-dynamo-vllm-cu130-v0240-dynmain-4a8c55b3-nopatch-20260702
          workingDir: /workspace
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              add:
              - IPC_LOCK
              - SYS_RESOURCE
          volumeMounts:
          - name: shared-memory
            mountPath: /dev/shm
          env:
          - name: HF_HOME
            value: /model-cache
          - name: HF_HUB_CACHE
            value: /model-cache
          - name: HF_HUB_OFFLINE
            value: "1"
          - name: TRANSFORMERS_OFFLINE
            value: "1"
          - name: VLLM_SKIP_P2P_CHECK
            value: "1"
          - name: NCCL_CUMEM_ENABLE
            value: "1"
          - name: NCCL_IB_DISABLE
            value: "0"
          - name: VLLM_ALLREDUCE_USE_FLASHINFER
            value: "1"
          # Per-rank GPU->NIC PCIe map (vLLM #42083), REQUIRED for GDR. Cluster-specific:
          # value below is the nscale B200 map we benchmarked (regenerate per node:
          # lspci for GPU BDF; readlink /sys/class/infiniband/<mlx5_X>/device for NIC BDF).
          - name: VLLM_GPU_NIC_PCIE_MAPPING
            value: "00000000:18:00.0=0000:19:00.0,00000000:29:00.0=0000:2a:00.0,00000000:3A:00.0=0000:3b:00.0,00000000:4B:00.0=0000:4c:00.0,00000000:9A:00.0=0000:9b:00.0,00000000:AA:00.0=0000:ab:00.0,00000000:BA:00.0=0000:bc:00.0,00000000:CA:00.0=0000:cb:00.0"
          - name: VLLM_NIC_SELECTION_VARS
            value: "UCX_NET_DEVICES:1"
          - name: UCX_TLS
            value: rc_x,rc,cuda_copy,cuda_ipc
          - name: UCX_IB_ADDR_TYPE
            value: eth  # fabric-specific: eth=RoCE. For InfiniBand use ib_global (or auto); "ib" is NOT valid (valid: ib_local|ib_site_local|ib_global|eth|auto)
          - name: UCX_IB_REG_METHODS
            value: odp,rcache
          - name: UCX_RNDV_SCHEME
            value: get_zcopy
          - name: UCX_RNDV_THRESH
            value: "0"
          - name: UCX_MEMTYPE_CACHE
            value: "y"
          command:
          - /bin/bash
          - -lc
          args:
          - |
            set -Eeuo pipefail
            ulimit -l unlimited
            ulimit -n 1048576
            python3 -m dynamo.vllm \
              --model nvidia/DeepSeek-V4-Pro-NVFP4 \
              --served-model-name nvidia/DeepSeek-V4-Pro-NVFP4 \
              --trust-remote-code \
              --kv-cache-dtype fp8 \
              --block-size 256 \
              --gpu-memory-utilization 0.9348 \
              --max-model-len 1048576 \
              --max-num-batched-tokens 16384 \
              --enable-expert-parallel \
              --tensor-parallel-size 8 \
              --no-scheduler-reserve-full-isl \
              --attention-config '{
                  "use_fp4_indexer_cache": true
                }' \
              --moe-backend flashinfer_trtllm \
              --tokenizer-mode deepseek_v4 \
              --dyn-tool-call-parser deepseek_v4 \
              --dyn-reasoning-parser deepseek_v4 \
              --max-num-seqs 128 \
              --compilation-config '{
                  "cudagraph_mode": "FULL_AND_PIECEWISE",
                  "custom_ops": [
                    "all"
                  ],
                  "cudagraph_capture_sizes": [
                    1,
                    2,
                    4,
                    8,
                    16,
                    24,
                    28,
                    30,
                    32,
                    34,
                    36,
                    40,
                    48,
                    56,
                    64,
                    72,
                    80,
                    88,
                    96,
                    104,
                    112,
                    120,
                    128,
                    136,
                    144,
                    152,
                    160,
                    168,
                    176,
                    184,
                    192,
                    200,
                    208,
                    216,
                    224,
                    232,
                    240,
                    248,
                    256
                  ],
                  "max_cudagraph_capture_size": 256
                }' \
              --speculative-config '{
                  "method": "mtp",
                  "num_speculative_tokens": 2
                }' \
              --kv-transfer-config '{
                  "kv_connector": "NixlConnector",
                  "kv_role": "kv_both",
                  "kv_buffer_device": "cuda",
                  "kv_connector_extra_config": {
                    "num_threads": 8
                  }
                }' \
              --disaggregation-mode decode
