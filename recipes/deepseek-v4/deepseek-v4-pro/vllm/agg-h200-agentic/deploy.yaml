apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: dsv4-pro-agg-h200-agentic
spec:
  backendFramework: vllm
  pvcs:
  - name: model-cache
    create: false
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      extraPodSpec:
        mainContainer:
          # TODO(post-PR): swap for the Dynamo CI deepseek-v4 vllm-runtime tag once built.
          image: nvcr.io/nvstaging/nim/sungsooh:dsv4-dynamo-vllm-cu130-v0240-dynmain-4a8c55b3-nopatch-20260702
          workingDir: /workspace
          command:
          - /bin/bash
          - -lc
          args:
          - |
            DYN_ROUTER_MODE=kv python3 -m dynamo.frontend --trust-remote-code
    VllmDecodeWorker:
      componentType: worker
      subComponentType: decode
      envFromSecret: hf-token-secret
      replicas: 1
      volumeMounts:
      - name: model-cache
        mountPoint: /model-cache
      resources:
        requests:
          gpu: "8"
        limits:
          gpu: "8"
      extraPodSpec:
        nodeSelector:
          nvidia.com/gpu.product: NVIDIA-H200
        mainContainer:
          # TODO(post-PR): swap for the Dynamo CI deepseek-v4 vllm-runtime tag once built.
          image: nvcr.io/nvstaging/nim/sungsooh:dsv4-dynamo-vllm-cu130-v0240-dynmain-4a8c55b3-nopatch-20260702
          workingDir: /workspace
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          env:
          - name: HF_HOME
            value: /model-cache
          - name: HF_HUB_CACHE
            value: /model-cache
          - name: HF_HUB_OFFLINE
            value: "1"
          - name: TRANSFORMERS_OFFLINE
            value: "1"
          - name: VLLM_SKIP_P2P_CHECK
            value: "1"
          - name: NCCL_CUMEM_ENABLE
            value: "1"
          - name: NCCL_NVLS_ENABLE
            value: "1"
          command:
          - /bin/bash
          - -lc
          args:
          - |
            python3 -m dynamo.vllm \
              --model deepseek-ai/DeepSeek-V4-Pro \
              --served-model-name deepseek-ai/DeepSeek-V4-Pro \
              --trust-remote-code \
              --kv-cache-dtype fp8 \
              --block-size 256 \
              --tensor-parallel-size 8 \
              --enable-expert-parallel \
              --max-model-len 86016 \
              --max-num-seqs 128 \
              --max-num-batched-tokens 16384 \
              --gpu-memory-utilization 0.94 \
              --no-enable-flashinfer-autotune \
              --tokenizer-mode deepseek_v4 \
              --dyn-tool-call-parser deepseek_v4 \
              --dyn-reasoning-parser deepseek_v4 \
              --enable-prefix-caching \
              --compilation-config '{
                  "mode": 0,
                  "cudagraph_mode": "FULL_DECODE_ONLY",
                  "cudagraph_capture_sizes": [
                    1,
                    2,
                    4,
                    8,
                    10,
                    12,
                    16,
                    32,
                    64,
                    80,
                    96,
                    128
                  ],
                  "max_cudagraph_capture_size": 128
                }'
