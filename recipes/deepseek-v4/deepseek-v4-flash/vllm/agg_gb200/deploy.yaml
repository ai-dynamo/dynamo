#
# DynamoGraphDeployment for deepseek-ai/DeepSeek-V4-Flash on vLLM,
# aggregated serving on NVIDIA GB200.
#
# Upstream vLLM recipe (GB200 variant):
#   https://recipes.vllm.ai/deepseek-ai/DeepSeek-V4-Flash?features=tool_calling,reasoning&hardware=gb200
#
# Shape: 1 replica x 4 GB200 GPUs (single NVL4 tray), TP=4 + Expert Parallel.
#
# Image: replace the `:my-tag` placeholder with a Dynamo + vLLM image that
#        includes the DeepSeek-V4 stack and an arm64 build of FlashInfer with
#        the TRT-LLM allreduce kernels. See `../container/README.md` for the
#        reference build -- it overlays dynamo on vllm/vllm-openai:deepseekv4-cu130.
#
# Weights: served from the `model-cache` PVC populated by
#          `../../model-cache/model-download.yaml`.
#
# Prerequisites:
#   - Cluster has GB200 nodes labeled `nvidia.com/gpu.product=NVIDIA-GB200`
#     and tainted `kubernetes.io/arch=arm64:NoSchedule`
#   - `model-cache` PVC bound in the target namespace with V4-Flash weights
#     pre-staged (see `../../model-cache/model-download.yaml`). For a one-shot
#     download into the PVC, set `HF_HUB_OFFLINE=0` on the first run.
#   - `hf-token-secret` with `HF_TOKEN`/`HUGGING_FACE_HUB_TOKEN` (gated repo)
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: dsv4-flash-agg
spec:
  backendFramework: vllm
  pvcs:
    - name: model-cache
      create: false
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      volumeMounts:
        - name: model-cache
          mountPoint: /opt/models
      extraPodSpec:
        # GB200 nodes are arm64 and typically tainted to keep non-GPU
        # workloads off them. The frontend is small but must run on the
        # same arch as the worker image.
        nodeSelector:
          kubernetes.io/arch: arm64
          nvidia.com/gpu.product: NVIDIA-GB200
        tolerations:
          - key: kubernetes.io/arch
            operator: Equal
            value: arm64
            effect: NoSchedule
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:my-tag
          workingDir: /workspace/examples/backends/vllm
          env:
            - name: HF_HOME
              value: /opt/models
            - name: HF_HUB_OFFLINE
              value: "1"
    VllmDecodeWorker:
      componentType: worker
      subComponentType: decode
      envFromSecret: hf-token-secret
      volumeMounts:
        - name: model-cache
          mountPoint: /opt/models
      sharedMemory:
        size: 200Gi
      extraPodSpec:
        nodeSelector:
          kubernetes.io/arch: arm64
          nvidia.com/gpu.product: NVIDIA-GB200
        tolerations:
          - key: kubernetes.io/arch
            operator: Equal
            value: arm64
            effect: NoSchedule
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:my-tag
          workingDir: /workspace/examples/backends/vllm
          # Up to ~60 min for first launch: weight load + FlashInfer autotune +
          # cudagraph warmup. periodSeconds * failureThreshold = 10 * 360 = 3600s
          # (matches VLLM_ENGINE_READY_TIMEOUT_S below).
          startupProbe:
            httpGet:
              path: /health
              port: 9090
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 360
          env:
            - name: SERVED_MODEL_NAME
              value: deepseek-ai/DeepSeek-V4-Flash
            - name: MODEL_PATH
              value: deepseek-ai/DeepSeek-V4-Flash
            - name: HF_HOME
              value: /opt/models
            # Read weights from the PVC only; flip to "0" for a first-run
            # cold download into the PVC or use the `model-download-job.yaml` job.
            - name: HF_HUB_OFFLINE
              value: "1"
            # Give the engine room to finish first-launch init.
            - name: VLLM_ENGINE_READY_TIMEOUT_S
              value: "3600"
            # Stabilize TP/EP all-reduces.
            - name: VLLM_USE_NCCL_SYMM_MEM
              value: "1"
            - name: VLLM_SKIP_P2P_CHECK
              value: "1"
            - name: NCCL_CUMEM_ENABLE
              value: "1"
            # GB200 NVL72 has NVLink Sharp / NVLS multicast for one-shot
            # all-reduce on the same tray.
            - name: NCCL_NVLS_ENABLE
              value: "1"
            - name: NCCL_P2P_LEVEL
              value: NVL
          command:
            - /bin/sh
            - -c
          args:
            - |
              exec python3 -m dynamo.vllm \
                --model "${MODEL_PATH}" \
                --served-model-name "${SERVED_MODEL_NAME}" \
                --trust-remote-code \
                --kv-cache-dtype fp8 \
                --block-size 256 \
                --tensor-parallel-size 4 \
                --enable-expert-parallel \
                --tokenizer-mode deepseek_v4 \
                --dyn-reasoning-parser deepseek_v4 \
                --dyn-tool-call-parser deepseek_v4 \
                --attention-config '{"use_fp4_indexer_cache":true}' \
                --moe-backend deep_gemm_mega_moe \
                --compilation-config '{"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"]}' \
                --max-num-seqs 256
      replicas: 1
      resources:
        limits:
          gpu: "4"
        requests:
          gpu: "4"
