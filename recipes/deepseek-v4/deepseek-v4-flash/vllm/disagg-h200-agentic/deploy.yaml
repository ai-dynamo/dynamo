apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: dsv4-flash-disagg-h200-agentic
spec:
  backendFramework: vllm
  pvcs:
  - name: model-cache
    create: false
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      extraPodSpec:
        mainContainer:
          # TODO(post-PR): swap for the Dynamo CI deepseek-v4 vllm-runtime tag once built.
          image: nvcr.io/nvstaging/nim/sungsooh:dsv4-dynamo-vllm-cu130-v0240-dynmain-4a8c55b3-nopatch-20260702
          workingDir: /workspace
          command:
          - /bin/bash
          - -lc
          args:
          - |
            python3 -m dynamo.frontend \
              --router-mode kv \
              --router-kv-events \
              --kv-cache-block-size 256 \
              --router-reset-states \
              --http-host 0.0.0.0 \
              --http-port 8000
    VllmPrefillWorker:
      componentType: worker
      subComponentType: prefill
      envFromSecret: hf-token-secret
      # 4P3D rate-matched (R_d/R_p=1.22 → 4:3); confirmed on H200 RDMA at 213.3 tps/GPU (c128 full-run).
      replicas: 4
      volumeMounts:
      - name: model-cache
        mountPoint: /model-cache
      resources:
        requests:
          gpu: "4"
          rdma/ib: "4"
        limits:
          gpu: "4"
          rdma/ib: "4"
      extraPodSpec:
        volumes:
        - name: shared-memory
          emptyDir:
            medium: Memory
            sizeLimit: 64Gi
        nodeSelector:
          nvidia.com/gpu.product: NVIDIA-H200
        runtimeClassName: nvidia
        mainContainer:
          # TODO(post-PR): swap for the Dynamo CI deepseek-v4 vllm-runtime tag once built.
          image: nvcr.io/nvstaging/nim/sungsooh:dsv4-dynamo-vllm-cu130-v0240-dynmain-4a8c55b3-nopatch-20260702
          workingDir: /workspace
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              add:
              - IPC_LOCK
              - SYS_RESOURCE
          volumeMounts:
          - name: shared-memory
            mountPath: /dev/shm
          env:
          - name: HF_HOME
            value: /model-cache
          - name: HF_HUB_CACHE
            value: /model-cache
          - name: HF_HUB_OFFLINE
            value: "1"
          - name: TRANSFORMERS_OFFLINE
            value: "1"
          - name: VLLM_SKIP_P2P_CHECK
            value: "1"
          - name: NCCL_CUMEM_ENABLE
            value: "1"
          # Backend fabric: RDMA / NIXL-GDR (H200 multi-node) — what the shipped 4P3D numbers
          # were measured on (NOT TCP). VLLM_GPU_NIC_PCIE_MAPPING pins each GPU to its local
          # NIC (the GDR fix). The value below is for an 8×H200 + 8×CX-7 node and is
          # NODE-TOPOLOGY-SPECIFIC — regenerate for your hardware (see
          # recipes/deepseek-v4/README.md → "RDMA per-rank NIC mapping"). Format:
          # <GPU_PCIe>=<NIC_PCIe>, comma-separated, one pair per GPU on the node.
          - name: NCCL_IB_DISABLE
            value: "0"
          - name: VLLM_GPU_NIC_PCIE_MAPPING
            value: 00000000:8D:00.0=0000:8c:00.0,00000000:91:00.0=0000:90:00.0,00000000:95:00.0=0000:94:00.0,00000000:99:00.0=0000:98:00.0,00000000:AB:00.0=0000:aa:00.0,00000000:AF:00.0=0000:ae:00.0,00000000:B3:00.0=0000:b2:00.0,00000000:B7:00.0=0000:b6:00.0
          - name: VLLM_NIC_SELECTION_VARS
            value: "UCX_NET_DEVICES:1"
          - name: UCX_IB_ADDR_TYPE
            value: ib_global
          - name: UCX_IB_REG_METHODS
            value: odp,rcache
          - name: UCX_TLS
            value: rc_x,rc,cuda_copy,cuda_ipc
          - name: UCX_RNDV_SCHEME
            value: get_zcopy
          - name: UCX_RNDV_THRESH
            value: "0"
          - name: UCX_MEMTYPE_CACHE
            value: "1"
          command:
          - /bin/bash
          - -lc
          args:
          - |
            set -Eeuo pipefail
            ulimit -l unlimited
            ulimit -n 1048576
            python3 -m dynamo.vllm \
              --model deepseek-ai/DeepSeek-V4-Flash \
              --served-model-name deepseek-ai/DeepSeek-V4-Flash \
              --trust-remote-code \
              --kv-cache-dtype fp8 \
              --block-size 256 \
              --gpu-memory-utilization 0.92 \
              --max-model-len 1048576 \
              --max-num-seqs 128 \
              --max-num-batched-tokens 16384 \
              --data-parallel-size 4 \
              --enable-expert-parallel \
              --tensor-parallel-size 1 \
              --enable-prefix-caching \
              --tokenizer-mode deepseek_v4 \
              --dyn-tool-call-parser deepseek_v4 \
              --dyn-reasoning-parser deepseek_v4 \
              --kv-transfer-config '{
                  "kv_connector": "NixlConnector",
                  "kv_role": "kv_both",
                  "kv_buffer_device": "cuda"
                }' \
              --disaggregation-mode prefill \
              --kv-events-config '{
                  "publisher": "zmq",
                  "topic": "kv-events",
                  "endpoint": "tcp://*:5571",
                  "enable_kv_cache_events": true
                }'
    VllmDecodeWorker:
      componentType: worker
      subComponentType: decode
      envFromSecret: hf-token-secret
      # 4P3D rate-matched (R_d/R_p=1.22 → 4:3); confirmed on H200 RDMA at 213.3 tps/GPU (c128 full-run).
      replicas: 3
      volumeMounts:
      - name: model-cache
        mountPoint: /model-cache
      resources:
        requests:
          gpu: "4"
          rdma/ib: "4"
        limits:
          gpu: "4"
          rdma/ib: "4"
      extraPodSpec:
        volumes:
        - name: shared-memory
          emptyDir:
            medium: Memory
            sizeLimit: 64Gi
        nodeSelector:
          nvidia.com/gpu.product: NVIDIA-H200
        runtimeClassName: nvidia
        mainContainer:
          # TODO(post-PR): swap for the Dynamo CI deepseek-v4 vllm-runtime tag once built.
          image: nvcr.io/nvstaging/nim/sungsooh:dsv4-dynamo-vllm-cu130-v0240-dynmain-4a8c55b3-nopatch-20260702
          workingDir: /workspace
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              add:
              - IPC_LOCK
              - SYS_RESOURCE
          volumeMounts:
          - name: shared-memory
            mountPath: /dev/shm
          env:
          - name: HF_HOME
            value: /model-cache
          - name: HF_HUB_CACHE
            value: /model-cache
          - name: HF_HUB_OFFLINE
            value: "1"
          - name: TRANSFORMERS_OFFLINE
            value: "1"
          - name: VLLM_SKIP_P2P_CHECK
            value: "1"
          - name: NCCL_CUMEM_ENABLE
            value: "1"
          # Backend fabric: RDMA / NIXL-GDR (H200 multi-node) — what the shipped 4P3D numbers
          # were measured on (NOT TCP). VLLM_GPU_NIC_PCIE_MAPPING pins each GPU to its local
          # NIC (the GDR fix). The value below is for an 8×H200 + 8×CX-7 node and is
          # NODE-TOPOLOGY-SPECIFIC — regenerate for your hardware (see
          # recipes/deepseek-v4/README.md → "RDMA per-rank NIC mapping"). Format:
          # <GPU_PCIe>=<NIC_PCIe>, comma-separated, one pair per GPU on the node.
          - name: NCCL_IB_DISABLE
            value: "0"
          - name: VLLM_GPU_NIC_PCIE_MAPPING
            value: 00000000:8D:00.0=0000:8c:00.0,00000000:91:00.0=0000:90:00.0,00000000:95:00.0=0000:94:00.0,00000000:99:00.0=0000:98:00.0,00000000:AB:00.0=0000:aa:00.0,00000000:AF:00.0=0000:ae:00.0,00000000:B3:00.0=0000:b2:00.0,00000000:B7:00.0=0000:b6:00.0
          - name: VLLM_NIC_SELECTION_VARS
            value: "UCX_NET_DEVICES:1"
          - name: UCX_IB_ADDR_TYPE
            value: ib_global
          - name: UCX_IB_REG_METHODS
            value: odp,rcache
          - name: UCX_TLS
            value: rc_x,rc,cuda_copy,cuda_ipc
          - name: UCX_RNDV_SCHEME
            value: get_zcopy
          - name: UCX_RNDV_THRESH
            value: "0"
          - name: UCX_MEMTYPE_CACHE
            value: "1"
          command:
          - /bin/bash
          - -lc
          args:
          - |
            set -Eeuo pipefail
            ulimit -l unlimited
            ulimit -n 1048576
            python3 -m dynamo.vllm \
              --model deepseek-ai/DeepSeek-V4-Flash \
              --served-model-name deepseek-ai/DeepSeek-V4-Flash \
              --trust-remote-code \
              --kv-cache-dtype fp8 \
              --block-size 256 \
              --max-model-len 1048576 \
              --max-num-seqs 128 \
              --data-parallel-size 4 \
              --enable-expert-parallel \
              --tensor-parallel-size 1 \
              --tokenizer-mode deepseek_v4 \
              --dyn-tool-call-parser deepseek_v4 \
              --dyn-reasoning-parser deepseek_v4 \
              --speculative-config '{
                  "method": "mtp",
                  "num_speculative_tokens": 1
                }' \
              --compilation-config '{
                  "cudagraph_mode": "FULL_AND_PIECEWISE",
                  "custom_ops": [
                    "all"
                  ],
                  "cudagraph_capture_sizes": [
                    1,
                    2,
                    4,
                    8,
                    16,
                    24,
                    32,
                    40,
                    48,
                    56,
                    64,
                    80,
                    96,
                    128
                  ],
                  "max_cudagraph_capture_size": 128
                }' \
              --attention-backend FLASHINFER_MLA \
              --kv-transfer-config '{
                  "kv_connector": "NixlConnector",
                  "kv_role": "kv_both",
                  "kv_buffer_device": "cuda",
                  "kv_connector_extra_config": {
                    "num_threads": 8
                  }
                }' \
              --disaggregation-mode decode
