#
# Sibling PostgreSQL for SMG's history backend. Deployed to the `smg`
# namespace alongside the SMG router so the router resolves
# `smg-postgres.smg.svc.cluster.local` directly.
#
# Why a hand-rolled manifest instead of the bitnami chart:
#   * SMG's history is an audit log, not a transactional system of
#     record. A single Postgres pod with a PVC is sufficient (no HA,
#     no read replicas).
#   * Avoids adding charts.bitnami.com to the AppProject sourceRepos
#     allowlist for one tiny dependency.
#   * The bitnami chart pulls in dozens of optional values and
#     subcharts that we'd need to disable explicitly anyway.
#
# Backups: NOT configured here. For long-term retention either use
# Velero (already in the production profile) to snapshot the PVC,
# or switch to an external managed Postgres by editing
# `addons/smg/values.yaml::history.postgres.url` and pointing at the
# DSN ExternalSecret instead.
---
apiVersion: v1
kind: Namespace
metadata:
  name: smg
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Secret
metadata:
  name: smg-history-postgres
  namespace: smg
  labels:
    app.kubernetes.io/name: smg-postgres
    app.kubernetes.io/part-of: dynamo-production
type: Opaque
stringData:
  # WARNING: this default password is for the dev path only. Production
  # should overwrite this Secret via an `ExternalSecret` (using the
  # external-secrets-operator addon already in the production profile)
  # pulling from the cluster's secret store. The router consumes the
  # password through the SMG_HISTORY_POSTGRES_PASSWORD env var declared
  # in addons/smg/values.yaml::router.extraEnv.
  password: "smg-default-change-me"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: smg-postgres-data
  namespace: smg
  labels:
    app.kubernetes.io/name: smg-postgres
    app.kubernetes.io/part-of: dynamo-production
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: smg-postgres
  namespace: smg
  labels:
    app.kubernetes.io/name: smg-postgres
    app.kubernetes.io/part-of: dynamo-production
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
  selector:
    app.kubernetes.io/name: smg-postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: smg-postgres
  namespace: smg
  labels:
    app.kubernetes.io/name: smg-postgres
    app.kubernetes.io/part-of: dynamo-production
spec:
  serviceName: smg-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smg-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smg-postgres
        app.kubernetes.io/part-of: dynamo-production
    spec:
      # Pin to the same node as SMG + Dynamo Frontend so the
      # router → postgres hop stays intra-node (single-rank latency).
      nodeSelector:
        kubernetes.io/hostname: a4-us-001-rl9
      tolerations:
        - operator: Exists
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16.6-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: smg
            - name: POSTGRES_DB
              value: smg
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smg-history-postgres
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: "250m"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - smg
                - -d
                - smg
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - smg
                - -d
                - smg
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: smg-postgres-data
