#
# SMG (Shepherd Model Gateway) production overrides.
#
# Boundary contract:
#
#   client -> SMG -> Dynamo Frontend -> SGLang prefill / decode -> HiSparse / TurboQuant
#
# SMG is configured here as an HTTP gateway in front of the Dynamo Frontend
# Service. It does not own tokenization, detokenization, reasoning parsing,
# tool-call parsing, multimodal processing, MCP orchestration, chat history, or
# KV-aware routing.

global:
  image:
    registry: ghcr.io
    repository: lightseekorg/smg
    tag: "1.4.1"
    pullPolicy: IfNotPresent

router:
  replicas: 1

  # Defer prefix routing entirely to Dynamo Frontend.
  policy: round_robin

  # Single backend: the Dynamo Frontend Service deployed by the operator for
  # the deepseek-v32-reap-sglang DynamoGraphDeployment.
  workerUrls:
    - http://deepseek-v32-reap-sglang-frontend.dynamo-system.svc.cluster.local:8000

  serviceDiscovery:
    enabled: false

  # Model identity surfaced to clients via /v1/models. Keep this aligned with
  # --served-model-name in deploy/production/examples/deepseek-v32-reap-sglang.yaml.
  model: BlaiseAI/DeepSeek-V3.2-REAP-345B-NVFP4-W4A4KV4-IndexerK8-FP8-GatedNorm-G1

  maxPayloadSize: 536870912
  requestTimeoutSecs: 1800
  maxConcurrentRequests: -1
  queueSize: 100
  queueTimeoutSecs: 60

  retry:
    enabled: true
    maxRetries: 3
    initialBackoffMs: 100
    maxBackoffMs: 5000
    backoffMultiplier: 2.0
    jitterFactor: 0.2

  circuitBreaker:
    enabled: true
    failureThreshold: 10
    successThreshold: 3
    timeoutDurationSecs: 60
    windowDurationSecs: 120

  healthCheck:
    enabled: true
    failureThreshold: 3
    successThreshold: 2
    timeoutSecs: 5
    intervalSecs: 30
    endpoint: /health

  port: 30000
  service:
    type: ClusterIP
    port: 80

  ingress:
    enabled: false

  metrics:
    port: 29000
    serviceMonitor:
      enabled: true
      interval: 30s
      labels:
        release: kube-prometheus-stack

  tracing:
    enabled: true
    otlpEndpoint: http://dynamo-collector.observability.svc.cluster.local:4317

  logging:
    level: info
    json: true

  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 4Gi

  # Pin to the same node as the Dynamo Frontend for the single-node B200 target.
  nodeSelector:
    kubernetes.io/hostname: a4-us-001-rl9
  tolerations:
    - operator: Exists

  podAnnotations:
    ai-blaise.io/integration: smg-frontend-of-dynamo
  podLabels:
    app.kubernetes.io/part-of: dynamo-production

  extraEnv: []

  autoscaling:
    enabled: false

workers: []

auth:
  apiKey: ""
  rateLimitTokensPerSecond: -1

postgresql:
  enabled: false
redis:
  enabled: false

grafana:
  dashboard:
    enabled: true
    labels:
      grafana_dashboard: "1"
