deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem

gateway:
  enabled: true

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 100Gi
