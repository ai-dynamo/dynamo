apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dynamo-production
  namespace: argocd
spec:
  project: dynamo-production
  source:
    repoURL: https://github.com/ai-blaise/k8s-playground.git
    targetRevision: main
    path: deploy/production/gitops/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
