apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kai-scheduler
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: dynamo-production
  sources:
    - repoURL: ghcr.io/kai-scheduler/kai-scheduler
      chart: kai-scheduler
      targetRevision: v0.14.0
      helm:
        releaseName: kai-scheduler
        valueFiles:
          - $values/deploy/production/addons/kai-scheduler/values.yaml
    - repoURL: https://github.com/ai-blaise/dynamo-prod-k8s.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kai-scheduler
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
