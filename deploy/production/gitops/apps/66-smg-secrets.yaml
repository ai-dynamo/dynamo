#
# Cross-namespace secret mirrors for the SMG router. Wave 6.5 (between
# the postgres and the SMG router itself) — relies on the
# external-secrets-operator addon being already healthy.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smg-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: dynamo-production
  source:
    repoURL: https://github.com/ai-blaise/dynamo-prod-k8s.git
    targetRevision: main
    path: deploy/production/addons/smg-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: smg
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
