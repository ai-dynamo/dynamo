apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dynamo-platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "9"
spec:
  project: dynamo-production
  source:
    repoURL: https://github.com/ai-blaise/k8s-playground.git
    targetRevision: main
    path: deploy/helm/charts/platform
    helm:
      releaseName: dynamo-platform
      valueFiles:
        - ../../../production/addons/dynamo-platform/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dynamo-system
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
