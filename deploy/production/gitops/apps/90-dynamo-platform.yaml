apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dynamo-platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "9"
spec:
  project: dynamo-production
  source:
    repoURL: https://github.com/ai-blaise/k8s-playground.git
    targetRevision: main
    path: deploy/helm/charts/platform
    helm:
      releaseName: dynamo-platform
      valueFiles:
        - ../../../production/addons/dynamo-platform/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dynamo-system
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: dynamocomponentdeployments.nvidia.com
      jsonPointers:
        - /metadata/annotations/dynamo.nvidia.com~1operator-version
        - /spec/conversion
        - /spec/versions/0/schema/openAPIV3Schema/properties/spec/properties/extraPodSpec/properties/mainContainer/required
        - /spec/versions/0/schema/openAPIV3Schema/properties/spec/properties/extraPodSpec/required
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: dynamographdeployments.nvidia.com
      jsonPointers:
        - /metadata/annotations/dynamo.nvidia.com~1operator-version
        - /spec/conversion
        - /spec/versions/0/schema/openAPIV3Schema/properties/spec/properties/services/additionalProperties/properties/extraPodSpec/properties/mainContainer/required
        - /spec/versions/0/schema/openAPIV3Schema/properties/spec/properties/services/additionalProperties/properties/extraPodSpec/required
    - group: apps
      kind: StatefulSet
      name: dynamo-platform-nats
      namespace: dynamo-system
      managedFieldsManagers:
        - k3s
      jsonPointers:
        - /spec/template/spec/tolerations
        - /spec/volumeClaimTemplates/0/status
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
