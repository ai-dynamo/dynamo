apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dynamo-platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "9"
spec:
  project: dynamo-production
  source:
    repoURL: https://github.com/ai-blaise/k8s-playground.git
    targetRevision: main
    path: deploy/helm/charts/platform
    helm:
      releaseName: dynamo-platform
      valueFiles:
        - ../../../production/addons/dynamo-platform/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dynamo-system
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: dynamocomponentdeployments.nvidia.com
      jsonPointers:
        - /metadata/annotations/dynamo.nvidia.com~1operator-version
        - /spec/conversion
        - /spec/versions/0/schema/openAPIV3Schema/properties/spec/properties/extraPodSpec/properties/mainContainer/required
        - /spec/versions/0/schema/openAPIV3Schema/properties/spec/properties/extraPodSpec/required
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: dynamographdeployments.nvidia.com
      jsonPointers:
        - /metadata/annotations/dynamo.nvidia.com~1operator-version
        - /spec/conversion
        - /spec/versions/0/schema/openAPIV3Schema/properties/spec/properties/services/additionalProperties/properties/extraPodSpec/properties/mainContainer/required
        - /spec/versions/0/schema/openAPIV3Schema/properties/spec/properties/services/additionalProperties/properties/extraPodSpec/required
    - group: apps
      kind: StatefulSet
      name: dynamo-platform-nats
      namespace: dynamo-system
      jsonPointers:
        - /spec/persistentVolumeClaimRetentionPolicy
        - /spec/revisionHistoryLimit
        - /spec/template/spec/containers/0/env/0/valueFrom/fieldRef/apiVersion
        - /spec/template/spec/containers/0/imagePullPolicy
        - /spec/template/spec/containers/0/livenessProbe/httpGet/scheme
        - /spec/template/spec/containers/0/ports/0/protocol
        - /spec/template/spec/containers/0/ports/1/protocol
        - /spec/template/spec/containers/0/readinessProbe/httpGet/scheme
        - /spec/template/spec/containers/0/resources
        - /spec/template/spec/containers/0/startupProbe/httpGet/scheme
        - /spec/template/spec/containers/0/terminationMessagePath
        - /spec/template/spec/containers/0/terminationMessagePolicy
        - /spec/template/spec/containers/1/imagePullPolicy
        - /spec/template/spec/containers/1/resources
        - /spec/template/spec/containers/1/terminationMessagePath
        - /spec/template/spec/containers/1/terminationMessagePolicy
        - /spec/template/spec/dnsPolicy
        - /spec/template/spec/restartPolicy
        - /spec/template/spec/schedulerName
        - /spec/template/spec/securityContext
        - /spec/template/spec/terminationGracePeriodSeconds
        - /spec/template/spec/tolerations
        - /spec/template/spec/volumes/0/configMap/defaultMode
        - /spec/updateStrategy
        - /spec/volumeClaimTemplates/0/apiVersion
        - /spec/volumeClaimTemplates/0/kind
        - /spec/volumeClaimTemplates/0/spec/volumeMode
        - /spec/volumeClaimTemplates/0/status
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
