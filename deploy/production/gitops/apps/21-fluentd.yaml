apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluentd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: dynamo-production
  sources:
    - repoURL: https://fluent.github.io/helm-charts
      chart: fluentd
      targetRevision: 0.5.3
      helm:
        releaseName: fluentd
        valueFiles:
          - $values/deploy/production/addons/fluentd/values.yaml
    - repoURL: https://github.com/ai-blaise/k8s-playground.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
