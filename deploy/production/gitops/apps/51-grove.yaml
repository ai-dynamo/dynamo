apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grove
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: dynamo-production
  sources:
    - repoURL: ghcr.io/ai-dynamo/grove
      chart: grove-charts
      targetRevision: v0.1.0-alpha.8
      helm:
        releaseName: grove
        valueFiles:
          - $values/deploy/production/addons/grove/values.yaml
    - repoURL: https://github.com/ai-blaise/dynamo-prod-k8s.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: grove-system
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
