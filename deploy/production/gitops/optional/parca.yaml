apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: parca
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  project: dynamo-production
  sources:
    - repoURL: https://parca-dev.github.io/helm-charts
      chart: parca
      targetRevision: 4.19.0
      helm:
        releaseName: parca
        valueFiles:
          - $values/deploy/production/addons/parca/values.yaml
    - repoURL: https://github.com/ai-blaise/dynamo-prod-k8s.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: parca
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
