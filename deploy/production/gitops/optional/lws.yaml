apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lws
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  project: dynamo-production
  sources:
    - repoURL: https://github.com/kubernetes-sigs/lws
      targetRevision: v0.8.0
      path: charts/lws
      helm:
        releaseName: lws
        valueFiles:
          - $values/deploy/production/addons/lws/values.yaml
    - repoURL: https://github.com/ai-blaise/k8s-playground.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: lws-system
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
