apiVersion: v1
kind: Namespace
metadata:
  name: kube-no-trouble
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-no-trouble
  namespace: kube-no-trouble
  labels:
    app.kubernetes.io/name: kube-no-trouble
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-no-trouble
  labels:
    app.kubernetes.io/name: kube-no-trouble
rules:
  - apiGroups:
      - "*"
    resources:
      - "*"
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-no-trouble
  labels:
    app.kubernetes.io/name: kube-no-trouble
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-no-trouble
subjects:
  - kind: ServiceAccount
    name: kube-no-trouble
    namespace: kube-no-trouble
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kube-no-trouble
  namespace: kube-no-trouble
  labels:
    app.kubernetes.io/name: kube-no-trouble
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kube-no-trouble
    spec:
      restartPolicy: Never
      serviceAccountName: kube-no-trouble
      containers:
        - name: kubent
          image: ghcr.io/doitintl/kube-no-trouble:0.7.3
          args:
            - --exit-error
