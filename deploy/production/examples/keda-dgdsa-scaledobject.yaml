apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: qwen-decode-queue-depth
  namespace: dynamo-system
spec:
  scaleTargetRef:
    apiVersion: nvidia.com/v1alpha1
    kind: DynamoGraphDeploymentScalingAdapter
    name: qwen-decode
  minReplicaCount: 1
  maxReplicaCount: 8
  cooldownPeriod: 300
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://kube-prometheus-stack-prometheus.monitoring.svc:9090
        metricName: dynamo_frontend_dispatch_queue_depth
        threshold: "8"
        query: |
          sum(dynamo_frontend_stage_requests{
            dynamo_namespace="dynamo-system-qwen",
            stage="dispatch"
          })
