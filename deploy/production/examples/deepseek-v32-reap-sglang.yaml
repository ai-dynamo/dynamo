# DeepSeek V3.2 REAP W4A4KV4 NVFP4 on the Dynamo production profile.
#
# This A4 deployment uses disaggregated SGLang serving with one 4-GPU prefill
# role and one 4-GPU decode role on a single 8-GPU B200 node. Both roles keep
# DP attention, IndexCache, HiCache, event-backed KV-aware routing, and dense
# TurboQuant enabled. The checkpoint is W4A4KV4 NVFP4; target KV is the
# explicit exception and is compressed through dense TurboQuant 2.5-bit.
# Speculation is decode-only through SMC-SD.
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: deepseek-v32-reap-sglang
  labels:
    app.kubernetes.io/name: deepseek-v32-reap-sglang
    app.kubernetes.io/part-of: dynamo-production
    ai-blaise.io/inference-engine: optimization-playground
spec:
  backendFramework: sglang
  envs:
    - name: HF_HOME
      value: /models
    - name: HF_HUB_OFFLINE
      value: "1"
    - name: HF_XET_HIGH_PERFORMANCE
      value: "1"
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: PYTORCH_ALLOC_CONF
      value: expandable_segments:True,max_split_size_mb:512
    - name: SGLANG_ENABLE_SPEC_V2
      value: "1"
    - name: SGLANG_ENABLE_JIT_DEEPGEMM
      value: "0"
    - name: SGLANG_DISABLE_FLASHINFER_FUSED_TOPK_DEEPSEEK
      value: "0"
    - name: SGLANG_ALLOW_OVERWRITE_LONGER_CONTEXT_LEN
      value: "1"
    - name: SGLANG_MOE_NVFP4_DISPATCH
      value: "1"
    - name: SGLANG_SMC_DRAFT_FP8_GEMM_BACKEND
      value: cutlass
    - name: SGLANG_SMC_TARGET_VERIFY_GRAPH
      value: "0"
    - name: NCCL_IB_DISABLE
      value: "1"
    - name: NCCL_NVLS_ENABLE
      value: "0"
    - name: NCCL_P2P_LEVEL
      value: NVL
    - name: NCCL_P2P_DISABLE
      value: "0"
    - name: NCCL_CUMEM_ENABLE
      value: "0"
    - name: NCCL_ALGO
      value: Ring
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      extraPodSpec:
        nodeSelector:
          kubernetes.io/hostname: a4-us-001-rl9
        tolerations:
          - operator: Exists
        mainContainer:
          image: ghcr.io/ai-blaise/optimization-playground-sglang-runtime:reap-nvfp4
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - -m
            - dynamo.frontend
          args:
            - --router-mode
            - kv
            - --router-kv-events
            - --router-reset-states
            - --http-port
            - "8000"
          env:
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 360
    prefill:
      componentType: worker
      subComponentType: prefill
      replicas: 1
      envFromSecret: hf-token-secret
      resources:
        limits:
          gpu: "4"
        requests:
          gpu: "4"
      sharedMemory:
        size: 120Gi
      extraPodSpec:
        nodeSelector:
          kubernetes.io/hostname: a4-us-001-rl9
        tolerations:
          - operator: Exists
        volumes:
          - name: deepseek-v32-reap-model
            hostPath:
              path: /models/BlaiseAI/DeepSeek-V3.2-REAP-345B-NVFP4-W4A4KV4-GatedNorm-G1
              type: Directory
        mainContainer:
          image: ghcr.io/ai-blaise/optimization-playground-sglang-runtime:reap-nvfp4
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
          command:
            - python3
            - -m
            - dynamo.sglang
          args:
            - --model-path
            - /models/BlaiseAI/DeepSeek-V3.2-REAP-345B-NVFP4-W4A4KV4-GatedNorm-G1
            - --served-model-name
            - BlaiseAI/DeepSeek-V3.2-REAP-345B-NVFP4-W4A4KV4-GatedNorm-G1
            - --host
            - 0.0.0.0
            - --trust-remote-code
            - --quantization
            - modelopt_fp4
            - --fp4-gemm-backend
            - auto
            - --fp8-gemm-backend
            - auto
            - --kv-cache-dtype
            - bfloat16
            - --tp
            - "4"
            - --dp
            - "4"
            - --enable-dp-attention
            - --mem-fraction-static
            - "0.80"
            - --max-running-requests
            - "8"
            - --context-length
            - "73728"
            - --max-total-tokens
            - "524288"
            - --cuda-graph-max-bs
            - "8"
            - --disable-custom-all-reduce
            - --disable-flashinfer-autotune
            - --watchdog-timeout
            - "1800"
            - --page-size
            - "64"
            - --enable-hierarchical-cache
            - --hicache-ratio
            - "2"
            - --hicache-write-policy
            - write_through
            - --hicache-io-backend
            - kernel
            - --hicache-mem-layout
            - layer_first
            - --kv-events-config
            - '{"publisher":"zmq","topic":"kv-events","endpoint":"tcp://*:5557"}'
            - --nsa-indexer-mode
            - indexcache
            - --nsa-indexcache-pattern
            - FSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSF
            - --nsa-prefill-backend
            - flashmla_kv
            - --nsa-decode-backend
            - flashmla_kv
            - --enable-turboquant-dense-kv-cache
            - --turboquant-dense-kv-preset
            - latent_2p5bit_nc
            - --turboquant-residual-window-size
            - "128"
            - --turboquant-execution-mode
            - fused_decode
            - --turboquant-mla-decode-num-splits
            - "16"
            - --disaggregation-mode
            - prefill
            - --disaggregation-transfer-backend
            - nixl
            - --disaggregation-bootstrap-port
            - "12345"
            - --tool-call-parser
            - deepseekv32
            - --reasoning-parser
            - deepseek-v3
          env:
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          startupProbe:
            httpGet:
              path: /health
              port: 9090
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 360
          volumeMounts:
            - name: deepseek-v32-reap-model
              mountPath: /models/BlaiseAI/DeepSeek-V3.2-REAP-345B-NVFP4-W4A4KV4-GatedNorm-G1
              readOnly: true
    decode:
      componentType: worker
      subComponentType: decode
      replicas: 1
      envFromSecret: hf-token-secret
      resources:
        limits:
          gpu: "4"
        requests:
          gpu: "4"
      sharedMemory:
        size: 120Gi
      extraPodSpec:
        nodeSelector:
          kubernetes.io/hostname: a4-us-001-rl9
        tolerations:
          - operator: Exists
        volumes:
          - name: deepseek-v32-reap-model
            hostPath:
              path: /models/BlaiseAI/DeepSeek-V3.2-REAP-345B-NVFP4-W4A4KV4-GatedNorm-G1
              type: Directory
          - name: smcsd-draft-model
            hostPath:
              path: /models/smcsd/GLM-4-9B-0414-FP8-DeepSeekV32-OMP
              type: Directory
        mainContainer:
          image: ghcr.io/ai-blaise/optimization-playground-sglang-runtime:reap-nvfp4
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
          command:
            - python3
            - -m
            - dynamo.sglang
          args:
            - --model-path
            - /models/BlaiseAI/DeepSeek-V3.2-REAP-345B-NVFP4-W4A4KV4-GatedNorm-G1
            - --served-model-name
            - BlaiseAI/DeepSeek-V3.2-REAP-345B-NVFP4-W4A4KV4-GatedNorm-G1
            - --host
            - 0.0.0.0
            - --trust-remote-code
            - --quantization
            - modelopt_fp4
            - --fp4-gemm-backend
            - auto
            - --fp8-gemm-backend
            - auto
            - --kv-cache-dtype
            - bfloat16
            - --tp
            - "4"
            - --dp
            - "4"
            - --enable-dp-attention
            - --mem-fraction-static
            - "0.80"
            - --max-running-requests
            - "8"
            - --context-length
            - "73728"
            - --max-total-tokens
            - "524288"
            - --cuda-graph-max-bs
            - "8"
            - --disable-custom-all-reduce
            - --disable-flashinfer-autotune
            - --watchdog-timeout
            - "1800"
            - --page-size
            - "64"
            - --enable-hierarchical-cache
            - --hicache-ratio
            - "2"
            - --hicache-write-policy
            - write_through
            - --hicache-io-backend
            - kernel
            - --hicache-mem-layout
            - layer_first
            - --kv-events-config
            - '{"publisher":"zmq","topic":"kv-events","endpoint":"tcp://*:5557"}'
            - --nsa-indexer-mode
            - indexcache
            - --nsa-indexcache-pattern
            - FSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSF
            - --nsa-prefill-backend
            - flashmla_kv
            - --nsa-decode-backend
            - flashmla_kv
            - --enable-turboquant-dense-kv-cache
            - --turboquant-dense-kv-preset
            - latent_2p5bit_nc
            - --turboquant-residual-window-size
            - "128"
            - --turboquant-execution-mode
            - fused_decode
            - --turboquant-mla-decode-num-splits
            - "16"
            - --disaggregation-mode
            - decode
            - --disaggregation-transfer-backend
            - nixl
            - --disaggregation-bootstrap-port
            - "12345"
            - --speculative-algorithm
            - SMC
            - --speculative-draft-model-path
            - /models/smcsd/GLM-4-9B-0414-FP8-DeepSeekV32-OMP
            - --speculative-draft-model-quantization
            - fp8
            - --speculative-draft-attention-backend
            - triton
            - --smc-draft-kv-cache-dtype
            - fp8_e4m3
            - --smc-n-particles
            - "4"
            - --smc-gamma
            - "6"
            - --smc-draft-temperature
            - "0.7"
            - --smc-target-temperature
            - "1.0"
            - --smc-resample-threshold
            - "0.5"
            - --smc-resample-method
            - systematic
            - --tool-call-parser
            - deepseekv32
            - --reasoning-parser
            - deepseek-v3
          env:
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          startupProbe:
            httpGet:
              path: /health
              port: 9090
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 360
          volumeMounts:
            - name: deepseek-v32-reap-model
              mountPath: /models/BlaiseAI/DeepSeek-V3.2-REAP-345B-NVFP4-W4A4KV4-GatedNorm-G1
              readOnly: true
            - name: smcsd-draft-model
              mountPath: /models/smcsd/GLM-4-9B-0414-FP8-DeepSeekV32-OMP
              readOnly: true
