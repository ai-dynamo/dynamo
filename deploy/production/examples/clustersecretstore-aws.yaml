apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: production-secrets
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
