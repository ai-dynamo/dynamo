apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hf-token-secret
  namespace: dynamo-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: production-secrets
  target:
    name: hf-token-secret
    creationPolicy: Owner
  data:
    - secretKey: HF_TOKEN
      remoteRef:
        key: dynamo/huggingface
        property: token
