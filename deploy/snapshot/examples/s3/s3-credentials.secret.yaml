#
# Credentials for the snapshot-agent's S3 checkpoint store.
# The keys are projected into the agent container via `envFrom` and read by the
# agent at startup (AgentConfig.LoadEnvOverrides). Keep this Secret in the same
# namespace as the snapshot-agent DaemonSet.
#
# Apply with:
#   kubectl -n <snapshot-namespace> apply -f s3-credentials.secret.yaml
#
# Prefer a real secret manager (Sealed Secrets, External Secrets, Vault) in
# production — this plaintext example is for demonstration only.
apiVersion: v1
kind: Secret
metadata:
  name: snapshot-s3-credentials
  labels:
    app.kubernetes.io/part-of: dynamo-snapshot
type: Opaque
stringData:
  # Standard AWS names work for any S3-compatible store.
  AWS_ACCESS_KEY_ID: "REPLACE_WITH_ACCESS_KEY"
  AWS_SECRET_ACCESS_KEY: "REPLACE_WITH_SECRET_KEY"
  # Optional, for temporary credentials:
  # AWS_SESSION_TOKEN: ""
