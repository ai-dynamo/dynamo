apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-failover-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  failover-dashboard.json: |-
    {
      "uid": "dynamo-failover",
      "title": "Dynamo \u00b7 GMS Shadow-Failover",
      "tags": [
        "dynamo",
        "failover",
        "gms"
      ],
      "timezone": "browser",
      "schemaVersion": 41,
      "version": 1,
      "editable": true,
      "refresh": "5s",
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {
              "text": "prometheus",
              "value": "prometheus"
            },
            "hide": 0
          }
        ]
      },
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Active engines",
          "description": "Engines currently serving (state=active). 1 = healthy; 0 = OUTAGE; >1 = SPLIT-BRAIN.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "count(dynamo_component_engine_failover_state{state=\"active\"} == 1) or vector(0)",
              "legendFormat": "",
              "range": false,
              "instant": true,
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 2
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Shadow ready",
          "description": "Reserve engines parked in standby. 0 = degraded (one failure from outage).",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "count(dynamo_component_engine_failover_state{state=\"standby\"} == 1) or vector(0)",
              "legendFormat": "",
              "range": false,
              "instant": true,
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Failovers (success)",
          "description": "Real failovers that completed and began serving (initial bootup excluded).",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "sum(dynamo_component_engine_failover_switch_success_total) or vector(0)",
              "legendFormat": "",
              "range": false,
              "instant": true,
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Switch failures (derived)",
          "description": "attempts - success. A failover attempt that never reached serving.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "(sum(dynamo_component_engine_failover_switch_attempts_total) - sum(dynamo_component_engine_failover_switch_success_total)) or vector(0)",
              "legendFormat": "",
              "range": false,
              "instant": true,
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 5,
          "type": "state-timeline",
          "title": "Engine state timeline  (init \u2192 standby \u2192 waking \u2192 active; gap = dead)",
          "description": "1-hot per-engine failover state over time. Read active-count / standby-present / split-brain (2 active) / outage (0 active) off it. A vanished lane = a dead engine (series went stale).",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 4
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "max without(state) (\n  (dynamo_component_engine_failover_state{state=\"init\"} == 1) * 0\n  or (dynamo_component_engine_failover_state{state=\"standby\"} == 1) * 1\n  or (dynamo_component_engine_failover_state{state=\"waking\"} == 1) * 2\n  or (dynamo_component_engine_failover_state{state=\"active\"} == 1) * 3\n)",
              "legendFormat": "engine {{engine_id}}",
              "range": true,
              "instant": false,
              "refId": "A"
            }
          ],
          "options": {
            "mergeValues": true,
            "showValue": "auto",
            "alignValue": "left",
            "rowHeight": 0.9,
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "fillOpacity": 90,
                "lineWidth": 0
              },
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": {
                      "text": "init",
                      "color": "blue",
                      "index": 0
                    },
                    "1": {
                      "text": "standby",
                      "color": "super-light-yellow",
                      "index": 1
                    },
                    "2": {
                      "text": "waking",
                      "color": "orange",
                      "index": 2
                    },
                    "3": {
                      "text": "active",
                      "color": "green",
                      "index": 3
                    }
                  }
                }
              ],
              "min": 0,
              "max": 3,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "blue",
                    "value": null
                  }
                ]
              },
              "color": {
                "mode": "fixed"
              }
            },
            "overrides": []
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Wake / switch duration",
          "description": "Duration of the most recent waking phase per engine (the switch time). Captured even when the 1-hot gauge is too coarse to sample it.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 7,
            "w": 12,
            "x": 0,
            "y": 12
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "dynamo_component_engine_failover_last_state_duration_seconds{state=\"waking\"}",
              "legendFormat": "engine {{engine_id}} wake",
              "range": true,
              "instant": false,
              "refId": "A"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "stepAfter",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "auto",
                "spanNulls": false,
                "pointSize": 6
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Switch attempts vs success",
          "description": "Cumulative real-failover attempts and successes (both write-through persisted). The gap = derived failures.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 7,
            "w": 12,
            "x": 12,
            "y": 12
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "sum(dynamo_component_engine_failover_switch_attempts_total)",
              "legendFormat": "attempts",
              "range": true,
              "instant": false,
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "sum(dynamo_component_engine_failover_switch_success_total)",
              "legendFormat": "success",
              "range": true,
              "instant": false,
              "refId": "B"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "stepAfter",
                "lineWidth": 2,
                "fillOpacity": 0,
                "showPoints": "auto",
                "spanNulls": false,
                "pointSize": 6
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 8,
          "type": "table",
          "title": "Engine roster  (derived: current state, entered, age)",
          "description": "Instant view: which engine is in which state right now, when it entered, and how long it has been there (age = now - entered).",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 7,
            "w": 12,
            "x": 0,
            "y": 19
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "dynamo_component_engine_failover_state == 1",
              "legendFormat": "",
              "range": false,
              "instant": true,
              "refId": "STATE",
              "format": "table"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "time() - dynamo_component_engine_failover_state_entered_timestamp_seconds",
              "legendFormat": "",
              "range": false,
              "instant": true,
              "refId": "AGE",
              "format": "table"
            }
          ],
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "Value #STATE": true,
                  "job": true,
                  "instance": true,
                  "dynamo_component": true,
                  "pod": true,
                  "engine": true
                },
                "renameByName": {
                  "engine_id": "engine",
                  "state": "state",
                  "model": "model",
                  "Value #AGE": "age (s)"
                },
                "indexByName": {
                  "engine_id": 0,
                  "state": 1,
                  "Value #AGE": 2,
                  "model": 3
                }
              }
            }
          ],
          "options": {
            "showHeader": true
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto"
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "age (s)"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "s"
                  },
                  {
                    "id": "decimals",
                    "value": 0
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "State transitions (rate)",
          "description": "Every state transition, incl. brief ones the 1-hot gauge can miss (e.g. a sub-scrape waking).",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 7,
            "w": 12,
            "x": 12,
            "y": 19
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "increase(dynamo_component_engine_failover_transitions_total[$__rate_interval])",
              "legendFormat": "e{{engine_id}} {{from_state}}\u2192{{to_state}}",
              "range": true,
              "instant": false,
              "refId": "A"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "fillOpacity": 20,
                "showPoints": "auto",
                "spanNulls": false,
                "pointSize": 6
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "k8s container restarts (failure backstop)",
          "description": "Restarts/OOMKilled per engine container \u2014 the only witness for uncaught kills and crashloop-in-init. Empty unless kube-state-metrics is scraped.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 7,
            "w": 12,
            "x": 0,
            "y": 26
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "increase(kube_pod_container_status_restarts_total{pod=~\"failover.*\"}[$__rate_interval])",
              "legendFormat": "{{pod}}/{{container}}",
              "range": true,
              "instant": false,
              "refId": "A"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "fillOpacity": 0,
                "showPoints": "auto",
                "spanNulls": false,
                "pointSize": 6
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Time in current state (age)",
          "description": "now - entered_timestamp: how long each engine has held its current state (a stuck/wedged engine shows a climbing line).",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 7,
            "w": 12,
            "x": 12,
            "y": 26
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "time() - dynamo_component_engine_failover_state_entered_timestamp_seconds",
              "legendFormat": "engine {{engine_id}}",
              "range": true,
              "instant": false,
              "refId": "A"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "fillOpacity": 0,
                "showPoints": "auto",
                "spanNulls": false,
                "pointSize": 6
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          }
        }
      ]
    }
