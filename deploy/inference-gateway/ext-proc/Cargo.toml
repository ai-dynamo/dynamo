[package]
name = "dynamo-ext-proc"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Envoy ext_proc gRPC server for Dynamo inference routing"

[[bin]]
name = "dynamo-ext-proc"
path = "src/main.rs"

[dependencies]
dynamo-kv-router = { workspace = true, features = ["metrics", "runtime-protocols"] }
dynamo-llm = { path = "../../../lib/llm" }
dynamo-runtime = { workspace = true }

anyhow = { workspace = true }
prost = { version = "0.13.5" }
prost-types = { version = "0.13.5" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-stream = { workspace = true }
tonic = { version = "0.13.1" }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter"] }
uuid = { workspace = true }

[build-dependencies]
tonic-build = { version = "0.13.1" }
