# =============================================================================
# Dynamo EPP on-ramp - AGGREGATED, stock vLLM, no Dynamo operator
# =============================================================================

---
# -----------------------------------------------------------------------------
# vLLM workers - attach the pool to the cluster gateway.
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen
  labels:
    app: vllm-qwen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vllm-qwen
  template:
    metadata:
      labels:
        app: vllm-qwen
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          # Enable prefix caching + native KV-cache events on a ZMQ PUB socket.
          # The EPP subscribes to tcp://<pod-ip>:5557 to learn cached prefixes.
          # --block-size MUST match the EPP's DYN_KV_CACHE_BLOCK_SIZE below.
          args:
            - "--model"
            - "Qwen/Qwen3-0.6B"
            - "--served-model-name"
            - "Qwen/Qwen3-0.6B"
            - "--port"
            - "8000"
            - "--enable-prefix-caching"
            - "--block-size"
            - "16"
            - "--kv-events-config"
            - '{"enable_kv_cache_events":true,"endpoint":"tcp://*:5557"}'
          ports:
            - name: http
              containerPort: 8000
            - name: kv-events
              containerPort: 5557
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: HF_TOKEN
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Exists

---
# -----------------------------------------------------------------------------
# RBAC: the EPP's pod reflector needs to list/watch the vLLM pods, and read
#    its own InferencePool. (The Dynamo operator would normally create these.)
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: qwen-epp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: qwen-epp
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["inference.networking.k8s.io"]
    resources: ["inferencepools"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: qwen-epp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: qwen-epp
subjects:
  - kind: ServiceAccount
    name: qwen-epp

---
# -----------------------------------------------------------------------------
# Dynamo EPP in experimental router-only on-ramp mode.
# Replace the image if your test branch publishes router-only support elsewhere.
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen-epp
  labels:
    app: qwen-epp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwen-epp
  template:
    metadata:
      labels:
        app: qwen-epp
    spec:
      serviceAccountName: qwen-epp
      containers:
        - name: epp
          image: nvcr.io/nvidia/ai-dynamo/dynamo-frontend:1.3.0
          ports:
            - name: grpc
              containerPort: 9002
            - name: grpc-health
              containerPort: 9003
          env:
            # --- router-only ("on-ramp") mode switch ----------------------------
            - name: DYN_EPP_MODE
              value: "router-only"
            # Label selector used by the pod reflector to find raw vLLM pods.
            - name: DYN_EPP_POD_SELECTOR
              value: "app=vllm-qwen"
            # The vLLM OpenAI HTTP port the gateway forwards to (pool targetPort).
            - name: DYN_EPP_TARGET_PORT
              value: "8000"
            # --- precise KV routing from vLLM's native ZMQ events ---------------
            - name: DYN_EPP_KV_EVENTS
              value: "true"
            - name: DYN_EPP_KV_EVENT_PORT
              value: "5557"
            # vLLM's --kv-events-config topic ("" = no topic prefix, the default).
            - name: DYN_EPP_KV_EVENT_TOPIC
              value: ""
            # The EPP has no Dynamo model card in router-only mode, so the model
            # name + block size are provided explicitly. block size MUST equal
            # vLLM's --block-size.
            - name: DYN_MODEL_NAME
              value: "Qwen/Qwen3-0.6B"
            - name: DYN_KV_CACHE_BLOCK_SIZE
              value: "16"
            - name: DYN_ROUTER_PREFILL_LOAD_SCALE
              value: "1.0"
            # --- inert runtime: NO etcd, NO NATS --------------------------------
            - name: DYN_DISCOVERY_BACKEND
              value: "mem"
            - name: DYN_EVENT_PLANE
              value: "zmq"
            # The pod reflector reads its own namespace from the downward API.
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: RUST_LOG
              value: "info,dynamo_llm::kv_router=debug"
            # The EPP runs as non-root; point HuggingFace's cache at a writable
            # dir (the hf-cache emptyDir mounted below) so the startup tokenizer
            # download can create its cache instead of failing on /home/nonroot.
            - name: HF_HOME
              value: /tmp/hf
            # HF token: the EPP downloads the tokenizer for the model to tokenize
            # prompts for routing (no GPU needed; the worker re-tokenizes).
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: HF_TOKEN
          readinessProbe:
            grpc:
              port: 9003
              service: inference-extension
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 9003
              service: inference-extension
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: hf-cache
              mountPath: /tmp/hf
      volumes:
        # Writable HuggingFace cache for the non-root EPP (tokenizer download).
        - name: hf-cache
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: qwen-epp
spec:
  selector:
    app: qwen-epp
  ports:
    - name: grpc
      port: 9002
      targetPort: 9002
      appProtocol: http2

---
# -----------------------------------------------------------------------------
# GAIE InferencePool - selects the raw vLLM pods and delegates endpoint
#    selection to the Dynamo EPP. THIS is the single line an existing GAIE user
#    changes: endpointPickerRef -> the Dynamo EPP service.
# -----------------------------------------------------------------------------
apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: qwen-pool
spec:
  targetPorts:
    - number: 8000
  selector:
    matchLabels:
      app: vllm-qwen
  endpointPickerRef:
    kind: Service
    name: qwen-epp
    port:
      number: 9002

---
# -----------------------------------------------------------------------------
# HTTPRoute - attach the pool to the cluster gateway.
# -----------------------------------------------------------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qwen-route
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: inference-gateway
  rules:
    - backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: qwen-pool
          port: 8000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        request: 300s
