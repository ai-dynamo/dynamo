suite: snapshot agent configuration
templates:
  - templates/configmap.yaml
tests:
  - it: renders the rootfs worker count
    set:
      config.rootfs.workers: 23
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "rootfs:\n  workers: 23"
