apiVersion: v1
kind: ConfigMap
{{- if not (has .Values.storage.type (list "pvc" "s3")) }}
{{- fail (printf "snapshot.storage.type=%q is not supported; expected pvc or s3" .Values.storage.type) }}
{{- end }}
{{- if not (has .Values.storage.accessMode (list "agentMount" "podMount")) }}
{{- fail (printf "snapshot.storage.accessMode=%q is not supported; expected agentMount or podMount" .Values.storage.accessMode) }}
{{- end }}
{{- if and (eq .Values.storage.type "s3") (ne .Values.storage.accessMode "agentMount") }}
{{- fail "snapshot.storage.type=s3 requires storage.accessMode=agentMount (the agent stages artifacts locally before upload)" }}
{{- end }}
{{- if and (eq .Values.storage.type "s3") (not .Values.storage.s3.credentialsSecretRef) }}
{{- fail "snapshot.storage.s3.credentialsSecretRef is required: the agent needs AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY from a Secret" }}
{{- end }}
metadata:
  name: {{ include "snapshot.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "snapshot.labels" . | nindent 4 }}
data:
  config.yaml: |
    storage:
      type: {{ .Values.storage.type | quote }}
      accessMode: {{ .Values.storage.accessMode | quote }}
      {{- if eq .Values.storage.type "pvc" }}
      basePath: {{ .Values.storage.pvc.basePath | quote }}
      {{- else if eq .Values.storage.type "s3" }}
      basePath: {{ .Values.storage.s3.basePath | quote }}
      s3:
        endpoint: {{ required "storage.s3.endpoint is required when storage.type=s3" .Values.storage.s3.endpoint | quote }}
        bucket: {{ required "storage.s3.bucket is required when storage.type=s3" .Values.storage.s3.bucket | quote }}
        {{- if .Values.storage.s3.region }}
        region: {{ .Values.storage.s3.region | quote }}
        {{- end }}
        {{- if .Values.storage.s3.prefix }}
        prefix: {{ .Values.storage.s3.prefix | quote }}
        {{- end }}
        useSSL: {{ .Values.storage.s3.useSSL }}
        forcePathStyle: {{ .Values.storage.s3.forcePathStyle | default false }}
        {{- if .Values.storage.s3.concurrency }}
        concurrency: {{ .Values.storage.s3.concurrency }}
        {{- end }}
      {{- end }}

    overlay:
      exclusions: {{ toYaml .Values.config.overlay.exclusions | nindent 8 }}

    restore:
      nsRestorePath: {{ .Values.config.restore.nsRestorePath | quote }}
      restoreTimeoutSeconds: {{ .Values.config.restore.restoreTimeoutSeconds }}

    criu:
      binaryPath: {{ .Values.config.criu.binaryPath | quote }}
      ghostLimit: {{ .Values.config.criu.ghostLimit }}
      logLevel: {{ .Values.config.criu.logLevel }}
      workDir: {{ .Values.config.criu.workDir | quote }}
      leaveRunning: {{ .Values.config.criu.leaveRunning }}
      shellJob: {{ .Values.config.criu.shellJob }}
      tcpClose: {{ .Values.config.criu.tcpClose }}
      tcpEstablished: {{ .Values.config.criu.tcpEstablished }}
      fileLocks: {{ .Values.config.criu.fileLocks }}
      orphanPtsMaster: {{ .Values.config.criu.orphanPtsMaster }}
      extUnixSk: {{ .Values.config.criu.extUnixSk }}
      linkRemap: {{ .Values.config.criu.linkRemap }}
      extMasters: {{ .Values.config.criu.extMasters }}
      manageCgroupsMode: {{ .Values.config.criu.manageCgroupsMode | quote }}
      imageIoMode: {{ .Values.config.criu.imageIoMode | quote }}
      rstSibling: {{ .Values.config.criu.rstSibling }}
      mntnsCompatMode: {{ .Values.config.criu.mntnsCompatMode }}
      evasiveDevices: {{ .Values.config.criu.evasiveDevices }}
      forceIrmap: {{ .Values.config.criu.forceIrmap }}
      autoDedup: {{ .Values.config.criu.autoDedup }}
      lazyPages: {{ .Values.config.criu.lazyPages }}
      libDir: {{ .Values.config.criu.libDir | quote }}
      allowUprobes: {{ .Values.config.criu.allowUprobes }}
      skipInFlight: {{ .Values.config.criu.skipInFlight }}
