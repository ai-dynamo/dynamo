apiVersion: v1
kind: ConfigMap
{{- if ne .Values.storage.type "pvc" }}
{{- fail (printf "snapshot.storage.type=%q is not supported yet; only pvc is currently implemented" .Values.storage.type) }}
{{- end }}
{{- if not (has .Values.storage.accessMode (list "agentMount" "podMount")) }}
{{- fail (printf "snapshot.storage.accessMode=%q is not supported; expected agentMount or podMount" .Values.storage.accessMode) }}
{{- end }}
{{- if not (has .Values.config.cudaCheckpoint.storageMode (list "legacy" "posix")) }}
{{- fail (printf "snapshot.config.cudaCheckpoint.storageMode=%q is not supported; expected legacy or posix" .Values.config.cudaCheckpoint.storageMode) }}
{{- end }}
{{/* Helm decodes values such as 2.0 as float64, so check integrality before normalizing to an integer. */}}
{{- $transferBufferCountValue := .Values.config.cudaCheckpoint.transferBufferCount }}
{{- if not (or (kindIs "int" $transferBufferCountValue) (kindIs "int64" $transferBufferCountValue) (and (kindIs "float64" $transferBufferCountValue) (eq $transferBufferCountValue (floor $transferBufferCountValue)))) }}
{{- fail "snapshot.config.cudaCheckpoint.transferBufferCount must be an integral numeric value; fractional numbers, booleans, strings, and null are not accepted" }}
{{- end }}
{{- $transferChunkBytesValue := .Values.config.cudaCheckpoint.transferChunkBytes }}
{{- if not (or (kindIs "int" $transferChunkBytesValue) (kindIs "int64" $transferChunkBytesValue) (and (kindIs "float64" $transferChunkBytesValue) (eq $transferChunkBytesValue (floor $transferChunkBytesValue)))) }}
{{- fail "snapshot.config.cudaCheckpoint.transferChunkBytes must be an integral numeric value; fractional numbers, booleans, strings, and null are not accepted" }}
{{- end }}
{{- $transferBufferCount := int $transferBufferCountValue }}
{{- $transferChunkBytes := int64 $transferChunkBytesValue }}
{{- if or (lt $transferBufferCount 1) (gt $transferBufferCount 8) }}
{{- fail "snapshot.config.cudaCheckpoint.transferBufferCount must be between 1 and 8" }}
{{- end }}
{{- if or (lt $transferChunkBytes 1048576) (gt $transferChunkBytes 268435456) (ne (mod $transferChunkBytes 4096) 0) }}
{{- fail "snapshot.config.cudaCheckpoint.transferChunkBytes must be a 4096-byte multiple between 1048576 and 268435456" }}
{{- end }}
{{- if gt (mul $transferBufferCount $transferChunkBytes) 1073741824 }}
{{- fail "snapshot.config.cudaCheckpoint transfer buffers exceed the 1 GiB per-device pinned-memory limit" }}
{{- end }}
metadata:
  name: {{ include "snapshot.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "snapshot.labels" . | nindent 4 }}
data:
  config.yaml: |
    storage:
      type: {{ .Values.storage.type | quote }}
      accessMode: {{ .Values.storage.accessMode | quote }}
      {{- if eq .Values.storage.type "pvc" }}
      basePath: {{ .Values.storage.pvc.basePath | quote }}
      {{- end }}

    cudaCheckpoint:
      storageMode: {{ .Values.config.cudaCheckpoint.storageMode | quote }}
      transferBufferCount: {{ $transferBufferCount }}
      transferChunkBytes: {{ $transferChunkBytes }}

    overlay:
      exclusions: {{ toYaml .Values.config.overlay.exclusions | nindent 8 }}

    restore:
      nsRestorePath: {{ .Values.config.restore.nsRestorePath | quote }}
      restoreTimeoutSeconds: {{ .Values.config.restore.restoreTimeoutSeconds }}

    criu:
      binaryPath: {{ .Values.config.criu.binaryPath | quote }}
      ghostLimit: {{ .Values.config.criu.ghostLimit }}
      logLevel: {{ .Values.config.criu.logLevel }}
      workDir: {{ .Values.config.criu.workDir | quote }}
      leaveRunning: {{ .Values.config.criu.leaveRunning }}
      shellJob: {{ .Values.config.criu.shellJob }}
      tcpClose: {{ .Values.config.criu.tcpClose }}
      tcpEstablished: {{ .Values.config.criu.tcpEstablished }}
      fileLocks: {{ .Values.config.criu.fileLocks }}
      orphanPtsMaster: {{ .Values.config.criu.orphanPtsMaster }}
      extUnixSk: {{ .Values.config.criu.extUnixSk }}
      linkRemap: {{ .Values.config.criu.linkRemap }}
      extMasters: {{ .Values.config.criu.extMasters }}
      manageCgroupsMode: {{ .Values.config.criu.manageCgroupsMode | quote }}
      imageIoMode: {{ .Values.config.criu.imageIoMode | quote }}
      rstSibling: {{ .Values.config.criu.rstSibling }}
      mntnsCompatMode: {{ .Values.config.criu.mntnsCompatMode }}
      evasiveDevices: {{ .Values.config.criu.evasiveDevices }}
      forceIrmap: {{ .Values.config.criu.forceIrmap }}
      autoDedup: {{ .Values.config.criu.autoDedup }}
      lazyPages: {{ .Values.config.criu.lazyPages }}
      libDir: {{ .Values.config.criu.libDir | quote }}
      allowUprobes: {{ .Values.config.criu.allowUprobes }}
      skipInFlight: {{ .Values.config.criu.skipInFlight }}
