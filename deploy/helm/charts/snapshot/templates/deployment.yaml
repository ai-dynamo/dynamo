{{- if .Values.controller.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "snapshot.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "snapshot.labels" . | nindent 4 }}
    app.kubernetes.io/component: checkpoint-controller
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      {{- include "snapshot.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: checkpoint-controller
  template:
    metadata:
      labels:
        {{- include "snapshot.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: checkpoint-controller
    spec:
      serviceAccountName: {{ include "snapshot.serviceAccountName" . }}
      containers:
        - name: controller
          image: "{{ .Values.daemonset.image.repository }}:{{ .Values.daemonset.image.tag }}"
          imagePullPolicy: {{ .Values.daemonset.image.pullPolicy }}
          command:
            - /usr/local/bin/snapshot-controller
          env:
            - name: WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DISABLE_CUDA_CHECKPOINT_JOB_FILE
              value: {{ ternary "true" "false" .Values.controller.disableCudaCheckpointJobFile | quote }}
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
      {{- with .Values.daemonset.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
