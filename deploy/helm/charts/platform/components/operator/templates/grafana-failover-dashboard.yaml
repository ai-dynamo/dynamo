#
# Ships the GMS shadow-failover Grafana dashboard as a ConfigMap. The
# kube-prometheus-stack Grafana sidecar auto-imports ConfigMaps labeled
# `grafana_dashboard` across all namespaces, so the dashboard installs with the
# platform. Gated on the same condition as the PodMonitors: no point shipping a
# dashboard when nothing is scraping the metrics.
{{- $podMonitorsEnabled := false }}
{{- if kindIs "invalid" .Values.dynamo.metrics.podMonitors.enabled }}
  {{- $podMonitorsEnabled = (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1") }}
{{- else }}
  {{- $podMonitorsEnabled = .Values.dynamo.metrics.podMonitors.enabled }}
{{- end }}
{{- if $podMonitorsEnabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: dynamo-failover-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
data:
  failover-dashboard.json: |-
{{ .Files.Get "files/failover-dashboard.json" | indent 4 }}
{{- end }}
