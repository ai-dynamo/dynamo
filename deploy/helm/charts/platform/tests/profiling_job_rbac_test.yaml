suite: profiling job RBAC
templates:
  - charts/dynamo-operator/templates/profiling-job-rbac.yaml
tests:
  - it: should not grant cluster-scoped node access to profiling jobs
    documentIndex: 0
    asserts:
      - equal:
          path: kind
          value: ClusterRole
      - notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["nodes"]
            verbs: ["get", "list", "watch"]
