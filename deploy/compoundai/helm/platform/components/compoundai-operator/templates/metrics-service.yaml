apiVersion: v1
kind: Service
metadata:
  name: {{ include "compoundai-operator.fullname" . }}
  labels:
    app.kubernetes.io/component: kube-rbac-proxy
    app.kubernetes.io/created-by: compoundai-operator
    app.kubernetes.io/part-of: compoundai-operator
    control-plane: controller-manager
  {{- include "compoundai-operator.labels" . | nindent 4 }}
spec:
  type: {{ .Values.metricsService.type }}
  selector:
    control-plane: controller-manager
  {{- include "compoundai-operator.selectorLabels" . | nindent 4 }}
  ports:
  {{- .Values.metricsService.ports | toYaml | nindent 2 -}}
