{{- if .Values.demo.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "datastore.gitea.additional.secret.name" . }}
type: Opaque
stringData:
  {{- if .Values.postgresqlgitea.enabled }}
  database: |
    HOST={{ include "datastore.gitea.inernal-postgres.host" . }}
    PASSWD={{ .Values.postgresqlgitea.auth.password }}
  {{- end }}
  {{- if .Values.minio.enabled }}
  storage.minio: |
    MINIO_ENDPOINT={{ include "datastore.gitea.inernal-minio.host" . }}
    MINIO_ACCESS_KEY_ID={{ .Values.minio.auth.rootUser }}
    MINIO_SECRET_ACCESS_KEY={{ .Values.minio.auth.rootPassword }}
  {{- end }}
  {{- if and (not .Values.gitea.gitea.config.server.LFS_JWT_SECRET) .Release.IsInstall }}
  server: LFS_JWT_SECRET={{ include "datastore.gitea.random.lfs_jwt_token" . }}
  {{- end -}}
{{- end }}