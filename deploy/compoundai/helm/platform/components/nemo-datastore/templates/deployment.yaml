apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "datastore.fullname" . }}
  labels:
    {{- include "datastore.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "datastore.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "datastore.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "datastore.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
      {{- if .Values.postgresqlapi.enabled }}
      - name: wait-postgres-ready
        image: busybox
        command: [ 'sh', '-c', 'until nc -z {{ include "datastore.api.database.serviceName" . }} 5432; do echo "PostgreSQL is unavailable. Sleeping for 5 seconds"; sleep 5; done;' ]
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: APP_VERSION
              value: {{ .Values.image.tag | quote }}
            - name: GITEA_ENDPOINT
              value: {{ include "datastore.gitea.inernal-endpoint"  .}}
            - name: GITEA_ORG_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gitea.gitea.admin.existingSecret }}
                  key: username
            - name: GITEA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gitea.gitea.admin.existingSecret }}
                  key: password
            {{- if .Values.openTelemetry.enabled }}
            # OpenTelemetry
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://$(HOST_IP):4317" # sends to gRPC receiver on port 4317
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=dev"
            - name: OTEL_SERVICE_NAME
              value: "nemo-data-store-service"
            - name: OTEL_PYTHON_EXCLUDED_URLS
              value: "health"
            {{- end }}
            {{- if .Values.postgresqlapi.enabled }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "datastore.api.database.secretName" . }}
                  key: password
            - name: DATABASE_URL
              value: {{ printf "postgresql+asyncpg://%s:$(DB_PASSWORD)@%s" (include "datastore.database.user" .) (include "datastore.api.database.endpoint" .) }}
            {{- end }}
          envFrom:
          - configMapRef:
              name: {{ include "datastore.fullname" . }}
          - secretRef:
              name: {{ include "datastore.api.database.secretName" . }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
