# Default values for datastore.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ""
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

## @section ServiceAccount
## @param serviceAccount.create Enable the creation of a ServiceAccount
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8000

## @section servicNameOverride
## Overrides name of the data-store service
serviceNameOverride: ""

## @section ingress
ingress:
  enabled: false
  className: ""
  annotations: {}
  hostname: ""
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

openTelemetry:
  enabled: false

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10
  timeoutSeconds: 20
  failureThreshold: 10

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 20
  failureThreshold: 20

## @section deployment
#
## @param resources Kubernetes resources
resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes:  []

# Additional volumeMounts on the output Deployment definition.
volumeMounts:  []

# Additional datastore api server specific configs
appConfig: {}

## @param nodeSelector NodeSelector for the deployment
nodeSelector: {}

## @param tolerations Tolerations for the deployment
tolerations: []

## @param affinity Affinity for the deployment
affinity: {}

## In-cluster minio deployment configuration
## ref: https://github.com/bitnami/charts/blob/minio/13.3.1/bitnami/minio/values.yaml
## @param minio.enabled Enable minio deployment
## @param minio.apiIngress.enabled Enable ingress controller resource for MinIO API
## @param minio.apiIngress.ingressClassName IngressClass that will be be used to implement the Ingress (Kubernetes 1.18+)
## @param minio.apiIngress.hostname Default host for the ingress resource
minio:
  enabled: false
  mode: standalone
  auth:
    rootUser: minioadmin
    rootPassword: minioadmin
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    annotations:
      helm.sh/resource-policy: keep
  apiIngress:
    enabled: false
    ingressClassName: ""
    hostname: ""
    pathType: ImplementationSpecific
    annotations: {}

## PostgreSQL chart configuration for in-cluster postgresql db used by datastore api service
## ref: https://github.com/bitnami/charts/blob/main/bitnami/postgresql/values.yaml
## @param postgresqlapi.auth.postgresPassword Password for the "postgres" admin user (overrides `auth.postgresPassword`)
## @param postgresqlapi.auth.username Name for a custom user to create (overrides `auth.username`)
## @param postgresqlapi.auth.password Password for the custom user to create (overrides `auth.password`)
## @param postgresqlapi.auth.database Name for a custom database to create (overrides `auth.database`)
## @param postgresqlapi.architecture PostgreSQL architecture (`standalone` or `replication`)
## @param postgresqlapi.persistence.enabled Enable PostgreSQL Primary data persistence using PVC
## @param postgresqlapi.auth.existingSecret Pre-existing k8s Secret with keys (password, postgres-password) (overrides auth.password)
postgresqlapi:
  # In-cluster postgresql server for datastore api service
  # In order to use in-cluster postgresql server, set postgresqlapi.enabled as true
  enabled: false
  auth:
    username: dsuser
    password: dspass
    database: dsapi
    existingSecret: ""
  architecture: standalone
  primary:
    persistence:
      enabled: true
      size: 1Gi

## PostgreSQL configuration for externally hosted postgresql db used by datastore api service
externalPostgresqlApi:
  auth:
    username: ""
    database: ""
    existingSecret: ""
  host: ""
  port: 5432

## PostgreSQL chart configuration for in-cluster postgresql db used by Gitea
## ref: https://github.com/bitnami/charts/blob/main/bitnami/postgresql/values.yaml
## @param postgresqlgitea.auth.postgresPassword Password for the "postgres" admin user (overrides `auth.postgresPassword`)
## @param postgresqlgitea.auth.username Name for a custom user to create (overrides `auth.username`)
## @param postgresqlgitea.auth.password Password for the custom user to create (overrides `auth.password`)
## @param postgresqlgitea.auth.database Name for a custom database to create (overrides `auth.database`)
## @param postgresqlgitea.architecture PostgreSQL architecture (`standalone` or `replication`)
## @param postgresqlgitea.persistence.enabled Enable PostgreSQL Primary data persistence using PVC
postgresqlgitea:
  enabled: false
  auth:
    username: gitea
    password: gitea
    database: gitea
  architecture: standalone
  primary:
    persistence:
      enabled: true
      size: 1Gi
      storageClass: ""
      accessModes:
        - ReadWriteOnce

demo:
  enabled: true
  ngcImagePullSecret: nvcrimagepullsecret
  ngcApiKey: ""
  gitea:
    adminPassword: change-this-password

## @section Gitea
## Gitea chart configuration
## ref: https://gitea.com/gitea/helm-chart/src/branch/main/values.yaml
## ref: https://gitea.com/gitea/helm-chart/src/branch/main/README.md
## @param gitea.admin.existingSecret Use an existing secret to store admin user credentials
## @param gitea.admin.email Email for the Gitea admin user
## @param gitea.admin.password Password for the Gitea admin user
## @param gitea.redis-cluster.enabled Enable redis
## @param gitea.image.rootless: we use rootless images of Gitea
## @param gitea.gitea.admin.existingSecret Use an existing secret to store admin user credentials
## @param gitea.gitea.additionalConfigSources Additional configuration from secret or configmap
## @param gitea.gitea.database PostgreSQL database details for gite
## @section Gitea persistence
## @param gitea.persistence.enabled Enable persistent storage
## @param gitea.persistence.create Whether to create the persistentVolumeClaim for shared storage
## @param gitea.persistence.mount Whether the persistentVolumeClaim should be mounted (even if not created)
## @param gitea.persistence.claimName Use an existing claim to store repository information
## @param gitea.persistence.size Size for persistence to store repo information
## @param gitea.persistence.accessModes AccessMode for persistence
## @param gitea.persistence.labels Labels for the persistence volume claim to be created
## @param gitea.persistence.annotations.helm.sh/resource-policy Resource policy for the persistence volume claim
## @param gitea.persistence.storageClass Name of the storage class to use
## @param gitea.persistence.subPath Subdirectory of the volume to mount at
## @param gitea.persistence.volumeName Name of persistent volume in PVC
gitea:
  enabled: true
  replicaCount: 1
  redis-cluster:
    enabled: false
  postgresql:
    enabled: false
  postgresql-ha:
    enabled: false
  persistence:
    enabled: true
    create: true
    mount: true
    claimName: gitea-shared-storage
    size: 5Gi
    accessModes:
      - ReadWriteMany
    labels: { }
    storageClass: ""
    subPath:
    volumeName: ""
    annotations:
      helm.sh/resource-policy: keep
  image:
    repository: ""
    tag: ""
    pullPolicy: IfNotPresent
    rootless: true
    imagePullSecrets: []
  serviceAccount:
      create: true
      name: gitea
      imagePullSecrets: []
  gitea:
    admin:
      existingSecret: gitea-admin-secret
      email: admin@example.com
    additionalConfigSources:
      - secret:
          secretName: gitea-service-secret
      - configMap:
          name: gitea-config
    test:
      enabled: false
    config:
      cron.GIT_GC_REPOS:
        enabled: false
      server:
        # Dont change: LFS_START_SERVER
        START_SSH_SERVER: false
        LFS_START_SERVER: true
        LFS_JWT_SECRET: ""
      database:
        DB_TYPE: postgres
        NAME: gitea
        USER: gitea
        SSL_MODE: "disable"
      storage.minio:
        #Dont change: SERVE_DIRECT, STORAGE_TYPE
        SERVE_DIRECT: true
        STORAGE_TYPE: minio
        MINIO_BUCKET: datastore
        MINIO_LOCATION: ""
        MINIO_ENDPOINT: ""
        MINIO_ACCESS_KEY_ID: ""
        MINIO_SECRET_ACCESS_KEY: ""
        MINIO_USE_SSL: false
      lfs:
        #Dont change: STORAGE_TYPE
        STORAGE_TYPE: minio
      session:
        PROVIDER: memory
      cache:
        ADAPTER: memory
      queue:
        TYPE: level
  test:
    enabled: false
  livenessProbe:
    enabled: true
    tcpSocket:
      port: http
    initialDelaySeconds: 200
    timeoutSeconds: 5
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 5
  readinessProbe:
    enabled: true
    tcpSocket:
      port: http
    initialDelaySeconds: 200
    timeoutSeconds: 20
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 5