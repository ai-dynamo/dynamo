apiVersion: v2
name: nemo-datastore
maintainers:
  - name: NVIDIA, Inc.
    url: https://www.nvidia.com
description: A Helm chart for NeMo Data Store service.
type: application
version: 0.1.10
home: https://nvidia.com

dependencies:
  # https://github.com/bitnami/charts/tree/main/bitnami/minio
  - name: minio
    version: 13.3.1
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: minio.enabled

  # https://gitea.com/gitea/helm-chart/src/branch/main/README.md#user-content-installing
  - name: gitea
    version: 10.1.0
    condition: gitea.enabled
    repository: "file://dependency_chart/gitea"

  # https://github.com/bitnami/charts/blob/main/bitnami/postgresql
  - name: postgresql
    repository: oci://registry-1.docker.io/bitnamicharts
    version: 13.3.1
    condition: postgresqlgitea.enabled
    alias: postgresqlgitea

  - name: postgresql
    repository: oci://registry-1.docker.io/bitnamicharts
    version: 13.3.1
    condition: postgresqlapi.enabled
    alias: postgresqlapi

  # https://github.com/bitnami/charts/tree/main/bitnami/common
  - name: common
    version: 2.14.1
    repository: oci://registry-1.docker.io/bitnamicharts
    tags:
      - bitnami-common
