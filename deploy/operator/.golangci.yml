version: 2
run:
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - dupl
    - errcheck
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - staticcheck
    - unconvert
    - unparam
    - unused

  exclusions:
    # don't skip warning about doc comments
    # don't exclude the default set of lint
    generated: lax
    rules:
      - linters:
          - lll
        path: api/*
      - linters:
          - dupl
          - lll
        path: internal/*
      - linters:
          - lll
          - nakedret
        path: pkg/dynamo/*
      # Intentional internal usage of deprecated namespace-restricted mode fields/packages.
      # The feature is soft-deprecated (still functional) so internal references are expected.
      - linters:
          - staticcheck
        text: SA1019:.*deprecated.*[Nn]amespace
    paths:
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofmt
    - gci

  settings:
    gci:
      sections:
        - standard
        - default
        - localmodule

  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
