apiVersion: nvidia.com/v1beta1
kind: DynamoComponentDeployment
metadata:
  name: lws-manifest
spec:
  backendFramework: vllm
  name: decode
  type: decode
  replicas: 2
  multinode:
    nodeCount: 2
  podTemplate:
    spec:
      containers:
        - name: main
          image: registry.example/dynamo-worker:test
          args:
            - --model
            - test/model
