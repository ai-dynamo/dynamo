apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  $strict: false
  name: aic-lws-dgd
spec:
  components:
    - name: Frontend
      podTemplate:
        spec:
          containers:
            - image: $ignore
              name: main
      replicas: 1
      type: frontend
    - multinode:
        nodeCount: 2
      name: decode
      podTemplate:
        spec:
          containers:
            - args:
                - --model-path
                - Qwen/Qwen3-0.6B
                - --model-name
                - Qwen/Qwen3-0.6B
                - --speedup-ratio
                - "1.0"
                - --planner-profile-data
                - /workspace/components/src/dynamo/planner/tests/data/profiling_results/H200_TP1P_TP1D
                - --disaggregation-mode
                - decode
              command:
                - python3
                - -m
                - dynamo.mocker
              envFrom:
                - secretRef:
                    name: hf-token-secret
              image: $ignore
              name: main
              workingDir: /workspace
      replicas: 1
      type: decode
    - name: prefill
      podTemplate:
        spec:
          containers:
            - args:
                - --model-path
                - Qwen/Qwen3-0.6B
                - --model-name
                - Qwen/Qwen3-0.6B
                - --speedup-ratio
                - "1.0"
                - --planner-profile-data
                - /workspace/components/src/dynamo/planner/tests/data/profiling_results/H200_TP1P_TP1D
                - --disaggregation-mode
                - prefill
              command:
                - python3
                - -m
                - dynamo.mocker
              envFrom:
                - secretRef:
                    name: hf-token-secret
              image: $ignore
              name: main
              workingDir: /workspace
      replicas: 1
      type: prefill
status:
  $ignore: true
---
apiVersion: nvidia.com/v1beta1
kind: DynamoComponentDeployment
metadata:
  $strict: false
  name: $glob:aic-lws-dgd-decode-*
spec:
  multinode:
    nodeCount: 2
  name: decode
  podTemplate:
    metadata:
      annotations:
        nvidia.com/dynamo-operator-origin-version: $pattern:1\.4\..*
      labels:
        nvidia.com/dynamo-worker-hash: $pattern:[0-9a-f]{8}
    spec:
      containers:
        - args:
            - --model-path
            - Qwen/Qwen3-0.6B
            - --model-name
            - Qwen/Qwen3-0.6B
            - --speedup-ratio
            - "1.0"
            - --planner-profile-data
            - /workspace/components/src/dynamo/planner/tests/data/profiling_results/H200_TP1P_TP1D
            - --disaggregation-mode
            - decode
          command:
            - python3
            - -m
            - dynamo.mocker
          envFrom:
            - secretRef:
                name: hf-token-secret
          image: $ignore
          name: main
          workingDir: /workspace
  replicas: 1
  type: decode
status:
  $ignore: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  $strict: false
  name: aic-lws-dgd-frontend
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      nvidia.com/selector: aic-lws-dgd-frontend
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        nvidia.com/dynamo-component: Frontend
        nvidia.com/dynamo-component-type: frontend
        nvidia.com/dynamo-discovery-backend: kubernetes
        nvidia.com/dynamo-discovery-enabled: "true"
        nvidia.com/dynamo-graph-deployment-name: aic-lws-dgd
        nvidia.com/dynamo-namespace: $glob:clusterenv-*-aic-lws-dgd
        nvidia.com/metrics-enabled: "true"
        nvidia.com/selector: aic-lws-dgd-frontend
    spec:
      containers:
        - args:
            - -m
            - dynamo.frontend
          command:
            - python3
          env:
            - name: DYNAMO_PORT
              value: "8000"
            - name: DYN_COMPONENT
              value: frontend
            - name: DYN_DISCOVERY_BACKEND
              value: kubernetes
            - name: DYN_HTTP_PORT
              value: "8000"
            - name: DYN_NAMESPACE
              value: $glob:clusterenv-*-aic-lws-dgd
            - name: DYN_NAMESPACE_PREFIX
              value: $glob:clusterenv-*-aic-lws-dgd
            - name: DYN_PARENT_DGD_K8S_NAME
              value: aic-lws-dgd
            - name: DYN_PARENT_DGD_K8S_NAMESPACE
              value: $glob:clusterenv-*
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: POD_UID
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.uid
          image: $ignore
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /live
              port: http
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          name: main
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 3
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /dev/shm
              name: shared-memory
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        fsGroup: 1000
      serviceAccount: aic-lws-dgd-k8s-service-discovery
      serviceAccountName: aic-lws-dgd-k8s-service-discovery
      terminationGracePeriodSeconds: 60
      volumes:
        - emptyDir:
            medium: Memory
            sizeLimit: 8Gi
          name: shared-memory
status:
  $ignore: true
---
