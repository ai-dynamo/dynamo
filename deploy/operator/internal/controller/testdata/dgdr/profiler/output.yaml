apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  $strict: false
  name: aic-profiler-dgd
spec:
  components:
    - minAvailable: 1
      name: Frontend
      podTemplate:
        spec:
          containers:
            - image: $ignore
              name: main
      replicas: 1
      type: frontend
    - minAvailable: 1
      name: decode
      podTemplate:
        spec:
          containers:
            - args:
                - --model-path
                - Qwen/Qwen3-0.6B
                - --model-name
                - Qwen/Qwen3-0.6B
                - --speedup-ratio
                - "1.0"
                - --planner-profile-data
                - /workspace/components/src/dynamo/planner/tests/data/profiling_results/H200_TP1P_TP1D
                - --disaggregation-mode
                - decode
              command:
                - python3
                - -m
                - dynamo.mocker
              envFrom:
                - secretRef:
                    name: hf-token-secret
              image: $ignore
              name: main
              workingDir: /workspace
      replicas: 1
      type: decode
    - minAvailable: 1
      name: prefill
      podTemplate:
        spec:
          containers:
            - args:
                - --model-path
                - Qwen/Qwen3-0.6B
                - --model-name
                - Qwen/Qwen3-0.6B
                - --speedup-ratio
                - "1.0"
                - --planner-profile-data
                - /workspace/components/src/dynamo/planner/tests/data/profiling_results/H200_TP1P_TP1D
                - --disaggregation-mode
                - prefill
              command:
                - python3
                - -m
                - dynamo.mocker
              envFrom:
                - secretRef:
                    name: hf-token-secret
              image: $ignore
              name: main
              workingDir: /workspace
      replicas: 1
      type: prefill
status:
  $ignore: true
---
apiVersion: grove.io/v1alpha1
kind: PodCliqueSet
metadata:
  $strict: false
  name: aic-profiler-dgd
spec:
  replicas: 1
  template:
    cliqueStartupType: CliqueStartupTypeAnyOrder
    cliques:
      - annotations:
          nvidia.com/dynamo-discovery-backend: kubernetes
          nvidia.com/dynamo-operator-origin-version: $pattern:1\.4\..*
        labels:
          nvidia.com/dynamo-component: Frontend
          nvidia.com/dynamo-component-type: frontend
          nvidia.com/dynamo-discovery-backend: kubernetes
          nvidia.com/dynamo-discovery-enabled: "true"
          nvidia.com/dynamo-graph-deployment-name: aic-profiler-dgd
          nvidia.com/dynamo-namespace: $glob:clusterenv-*-aic-profiler-dgd
          nvidia.com/metrics-enabled: "true"
          nvidia.com/selector: aic-profiler-dgd-frontend
        name: frontend
        spec:
          minAvailable: 1
          podSpec:
            containers:
              - args:
                  - -m
                  - dynamo.frontend
                command:
                  - python3
                env:
                  - name: DYNAMO_PORT
                    value: "8000"
                  - name: DYN_COMPONENT
                    value: frontend
                  - name: DYN_DISCOVERY_BACKEND
                    value: kubernetes
                  - name: DYN_HTTP_PORT
                    value: "8000"
                  - name: DYN_NAMESPACE
                    value: $glob:clusterenv-*-aic-profiler-dgd
                  - name: DYN_NAMESPACE_PREFIX
                    value: $glob:clusterenv-*-aic-profiler-dgd
                  - name: DYN_PARENT_DGD_K8S_NAME
                    value: aic-profiler-dgd
                  - name: DYN_PARENT_DGD_K8S_NAMESPACE
                    value: $glob:clusterenv-*
                  - name: POD_NAME
                    valueFrom:
                      fieldRef:
                        fieldPath: metadata.name
                  - name: POD_NAMESPACE
                    valueFrom:
                      fieldRef:
                        fieldPath: metadata.namespace
                  - name: POD_UID
                    valueFrom:
                      fieldRef:
                        fieldPath: metadata.uid
                image: $ignore
                livenessProbe:
                  failureThreshold: 3
                  httpGet:
                    path: /live
                    port: http
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 1
                name: main
                ports:
                  - containerPort: 8000
                    name: http
                    protocol: TCP
                readinessProbe:
                  failureThreshold: 3
                  httpGet:
                    path: /health
                    port: http
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 3
                resources: {}
                volumeMounts:
                  - mountPath: /dev/shm
                    name: shared-memory
            restartPolicy: Always
            securityContext:
              fsGroup: 1000
            serviceAccountName: aic-profiler-dgd-k8s-service-discovery
            terminationGracePeriodSeconds: 60
            volumes:
              - emptyDir:
                  medium: Memory
                  sizeLimit: 8Gi
                name: shared-memory
          replicas: 1
          roleName: frontend
      - annotations:
          nvidia.com/dynamo-discovery-backend: kubernetes
          nvidia.com/dynamo-operator-origin-version: $pattern:1\.4\..*
        labels:
          nvidia.com/dynamo-component: decode
          nvidia.com/dynamo-component-type: decode
          nvidia.com/dynamo-discovery-backend: kubernetes
          nvidia.com/dynamo-discovery-enabled: "true"
          nvidia.com/dynamo-graph-deployment-name: aic-profiler-dgd
          nvidia.com/dynamo-namespace: $glob:clusterenv-*-aic-profiler-dgd
          nvidia.com/dynamo-sub-component-type: decode
          nvidia.com/metrics-enabled: "true"
          nvidia.com/selector: aic-profiler-dgd-decode
        name: decode
        spec:
          minAvailable: 1
          podSpec:
            containers:
              - args:
                  - --model-path
                  - Qwen/Qwen3-0.6B
                  - --model-name
                  - Qwen/Qwen3-0.6B
                  - --speedup-ratio
                  - "1.0"
                  - --planner-profile-data
                  - /workspace/components/src/dynamo/planner/tests/data/profiling_results/H200_TP1P_TP1D
                  - --disaggregation-mode
                  - decode
                command:
                  - python3
                  - -m
                  - dynamo.mocker
                env:
                  - name: DYN_COMPONENT
                    value: decode
                  - name: DYN_DISCOVERY_BACKEND
                    value: kubernetes
                  - name: DYN_FORWARDPASS_METRIC_PORT
                    value: "20380"
                  - name: DYN_HEALTH_CHECK_ENABLED
                    value: "false"
                  - name: DYN_NAMESPACE
                    value: $glob:clusterenv-*-aic-profiler-dgd
                  - name: DYN_PARENT_DGD_K8S_NAME
                    value: aic-profiler-dgd
                  - name: DYN_PARENT_DGD_K8S_NAMESPACE
                    value: $glob:clusterenv-*
                  - name: DYN_SYSTEM_ENABLED
                    value: "true"
                  - name: DYN_SYSTEM_PORT
                    value: "9090"
                  - name: DYN_SYSTEM_USE_ENDPOINT_HEALTH_STATUS
                    value: '["generate"]'
                  - name: NIXL_TELEMETRY_ENABLE
                    value: "n"
                  - name: NIXL_TELEMETRY_EXPORTER
                    value: prometheus
                  - name: NIXL_TELEMETRY_PROMETHEUS_PORT
                    value: "19090"
                  - name: POD_NAME
                    valueFrom:
                      fieldRef:
                        fieldPath: metadata.name
                  - name: POD_NAMESPACE
                    valueFrom:
                      fieldRef:
                        fieldPath: metadata.namespace
                  - name: POD_UID
                    valueFrom:
                      fieldRef:
                        fieldPath: metadata.uid
                envFrom:
                  - secretRef:
                      name: hf-token-secret
                image: $ignore
                livenessProbe:
                  failureThreshold: 1
                  httpGet:
                    path: /live
                    port: system
                  periodSeconds: 5
                  timeoutSeconds: 4
                name: main
                ports:
                  - containerPort: 9090
                    name: system
                    protocol: TCP
                  - containerPort: 19090
                    name: nixl
                    protocol: TCP
                readinessProbe:
                  failureThreshold: 3
                  httpGet:
                    path: /health
                    port: system
                  periodSeconds: 10
                  timeoutSeconds: 4
                resources: {}
                startupProbe:
                  failureThreshold: 720
                  httpGet:
                    path: /live
                    port: system
                  periodSeconds: 10
                  timeoutSeconds: 5
                volumeMounts:
                  - mountPath: /dev/shm
                    name: shared-memory
                workingDir: /workspace
            restartPolicy: Always
            securityContext:
              fsGroup: 1000
            serviceAccountName: aic-profiler-dgd-k8s-service-discovery
            terminationGracePeriodSeconds: 60
            volumes:
              - emptyDir:
                  medium: Memory
                  sizeLimit: 8Gi
                name: shared-memory
          replicas: 1
          roleName: decode
      - annotations:
          nvidia.com/dynamo-discovery-backend: kubernetes
          nvidia.com/dynamo-operator-origin-version: $pattern:1\.4\..*
        labels:
          nvidia.com/dynamo-component: prefill
          nvidia.com/dynamo-component-type: prefill
          nvidia.com/dynamo-discovery-backend: kubernetes
          nvidia.com/dynamo-discovery-enabled: "true"
          nvidia.com/dynamo-graph-deployment-name: aic-profiler-dgd
          nvidia.com/dynamo-namespace: $glob:clusterenv-*-aic-profiler-dgd
          nvidia.com/dynamo-sub-component-type: prefill
          nvidia.com/metrics-enabled: "true"
          nvidia.com/selector: aic-profiler-dgd-prefill
        name: prefill
        spec:
          minAvailable: 1
          podSpec:
            containers:
              - args:
                  - --model-path
                  - Qwen/Qwen3-0.6B
                  - --model-name
                  - Qwen/Qwen3-0.6B
                  - --speedup-ratio
                  - "1.0"
                  - --planner-profile-data
                  - /workspace/components/src/dynamo/planner/tests/data/profiling_results/H200_TP1P_TP1D
                  - --disaggregation-mode
                  - prefill
                command:
                  - python3
                  - -m
                  - dynamo.mocker
                env:
                  - name: DYN_COMPONENT
                    value: prefill
                  - name: DYN_DISCOVERY_BACKEND
                    value: kubernetes
                  - name: DYN_FORWARDPASS_METRIC_PORT
                    value: "20380"
                  - name: DYN_HEALTH_CHECK_ENABLED
                    value: "false"
                  - name: DYN_NAMESPACE
                    value: $glob:clusterenv-*-aic-profiler-dgd
                  - name: DYN_PARENT_DGD_K8S_NAME
                    value: aic-profiler-dgd
                  - name: DYN_PARENT_DGD_K8S_NAMESPACE
                    value: $glob:clusterenv-*
                  - name: DYN_SYSTEM_ENABLED
                    value: "true"
                  - name: DYN_SYSTEM_PORT
                    value: "9090"
                  - name: DYN_SYSTEM_USE_ENDPOINT_HEALTH_STATUS
                    value: '["generate"]'
                  - name: NIXL_TELEMETRY_ENABLE
                    value: "n"
                  - name: NIXL_TELEMETRY_EXPORTER
                    value: prometheus
                  - name: NIXL_TELEMETRY_PROMETHEUS_PORT
                    value: "19090"
                  - name: POD_NAME
                    valueFrom:
                      fieldRef:
                        fieldPath: metadata.name
                  - name: POD_NAMESPACE
                    valueFrom:
                      fieldRef:
                        fieldPath: metadata.namespace
                  - name: POD_UID
                    valueFrom:
                      fieldRef:
                        fieldPath: metadata.uid
                envFrom:
                  - secretRef:
                      name: hf-token-secret
                image: $ignore
                livenessProbe:
                  failureThreshold: 1
                  httpGet:
                    path: /live
                    port: system
                  periodSeconds: 5
                  timeoutSeconds: 4
                name: main
                ports:
                  - containerPort: 9090
                    name: system
                    protocol: TCP
                  - containerPort: 19090
                    name: nixl
                    protocol: TCP
                readinessProbe:
                  failureThreshold: 3
                  httpGet:
                    path: /health
                    port: system
                  periodSeconds: 10
                  timeoutSeconds: 4
                resources: {}
                startupProbe:
                  failureThreshold: 720
                  httpGet:
                    path: /live
                    port: system
                  periodSeconds: 10
                  timeoutSeconds: 5
                volumeMounts:
                  - mountPath: /dev/shm
                    name: shared-memory
                workingDir: /workspace
            restartPolicy: Always
            securityContext:
              fsGroup: 1000
            serviceAccountName: aic-profiler-dgd-k8s-service-discovery
            terminationGracePeriodSeconds: 60
            volumes:
              - emptyDir:
                  medium: Memory
                  sizeLimit: 8Gi
                name: shared-memory
          replicas: 1
          roleName: prefill
    headlessServiceConfig:
      publishNotReadyAddresses: true
    terminationDelay: 15m0s
