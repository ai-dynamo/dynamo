apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
    $strict: false
    name: lws-manifest-0
spec:
    leaderWorkerTemplate:
        leaderTemplate:
            metadata:
                labels:
                    nvidia.com/dynamo-component: decode
                    nvidia.com/dynamo-component-type: decode
                    nvidia.com/dynamo-discovery-backend: kubernetes
                    nvidia.com/dynamo-discovery-enabled: "true"
                    nvidia.com/dynamo-namespace: $pattern:clusterenv-.*-lws-manifest
                    nvidia.com/dynamo-sub-component-type: decode
                    nvidia.com/metrics-enabled: "true"
                    role: leader
            spec:
                containers:
                    - args:
                        - --model
                        - test/model
                      command:
                        - /bin/sh
                        - -c
                      env:
                        - name: DYN_COMPONENT
                          value: decode
                        - name: DYN_DISCOVERY_BACKEND
                          value: kubernetes
                        - name: DYN_FORWARDPASS_METRIC_PORT
                          value: "20380"
                        - name: DYN_HEALTH_CHECK_ENABLED
                          value: "false"
                        - name: DYN_NAMESPACE
                          value: $pattern:clusterenv-.*-lws-manifest
                        - name: DYN_PARENT_DGD_K8S_NAME
                          value: lws-manifest
                        - name: DYN_PARENT_DGD_K8S_NAMESPACE
                          value: $pattern:clusterenv-.*
                        - name: DYN_SYSTEM_ENABLED
                          value: "true"
                        - name: DYN_SYSTEM_PORT
                          value: "9090"
                        - name: DYN_SYSTEM_USE_ENDPOINT_HEALTH_STATUS
                          value: '["generate"]'
                        - name: NIXL_TELEMETRY_ENABLE
                          value: "n"
                        - name: NIXL_TELEMETRY_EXPORTER
                          value: prometheus
                        - name: NIXL_TELEMETRY_PROMETHEUS_PORT
                          value: "19090"
                        - name: POD_NAME
                          valueFrom:
                            fieldRef:
                                fieldPath: metadata.name
                        - name: POD_NAMESPACE
                          valueFrom:
                            fieldRef:
                                fieldPath: metadata.namespace
                        - name: POD_UID
                          valueFrom:
                            fieldRef:
                                fieldPath: metadata.uid
                      image: registry.example/dynamo-worker:test
                      livenessProbe:
                        failureThreshold: 1
                        httpGet:
                            path: /live
                            port: system
                        periodSeconds: 5
                        timeoutSeconds: 4
                      name: main
                      ports:
                        - containerPort: 9090
                          name: system
                          protocol: TCP
                        - containerPort: 19090
                          name: nixl
                          protocol: TCP
                      readinessProbe:
                        failureThreshold: 3
                        httpGet:
                            path: /health
                            port: system
                        periodSeconds: 10
                        timeoutSeconds: 4
                      resources: {}
                      startupProbe:
                        failureThreshold: 720
                        httpGet:
                            path: /live
                            port: system
                        periodSeconds: 10
                        timeoutSeconds: 5
                      volumeMounts:
                        - mountPath: /dev/shm
                          name: shared-memory
                restartPolicy: Always
                securityContext:
                    fsGroup: 1000
                serviceAccountName: lws-manifest-k8s-service-discovery
                terminationGracePeriodSeconds: 60
                volumes:
                    - emptyDir:
                        medium: Memory
                        sizeLimit: 8Gi
                      name: shared-memory
        restartPolicy: RecreateGroupOnPodRestart
        size: 2
        workerTemplate:
            metadata:
                labels:
                    nvidia.com/dynamo-component: decode
                    nvidia.com/dynamo-component-type: decode
                    nvidia.com/dynamo-discovery-backend: kubernetes
                    nvidia.com/dynamo-discovery-enabled: "true"
                    nvidia.com/dynamo-namespace: $pattern:clusterenv-.*-lws-manifest
                    nvidia.com/dynamo-sub-component-type: decode
                    nvidia.com/metrics-enabled: "true"
                    role: worker
            spec:
                containers:
                    - args:
                        - --model
                        - test/model
                      command:
                        - /bin/sh
                        - -c
                      env:
                        - name: DYN_COMPONENT
                          value: decode
                        - name: DYN_DISCOVERY_BACKEND
                          value: kubernetes
                        - name: DYN_FORWARDPASS_METRIC_PORT
                          value: "20380"
                        - name: DYN_HEALTH_CHECK_ENABLED
                          value: "false"
                        - name: DYN_NAMESPACE
                          value: $pattern:clusterenv-.*-lws-manifest
                        - name: DYN_PARENT_DGD_K8S_NAME
                          value: lws-manifest
                        - name: DYN_PARENT_DGD_K8S_NAMESPACE
                          value: $pattern:clusterenv-.*
                        - name: DYN_SYSTEM_ENABLED
                          value: "true"
                        - name: DYN_SYSTEM_PORT
                          value: "9090"
                        - name: DYN_SYSTEM_USE_ENDPOINT_HEALTH_STATUS
                          value: '["generate"]'
                        - name: NIXL_TELEMETRY_ENABLE
                          value: "n"
                        - name: NIXL_TELEMETRY_EXPORTER
                          value: prometheus
                        - name: NIXL_TELEMETRY_PROMETHEUS_PORT
                          value: "19090"
                        - name: POD_NAME
                          valueFrom:
                            fieldRef:
                                fieldPath: metadata.name
                        - name: POD_NAMESPACE
                          valueFrom:
                            fieldRef:
                                fieldPath: metadata.namespace
                        - name: POD_UID
                          valueFrom:
                            fieldRef:
                                fieldPath: metadata.uid
                      image: registry.example/dynamo-worker:test
                      name: main
                      ports:
                        - containerPort: 9090
                          name: system
                          protocol: TCP
                        - containerPort: 19090
                          name: nixl
                          protocol: TCP
                      resources: {}
                      volumeMounts:
                        - mountPath: /dev/shm
                          name: shared-memory
                restartPolicy: Always
                securityContext:
                    fsGroup: 1000
                serviceAccountName: lws-manifest-k8s-service-discovery
                terminationGracePeriodSeconds: 60
                volumes:
                    - emptyDir:
                        medium: Memory
                        sizeLimit: 8Gi
                      name: shared-memory
    networkConfig:
        subdomainPolicy: Shared
    replicas: 2
    rolloutStrategy:
        rollingUpdateConfiguration:
            maxSurge: 0
            maxUnavailable: 1
            partition: 0
        type: RollingUpdate
    startupPolicy: LeaderCreated
status: $notexists
