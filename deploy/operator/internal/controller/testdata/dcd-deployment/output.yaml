apiVersion: apps/v1
kind: Deployment
metadata:
    $strict: false
    name: deployment-manifest
spec:
    progressDeadlineSeconds: 600
    replicas: 2
    revisionHistoryLimit: 10
    selector:
        matchLabels:
            nvidia.com/selector: deployment-manifest
    strategy:
        rollingUpdate:
            maxSurge: 25%
            maxUnavailable: 25%
        type: RollingUpdate
    template:
        metadata:
            labels:
                nvidia.com/dynamo-component: decode
                nvidia.com/dynamo-component-type: decode
                nvidia.com/dynamo-discovery-backend: kubernetes
                nvidia.com/dynamo-discovery-enabled: "true"
                nvidia.com/dynamo-namespace: $pattern:clusterenv-.*-deployment-manifest
                nvidia.com/dynamo-sub-component-type: decode
                nvidia.com/metrics-enabled: "true"
                nvidia.com/selector: deployment-manifest
        spec:
            containers:
                - command:
                    - /bin/sh
                    - -c
                  env:
                    - name: DYN_COMPONENT
                      value: decode
                    - name: DYN_DISCOVERY_BACKEND
                      value: kubernetes
                    - name: DYN_FORWARDPASS_METRIC_PORT
                      value: "20380"
                    - name: DYN_HEALTH_CHECK_ENABLED
                      value: "false"
                    - name: DYN_NAMESPACE
                      value: $pattern:clusterenv-.*-deployment-manifest
                    - name: DYN_PARENT_DGD_K8S_NAME
                      value: deployment-manifest
                    - name: DYN_PARENT_DGD_K8S_NAMESPACE
                      value: $pattern:clusterenv-.*
                    - name: DYN_SYSTEM_ENABLED
                      value: "true"
                    - name: DYN_SYSTEM_PORT
                      value: "9090"
                    - name: DYN_SYSTEM_USE_ENDPOINT_HEALTH_STATUS
                      value: '["generate"]'
                    - name: NIXL_TELEMETRY_ENABLE
                      value: "n"
                    - name: NIXL_TELEMETRY_EXPORTER
                      value: prometheus
                    - name: NIXL_TELEMETRY_PROMETHEUS_PORT
                      value: "19090"
                    - name: POD_NAME
                      valueFrom:
                        fieldRef:
                            apiVersion: v1
                            fieldPath: metadata.name
                    - name: POD_NAMESPACE
                      valueFrom:
                        fieldRef:
                            apiVersion: v1
                            fieldPath: metadata.namespace
                    - name: POD_UID
                      valueFrom:
                        fieldRef:
                            apiVersion: v1
                            fieldPath: metadata.uid
                  image: registry.example/dynamo-worker:test
                  imagePullPolicy: IfNotPresent
                  livenessProbe:
                    failureThreshold: 1
                    httpGet:
                        path: /live
                        port: system
                        scheme: HTTP
                    periodSeconds: 5
                    successThreshold: 1
                    timeoutSeconds: 4
                  name: main
                  ports:
                    - containerPort: 9090
                      name: system
                      protocol: TCP
                    - containerPort: 19090
                      name: nixl
                      protocol: TCP
                  readinessProbe:
                    failureThreshold: 3
                    httpGet:
                        path: /health
                        port: system
                        scheme: HTTP
                    periodSeconds: 10
                    successThreshold: 1
                    timeoutSeconds: 4
                  resources: {}
                  startupProbe:
                    failureThreshold: 720
                    httpGet:
                        path: /live
                        port: system
                        scheme: HTTP
                    periodSeconds: 10
                    successThreshold: 1
                    timeoutSeconds: 5
                  terminationMessagePath: /dev/termination-log
                  terminationMessagePolicy: File
                  volumeMounts:
                    - mountPath: /dev/shm
                      name: shared-memory
            dnsPolicy: ClusterFirst
            restartPolicy: Always
            schedulerName: default-scheduler
            securityContext:
                fsGroup: 1000
            serviceAccount: deployment-manifest-k8s-service-discovery
            serviceAccountName: deployment-manifest-k8s-service-discovery
            terminationGracePeriodSeconds: 60
            volumes:
                - emptyDir:
                    medium: Memory
                    sizeLimit: 8Gi
                  name: shared-memory
status:
    $ignore: true
