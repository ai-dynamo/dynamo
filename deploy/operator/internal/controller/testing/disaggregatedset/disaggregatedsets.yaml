apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: disaggregatedsets.disaggregatedset.x-k8s.io
spec:
  group: disaggregatedset.x-k8s.io
  names:
    kind: DisaggregatedSet
    listKind: DisaggregatedSetList
    plural: disaggregatedsets
    singular: disaggregatedset
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        required:
        - spec
        properties:
          spec:
            type: object
            required:
            - roles
            x-kubernetes-validations:
            - message: replicas must be zero for all roles or non-zero for all roles
              rule: self.roles.all(r, !has(r.spec.replicas) || r.spec.replicas == 0) || self.roles.all(r, has(r.spec.replicas) && r.spec.replicas > 0)
            properties:
              roles:
                type: array
                minItems: 2
                x-kubernetes-list-type: map
                x-kubernetes-list-map-keys:
                - name
                items:
                  type: object
                  required:
                  - name
                  - spec
                  properties:
                    name:
                      type: string
                      minLength: 1
                      maxLength: 63
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                    metadata:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    spec:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                      properties:
                        replicas:
                          type: integer
                          format: int32
          status:
            type: object
            properties:
              roleStatuses:
                type: array
                x-kubernetes-list-type: map
                x-kubernetes-list-map-keys:
                - name
                items:
                  type: object
                  required:
                  - name
                  properties:
                    name:
                      type: string
                    replicas:
                      type: integer
                      format: int32
                    updatedReplicas:
                      type: integer
                      format: int32
                    readyReplicas:
                      type: integer
                      format: int32
    subresources:
      status: {}
