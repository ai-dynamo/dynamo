# nscale validation for FlashInfer collectives with idle PyNCCL over host SHM.
# The namespace must already contain shared-model-cache, hf-token-secret,
# acr-token-secret, the Dynamo operator, and the snapshot agent.
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: fi-nemotron-fa-pynccl-shm-build-run
  labels:
    app.kubernetes.io/created-by: pi-relay
    app.kubernetes.io/name: dynamo-snapshot-e2e
    e2e.ai-dynamo.io/run: fi-pynccl-shm-build-run
  annotations:
    nvidia.com/enable-grove: "false"
spec:
  backendFramework: vllm
  pvcs:
    - name: shared-model-cache
      create: false
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      envFromSecret: hf-token-secret
      volumeMounts:
        - name: shared-model-cache
          mountPoint: /home/dynamo/.cache/huggingface
      extraPodSpec:
        mainContainer:
          image: RUNTIME_IMAGE_TO_BE_PINNED_AFTER_BUILD
          imagePullPolicy: Always
          command:
            - python3
            - -m
            - dynamo.frontend
          args:
            - --router-mode
            - round-robin
            - --http-port
            - "8000"
          env:
            - name: HF_HOME
              value: /home/dynamo/.cache/huggingface
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: TRANSFORMERS_OFFLINE
              value: "1"
            - name: DO_NOT_TRACK
              value: "1"
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 5
            timeoutSeconds: 5
    VllmDecodeWorker:
      componentType: worker
      replicas: 1
      envFromSecret: hf-token-secret
      resources:
        requests:
          memory: 128Gi
          gpu: "8"
          custom:
            ephemeral-storage: 20Gi
        limits:
          memory: 1536Gi
          gpu: "8"
      sharedMemory:
        size: 64Gi
      checkpoint:
        enabled: true
        startupPolicy: WaitForCheckpoint
        deletionPolicy: Retain
        targetContainerName: main
      extraPodSpec:
        nodeSelector:
          kubernetes.io/hostname: cluster-0967a26d-pool-14bee067-prctr-z2rzf
          nvidia.com/gpu.count: "8"
          nvidia.com/gpu.present: "true"
          nvidia.com/gpu.product: NVIDIA-B200
        runtimeClassName: nvidia
        serviceAccountName: fi-nemotron-fa-pynccl-shm-build-run-k8s-service-discovery
        securityContext:
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
        terminationGracePeriodSeconds: 60
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        volumes:
          - name: hf-cache
            persistentVolumeClaim:
              claimName: shared-model-cache
          - name: criu-work
            emptyDir: {}
          - name: no-allgather-evidence
            configMap:
              name: fi-pynccl-shm-no-allgather-build-run
        mainContainer:
          name: main
          image: PLACEHOLDER_IMAGE_TO_BE_PINNED_AFTER_BUILD
          imagePullPolicy: Always
          workingDir: /workspace/
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --model
            - nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4
            - --served-model-name
            - nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4
            - --trust-remote-code
            - --tensor-parallel-size
            - "1"
            - --pipeline-parallel-size
            - "1"
            - --data-parallel-size
            - "8"
            - --data-parallel-size-local
            - "8"
            - --data-parallel-backend
            - mp
            - --distributed-executor-backend
            - mp
            - --data-parallel-rpc-port
            - "29500"
            - --enable-expert-parallel
            - --moe-backend
            - flashinfer_trtllm
            - --all2all-backend
            - flashinfer_nvlink_one_sided
            - --enable-flashinfer-autotune
            - --disable-custom-all-reduce
            - --disable-nccl-for-dp-synchronization
            - --max-model-len
            - "4096"
            - --max-num-seqs
            - "16"
            - --max-num-batched-tokens
            - "4096"
            - --gpu-memory-utilization
            - "0.80"
            - --kv-cache-dtype
            - fp8
          env:
            - name: HF_HOME
              value: /home/dynamo/.cache/huggingface
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: TRANSFORMERS_OFFLINE
              value: "1"
            - name: HF_HUB_DISABLE_TELEMETRY
              value: "1"
            - name: DO_NOT_TRACK
              value: "1"
            - name: VLLM_ALLREDUCE_USE_FLASHINFER
              value: "1"
            - name: VLLM_FLASHINFER_ALLREDUCE_BACKEND
              value: trtllm
            - name: PYTHONPATH
              value: /no-allgather-evidence
            - name: GLOO_SOCKET_IFNAME
              value: eth0
            - name: VLLM_LOGGING_LEVEL
              value: INFO
            - name: VLLM_ENGINE_READY_TIMEOUT_S
              value: "7200"
            - name: VLLM_ALLREDUCE_USE_SYMM_MEM
              value: "0"
            - name: VLLM_USE_NCCL_SYMM_MEM
              value: "0"
            - name: VLLM_DISTRIBUTED_USE_SPLIT_GROUP
              value: "0"
            - name: NCCL_P2P_DISABLE
              value: "1"
            - name: NCCL_SHM_DISABLE
              value: "0"
            - name: NCCL_IB_DISABLE
              value: "1"
            - name: NCCL_NVLS_ENABLE
              value: "0"
            - name: NCCL_CUMEM_ENABLE
              value: "0"
            - name: NCCL_RAS_ENABLE
              value: "0"
            - name: NCCL_DEBUG
              value: INFO
            - name: NCCL_DEBUG_SUBSYS
              value: INIT,ENV,GRAPH,P2P,SHM,NET,COLL
            - name: NIXL_TELEMETRY_ENABLE
              value: "n"
          ports:
            - name: system
              containerPort: 9090
            - name: nixl
              containerPort: 19090
          startupProbe:
            httpGet:
              path: /health
              port: 9090
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 720
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /live
              port: 9090
            periodSeconds: 5
            timeoutSeconds: 4
            failureThreshold: 1
          securityContext:
            runAsUser: 0
            capabilities:
              add:
                - SYS_PTRACE
          volumeMounts:
            - name: hf-cache
              mountPath: /home/dynamo/.cache/huggingface
            - name: criu-work
              mountPath: /var/criu-work
            - name: no-allgather-evidence
              mountPath: /no-allgather-evidence
              readOnly: true
