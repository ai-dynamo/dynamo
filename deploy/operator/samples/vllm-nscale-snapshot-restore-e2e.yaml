# nscale-dev validation manifest for the checkpoint-aware vLLM image stack.
# Apply to an isolated namespace that already contains shared-model-cache,
# hf-token-secret, and acr-token-secret.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fa2e-nccl-kvs-post3
  labels:
    app.kubernetes.io/created-by: pi-relay
    app.kubernetes.io/name: dynamo-snapshot-e2e-kvs
    e2e.ai-dynamo.io/run: fi-nemotron-main-2f566-post3
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dynamo-snapshot-e2e-kvs
      e2e.ai-dynamo.io/run: fi-nemotron-main-2f566-post3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dynamo-snapshot-e2e-kvs
        e2e.ai-dynamo.io/run: fi-nemotron-main-2f566-post3
    spec:
      imagePullSecrets:
        - name: acr-token-secret
      containers:
        - name: redis
          image: dynamoci.azurecr.io/ai-dynamo/redis@sha256:bb186d083732f669da90be8b0f975a37812b15e913465bb14d845db72a4e3e08
          imagePullPolicy: Always
          args:
            - --save
            - ""
            - --appendonly
            - "no"
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: fa2e-nccl-kvs-post3
  labels:
    app.kubernetes.io/created-by: pi-relay
    app.kubernetes.io/name: dynamo-snapshot-e2e-kvs
    e2e.ai-dynamo.io/run: fi-nemotron-main-2f566-post3
spec:
  selector:
    app.kubernetes.io/name: dynamo-snapshot-e2e-kvs
    e2e.ai-dynamo.io/run: fi-nemotron-main-2f566-post3
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: fi-nemotron-main-2f566-post3
  labels:
    app.kubernetes.io/created-by: pi-relay
    app.kubernetes.io/name: dynamo-snapshot-e2e
    e2e.ai-dynamo.io/run: fi-nemotron-main-2f566-post3
  annotations:
    nvidia.com/enable-grove: "false"
spec:
  backendFramework: vllm
  pvcs:
    - name: shared-model-cache
      create: false
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      envFromSecret: hf-token-secret
      volumeMounts:
        - name: shared-model-cache
          mountPoint: /home/dynamo/.cache/huggingface
      extraPodSpec:
        mainContainer:
          image: dynamoci.azurecr.io/ai-dynamo/dynamo@sha256:42214223e3888cf0804ed7e6a7bcf884ab8009b14a97db24bc34c0b528059852
          imagePullPolicy: Always
          command:
            - python3
            - -m
            - dynamo.frontend
          args:
            - --router-mode
            - round-robin
            - --http-port
            - "8000"
          env:
            - name: HF_HOME
              value: /home/dynamo/.cache/huggingface
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: TRANSFORMERS_OFFLINE
              value: "1"
            - name: DO_NOT_TRACK
              value: "1"
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 5
            timeoutSeconds: 5
    VllmDecodeWorker:
      componentType: worker
      replicas: 1
      envFromSecret: hf-token-secret
      resources:
        requests:
          memory: 128Gi
          gpu: "8"
          custom:
            ephemeral-storage: 20Gi
        limits:
          memory: 1536Gi
          gpu: "8"
      sharedMemory:
        size: 64Gi
      checkpoint:
        enabled: true
        startupPolicy: WaitForCheckpoint
        deletionPolicy: Retain
        targetContainerName: main
      extraPodSpec:
        # Preserve NCCL's cached bootstrap address across CRIU restore.
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        nodeSelector:
          kubernetes.io/hostname: cluster-0967a26d-pool-14bee067-prctr-z2rzf
          nvidia.com/gpu.count: "8"
          nvidia.com/gpu.present: "true"
          nvidia.com/gpu.product: NVIDIA-B200
        runtimeClassName: nvidia
        serviceAccountName: fi-nemotron-main-2f566-post3-k8s-service-discovery
        securityContext:
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
        terminationGracePeriodSeconds: 60
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        volumes:
          - name: hf-cache
            persistentVolumeClaim:
              claimName: shared-model-cache
          - name: criu-work
            emptyDir: {}
        mainContainer:
          name: main
          image: dynamoci.azurecr.io/ai-dynamo/dynamo@sha256:3add7233cd828638e66acb04f3cd58903483557e6133bcbcc947ace34582ae03
          imagePullPolicy: Always
          workingDir: /workspace/
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --model
            - nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4
            - --served-model-name
            - nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4
            - --trust-remote-code
            - --tensor-parallel-size
            - "1"
            - --pipeline-parallel-size
            - "1"
            - --data-parallel-size
            - "8"
            - --data-parallel-size-local
            - "8"
            - --data-parallel-rpc-port
            - "29500"
            - --enable-expert-parallel
            - --moe-backend
            - flashinfer_trtllm
            - --enable-flashinfer-autotune
            - --all2all-backend
            - flashinfer_nvlink_one_sided
            - --disable-custom-all-reduce
            - --disable-nccl-for-dp-synchronization
            - --max-model-len
            - "4096"
            - --max-num-seqs
            - "16"
            - --max-num-batched-tokens
            - "4096"
            - --gpu-memory-utilization
            - "0.80"
            - --kv-cache-dtype
            - fp8
          env:
            - name: HF_HOME
              value: /home/dynamo/.cache/huggingface
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: TRANSFORMERS_OFFLINE
              value: "1"
            - name: HF_HUB_DISABLE_TELEMETRY
              value: "1"
            - name: DO_NOT_TRACK
              value: "1"
            - name: NCCL_CHECKPOINT_KVS_PATH
              value: /tmp/nccl-checkpoint-kvs-endpoint
            - name: DYN_SNAPSHOT_NCCL_KVS_ENDPOINT
              value: fa2e-nccl-kvs-post3:6379/fi-nemotron-main-2f566-post3
            - name: NCCL_CHECKPOINT_KVS_TIMEOUT
              value: "300"
            - name: NCCL_DEBUG
              value: INFO
            - name: GLOO_SOCKET_IFNAME
              value: bond0
            - name: VLLM_LOGGING_LEVEL
              value: INFO
            - name: VLLM_ENGINE_READY_TIMEOUT_S
              value: "7200"
            - name: VLLM_ALLREDUCE_USE_SYMM_MEM
              value: "0"
            - name: VLLM_USE_NCCL_SYMM_MEM
              value: "0"
            - name: VLLM_DISTRIBUTED_USE_SPLIT_GROUP
              value: "0"
            - name: NIXL_TELEMETRY_ENABLE
              value: "n"
          ports:
            - name: system
              containerPort: 9090
            - name: nixl
              containerPort: 19090
          startupProbe:
            httpGet:
              path: /health
              port: 9090
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 720
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /live
              port: 9090
            periodSeconds: 5
            timeoutSeconds: 4
            failureThreshold: 1
          securityContext:
            capabilities:
              add:
                - SYS_PTRACE
          volumeMounts:
            - name: hf-cache
              mountPath: /home/dynamo/.cache/huggingface
            - name: criu-work
              mountPath: /var/criu-work
