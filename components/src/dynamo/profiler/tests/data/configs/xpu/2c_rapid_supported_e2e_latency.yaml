# Case 2c (XPU): AIC supported model, rapid, without planner, e2eLatency instead of ttft/itl
# XPU variant: b60 + vllm (AIC supports vllm on b60)
model: "Qwen/Qwen3-32B"
backend: vllm
image: "nvcr.io/nvidia/ai-dynamo/dynamo-frontend:latest"
hardware:
  gpuSku: b60
  totalGpus: 64
  numGpusPerNode: 8
workload:
  requestRate: 5.0
sla:
  ttft: null
  itl: null
  e2eLatency: 200000.0
