# Case 7 (XPU): Thorough, with planner, rapid mode for planner pre-deployment sweeping
# (test with --dry-run)
# Gate check: if AIC unsupported, rapid pre-deployment sweeping falls back to none.
# XPU variant: b60 + vllm (AIC supports vllm on b60 for rapid sweep)
model: "Qwen/Qwen3-32B"
backend: vllm
image: "nvcr.io/nvidia/ai-dynamo/dynamo-frontend:latest"
hardware:
  gpuSku: b60
  totalGpus: 8
  numGpusPerNode: 8
sla:
  itl: 50.0
searchStrategy: thorough
features:
  planner:
    optimization_target: sla
    pre_deployment_sweeping_mode: rapid
    enable_throughput_scaling: true
    enable_load_scaling: false
    mode: disagg
    backend: vllm
