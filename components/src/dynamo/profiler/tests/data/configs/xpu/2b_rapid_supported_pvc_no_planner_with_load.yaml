# Case 2b (XPU): AIC supported model, rapid, without planner, input load, with PVC model cache
# XPU variant: b60 + vllm (AIC supports vllm on b60)
model: "Qwen/Qwen3-32B"
backend: vllm
image: "nvcr.io/nvidia/ai-dynamo/dynamo-frontend:latest"
hardware:
  gpuSku: b60
  totalGpus: 64
  numGpusPerNode: 8
modelCache:
  pvcName: model-cache
  pvcModelPath: /model/Qwen3-32B
workload:
  requestRate: 5.0
sla:
  itl: 50.0
