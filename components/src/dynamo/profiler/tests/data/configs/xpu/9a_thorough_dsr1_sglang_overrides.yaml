# Case 9a (XPU): Thorough sweep for DeepSeek-R1 on SGLang with DGD overrides.
# XPU variant: b60 + sglang (thorough mode does not require AIC rapid support)
model: "deepseek-ai/DeepSeek-R1"
backend: sglang
image: "nvcr.io/nvidia/ai-dynamo/sglang-runtime:1.1.1"
hardware:
  gpuSku: b60
  totalGpus: 16
  numGpusPerNode: 8
modelCache:
  pvcName: model-cache
  pvcMountPath: /opt/model
workload:
  isl: 4000
  osl: 1000
sla:
  ttft: 2000.0
  itl: 50.0
searchStrategy: thorough
overrides:
  dgd:
    spec:
      services:
        decode:
          sharedMemory:
            size: 80Gi
          extraPodSpec:
            mainContainer:
              workingDir: /workspace
              args:
                - --mem-fraction-static
                - "0.75"
                - --prefill-round-robin-balance
                - --watchdog-timeout
                - "3600"
        prefill:
          sharedMemory:
            size: 80Gi
          extraPodSpec:
            mainContainer:
              workingDir: /workspace
              args:
                - --mem-fraction-static
                - "0.75"
                - --load-balance-method
                - round_robin
                - --watchdog-timeout
                - "3600"
