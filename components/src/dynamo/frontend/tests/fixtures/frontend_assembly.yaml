#
# FRONTEND.4 — tool-call output assembly (backend-agnostic cases).
#
# These cases are replayed on BOTH backends by the per-backend adapters in
# test_vllm_frontend_assembly.py and test_sglang_frontend_assembly.py, which
# feed the model_text through that backend's StreamingPostProcessor at several
# chunk granularities and compare the assembled OpenAI deltas against
# `expected`. Write the case once here; both engines must satisfy it
# (coverage parity). This is NOT a behavioral divergence grid — vLLM/SGLang do
# not expose a callable frontend on the same input, so there is no
# expected.vllm / expected.sglang the way the parser fixtures have. The shared
# contract is what Dynamo must emit on each engine.
#
# Markup is hermes-style `<tool_call>{json}</tool_call>` (resolved to each
# engine's hermes tool parser). Cases are reasoning-free to isolate the
# assembly path; reasoning<->tool orchestration lives in FRONTEND.9.

tools:
  - name: get_weather
    parameters:
      type: object
      properties:
        city: {type: string}
  - name: search_books
    parameters:
      type: object
      properties:
        q: {type: string}

cases:
  single_tool_call:
    description: one complete tool call, no narration
    model_text: |-
      <tool_call>
      {"name": "get_weather", "arguments": {"city": "NYC"}}
      </tool_call>
    batch_sizes: [20, 10, 3]
    expected:
      tool_calls:
        - {name: get_weather, arguments: {city: NYC}}
      content: ""
      finish_reason: tool_calls

  multiple_tool_calls:
    description: two parallel tool calls, distinct names
    model_text: |-
      <tool_call>
      {"name": "get_weather", "arguments": {"city": "London"}}
      </tool_call>
      <tool_call>
      {"name": "search_books", "arguments": {"q": "Joyce"}}
      </tool_call>
    batch_sizes: [20, 10]
    expected:
      tool_calls:
        - {name: get_weather, arguments: {city: London}}
        - {name: search_books, arguments: {q: Joyce}}
      finish_reason: tool_calls

  content_then_tool_call:
    # Realistic token streaming: narration arrives in chunks BEFORE the
    # <tool_call> start. Known limitation (not asserted here): when narration
    # and the <tool_call> start land in the SAME delta, the narration is
    # dropped -- prepost.py buffers post-</think> content but not plain
    # pre-tool narration.
    description: narration before the tool call is preserved as content
    model_text: |-
      Let me check that for you.
      <tool_call>
      {"name": "get_weather", "arguments": {"city": "NYC"}}
      </tool_call>
    batch_sizes: [8, 5]
    expected:
      tool_calls:
        - {name: get_weather, arguments: {city: NYC}}
      content_contains: Let me check that for you.
      finish_reason: tool_calls

  no_tool_calls:
    description: plain text answer, no tool markup -> no tool_calls, content kept
    model_text: It is sunny in NYC today.
    batch_sizes: [20, 5]
    expected:
      tool_calls: []
      content_contains: It is sunny in NYC today.
      finish_reason: stop

  single_chunk_fallback:
    description: whole response plus finish arrive in one chunk (non-streaming fallback)
    model_text: |-
      <tool_call>
      {"name": "get_weather", "arguments": {"city": "NYC"}}
      </tool_call>
    single_chunk: true
    expected:
      tool_calls:
        - {name: get_weather, arguments: {city: NYC}}
      finish_reason: tool_calls
