#
# FRONTEND.9 — reasoning <-> tool-call orchestration (backend-agnostic cases).
#
# Both a reasoning parser and a tool-call parser are active. process_output must
# route the <think>...</think> span to reasoning_content, the tool markup to
# tool_calls, and plain prose to content -- with no cross-leak. Replayed on both
# backends by test_{vllm,sglang}_frontend_reasoning.py with a postprocessor
# built with BOTH parsers (qwen3 reasoning + hermes tool).

tools:
  - name: get_weather
    parameters:
      type: object
      properties:
        city: {type: string}
  - name: search_books
    parameters:
      type: object
      properties:
        q: {type: string}

cases:
  reasoning_then_tool_call:
    description: reasoning block then a tool call -> reasoning_content + tool_calls, content empty
    model_text: |-
      <think>
      The user wants the weather, I will call the tool.
      </think>

      <tool_call>
      {"name": "get_weather", "arguments": {"city": "NYC"}}
      </tool_call>
    batch_sizes: [8, 5]
    expected:
      reasoning_contains: call the tool
      tool_calls:
        - {name: get_weather, arguments: {city: NYC}}
      content: ""
      finish_reason: tool_calls

  reasoning_then_text:
    description: reasoning block then a plain answer -> reasoning_content + content, no tool_calls
    model_text: |-
      <think>
      Let me think about the answer.
      </think>

      The answer is 42.
    batch_sizes: [8, 5]
    expected:
      reasoning_contains: think about the answer
      tool_calls: []
      content_contains: The answer is 42.
      finish_reason: stop

  reasoning_then_multiple_tool_calls:
    description: reasoning block then two parallel tool calls
    model_text: |-
      <think>
      I'll check weather and search books.
      </think>

      <tool_call>
      {"name": "get_weather", "arguments": {"city": "London"}}
      </tool_call>
      <tool_call>
      {"name": "search_books", "arguments": {"q": "Joyce"}}
      </tool_call>
    batch_sizes: [10]
    expected:
      reasoning_contains: check weather
      tool_calls:
        - {name: get_weather, arguments: {city: London}}
        - {name: search_books, arguments: {q: Joyce}}
      finish_reason: tool_calls
