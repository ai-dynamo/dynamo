class: gamma
seed: 42
ticks: 60
interval_s: 60

planner:
  mode: disagg
  ttft: 500.0
  itl: 50.0
  enable_power_awareness: true
  enable_aic_optimizer: true
  total_gpu_power_limit: 4000
  power_agent_safe_default_watts: 500
  prefill_engine_gpu_power_limit: 500
  decode_engine_gpu_power_limit: 425
  aic_initial_c_power_prefill: 1.0
  aic_initial_c_power_decode: 1.0
  aic_reoptimize_interval: 300
  aic_drift_relative_threshold: 0.15
  aic_drift_consecutive_ticks: 3
  aic_max_consecutive_failures: 5
  min_endpoint: 1
  max_gpu_budget: 64
  admission_mode: "off"   # MUST be quoted — YAML 1.1 coerces bare `off` to False.

mocker:
  synthetic_workload: true
  arrival_rate: 200.0
  isl: 2048
  osl: 512
  num_prefill_workers: 1
  num_decode_workers: 4
  router_mode: kv_router

overlay:
  system: h200_sxm
  bias:
    power_bias_prefill: 1.0
    power_bias_decode: 1.0
  noise:
    power_per_gpu: { model: gaussian, sigma: 0.07 }

load:
  profile: ramp
  ramp_from: 200.0
  ramp_to: 2000.0
  ramp_start_tick: 0
  ramp_end_tick: 10

events: []
assertions: []
