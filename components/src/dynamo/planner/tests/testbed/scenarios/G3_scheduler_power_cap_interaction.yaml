extends: _base/mocker_h200_synthetic_workload.yaml
name: G3_scheduler_power_cap_interaction
description: >
  Mocker replay with sustained high load (tokens_per_sec: 1000, full fleet).
  Budget is deliberately tight (3600W for 4-node H200). AIC must reduce
  per-GPU power cap; overlay ensures power observability. Validates that
  power caps are applied, observed, and that caps do not contradict scheduler
  scaling decisions.

planner:
  total_gpu_power_limit: 3600

overlay:
  bias:
    power_bias_prefill: 1.05
    power_bias_decode: 1.05

assertions:
  - at_tick: 20
    field: cap_d
    op: "<"
    value: 700.0
    description: "Decode cap reduced below TDP (700W) under tight budget"
  - always: true
    field: projected_w
    op: "<="
    ref: "planner.total_gpu_power_limit"
