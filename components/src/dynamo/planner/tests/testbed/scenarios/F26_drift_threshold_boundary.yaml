extends: _base/h200_disagg.yaml
name: F26_drift_threshold_boundary
description: >
  Drift-detector boundary test re-targeted at the SLA-miss path
  (the capacity_exceeded path is unreachable with the current truth
  fleet, since synthetic ``throughput = min(offered_load, capacity)``
  and ``estimated_throughput`` is anchored to the post-clamp replica
  count — so processed traffic can never exceed the optimizer's
  prediction by 15%, see runner.py setup notes).

  Truth-side TTFT is ttft_bias × cap_factor × aic_ttft_ms.
  With cap_p=450 and tdp=700, cap_factor ≈ 1.556 and aic_ttft_ms=120.
  So observed TTFT ≈ ttft_bias × 187 ms. SLA is 500 ms.

ticks: 60
planner:
  aic_drift_relative_threshold: 0.15
  aic_drift_consecutive_ticks: 3
  aic_reoptimize_interval: 60

fleet:
  bias:
    # 2.5 × 187 ≈ 467 ms — just below 500 ms SLA, no trigger.
    ttft_bias: 2.5

events:
  # Step bias up at tick 20 so observed TTFT crosses SLA. With
  # aic_drift_consecutive_ticks=3 the sweep should fire at tick 23.
  - type: bias_step
    at_tick: 20
    signal: ttft_bias
    value: 3.5  # 3.5 × 187 ≈ 654 ms — comfortably over 500 ms SLA.

load:
  profile: constant
  tokens_per_sec: 2000.0

assertions:
  - at_tick: 18
    field: sweep_fired
    op: "=="
    value: 0.0
    description: "No sweep while observed TTFT below SLA (bias × cap_factor < 500 ms)"
  - eventually_by_tick: 55
    field: sweep_fired
    op: "=="
    value: 1.0
    description: "Sweep fires after bias step pushes TTFT above SLA for ≥3 consecutive ticks"
  - always: true
    field: projected_w
    op: "<="
    ref: "planner.total_gpu_power_limit"
