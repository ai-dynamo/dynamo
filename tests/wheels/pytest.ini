; Hermetic pytest config for the wheel smoke suite.
;
; The suite runs inside clean base images (python:3.12-slim, manylinux_2_28) with only
; `pytest` installed, so it must NOT inherit the repo-root pyproject.toml config — that
; enables --strict-config, asyncio_mode, and an error-level filterwarnings list that
; references plugins absent from these images. Rooting pytest here also skips the repo's
; conftest.py files, which import the full runtime.
[pytest]
addopts = -ra --strict-markers
markers =
    gpu_0: marks tests that don't require GPU
    integration: marks tests as integration tests
    pre_merge: marks tests to run before merging
    wheel_smoke: marks tests that validate wheels copied from runtime images
