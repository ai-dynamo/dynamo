#
# `|2+` simply means a single newline ("\n"); see tests/parity/README.md for the full decode.

family: deepseek_v4
mode: batch
cases:
  PARSER.batch.2.a:
    description: Two invokes inside one tool_calls wrapper
    ref: dynamo
    # `|-` = literal block scalar, strip trailing newline (multi-line text as-is)
    model_text: |-
      <嚚𡤜SML嚚𦭛ool_calls>
      <嚚𡤜SML嚚𦤹nvoke name="get_weather">
      <嚚𡤜SML嚚𦑩arameter name="location" string="true">NYC</嚚𡤜SML嚚𦑩arameter>
      </嚚𡤜SML嚚𦤹nvoke>
      <嚚𡤜SML嚚𦤹nvoke name="get_time">
      <嚚𡤜SML嚚𦑩arameter name="timezone" string="true">EST</嚚𡤜SML嚚𦑩arameter>
      </嚚𡤜SML嚚𦤹nvoke>
      </嚚𡤜SML嚚𦭛ool_calls>
    tools:
    # `&idN` defines an anchor; `*idN` below reuses the same tool def
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    - &id002
      name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo: &d_2_a
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm: *d_2_a
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  PARSER.batch.2.b:
    description: Two back-to-back tool_calls wrappers
    ref: dynamo
    model_text: |-
      <嚚𡤜SML嚚𦭛ool_calls>
      <嚚𡤜SML嚚𦤹nvoke name="get_weather">
      <嚚𡤜SML嚚𦑩arameter name="location" string="true">NYC</嚚𡤜SML嚚𦑩arameter>
      </嚚𡤜SML嚚𦤹nvoke>
      </嚚𡤜SML嚚𦭛ool_calls>
      <嚚𡤜SML嚚𦭛ool_calls>
      <嚚𡤜SML嚚𦤹nvoke name="get_time">
      <嚚𡤜SML嚚𦑩arameter name="timezone" string="true">EST</嚚𡤜SML嚚𦑩arameter>
      </嚚𡤜SML嚚𦤹nvoke>
      </嚚𡤜SML嚚𦭛ool_calls>
    tools:
    - *id001
    - *id002
    expected:
      dynamo: &d_2_b
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        # `|2+` below = "\n" (see file header)
        normal_text: |2+
      vllm: *d_2_b
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'

  PARSER.batch.2.c:
    description: Parallel with surrounding narration
    ref: dynamo
    model_text: |-
      Both: <嚚𡤜SML嚚𦭛ool_calls>
      <嚚𡤜SML嚚𦤹nvoke name="get_weather">
      <嚚𡤜SML嚚𦑩arameter name="location" string="true">NYC</嚚𡤜SML嚚𦑩arameter>
      </嚚𡤜SML嚚𦤹nvoke>
      <嚚𡤜SML嚚𦤹nvoke name="get_time">
      <嚚𡤜SML嚚𦑩arameter name="timezone" string="true">EST</嚚𡤜SML嚚𦑩arameter>
      </嚚𡤜SML嚚𦤹nvoke>
      </嚚𡤜SML嚚𦭛ool_calls> Done.
    tools:
    - *id001
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: 'Both:  Done.'
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            timezone: EST
          name: get_time
        normal_text: 'Both: '
        reason: "drops trailing normal_text after tool-call wrapper end"
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  PARSER.batch.2.d:
    description: Same-name twice
    ref: dynamo
    model_text: |-
      <嚚𡤜SML嚚𦭛ool_calls>
      <嚚𡤜SML嚚𦤹nvoke name="get_weather">
      <嚚𡤜SML嚚𦑩arameter name="location" string="true">NYC</嚚𡤜SML嚚𦑩arameter>
      </嚚𡤜SML嚚𦤹nvoke>
      <嚚𡤜SML嚚𦤹nvoke name="get_weather">
      <嚚𡤜SML嚚𦑩arameter name="location" string="true">LA</嚚𡤜SML嚚𦑩arameter>
      </嚚𡤜SML嚚𦤹nvoke>
      </嚚𡤜SML嚚𦭛ool_calls>
    tools:
    - *id001
    - *id001
    expected:
      dynamo: &d_2_d
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *d_2_d
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
