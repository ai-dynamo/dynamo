family: deepseek_v4
model_label: DeepSeek V4
mode: batch
cases:
  PARSER.batch.1:
    description: Single tool call (happy path)
    model_text: |-
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *id001
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  PARSER.batch.3:
    description: No tool call (plain text)
    model_text: Hello, how can I help you today?
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls: []
        normal_text: Hello, how can I help you today?
      vllm: *id003
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  PARSER.batch.9:
    description: Empty input
    model_text: ''
    tools:
    - *id002
    expected:
      dynamo: &id004
        calls: []
        normal_text: ''
      vllm: *id004
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  PARSER.batch.10:
    description: Duplicate calls (same name twice)
    model_text: |-
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">LA</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - *id002
    expected:
      dynamo: &id005
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *id005
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
