    model_text: |-
      <節쏡SML節쐔ool_calls>
      <節쏡SML節쐇nvoke name="get_time">
      </節쏡SML節쐇nvoke>
      </節쏡SML節쐔ool_calls>
    tools:
    - name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      calls:
      - name: get_time
        arguments: {}
      normal_text: ''
  PARSER.batch.7:
    description: Complex args (nested object + array, JSON-typed)
    model_text: |-
      <節쏡SML節쐔ool_calls>
      <節쏡SML節쐇nvoke name="process_data">
      <節쏡SML節쐏arameter name="items" string="false">[1, 2, 3]</節쏡SML節쐏arameter>
      <節쏡SML節쐏arameter name="config" string="false">{"nested": true}</節쏡SML節쐏arameter>
      </節쏡SML節쐇nvoke>
      </節쏡SML節쐔ool_calls>
    tools:
    - name: process_data
      parameters:
        type: object
        properties:
          items:
            type: array
          config:
            type: object
    expected:
      calls:
      - name: process_data
        arguments:
          items:
          - 1
          - 2
          - 3
          config:
            nested: true
      normal_text: ''
  PARSER.batch.8:
    description: Interleaved normal text
    model_text: |-
      I will check the weather. <節쏡SML節쐔ool_calls>
