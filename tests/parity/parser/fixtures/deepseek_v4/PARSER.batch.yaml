      normal_text: ''
  PARSER.batch.10:
    description: Duplicate calls (same name twice)
    model_text: |-
      <節쏡SML節쐔ool_calls>
      <節쏡SML節쐇nvoke name="get_weather">
      <節쏡SML節쐏arameter name="location" string="true">NYC</節쏡SML節쐏arameter>
      </節쏡SML節쐇nvoke>
