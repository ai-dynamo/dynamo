family: deepseek_v4
mode: batch
cases:
  PARSER.batch.1:
    description: Single tool call (happy path)
    model_text: |-
      <節쏡SML節쐔ool_calls>
      <節쏡SML節쐇nvoke name="get_weather">
      <節쏡SML節쐏arameter name="location" string="true">NYC</節쏡SML節쐏arameter>
      </節쏡SML節쐇nvoke>
      </節쏡SML節쐔ool_calls>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      normal_text: ''
  PARSER.batch.2:
    description: Multiple tool calls (parallel)
    model_text: |-
      <節쏡SML節쐔ool_calls>
      <節쏡SML節쐇nvoke name="get_weather">
      <節쏡SML節쐏arameter name="location" string="true">NYC</節쏡SML節쐏arameter>
      </節쏡SML節쐇nvoke>
      <節쏡SML節쐇nvoke name="get_time">
      <節쏡SML節쐏arameter name="timezone" string="true">EST</節쏡SML節쐏arameter>
      </節쏡SML節쐇nvoke>
      </節쏡SML節쐔ool_calls>
    tools:
    - *id001
    - name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      - name: get_time
        arguments:
          timezone: EST
      normal_text: ''
  PARSER.batch.3:
    description: No tool call (plain text)
    model_text: Hello, how can I help you today?
    tools:
    - *id001
    expected:
      calls: []
      normal_text: Hello, how can I help you today?
  PARSER.batch.4:
