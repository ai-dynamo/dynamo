      <節쏡SML節쐇nvoke name="get_weather">
      <節쏡SML節쐏arameter name="location" string="true">NYC
      </節쏡SML節쐇nvoke>
      </節쏡SML節쐔ool_calls>
    tools:
    - *id001
    expected:
      calls:
      - name: get_weather
        arguments: {}
      normal_text: ''
  PARSER.batch.5:
    description: Missing </節쏡SML節쐔ool_calls> end marker
    model_text: |-
      <節쏡SML節쐔ool_calls>
      <節쏡SML節쐇nvoke name="get_weather">
      <節쏡SML節쐏arameter name="location" string="true">NYC</節쏡SML節쐏arameter>
      </節쏡SML節쐇nvoke>
    tools:
