family: deepseek_v3
mode: batch
cases:
  PARSER.batch.5.a:
    description: Missing calls_end / call_end markers
    ref: dynamo
    model_text: |-
      <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>function<｜tool▁sep｜>get_weather
      ```json
      {"location": "NYC"}
      ```
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: |-
          <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>function<｜tool▁sep｜>get_weather
          ```json
          {"location": "NYC"}
          ```
      vllm:
        diverges: true
        reason: "impl-defined recovery contract (see PARSER_CASES.md)"
      sglang:
        diverges: true
        reason: "impl-defined recovery contract (see PARSER_CASES.md)"
    # TODO(research): vllm diverges — impl-defined recovery contract (see PARSER_CASES.md)
    # vllm produces:
    #   calls: []
    #   normal_text: None
  PARSER.batch.5.b:
    description: Closing tool_calls_end without matching tool_calls_begin
    ref: dynamo
    model_text: |-
      <｜tool▁call▁begin｜>function<｜tool▁sep｜>get_weather
      ```json
      {"location": "NYC"}
      ```<｜tool▁call▁end｜><｜tool▁calls▁end｜>
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: |-
          <｜tool▁call▁begin｜>function<｜tool▁sep｜>get_weather
          ```json
          {"location": "NYC"}
          ```<｜tool▁call▁end｜><｜tool▁calls▁end｜>
  PARSER.batch.5.c:
    description: Truncation mid-arguments JSON inside fenced block
    ref: dynamo
    model_text: |-
      <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>function<｜tool▁sep｜>get_weather
      ```json
      {"loc
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: |-
          <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>function<｜tool▁sep｜>get_weather
          ```json
          {"loc
      vllm:
        diverges: true
        reason: "impl-defined recovery contract (see PARSER_CASES.md)"
      sglang:
        diverges: true
        reason: "sglang nullifies normal_text on malformed/recovery shapes where Dynamo preserves input"
    # TODO(research): vllm diverges — impl-defined recovery contract (see PARSER_CASES.md)
    # vllm produces:
    #   calls: []
    #   normal_text: None
