family: minimax_m2
model_label: MiniMax 2.7
mode: batch
cases:
  PARSER.batch.1:
    description: Single tool call (happy path)
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *id001
      sglang: *id001
  PARSER.batch.3:
    description: No tool call (plain text)
    model_text: Hello, how can I help you today?
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls: []
        normal_text: Hello, how can I help you today?
      vllm: *id003
      sglang: *id003
  PARSER.batch.9:
    description: Empty input
    model_text: ''
    tools:
    - *id002
    expected:
      dynamo: &id004
        calls: []
        normal_text: ''
      vllm: *id004
      sglang: *id004
  PARSER.batch.10:
    description: Duplicate calls (same name twice)
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </invoke>
      <invoke name="get_weather">
      <parameter name="location">LA</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - *id002
    expected:
      dynamo: &id005
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *id005
      sglang: *id005
