family: minimax_m2
mode: batch
cases:
  PARSER.batch.4.a:
    description: Tool_call wrapper with garbage body
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      not a valid invoke
      </minimax:tool_call>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &d_4_a
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: '<minimax:tool_call>

          not a valid invoke

          </minimax:tool_call>'
        reason: "impl-defined recovery contract (see PARSER_CASES.md)"
      sglang: *d_4_a
  # PARSER.batch.4.b (invalid JSON args) n/a: minimax_m2 uses attribute-encoded args, not JSON.
  PARSER.batch.4.c:
    description: Invoke without name attribute
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      <invoke>
      <parameter name="location">NYC</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - *id001
    expected:
      dynamo: &d_4_c
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: '<minimax:tool_call>

          <invoke>

          <parameter name="location">NYC</parameter>

          </invoke>

          </minimax:tool_call>'
        reason: "impl-defined recovery contract (see PARSER_CASES.md)"
      sglang: *d_4_c
  PARSER.batch.4.d:
    description: Missing closing </invoke>
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </minimax:tool_call>
    tools:
    - *id001
    expected:
      dynamo: &d_4_d
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        calls: []
        normal_text: '<minimax:tool_call>

          <invoke name="get_weather">

          <parameter name="location">NYC</parameter>

          </minimax:tool_call>'
        reason: "impl-defined recovery contract (see PARSER_CASES.md)"
      sglang: *d_4_d
