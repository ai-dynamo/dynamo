family: minimax_m2
mode: batch
cases:
  PARSER.batch.4.a:
    description: Tool_call wrapper with garbage body
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      not a valid invoke
      </minimax:tool_call>
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: |-
          <minimax:tool_call>
          not a valid invoke
          </minimax:tool_call>
        reason: impl-defined recovery contract (see PARSER_CASES.md)
      sglang: *id001
  PARSER.batch.4.c:
    description: Invoke without name attribute
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      <invoke>
      <parameter name="location">NYC</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: |-
          <minimax:tool_call>
          <invoke>
          <parameter name="location">NYC</parameter>
          </invoke>
          </minimax:tool_call>
        reason: impl-defined recovery contract (see PARSER_CASES.md)
      sglang: *id003
  PARSER.batch.4.d:
    description: Missing closing </invoke>
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </minimax:tool_call>
    tools:
    - *id002
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: |-
          <minimax:tool_call>
          <invoke name="get_weather">
          <parameter name="location">NYC</parameter>
          </minimax:tool_call>
        reason: impl-defined recovery contract (see PARSER_CASES.md)
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
