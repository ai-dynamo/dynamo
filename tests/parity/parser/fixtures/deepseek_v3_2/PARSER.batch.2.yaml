#
# `|2+` simply means a single newline ("\n"); see tests/parity/README.md for the full decode.

family: deepseek_v3_2
mode: batch
cases:
  PARSER.batch.2.a:
    description: Two invokes inside one function_calls wrapper
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_deepseekv32_tool_parser.py#L172
    # `|-` = literal block scalar, strip trailing newline (multi-line text as-is)
    model_text: |-
      <｜DSML｜function_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      <｜DSML｜invoke name="get_time">
      <｜DSML｜parameter name="timezone" string="true">EST</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜function_calls>
    tools:
    # `&idN` defines an anchor; `*idN` below reuses the same tool def
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    - &id002
      name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo: &d_2_a
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm: *d_2_a
      sglang: *d_2_a
  PARSER.batch.2.b:
    description: Two back-to-back function_calls wrappers
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_deepseekv32_tool_parser.py#L327
    model_text: |-
      <｜DSML｜function_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜function_calls>
      <｜DSML｜function_calls>
      <｜DSML｜invoke name="get_time">
      <｜DSML｜parameter name="timezone" string="true">EST</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜function_calls>
    tools:
    - *id001
    - *id002
    expected:
      dynamo: &d_2_b
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        # `|2+` below = "\n" (see file header). The blank line that follows
        # is REQUIRED — without it the block scalar parses as "" (empty)
        # rather than "\n", causing a false negative in canonical-diff.
        normal_text: |2+

      vllm: *d_2_b
      sglang:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        normal_text: ''

  PARSER.batch.2.c:
    description: With surrounding narration
    ref: dynamo
    model_text: |-
      Both: <｜DSML｜function_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      <｜DSML｜invoke name="get_time">
      <｜DSML｜parameter name="timezone" string="true">EST</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜function_calls> Done.
    tools:
    - *id001
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: 'Both:  Done.'
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            timezone: EST
          name: get_time
        normal_text: 'Both: '
        reason: "drops trailing normal_text after tool-call wrapper end"
      sglang:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            timezone: EST
          name: get_time
        normal_text: 'Both:'
        reason: "trims trailing space from preceding normal_text"
  PARSER.batch.2.d:
    description: Same-name twice
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_deepseekv32_tool_parser.py#L370
    model_text: |-
      <｜DSML｜function_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">LA</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜function_calls>
    tools:
    - *id001
    - *id001
    expected:
      dynamo: &d_2_d
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *d_2_d
      sglang: *d_2_d
