family: mistral
mode: batch
cases:
  PARSER.batch.5.a:
    description: Missing [/TOOL_CALLS] end marker
    ref: dynamo
    model_text: '[TOOL_CALLS][{"name": "get_weather", "arguments": {"location": "NYC"}}]'
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang:
        diverges: true
        reason: "impl-defined recovery contract (see PARSER_CASES.md)"
  PARSER.batch.5.b:
    description: Closing [/TOOL_CALLS] without matching [TOOL_CALLS] open
    ref: dynamo
    model_text: '[{"name": "get_weather", "arguments": {"location": "NYC"}}][/TOOL_CALLS]'
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: '[{"name": "get_weather", "arguments": {"location": "NYC"}}][/TOOL_CALLS]'
