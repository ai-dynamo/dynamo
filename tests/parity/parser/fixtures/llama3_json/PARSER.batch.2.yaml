family: llama3_json
mode: batch
cases:
  PARSER.batch.2.a:
    description: Parallel calls (semicolon-separated)
    ref: dynamo
    model_text: '<|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}};{"name": "get_time", "arguments":
      {"timezone": "EST"}}'
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    - &id002
      name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            timezone: EST
          name: get_time
        normal_text: ''
        reason: "vLLM llama3_json does not parse semicolon-separated calls the same way Dynamo does"
      sglang:
        unavailable: SGLang has no detector for family='llama3_json'
  PARSER.batch.2.c:
    description: With surrounding narration
    ref: dynamo
    model_text: 'Both: <|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}};{"name": "get_time", "arguments":
      {"timezone": "EST"}} Done.'
    tools:
    - *id001
    - *id002
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            timezone: EST
          name: get_time
        normal_text: ''
        reason: "vLLM llama3_json does not parse semicolon-separated calls the same way Dynamo does"
      sglang:
        unavailable: SGLang has no detector for family='llama3_json'
  PARSER.batch.2.d:
    description: Same-name twice (semicolon-separated)
    ref: dynamo
    model_text: '<|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}};{"name": "get_weather", "arguments":
      {"location": "LA"}}'
    tools:
    - *id001
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            location: LA
          name: get_weather
        normal_text: ''
        reason: "vLLM llama3_json does not parse semicolon-separated calls the same way Dynamo does"
      sglang:
        unavailable: SGLang has no detector for family='llama3_json'
