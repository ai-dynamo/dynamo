family: llama3_json
mode: batch
cases:
  PARSER.batch.1:
    description: Single tool call (happy path)
    model_text: '<|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}}'
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
  PARSER.batch.3:
    description: No tool call (plain text)
    model_text: Hello, how can I help you today?
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: Hello, how can I help you today?
  PARSER.batch.9:
    description: Empty input
    model_text: ''
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: ''
  PARSER.batch.10:
    description: Duplicate calls (same name twice)
    model_text: '<|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}};{"name": "get_weather", "arguments":
      {"location": "LA"}}'
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        diverges: true
        reason: "vLLM llama3_json does not parse semicolon-separated calls the same way Dynamo does"
