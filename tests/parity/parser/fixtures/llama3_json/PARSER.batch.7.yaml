family: llama3_json
mode: batch
cases:
  PARSER.batch.7.a:
    description: Standard scalar types
    ref: dynamo
    model_text: '<|python_tag|>{"name": "book_flight", "arguments": {"destination": "Paris", "passengers": 2, "first_class":
      true}}'
    tools:
    - name: book_flight
      parameters:
        type: object
        properties:
          destination:
            type: string
          passengers:
            type: integer
          first_class:
            type: boolean
    expected:
      dynamo: &id001
        calls:
        - name: book_flight
          arguments:
            destination: Paris
            first_class: true
            passengers: 2
        normal_text: ''
      vllm: *id001
      sglang: *id001
  PARSER.batch.7.b:
    description: Unicode + escaped chars
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_llama3_json_tool_parser.py#L217
    model_text: '<|python_tag|>{"name": "get_weather", "arguments": {"location": "Tōkyō \"central\""}}'
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id002
        calls:
        - name: get_weather
          arguments:
            location: Tōkyō "central"
        normal_text: ''
      vllm: *id002
      sglang: *id002
  PARSER.batch.7.c:
    description: Schema mismatch — string value where schema declares integer
    ref: dynamo
    model_text: '<|python_tag|>{"name": "set_temperature", "arguments": {"celsius": "20"}}'
    tools:
    - name: set_temperature
      parameters:
        type: object
        properties:
          celsius:
            type: integer
    expected:
      dynamo: &id003
        calls:
        - name: set_temperature
          arguments:
            celsius: '20'
        normal_text: ''
      vllm: *id003
      sglang: *id003
  PARSER.batch.7.d:
    description: Nested object + array
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_llama3_json_tool_parser.py#L146
    model_text: '<|python_tag|>{"name": "process_data", "arguments": {"items": [1,2,3], "config": {"nested": true}}}'
    tools:
    - name: process_data
      parameters:
        type: object
        properties:
          items:
            type: array
          config:
            type: object
    expected:
      dynamo: &id004
        calls:
        - name: process_data
          arguments:
            config:
              nested: true
            items:
            - 1
            - 2
            - 3
        normal_text: ''
      vllm: *id004
      sglang: *id004
  PARSER.batch.7.e:
    description: Argument value contains the family's separator character (single call)
    model_text: '<|python_tag|>{"name": "run_query", "arguments": {"sql": "SELECT a; SELECT b"}}'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    expected:
      dynamo: &d_7_e
        calls:
        - name: run_query
          arguments:
            sql: SELECT a; SELECT b
        normal_text: ''
      vllm: *d_7_e
      sglang: *d_7_e
  PARSER.batch.7.f:
    description: Argument value contains the family's separator character (parallel calls — streaming split safety)
    model_text: '<|python_tag|>{"name": "run_query", "arguments": {"sql": "SELECT a; SELECT b"}};{"name": "get_time", "arguments": {"timezone": "EST"}}'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    - name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo: &d_7_f
        calls:
        - name: run_query
          arguments:
            sql: SELECT a; SELECT b
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm: *d_7_f
      sglang: *d_7_f
