family: phi4
model_label: Phi-4
mode: batch
cases:
  PARSER.batch.1:
    description: Single tool call (happy path)
    model_text: 'functools[{"name": "get_weather", "arguments": {"location": "NYC"}}]'
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *id001
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  PARSER.batch.3:
    description: No tool call (plain text)
    model_text: Hello, how can I help you today?
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls: []
        normal_text: Hello, how can I help you today?
      vllm: *id003
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  PARSER.batch.9.a:
    description: Empty model text
    model_text: ''
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  PARSER.batch.9.b:
    description: Blank / whitespace-only model text
    ref: dynamo
    model_text: '   '
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: '   '
      vllm:
        calls: []
        normal_text: '   '
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  PARSER.batch.10:
    description: Duplicate calls (same name twice)
    model_text: 'functools[{"name": "get_weather", "arguments": {"location": "NYC"}}, {"name": "get_weather", "arguments":
      {"location": "LA"}}]'
    tools:
    - *id002
    expected:
      dynamo: &id005
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *id005
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  PARSER.batch.11.a:
    description: Call separator character inside one argument string value
    model_text: 'functools[{"name": "run_query", "arguments": {"sql": "SELECT a, SELECT b"}}]'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    expected:
      dynamo:
        calls:
        - name: run_query
          arguments:
            sql: SELECT a, SELECT b
        normal_text: ''
      vllm:
        calls:
        - name: run_query
          arguments:
            sql: SELECT a, SELECT b
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  PARSER.batch.11.b:
    description: Structural delimiter inside one argument string value
    ref: SGLang/LightSeek delimiter-state audit
    model_text: 'functools[{"name": "run_query", "arguments": {"sql": "SELECT value WHERE note has brace } and bracket ]"}}]'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    expected:
      dynamo:
        calls:
        - name: run_query
          arguments:
            sql: SELECT value WHERE note has brace } and bracket ]
        normal_text: ''
      vllm:
        calls:
        - name: run_query
          arguments:
            sql: SELECT value WHERE note has brace } and bracket ]
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  PARSER.batch.11.c:
    description: Tool-call marker text inside one argument string value
    ref: SGLang/LightSeek delimiter-state audit
    model_text: 'functools[{"name": "run_query", "arguments": {"sql": "literal functools[] stays text"}}]'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    expected:
      dynamo:
        calls:
        - name: run_query
          arguments:
            sql: literal functools[] stays text
        normal_text: ''
      vllm:
        calls:
        - name: run_query
          arguments:
            sql: literal functools[] stays text
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  PARSER.batch.12.a:
    description: Multi-call response with a separator character inside one argument string value
    model_text: 'functools[{"name": "run_query", "arguments": {"sql": "SELECT a, SELECT b"}}, {"name": "get_time", "arguments":
      {"timezone": "EST"}}]'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    - name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo:
        calls:
        - name: run_query
          arguments:
            sql: SELECT a, SELECT b
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm:
        calls:
        - name: run_query
          arguments:
            sql: SELECT a, SELECT b
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  PARSER.batch.12.b:
    description: Multi-call response with structural delimiters inside one argument string value
    ref: SGLang/LightSeek delimiter-state audit
    model_text: 'functools[{"name": "run_query", "arguments": {"sql": "SELECT value WHERE note has brace } and bracket ]"}},
      {"name": "get_time", "arguments": {"timezone": "EST"}}]'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    - name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo:
        calls:
        - name: run_query
          arguments:
            sql: SELECT value WHERE note has brace } and bracket ]
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm:
        calls:
        - name: run_query
          arguments:
            sql: SELECT value WHERE note has brace } and bracket ]
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  PARSER.batch.13.a:
    description: Unknown-only call under default behavior
    model_text: 'functools[{"name": "unknown_tool", "arguments": {"location": "NYC"}}]'
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: unknown_tool
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        calls:
        - name: unknown_tool
          arguments:
            location: NYC
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  PARSER.batch.13.c:
    description: Mixed known and unknown calls in one response
    ref: SGLang TestHunyuanDetectorDetectAndParse.test_mixed_known_and_unknown_tools
    model_text: 'functools[{"name": "get_weather", "arguments": {"location": "NYC"}}, {"name": "unknown_tool", "arguments":
      {"location": "LA"}}]'
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: unknown_tool
          arguments:
            location: LA
        normal_text: ''
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: unknown_tool
          arguments:
            location: LA
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='phi4'
