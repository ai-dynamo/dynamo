family: qwen25
mode: batch
cases:
  PARSER.batch.2.a:
    description: Parallel calls (back-to-back tool_call wrappers)
    ref: dynamo
    model_text: '<tool_call>{"name": "get_weather", "arguments": {"location": "NYC"}}</tool_call><tool_call>{"name": "get_time",
      "arguments": {"timezone": "EST"}}</tool_call>'
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    - &id002
      name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      sglang:
        diverges: true
        reason: "SGLang Qwen25Detector returns calls=[] on the hermes-style <tool_call>...</tool_call> format Dynamo emits"
  PARSER.batch.2.c:
    description: With surrounding narration
    ref: dynamo
    model_text: 'Both: <tool_call>{"name": "get_weather", "arguments": {"location": "NYC"}}</tool_call><tool_call>{"name":
      "get_time", "arguments": {"timezone": "EST"}}</tool_call> Done.'
    tools:
    - *id001
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: 'Both:'
      sglang:
        diverges: true
        reason: "sglang diverges on this sub-case (CI-surfaced; see KNOWN_DIVERGENCES log for diff)"
  PARSER.batch.2.d:
    description: Same-name twice
    ref: dynamo
    model_text: '<tool_call>{"name": "get_weather", "arguments": {"location": "NYC"}}</tool_call><tool_call>{"name": "get_weather",
      "arguments": {"location": "LA"}}</tool_call>'
    tools:
    - *id001
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      sglang:
        diverges: true
        reason: "sglang diverges on this sub-case (CI-surfaced; see KNOWN_DIVERGENCES log for diff)"
