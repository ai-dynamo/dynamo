family: mistral
model_label: Mistral series
mode: stream
cases:
  TOOLCALLING.stream.1.a:
    description: Complete tool-call payload delivered in one content chunk
    ref: derived from TOOLCALLING.batch.1
    chunks:
    - delta_text: '[TOOL_CALLS][{"name": "get_weather", "arguments": {"location": "NYC"}}][/TOOL_CALLS]'
    - delta_text: ''
      finish_reason: tool_calls
    tools: &id001
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang:
        calls: []
        normal_text: ''
        reason: "SGLang's streaming MistralDetector requires '[TOOL_CALLS] [' with a space; the canonical mistral_common format emits '[TOOL_CALLS][' with no space, so it never enters the JSON-array path and emits no call. Dynamo buffers the payload and recovers the call. Real SGLang divergence on the genuine Mistral format."
      vllm:
        calls: []
        normal_text: ''
        reason: "vLLM's streaming Mistral parser (pre-v11 ijson path) emits no call when the entire [TOOL_CALLS] payload arrives in one chunk via the parity harness (no incremental delta_token_ids to drive its coroutine); Dynamo buffers and recovers the call."
  TOOLCALLING.stream.1.b:
    description: Complete tool call split across parser-significant boundaries
    ref: derived from TOOLCALLING.batch.1
    chunks:
    - delta_text: '[TOOL_CALLS]'
    - delta_text: '[{"name": "get_weather", '
    - delta_text: '"arguments": {"location": "NYC"}}]'
    - delta_text: '[/TOOL_CALLS]'
    - delta_text: ''
      finish_reason: tool_calls
    tools: *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang:
        calls: []
        normal_text: ''
        reason: SGLang's Mistral detector emits no tool call when the [TOOL_CALLS] payload is split across streaming chunks; Dynamo buffers the fragments and recovers the call.
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: '[/TOOL_CALLS]'
        reason: vLLM's streaming Mistral parser leaks the trailing [/TOOL_CALLS] close marker into content; Dynamo now keeps the jail open until the marker arrives and consumes it, so normal_text is empty.
