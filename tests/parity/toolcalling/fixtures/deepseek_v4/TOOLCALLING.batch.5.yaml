family: deepseek_v4
mode: batch
cases:
  TOOLCALLING.batch.5.a:
    description: Missing </｜DSML｜tool_calls> end marker
    ref: dynamo
    model_text: |-
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        calls: []
        normal_text: |-
          <｜DSML｜tool_calls>
          <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
          </｜DSML｜invoke>
        reason: "vLLM leaks the DSML envelope into normal_text on missing end-marker recovery; Dynamo recovers the complete <｜DSML｜invoke> call and strips the unterminated outer tag."
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.5.b:
    description: Closing </｜DSML｜tool_calls> without matching open
    ref: dynamo
    model_text: |-
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - *id001
    expected:
      # DSML strict-wrapper (spec): a closing </｜DSML｜tool_calls> with no matching open means the
      # invoke never had its mandatory wrapper. Per the DeepSeek DSML spec this
      # is not a tool call; Dynamo now emits no call and suppresses the orphan
      # markup (cleaner than vLLM, which leaks it into content).
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        reason: "vLLM leaks the DSML envelope into normal_text on missing/orphan end-marker recovery; Dynamo also emits no call (spec requires the wrapper) but suppresses the orphan markup instead of leaking it."
        calls: []
        normal_text: |-
          <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
          </｜DSML｜invoke>
          </｜DSML｜tool_calls>
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.5.c:
    description: Truncation mid-parameter value
    ref: dynamo
    model_text: |-
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NY
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: |-
          <｜DSML｜tool_calls>
          <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">NY
        reason: "vLLM leaks the tool call tag into normal_text on the recovery path"
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.5.d:
    description: Multi-call, last call missing only end marker (body complete)
    ref: dynamo
    model_text: |-
      I'll start by fetching the weather for both Boston and New York at the same time!
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">Boston</｜DSML｜parameter>
      </｜DSML｜invoke>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">New York</｜DSML｜parameter>
      </｜DSML｜invoke>
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        - name: get_weather
          arguments:
            location: New York
        normal_text: |
          I'll start by fetching the weather for both Boston and New York at the same time!
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
      vllm:
        calls: []
        normal_text: |-
          I'll start by fetching the weather for both Boston and New York at the same time!
          <｜DSML｜tool_calls>
          <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">Boston</｜DSML｜parameter>
          </｜DSML｜invoke>
          <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">New York</｜DSML｜parameter>
          </｜DSML｜invoke>
        reason: "vLLM leaks the unterminated DSML block into normal_text on the recovery path; Dynamo recovers both complete <｜DSML｜invoke> calls (bodies fully closed) and keeps the prefix prose as normal_text."
  TOOLCALLING.batch.5.e:
    description: Multi-call, last call truncated mid-arg-value
    ref: dynamo
    model_text: |-
      I'll start by fetching the weather for both Boston and New York at the same time!
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">Boston</｜DSML｜parameter>
      </｜DSML｜invoke>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">New York
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: |
          I'll start by fetching the weather for both Boston and New York at the same time!
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
      vllm:
        calls: []
        normal_text: |-
          I'll start by fetching the weather for both Boston and New York at the same time!
          <｜DSML｜tool_calls>
          <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">Boston</｜DSML｜parameter>
          </｜DSML｜invoke>
          <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">New York
        reason: "vLLM leaks the unterminated DSML block into normal_text on the recovery path; Dynamo recovers only the complete Boston call and drops the New York call whose <｜DSML｜invoke> was never closed, keeping the prefix prose as normal_text."
  TOOLCALLING.batch.5.f:
    description: Bare valid invoke before a complete wrapped call
    ref: dynamo
    model_text: |-
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">Boston</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - *id001
    expected:
      # DSML strict-wrapper (spec): the first invoke has no <｜DSML｜tool_calls> wrapper, so per the
      # DeepSeek DSML spec it is not a tool call. Dynamo now drops the bare
      # invoke (suppressing its markup) and keeps only the wrapped Boston call,
      # converging with vLLM on calls.
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: ''
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: |
          <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
          </｜DSML｜invoke>
          </｜DSML｜tool_calls>
        reason: "vLLM preserves the bare DSML invoke before the first <｜DSML｜tool_calls> as content; Dynamo also drops it as a call (spec requires the wrapper) but suppresses its markup instead of leaking it, keeping only the wrapped call."
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.5.g:
    description: Closing </｜DSML｜tool_calls> without matching open after prefix prose
    ref: dynamo
    model_text: |-
      I will check that. <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - *id001
    expected:
      # DSML strict-wrapper (spec): the invoke after the prose has no <｜DSML｜tool_calls> wrapper,
      # so per the DeepSeek DSML spec it is not a tool call. Dynamo now keeps
      # only the prefix prose, emits no call, and suppresses the orphan markup
      # (vLLM leaks the markup into content).
      dynamo:
        calls: []
        normal_text: I will check that.
      vllm:
        calls: []
        normal_text: |-
          I will check that. <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
          </｜DSML｜invoke>
          </｜DSML｜tool_calls>
        reason: "vLLM leaks the DSML envelope into normal_text on orphan close-marker recovery; Dynamo also emits no call (spec requires the wrapper), keeps the prefix prose, and suppresses the orphan markup instead of leaking it."
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
