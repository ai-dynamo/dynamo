            items:
              type: string
          object_field:
            type: object
    expected:
      dynamo:
        calls:
        - name: test_function
          arguments:
            string_field: hello
            int_field: 42
            float_field: 3.14
            bool_field: true
            null_field: null
            array_field:
            - a
            - b
            object_field:
              nested: value
        normal_text: ''
