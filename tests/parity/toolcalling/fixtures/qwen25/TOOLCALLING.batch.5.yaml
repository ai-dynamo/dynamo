family: qwen25
mode: batch
cases:
  TOOLCALLING.batch.5.a:
    description: Missing </tool_call> end marker
    ref: dynamo
    model_text: '<tool_call>{"name": "get_weather", "arguments": {"location": "NYC"}}'
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      dynamo:
        calls: []
        normal_text: ''
      sglang:
        reason: 'Incomplete call (open <tool_call>, no close): Dynamo suppresses to empty, SGLang keeps raw. Non-parity by
          design.'
        calls: []
        normal_text: '<tool_call>{"name": "get_weather", "arguments": {"location": "NYC"}}'
  TOOLCALLING.batch.5.b:
    description: Closing </tool_call> without matching <tool_call> open
    ref: dynamo
    model_text: '{"name": "get_weather", "arguments": {"location": "NYC"}}</tool_call>'
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: '{"name": "get_weather", "arguments": {"location": "NYC"}}'
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang:
        reason: 'Orphan </tool_call> with no opener: Dynamo strips the stray end marker
          from normal_text (no leak); SGLang''s Qwen25Detector leaves it in the raw
          text. Non-parity by design.'
        calls: []
        normal_text: '{"name": "get_weather", "arguments": {"location": "NYC"}}</tool_call>'
  TOOLCALLING.batch.5.c:
    description: Truncation mid-arguments JSON
    ref: dynamo
    model_text: '<tool_call>{"name": "get_weather", "arguments": {"loc'
    tools:
    - *id001
    expected:
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      dynamo:
        calls: []
        normal_text: ''
      sglang:
        reason: 'Incomplete call (open <tool_call>, no close): Dynamo suppresses to empty, SGLang keeps raw. Non-parity by
          design.'
        calls: []
        normal_text: '<tool_call>{"name": "get_weather", "arguments": {"loc'
  TOOLCALLING.batch.5.d:
    description: Multi-call, last call missing only end marker (body complete)
    ref: dynamo
    model_text: |-
      I'll start by fetching the weather for both Boston and New York at the same time!<tool_call>
      {"name": "get_weather", "arguments": {"location": "Boston"}}
      </tool_call><tool_call>
      {"name": "get_weather", "arguments": {"location": "New York"}}
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
  TOOLCALLING.batch.5.e:
    description: Multi-call, last call truncated mid-arg-value
    ref: dynamo
    model_text: |-
      I'll start by fetching the weather for both Boston and New York at the same time!<tool_call>
      {"name": "get_weather", "arguments": {"location": "Boston"}}
      </tool_call><tool_call>
      {"name": "get_weather", "arguments": {"location": "New York
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
