family: qwen25
mode: batch
cases:
  TOOLCALLING.batch.4.a:
    description: Tool_call wrapper with non-JSON garbage
    ref: dynamo
    model_text: <tool_call>not even json</tool_call>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang:
        reason: 'Malformed body in a complete <tool_call> wrapper: Dynamo discards
          the unparseable jail region (no leak); SGLang''s Qwen25Detector keys on a
          "<tool_call>\n" prefix, so on this compact wrapper it detects nothing and
          returns the raw text. Non-parity by design.'
        calls: []
        normal_text: <tool_call>not even json</tool_call>
  TOOLCALLING.batch.4.b:
    description: Missing close brace in JSON body
    ref: dynamo
    model_text: '<tool_call>{"name": "get_weather", "arguments": {"location": "NYC"</tool_call>'
    tools:
    - *id001
    expected:
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      dynamo:
        calls: []
        normal_text: ''
      sglang:
        reason: 'Malformed JSON in a complete <tool_call> wrapper: Dynamo discards the
          unparseable jail region (no leak); SGLang''s Qwen25Detector keys on a
          "<tool_call>\n" prefix, so on this compact wrapper it detects nothing and
          returns the raw text. Non-parity by design.'
        calls: []
        normal_text: '<tool_call>{"name": "get_weather", "arguments": {"location": "NYC"</tool_call>'
  TOOLCALLING.batch.4.c:
    description: Missing name key
    ref: dynamo
    model_text: '<tool_call>{"arguments": {"location": "NYC"}}</tool_call>'
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang:
        reason: 'Missing name key in a complete <tool_call> wrapper: Dynamo discards the
          unparseable jail region (no leak); SGLang''s Qwen25Detector keys on a
          "<tool_call>\n" prefix, so on this compact wrapper it detects nothing and
          returns the raw text. Non-parity by design.'
        calls: []
        normal_text: '<tool_call>{"arguments": {"location": "NYC"}}</tool_call>'
  TOOLCALLING.batch.4.d:
    description: Missing </tool_call> close
    ref: dynamo
    model_text: '<tool_call>{"name": "get_weather", "arguments": {"location": "NYC"}}'
    tools:
    - *id001
    expected:
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      dynamo:
        calls: []
        normal_text: ''
      sglang:
        reason: 'Incomplete call (open <tool_call>, no close): Dynamo suppresses to empty, SGLang keeps raw. Non-parity by
          design.'
        calls: []
        normal_text: '<tool_call>{"name": "get_weather", "arguments": {"location": "NYC"}}'
  TOOLCALLING.batch.4.e:
    description: Malformed-prefix recovery - n/a for this family's syntax
    reason: 'n/a: llama3_json-specific raw-JSON-prefix resync; this family uses a framed grammar (see 4.a-4.d).'
  TOOLCALLING.batch.4.f:
    description: Tool-name XML tag case - n/a for this family's syntax
    reason: 'n/a: Qwen3-Coder <function=...> XML syntax, not this family''s format.'
