family: qwen25
mode: batch
cases:
  TOOLCALLING.batch.6.a:
    description: 'Canonical "arguments": {}'
    ref: dynamo
    model_text: |-
      <tool_call>
      {"name": "get_time", "arguments": {}}
      </tool_call>
    tools:
    - &id001
      name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      dynamo:
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang:
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
  TOOLCALLING.batch.6.b:
    description: Whitespace inside arguments {}
    ref: dynamo
    model_text: |-
      <tool_call>
      {"name": "get_time", "arguments": { }}
      </tool_call>
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang:
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
  TOOLCALLING.batch.6.c:
    description: No arguments key
    ref: dynamo
    model_text: '<tool_call>{"name": "get_time"}</tool_call>'
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang:
        reason: 'Name-only call (no arguments key): Dynamo recovers it as get_time({})
          (matching vLLM/SGLang Hermes detectors); SGLang''s Qwen25Detector keys on a
          "<tool_call>\n" prefix, so on this compact wrapper it detects nothing and
          returns the raw text. Non-parity by design.'
        calls: []
        normal_text: '<tool_call>{"name": "get_time"}</tool_call>'
