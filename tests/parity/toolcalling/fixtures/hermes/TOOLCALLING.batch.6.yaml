family: hermes
mode: batch
cases:
  TOOLCALLING.batch.6.a:
    description: 'Canonical "arguments": {}'
    ref: dynamo
    model_text: '<tool_call>{"name": "get_time", "arguments": {}}</tool_call>'
    tools:
    - &id002
      name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      dynamo:
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: &id001
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      sglang: *id001
  TOOLCALLING.batch.6.b:
    description: Whitespace inside arguments {}
    ref: dynamo
    model_text: '<tool_call>{"name": "get_time", "arguments": { }}</tool_call>'
    tools:
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: &id003
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      sglang: *id003
  TOOLCALLING.batch.6.c:
    description: No arguments key
    ref: dynamo
    model_text: '<tool_call>{"name": "get_time"}</tool_call>'
    tools:
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm:
        reason: Name-only call (no arguments key) — vLLM's Hermes parser raises on the
          missing key and leaves the wrapper in content; Dynamo and SGLang recover it as
          get_time({}).
        calls: []
        normal_text: '<tool_call>{"name": "get_time"}</tool_call>'
      sglang:
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
