family: hermes
mode: batch
cases:
  TOOLCALLING.batch.6.a:
    description: 'Canonical "arguments": {}'
    ref: dynamo
    model_text: '<tool_call>{"name": "get_time", "arguments": {}}</tool_call>'
    tools:
    - &id002
      name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      dynamo: &id001
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *id001
      sglang: *id001
  TOOLCALLING.batch.6.b:
    description: Whitespace inside arguments {}
    ref: dynamo
    model_text: '<tool_call>{"name": "get_time", "arguments": { }}</tool_call>'
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *id003
      sglang: *id003
  TOOLCALLING.batch.6.c:
    description: No arguments key
    ref: dynamo
    model_text: '<tool_call>{"name": "get_time"}</tool_call>'
    tools:
    - *id002
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        reason: vLLM leaks the wrapper for a name-only body; hermes drops it (no arguments key).
        calls: []
        normal_text: '<tool_call>{"name": "get_time"}</tool_call>'
      sglang:
        reason: SGLang coerces a name-only body into an empty-args call; hermes drops it.
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
