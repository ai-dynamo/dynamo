family: hermes
model_label: Hermes-3 / Llama variants
mode: stream
cases:
  TOOLCALLING.stream.4.a:
    description: Truncated stream terminates after a complete in-flight tool-call body
    ref: derived from TOOLCALLING.batch.5.a
    chunks:
    - delta_text: '<tool_call>{"name": "get_weather", "arguments": {"location": "NYC"}}'
    - delta_text: ''
      finish_reason: stop
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        reason: Hermes drops an unfinished single call and hides the buffer; vLLM and SGLang recover it (deliberate non-parity).
        calls: []
        normal_text: ''
      sglang: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *id001
  TOOLCALLING.stream.4.b:
    description: Stream terminates mid-call body before the in-flight argument payload is complete
    ref: derived from TOOLCALLING.batch.5.c
    chunks:
    - delta_text: '<tool_call>{"name": "get_w'
    - delta_text: 'eather", "arguments": {"loc'
    - delta_text: ''
      finish_reason: stop
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: ''
      sglang:
        reason: SGLang emits an empty-args call here; hermes drops the incomplete call and hides the buffer.
        calls:
        - name: get_weather
          arguments: {}
        normal_text: ''
      vllm:
        reason: vLLM emits a partial-args call here; hermes drops the incomplete call and hides the buffer.
        calls:
        - name: get_weather
          arguments: '{"loc'
        normal_text: ''
  TOOLCALLING.stream.4.c:
    description: Stream reaches length after a valid inner tool-call body without the required outer wrapper, followed by
      repeated close markers
    ref: derived from nemotron-ultra-preview-tool-call-leak-repro/repro_tool_call_leak.py
    chunks:
    - delta_text: '{"name": "get_weather", "arguments": {"location": "NYC"}}</tool_call></tool_call></tool_call>'
    - delta_text: ''
      finish_reason: length
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id002
        calls: []
        normal_text: '{"name": "get_weather", "arguments": {"location": "NYC"}}</tool_call></tool_call></tool_call>'
      vllm: *id002
      sglang:
        reason: No opening <tool_call>, so it was never a framed call; hermes and vLLM pass it through; SGLang strips the trailing close markers.
        calls: []
        normal_text: '{"name": "get_weather", "arguments": {"location": "NYC"}}'
