family: hermes
mode: batch
cases:
  TOOLCALLING.batch.5.a:
    description: Missing </tool_call> end marker
    ref: dynamo
    model_text: '<tool_call>{"name": "get_weather", "arguments": {"location": "NYC"}}'
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang: *id001
  TOOLCALLING.batch.5.b:
    description: Closing </tool_call> without matching <tool_call> open
    ref: dynamo
    model_text: '{"name": "get_weather", "arguments": {"location": "NYC"}}</tool_call>'
    tools:
    - *id002
    expected:
      dynamo:
        calls: []
        normal_text: '{"name": "get_weather", "arguments": {"location": "NYC"}}'
      vllm: &id003
        reason: vLLM and SGLang's Hermes parsers keep the orphan </tool_call> (no opening
          <tool_call>) in content; Dynamo strips the stray end marker so it does not leak.
        calls: []
        normal_text: '{"name": "get_weather", "arguments": {"location": "NYC"}}</tool_call>'
      sglang: *id003
  TOOLCALLING.batch.5.c:
    description: Truncation mid-arguments JSON
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_hermes_tool_parser.py#L356
    model_text: '<tool_call>{"name": "get_weather", "arguments": {"loc'
    tools:
    - *id002
    expected:
      dynamo:
        calls: []
        normal_text: '<tool_call>{"name": "get_weather", "arguments": {"loc'
      vllm: &id004
        reason: 'Truncated mid-arguments with no </tool_call>: all three engines preserve
          the raw text; Dynamo''s eof-recovery cannot complete the call. Impl-defined recovery
          (batch.5), so parity is not expected.'
        calls: []
        normal_text: '<tool_call>{"name": "get_weather", "arguments": {"loc'
      sglang: *id004
  TOOLCALLING.batch.5.d:
    description: Multi-call, last call missing only end marker (body complete)
    ref: dynamo
    model_text: 'I''ll start by fetching the weather for both Boston and New York at the same time!<tool_call>{"name": "get_weather",
      "arguments": {"location": "Boston"}}</tool_call><tool_call>{"name": "get_weather", "arguments": {"location": "New York"}}'
    tools:
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        - name: get_weather
          arguments:
            location: New York
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        - name: get_weather
          arguments:
            location: New York
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
  TOOLCALLING.batch.5.e:
    description: Multi-call, last call truncated mid-arg-value
    ref: dynamo
    model_text: 'I''ll start by fetching the weather for both Boston and New York at the same time!<tool_call>{"name": "get_weather",
      "arguments": {"location": "Boston"}}</tool_call><tool_call>{"name": "get_weather", "arguments": {"location": "New York'
    tools:
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
      vllm:
        calls: []
        normal_text: 'I''ll start by fetching the weather for both Boston and New York at the same time!<tool_call>{"name":
          "get_weather", "arguments": {"location": "Boston"}}</tool_call><tool_call>{"name": "get_weather", "arguments": {"location":
          "New York'
      sglang:
        calls: []
        normal_text: 'I''ll start by fetching the weather for both Boston and New York at the same time!<tool_call>{"name":
          "get_weather", "arguments": {"location": "Boston"}}</tool_call><tool_call>{"name": "get_weather", "arguments": {"location":
          "New York'
