apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: qwen3-32b-mn-failover
spec:
  services:
    Frontend:
      envFromSecret: hf-token-secret
      componentType: frontend
      replicas: 1
      extraPodSpec:
        mainContainer:
          image: dynamoci.azurecr.io/ai-dynamo/dynamo:multinode-failover-650234f660-vllm-runtime
    Worker:
      envFromSecret: hf-token-secret
      componentType: worker
      replicas: 1
      multinode:
        nodeCount: 2
      resources:
        limits:
          gpu: "2"
      failover:
        enabled: true
        coordinationEndpoint: http://etcd.failover-e2e-test.svc.cluster.local:2379
      extraPodSpec:
        nodeSelector:
          kubernetes.io/hostname: aks-a100exp-11297970-vmss000001
        mainContainer:
          image: dynamoci.azurecr.io/ai-dynamo/dynamo:multinode-failover-650234f660-vllm-runtime
          workingDir: /workspace/examples/backends/vllm
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --model
            - Qwen/Qwen3-32B
            - --tensor-parallel-size
            - "4"
            - --load-format
            - gms
            - --enforce-eager
            - --gpu-memory-utilization
            - "0.85"
