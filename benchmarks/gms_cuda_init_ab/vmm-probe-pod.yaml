  namespace: schwinns
  labels:
    schwinns.ai-dynamo.io/experiment: gms-vmm-slab-probe
spec:
  restartPolicy: Never
  securityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
  nodeSelector:
