apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: valkey-sweep-router-primary
  namespace: bis-rl-3
  labels:
    app.kubernetes.io/part-of: valkey-router-sweep
spec:
  serviceName: valkey-sweep-router-primary
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/part-of: valkey-router-sweep
      app.kubernetes.io/name: valkey-sweep-router-primary
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valkey-sweep-router-primary
        app.kubernetes.io/component: valkey-data
        app.kubernetes.io/part-of: valkey-router-sweep
        valkey-sweep-ha-group: router
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
      - name: nvcr-pull-secret
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/part-of: valkey-router-sweep
                valkey-sweep-ha-group: router
            topologyKey: kubernetes.io/hostname
      containers:
      - name: valkey
        image: ${VALKEY_SWEEP_IMAGE}
        imagePullPolicy: IfNotPresent
        command:
        - /app/.venv/bin/python
        - /usr/local/libexec/dynamo/start_valkey.py
        args:
        - --master-name
        - dynamo-router
        - --bootstrap-role
        - primary
        - --bootstrap-primary-host
        - valkey-sweep-router-primary-0.valkey-sweep-router-primary
        - --allowed-master-host
        - valkey-sweep-router-primary
        - --allowed-master-host
        - valkey-sweep-router-primary-0.valkey-sweep-router-primary
        - --allowed-master-host
        - valkey-sweep-router-replica
        - --allowed-master-host
        - valkey-sweep-router-replica-0.valkey-sweep-router-replica
        - --
        - --appendonly
        - 'yes'
        - --appendfsync
        - everysec
        - --save
        - ''
        - --maxmemory
        - 8gb
        - --maxmemory-policy
        - noeviction
        - --loadmodule
        - /usr/local/lib/dynkv.so
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_DNS
          value: valkey-sweep-router-primary-0.valkey-sweep-router-primary
        - name: STATE_DIR
          value: /data
        ports:
        - name: valkey
          containerPort: 6379
        readinessProbe:
          exec:
            command:
            - /usr/local/bin/valkey-cli
            - -h
            - 127.0.0.1
            - ping
          initialDelaySeconds: 2
          periodSeconds: 2
        resources:
          requests:
            cpu: '2'
            memory: 10Gi
          limits:
            cpu: '8'
            memory: 12Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: valkey-sweep-router-primary-data
