apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: valkey-sweep-sentinel
  namespace: bis-rl-3
  labels:
    app.kubernetes.io/part-of: valkey-router-sweep
spec:
  serviceName: valkey-sweep-sentinel
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/part-of: valkey-router-sweep
      app.kubernetes.io/name: valkey-sweep-sentinel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valkey-sweep-sentinel
        app.kubernetes.io/component: sentinel
        app.kubernetes.io/part-of: valkey-router-sweep
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
      - name: nvcr-pull-secret
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/part-of: valkey-router-sweep
                app.kubernetes.io/name: valkey-sweep-sentinel
            topologyKey: kubernetes.io/hostname
      initContainers:
      - name: config
        image: ${VALKEY_SWEEP_IMAGE}
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        args:
        - test -s /sentinel-data/sentinel.conf || cp /config/sentinel.conf /sentinel-data/sentinel.conf
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: config
          mountPath: /config
          readOnly: true
        - name: sentinel-data
          mountPath: /sentinel-data
      containers:
      - name: sentinel
        image: ${VALKEY_SWEEP_IMAGE}
        imagePullPolicy: IfNotPresent
        command:
        - /usr/local/bin/valkey-server
        args:
        - /sentinel-data/sentinel.conf
        - --sentinel
        ports:
        - name: sentinel
          containerPort: 26379
        readinessProbe:
          exec:
            command:
            - /usr/local/bin/valkey-cli
            - -h
            - 127.0.0.1
            - -p
            - '26379'
            - ping
          initialDelaySeconds: 2
          periodSeconds: 2
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: '2'
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: sentinel-data
          mountPath: /sentinel-data
      volumes:
      - name: config
        configMap:
          name: valkey-sweep-config
          items:
          - key: sentinel.conf
            path: sentinel.conf
  volumeClaimTemplates:
  - metadata:
      name: sentinel-data
      labels:
        app.kubernetes.io/part-of: valkey-router-sweep
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: standard-rwo
      resources:
        requests:
          storage: 1Gi
