  name: valkey-sweep-router-replica
  namespace: bis-rl-3
  labels:
    app.kubernetes.io/part-of: valkey-router-sweep
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
  - name: valkey
    port: 6379
    targetPort: valkey
  selector:
    app.kubernetes.io/part-of: valkey-router-sweep
    app.kubernetes.io/name: valkey-sweep-router-replica
---
apiVersion: v1
kind: Service
metadata:
  name: valkey-sweep-tokenizer-primary
  namespace: bis-rl-3
  labels:
    app.kubernetes.io/part-of: valkey-router-sweep
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
  - name: valkey
    port: 6379
    targetPort: valkey
  selector:
    app.kubernetes.io/part-of: valkey-router-sweep
    app.kubernetes.io/name: valkey-sweep-tokenizer-primary
---
apiVersion: v1
kind: Service
metadata:
  name: valkey-sweep-tokenizer-replica
  namespace: bis-rl-3
  labels:
    app.kubernetes.io/part-of: valkey-router-sweep
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
  - name: valkey
    port: 6379
    targetPort: valkey
  selector:
    app.kubernetes.io/part-of: valkey-router-sweep
