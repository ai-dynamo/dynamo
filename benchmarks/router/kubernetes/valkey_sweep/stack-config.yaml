  labels:
    app.kubernetes.io/part-of: valkey-router-sweep
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
  - name: sentinel
    port: 26379
    targetPort: sentinel
  selector:
    app.kubernetes.io/part-of: valkey-router-sweep
    app.kubernetes.io/name: valkey-sweep-sentinel
