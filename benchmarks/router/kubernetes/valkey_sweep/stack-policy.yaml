apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: valkey-sweep-router
  namespace: bis-rl-3
  labels: {app.kubernetes.io/part-of: valkey-router-sweep}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/part-of: valkey-router-sweep
      valkey-sweep-ha-group: router
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: valkey-sweep-tokenizer
  namespace: bis-rl-3
  labels: {app.kubernetes.io/part-of: valkey-router-sweep}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/part-of: valkey-router-sweep
      valkey-sweep-ha-group: tokenizer
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: valkey-sweep-sentinel
  namespace: bis-rl-3
  labels: {app.kubernetes.io/part-of: valkey-router-sweep}
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/part-of: valkey-router-sweep
      app.kubernetes.io/name: valkey-sweep-sentinel
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: valkey-sweep-router-ingress
  namespace: bis-rl-3
  labels: {app.kubernetes.io/part-of: valkey-router-sweep}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: valkey-router-sweep
      valkey-sweep-ha-group: router
  policyTypes: [Ingress]
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: valkey-router-sweep
          valkey-sweep-ha-group: router
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: valkey-router-sweep
          app.kubernetes.io/component: sentinel
    - podSelector:
        matchLabels: {app.kubernetes.io/part-of: valkey-router-sweep}
        matchExpressions:
        - key: app.kubernetes.io/component
          operator: In
          values: [mocker, frontend, benchmark-client]
    ports: [{protocol: TCP, port: 6379}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: valkey-sweep-tokenizer-ingress
  namespace: bis-rl-3
  labels: {app.kubernetes.io/part-of: valkey-router-sweep}
spec:
