          valkey-sweep-ha-group: tokenizer
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: valkey-router-sweep
          app.kubernetes.io/component: sentinel
    - podSelector:
        matchLabels: {app.kubernetes.io/part-of: valkey-router-sweep}
        matchExpressions:
        - key: app.kubernetes.io/component
          operator: In
          values: [frontend, benchmark-client]
    ports: [{protocol: TCP, port: 6379}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: valkey-sweep-sentinel-ingress
  namespace: bis-rl-3
  labels: {app.kubernetes.io/part-of: valkey-router-sweep}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: valkey-router-sweep
      app.kubernetes.io/component: sentinel
  policyTypes: [Ingress]
  ingress:
  - from:
    - podSelector:
        matchLabels: {app.kubernetes.io/part-of: valkey-router-sweep}
        matchExpressions:
        - key: app.kubernetes.io/component
          operator: In
          values: [valkey-data, sentinel, mocker, frontend, benchmark-client]
    ports: [{protocol: TCP, port: 26379}]
---
apiVersion: networking.k8s.io/v1
