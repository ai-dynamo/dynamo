apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: valkey-sweep-router-egress
  namespace: bis-rl-3
  labels: {app.kubernetes.io/part-of: valkey-router-sweep}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: valkey-router-sweep
      valkey-sweep-ha-group: router
  policyTypes: [Egress]
  egress:
  - to:
    - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: kube-system}}
      podSelector: {matchLabels: {k8s-app: kube-dns}}
    ports: [{protocol: UDP, port: 53}, {protocol: TCP, port: 53}]
  - to:
