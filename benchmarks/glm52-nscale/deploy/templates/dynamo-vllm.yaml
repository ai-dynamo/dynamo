apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: glm52-dynamo-vllm
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/name: glm52-dynamo-vllm
    app.kubernetes.io/part-of: glm52-nscale-benchmark
spec:
  backendFramework: vllm
  env:
    - name: HF_HOME
      value: /opt/models/hub
    - name: HF_HUB_OFFLINE
      value: "1"
    - name: TRANSFORMERS_OFFLINE
      value: "1"
    - name: HOME
      value: /tmp
    - name: DYN_LOG
      value: info
  components:
    - name: Frontend
      type: frontend
      replicas: 1
      minAvailable: 1
      podTemplate:
        metadata:
          labels:
            glm52.nvidia.com/variant: dynamo-vllm
            glm52.nvidia.com/role: frontend
        spec:
          schedulerName: default-scheduler
          imagePullSecrets:
            - name: nvcr-secret
          containers:
            - name: main
              image: ${VLLM_IMAGE}
              imagePullPolicy: IfNotPresent
              command: ["/bin/bash", "-lc"]
              args:
                - >-
                  exec python3 -m dynamo.frontend
                  --router-mode round-robin
                  --http-host 0.0.0.0
                  --http-port 8000
                  --dyn-chat-processor vllm
                  --enable-auto-tool-choice
                  --tool-call-parser glm47
                  --reasoning-parser glm45
                  --trust-remote-code
              ports:
                - name: http
                  containerPort: 8000
              resources:
                requests:
                  cpu: "4"
                  memory: 16Gi
                limits:
                  cpu: "8"
                  memory: 32Gi
              startupProbe:
                httpGet:
                  path: /health
                  port: http
                failureThreshold: 360
                periodSeconds: 10
                timeoutSeconds: 5
              readinessProbe:
                httpGet:
                  path: /health
                  port: http
                periodSeconds: 10
                timeoutSeconds: 5
              volumeMounts:
                - name: model-cache
                  mountPath: /opt/models
                  readOnly: true
                - name: runtime-tmp
                  mountPath: /tmp
          volumes:
            - name: model-cache
              persistentVolumeClaim:
                claimName: shared-model-cache
            - name: runtime-tmp
              emptyDir: {}
    - name: VllmWorker
      type: worker
      replicas: 1
      minAvailable: 1
      sharedMemorySize: 128Gi
      podTemplate:
        metadata:
          labels:
            glm52.nvidia.com/variant: dynamo-vllm
            glm52.nvidia.com/role: worker
        spec:
          schedulerName: default-scheduler
          runtimeClassName: nvidia
          nodeSelector:
            kubernetes.io/hostname: ${NODE_NAME}
            nvidia.com/gpu.product: NVIDIA-B200
          tolerations:
            - key: nvidia.com/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule
            - key: dra
              operator: Equal
              value: "true"
              effect: NoSchedule
          imagePullSecrets:
            - name: nvcr-secret
          containers:
            - name: main
              image: ${VLLM_IMAGE}
              imagePullPolicy: IfNotPresent
              workingDir: /workspace
              command: ["/bin/bash", "-lc"]
              args:
                - |
                  set -euo pipefail
                  test -r "${MODEL_PATH}/config.json"
                  test "$(head -n1 "${MODEL_PATH}/.cache/huggingface/download/config.json.metadata")" = "${MODEL_REVISION}"
                  visible_count="$(nvidia-smi -L | grep -c '^GPU ')"
                  test "${visible_count}" -eq ${TP_SIZE}
                  actual_gpu_uuids="$(nvidia-smi --query-gpu=uuid --format=csv,noheader | sort | paste -sd, -)"
                  test "${actual_gpu_uuids}" = "${EXPECTED_GPU_UUIDS}"
                  dirty_count="$(nvidia-smi --query-gpu=memory.used --format=csv,noheader,nounits | awk '$1 > 1024 {c++} END {print c+0}')"
                  test "${dirty_count}" -eq 0
                  ulimit -l unlimited
                  exec python3 -m dynamo.vllm \
                    --model="${MODEL_PATH}" \
                    --served-model-name="${SERVED_MODEL_NAME}" \
                    --tensor-parallel-size=${TP_SIZE} \
                    --enable-expert-parallel \
                    --trust-remote-code \
                    --kv-cache-dtype=fp8_e4m3 \
                    --max-model-len=${MAX_MODEL_LEN} \
                    --max-num-seqs=${MAX_RUNNING_REQUESTS} \
                    --max-num-batched-tokens=32768 \
                    --gpu-memory-utilization=0.90 \
                    --enable-prefix-caching \
                    --no-enable-log-requests
              env:
                - name: VLLM_CACHE_ROOT
                  value: /tmp/vllm
                - name: TRITON_CACHE_DIR
                  value: /tmp/triton
                - name: VLLM_WORKER_MULTIPROC_METHOD
                  value: spawn
                - name: VLLM_ALLREDUCE_USE_SYMM_MEM
                  value: "0"
                - name: NCCL_IB_DISABLE
                  value: "1"
                - name: NCCL_CUMEM_ENABLE
                  value: "1"
                - name: NCCL_NVLS_ENABLE
                  value: "1"
              resources:
                requests:
                  cpu: "32"
                  memory: 750Gi
                  ephemeral-storage: 40Gi
                  nvidia.com/gpu: "${TP_SIZE}"
                limits:
                  cpu: "64"
                  memory: 900Gi
                  nvidia.com/gpu: "${TP_SIZE}"
              securityContext:
                runAsUser: 0
                runAsGroup: 0
                capabilities:
                  add: ["IPC_LOCK", "SYS_RESOURCE"]
              startupProbe:
                httpGet:
                  path: /live
                  port: 9090
                failureThreshold: 120
                periodSeconds: 60
                timeoutSeconds: 20
              volumeMounts:
                - name: model-cache
                  mountPath: /opt/models
                  readOnly: true
                - name: runtime-tmp
                  mountPath: /tmp
          volumes:
            - name: model-cache
              persistentVolumeClaim:
                claimName: shared-model-cache
            - name: runtime-tmp
              emptyDir: {}
