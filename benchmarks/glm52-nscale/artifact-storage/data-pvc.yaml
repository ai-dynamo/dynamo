apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: glm52-benchmark-output
  labels:
    app.kubernetes.io/name: glm52-benchmark-output
    app.kubernetes.io/part-of: glm52-nscale-benchmark
  annotations:
    benchmarks.nvidia.com/retention-policy: retain
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: cinder
  resources:
    requests:
      storage: 1Ti
