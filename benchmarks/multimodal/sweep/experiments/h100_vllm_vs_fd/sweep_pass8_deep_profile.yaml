# Pass 8: Deep profiling of vllm-serve image processing pipeline.
# vllm-serve only, rate=0.4 (near-sequential), 60 requests, 4 images/request.
# Deep [PERF] instrumentation: base64_decode, pil_open_convert, chat_template,
# tokenize, hf_processor_call, mm_processor_apply.
#
# Usage:
#   python -m benchmarks.multimodal.sweep \
#     --config benchmarks/multimodal/sweep/experiments/h100_vllm_vs_fd/sweep_pass8_deep_profile.yaml

model: Qwen/Qwen3-VL-30B-A3B-Instruct-FP8
request_rates: [0.4]
osl: 1
request_count: 60
warmup_count: 3
port: 8000
timeout: 600
output_dir: logs/04-10/h100-vllm-deep-profile

env:
  CUDA_VISIBLE_DEVICES: "0"
  HF_HOME: /huggingface
  DYN_TCP_MAX_MESSAGE_SIZE: "104857600"
  DYN_PERF_PATCHES: "1"

input_files:
  - benchmarks/multimodal/jsonl/60req_4img_240pool_400word_base64.jsonl

configs:
  - label: vllm-serve
    workflow: benchmarks/multimodal/sweep/workflows/vllm_serve_clean.sh
    extra_args:
      - --max-num-seqs
      - "8"
      - --gpu-memory-utilization
      - ".9"
