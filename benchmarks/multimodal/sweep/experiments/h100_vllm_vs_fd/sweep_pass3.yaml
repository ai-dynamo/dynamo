# Pass 3: dynamo-fd tracing overhead investigation.
# Rate=8, 240 requests, 4 images/request, 960 unique images (no reuse).
# OSL=1 for pure TTFT measurement.
# Two configs: default logging vs DYN_LOG=warn (quiet) to measure logging overhead.
#
# Dataset must be generated at runtime (see run_pass3.sh).
#
# Usage:
#   python -m benchmarks.multimodal.sweep \
#     --config benchmarks/multimodal/sweep/experiments/h100_vllm_vs_fd/sweep_pass3.yaml

model: Qwen/Qwen3-VL-30B-A3B-Instruct-FP8
request_rates: [8]
osl: 1
request_count: 240
warmup_count: 3
port: 8000
timeout: 600
output_dir: logs/04-09/h100-fd-pass3

env:
  CUDA_VISIBLE_DEVICES: "0"
  HF_HOME: /huggingface
  DYN_TCP_MAX_MESSAGE_SIZE: "104857600"
  DYN_PERF_PATCHES: "1"

input_files:
  - benchmarks/multimodal/jsonl/240req_4img_960pool_400word_base64.jsonl

configs:
  - label: fd-default
    workflow: examples/backends/vllm/launch/agg_multimodal.sh
    extra_args:
      - --no-enable-prefix-caching
      - --frontend-decoding
      - --max-model-len
      - "16384"
      - --max-num-seqs
      - "8"
      - --gpu-memory-utilization
      - ".9"

  - label: fd-quiet
    workflow: benchmarks/multimodal/sweep/workflows/agg_multimodal_quiet.sh
    extra_args:
      - --no-enable-prefix-caching
      - --frontend-decoding
      - --max-model-len
      - "16384"
      - --max-num-seqs
      - "8"
      - --gpu-memory-utilization
      - ".9"
