# Pass 1: vllm baseline vs dynamo frontend-decoding on H100.
# No nsys profiling — pure TTFT/latency measurement.
# OSL=1 for pure TTFT measurement. Request-rate sweep.
# Synthetic 512x512 images, 4/request, 20% reuse (192 pool), base64.
#
# Usage:
#   python -m benchmarks.multimodal.sweep \
#     --config benchmarks/multimodal/sweep/experiments/h100_vllm_vs_fd/sweep_pass1.yaml

model: Qwen/Qwen3-VL-30B-A3B-Instruct-FP8
request_rates: [4, 8]
osl: 1
request_count: 60
warmup_count: 3
port: 8000
timeout: 600
output_dir: logs/04-08/h100-vllm-vs-fd-pass1

env:
  CUDA_VISIBLE_DEVICES: "0"
  HF_HOME: /huggingface
  DYN_TCP_MAX_MESSAGE_SIZE: "104857600"
  DYN_PERF_PATCHES: "1"

input_files:
  - benchmarks/multimodal/jsonl/60req_4img_192pool_400word_base64.jsonl

configs:
  - label: vllm-baseline
    workflow: benchmarks/multimodal/sweep/workflows/vllm_serve.sh
    extra_args:
      - --no-enable-prefix-caching
      - --multimodal-embedding-cache-capacity-gb
      - "0"
      - --max-model-len
      - "16384"
      - --max-num-seqs
      - "8"
      - --gpu-memory-utilization
      - ".9"

  - label: dynamo-fd
    workflow: examples/backends/vllm/launch/agg_multimodal.sh
    extra_args:
      - --no-enable-prefix-caching
      - --frontend-decoding
      - --max-model-len
      - "16384"
      - --max-num-seqs
      - "8"
      - --gpu-memory-utilization
      - ".9"
