# Pass 6: vllm-serve vs dynamo-fd with pillow-simd.
# Rates 0.4–1.6, 60 requests, 4 images/request, 240 unique 2400x1080 images.
# OSL=1 for pure TTFT measurement.
#
# Usage:
#   python -m benchmarks.multimodal.sweep \
#     --config benchmarks/multimodal/sweep/experiments/h100_vllm_vs_fd/sweep_pass6_pillow_simd.yaml

model: Qwen/Qwen3-VL-30B-A3B-Instruct-FP8
request_rates: [0.4, 0.8, 1.2, 1.6]
osl: 1
request_count: 60
warmup_count: 3
port: 8000
timeout: 600
output_dir: logs/04-10/h100-fd-pass6-pillow-simd

env:
  CUDA_VISIBLE_DEVICES: "0"
  HF_HOME: /huggingface
  DYN_TCP_MAX_MESSAGE_SIZE: "104857600"
  DYN_PERF_PATCHES: "1"

input_files:
  - benchmarks/multimodal/jsonl/60req_4img_240pool_400word_base64.jsonl

configs:
  - label: vllm-serve
    workflow: benchmarks/multimodal/sweep/workflows/vllm_serve_clean.sh
    extra_args:
      - --max-num-seqs
      - "8"
      - --gpu-memory-utilization
      - ".9"

  - label: dynamo-fd
    workflow: examples/backends/vllm/launch/agg_multimodal.sh
    extra_args:
      - --no-enable-prefix-caching
      - --frontend-decoding
      - --max-model-len
      - "16384"
      - --max-num-seqs
      - "8"
      - --gpu-memory-utilization
      - ".9"
