# Dry run: cycle through all 5 deployment configs with minimal traffic
# to validate each one starts, serves, and responds correctly.
#
# Usage:
#   python -m benchmarks.multimodal.sweep \
#     --config benchmarks/multimodal/sweep/experiments/qwen3_vl_30b_b200/sweep_dry_run.yaml

model: Qwen/Qwen3-VL-30B-A3B-Instruct-FP8
concurrencies: [1]
osl: 50
request_count: 3
warmup_count: 1
timeout: 900
skip_plots: true
output_dir: benchmarks/results/qwen3_vl_30b_b200/dry_run

input_files:
  - benchmarks/multimodal/jsonl/1000req_1img_200pool_400word_http.jsonl

configs:
  - label: agg
    workflow: benchmarks/multimodal/sweep/experiments/qwen3_vl_30b_b200/launch_agg.sh

  - label: epd-1e
    workflow: benchmarks/multimodal/sweep/experiments/qwen3_vl_30b_b200/launch_epd_1e.sh

  - label: epd-2e
    workflow: benchmarks/multimodal/sweep/experiments/qwen3_vl_30b_b200/launch_epd_2e.sh

  - label: epd-4e
    workflow: benchmarks/multimodal/sweep/experiments/qwen3_vl_30b_b200/launch_epd_4e.sh

  - label: epd-6e
    workflow: benchmarks/multimodal/sweep/experiments/qwen3_vl_30b_b200/launch_epd_6e.sh
