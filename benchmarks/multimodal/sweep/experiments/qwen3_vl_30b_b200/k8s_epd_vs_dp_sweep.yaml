#
# EPD vs DP benchmark — matches vLLM EPD blog methodology.
# https://vllm.ai/blog/vllm-epd
#
# Key alignment with blog:
#   - QPS-based load (not concurrency)
#   - DP baseline (fair GPU-budget comparison)
#   - Multi-image sweep (1, 2, 4 images per request)
#   - Synthetic images 640x640
#   - ISL=400, OSL=150
#   - max_batch_size=64
#
# Configs (GPU budget matched — 3 GPUs each):
#   dp-3:   3 independent agg workers (GPUs 0,1,2) — DP baseline
#   epd-1e: 1 encoder + 1 prefill + 1 decode (GPUs 0,1,2) — EPD
#
# Usage:
#   kubectl apply -f k8s_epd_vs_dp_sweep.yaml -n kprashanth \
#     --context=nv-prd-dgxc.teleport.sh-dynamo-nscale-dev-cluster

apiVersion: batch/v1
kind: Job
metadata:
  name: trtllm-epd-vs-dp
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 7200
  template:
    metadata:
      labels:
        app: trtllm-epd-vs-dp
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.present
                    operator: In
                    values: ["true"]
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      imagePullSecrets:
        - name: nvcrimagepullsecret
      containers:
        - name: sweep
          image: nvcr.io/nvidian/dynamo-dev/kprashanth:trtllm-rc7-post1
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
          securityContext:
            privileged: true
            runAsUser: 0
          env:
            - name: MODEL
              value: "Qwen/Qwen3-VL-30B-A3B-Instruct"
            - name: SERVED_MODEL_NAME
              value: "Qwen/Qwen3-VL-30B-A3B-Instruct"
            # Experiment matrix
            - name: SWEEP_CONFIGS
              value: "dp-3 epd-1e"
            - name: IMAGE_COUNTS
              value: "1 2 4"
            - name: QPS_RATES
              value: "1 2 4 8 12 16 20 24"
            - name: MIN_DURATION
              value: "60"
            # Match vLLM blog: ISL=400, OSL=150, 640x640 images
            - name: ISL
              value: "400"
            - name: OSL
              value: "150"
            - name: IMG_WIDTH
              value: "640"
            - name: IMG_HEIGHT
              value: "640"
            - name: REQUEST_COUNT
              value: "200"
            - name: WARMUP_COUNT
              value: "5"
            - name: TIMEOUT
              value: "1800"
            - name: OUTPUT_DIR
              value: "/model-cache/results/qwen3_vl_30b_b200/epd_vs_dp"
            # Infra
            - name: ETCD_ENDPOINTS
              value: "localhost:2379"
            - name: NATS_SERVER
              value: "nats://localhost:4222"
            - name: HF_HOME
              value: "/model-cache/huggingface"
            - name: PYTHONUNBUFFERED
              value: "1"
            # MPI/UCX
            - name: OMPI_MCA_btl
              value: "tcp,self"
            - name: OMPI_MCA_pml
              value: "ob1"
            - name: UCX_TLS
              value: "tcp,cuda_copy,cuda_ipc,self,sm"
            - name: UCX_NET_DEVICES
              value: "all"
            - name: NVIDIA_GDRCOPY
              value: "1"
            - name: NCCL_CUMEM_ENABLE
              value: "1"
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: HF_TOKEN
          command: ["/bin/bash", "-l", "-c"]
          args:
            - |
              set -euo pipefail

              echo "======================================================================="
              echo "  EPD vs DP Benchmark (vLLM Blog Methodology)"
              echo "  Configs:      $SWEEP_CONFIGS"
              echo "  Image counts: $IMAGE_COUNTS"
              echo "  QPS rates:    $QPS_RATES"
              echo "  ISL=$ISL  OSL=$OSL  Images=${IMG_WIDTH}x${IMG_HEIGHT}"
              echo "  Model: $MODEL"
              echo "======================================================================="

              ulimit -l unlimited
              echo "[setup] ulimit -l set to unlimited"

              echo ""
              echo "[gpu] Available GPUs:"
              nvidia-smi --query-gpu=index,name,memory.total,memory.free --format=csv,noheader
              echo ""

              # ── Start infra ────────────────────────────────────────────
              echo "[infra] Starting etcd and nats-server..."
              etcd --listen-client-urls http://0.0.0.0:2379 \
                   --advertise-client-urls http://0.0.0.0:2379 \
                   --data-dir /tmp/etcd &
              nats-server -js &
              sleep 3
              echo "[infra] etcd and nats-server running"

              # ── Sync latest scripts ────────────────────────────────────
              echo "[setup] Fetching latest benchmark scripts (sparse, no LFS)..."
              cd /tmp
              export GIT_LFS_SKIP_SMUDGE=1
              git clone --depth=1 --filter=blob:none --sparse \
                https://github.com/ai-dynamo/dynamo.git -b kprashanth/trtllm-bench dynamo-scripts
              cd dynamo-scripts
              git sparse-checkout set benchmarks examples/backends/trtllm/engine_configs
              cp -r benchmarks/* /workspace/benchmarks/
              cp -r examples/backends/trtllm/engine_configs/* /workspace/examples/backends/trtllm/engine_configs/
              cd /workspace
              rm -rf /tmp/dynamo-scripts
              echo "[setup] Benchmark scripts updated"

              echo "[setup] Installing aiperf and psutil..."
              uv pip install aiperf psutil
              echo "[setup] Dependencies installed"

              # ── Patch TRT-LLM bug ──────────────────────────────────────
              echo "[setup] Patching TRT-LLM Qwen3-VL multimodal_embedding bug..."
              TRTLLM_QWEN3VL="/opt/dynamo/venv/lib/python3.12/site-packages/tensorrt_llm/_torch/models/modeling_qwen3vl.py"
              if grep -q 'or data.get("multimodal_embedding")$' "$TRTLLM_QWEN3VL" 2>/dev/null; then
                  sed -i 's/or data.get("multimodal_embedding")$/or data.get("multimodal_embedding") is not None/' "$TRTLLM_QWEN3VL"
                  echo "  Patched"
              else
                  echo "  Already patched or not found — skipping"
              fi

              # ── Helpers ─────────────────────────────────────────────────
              BENCH_DIR="benchmarks/multimodal/sweep/experiments/qwen3_vl_30b_b200"

              config_to_script() {
                  local cfg="$1"
                  case "$cfg" in
                      dp-*)   echo "$BENCH_DIR/launch_dp${cfg#dp-}.sh" ;;
                      agg)    echo "$BENCH_DIR/launch_agg.sh" ;;
                      epd-*)  echo "$BENCH_DIR/launch_${cfg//-/_}.sh" ;;
                  esac
              }

              # Background server.log tailer
              tail_server_log() {
                  local log_dir="$OUTPUT_DIR"
                  while true; do
                      local log_file=$(find "$log_dir" -name "server.log" -newer /tmp/.last_tail 2>/dev/null | head -1)
                      if [[ -n "$log_file" ]]; then
                          echo "[server.log] === Tailing $log_file ==="
                          tail -f "$log_file" 2>/dev/null | sed 's/^/[server.log] /' &
                          TAIL_PID=$!
                          touch /tmp/.last_tail
                          wait $TAIL_PID 2>/dev/null || true
                      fi
                      sleep 5
                  done
              }
              touch /tmp/.last_tail
              tail_server_log &
              TAIL_SERVER_PID=$!

              # ── Run sweep: images × configs × QPS ──────────────────────
              mkdir -p "$OUTPUT_DIR"

              for NUM_IMAGES in $IMAGE_COUNTS; do
                  echo ""
                  echo "####################################################################"
                  echo "  Image count: $NUM_IMAGES (${IMG_WIDTH}x${IMG_HEIGHT})"
                  echo "####################################################################"

                  for cfg in $SWEEP_CONFIGS; do
                      launch_script=$(config_to_script "$cfg")
                      qps_yaml="[$(echo "$QPS_RATES" | tr ' ' ',')]"

                      run_yaml="/tmp/sweep_${cfg}_img${NUM_IMAGES}.yaml"
                      cat > "$run_yaml" <<YAML
              model: $MODEL
              qps_rates: $qps_yaml
              min_duration: $MIN_DURATION
              isl: $ISL
              osl: $OSL
              request_count: $REQUEST_COUNT
              warmup_count: $WARMUP_COUNT
              timeout: $TIMEOUT
              skip_plots: true
              image_width: $IMG_WIDTH
              image_height: $IMG_HEIGHT
              images_per_request: $NUM_IMAGES
              output_dir: $OUTPUT_DIR/img${NUM_IMAGES}

              configs:
                - label: $cfg
                  workflow: $launch_script
              YAML

                      echo ""
                      echo "--------------------------------------------------------------"
                      echo "  [img=$NUM_IMAGES] Config: $cfg"
                      echo "--------------------------------------------------------------"
                      cat "$run_yaml"
                      echo ""

                      python -m benchmarks.multimodal.sweep --config "$run_yaml"

                      echo ""
                      echo "[gpu] Post-cleanup after $cfg:"
                      nvidia-smi --query-gpu=index,memory.used,memory.free --format=csv,noheader
                      echo ""
                  done
              done

              # Stop tailer
              kill $TAIL_SERVER_PID 2>/dev/null || true

              echo ""
              echo "======================================================================="
              echo "  EPD vs DP Sweep complete!"
              echo "  Results: $OUTPUT_DIR"
              echo "======================================================================="
              find "$OUTPUT_DIR" -name "profile_export_aiperf.json" | sort

          resources:
            requests:
              nvidia.com/gpu: "8"
              cpu: "64"
              memory: "256Gi"
            limits:
              nvidia.com/gpu: "8"
              cpu: "128"
              memory: "512Gi"
          volumeMounts:
            - name: model-cache
              mountPath: /model-cache
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 128Gi
