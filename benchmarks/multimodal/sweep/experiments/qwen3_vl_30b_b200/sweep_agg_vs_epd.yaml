# Agg vs EPD benchmark sweep on 4xB200 with Qwen3-VL-30B-A3B-Instruct-FP8.
#
# Compares aggregated (single-GPU) against EPD with 1/2/4/6 encoders
# across concurrency levels 1–256, with ISL=1000 and ISL=400 input files.
#
# Usage:
#   python -m benchmarks.multimodal.sweep \
#     --config benchmarks/multimodal/sweep/experiments/qwen3_vl_30b_b200/sweep_agg_vs_epd.yaml

model: Qwen/Qwen3-VL-30B-A3B-Instruct-FP8
concurrencies: [1, 8, 16, 32, 64, 128, 256]
osl: 500
request_count: 1000
warmup_count: 5
timeout: 900
output_dir: benchmarks/results/qwen3_vl_30b_b200/agg_vs_epd

input_files:
  - benchmarks/multimodal/jsonl/1000req_1img_200pool_1000word_http.jsonl
  - benchmarks/multimodal/jsonl/1000req_1img_200pool_400word_http.jsonl

configs:
  - label: agg
    workflow: benchmarks/multimodal/sweep/experiments/qwen3_vl_30b_b200/launch_agg.sh

  - label: epd-1e
    workflow: benchmarks/multimodal/sweep/experiments/qwen3_vl_30b_b200/launch_epd_1e.sh

  - label: epd-2e
    workflow: benchmarks/multimodal/sweep/experiments/qwen3_vl_30b_b200/launch_epd_2e.sh

  - label: epd-4e
    workflow: benchmarks/multimodal/sweep/experiments/qwen3_vl_30b_b200/launch_epd_4e.sh

  - label: epd-6e
    workflow: benchmarks/multimodal/sweep/experiments/qwen3_vl_30b_b200/launch_epd_6e.sh
