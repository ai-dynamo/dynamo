#
# 7E+7PD vs DP-7: co-located encoder+PD pairs vs data-parallel baseline.
# Phase 1: Dry-run — 1E+1PD on 1 GPU at QPS=24 to verify no OOM.
# Phase 2: Full sweep — 7E+7PD vs DP-7 across QPS 1-24.
#
# Each GPU in 7E+7PD runs 1 encoder + 1 PD worker sharing memory.
# PD workers use agg_colocated.yaml (free_gpu_memory_fraction: 0.85).

apiVersion: batch/v1
kind: Job
metadata:
  name: trtllm-7e7pd-vs-dp7
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 7200
  template:
    metadata:
      labels:
        app: trtllm-7e7pd-vs-dp7
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.present
                    operator: In
                    values: ["true"]
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      imagePullSecrets:
        - name: nvcrimagepullsecret
      containers:
        - name: sweep
          image: nvcr.io/nvidian/dynamo-dev/kprashanth:trtllm-rc7-post1
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
          securityContext:
            privileged: true
            runAsUser: 0
          env:
            - name: MODEL
              value: "Qwen/Qwen3-VL-30B-A3B-Instruct"
            - name: SERVED_MODEL_NAME
              value: "Qwen/Qwen3-VL-30B-A3B-Instruct"
            - name: QPS_RATES
              value: "1 2 4 8 12 16 20 24"
            - name: MIN_DURATION
              value: "60"
            - name: ISL
              value: "400"
            - name: OSL
              value: "150"
            - name: IMG_WIDTH
              value: "640"
            - name: IMG_HEIGHT
              value: "640"
            - name: NUM_IMAGES
              value: "1"
            - name: REQUEST_COUNT
              value: "200"
            - name: WARMUP_COUNT
              value: "5"
            - name: TIMEOUT
              value: "1800"
            - name: OUTPUT_DIR
              value: "/model-cache/results/qwen3_vl_30b_b200/7e7pd_vs_dp7"
            - name: ETCD_ENDPOINTS
              value: "localhost:2379"
            - name: NATS_SERVER
              value: "nats://localhost:4222"
            - name: HF_HOME
              value: "/model-cache/huggingface"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: OMPI_MCA_btl
              value: "tcp,self"
            - name: OMPI_MCA_pml
              value: "ob1"
            - name: UCX_TLS
              value: "tcp,cuda_copy,cuda_ipc,self,sm"
            - name: UCX_NET_DEVICES
              value: "all"
            - name: NVIDIA_GDRCOPY
              value: "1"
            - name: NCCL_CUMEM_ENABLE
              value: "1"
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: HF_TOKEN
          command: ["/bin/bash", "-l", "-c"]
          args:
            - |
              set -euo pipefail

              echo "======================================================================="
              echo "  7E+7PD vs DP-7 Benchmark"
              echo "  Phase 1: Dry-run (1E+1PD co-located on 1 GPU, QPS=24)"
              echo "  Phase 2: Full sweep (7E+7PD vs DP-7, QPS 1-24)"
              echo "  ISL=$ISL  OSL=$OSL  Images=${NUM_IMAGES}x${IMG_WIDTH}x${IMG_HEIGHT}"
              echo "  Model: $MODEL"
              echo "======================================================================="

              ulimit -l unlimited

              echo ""
              echo "[gpu] Available GPUs:"
              nvidia-smi --query-gpu=index,name,memory.total,memory.free --format=csv,noheader
              echo ""

              echo "[infra] Starting etcd and nats-server..."
              etcd --listen-client-urls http://0.0.0.0:2379 \
                   --advertise-client-urls http://0.0.0.0:2379 \
                   --data-dir /tmp/etcd &
              nats-server -js &
              sleep 3
              echo "[infra] etcd and nats-server running"

              echo "[setup] Fetching latest benchmark scripts (sparse, no LFS)..."
              cd /tmp
              export GIT_LFS_SKIP_SMUDGE=1
              git clone --depth=1 --filter=blob:none --sparse \
                https://github.com/ai-dynamo/dynamo.git -b kprashanth/trtllm-bench dynamo-scripts
              cd dynamo-scripts
              git sparse-checkout set benchmarks examples/backends/trtllm/engine_configs
              cp -r benchmarks/* /workspace/benchmarks/
              cp -r examples/backends/trtllm/engine_configs/* /workspace/examples/backends/trtllm/engine_configs/
              cd /workspace
              rm -rf /tmp/dynamo-scripts
              echo "[setup] Benchmark scripts updated"

              echo "[setup] Installing aiperf and psutil..."
              uv pip install aiperf psutil
              echo "[setup] Dependencies installed"

              echo "[setup] Patching TRT-LLM Qwen3-VL multimodal_embedding bug..."
              TRTLLM_QWEN3VL="/opt/dynamo/venv/lib/python3.12/site-packages/tensorrt_llm/_torch/models/modeling_qwen3vl.py"
              if grep -q 'or data.get("multimodal_embedding")$' "$TRTLLM_QWEN3VL" 2>/dev/null; then
                  sed -i 's/or data.get("multimodal_embedding")$/or data.get("multimodal_embedding") is not None/' "$TRTLLM_QWEN3VL"
                  echo "  Patched"
              else
                  echo "  Already patched or not found — skipping"
              fi

              BENCH_DIR="benchmarks/multimodal/sweep/experiments/qwen3_vl_30b_b200"

              config_to_script() {
                  local cfg="$1"
                  case "$cfg" in
                      dp-*)    echo "$BENCH_DIR/launch_dp${cfg#dp-}.sh" ;;
                      7e7pd)   echo "$BENCH_DIR/launch_7e7pd.sh" ;;
                      1e1pd)   echo "$BENCH_DIR/launch_1e1pd_dryrun.sh" ;;
                      *)       echo "$BENCH_DIR/launch_${cfg//-/_}.sh" ;;
                  esac
              }

              # Background server.log tailer
              tail_server_log() {
                  local log_dir="$OUTPUT_DIR"
                  while true; do
                      local log_file=$(find "$log_dir" -name "server.log" -newer /tmp/.last_tail 2>/dev/null | head -1)
                      if [[ -n "$log_file" ]]; then
                          echo "[server.log] === Tailing $log_file ==="
                          tail -f "$log_file" 2>/dev/null | sed 's/^/[server.log] /' &
                          TAIL_PID=$!
                          touch /tmp/.last_tail
                          wait $TAIL_PID 2>/dev/null || true
                      fi
                      sleep 5
                  done
              }
              touch /tmp/.last_tail
              tail_server_log &
              TAIL_SERVER_PID=$!

              mkdir -p "$OUTPUT_DIR"

              # ══════════════════════════════════════════════════════════════
              # Phase 1: Dry-run — 1E+1PD co-located on GPU 0, QPS=24
              # ══════════════════════════════════════════════════════════════
              echo ""
              echo "######################################################################"
              echo "  Phase 1: Dry-run — 1E+1PD co-located on 1 GPU, QPS=24"
              echo "######################################################################"

              # Create a minimal 1E+1PD launch script inline
              cat > /tmp/launch_1e1pd_dryrun.sh << 'DRYRUN'
              #!/bin/bash
              export DYNAMO_HOME=${DYNAMO_HOME:-"/workspace"}
              export MODEL_PATH=${MODEL_PATH:-"Qwen/Qwen3-VL-30B-A3B-Instruct"}
              export AGG_ENGINE_ARGS=${AGG_ENGINE_ARGS:-"$DYNAMO_HOME/examples/backends/trtllm/engine_configs/qwen3-vl-30b-a3b-instruct/agg_colocated.yaml"}
              export ENCODE_ENGINE_ARGS=${ENCODE_ENGINE_ARGS:-"$DYNAMO_HOME/examples/backends/trtllm/engine_configs/qwen3-vl-30b-a3b-instruct/encode.yaml"}
              export ENCODE_ENDPOINT=${ENCODE_ENDPOINT:-"dyn://dynamo.tensorrt_llm_encode.generate"}
              export MODALITY=${MODALITY:-"multimodal"}
              EXTRA_ARGS=("$@")
              for (( i=0; i<${#EXTRA_ARGS[@]}; i++ )); do
                  if [[ "${EXTRA_ARGS[$i]}" == "--model-path" || "${EXTRA_ARGS[$i]}" == "--model" ]]; then
                      MODEL_PATH="${EXTRA_ARGS[$((i+1))]}"; break; fi; done
              export SERVED_MODEL_NAME="$MODEL_PATH"
              PIDS=()
              cleanup() { kill "${PIDS[@]}" 2>/dev/null || true; wait "${PIDS[@]}" 2>/dev/null || true; }
              trap cleanup EXIT INT TERM
              python3 -m dynamo.frontend --router-mode kv &
              PIDS+=($!); DYNAMO_PID=$!
              # Co-locate encoder + PD on GPU 0
              CUDA_VISIBLE_DEVICES=0 python3 -m dynamo.trtllm \
                --model-path "$MODEL_PATH" --served-model-name "$SERVED_MODEL_NAME" \
                --extra-engine-args "$ENCODE_ENGINE_ARGS" --modality "$MODALITY" \
                --disaggregation-mode encode "${EXTRA_ARGS[@]}" &
              PIDS+=($!)
              CUDA_VISIBLE_DEVICES=0 python3 -m dynamo.trtllm \
                --model-path "$MODEL_PATH" --served-model-name "$SERVED_MODEL_NAME" \
                --extra-engine-args "$AGG_ENGINE_ARGS" --modality "$MODALITY" \
                --encode-endpoint "$ENCODE_ENDPOINT" --publish-events-and-metrics \
                "${EXTRA_ARGS[@]}" &
              PIDS+=($!)
              wait $DYNAMO_PID
              DRYRUN
              chmod +x /tmp/launch_1e1pd_dryrun.sh

              dryrun_yaml="/tmp/dryrun_1e1pd.yaml"
              cat > "$dryrun_yaml" <<YAML
              model: $MODEL
              qps_rates: [24]
              min_duration: $MIN_DURATION
              isl: $ISL
              osl: $OSL
              request_count: $REQUEST_COUNT
              warmup_count: $WARMUP_COUNT
              timeout: $TIMEOUT
              skip_plots: true
              image_width: $IMG_WIDTH
              image_height: $IMG_HEIGHT
              images_per_request: $NUM_IMAGES
              output_dir: $OUTPUT_DIR/dryrun_1e1pd

              configs:
                - label: 1e1pd-gpu0
                  workflow: /tmp/launch_1e1pd_dryrun.sh
              YAML

              echo ""
              echo "[dryrun] Config:"
              cat "$dryrun_yaml"
              echo ""

              if python -m benchmarks.multimodal.sweep --config "$dryrun_yaml"; then
                  echo ""
                  echo "[dryrun] SUCCESS — 1E+1PD co-location works on B200!"
                  echo "[dryrun] Proceeding to Phase 2..."
              else
                  echo ""
                  echo "[dryrun] FAILED — co-location caused errors. Aborting."
                  echo "[gpu] GPU state after failure:"
                  nvidia-smi --query-gpu=index,memory.used,memory.free --format=csv,noheader
                  kill $TAIL_SERVER_PID 2>/dev/null || true
                  exit 1
              fi

              echo ""
              echo "[gpu] Post dry-run GPU state:"
              nvidia-smi --query-gpu=index,memory.used,memory.free --format=csv,noheader
              echo ""

              # ══════════════════════════════════════════════════════════════
              # Phase 2: Full sweep — DP-7 then 7E+7PD
              # ══════════════════════════════════════════════════════════════
              echo ""
              echo "######################################################################"
              echo "  Phase 2: Full sweep — DP-7 vs 7E+7PD"
              echo "######################################################################"

              for cfg in dp-7 7e7pd; do
                  launch_script=$(config_to_script "$cfg")
                  qps_yaml="[$(echo "$QPS_RATES" | tr ' ' ',')]"

                  run_yaml="/tmp/sweep_${cfg}.yaml"
                  cat > "$run_yaml" <<YAML
              model: $MODEL
              qps_rates: $qps_yaml
              min_duration: $MIN_DURATION
              isl: $ISL
              osl: $OSL
              request_count: $REQUEST_COUNT
              warmup_count: $WARMUP_COUNT
              timeout: $TIMEOUT
              skip_plots: true
              image_width: $IMG_WIDTH
              image_height: $IMG_HEIGHT
              images_per_request: $NUM_IMAGES
              output_dir: $OUTPUT_DIR

              configs:
                - label: $cfg
                  workflow: $launch_script
              YAML

                  echo ""
                  echo "============================================================"
                  echo "  Config: $cfg"
                  echo "============================================================"
                  cat "$run_yaml"
                  echo ""

                  python -m benchmarks.multimodal.sweep --config "$run_yaml"

                  echo ""
                  echo "[gpu] Post-cleanup after $cfg:"
                  nvidia-smi --query-gpu=index,memory.used,memory.free --format=csv,noheader
                  echo ""
              done

              kill $TAIL_SERVER_PID 2>/dev/null || true

              echo ""
              echo "======================================================================="
              echo "  7E+7PD vs DP-7 Sweep complete!"
              echo "  Results: $OUTPUT_DIR"
              echo "======================================================================="
              find "$OUTPUT_DIR" -name "profile_export_aiperf.json" | sort

          resources:
            requests:
              nvidia.com/gpu: "7"
              cpu: "64"
              memory: "256Gi"
            limits:
              nvidia.com/gpu: "7"
              cpu: "128"
              memory: "512Gi"
          volumeMounts:
            - name: model-cache
              mountPath: /model-cache
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 128Gi
