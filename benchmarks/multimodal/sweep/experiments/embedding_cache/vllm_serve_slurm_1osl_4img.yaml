# 1-OSL sweep with 4 images per request: embedding cache ON vs OFF.
# Pool sizes scaled 4× from 1img to maintain the same reuse rates (80%, 50%, 20%).
#
# Total runs: 6 datasets × 2 configs × 5 request_rates = 60
#
# Usage:
#   bash benchmarks/multimodal/sweep/experiments/embedding_cache/run_vllm_serve_slurm.sh \
#     --config benchmarks/multimodal/sweep/experiments/embedding_cache/vllm_serve_slurm_1osl_4img.yaml

model: Qwen/Qwen3-VL-30B-A3B-Instruct-FP8
request_rates: [4, 8, 16, 32, 64]
osl: 1
request_count: 1000
warmup_count: 5
port: 8000
timeout: 900
output_dir: benchmarks/multimodal/sweep/results/vllm_serve_slurm_1osl_4img

env:
  ENABLE_ENCODER_CACHE: "0"

input_files:
  - benchmarks/multimodal/jsonl/1000req_4img_800pool_400word_http.jsonl
  - benchmarks/multimodal/jsonl/1000req_4img_800pool_400word_base64.jsonl
  - benchmarks/multimodal/jsonl/1000req_4img_2000pool_400word_http.jsonl
  - benchmarks/multimodal/jsonl/1000req_4img_2000pool_400word_base64.jsonl
  - benchmarks/multimodal/jsonl/1000req_4img_3200pool_400word_http.jsonl
  - benchmarks/multimodal/jsonl/1000req_4img_3200pool_400word_base64.jsonl

configs:
  - label: cache-off
    workflow: examples/backends/vllm/launch/vllm_serve_embedding_cache.sh
    extra_args: [--no-enable-prefix-caching, --multimodal-embedding-cache-capacity-gb, "0"]

  - label: cache-on
    workflow: examples/backends/vllm/launch/vllm_serve_embedding_cache.sh
    extra_args: [--no-enable-prefix-caching, --multimodal-embedding-cache-capacity-gb, "10"]
