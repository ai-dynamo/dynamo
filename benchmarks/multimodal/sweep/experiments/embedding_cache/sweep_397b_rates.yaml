# Sliding-window: 8K ISL, 5x 2400x1080 images, 1K OSL.
# vllm serve baseline vs Dynamo (frontend decoding + embedding cache).

model: Qwen/Qwen3.5-397B-A17B-FP8
request_rates: [1, 2, 4]
osl: 1024
request_count: 100
warmup_count: 5
port: 8000
timeout: 2400
output_dir: /dynamo-tmp/logs/04-16/sweep_397b_rates
restart_server_every_benchmark: true
skip_plots: true

input_files:
  - /dynamo-tmp/data/10u_10t_5w_8000word_base64.jsonl

configs:
  - label: vllm-serve
    workflow: benchmarks/multimodal/sweep/workflows/vllm_serve.sh
    extra_args:
      - --tensor-parallel-size
      - "8"
      - --enable-expert-parallel
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --reasoning-parser
      - qwen3
      - --mm-encoder-tp-mode
      - data
      - --mm-processor-cache-gb
      - "60"
      - --enable-prefix-caching
      - --max-model-len
      - "32768"

  - label: dynamo-ec
    workflow: benchmarks/multimodal/sweep/workflows/dynamo_serve.sh
    extra_args:
      - --tensor-parallel-size
      - "8"
      - --enable-expert-parallel
      - --enable-multimodal
      - --dyn-tool-call-parser
      - qwen3_coder
      - --dyn-reasoning-parser
      - qwen3
      - --mm-encoder-tp-mode
      - data
      - --mm-processor-cache-gb
      - "30"
      - --multimodal-embedding-cache-capacity-gb
      - "4"
      - --enable-prefix-caching
      - --gpu-memory-utilization
      - "0.9"
      - --max-model-len
      - "32768"
      - --frontend-decoding
