#
# This config allows you to customize exact ISL, OSL, and image targets
# per turn of a multi-turn conversation.
#
# Usage:
#   python raw_replay/generate_raw_replay.py \
#       --config raw_replay/raw_replay.yaml \
#       --output-dir /tmp/raw_replay_output \
#       --num-conversations 100 \
#       --seed 42

defaults:
  model: "Qwen3/Qwen3-VL-30B-A3B-Instruct-FP8"

extra_inputs:
  min_tokens: 300
  ignore_eos: true

phases:
  - name: "turn_1"
    system_tokens: 100
    user_tokens: 300
    max_output_tokens: 10
    images:
      count: 3
      width: 512
      height: 512

  - name: "turn_2"
    system_tokens: 200
    user_tokens: 600
    max_output_tokens: 20
    extra_inputs:
      min_tokens: 500

  - name: "turn_3"
    system_tokens: 300
    user_tokens: 900
    max_output_tokens: 30
