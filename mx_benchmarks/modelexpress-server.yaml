# ModelExpress Server deployment with Redis sidecar for P2P transfer coordination
apiVersion: v1
kind: Service
metadata:
  name: modelexpress-server
  labels:
    app: modelexpress-server
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: 8001
      name: grpc
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: modelexpress-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modelexpress-server
  labels:
    app: modelexpress-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: modelexpress-server
  template:
    metadata:
      labels:
        app: modelexpress-server
    spec:
      # Native sidecar: Redis starts first and stays running
      initContainers:
        - name: redis
          image: redis:7-alpine
          restartPolicy: Always
          ports:
            - containerPort: 6379
          resources:
            limits:
              cpu: "1"
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 2Gi
          startupProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 1
            periodSeconds: 1
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 6379
            periodSeconds: 10

      imagePullSecrets:
        - name: ngc-secret
      containers:
        - name: modelexpress-server
          image: nvcr.io/nvidian/dynamo-dev/modelexpress-server:64f9249
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          env:
            - name: REDIS_URL
              value: "redis://localhost:6379"
            - name: MODEL_EXPRESS_DATABASE_PATH
              value: "/models/models.db"
            - name: MODEL_EXPRESS_CACHE_DIRECTORY
              value: "/models"
            - name: MODEL_CACHE_PATH
              value: "/models"
            - name: HF_HUB_CACHE
              value: "/models"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: HF_TOKEN
          resources:
            requests:
              cpu: 4
              memory: 8Gi
          livenessProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: model-cache
              mountPath: /models
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-llama