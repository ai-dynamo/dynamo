<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dynamo Test Health</title>
  <style>
    :root { --bg: #0f1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --muted: #8b949e; --green: #3fb950; --red: #f85149; --yellow: #d29922; --blue: #58a6ff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); padding: 2rem; }
    h1 { font-size: 1.75rem; margin-bottom: 0.25rem; }
    .subtitle { color: var(--muted); font-size: 0.875rem; margin-bottom: 2rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.25rem; max-width: 1200px; }
    .tile { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; text-decoration: none; color: var(--text); transition: border-color 0.2s, transform 0.15s; display: flex; flex-direction: column; gap: 1rem; }
    .tile:hover { border-color: var(--blue); transform: translateY(-2px); }
    .tile-header { display: flex; justify-content: space-between; align-items: center; }
    .tile-name { font-size: 1.125rem; font-weight: 600; }
    .tile-status { font-size: 0.75rem; font-weight: 600; padding: 0.2rem 0.6rem; border-radius: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    .tile-status.passed { background: rgba(63, 185, 80, 0.15); color: var(--green); }
    .tile-status.failed { background: rgba(248, 81, 73, 0.15); color: var(--red); }
    .tile-status.unknown { background: rgba(139, 148, 158, 0.15); color: var(--muted); }
    .stats { display: flex; gap: 1rem; flex-wrap: wrap; }
    .stat { display: flex; flex-direction: column; }
    .stat-value { font-size: 1.5rem; font-weight: 700; }
    .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value.passed { color: var(--green); }
    .stat-value.failed { color: var(--red); }
    .stat-value.skipped { color: var(--yellow); }
    .stat-value.total { color: var(--text); }
    .bar { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; display: flex; }
    .bar-passed { background: var(--green); }
    .bar-failed { background: var(--red); }
    .bar-skipped { background: var(--yellow); }
    .tile-meta { font-size: 0.75rem; color: var(--muted); display: flex; gap: 1rem; flex-wrap: wrap; }
    .tile-meta a { color: var(--blue); text-decoration: none; }
    .tile-meta a:hover { text-decoration: underline; }
    .tile.loading .tile-body { opacity: 0.3; }
    .tile-body { display: flex; flex-direction: column; gap: 0.75rem; }
    .no-data { color: var(--muted); font-size: 0.875rem; }
  </style>
</head>
<body>
  <h1>Dynamo Test Health</h1>
  <p class="subtitle">Allure test reports across CI workflows</p>
  <div class="grid" id="grid"></div>

  <script>
    var BASE = '/dynamo';
    var tiles = [
      { name: 'Pre-Merge', path: '/pre-merge', desc: 'PR validation tests' },
      { name: 'Post-Merge', path: '/post-merge', desc: 'Post-merge regression tests' },
      { name: 'Nightly', path: '/nightly', desc: 'Nightly full test suite' },
      { name: 'Release', path: '/release', desc: 'Release validation tests' },
    ];

    var grid = document.getElementById('grid');

    tiles.forEach(function (tile) {
      var el = document.createElement('a');
      el.className = 'tile loading';
      el.href = BASE + tile.path + '/';
      el.innerHTML =
        '<div class="tile-header">' +
          '<span class="tile-name">' + tile.name + '</span>' +
          '<span class="tile-status unknown">loading</span>' +
        '</div>' +
        '<div class="tile-body">' +
          '<div class="no-data">Loading report data...</div>' +
        '</div>';
      grid.appendChild(el);

      fetch(BASE + tile.path + '/summary.json')
        .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
        .then(function (d) {
          var stats = d.stats || d.statistic || {};
          var total = stats.total || 0;
          var passed = stats.passed || 0;
          var failed = (stats.failed || 0) + (stats.broken || 0);
          var skipped = stats.skipped || 0;
          var status = failed > 0 ? 'failed' : (total > 0 ? 'passed' : 'unknown');
          var pctPassed = total ? (passed / total * 100).toFixed(0) : 0;
          var pctFailed = total ? (failed / total * 100).toFixed(0) : 0;
          var pctSkipped = total ? (skipped / total * 100).toFixed(0) : 0;

          var meta = '';
          if (d.createdAt) {
            var date = new Date(d.createdAt);
            meta += '<span>Updated: ' + date.toLocaleDateString() + ' ' + date.toLocaleTimeString() + '</span>';
          }
          if (d.jobHref) {
            meta += '<a href="' + d.jobHref + '" target="_blank" rel="noopener">CI Run</a>';
          }

          el.className = 'tile';
          el.innerHTML =
            '<div class="tile-header">' +
              '<span class="tile-name">' + tile.name + '</span>' +
              '<span class="tile-status ' + status + '">' + status + '</span>' +
            '</div>' +
            '<div class="tile-body">' +
              '<div class="stats">' +
                '<div class="stat"><span class="stat-value total">' + total + '</span><span class="stat-label">Total</span></div>' +
                '<div class="stat"><span class="stat-value passed">' + passed + '</span><span class="stat-label">Passed</span></div>' +
                (failed > 0 ? '<div class="stat"><span class="stat-value failed">' + failed + '</span><span class="stat-label">Failed</span></div>' : '') +
                (skipped > 0 ? '<div class="stat"><span class="stat-value skipped">' + skipped + '</span><span class="stat-label">Skipped</span></div>' : '') +
              '</div>' +
              '<div class="bar">' +
                '<div class="bar-passed" style="width:' + pctPassed + '%"></div>' +
                '<div class="bar-failed" style="width:' + pctFailed + '%"></div>' +
                '<div class="bar-skipped" style="width:' + pctSkipped + '%"></div>' +
              '</div>' +
              (meta ? '<div class="tile-meta">' + meta + '</div>' : '') +
            '</div>';
        })
        .catch(function () {
          el.className = 'tile';
          el.innerHTML =
            '<div class="tile-header">' +
              '<span class="tile-name">' + tile.name + '</span>' +
              '<span class="tile-status unknown">no data</span>' +
            '</div>' +
            '<div class="tile-body">' +
              '<div class="no-data">No report available yet. This report will appear after the first ' + tile.name.toLowerCase() + ' CI run.</div>' +
            '</div>';
          el.removeAttribute('href');
          el.style.cursor = 'default';
        });
    });
  </script>
</body>
</html>
