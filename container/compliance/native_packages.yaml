#
# Hand-curated overlay for from-source components we build inside our
# Dockerfiles. These don't show up via dpkg-query (apt didn't install
# them), aren't Python wheels / Rust crates / Go modules, so the per-
# ecosystem generators miss them. This file makes them visible in
# /legal/native/NOTICES-Native.txt.
#
# Consumed by container/compliance/generators/native.py:
#   python3 -m compliance.generators \
#       --ecosystem ...,native \
#       --native-yaml /opt/compliance/native_packages.yaml \
#       --native-image <component-name> \
#       --output-dir /legal
#
# `images` is the filter key. Each runtime/agent image's licenses stage
# passes its own component name via --native-image so the generator
# only emits the components that actually ship in that image.
#
# Schema per entry:
#   name:              human-readable component name
#   version:           upstream version / ref shipped
#   license:           SPDX expression
#   source:            upstream URL (repo or tarball location)
#   license_text_path: (optional) path inside the licenses-stage
#                      filesystem where the full LICENSE text lives,
#                      so the generator can inline it under each
#                      NOTICES section
#   images:            list of image names this component ships in;
#                      --native-image must match one of these
#                      ("snapshot-agent" today; ucx/libfabric/etc.
#                      added when framework runtimes wire native in)

packages:
  # --- EFA (Elastic Fabric Adapter) components ---
  # Installed by container/templates/aws.Dockerfile via AWS-published EFA
  # installers. The licenses stage precedes the final AWS stage, so its dpkg
  # scan cannot see those later additions; this YAML overlay attributes them.
  #
  # Image filter:
  #   - vllm-runtime-efa: baseline (nvcr.io/nvidia/cuda:X.Y-runtime) has
  #     no libfabric, so EFA legitimately adds both libs.
  #   - trtllm-runtime-efa: baseline (cuda-dl-base) already ships
  #     libfabric-aws@2.1.0amzn5.0, but the EFA installer may install a
  #     different version; explicit attribution closes the version-skew
  #     gap defensively.
  #   - sglang-runtime-efa has a separate EFA 1.49 entry below because
  #     release/1.3 intentionally retains the installer's newer native stack.
  - name: libfabric
    # AWS fork: shipped by EFA installer 1.47.0 as libfabric1-aws_2.4.0amzn1.0
    # (Ubuntu 24.04 DEB). The `amzn1.0` suffix indicates an AWS patch set on
    # top of upstream libfabric 2.4.0; preserved here for OSRB traceability.
    version: 2.4.0amzn1.0
    license: BSD-2-Clause
    source: https://github.com/ofiwg/libfabric
    images:
      - vllm-runtime-efa
      - trtllm-runtime-efa

  - &sglang_efa_libfabric
    name: libfabric1-aws
    # DYN-3429 release/1.3 SGLang EFA stack. EFA Installer 1.49.0 ships
    # the AWS patch set on top of upstream libfabric 2.4.0.
    version: 2.4.0amzn5.0
    license: BSD-2-Clause
    source: https://github.com/aws/libfabric/tree/v2.4.0amzn5.0
    images:
      - sglang-runtime-efa

  - <<: *sglang_efa_libfabric
    name: libfabric-aws-bin

  - <<: *sglang_efa_libfabric
    name: libfabric-aws-dev

  # EFA Installer 1.49.0's --build-ngc path installs the complete matching
  # rdma-core package set. Keep the dpkg names exact so the final-image Syft
  # audit can match components generated after the earlier licenses stage.
  - &sglang_efa_rdma_core
    name: rdma-core
    version: "63.0-1"
    # The binary payload chooses the permissive alternatives documented by
    # the exact Ubuntu 24.04 DEB copyright file shipped in EFA 1.49. All 16
    # rdma-core DEBs on both architectures carry the same 31,156-byte file
    # (SHA-256 347f499a99055771ef8d23f4832f7a88d4313a72c33210fe3f362cc73f0c78cf).
    license: LicenseRef-BSD-MIT AND BSD-2-Clause AND BSD-3-Clause AND MIT AND CC0-1.0
    source: https://github.com/linux-rdma/rdma-core/tree/v63.0
    license_text_path: /opt/compliance/native_licenses/rdma-core-v63.0-debian-copyright
    images:
      - sglang-runtime-efa

  - <<: *sglang_efa_rdma_core
    name: ibacm

  - <<: *sglang_efa_rdma_core
    name: ibverbs-providers

  - <<: *sglang_efa_rdma_core
    name: ibverbs-utils

  - <<: *sglang_efa_rdma_core
    name: infiniband-diags

  - <<: *sglang_efa_rdma_core
    name: libibmad-dev

  - <<: *sglang_efa_rdma_core
    name: libibmad5

  - <<: *sglang_efa_rdma_core
    name: libibnetdisc-dev

  - <<: *sglang_efa_rdma_core
    name: libibnetdisc5

  - <<: *sglang_efa_rdma_core
    name: libibumad-dev

  - <<: *sglang_efa_rdma_core
    name: libibumad3

  - <<: *sglang_efa_rdma_core
    name: libibverbs-dev

  - <<: *sglang_efa_rdma_core
    name: libibverbs1

  - <<: *sglang_efa_rdma_core
    name: librdmacm-dev

  - <<: *sglang_efa_rdma_core
    name: librdmacm1

  - <<: *sglang_efa_rdma_core
    name: rdmacm-utils

  - name: NIXL LIBFABRIC plugin
    # Temporary NIXL 1.3.0 semantic backport of ai-dynamo/nixl PR #1966.
    # The final image retains the exact patch, source hashes, and Apache-2.0
    # license under /opt/dynamo/patches/nixl-pr1966.
    version: 1.3.0-pr1966-d1e60ec
    license: Apache-2.0
    source: https://github.com/ai-dynamo/nixl
    images:
      - sglang-runtime-efa

  - name: aws-ofi-nccl
    # Shipped by EFA installer 1.47.0 as libnccl-ofi_1.18.0-1 (Ubuntu 24.04 DEB).
    version: 1.18.0
    license: Apache-2.0
    source: https://github.com/aws/aws-ofi-nccl
    images:
      - vllm-runtime-efa
      - trtllm-runtime-efa

  # --- From-source binaries built in wheel_builder / dynamo_base and copied
  # into the runtime images (no apt/pip/cargo metadata, so the python/rust/dpkg
  # generators miss them). Image filters are best-effort by build config; the
  # <framework>-compliance-audit job (syft scan of the pushed image) is the
  # authoritative completeness check and will surface any miss or over-list.
  # NOTE: NIXL ships as the `nixl` Python wheel (attributed by the python
  # generator), so it is intentionally NOT duplicated here.

  # LGPL media stack — built --disable-gpl in wheel_builder (h264_nvenc + libvpx)
  # and copied into vllm/sglang runtime (container/templates/vllm_runtime.Dockerfile
  # + sglang_runtime.Dockerfile). Replaces the purged GPL apt ffmpeg.
  - name: ffmpeg
    version: "8.1"
    license: LGPL-2.1-or-later
    source: https://ffmpeg.org/
    images:
      - vllm-runtime
      - vllm-runtime-efa
      - sglang-runtime
      - sglang-runtime-efa

  - name: libvpx
    # VP8/VP9 codec library, ffmpeg's only non-NVIDIA encoder dependency.
    version: v1.14.1
    license: BSD-3-Clause
    source: https://chromium.googlesource.com/webm/libvpx
    images:
      - vllm-runtime
      - vllm-runtime-efa
      - sglang-runtime
      - sglang-runtime-efa

  # UCX — Unified Communication X, built from source in wheel_builder and used by
  # the NIXL transport. Installed to /usr/local (no dpkg metadata).
  - name: UCX
    version: v1.20.x
    license: BSD-3-Clause
    source: https://github.com/openucx/ucx
    images:
      - vllm-runtime
      - vllm-runtime-efa
      - sglang-runtime
      - sglang-runtime-efa
      - trtllm-runtime
      - trtllm-runtime-efa

  # gdrcopy — GPUDirect RDMA copy library, built from source in wheel_builder for
  # CUDA images and installed outside apt.
  - name: gdrcopy
    version: v2.5.2
    license: MIT
    source: https://github.com/NVIDIA/gdrcopy
    images:
      - vllm-runtime
      - vllm-runtime-efa
      - trtllm-runtime
      - trtllm-runtime-efa

  # etcd — coordination store, downloaded as a release binary in dynamo_base and
  # placed at /usr/local/bin (no apt metadata).
  - name: etcd
    version: v3.5.30
    license: Apache-2.0
    source: https://github.com/etcd-io/etcd
    images:
      - vllm-runtime
      - vllm-runtime-efa
      - sglang-runtime
      - sglang-runtime-efa
      - trtllm-runtime
      - trtllm-runtime-efa
      - dynamo-planner

  # nats-server — messaging server, downloaded as a .deb in dynamo_base (dpkg -i
  # may not survive into the final runtime layer attribution reliably).
  - name: nats-server
    version: v2.10.28
    license: Apache-2.0
    source: https://github.com/nats-io/nats-server
    images:
      - vllm-runtime
      - vllm-runtime-efa
      - sglang-runtime
      - sglang-runtime-efa
      - trtllm-runtime
      - trtllm-runtime-efa
      - dynamo-planner
