[project]
name = "dynamo-attributions"
version = "1.0.0"
description = "Generate third-party attribution files for Dynamo"
readme = "README.md"
authors = [
    { name = "Dan Gil", email = "dagil@nvidia.com" },
]
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
dependencies = ["requests>=2.28.0"]

classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: POSIX :: Linux",
]
keywords = ["attributions", "licenses", "dynamo", "nvidia"]

[project.scripts]
dynamo-attributions = "dynamo_attributions.cli:main"

[project.urls]
Repository = "https://github.com/ai-dynamo/dynamo.git"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
