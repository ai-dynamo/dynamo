#
# Hand-curated license overrides for packages whose upstream metadata is empty,
# malformed, or otherwise unhelpful. Consulted by container/compliance/license_db/
# lookup.py as a final fallback after license-db.json and before returning
# UNKNOWN.
#
# Match is by (ecosystem, name) — version-agnostic. If a package needs
# version-specific resolution, use license-db.json instead.
#
# Schema:
#   ecosystem: rust | go | python | dpkg | native
#   name:      package name (must match exactly what the SBOM/metadata reports)
#   license:   SPDX expression OR LicenseRef-* identifier
#   source:    REQUIRED audit trail — link to the upstream LICENSE/EULA URL
#              that establishes this license, OR a justification for why we're
#              overriding upstream (e.g. "PyPI metadata empty; verified at <URL>")
#
# Add a new entry: confirm the upstream license, paste the URL into source:,
# pick the SPDX ID, and (if it's a LicenseRef-*) make sure it appears in
# container/compliance/policy/licenses.toml's [licenses].allow list — otherwise
# the policy gate will reject it.

overrides:
  # --- NVIDIA CUDA Python wheels ---
  # Most ship via pypi.nvidia.com; the wheel METADATA's License field is empty
  # or contains marketing prose. The actual EULA is bundled in the wheel
  # under .dist-info/LICENSE.txt. SPDX has no NVIDIA-specific ID, so we use
  # LicenseRef-NVIDIA-Proprietary (matches what the modern nvidia-*-cu13
  # wheels publish in License-Expression).
  - ecosystem: python
    name: nvidia-cuda-cupti
    license: LicenseRef-NVIDIA-Proprietary
    source: "NVIDIA CUDA Toolkit EULA — https://docs.nvidia.com/cuda/eula/index.html"

  - ecosystem: python
    name: nvidia-cuda-nvrtc
    license: LicenseRef-NVIDIA-Proprietary
    source: "NVIDIA CUDA Toolkit EULA — https://docs.nvidia.com/cuda/eula/index.html"

  - ecosystem: python
    name: nvidia-cuda-runtime
    license: LicenseRef-NVIDIA-Proprietary
    source: "NVIDIA CUDA Toolkit EULA — https://docs.nvidia.com/cuda/eula/index.html"

