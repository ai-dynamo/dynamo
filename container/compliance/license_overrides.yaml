  # --- NVIDIA CUDA Toolkit dpkgs ---
  # Apt-installed CUDA components from the NVIDIA repo. Their copyright files
  # reference /usr/share/common-licenses/GPL-3 because some bundled GDB-related
  # binaries (cuda-gdb) inherit GDB's GPL-3 license. The packages themselves
  # are governed by the NVIDIA CUDA Toolkit EULA.
  # Override is by (ecosystem, name) — version-agnostic. CUDA-version suffix
  # (e.g., -12-9) is part of the package name, so each major.minor needs its
  # own entry; the patch version is what changes between rebuilds.
  - { ecosystem: dpkg, name: cuda-cccl-12-9,                   license: LicenseRef-NVIDIA-Proprietary, source: "NVIDIA CUDA Toolkit EULA" }
