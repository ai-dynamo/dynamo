name: Allure Test Report

on:
  workflow_run:
    workflows:
      - 'PR'
      - 'Post-Merge CI Pipeline'
      - 'Nightly CI Pipeline'
      - 'Release Pipeline'
    types: [completed]

  workflow_dispatch:
    inputs:
      run_id:
        description: 'Workflow run ID to download allure-results artifacts from'
        required: true
        type: string
      report_subdir:
        description: 'Subdirectory on gh-pages for the report'
        required: false
        type: string
        default: 'dev'

permissions:
  contents: write
  actions: read

jobs:
  allure-report:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion != 'skipped'
    steps:
      - uses: actions/checkout@v4

      - name: Determine report parameters
        id: params
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run_id=${{ inputs.run_id }}" >> $GITHUB_OUTPUT
            echo "subdir=${{ inputs.report_subdir }}" >> $GITHUB_OUTPUT
          else
            echo "run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
            WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
            case "$WORKFLOW_NAME" in
              "PR") echo "subdir=pre-merge" >> $GITHUB_OUTPUT ;;
              *"Post-Merge"*) echo "subdir=post-merge" >> $GITHUB_OUTPUT ;;
              *"Nightly"*) echo "subdir=nightly" >> $GITHUB_OUTPUT ;;
              *"Release"*) echo "subdir=release" >> $GITHUB_OUTPUT ;;
              *) echo "subdir=other" >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.params.outputs.run_id }}
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for Allure results
        id: check-results
        run: |
          if [ -d allure-results ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
            echo "has_results=true" >> $GITHUB_OUTPUT
            echo "Found allure results:"
            ls -la allure-results/
          else
            echo "has_results=false" >> $GITHUB_OUTPUT
            echo "No allure results found. Skipping report generation."
          fi

      - name: Install Allure CLI
        if: steps.check-results.outputs.has_results == 'true'
        run: |
          ALLURE_VERSION="2.32.0"
          wget -q "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz"
          tar -xzf "allure-${ALLURE_VERSION}.tgz"
          echo "${PWD}/allure-${ALLURE_VERSION}/bin" >> $GITHUB_PATH

      - name: Get Allure history from gh-pages
        if: steps.check-results.outputs.has_results == 'true'
        run: |
          SUBDIR="${{ steps.params.outputs.subdir }}"
          git fetch origin gh-pages:gh-pages 2>/dev/null || echo "No gh-pages branch yet"
          if git show gh-pages:${SUBDIR}/history 2>/dev/null; then
            mkdir -p allure-results/history
            git show gh-pages:${SUBDIR}/history/history.json > allure-results/history/history.json 2>/dev/null || true
            git show gh-pages:${SUBDIR}/history/history-trend.json > allure-results/history/history-trend.json 2>/dev/null || true
            git show gh-pages:${SUBDIR}/history/duration-trend.json > allure-results/history/duration-trend.json 2>/dev/null || true
            git show gh-pages:${SUBDIR}/history/categories-trend.json > allure-results/history/categories-trend.json 2>/dev/null || true
            git show gh-pages:${SUBDIR}/history/retry-trend.json > allure-results/history/retry-trend.json 2>/dev/null || true
            echo "Restored history from gh-pages/${SUBDIR}"
          else
            echo "No previous history found"
          fi

      - name: Generate Allure Report
        if: steps.check-results.outputs.has_results == 'true'
        run: |
          allure generate allure-results -o allure-report --clean

      - name: Deploy to GitHub Pages
        if: steps.check-results.outputs.has_results == 'true'
        run: |
          SUBDIR="${{ steps.params.outputs.subdir }}"
          git fetch origin gh-pages:gh-pages 2>/dev/null || true

          # Set up a working tree for gh-pages
          DEPLOY_DIR=$(mktemp -d)
          if git show-ref --verify --quiet refs/heads/gh-pages; then
            git worktree add "$DEPLOY_DIR" gh-pages
          else
            git worktree add --orphan "$DEPLOY_DIR" gh-pages
          fi

          # Copy report to subdirectory (preserve other subdirs)
          mkdir -p "$DEPLOY_DIR/${SUBDIR}"
          rm -rf "$DEPLOY_DIR/${SUBDIR}/"*
          cp -r allure-report/* "$DEPLOY_DIR/${SUBDIR}/"

          # Commit and push
          cd "$DEPLOY_DIR"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Deploy Allure report for ${SUBDIR} (run ${{ github.run_id }})"
            git push origin gh-pages
          fi

          # Cleanup worktree
          cd -
          git worktree remove "$DEPLOY_DIR" --force

      - name: Print report URL
        if: steps.check-results.outputs.has_results == 'true'
        run: |
          echo "## Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Report: https://ai-dynamo.github.io/dynamo/${{ steps.params.outputs.subdir }}/" >> $GITHUB_STEP_SUMMARY
