name: PR-XPU-Heterogeneous

on:
  issue_comment:
    types: [created]
  schedule:
    - cron: '0 23 * * *'
  push:
    branches:
      - "pull-request/[0-9]+"

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: pr-xpu-${{ github.event.issue.number || github.ref_name }}
  cancel-in-progress: true

jobs:

  # ============================================================================
  # GATE – only run XPU CI when the PR has the "xpu" label.
  # Push trigger (pull-request/* branch) already guarantees only internal
  # users / copy-pr-bot can reach this workflow.
  # ============================================================================

  guard:
    if: >-
      github.event_name != 'issue_comment' ||
      (github.event.issue.pull_request &&
      (startsWith(github.event.comment.body, '/run_xpu_heterogeneous') ||
      startsWith(github.event.comment.body, '/run_xpu_heterog')) &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    outputs:
      has_xpu_label: ${{ steps.pr-info.outputs.has_xpu_label }}
      checkout_ref: ${{ steps.pr-info.outputs.checkout_ref }}
    steps:
      - name: React to slash command
        if: github.event_name == 'issue_comment'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: 'eyes'
              });
            } catch (error) {
              core.warning(`Could not add reaction to slash command: ${error.status || 'unknown'} ${error.message}`);
            }

      - name: Get PR info and check xpu label
        id: pr-info
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            echo "has_xpu_label=true" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "🌙 Nightly XPU CI run – skipping PR label gate"
            exit 0
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "has_xpu_label=true" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "Push to ${GITHUB_REF_NAME}; running XPU CI at ${GITHUB_SHA}"
            exit 0
          fi
          
          echo "ISSUE_NUMBER=${ISSUE_NUMBER}"
          echo "$GITHUB_EVENT_PATH"
          cat "$GITHUB_EVENT_PATH"

          PR_NUMBER="${ISSUE_NUMBER}"
          if [[ -z "${PR_NUMBER}" ]]; then
            PR_NUMBER="$(jq -r '.issue.number // empty' "$GITHUB_EVENT_PATH")"
            echo "PR_NUMBER=${PR_NUMBER}"
          fi

          if [[ -z "${PR_NUMBER}" ]]; then
            echo "Could not resolve pull request number for ${GITHUB_EVENT_NAME}"
            exit 1
          fi

          PR_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}")

          # Check for xpu label
          HAS_XPU=$(jq -r '[.labels[].name] | any(. == "xpu")' <<< "${PR_JSON}")
          echo "has_xpu_label=${HAS_XPU}" >> "$GITHUB_OUTPUT"
          CHECKOUT_REF="refs/pull/${PR_NUMBER}/head"
          CHECKOUT_SHA=$(jq -r '.head.sha' <<< "${PR_JSON}")
          echo "checkout_ref=${CHECKOUT_REF}" >> "$GITHUB_OUTPUT"
          if [[ "${HAS_XPU}" == "true" ]]; then
            echo "✅ PR #${PR_NUMBER} has 'xpu' label – running XPU CI at ${CHECKOUT_REF} (${CHECKOUT_SHA})"
          else
            echo "⏭️ PR #${PR_NUMBER} does not have 'xpu' label – skipping XPU CI"
          fi

  # ============================================================================
  # CHANGE DETECTION
  # ============================================================================

  changed-files:
    needs: [guard]
    if: needs.guard.outputs.has_xpu_label == 'true'
    runs-on: ubuntu-latest
    outputs:
      core: ${{ (github.event_name == 'schedule' || github.event_name == 'issue_comment') && 'true' || steps.changes.outputs.core }}
      vllm: ${{ (github.event_name == 'schedule' || github.event_name == 'issue_comment') && 'true' || steps.changes.outputs.vllm }}
      sglang: ${{ steps.changes.outputs.sglang }}
      docker_image_gpu: ${{ steps.shared-images.outputs.docker_image_gpu }}
      checkout_ref: ${{ needs.guard.outputs.checkout_ref }}
    steps:
      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # v4.3.0
        with:
          ref: ${{ needs.guard.outputs.checkout_ref }}
          fetch-depth: 0
      - name: Check for changes
        if: github.event_name != 'schedule' && github.event_name != 'issue_comment'
        id: changes
        uses: ./.github/actions/changed-files
        with:
          gh_token: ${{ github.token }}
      - name: Set shared images
        id: shared-images
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            echo "docker_image_gpu=nvcr.io/nvidia/ai-dynamo/vllm-runtime-nightly:nightly" >> "$GITHUB_OUTPUT"
          else
            echo "docker_image_gpu=nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.1-cuda13" >> "$GITHUB_OUTPUT"
          fi

  # ============================================================================
  # BUILD XPU IMAGE
  # ============================================================================

  build-xpu:
    needs: [changed-files]
    if: >-
      needs.changed-files.outputs.core == 'true' ||
      needs.changed-files.outputs.vllm == 'true'
    runs-on: xpu-heterogeneous-ubuntu-latest
    outputs:
      image: ${{ steps.push.outputs.registry_image_tag }}
      short_sha: ${{ steps.build.outputs.short_sha }}
    env:
      FRAMEWORK: vllm
      TARGET: runtime
      DEVICE: xpu
      PLATFORM: linux/amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # v4.3.0
        with:
          ref: ${{ needs.changed-files.outputs.checkout_ref }}

      - name: Generate Dockerfile
        shell: bash
        run: |
          echo "::group::Generating XPU Dockerfile"
          python3 ./container/render.py \
              --target=${{ env.TARGET }} \
              --framework=${{ env.FRAMEWORK }} \
              --device=${{ env.DEVICE }} \
              --platform=${{ env.PLATFORM }} \
              --show-result \
              --output-short-filename
          echo "::endgroup::"

      - name: Build XPU image
        id: build
        shell: bash
        run: |
          set -x

          IMAGE_NAME="dynamo-${{ env.FRAMEWORK }}-${{ env.TARGET }}-${{ env.DEVICE }}"
          SHORT_SHA="$(git rev-parse HEAD | cut -c1-7)"
          IMAGE_TAG="${IMAGE_NAME}:${{ github.run_id }}-${SHORT_SHA}"

          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

          docker build \
            --progress=plain \
            --tag "${IMAGE_TAG}" \
            -f ./container/rendered.Dockerfile \
            . 2>&1 | tee build-xpu.log

          echo "### 🐳 XPU Image Built" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image Tag | \`${IMAGE_TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Framework | ${{ env.FRAMEWORK }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Device | ${{ env.DEVICE }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Build XPU test image
        shell: bash
        run: |
          set -x

          TEST_IMAGE_TAG="${{ steps.build.outputs.image_tag }}-test"

          docker build \
            --progress=plain \
            --tag "${TEST_IMAGE_TAG}" \
            -f container/Dockerfile.test \
            --build-arg BASE_IMAGE=${{ steps.build.outputs.image_tag }} \
            . 2>&1 | tee build-xpu-test.log

      - name: Push XPU image to registry
        id: push
        shell: bash
        run: |
          set -x

          REGISTRY="sc09super01-srv.intel.com/dynamo"
          IMAGE_TAG="${{ steps.build.outputs.image_tag }}"
          REGISTRY_IMAGE_TAG="${REGISTRY}/${IMAGE_TAG}"

          docker tag "${IMAGE_TAG}" "${REGISTRY_IMAGE_TAG}"
          docker push "${REGISTRY_IMAGE_TAG}"

          echo "registry_image_tag=${REGISTRY_IMAGE_TAG}" >> "$GITHUB_OUTPUT"

          echo "### 🚀 XPU Image Pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry Image | \`${REGISTRY_IMAGE_TAG}\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xpu-build-log
          path: |
            build-xpu.log
            build-xpu-test.log
          retention-days: 7

  # ============================================================================
  # HETEROGENEOUS P/D TESTS
  # ============================================================================

  heterog-test-px-dn:
    name: "Heterog: XPU Prefill + NVIDIA Decode"
    needs: [changed-files, build-xpu]
    if: >-
      needs.build-xpu.result == 'success' &&
      (needs.changed-files.outputs.core == 'true' ||
      needs.changed-files.outputs.vllm == 'true')
    uses: ./.github/workflows/epd-test-template.yml
    secrets: inherit
    with:
      test_name: "px-dn"
      test_yaml_path: ".ci/test/dynamo-heterog/k8s/tests/px-dn.yaml"
      runner: "xpu-heterogeneous-ubuntu-latest"
      CHECKOUT_COMMIT: ${{ needs.changed-files.outputs.checkout_ref }}
      docker_image_xpu: ${{ needs.build-xpu.outputs.image }}
      docker_image_gpu: "${{ needs.changed-files.outputs.docker_image_gpu }}"
      xpu_resource_template: "onexpu-rdma-kueue"
      nvidia_resource_template: "onenvidia-rdma-kueue"
      xpu_node: "xpu_node"
      nvidia_node: "nvidia_node"
      model: 'Qwen/Qwen3-0.6B'
      tensor_parallel: '1'

  heterog-test-pn-dx:
    name: "Heterog: NVIDIA Prefill + XPU Decode"
    needs: [changed-files, build-xpu, heterog-test-px-dn]
    if: >-
      always() &&
      needs.build-xpu.result == 'success' &&
      needs.heterog-test-px-dn.result != 'cancelled' &&
      (needs.changed-files.outputs.core == 'true' ||
      needs.changed-files.outputs.vllm == 'true')
    uses: ./.github/workflows/epd-test-template.yml
    secrets: inherit
    with:
      test_name: "pn-dx"
      test_yaml_path: ".ci/test/dynamo-heterog/k8s/tests/pn-dx.yaml"
      runner: "xpu-heterogeneous-ubuntu-latest"
      CHECKOUT_COMMIT: ${{ needs.changed-files.outputs.checkout_ref }}
      docker_image_xpu: ${{ needs.build-xpu.outputs.image }}
      docker_image_gpu: "${{ needs.changed-files.outputs.docker_image_gpu }}"
      xpu_resource_template: "onexpu-rdma-kueue"
      nvidia_resource_template: "onenvidia-rdma-kueue"
      xpu_node: "xpu_node"
      nvidia_node: "nvidia_node"
      model: 'Qwen/Qwen3-0.6B'
      tensor_parallel: '1'

  # ============================================================================
  # STATUS CHECK
  # ============================================================================

  xpu-status-check:
    runs-on: ubuntu-latest
    needs: [guard, changed-files, build-xpu, heterog-test-px-dn, heterog-test-pn-dx]
    if: always() && needs.guard.outputs.has_xpu_label == 'true'
    steps:
      - name: Check all XPU jobs
        run: |
          echo '${{ toJson(needs) }}' | jq -e 'to_entries | map(.value.result) | all(. as $result | ["success", "skipped"] | any($result == .))'
