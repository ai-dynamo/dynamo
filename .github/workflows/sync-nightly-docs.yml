name: Sync Nightly Docs

# Regenerates the backend-version tables on the Nightly Release Info page and
# the support-matrix ToT row from container/context.yaml whenever a backend
# version changes on main, and opens a PR with the result. Path-triggered so it
# catches every backend change, not only the ones the dep-upgrade bot makes.

on:
  push:
    branches: [main]
    paths:
      - container/context.yaml
      - .github/scripts/sync_nightly_backend_versions.py
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main
          fetch-depth: 0  # history reconstruction reads the full git log of context.yaml
          token: ${{ secrets.OPS_BOT_PAT }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install pyyaml

      - name: Regenerate nightly backend docs
        run: python3 .github/scripts/sync_nightly_backend_versions.py

      - name: Commit + push if changed
        id: commit
        run: |
          if git diff --quiet -- docs/reference/nightly-release-info.md docs/reference/support-matrix.md; then
            echo "No backend-version changes to sync."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name  "dynamo-ops"
          git config user.email "170655669+dynamo-ops@users.noreply.github.com"
          git switch -C docs/nightly-backend-sync
          git add docs/reference/nightly-release-info.md docs/reference/support-matrix.md
          git commit -s -m "docs: sync nightly backend versions"
          git push -f origin docs/nightly-backend-sync
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open or reuse PR
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.OPS_BOT_PAT }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh label create docs --color 0075ca \
              --description "Documentation" --force || true

          # Idempotent under reruns: the force-push above already refreshed an
          # open PR's branch, so only create one if none is open.
          if ! gh pr view docs/nightly-backend-sync --json url --jq .url 2>/dev/null; then
            gh pr create \
              --base main --head docs/nightly-backend-sync \
              --title "docs: sync nightly backend versions" \
              --label docs \
              --body "Automated sync of the Nightly Release Info backend-version tables and the support-matrix \`main (ToT)\` row from \`container/context.yaml\`. Generated by \`.github/scripts/sync_nightly_backend_versions.py\`."
          fi

      - name: Slack notification
        if: steps.commit.outputs.changed == 'true'
        continue-on-error: true
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a  # v2.1.1
        with:
          webhook: ${{ secrets.SLACK_NOTIFY_NIGHTLY_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            blocks:
              - type: "section"
                text:
                  type: mrkdwn
                  text: ":memo: *Sync Nightly Docs* — backend versions changed; opened/updated PR on `docs/nightly-backend-sync`."
