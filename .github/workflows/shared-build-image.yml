name: Build, Test, and Copy Framework Image

on:
  workflow_call:
    inputs:
      framework:
        description: 'Framework name (vllm, sglang, trtllm)'
        default: 'vllm'
        required: true
        type: string
      cuda_version:
        description: 'CUDA version to build with'
        default: '12.9'
        required: true
        type: string
      platform:
        description: 'Target platform (amd64 or arm64)'
        default: 'amd64'
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(inputs.platform) }}
        cuda_version: ${{ fromJson(inputs.cuda_version) }}
    runs-on: ubuntu-latest
    name: ${{ matrix.cuda_version }}, ${{ matrix.platform }}
    env:
      FRAMEWORK: ${{ inputs.framework }}
      CUDA_VERSION: ${{ matrix.cuda_version }}
      PLATFORM: ${{ matrix.platform }}
    steps:
      - name: Echo Build Parameters
        run: |
          echo "Framework: $FRAMEWORK"
          echo "CUDA version: $CUDA_VERSION"
          echo "Platform: $PLATFORM"
