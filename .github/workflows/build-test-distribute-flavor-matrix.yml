name: Framework Matrix Pipeline

on:
  workflow_call:
    inputs:
      framework:
        description: 'Framework name (vllm, sglang, trtllm)'
        required: true
        type: string
      device:
        description: 'Build device (cuda, xpu, cpu)'
        required: false
        type: string
        default: 'cuda'
      target:
        description: 'Target stage for Docker rendering'
        required: true
        type: string
      platform:
        description: 'Docker platform(s) to build (e.g. linux/amd64,linux/arm64)'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
      cuda_versions:
        description: 'CUDA versions to build (JSON array, e.g., ["12.9", "13.0", "non-cuda"]). Use "non-cuda" to represent XPU/CPU.'
        required: false
        type: string
        default: '["12.9"]'
      build_timeout_minutes:
        description: 'Timeout in minutes for the build step'
        required: false
        type: number
        default: 60
      run_cpu_only_tests:
        description: 'Whether to run CPU-only tests'
        required: false
        type: boolean
        default: true
      cpu_only_test_markers:
        description: 'CPU-only pytest markers'
        required: false
        type: string
      cpu_only_test_timeout_minutes:
        description: 'Timeout in minutes for CPU tests'
        required: false
        type: number
        default: 10
      run_single_gpu_tests:
        description: 'Whether to run single GPU tests'
        required: false
        type: boolean
        default: true
      single_gpu_test_markers:
        description: 'Single GPU pytest markers'
        required: false
        type: string
      single_gpu_test_timeout_minutes:
        description: 'Timeout in minutes for single GPU tests'
        required: false
        type: number
        default: 30
      run_single_xpu_tests:
        description: 'Whether to run single XPU tests'
        required: false
        type: boolean
        default: false
      single_xpu_test_markers:
        description: 'Single XPU pytest markers'
        required: false
        type: string
      single_xpu_test_timeout_minutes:
        description: 'Timeout in minutes for single XPU tests'
        required: false
        type: number
        default: 30
      run_multi_gpu_tests:
        description: 'Whether to run multi-gpu tests'
        required: false
        type: boolean
        default: true
      multi_gpu_test_markers:
        description: 'Multi GPU pytest markers'
        required: false
        type: string
      multi_gpu_test_timeout_minutes:
        description: 'Timeout in minutes for multi GPU tests'
        required: false
        type: number
        default: 30
      copy_to_acr:
        description: 'Whether to copy images to ACR'
        required: false
        type: boolean
        default: true
      copy_timeout_minutes:
        description: 'Timeout in minutes for the copy to ACR step'
        required: false
        type: number
        default: 10
      builder_name:
        description: 'Buildkit builder name'
        required: true
        type: string
      extra_tags:
        description: 'Additional tags (newline-separated, -$platform suffix auto-appended)'
        required: false
        type: string
        default: ''
      build_image:
        description: 'Whether to build image'
        required: false
        type: boolean
        default: true
      no_cache:
        description: 'Disable Docker build cache'
        required: false
        type: boolean
        default: false
      push_image:
        description: 'Push image to registry'
        required: false
        type: boolean
        default: true
      make_efa:
        description: 'Enable AWS EFA support in the build'
        required: false
        type: boolean
        default: false
      show_summary:
        description: 'Show summary'
        required: false
        type: boolean
        default: false
      fresh_builder:
        description: 'Always create a fresh K8s BuildKit builder (skip remote worker routing)'
        required: false
        type: boolean
        default: false
    secrets:
      AWS_DEFAULT_REGION:
        required: true
      AWS_ACCOUNT_ID:
        required: true
      AZURE_ACR_HOSTNAME:
        required: true
      AZURE_ACR_USER:
        required: true
      AZURE_ACR_PASSWORD:
        required: true
      SCCACHE_S3_BUCKET:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      HF_TOKEN:
        required: false

jobs:
  pipeline:
    strategy:
      fail-fast: false
      matrix:
        version_selector: ${{ fromJson(inputs.cuda_versions) }}
    # This name weirdly shows in the checks overview, but not once you dive into
    # a specific workflow. Keeping it as a short placeholder
    name: matrix
    uses: ./.github/workflows/build-test-distribute-flavor.yml
    with:
      framework: ${{ inputs.framework }}
      device: ${{ matrix.version_selector == 'non-cuda' && 'xpu' || inputs.device }}
      platform: ${{ matrix.version_selector == 'non-cuda' && 'linux/amd64' || inputs.platform }}
      target: ${{ inputs.target }}
      cuda_version: ${{ matrix.version_selector == 'non-cuda' && '' || matrix.version_selector }}
      extra_tags: ${{ inputs.extra_tags }}
      no_cache: ${{ inputs.no_cache }}
      fresh_builder: ${{ inputs.fresh_builder }}
      builder_name: ${{ inputs.builder_name }}
      build_image: ${{ inputs.build_image }}
      build_timeout_minutes: ${{ inputs.build_timeout_minutes }}
      push_image: ${{ inputs.push_image }}
      run_cpu_only_tests: ${{ inputs.run_cpu_only_tests }}
      cpu_only_test_markers: ${{ inputs.cpu_only_test_markers }}
      cpu_only_test_timeout_minutes: ${{ inputs.cpu_only_test_timeout_minutes }}
      run_single_gpu_tests: "${{ matrix.version_selector != 'non-cuda' && inputs.run_single_gpu_tests }}"
      single_gpu_test_markers: ${{ inputs.single_gpu_test_markers }}
      single_gpu_test_timeout_minutes: ${{ inputs.single_gpu_test_timeout_minutes }}
      run_single_xpu_tests: ${{ matrix.version_selector == 'non-cuda' && inputs.run_single_xpu_tests }}
      single_xpu_test_markers: ${{ inputs.single_xpu_test_markers }}
      single_xpu_test_timeout_minutes: ${{ inputs.single_xpu_test_timeout_minutes }}
      run_multi_gpu_tests: "${{ matrix.version_selector != 'non-cuda' && inputs.run_multi_gpu_tests }}"
      multi_gpu_test_markers: ${{ inputs.multi_gpu_test_markers }}
      multi_gpu_test_timeout_minutes: ${{ inputs.multi_gpu_test_timeout_minutes }}
      copy_to_acr: ${{ inputs.copy_to_acr }}
      copy_timeout_minutes: ${{ inputs.copy_timeout_minutes }}
      make_efa: ${{ inputs.make_efa }}
      show_summary: ${{ inputs.show_summary }}
    secrets: inherit
