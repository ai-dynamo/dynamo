name: Build On Demand

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      build_vllm:
        description: 'Build and push vllm image, tagged with branch name'
        type: boolean
        default: false
      build_vllm_placeholder:
        description: 'Build and push the experimental vLLM snapshot placeholder'
        type: boolean
        default: false
      build_snapshot_agent:
        description: 'Build and push the matching snapshot agent'
        type: boolean
        default: false
      build_sglang:
        description: 'Build and push sglang image, tagged with branch name'
        type: boolean
        default: false
      build_trtllm:
        description: 'Build and push trtllm image, tagged with branch name'
        type: boolean
        default: false
      build_operator:
        description: 'Build and push operator image, tagged with branch name'
        type: boolean
        default: false

env:
  BUILDER_NAME: b-${{ github.run_id }}-${{ github.run_attempt }}

jobs:

  init:
    runs-on: ubuntu-slim
    outputs:
      builder_name: ${{ steps.export-builder-name.outputs.builder_name }}
      sanitized_ref_name: ${{ steps.sanitize-ref.outputs.sanitized_ref_name }}
    steps:
      - name: Export builder name
        id: export-builder-name
        run: |
          echo "builder_name=${{ env.BUILDER_NAME }}" >> $GITHUB_OUTPUT
      - name: Sanitize ref name for container tags
        id: sanitize-ref
        shell: bash
        run: |
          sanitized=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/^-//;s/-$//' | cut -c1-128)
          echo "sanitized_ref_name=${sanitized}" >> $GITHUB_OUTPUT

  # ============================================================================
  # FRAMEWORK PIPELINES (build-only)
  # ============================================================================

  vllm-base-sbom:
    name: Capture exact vLLM nightly baseline
    if: inputs.build_vllm_placeholder
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          architecture: x64
      - name: Verify immutable vLLM base
        shell: bash
        env:
          BASE_IMAGE: vllm/vllm-openai:nightly-8e981630c9336233ca9de91452f68918bddbc4e2
          EXPECTED_INDEX_DIGEST: sha256:f2ac337893360e23462249c3897e1c92dc8ba8a1ebbc3dd15c4ac931e957438e
          EXPECTED_AMD64_DIGEST: sha256:39e8d18a3b41e382f1955a3241326ec0fe61615fd51c7eef836fe606c0bfb887
        run: |
          set -euo pipefail
          docker buildx imagetools inspect --raw "${BASE_IMAGE}" > "${RUNNER_TEMP}/index.json"
          actual_index="sha256:$(sha256sum "${RUNNER_TEMP}/index.json" | awk '{print $1}')"
          actual_amd64="$(
            jq -er '.manifests[]
              | select(.platform.os == "linux" and .platform.architecture == "amd64")
              | .digest' "${RUNNER_TEMP}/index.json"
          )"
          test "${actual_index}" = "${EXPECTED_INDEX_DIGEST}"
          test "${actual_amd64}" = "${EXPECTED_AMD64_DIGEST}"
      - name: Install pinned SBOM capture tools
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv "${RUNNER_TEMP}/sbom-venv"
          cat > "${RUNNER_TEMP}/sbom-requirements.txt" <<'EOF'
          PyYAML==6.0.3 \
              --hash=sha256:ba1cc08a7ccde2d2ec775841541641e4548226580ab850948cbfda66a1befcdc
          EOF
          "${RUNNER_TEMP}/sbom-venv/bin/pip" install \
            --only-binary=:all: \
            --require-hashes \
            --requirement "${RUNNER_TEMP}/sbom-requirements.txt"
          echo "${RUNNER_TEMP}/sbom-venv/bin" >> "${GITHUB_PATH}"
          curl --fail --location --silent --show-error \
            --output "${RUNNER_TEMP}/syft.tar.gz" \
            https://github.com/anchore/syft/releases/download/v1.46.0/syft_1.46.0_linux_amd64.tar.gz
          echo "d654f678b709eb53c393d38519d5ed7d2e57205529404018614cfefa0fb2b5ca  ${RUNNER_TEMP}/syft.tar.gz" \
            | sha256sum --check
          mkdir -p "${RUNNER_TEMP}/bin"
          tar -xzf "${RUNNER_TEMP}/syft.tar.gz" -C "${RUNNER_TEMP}/bin" syft
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"
      - name: Capture deterministic amd64 baseline
        shell: bash
        env:
          BASE_IMAGE: vllm/vllm-openai:nightly-8e981630c9336233ca9de91452f68918bddbc4e2
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/baseline"
          printf '{"entries":[]}\n' > "${RUNNER_TEMP}/baseline-manifest.json"
          python3 container/compliance/base_sboms/capture_baseline_sbom.py \
            --from "${BASE_IMAGE}" \
            --baseline "${BASE_IMAGE}" \
            --platform linux/amd64 \
            --corpus-dir "${RUNNER_TEMP}/baseline" \
            --manifest "${RUNNER_TEMP}/baseline-manifest.json"
          test -s "${RUNNER_TEMP}/baseline/vllm-openai@f2ac3378-amd64.cdx.json"
      - name: Upload exact vLLM baseline
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: vllm-nightly-f2ac3378-amd64-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/baseline/vllm-openai@f2ac3378-amd64.cdx.json
          if-no-files-found: error
          retention-days: 7

  vllm-build:
    name: vllm-runtime # This name overlaps with other vllm jobs to group them in the UI
    needs: [init, vllm-base-sbom]
    if: >-
      ${{
        always() &&
        !cancelled() &&
        (inputs.build_vllm || inputs.build_vllm_placeholder) &&
        needs.init.result == 'success' &&
        (
          needs.vllm-base-sbom.result == 'success' ||
          needs.vllm-base-sbom.result == 'skipped'
        )
      }}
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: vllm
      target: runtime
      cuda_version: '["13.0"]'
      platform: ${{ inputs.build_vllm_placeholder && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
      builder_name: ${{ needs.init.outputs.builder_name }}
      build_timeout_minutes: ${{ inputs.build_vllm_placeholder && 90 || 60 }}
      build_only: ${{ inputs.build_vllm_placeholder }}
      image_tag_suffix: ${{ inputs.build_vllm_placeholder && format('-run-{0}-{1}', github.run_id, github.run_attempt) || '' }}
      baseline_sbom_artifact: ${{ inputs.build_vllm_placeholder && format('vllm-nightly-f2ac3378-amd64-{0}-{1}', github.run_id, github.run_attempt) || '' }}
      extra_build_args: |
        ${{ inputs.build_vllm_placeholder && 'BASELINE_SBOM_FILE=vllm-openai@f2ac3378' || '' }}
        ${{ inputs.build_vllm_placeholder && 'FLASHINFER_GIT_URL=https://github.com/flashinfer-ai/flashinfer.git' || '' }}
        ${{ inputs.build_vllm_placeholder && 'FLASHINFER_GIT_REF=refs/pull/3950/head' || '' }}
        ${{ inputs.build_vllm_placeholder && 'FLASHINFER_GIT_SHA=243d56c12cf1c724bdb128a4575ebf6ce1e8a1a9' || '' }}
        ${{ inputs.build_vllm_placeholder && 'VLLM_GIT_URL=https://github.com/vllm-project/vllm.git' || '' }}
        ${{ inputs.build_vllm_placeholder && 'VLLM_GIT_REF=274603f228c16a7b899fe22eb109c5f49f105696' || '' }}
        ${{ inputs.build_vllm_placeholder && 'VLLM_GIT_SHA=274603f228c16a7b899fe22eb109c5f49f105696' || '' }}
        ${{ inputs.build_vllm_placeholder && 'VLLM_INSTALL_MODE=python-overlay' || '' }}
        ${{ inputs.build_vllm_placeholder && 'VLLM_RUNTIME_BASE_IMAGE=vllm/vllm-openai@sha256:f2ac337893360e23462249c3897e1c92dc8ba8a1ebbc3dd15c4ac931e957438e' || '' }}
    secrets: inherit

  sglang-build:
    name: sglang-runtime # This name overlaps with other sglang jobs to group them in the UI
    needs: [init]
    if: inputs.build_sglang
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: sglang
      target: runtime
      cuda_version: '["13.0"]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: ${{ needs.init.outputs.builder_name }}
      build_timeout_minutes: 60
    secrets: inherit

  trtllm-build:
    name: trtllm-runtime # This name overlaps with other trtllm jobs to group them in the UI
    needs: [init]
    if: inputs.build_trtllm
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: trtllm
      target: runtime
      cuda_version: '["13.1"]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: ${{ needs.init.outputs.builder_name }}
      build_timeout_minutes: 60
    secrets: inherit

  vllm-copy-to-acr:
    name: vllm-runtime # This name overlaps with other vllm jobs to group them in the UI
    needs: [vllm-build]
    uses: ./.github/workflows/shared-copy.yml
    with:
      target_tag_plain: ${{ needs.vllm-build.outputs.target_tag_plain }}
      cuda_version: '["13.0"]'
      override_arch: amd64 # We are using AMD64 images only on the rest of the clusters.
      copy_timeout_minutes: 10
      image_tag_suffix: ${{ inputs.build_vllm_placeholder && format('-run-{0}-{1}', github.run_id, github.run_attempt) || '' }}
    secrets: inherit

  sglang-copy-to-acr:
    name: sglang-runtime # This name overlaps with other sglang jobs to group them in the UI
    needs: [sglang-build]
    uses: ./.github/workflows/shared-copy.yml
    with:
      target_tag_plain: ${{ needs.sglang-build.outputs.target_tag_plain }}
      cuda_version: '["13.0"]'
      override_arch: amd64 # We are using AMD64 images only on the rest of the clusters.
      copy_timeout_minutes: 10
    secrets: inherit

  trtllm-copy-to-acr:
    name: trtllm-runtime # This name overlaps with other trtllm jobs to group them in the UI
    needs: [trtllm-build]
    uses: ./.github/workflows/shared-copy.yml
    with:
      target_tag_plain: ${{ needs.trtllm-build.outputs.target_tag_plain }}
      cuda_version: '["13.1"]'
      override_arch: amd64 # We are using AMD64 images only on the rest of the clusters.
      copy_timeout_minutes: 10
    secrets: inherit

  # ============================================================================
  # SNAPSHOT (build-only)
  # ============================================================================

  snapshot-agent:
    name: Snapshot Agent
    needs: [init]
    if: inputs.build_snapshot_agent || inputs.build_vllm_placeholder
    runs-on: prod-default-v2
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Build and push snapshot agent
        uses: ./.github/actions/build-deploy-component
        with:
          component: snapshot
          target: agent
          image_tag: ${{ github.sha }}-snapshot-agent-run-${{ github.run_id }}-${{ github.run_attempt }}
          builder_name: ${{ needs.init.outputs.builder_name }}
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          azure_acr_hostname: ${{ secrets.AZURE_ACR_HOSTNAME }}
          azure_acr_user: ${{ secrets.AZURE_ACR_USER }}
          azure_acr_password: ${{ secrets.AZURE_ACR_PASSWORD }}
          extra_tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/ai-dynamo/dynamo:${{ needs.init.outputs.sanitized_ref_name }}-snapshot-agent
            ${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ github.sha }}-snapshot-agent-run-${{ github.run_id }}-${{ github.run_attempt }}
            ${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ needs.init.outputs.sanitized_ref_name }}-snapshot-agent
          extra_build_args: |
            CRIU_REPO=https://github.com/galletas1712/criu.git
            CRIU_REF=3dd2420c16e54fb7cd08b3e511d3a8bfb03cd001
            CRIU_SHA=3dd2420c16e54fb7cd08b3e511d3a8bfb03cd001
            CUDA_CHECKPOINT_REPO=https://github.com/NVIDIA/cuda-checkpoint.git
            CUDA_CHECKPOINT_REF=00d5cce84c628088d6caa203fc4af40c1538b6f7
            CUDA_CHECKPOINT_SHA=00d5cce84c628088d6caa203fc4af40c1538b6f7

  snapshot-placeholder-vllm:
    name: vLLM Snapshot Placeholder
    needs: [init, vllm-copy-to-acr]
    if: inputs.build_vllm_placeholder
    runs-on: prod-default-v2
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Build and push vLLM snapshot placeholder
        uses: ./.github/actions/build-deploy-component
        with:
          component: snapshot
          target: placeholder
          image_tag: ${{ github.sha }}-vllm-placeholder-run-${{ github.run_id }}-${{ github.run_attempt }}
          builder_name: ${{ needs.init.outputs.builder_name }}
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          azure_acr_hostname: ${{ secrets.AZURE_ACR_HOSTNAME }}
          azure_acr_user: ${{ secrets.AZURE_ACR_USER }}
          azure_acr_password: ${{ secrets.AZURE_ACR_PASSWORD }}
          extra_tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/ai-dynamo/dynamo:${{ needs.init.outputs.sanitized_ref_name }}-vllm-placeholder
            ${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ github.sha }}-vllm-placeholder-run-${{ github.run_id }}-${{ github.run_attempt }}
            ${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ needs.init.outputs.sanitized_ref_name }}-vllm-placeholder
          extra_build_args: |
            BASE_IMAGE=${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ github.sha }}-vllm-runtime-run-${{ github.run_id }}-${{ github.run_attempt }}
            BASE_IMAGE_USER=dynamo
            CRIU_REPO=https://github.com/galletas1712/criu.git
            CRIU_REF=3dd2420c16e54fb7cd08b3e511d3a8bfb03cd001
            CRIU_SHA=3dd2420c16e54fb7cd08b3e511d3a8bfb03cd001
            CUDA_CHECKPOINT_REPO=https://github.com/NVIDIA/cuda-checkpoint.git
            CUDA_CHECKPOINT_REF=00d5cce84c628088d6caa203fc4af40c1538b6f7
            CUDA_CHECKPOINT_SHA=00d5cce84c628088d6caa203fc4af40c1538b6f7

  # ============================================================================
  # OPERATOR (build-only)
  # ============================================================================

  operator:
    needs: [init]
    if: inputs.build_operator
    name: Operator
    runs-on: prod-default-v2
    env:
      IMAGE_REGISTRY: ai-dynamo
      IMAGE_REPOSITORY: dynamo
      ECR_HOSTNAME: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Initialize Dynamo Builder
        uses: ./.github/actions/init-dynamo-builder
        with:
          builder_name: ${{ needs.init.outputs.builder_name }}
          flavor: general
          arch: 'linux/amd64,linux/arm64'
      - name: Docker Login
        uses: ./.github/actions/docker-login
        with:
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          azure_acr_hostname: ${{ secrets.AZURE_ACR_HOSTNAME }}
          azure_acr_user: ${{ secrets.AZURE_ACR_USER }}
          azure_acr_password: ${{ secrets.AZURE_ACR_PASSWORD }}
      - name: Build and push Container
        shell: bash
        working-directory: ./deploy/operator
        run: |
          ECR_DEFAULT_IMAGE_BASE="${ECR_HOSTNAME}/${IMAGE_REGISTRY}/${IMAGE_REPOSITORY}"
          ACR_IMAGE_BASE="${{ secrets.AZURE_ACR_HOSTNAME }}/${IMAGE_REGISTRY}/${IMAGE_REPOSITORY}"
          DEFAULT_TAG="${{ github.sha }}-operator"
          BRANCH_TAG="${{ needs.init.outputs.sanitized_ref_name }}-operator"
          IMAGE_URIS=(
            "${ECR_DEFAULT_IMAGE_BASE}:${DEFAULT_TAG}"
            "${ACR_IMAGE_BASE}:${DEFAULT_TAG}"
            "${ECR_DEFAULT_IMAGE_BASE}:${BRANCH_TAG}"
            "${ACR_IMAGE_BASE}:${BRANCH_TAG}"
          )

          TAGGING_FLAGS=$(printf -- '-t %s ' "${IMAGE_URIS[@]}")
          echo "flags for docker buildx: ${TAGGING_FLAGS}"

          docker buildx build --push \
              --platform linux/amd64,linux/arm64 \
              --build-arg DOCKER_PROXY=${ECR_HOSTNAME}/dockerhub/ \
              --build-context snapshot=../snapshot \
              ${TAGGING_FLAGS} -f Dockerfile .

          echo "### Operator Container Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image URI |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|" >> $GITHUB_STEP_SUMMARY
          for image_uri in "${IMAGE_URIS[@]}"; do
            echo "| \`${image_uri}\` |" >> $GITHUB_STEP_SUMMARY
          done

  # ============================================================================
  # CLEANUP
  # ============================================================================

  clean-k8s-builder:
    name: Clean K8s builder if exists
    runs-on: prod-default-small-v2
    if: always()
    needs: [init, vllm-base-sbom, vllm-build, vllm-copy-to-acr, sglang-build, sglang-copy-to-acr, trtllm-build, trtllm-copy-to-acr, snapshot-agent, snapshot-placeholder-vllm, operator]
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Create K8s builders (skip bootstrap)
      uses: ./.github/actions/bootstrap-buildkit
      continue-on-error: true
      with:
        builder_name: ${{ needs.init.outputs.builder_name }}
        buildkit_worker_addresses: ''
        skip_bootstrap: true
    - name: Builder Cleanup in case of k8s builder
      shell: bash
      run: |
        docker buildx rm ${{ needs.init.outputs.builder_name }} || true
