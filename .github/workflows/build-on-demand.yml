name: Build On Demand

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      build_vllm:
        description: 'Build and push vllm image, tagged with branch name'
        type: boolean
        default: true
      build_vllm_placeholder:
        description: 'Build and push the experimental vLLM snapshot placeholder'
        type: boolean
        default: true
      build_snapshot_agent:
        description: 'Build and push the matching snapshot agent'
        type: boolean
        default: true
      vllm_git_url:
        description: 'Exact vLLM overlay repository'
        type: string
        default: 'https://github.com/galletas1712/vllm.git'
      vllm_git_ref:
        description: 'Exact vLLM overlay branch'
        type: string
        default: 'schwinns/snapshot-gms-nightly-95ed0fea-fi0615-20260710'
      vllm_git_sha:
        description: 'Exact vLLM overlay commit'
        type: string
        default: '422ad75b99364320a6cf0d4cbad4c9a4e48b615b'
      flashinfer_git_url:
        description: 'Exact FlashInfer repository'
        type: string
        default: 'https://github.com/flashinfer-ai/flashinfer.git'
      flashinfer_git_ref:
        description: 'Exact FlashInfer ref'
        type: string
        default: 'refs/tags/nightly-v0.6.15-20260710'
      flashinfer_git_sha:
        description: 'Exact FlashInfer commit'
        type: string
        default: 'f2f9646ec388d9f178b2fbda6ae0ec4246d8e7dc'
      vllm_install_mode:
        description: 'vLLM installation mode'
        type: choice
        options:
          - auto
          - python-overlay
        default: python-overlay
      vllm_runtime_base_image:
        description: 'Exact upstream vLLM runtime image'
        type: string
        default: 'vllm/vllm-openai@sha256:a671d5fcda70fe9ac6f245f9780821de459fb4ee22c018fd07a0f10a55279bf9'
      snapshot_criu_repo:
        description: 'CRIU repository used for the snapshot placeholder'
        type: string
        default: 'https://github.com/galletas1712/criu.git'
      snapshot_criu_ref:
        description: 'CRIU ref used for the snapshot placeholder'
        type: string
        default: 'criu-dev'
      snapshot_criu_sha:
        description: 'Exact CRIU commit used for snapshot images'
        type: string
        default: '3dd2420c16e54fb7cd08b3e511d3a8bfb03cd001'
      snapshot_cuda_checkpoint_repo:
        description: 'cuda-checkpoint repository used for snapshot images'
        type: string
        default: 'https://github.com/NVIDIA/cuda-checkpoint.git'
      snapshot_cuda_checkpoint_ref:
        description: 'cuda-checkpoint ref used for snapshot images'
        type: string
        default: 'main'
      snapshot_cuda_checkpoint_sha:
        description: 'Exact cuda-checkpoint commit used for snapshot images'
        type: string
        default: '00d5cce84c628088d6caa203fc4af40c1538b6f7'
      build_sglang:
        description: 'Build and push sglang image, tagged with branch name'
        type: boolean
        default: false
      build_trtllm:
        description: 'Build and push trtllm image, tagged with branch name'
        type: boolean
        default: false
      build_operator:
        description: 'Build and push operator image, tagged with branch name'
        type: boolean
        default: true

env:
  BUILDER_NAME: b-${{ github.run_id }}-${{ github.run_attempt }}

jobs:

  init:
    runs-on: ubuntu-slim
    outputs:
      builder_name: ${{ steps.export-builder-name.outputs.builder_name }}
      sanitized_ref_name: ${{ steps.sanitize-ref.outputs.sanitized_ref_name }}
    steps:
      - name: Export builder name
        id: export-builder-name
        run: |
          echo "builder_name=${{ env.BUILDER_NAME }}" >> $GITHUB_OUTPUT
      - name: Sanitize ref name for container tags
        id: sanitize-ref
        shell: bash
        run: |
          sanitized=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/^-//;s/-$//' | cut -c1-128)
          echo "sanitized_ref_name=${sanitized}" >> $GITHUB_OUTPUT

  # ============================================================================
  # FRAMEWORK PIPELINES (build-only)
  # ============================================================================

  vllm-build:
    name: vllm-runtime # This name overlaps with other vllm jobs to group them in the UI
    needs: [init]
    if: inputs.build_vllm || inputs.build_vllm_placeholder
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: vllm
      target: runtime
      cuda_version: '["13.0"]'
      platform: ${{ (inputs.build_vllm_placeholder || inputs.vllm_install_mode == 'python-overlay') && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
      builder_name: ${{ needs.init.outputs.builder_name }}
      build_timeout_minutes: ${{ (inputs.build_vllm_placeholder || inputs.vllm_install_mode == 'python-overlay') && 90 || 60 }}
      build_only: true
      image_tag_suffix: ${{ format('-run-{0}-{1}', github.run_id, github.run_attempt) }}
      # Test-only overlay: subtract the exact immutable nightly base.
      extra_build_args: |
        BASELINE_SBOM_FILE=vllm-openai@a671d5fc
        FLASHINFER_GIT_URL=${{ inputs.flashinfer_git_url }}
        FLASHINFER_GIT_REF=${{ inputs.flashinfer_git_ref }}
        FLASHINFER_GIT_SHA=${{ inputs.flashinfer_git_sha }}
        VLLM_GIT_URL=${{ inputs.vllm_git_url }}
        VLLM_GIT_REF=${{ inputs.vllm_git_ref }}
        VLLM_GIT_SHA=${{ inputs.vllm_git_sha }}
        VLLM_INSTALL_MODE=${{ inputs.build_vllm_placeholder && 'python-overlay' || inputs.vllm_install_mode }}
        VLLM_RUNTIME_BASE_IMAGE=${{ inputs.build_vllm_placeholder && 'vllm/vllm-openai@sha256:a671d5fcda70fe9ac6f245f9780821de459fb4ee22c018fd07a0f10a55279bf9' || (inputs.vllm_install_mode == 'python-overlay' && inputs.vllm_runtime_base_image || 'vllm/vllm-openai:v0.24.0-ubuntu2404') }}
    secrets: inherit

  sglang-build:
    name: sglang-runtime # This name overlaps with other sglang jobs to group them in the UI
    needs: [init]
    if: inputs.build_sglang
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: sglang
      target: runtime
      cuda_version: '["13.0"]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: ${{ needs.init.outputs.builder_name }}
      build_timeout_minutes: 60
    secrets: inherit

  trtllm-build:
    name: trtllm-runtime # This name overlaps with other trtllm jobs to group them in the UI
    needs: [init]
    if: inputs.build_trtllm
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: trtllm
      target: runtime
      cuda_version: '["13.1"]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: ${{ needs.init.outputs.builder_name }}
      build_timeout_minutes: 60
    secrets: inherit

  vllm-copy-to-acr:
    name: vllm-runtime # This name overlaps with other vllm jobs to group them in the UI
    needs: [vllm-build]
    uses: ./.github/workflows/shared-copy.yml
    with:
      target_tag_plain: ${{ needs.vllm-build.outputs.target_tag_plain }}
      cuda_version: '["13.0"]'
      override_arch: amd64 # We are using AMD64 images only on the rest of the clusters.
      copy_timeout_minutes: 10
      image_tag_suffix: ${{ format('-run-{0}-{1}', github.run_id, github.run_attempt) }}
    secrets: inherit

  sglang-copy-to-acr:
    name: sglang-runtime # This name overlaps with other sglang jobs to group them in the UI
    needs: [sglang-build]
    uses: ./.github/workflows/shared-copy.yml
    with:
      target_tag_plain: ${{ needs.sglang-build.outputs.target_tag_plain }}
      cuda_version: '["13.0"]'
      override_arch: amd64 # We are using AMD64 images only on the rest of the clusters.
      copy_timeout_minutes: 10
    secrets: inherit

  trtllm-copy-to-acr:
    name: trtllm-runtime # This name overlaps with other trtllm jobs to group them in the UI
    needs: [trtllm-build]
    uses: ./.github/workflows/shared-copy.yml
    with:
      target_tag_plain: ${{ needs.trtllm-build.outputs.target_tag_plain }}
      cuda_version: '["13.1"]'
      override_arch: amd64 # We are using AMD64 images only on the rest of the clusters.
      copy_timeout_minutes: 10
    secrets: inherit

  # ============================================================================
  # SNAPSHOT (build-only)
  # ============================================================================

  snapshot-agent:
    name: Snapshot Agent
    needs: [init]
    if: inputs.build_snapshot_agent
    runs-on: prod-default-v2
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Build and push snapshot agent
        uses: ./.github/actions/build-deploy-component
        with:
          component: snapshot
          target: agent
          image_tag: ${{ github.sha }}-snapshot-agent-run-${{ github.run_id }}-${{ github.run_attempt }}
          builder_name: ${{ needs.init.outputs.builder_name }}
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          azure_acr_hostname: ${{ secrets.AZURE_ACR_HOSTNAME }}
          azure_acr_user: ${{ secrets.AZURE_ACR_USER }}
          azure_acr_password: ${{ secrets.AZURE_ACR_PASSWORD }}
          extra_tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/ai-dynamo/dynamo:${{ needs.init.outputs.sanitized_ref_name }}-snapshot-agent
            ${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ github.sha }}-snapshot-agent-run-${{ github.run_id }}-${{ github.run_attempt }}
            ${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ needs.init.outputs.sanitized_ref_name }}-snapshot-agent
          extra_build_args: |
            CRIU_REPO=${{ inputs.snapshot_criu_repo }}
            CRIU_REF=${{ inputs.snapshot_criu_ref }}
            CRIU_SHA=${{ inputs.snapshot_criu_sha }}
            CUDA_CHECKPOINT_REPO=${{ inputs.snapshot_cuda_checkpoint_repo }}
            CUDA_CHECKPOINT_REF=${{ inputs.snapshot_cuda_checkpoint_ref }}
            CUDA_CHECKPOINT_SHA=${{ inputs.snapshot_cuda_checkpoint_sha }}

  snapshot-placeholder-vllm:
    name: vLLM Snapshot Placeholder
    needs: [init, vllm-copy-to-acr]
    if: inputs.build_vllm_placeholder
    runs-on: prod-default-v2
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Build and push vLLM snapshot placeholder
        uses: ./.github/actions/build-deploy-component
        with:
          component: snapshot
          target: placeholder
          image_tag: ${{ github.sha }}-vllm-placeholder-run-${{ github.run_id }}-${{ github.run_attempt }}
          builder_name: ${{ needs.init.outputs.builder_name }}
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          azure_acr_hostname: ${{ secrets.AZURE_ACR_HOSTNAME }}
          azure_acr_user: ${{ secrets.AZURE_ACR_USER }}
          azure_acr_password: ${{ secrets.AZURE_ACR_PASSWORD }}
          extra_tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/ai-dynamo/dynamo:${{ needs.init.outputs.sanitized_ref_name }}-vllm-placeholder
            ${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ github.sha }}-vllm-placeholder-run-${{ github.run_id }}-${{ github.run_attempt }}
            ${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ needs.init.outputs.sanitized_ref_name }}-vllm-placeholder
          extra_build_args: |
            BASE_IMAGE=${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ github.sha }}-vllm-runtime-run-${{ github.run_id }}-${{ github.run_attempt }}
            BASE_IMAGE_USER=dynamo
            CRIU_REPO=${{ inputs.snapshot_criu_repo }}
            CRIU_REF=${{ inputs.snapshot_criu_ref }}
            CRIU_SHA=${{ inputs.snapshot_criu_sha }}
            CUDA_CHECKPOINT_REPO=${{ inputs.snapshot_cuda_checkpoint_repo }}
            CUDA_CHECKPOINT_REF=${{ inputs.snapshot_cuda_checkpoint_ref }}
            CUDA_CHECKPOINT_SHA=${{ inputs.snapshot_cuda_checkpoint_sha }}

  # ============================================================================
  # OPERATOR (build-only)
  # ============================================================================

  operator:
    needs: [init]
    if: inputs.build_operator
    name: Operator
    runs-on: prod-default-v2
    env:
      IMAGE_REGISTRY: ai-dynamo
      IMAGE_REPOSITORY: dynamo
      ECR_HOSTNAME: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Initialize Dynamo Builder
        uses: ./.github/actions/init-dynamo-builder
        with:
          builder_name: ${{ needs.init.outputs.builder_name }}
          flavor: general
          arch: 'linux/amd64,linux/arm64'
      - name: Docker Login
        uses: ./.github/actions/docker-login
        with:
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          azure_acr_hostname: ${{ secrets.AZURE_ACR_HOSTNAME }}
          azure_acr_user: ${{ secrets.AZURE_ACR_USER }}
          azure_acr_password: ${{ secrets.AZURE_ACR_PASSWORD }}
      - name: Build and push Container
        shell: bash
        working-directory: ./deploy/operator
        run: |
          ECR_DEFAULT_IMAGE_BASE="${ECR_HOSTNAME}/${IMAGE_REGISTRY}/${IMAGE_REPOSITORY}"
          ACR_IMAGE_BASE="${{ secrets.AZURE_ACR_HOSTNAME }}/${IMAGE_REGISTRY}/${IMAGE_REPOSITORY}"
          DEFAULT_TAG="${{ github.sha }}-operator-run-${{ github.run_id }}-${{ github.run_attempt }}"
          BRANCH_TAG="${{ needs.init.outputs.sanitized_ref_name }}-operator"
          IMAGE_URIS=(
            "${ECR_DEFAULT_IMAGE_BASE}:${DEFAULT_TAG}"
            "${ACR_IMAGE_BASE}:${DEFAULT_TAG}"
            "${ECR_DEFAULT_IMAGE_BASE}:${BRANCH_TAG}"
            "${ACR_IMAGE_BASE}:${BRANCH_TAG}"
          )

          TAGGING_FLAGS=$(printf -- '-t %s ' "${IMAGE_URIS[@]}")
          echo "flags for docker buildx: ${TAGGING_FLAGS}"

          docker buildx build --push \
              --platform linux/amd64,linux/arm64 \
              --build-arg DOCKER_PROXY=${ECR_HOSTNAME}/dockerhub/ \
              --build-context snapshot=../snapshot \
              ${TAGGING_FLAGS} -f Dockerfile .

          echo "### Operator Container Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image URI |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|" >> $GITHUB_STEP_SUMMARY
          for image_uri in "${IMAGE_URIS[@]}"; do
            echo "| \`${image_uri}\` |" >> $GITHUB_STEP_SUMMARY
          done

  # ============================================================================
  # CLEANUP
  # ============================================================================

  clean-k8s-builder:
    name: Clean K8s builder if exists
    runs-on: prod-default-small-v2
    if: always()
    needs: [init, vllm-build, sglang-build, trtllm-build, snapshot-agent, snapshot-placeholder-vllm, operator]
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Create K8s builders (skip bootstrap)
      uses: ./.github/actions/bootstrap-buildkit
      continue-on-error: true
      with:
        builder_name: ${{ needs.init.outputs.builder_name }}
        buildkit_worker_addresses: ''
        skip_bootstrap: true
    - name: Builder Cleanup in case of k8s builder
      shell: bash
      run: |
        docker buildx rm ${{ needs.init.outputs.builder_name }} || true
