name: Build On Demand

on:
  workflow_dispatch:
    inputs:
      build_vllm:
        description: 'Build and push vllm image, tagged with branch name'
        type: boolean
        default: false
      build_sglang:
        description: 'Build and push sglang image, tagged with branch name'
        type: boolean
        default: false
      build_trtllm:
        description: 'Build and push trtllm image, tagged with branch name'
        type: boolean
        default: false
      build_operator:
        description: 'Build and push operator image, tagged with branch name'
        type: boolean
        default: false
      build_snapshot_agent:
        description: 'Build and push snapshot-agent image, tagged with branch name'
        type: boolean
        default: false
      build_vllm_placeholder:
        description: 'Build and push vLLM snapshot placeholder image, tagged with branch name'
        type: boolean
        default: false
      build_sglang_placeholder:
        description: 'Build and push SGLang snapshot placeholder image, tagged with branch name'
        type: boolean
        default: false
      snapshot_criu_repo:
        description: 'CRIU git repository for snapshot-agent and placeholder image builds'
        type: string
        default: 'https://github.com/checkpoint-restore/criu.git'
      snapshot_criu_ref:
        description: 'CRIU git ref for snapshot-agent and placeholder image builds'
        type: string
        default: 'criu-dev'
      flashinfer_git_url:
        description: 'Optional FlashInfer git repository override for vLLM runtime builds'
        type: string
        default: ''
      flashinfer_git_ref:
        description: 'Optional FlashInfer git ref override for vLLM runtime builds'
        type: string
        default: ''
      flashinfer_git_sha:
        description: 'Optional FlashInfer git SHA override for reproducible vLLM runtime builds'
        type: string
        default: ''
      vllm_git_url:
        description: 'Optional vLLM git repository override for vLLM runtime builds'
        type: string
        default: ''
      vllm_git_ref:
        description: 'Optional vLLM git ref override for vLLM runtime builds'
        type: string
        default: ''
      vllm_git_sha:
        description: 'Optional vLLM git SHA override for reproducible vLLM runtime builds'
        type: string
        default: ''
      vllm_install_mode:
        description: 'Custom vLLM installation mode'
        type: choice
        options:
          - auto
          - python-overlay
          - full-source
        default: auto
      vllm_torch_version:
        description: 'Official PyTorch version for full-source vLLM builds'
        type: string
        default: ''
      vllm_torchvision_version:
        description: 'Official torchvision version for full-source vLLM builds'
        type: string
        default: ''
      vllm_runtime_base_image:
        description: 'Immutable standalone vLLM image ref used by full-source builds'
        type: string
        default: 'vllm/vllm-openai@sha256:5da1eb79b49d3edb3b3601a116273f019adb7cab403e86790f61130f8596810a'
      vllm_nccl_version:
        description: 'nvidia-nccl-cu13 wheel version for full-source vLLM builds'
        type: string
        default: ''
      vllm_precompiled_wheel_commit:
        description: 'Optional exact 40-character vLLM main commit providing native artifacts (enables x86_64 source-package mode)'
        type: string
        default: ''
      vllm_precompiled_wheel_variant:
        description: 'vLLM precompiled wheel variant used with an exact native commit'
        type: string
        default: 'cu130'
      nccl_checkpoint_version:
        description: 'Optional nvidia-nccl-cu13 wheel version to install before building the NCCLCheckpoint shim'
        type: string
        default: ''

env:
  BUILDER_NAME: b-${{ github.run_id }}-${{ github.run_attempt }}

jobs:

  init:
    runs-on: ubuntu-slim
    outputs:
      builder_name: ${{ steps.export-builder-name.outputs.builder_name }}
      sanitized_ref_name: ${{ steps.sanitize-ref.outputs.sanitized_ref_name }}
    steps:
      - name: Export builder name
        id: export-builder-name
        run: |
          echo "builder_name=${{ env.BUILDER_NAME }}" >> $GITHUB_OUTPUT
      - name: Sanitize ref name for container tags
        id: sanitize-ref
        shell: bash
        run: |
          sanitized=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/^-//;s/-$//' | cut -c1-128)
          echo "sanitized_ref_name=${sanitized}" >> $GITHUB_OUTPUT

  # ============================================================================
  # FRAMEWORK PIPELINES (build-only)
  # ============================================================================

  vllm-build:
    name: vllm-runtime # This name overlaps with other vllm jobs to group them in the UI
    needs: [init]
    if: inputs.build_vllm || inputs.build_vllm_placeholder
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: vllm
      target: runtime
      cuda_version: '["13.0"]'
      platform: ${{ (inputs.vllm_install_mode == 'full-source' || inputs.vllm_install_mode == 'python-overlay' || inputs.vllm_precompiled_wheel_commit != '') && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
      builder_name: ${{ needs.init.outputs.builder_name }}
      build_timeout_minutes: ${{ inputs.vllm_install_mode == 'full-source' && 180 || ((inputs.vllm_install_mode == 'python-overlay' || inputs.vllm_precompiled_wheel_commit != '') && 90 || 60) }}
      extra_build_args: |
        FLASHINFER_GIT_URL=${{ inputs.flashinfer_git_url }}
        FLASHINFER_GIT_REF=${{ inputs.flashinfer_git_ref }}
        FLASHINFER_GIT_SHA=${{ inputs.flashinfer_git_sha }}
        VLLM_GIT_URL=${{ inputs.vllm_git_url }}
        VLLM_GIT_REF=${{ inputs.vllm_git_ref }}
        VLLM_GIT_SHA=${{ inputs.vllm_git_sha }}
        VLLM_INSTALL_MODE=${{ inputs.vllm_install_mode }}
        VLLM_TORCH_VERSION=${{ inputs.vllm_torch_version }}
        VLLM_TORCHVISION_VERSION=${{ inputs.vllm_torchvision_version }}
        VLLM_TORCH_BACKEND=cu130
        VLLM_TORCH_CUDA_ARCH_LIST=10.0
        VLLM_RUNTIME_BASE_IMAGE=${{ inputs.vllm_runtime_base_image }}
        VLLM_NCCL_VERSION=${{ inputs.vllm_nccl_version }}
        VLLM_PRECOMPILED_WHEEL_COMMIT=${{ inputs.vllm_precompiled_wheel_commit }}
        VLLM_PRECOMPILED_WHEEL_VARIANT=${{ inputs.vllm_precompiled_wheel_variant }}
        NCCL_CHECKPOINT_VERSION=${{ inputs.nccl_checkpoint_version }}
        BASELINE_SBOM_FILE=${{ inputs.vllm_install_mode == 'python-overlay' && 'vllm-openai@7c5a10e9' || 'cuda@2ab6381d' }}
    secrets: inherit

  sglang-build:
    name: sglang-runtime # This name overlaps with other sglang jobs to group them in the UI
    needs: [init]
    if: inputs.build_sglang || inputs.build_sglang_placeholder
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: sglang
      target: runtime
      cuda_version: '["13.0"]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: ${{ needs.init.outputs.builder_name }}
      build_timeout_minutes: 60
    secrets: inherit

  trtllm-build:
    name: trtllm-runtime # This name overlaps with other trtllm jobs to group them in the UI
    needs: [init]
    if: inputs.build_trtllm
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: trtllm
      target: runtime
      cuda_version: '["13.1"]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: ${{ needs.init.outputs.builder_name }}
      build_timeout_minutes: 60
    secrets: inherit

  vllm-copy-to-acr:
    name: vllm-runtime # This name overlaps with other vllm jobs to group them in the UI
    needs: [vllm-build]
    uses: ./.github/workflows/shared-copy.yml
    with:
      target_tag_plain: ${{ needs.vllm-build.outputs.target_tag_plain }}
      cuda_version: '["13.0"]'
      override_arch: amd64 # We are using AMD64 images only on the rest of the clusters.
      copy_timeout_minutes: 10
    secrets: inherit

  sglang-copy-to-acr:
    name: sglang-runtime # This name overlaps with other sglang jobs to group them in the UI
    needs: [sglang-build]
    uses: ./.github/workflows/shared-copy.yml
    with:
      target_tag_plain: ${{ needs.sglang-build.outputs.target_tag_plain }}
      cuda_version: '["13.0"]'
      override_arch: amd64 # We are using AMD64 images only on the rest of the clusters.
      copy_timeout_minutes: 10
    secrets: inherit

  trtllm-copy-to-acr:
    name: trtllm-runtime # This name overlaps with other trtllm jobs to group them in the UI
    needs: [trtllm-build]
    uses: ./.github/workflows/shared-copy.yml
    with:
      target_tag_plain: ${{ needs.trtllm-build.outputs.target_tag_plain }}
      cuda_version: '["13.1"]'
      override_arch: amd64 # We are using AMD64 images only on the rest of the clusters.
      copy_timeout_minutes: 10
    secrets: inherit

  # ============================================================================
  # SNAPSHOT (build-only)
  # ============================================================================

  snapshot-agent:
    needs: [init]
    if: inputs.build_snapshot_agent
    name: Snapshot Agent
    runs-on: prod-default-v2
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Build and push snapshot agent
        uses: ./.github/actions/build-deploy-component
        with:
          component: snapshot
          target: agent
          image_tag: ${{ github.sha }}-snapshot-agent
          builder_name: ${{ needs.init.outputs.builder_name }}
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          azure_acr_hostname: ${{ secrets.AZURE_ACR_HOSTNAME }}
          azure_acr_user: ${{ secrets.AZURE_ACR_USER }}
          azure_acr_password: ${{ secrets.AZURE_ACR_PASSWORD }}
          extra_tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/ai-dynamo/dynamo:${{ needs.init.outputs.sanitized_ref_name }}-snapshot-agent
            ${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ github.sha }}-snapshot-agent
            ${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ needs.init.outputs.sanitized_ref_name }}-snapshot-agent
          extra_build_args: |
            CRIU_REPO=${{ inputs.snapshot_criu_repo }}
            CRIU_REF=${{ inputs.snapshot_criu_ref }}

  snapshot-placeholder-vllm:
    name: vLLM Snapshot Placeholder
    needs: [init, vllm-copy-to-acr]
    if: inputs.build_vllm_placeholder
    runs-on: prod-default-v2
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Build and push vLLM snapshot placeholder
        uses: ./.github/actions/build-deploy-component
        with:
          component: snapshot
          target: placeholder
          image_tag: ${{ github.sha }}-vllm-placeholder
          builder_name: ${{ needs.init.outputs.builder_name }}
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          azure_acr_hostname: ${{ secrets.AZURE_ACR_HOSTNAME }}
          azure_acr_user: ${{ secrets.AZURE_ACR_USER }}
          azure_acr_password: ${{ secrets.AZURE_ACR_PASSWORD }}
          extra_tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/ai-dynamo/dynamo:${{ needs.init.outputs.sanitized_ref_name }}-vllm-placeholder
            ${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ github.sha }}-vllm-placeholder
            ${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ needs.init.outputs.sanitized_ref_name }}-vllm-placeholder
          extra_build_args: |
            BASE_IMAGE=${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ github.sha }}-vllm-runtime
            CRIU_REPO=${{ inputs.snapshot_criu_repo }}
            CRIU_REF=${{ inputs.snapshot_criu_ref }}

  snapshot-placeholder-sglang:
    name: SGLang Snapshot Placeholder
    needs: [init, sglang-copy-to-acr]
    if: inputs.build_sglang_placeholder
    runs-on: prod-default-v2
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Build and push SGLang snapshot placeholder
        uses: ./.github/actions/build-deploy-component
        with:
          component: snapshot
          target: placeholder
          image_tag: ${{ github.sha }}-sglang-placeholder
          builder_name: ${{ needs.init.outputs.builder_name }}
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          azure_acr_hostname: ${{ secrets.AZURE_ACR_HOSTNAME }}
          azure_acr_user: ${{ secrets.AZURE_ACR_USER }}
          azure_acr_password: ${{ secrets.AZURE_ACR_PASSWORD }}
          extra_tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/ai-dynamo/dynamo:${{ needs.init.outputs.sanitized_ref_name }}-sglang-placeholder
            ${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ github.sha }}-sglang-placeholder
            ${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ needs.init.outputs.sanitized_ref_name }}-sglang-placeholder
          extra_build_args: |
            BASE_IMAGE=${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ github.sha }}-sglang-runtime
            CRIU_REPO=${{ inputs.snapshot_criu_repo }}
            CRIU_REF=${{ inputs.snapshot_criu_ref }}

  # ============================================================================
  # OPERATOR (build-only)
  # ============================================================================

  operator:
    needs: [init]
    if: inputs.build_operator
    name: Operator
    runs-on: prod-default-v2
    env:
      IMAGE_REGISTRY: ai-dynamo
      IMAGE_REPOSITORY: dynamo
      ECR_HOSTNAME: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Initialize Dynamo Builder
        uses: ./.github/actions/init-dynamo-builder
        with:
          builder_name: ${{ needs.init.outputs.builder_name }}
          flavor: general
          arch: 'linux/amd64,linux/arm64'
      - name: Docker Login
        uses: ./.github/actions/docker-login
        with:
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          azure_acr_hostname: ${{ secrets.AZURE_ACR_HOSTNAME }}
          azure_acr_user: ${{ secrets.AZURE_ACR_USER }}
          azure_acr_password: ${{ secrets.AZURE_ACR_PASSWORD }}
      - name: Build and push Container
        shell: bash
        working-directory: ./deploy/operator
        run: |
          ECR_DEFAULT_IMAGE_BASE="${ECR_HOSTNAME}/${IMAGE_REGISTRY}/${IMAGE_REPOSITORY}"
          ACR_IMAGE_BASE="${{ secrets.AZURE_ACR_HOSTNAME }}/${IMAGE_REGISTRY}/${IMAGE_REPOSITORY}"
          DEFAULT_TAG="${{ github.sha }}-operator"
          BRANCH_TAG="${{ needs.init.outputs.sanitized_ref_name }}-operator"
          IMAGE_URIS=(
            "${ECR_DEFAULT_IMAGE_BASE}:${DEFAULT_TAG}"
            "${ACR_IMAGE_BASE}:${DEFAULT_TAG}"
            "${ECR_DEFAULT_IMAGE_BASE}:${BRANCH_TAG}"
            "${ACR_IMAGE_BASE}:${BRANCH_TAG}"
          )

          TAGGING_FLAGS=$(printf -- '-t %s ' "${IMAGE_URIS[@]}")
          echo "flags for docker buildx: ${TAGGING_FLAGS}"

          docker buildx build --push \
              --platform linux/amd64,linux/arm64 \
              --build-arg DOCKER_PROXY=${ECR_HOSTNAME}/dockerhub/ \
              --build-context snapshot=../snapshot \
              ${TAGGING_FLAGS} -f Dockerfile .

          echo "### Operator Container Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image URI |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|" >> $GITHUB_STEP_SUMMARY
          for image_uri in "${IMAGE_URIS[@]}"; do
            echo "| \`${image_uri}\` |" >> $GITHUB_STEP_SUMMARY
          done

  # ============================================================================
  # CLEANUP
  # ============================================================================

  clean-k8s-builder:
    name: Clean K8s builder if exists
    runs-on: prod-default-small-v2
    if: always()
    needs: [init, vllm-build, sglang-build, trtllm-build, snapshot-agent, snapshot-placeholder-vllm, snapshot-placeholder-sglang, operator]
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Create K8s builders (skip bootstrap)
      uses: ./.github/actions/bootstrap-buildkit
      continue-on-error: true
      with:
        builder_name: ${{ needs.init.outputs.builder_name }}
        buildkit_worker_addresses: ''
        skip_bootstrap: true
    - name: Builder Cleanup in case of k8s builder
      shell: bash
      run: |
        docker buildx rm ${{ needs.init.outputs.builder_name }} || true
