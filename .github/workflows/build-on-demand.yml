name: Build On Demand

permissions:
  actions: read
  contents: read

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: 'Exact Dynamo commit SHA; empty uses the dispatched workflow SHA'
        type: string
        required: false
        default: ''
      build_vllm:
        description: 'Build and push vllm image, tagged with branch name'
        type: boolean
        default: false
      build_vllm_placeholder:
        description: 'Build and push the matching vLLM snapshot placeholder'
        type: boolean
        default: false
      build_snapshot_agent:
        description: 'Build and push the matching snapshot agent'
        type: boolean
        default: false
      build_sglang:
        description: 'Build and push sglang image, tagged with branch name'
        type: boolean
        default: false
      build_trtllm:
        description: 'Build and push trtllm image, tagged with branch name'
        type: boolean
        default: false
      build_operator:
        description: 'Build and push operator image, tagged with branch name'
        type: boolean
        default: false

env:
  BUILDER_NAME: b-${{ github.run_id }}-${{ github.run_attempt }}

jobs:

  init:
    runs-on: ubuntu-slim
    outputs:
      builder_name: ${{ steps.export-builder-name.outputs.builder_name }}
      sanitized_ref_name: ${{ steps.sanitize-ref.outputs.sanitized_ref_name }}
      source_sha: ${{ steps.validate-source.outputs.source_sha }}
    steps:
      - name: Validate immutable source
        id: validate-source
        shell: bash
        env:
          REQUESTED_SOURCE_SHA: ${{ inputs.source_sha }}
          WORKFLOW_SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          source_sha="${REQUESTED_SOURCE_SHA:-${WORKFLOW_SOURCE_SHA}}"
          [[ "${source_sha}" =~ ^[0-9a-f]{40}$ ]]
          test "${source_sha}" = "${WORKFLOW_SOURCE_SHA}"
          echo "source_sha=${source_sha}" >> "${GITHUB_OUTPUT}"
      - name: Export builder name
        id: export-builder-name
        run: |
          echo "builder_name=${{ env.BUILDER_NAME }}" >> $GITHUB_OUTPUT
      - name: Sanitize ref name for container tags
        id: sanitize-ref
        shell: bash
        run: |
          sanitized=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/^-//;s/-$//' | cut -c1-128)
          echo "sanitized_ref_name=${sanitized}" >> $GITHUB_OUTPUT

  # ============================================================================
  # FRAMEWORK PIPELINES (build-only)
  # ============================================================================

  vllm-build:
    name: vllm-runtime # This name overlaps with other vllm jobs to group them in the UI
    needs: [init]
    if: inputs.build_vllm || inputs.build_vllm_placeholder
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: vllm
      target: runtime
      cuda_version: '["13.0"]'
      platform: ${{ inputs.build_vllm_placeholder && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
      builder_name: ${{ needs.init.outputs.builder_name }}
      build_timeout_minutes: ${{ inputs.build_vllm_placeholder && 120 || 60 }}
      build_only: ${{ inputs.build_vllm_placeholder }}
      source_ref: ${{ needs.init.outputs.source_sha }}
      extra_build_args: |
        ${{ inputs.build_vllm_placeholder && 'FLASHINFER_GIT_URL=https://github.com/galletas1712/flashinfer.git' || '' }}
        ${{ inputs.build_vllm_placeholder && 'FLASHINFER_GIT_REF=refs/heads/experiment/flashinfer-v0.6.15-pr3950-provenance-20260720' || '' }}
        ${{ inputs.build_vllm_placeholder && 'FLASHINFER_GIT_SHA=12a51a30ce011b08eb673cb4387db6d9f67945b1' || '' }}
        ${{ inputs.build_vllm_placeholder && 'GMS_SNAPSHOT_PROFILE=1' || '' }}
        ${{ inputs.build_vllm_placeholder && 'VLLM_GIT_URL=https://github.com/vllm-project/vllm.git' || '' }}
        ${{ inputs.build_vllm_placeholder && 'VLLM_GIT_REF=refs/pull/46877/head' || '' }}
        ${{ inputs.build_vllm_placeholder && 'VLLM_GIT_SHA=af259f998ff7301504829d2551c746502afe2f0a' || '' }}
        ${{ inputs.build_vllm_placeholder && 'VLLM_INSTALL_MODE=python-overlay' || '' }}
        ${{ inputs.build_vllm_placeholder && 'BASELINE_SBOM_FILE=vllm-openai@7f2bc168' || '' }}
        ${{ inputs.build_vllm_placeholder && 'VLLM_RUNTIME_BASE_IMAGE=vllm/vllm-openai@sha256:7f2bc168366c77fbd8329368f00310d208531c14ece6c2de31a6611ef99f6ec8' || '' }}
    secrets: inherit

  # ============================================================================
  # SNAPSHOT (build-only)
  # ============================================================================

  snapshot-agent:
    name: Snapshot Agent
    needs: [init]
    if: inputs.build_snapshot_agent || inputs.build_vllm_placeholder
    runs-on: prod-default-v2
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.init.outputs.source_sha }}
          persist-credentials: false
      - name: Verify source checkout
        shell: bash
        env:
          EXPECTED_SOURCE_SHA: ${{ needs.init.outputs.source_sha }}
        run: test "$(git rev-parse HEAD)" = "${EXPECTED_SOURCE_SHA}"
      - name: Build and push snapshot agent
        uses: ./.github/actions/build-deploy-component
        with:
          component: snapshot
          target: agent
          image_tag: ${{ needs.init.outputs.source_sha }}-snapshot-agent
          builder_name: ${{ needs.init.outputs.builder_name }}
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          azure_acr_hostname: ${{ secrets.AZURE_ACR_HOSTNAME }}
          azure_acr_user: ${{ secrets.AZURE_ACR_USER }}
          azure_acr_password: ${{ secrets.AZURE_ACR_PASSWORD }}
          extra_tags: |
            ${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ needs.init.outputs.source_sha }}-snapshot-agent
          extra_build_args: |
            CRIU_REPO=https://github.com/galletas1712/criu.git
            CRIU_REF=3dd2420c16e54fb7cd08b3e511d3a8bfb03cd001
            CRIU_SHA=3dd2420c16e54fb7cd08b3e511d3a8bfb03cd001
            CUDA_CHECKPOINT_REPO=https://github.com/NVIDIA/cuda-checkpoint.git
            CUDA_CHECKPOINT_REF=00d5cce84c628088d6caa203fc4af40c1538b6f7
            CUDA_CHECKPOINT_SHA=00d5cce84c628088d6caa203fc4af40c1538b6f7
            DYNAMO_COMMIT_SHA=${{ needs.init.outputs.source_sha }}
            GMS_SNAPSHOT_PROFILE=1

  snapshot-placeholder-vllm:
    name: vLLM Snapshot Placeholder
    needs: [init, vllm-build]
    if: inputs.build_vllm_placeholder
    runs-on: prod-default-v2
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.init.outputs.source_sha }}
          persist-credentials: false
      - name: Verify source checkout
        shell: bash
        env:
          EXPECTED_SOURCE_SHA: ${{ needs.init.outputs.source_sha }}
        run: test "$(git rev-parse HEAD)" = "${EXPECTED_SOURCE_SHA}"
      - name: Build and push vLLM snapshot placeholder
        uses: ./.github/actions/build-deploy-component
        with:
          component: snapshot
          target: placeholder
          image_tag: ${{ needs.init.outputs.source_sha }}-vllm-placeholder
          builder_name: ${{ needs.init.outputs.builder_name }}
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          azure_acr_hostname: ${{ secrets.AZURE_ACR_HOSTNAME }}
          azure_acr_user: ${{ secrets.AZURE_ACR_USER }}
          azure_acr_password: ${{ secrets.AZURE_ACR_PASSWORD }}
          extra_tags: |
            ${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ needs.init.outputs.source_sha }}-vllm-placeholder
          extra_build_args: |
            BASE_IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/ai-dynamo/dynamo:${{ needs.init.outputs.source_sha }}-vllm-runtime
            BASE_IMAGE_USER=dynamo
            CRIU_REPO=https://github.com/galletas1712/criu.git
            CRIU_REF=3dd2420c16e54fb7cd08b3e511d3a8bfb03cd001
            CRIU_SHA=3dd2420c16e54fb7cd08b3e511d3a8bfb03cd001
            CUDA_CHECKPOINT_REPO=https://github.com/NVIDIA/cuda-checkpoint.git
            CUDA_CHECKPOINT_REF=00d5cce84c628088d6caa203fc4af40c1538b6f7
            CUDA_CHECKPOINT_SHA=00d5cce84c628088d6caa203fc4af40c1538b6f7
            DYNAMO_COMMIT_SHA=${{ needs.init.outputs.source_sha }}

  image-digests:
    name: Record immutable image digests
    needs: [init, vllm-build, snapshot-agent, snapshot-placeholder-vllm]
    if: >-
      ${{
        always() &&
        !cancelled() &&
        needs.init.result == 'success' &&
        needs.vllm-build.result == 'success' &&
        needs.snapshot-agent.result == 'success' &&
        needs.snapshot-placeholder-vllm.result == 'success'
      }}
    runs-on: prod-default-small-v2
    steps:
      - name: Record ECR digests
        shell: bash
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          SOURCE_SHA: ${{ needs.init.outputs.source_sha }}
        run: |
          set -euo pipefail
          echo "### Immutable snapshot image digests" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Image tag | Digest |" >> "${GITHUB_STEP_SUMMARY}"
          echo "|---|---|" >> "${GITHUB_STEP_SUMMARY}"
          for suffix in vllm-runtime vllm-placeholder snapshot-agent; do
            tag="${SOURCE_SHA}-${suffix}"
            digest="$(
              aws ecr describe-images \
                --repository-name ai-dynamo/dynamo \
                --image-ids "imageTag=${tag}" \
                --query 'imageDetails[0].imageDigest' \
                --output text
            )"
            [[ "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]
            echo "| \`${tag}\` | \`${digest}\` |" >> "${GITHUB_STEP_SUMMARY}"
          done

  sglang-build:
    name: sglang-runtime # This name overlaps with other sglang jobs to group them in the UI
    needs: [init]
    if: inputs.build_sglang
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: sglang
      target: runtime
      cuda_version: '["13.0"]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: ${{ needs.init.outputs.builder_name }}
      build_timeout_minutes: 60
    secrets: inherit

  trtllm-build:
    name: trtllm-runtime # This name overlaps with other trtllm jobs to group them in the UI
    needs: [init]
    if: inputs.build_trtllm
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: trtllm
      target: runtime
      cuda_version: '["13.1"]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: ${{ needs.init.outputs.builder_name }}
      build_timeout_minutes: 60
    secrets: inherit

  vllm-copy-to-acr:
    name: vllm-runtime # This name overlaps with other vllm jobs to group them in the UI
    needs: [vllm-build]
    if: inputs.build_vllm
    uses: ./.github/workflows/shared-copy.yml
    with:
      target_tag_plain: ${{ needs.vllm-build.outputs.target_tag_plain }}
      cuda_version: '["13.0"]'
      override_arch: amd64 # We are using AMD64 images only on the rest of the clusters.
      copy_timeout_minutes: 10
    secrets: inherit

  sglang-copy-to-acr:
    name: sglang-runtime # This name overlaps with other sglang jobs to group them in the UI
    needs: [sglang-build]
    uses: ./.github/workflows/shared-copy.yml
    with:
      target_tag_plain: ${{ needs.sglang-build.outputs.target_tag_plain }}
      cuda_version: '["13.0"]'
      override_arch: amd64 # We are using AMD64 images only on the rest of the clusters.
      copy_timeout_minutes: 10
    secrets: inherit

  trtllm-copy-to-acr:
    name: trtllm-runtime # This name overlaps with other trtllm jobs to group them in the UI
    needs: [trtllm-build]
    uses: ./.github/workflows/shared-copy.yml
    with:
      target_tag_plain: ${{ needs.trtllm-build.outputs.target_tag_plain }}
      cuda_version: '["13.1"]'
      override_arch: amd64 # We are using AMD64 images only on the rest of the clusters.
      copy_timeout_minutes: 10
    secrets: inherit

  # ============================================================================
  # OPERATOR (build-only)
  # ============================================================================

  operator:
    needs: [init]
    if: inputs.build_operator
    name: Operator
    runs-on: prod-default-v2
    env:
      IMAGE_REGISTRY: ai-dynamo
      IMAGE_REPOSITORY: dynamo
      ECR_HOSTNAME: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Initialize Dynamo Builder
        uses: ./.github/actions/init-dynamo-builder
        with:
          builder_name: ${{ needs.init.outputs.builder_name }}
          flavor: general
          arch: 'linux/amd64,linux/arm64'
      - name: Docker Login
        uses: ./.github/actions/docker-login
        with:
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          azure_acr_hostname: ${{ secrets.AZURE_ACR_HOSTNAME }}
          azure_acr_user: ${{ secrets.AZURE_ACR_USER }}
          azure_acr_password: ${{ secrets.AZURE_ACR_PASSWORD }}
      - name: Build and push Container
        shell: bash
        working-directory: ./deploy/operator
        run: |
          ECR_DEFAULT_IMAGE_BASE="${ECR_HOSTNAME}/${IMAGE_REGISTRY}/${IMAGE_REPOSITORY}"
          ACR_IMAGE_BASE="${{ secrets.AZURE_ACR_HOSTNAME }}/${IMAGE_REGISTRY}/${IMAGE_REPOSITORY}"
          DEFAULT_TAG="${{ github.sha }}-operator"
          BRANCH_TAG="${{ needs.init.outputs.sanitized_ref_name }}-operator"
          IMAGE_URIS=(
            "${ECR_DEFAULT_IMAGE_BASE}:${DEFAULT_TAG}"
            "${ACR_IMAGE_BASE}:${DEFAULT_TAG}"
            "${ECR_DEFAULT_IMAGE_BASE}:${BRANCH_TAG}"
            "${ACR_IMAGE_BASE}:${BRANCH_TAG}"
          )

          TAGGING_FLAGS=$(printf -- '-t %s ' "${IMAGE_URIS[@]}")
          echo "flags for docker buildx: ${TAGGING_FLAGS}"

          docker buildx build --push \
              --platform linux/amd64,linux/arm64 \
              --build-arg DOCKER_PROXY=${ECR_HOSTNAME}/dockerhub/ \
              --build-context snapshot=../snapshot \
              ${TAGGING_FLAGS} -f Dockerfile .

          echo "### Operator Container Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image URI |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|" >> $GITHUB_STEP_SUMMARY
          for image_uri in "${IMAGE_URIS[@]}"; do
            echo "| \`${image_uri}\` |" >> $GITHUB_STEP_SUMMARY
          done

  # ============================================================================
  # CLEANUP
  # ============================================================================

  clean-k8s-builder:
    name: Clean K8s builder if exists
    runs-on: prod-default-small-v2
    if: always()
    needs: [init, vllm-build, vllm-copy-to-acr, sglang-build, trtllm-build, operator, snapshot-agent, snapshot-placeholder-vllm, image-digests]
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Create K8s builders (skip bootstrap)
      uses: ./.github/actions/bootstrap-buildkit
      continue-on-error: true
      with:
        builder_name: ${{ needs.init.outputs.builder_name }}
        buildkit_worker_addresses: ''
        skip_bootstrap: true
    - name: Builder Cleanup in case of k8s builder
      shell: bash
      run: |
        docker buildx rm ${{ needs.init.outputs.builder_name }} || true
