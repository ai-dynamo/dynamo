name: PR-XPU

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: pr-xpu-${{ github.ref_name }}
  cancel-in-progress: true

jobs:

  # ============================================================================
  # GATE – only proceed when "xpu" label is present
  # ============================================================================

  guard:
    runs-on: ubuntu-latest
    # (1) labeled event + label is "xpu" → pass
    # (2) labeled event + label is NOT "xpu" → skip
    # (3) other PR events + PR already has "xpu" label → pass
    if: >-
      (github.event.action == 'labeled' && github.event.label.name == 'xpu')
      || (github.event.action != 'labeled' && contains(github.event.pull_request.labels.*.name, 'xpu'))
    steps:
      - run: echo "Gate passed"

  # ============================================================================
  # CHANGE DETECTION
  # ============================================================================

  changed-files:
    needs: [guard]
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.changes.outputs.core }}
      vllm: ${{ steps.changes.outputs.vllm }}
      sglang: ${{ steps.changes.outputs.sglang }}
    steps:
      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # v4.3.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Check for changes
        id: changes
        uses: ./.github/actions/changed-files
        with:
          gh_token: ${{ github.token }}

  # ============================================================================
  # XPU CI – VLLM
  # ============================================================================

  xpu-ci-vllm:
    needs: [changed-files]
    if: >-
      needs.changed-files.outputs.core == 'true' ||
      needs.changed-files.outputs.vllm == 'true'
    uses: ./.github/workflows/xpu-ci.yaml
    with:
      framework: vllm
      pytest_markers: 'vllm and xpu_1 and pre_merge and not multimodal'

  # ============================================================================
  # STATUS CHECK
  # ============================================================================

  xpu-status-check:
    runs-on: ubuntu-latest
    needs: [changed-files, xpu-ci-vllm]
    if: always()
    steps:
      - name: Check all XPU jobs
        run: |
          echo '${{ toJson(needs) }}' | jq -e 'to_entries | map(.value.result) | all(. as $result | ["success", "skipped"] | any($result == .))'
