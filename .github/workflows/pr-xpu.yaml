name: PR-XPU

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, labeled]
  pull_request_review:
    types: [submitted]

concurrency:
  group: pr-xpu-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:

  # ============================================================================
  # GATE – "xpu" label required.  If author is an XPU contributor, CI starts
  # immediately; otherwise at least one XPU contributor must approve first.
  # Repo variable XPU_CONTRIBUTOR_LIST: comma-separated GitHub usernames.
  # ============================================================================

  guard:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'pull_request'
       && (
         (github.event.action == 'labeled' && github.event.label.name == 'xpu')
         || (github.event.action != 'labeled' && contains(github.event.pull_request.labels.*.name, 'xpu'))
       ))
      || (github.event_name == 'pull_request_review'
          && github.event.review.state == 'approved'
          && contains(github.event.pull_request.labels.*.name, 'xpu'))
    steps:
      - name: Check XPU contributor or approval
        run: |
          echo "::add-mask::${{ vars.XPU_CONTRIBUTOR_LIST }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          EVENT="${{ github.event_name }}"

          # Helper: check if a user is in the XPU contributor list
          is_contributor() {
            echo "${{ vars.XPU_CONTRIBUTOR_LIST }}" | tr ',' '\n' | grep -qx "$1"
          }

          if is_contributor "${AUTHOR}"; then
            echo "✅ PR author ${AUTHOR} is an XPU contributor – CI allowed"
            exit 0
          fi

          # Author is not a contributor – require an XPU contributor's approval
          if [[ "${EVENT}" == "pull_request_review" ]]; then
            REVIEWER="${{ github.event.review.user.login }}"
            if is_contributor "${REVIEWER}"; then
              echo "✅ XPU contributor ${REVIEWER} approved – CI allowed"
              exit 0
            else
              echo "❌ Reviewer ${REVIEWER} is not an XPU contributor"
              exit 1
            fi
          fi

          echo "❌ ${AUTHOR} is not an XPU contributor. An XPU contributor must approve to trigger CI."
          exit 1

  # ============================================================================
  # CHANGE DETECTION
  # ============================================================================

  changed-files:
    needs: [guard]
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.changes.outputs.core }}
      vllm: ${{ steps.changes.outputs.vllm }}
      sglang: ${{ steps.changes.outputs.sglang }}
    steps:
      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # v4.3.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Check for changes
        id: changes
        uses: ./.github/actions/changed-files
        with:
          gh_token: ${{ github.token }}

  # ============================================================================
  # XPU CI – VLLM
  # ============================================================================

  xpu-ci-vllm:
    needs: [changed-files]
    if: >-
      needs.changed-files.outputs.core == 'true' ||
      needs.changed-files.outputs.vllm == 'true'
    uses: ./.github/workflows/xpu-ci.yaml
    with:
      framework: vllm
      pytest_markers: 'vllm and xpu_1 and pre_merge and not multimodal'

  # ============================================================================
  # STATUS CHECK
  # ============================================================================

  xpu-status-check:
    runs-on: ubuntu-latest
    needs: [changed-files, xpu-ci-vllm]
    if: always()
    steps:
      - name: Check all XPU jobs
        run: |
          echo '${{ toJson(needs) }}' | jq -e 'to_entries | map(.value.result) | all(. as $result | ["success", "skipped"] | any($result == .))'
