#
# Runs deploy tests on push without requiring a PR. Uses release images from
# NVCR (kubernetes-operator, vllm-runtime) so no build step is needed.
# Also triggerable manually via workflow_dispatch.

name: Deploy Test on Push

on:
  push:
    branches:
      - main
      - deploy_test_static_ns
  workflow_dispatch:
    inputs:
      kube_context:
        description: 'kubectl context to target (e.g. nv-prd-dgxc.teleport.sh-dynamo-aws-dev-02 or azure-ci). Defaults to kubeconfig current-context.'
        required: false
        default: ''
      operator_tag:
        description: 'Operator image tag (default: main-operator)'
        required: false
        default: 'main-operator'

jobs:
  deploy-operator:
    runs-on: prod-deploy-tester-v1
    outputs:
      namespace: ${{ steps.setup.outputs.namespace }}
      vcluster_name: ${{ steps.setup.outputs.vcluster_name }}
      operator_tag: ${{ steps.setup.outputs.operator_tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set kubectl context
        shell: bash
        run: |
          cp /teleport/kubeconfig.yaml /tmp/kubeconfig.yaml
          kubectl --kubeconfig=/tmp/kubeconfig.yaml config use-context "${{ inputs.kube_context || 'nv-prd-dgxc.teleport.sh-dynamo-aws-dev-02' }}"
          echo "KUBECONFIG=/tmp/kubeconfig.yaml" >> $GITHUB_ENV
      - name: Setup vCluster and operator
        id: setup
        uses: ./.github/actions/setup-dynamo-operator
        with:
          hf_token: ${{ secrets.HF_TOKEN }}
          dockerhub_username: ${{ secrets.DOCKERHUB_LOGIN_USER }}
          dockerhub_password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

  deploy-test-smoke:
    name: Smoke Deploy Test
    needs: [deploy-operator]
    uses: ./.github/workflows/shared-deploy-test.yml
    with:
      framework: vllm
      profiles: '["agg"]'
      image_full: nvcr.io/nvidia/ai-dynamo/vllm-runtime:latest
      namespace: ${{ needs.deploy-operator.outputs.namespace }}
      vcluster_name: ${{ needs.deploy-operator.outputs.vcluster_name }}
      operator_tag: ${{ needs.deploy-operator.outputs.operator_tag }}
      kube_context: ${{ inputs.kube_context }}
    secrets: inherit

  deploy-cleanup:
    if: always()
    needs: [deploy-operator, deploy-test-smoke]
    runs-on: prod-deploy-tester-v1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set kubectl context
        shell: bash
        run: |
          cp /teleport/kubeconfig.yaml /tmp/kubeconfig.yaml
          kubectl --kubeconfig=/tmp/kubeconfig.yaml config use-context "${{ inputs.kube_context || 'nv-prd-dgxc.teleport.sh-dynamo-aws-dev-02' }}"
          echo "KUBECONFIG=/tmp/kubeconfig.yaml" >> $GITHUB_ENV
      - name: Teardown vCluster
        if: needs.deploy-operator.outputs.namespace != '' && needs.deploy-operator.outputs.vcluster_name != ''
        uses: ./.github/actions/teardown-dynamo-operator
        with:
          vcluster_name: ${{ needs.deploy-operator.outputs.vcluster_name }}
          vcluster_namespace: ${{ needs.deploy-operator.outputs.namespace }}
