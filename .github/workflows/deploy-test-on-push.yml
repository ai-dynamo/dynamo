#
# Runs infra smoke tests on push without requiring a PR. This validates that the
# prod deploy-test runner can reach aws-dev-02, create a GPU-requesting Job in
# the static deploy-test namespace, and create/connect to a short-lived vCluster.
# It intentionally does not install the Dynamo operator or create a
# DynamoGraphDeployment.

name: Deploy Test on Push

on:
  push:
    branches:
      - main
      - deploy_test_static_ns
  workflow_dispatch:
    inputs:
      kube_context:
        description: 'kubectl context to target (e.g. nv-prd-dgxc.teleport.sh-dynamo-aws-dev-02 or azure-ci). Defaults to kubeconfig current-context.'
        required: false
        default: ''

jobs:
  gpu-job-smoke:
    name: GPU Job Smoke Test
    runs-on: prod-deploy-tester-v1
    timeout-minutes: 25
    env:
      KUBE_CONTEXT: ${{ inputs.kube_context || 'nv-prd-dgxc.teleport.sh-dynamo-aws-dev-02' }}
      TEST_NAMESPACE: dynamo-deploy-test
      GPU_SMOKE_IMAGE: 210086341041.dkr.ecr.us-west-2.amazonaws.com/dockerhub/busybox:1.37
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set kubectl context
        shell: bash
        run: |
          cp /teleport/kubeconfig.yaml /tmp/kubeconfig.yaml
          kubectl --kubeconfig=/tmp/kubeconfig.yaml config use-context "${KUBE_CONTEXT}"
          echo "KUBECONFIG=/tmp/kubeconfig.yaml" >> $GITHUB_ENV

      - name: Run GPU scheduling smoke job
        shell: bash
        run: |
          set -euo pipefail

          JOB_NAME="gpu-smoke-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          POD_NAME=""

          cleanup() {
            echo "::group::Cleanup GPU smoke job"
            kubectl delete job "${JOB_NAME}" -n "${TEST_NAMESPACE}" --ignore-not-found=true --timeout=120s || true
            echo "::endgroup::"
          }
          trap cleanup EXIT

          echo "::group::Verify deploy-test infrastructure"
          kubectl get priorityclass ci-nightly-high-priority
          kubectl get clusterpolicies.kyverno.io deploy-test-pod-policy
          kubectl create namespace "${TEST_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: ResourceQuota
          metadata:
            name: deploy-test-gpu-quota
            namespace: ${TEST_NAMESPACE}
          spec:
            hard:
              requests.nvidia.com/gpu: "16"
              limits.nvidia.com/gpu: "16"
          EOF

          for _ in $(seq 1 120); do
            if kubectl get resourcequota deploy-test-gpu-quota -n "${TEST_NAMESPACE}" >/dev/null 2>&1; then
              kubectl get resourcequota deploy-test-gpu-quota -n "${TEST_NAMESPACE}" -o yaml
              break
            fi
            echo "Waiting for deploy-test-gpu-quota in ${TEST_NAMESPACE}..."
            sleep 2
          done
          kubectl get resourcequota deploy-test-gpu-quota -n "${TEST_NAMESPACE}" >/dev/null
          echo "::endgroup::"

          cat <<EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${JOB_NAME}
            namespace: ${TEST_NAMESPACE}
            labels:
              app.kubernetes.io/name: gpu-scheduling-smoke
          spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 600
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: gpu-scheduling-smoke
              spec:
                restartPolicy: Never
                containers:
                  - name: gpu-smoke
                    image: ${GPU_SMOKE_IMAGE}
                    imagePullPolicy: IfNotPresent
                    command: ["/bin/sh", "-c"]
                    args:
                      - |
                        set -eu
                        echo "GPU smoke pod scheduled on \${NODE_NAME}"
                        ls -l /dev/nvidia* || true
                        sleep 30
                    env:
                      - name: NODE_NAME
                        valueFrom:
                          fieldRef:
                            fieldPath: spec.nodeName
                    resources:
                      requests:
                        nvidia.com/gpu: "1"
                      limits:
                        nvidia.com/gpu: "1"
          EOF

          for _ in $(seq 1 60); do
            POD_NAME=$(kubectl get pod -n "${TEST_NAMESPACE}" -l job-name="${JOB_NAME}" \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            if [ -n "${POD_NAME}" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "${POD_NAME}" ]; then
            echo "::error::Job controller did not create a pod for ${JOB_NAME}"
            kubectl describe job "${JOB_NAME}" -n "${TEST_NAMESPACE}" || true
            exit 1
          fi

          echo "::group::Mutated pod scheduling fields"
          kubectl get pod "${POD_NAME}" -n "${TEST_NAMESPACE}" \
            -o jsonpath='priorityClassName={.spec.priorityClassName}{"\n"}nodeName={.spec.nodeName}{"\n"}nodeSelector={.spec.nodeSelector}{"\n"}tolerations={.spec.tolerations}{"\n"}'
          echo "::endgroup::"

          set +e
          kubectl wait --for=condition=complete "job/${JOB_NAME}" -n "${TEST_NAMESPACE}" --timeout=15m
          WAIT_STATUS=$?
          set -e

          echo "::group::GPU smoke status"
          kubectl get job "${JOB_NAME}" -n "${TEST_NAMESPACE}" -o wide || true
          kubectl get pod "${POD_NAME}" -n "${TEST_NAMESPACE}" -o wide || true
          kubectl logs "${POD_NAME}" -n "${TEST_NAMESPACE}" --all-containers=true || true
          echo "::endgroup::"

          if [ "${WAIT_STATUS}" -ne 0 ]; then
            echo "::group::GPU smoke diagnostics"
            kubectl describe job "${JOB_NAME}" -n "${TEST_NAMESPACE}" || true
            kubectl describe pod "${POD_NAME}" -n "${TEST_NAMESPACE}" || true
            kubectl get events -n "${TEST_NAMESPACE}" --sort-by='.lastTimestamp' | tail -80 || true
            echo "::endgroup::"
            exit "${WAIT_STATUS}"
          fi

          echo "### GPU smoke PASSED" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "- Namespace: \`${TEST_NAMESPACE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Job: \`${JOB_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pod: \`${POD_NAME}\`" >> "$GITHUB_STEP_SUMMARY"

  vcluster-smoke:
    name: vCluster Smoke Test
    runs-on: prod-deploy-tester-v1
    timeout-minutes: 20
    env:
      KUBE_CONTEXT: ${{ inputs.kube_context || 'nv-prd-dgxc.teleport.sh-dynamo-aws-dev-02' }}
      VCLUSTER_NAME: vc-smoke-${{ github.run_id }}-${{ github.run_attempt }}
      VCLUSTER_NAMESPACE: vc-smoke-${{ github.run_id }}-${{ github.run_attempt }}
      VCLUSTER_K8S_VERSION: v1.32.13
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set kubectl context
        shell: bash
        run: |
          cp /teleport/kubeconfig.yaml /tmp/kubeconfig.yaml
          kubectl --kubeconfig=/tmp/kubeconfig.yaml config use-context "${KUBE_CONTEXT}"
          echo "KUBECONFIG=/tmp/kubeconfig.yaml" >> $GITHUB_ENV

      - name: Install vCluster CLI
        uses: ./.github/actions/install-vcluster-cli

      - name: Create and verify vCluster
        shell: bash
        run: |
          set -euo pipefail

          PF_PID=""

          cleanup() {
            echo "::group::Cleanup vCluster smoke"
            if [ -n "${PF_PID}" ] && kill -0 "${PF_PID}" 2>/dev/null; then
              kill "${PF_PID}" || true
            fi
            kubectl get pods -n "${VCLUSTER_NAMESPACE}" -o wide || true
            vcluster delete "${VCLUSTER_NAME}" --namespace "${VCLUSTER_NAMESPACE}" 2>&1 || true
            kubectl delete namespace "${VCLUSTER_NAMESPACE}" --ignore-not-found=true --timeout=120s || true
            echo "::endgroup::"
          }
          trap cleanup EXIT

          kubectl create namespace "${VCLUSTER_NAMESPACE}"

          vcluster create "${VCLUSTER_NAME}" \
            --namespace "${VCLUSTER_NAMESPACE}" \
            --connect=false \
            --upgrade \
            --set controlPlane.distro.k8s.enabled=true \
            --set controlPlane.distro.k8s.version="${VCLUSTER_K8S_VERSION}"

          kubectl wait --for=condition=ready pod \
            -l "app=vcluster,release=${VCLUSTER_NAME}" \
            -n "${VCLUSTER_NAMESPACE}" \
            --timeout=900s

          kubectl get pods -n "${VCLUSTER_NAMESPACE}" -o wide

          kubectl port-forward -n "${VCLUSTER_NAMESPACE}" "svc/${VCLUSTER_NAME}" 8444:443 &
          PF_PID=$!

          for attempt in $(seq 1 30); do
            if ! kill -0 "${PF_PID}" 2>/dev/null; then
              echo "::error::kubectl port-forward exited before the vCluster API was reachable"
              exit 1
            fi
            if curl -sk --connect-timeout 1 --max-time 2 https://127.0.0.1:8444/healthz >/dev/null; then
              echo "vCluster API reachable after ${attempt} attempt(s)"
              break
            fi
            if [ "${attempt}" -eq 30 ]; then
              echo "::error::vCluster API did not become reachable within 60s"
              exit 1
            fi
            sleep 2
          done

          vcluster connect "${VCLUSTER_NAME}" \
            --namespace "${VCLUSTER_NAMESPACE}" \
            --server=https://127.0.0.1:8444 \
            --print > "${RUNNER_TEMP}/kubeconfig-vcluster-smoke"

          kubectl --kubeconfig="${RUNNER_TEMP}/kubeconfig-vcluster-smoke" \
            --request-timeout=15s get ns

          echo "### vCluster smoke PASSED" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "- Namespace: \`${VCLUSTER_NAMESPACE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- vCluster: \`${VCLUSTER_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
