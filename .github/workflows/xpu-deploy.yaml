name: XPU-Deploy

on:
  workflow_dispatch:
    inputs:
      framework:
        description: 'Framework name (vllm)'
        required: false
        type: string
        default: 'vllm'
      source_ref:
        description: 'Git ref/SHA to checkout. Empty = current SHA.'
        required: false
        type: string
        default: ''
      registry_host:
        description: 'Local registry host to push images to.'
        required: false
        type: string
        default: 'localhost:5000'
  workflow_call:
    inputs:
      framework:
        description: 'Framework name (vllm)'
        required: false
        type: string
        default: 'vllm'
      source_ref:
        description: 'Git ref/SHA to checkout. Empty = caller SHA.'
        required: false
        type: string
        default: ''
      registry_host:
        description: 'Local registry host to push images to.'
        required: false
        type: string
        default: 'localhost:5000'

concurrency:
  group: xpu-deploy-host-k8s
  cancel-in-progress: false

env:
  FRAMEWORK: ${{ inputs.framework || 'vllm' }}
  SOURCE_REF: ${{ inputs.source_ref || github.sha }}
  LOCAL_REGISTRY: ${{ inputs.registry_host || 'localhost:5000' }}
  TARGET: runtime
  DEVICE: xpu
  PLATFORM: linux/amd64

jobs:
  deploy-test-xpu:
    runs-on: xpu-deploy
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - profile: agg_xpu_dra
            name: agg_xpu_dra
            slug: agg-xpu-dra
          - profile: disagg_xpu_dra
            name: disagg_xpu_dra
            slug: disagg-xpu-dra
    name: ${{ matrix.name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # v4.3.0
        with:
          ref: ${{ env.SOURCE_REF }}

      - name: Generate Dockerfile
        shell: bash
        run: |
          echo "::group::Generating XPU Dockerfile"
          python3 ./container/render.py \
              --target=${{ env.TARGET }} \
              --framework=${{ env.FRAMEWORK }} \
              --device=${{ env.DEVICE }} \
              --platform=${{ env.PLATFORM }} \
              --show-result \
              --output-short-filename
          echo "::endgroup::"

      - name: Build local XPU image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_URI="${LOCAL_REGISTRY}/ai-dynamo/dynamo:${SOURCE_REF}-${FRAMEWORK}-${TARGET}-xpu"

          # Check if image already exists to avoid redundant builds
          if docker image inspect "${IMAGE_URI}" >/dev/null 2>&1; then
            echo "::notice::Image ${IMAGE_URI} already exists, skipping build"
          else
            docker build \
              --tag "${IMAGE_URI}" \
              -f ./container/rendered.Dockerfile \
              . 2>&1 | tee "build-${{ matrix.name }}.log"

            docker push "${IMAGE_URI}"
          fi

          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Build local operator image
        shell: bash
        run: |
          set -euo pipefail
          OPERATOR_IMAGE_URI="${LOCAL_REGISTRY}/ai-dynamo/dynamo:${SOURCE_REF}-operator"

          if docker image inspect "${OPERATOR_IMAGE_URI}" >/dev/null 2>&1; then
            echo "::notice::Image ${OPERATOR_IMAGE_URI} already exists, skipping build"
          else
            docker build \
              --build-context snapshot=./deploy/snapshot \
              --tag "${OPERATOR_IMAGE_URI}" \
              -f ./deploy/operator/Dockerfile \
              ./deploy/operator 2>&1 | tee "build-operator-${{ matrix.name }}.log"

            docker push "${OPERATOR_IMAGE_URI}"
          fi

          echo "OPERATOR_IMAGE_URI=${OPERATOR_IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Setup Kubernetes namespace and operator
        id: k8s-setup
        uses: ./.github/actions/setup-k8s-host-operator
        with:
          matrix_slug: ${{ matrix.slug }}
          operator_repository: ${{ env.LOCAL_REGISTRY }}/ai-dynamo/dynamo
          operator_tag: ${{ env.SOURCE_REF }}-operator

      - name: Setup XPU Deploy Test Environment
        shell: bash
        run: |
          set -euo pipefail

          NAMESPACE="${{ steps.k8s-setup.outputs.namespace }}"

          echo "${{ steps.k8s-setup.outputs.kubeconfig_base64 }}" | base64 -d > "${{ github.workspace }}/.kubeconfig"
          chmod 600 "${{ github.workspace }}/.kubeconfig"
          echo "KUBECONFIG=${{ github.workspace }}/.kubeconfig" >> "$GITHUB_ENV"

          kubectl --kubeconfig="${{ github.workspace }}/.kubeconfig" config set-context --current --namespace="${NAMESPACE}"
          kubectl --kubeconfig="${{ github.workspace }}/.kubeconfig" config get-contexts

          VENV_DIR="${{ github.workspace }}/.venv-deploy-test"
          python3 -m venv "${VENV_DIR}"
          echo "${VENV_DIR}/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=${VENV_DIR}" >> "$GITHUB_ENV"

          "${VENV_DIR}/bin/python" -m pip install --upgrade pip
          "${VENV_DIR}/bin/python" -m pip install -r container/deps/requirements.test.txt

      - name: Run XPU Deploy Test
        shell: bash
        env:
          KUBECONFIG: ${{ github.workspace }}/.kubeconfig
          NAMESPACE: ${{ steps.k8s-setup.outputs.namespace }}
          FRAMEWORK: ${{ inputs.framework || 'vllm' }}
          PROFILE: ${{ matrix.profile }}
          IMAGE: ${{ env.IMAGE_URI }}
          DYN_TEST_OUTPUT_PATH: ${{ github.workspace }}/test-output
          TEST_FILE: tests/deploy/test_deploy.py
          EXTRA_PYTEST_ARGS: -m "framework_only and xpu_1"
          DYNAMO_TEST_FRAMEWORK: ${{ inputs.framework || 'vllm' }}
          DYNAMO_TEST_PLATFORM: amd64
          DYNAMO_TEST_TYPE: deploy_${{ matrix.profile }}
          DYNAMO_TEST_WORKFLOW: ${{ github.workflow }}
        run: |
          set -euo pipefail

          mkdir -p test-results

          PYTEST_ARGS=(
            "--framework=${FRAMEWORK}"
            "--profile=${PROFILE}"
            "--image=${IMAGE}"
          )

          EXTRA_PYTEST_ARGS_ARRAY=()
          if [ -n "${EXTRA_PYTEST_ARGS}" ]; then
            # shellcheck disable=SC2206,SC2294
            eval "EXTRA_PYTEST_ARGS_ARRAY=(${EXTRA_PYTEST_ARGS})"
          fi

          TEST_NAME="${FRAMEWORK:-unknown}_${PROFILE:-unknown}"

          "${{ github.workspace }}/.venv-deploy-test/bin/python" -m pytest "${TEST_FILE}" \
            --namespace="${NAMESPACE}" \
            "${PYTEST_ARGS[@]}" \
            "${EXTRA_PYTEST_ARGS_ARRAY[@]}" \
            -v -s \
            --durations=10 \
            --junitxml="test-results/pytest_deploy_${TEST_NAME}_amd64_${{ github.run_id }}_${{ job.check_run_id }}.xml" \
            --alluredir=test-results/allure-results \
            --log-cli-level=INFO

      - name: Dump Kubernetes pod logs
        if: always() && steps.k8s-setup.outputs.namespace != ''
        shell: bash
        run: |
          set -euo pipefail

          NAMESPACE="${{ steps.k8s-setup.outputs.namespace }}"
          KUBECONFIG_PATH="${HOME}/.kube/config"

          echo "::group::Pod inventory for ${NAMESPACE}"
          kubectl --kubeconfig="${KUBECONFIG_PATH}" get pods -n "${NAMESPACE}" -o wide || true
          echo "::endgroup::"

          PODS=$(kubectl --kubeconfig="${KUBECONFIG_PATH}" get pods -n "${NAMESPACE}" -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null || true)
          if [[ -z "${PODS}" ]]; then
            echo "::warning::No pods found in ${NAMESPACE} when attempting to dump logs"
            exit 0
          fi

          for POD in ${PODS}; do
            echo "::group::kubectl describe pod/${POD}"
            kubectl --kubeconfig="${KUBECONFIG_PATH}" describe pod "${POD}" -n "${NAMESPACE}" || true
            echo "::endgroup::"

            CONTAINERS=$(kubectl --kubeconfig="${KUBECONFIG_PATH}" get pod "${POD}" -n "${NAMESPACE}" -o jsonpath='{range .spec.containers[*]}{.name}{"\n"}{end}' 2>/dev/null || true)
            if [[ -z "${CONTAINERS}" ]]; then
              echo "::warning::No containers found for pod ${POD}"
              continue
            fi

            for CONTAINER in ${CONTAINERS}; do
              echo "::group::kubectl logs pod/${POD} container/${CONTAINER}"
              kubectl --kubeconfig="${KUBECONFIG_PATH}" logs "${POD}" -n "${NAMESPACE}" -c "${CONTAINER}" --all-containers=false --tail=300 --timestamps=true --prefix=true || true
              echo "::endgroup::"

              if kubectl --kubeconfig="${KUBECONFIG_PATH}" get pod "${POD}" -n "${NAMESPACE}" -o jsonpath="{.status.containerStatuses[?(@.name=='${CONTAINER}')].restartCount}" 2>/dev/null | grep -Eq '^[1-9]'; then
                echo "::group::kubectl logs --previous pod/${POD} container/${CONTAINER}"
                kubectl --kubeconfig="${KUBECONFIG_PATH}" logs "${POD}" -n "${NAMESPACE}" -c "${CONTAINER}" --previous --tail=300 --timestamps=true --prefix=true || true
                echo "::endgroup::"
              fi
            done
          done

      - name: Cleanup Kubernetes namespace
        if: always() && steps.k8s-setup.outputs.namespace != ''
        uses: ./.github/actions/clean-up-k8s-host
        with:
          namespace: ${{ steps.k8s-setup.outputs.namespace }}
          cleanup_timeout: 180s
          final_wait_seconds: '120'