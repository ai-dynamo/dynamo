name: PR

on:
  push:
    branches:
      - "pull-request/[0-9]+"

concurrency:
  # The group name is the ref_name, so that workflows on the same PR/branch have the same group name for cancelling.
  group: docker-build-test-${{ github.ref_name }}
  cancel-in-progress: true

env:
  BUILDER_NAME: b-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  # ============================================================================
  # SETUP & DETECTION JOBS
  # ============================================================================
  changed-files:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.changes.outputs.core }}
      planner: ${{ steps.changes.outputs.planner }}
      operator: ${{ steps.changes.outputs.operator }}
      deploy: ${{ steps.changes.outputs.deploy }}
      vllm: ${{ steps.changes.outputs.vllm }}
      sglang: ${{ steps.changes.outputs.sglang }}
      trtllm: ${{ steps.changes.outputs.trtllm }}
      builder_name: ${{ steps.export-builder-name.outputs.builder_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        # Do not use fetch-depth: 0 — changed-files now works with shallow clone
      - name: Check for changes
        id: changes
        uses: ./.github/actions/changed-files
        with:
          gh_token: ${{ github.token }}
      - name: Export builder name
        id: export-builder-name
        run: |
          echo "builder_name=${{ env.BUILDER_NAME }}" >> $GITHUB_OUTPUT

  backend-status-check:
    runs-on: ubuntu-latest
    needs:
      - changed-files
      - operator
      - snapshot-agent
      - vllm-build
      - vllm-dev-build
      - vllm-test
      - vllm-multi-gpu-test
      - vllm-copy-to-acr
      - sglang-build
      - sglang-dev-build
      - sglang-test
      - sglang-multi-gpu-test
      - sglang-copy-to-acr
      - trtllm-build
      - trtllm-dev-build
      - trtllm-test
      - trtllm-multi-gpu-test
      - trtllm-copy-to-acr
      - planner-build
      - planner-test
    if: always()
    steps:
      - name: Check all dependent jobs
        run: |
          echo '${{ toJson(needs) }}' | jq -e 'to_entries | map(.value.result) | all(. as $result | ["success", "skipped"] | any($result == .))'

  deploy-status-check:
    runs-on: ubuntu-latest
    needs: [deploy-operator, deploy-test-vllm, deploy-test-sglang, deploy-test-trtllm]
    if: always()
    steps:
      - name: Check all deploy test jobs
        run: |
          echo '${{ toJson(needs) }}' | jq -e 'to_entries | map(.value.result) | all(. as $result | ["success", "skipped", "cancelled"] | any($result == .))'

  # ============================================================================
  # Operator
  # ============================================================================

  operator:
    needs: changed-files
    if: needs.changed-files.outputs.operator == 'true'
    name: Operator
    runs-on: prod-default-v2
    outputs:
      operator_default_tag: ${{ steps.build.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        # Do not use fetch-depth: 0 — it fetches all 1600+ branches (~3 min)
      - name: Build and push operator
        id: build
        uses: ./.github/actions/build-deploy-component
        with:
          component: operator
          image_tag: ${{ github.sha }}-operator
          builder_name: ${{ needs.changed-files.outputs.builder_name }}
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          azure_acr_hostname: ${{ secrets.AZURE_ACR_HOSTNAME }}
          azure_acr_user: ${{ secrets.AZURE_ACR_USER }}
          azure_acr_password: ${{ secrets.AZURE_ACR_PASSWORD }}
          extra_tags: |
            ${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ github.sha }}-operator


# ============================================================================
# Snapshot Agent
# ============================================================================

  snapshot-agent:
    needs: changed-files
    if: needs.changed-files.outputs.deploy == 'true'
    name: Snapshot Agent
    runs-on: prod-default-v2
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        # Do not use fetch-depth: 0 — it fetches all 1600+ branches (~3 min)
      - name: Build and push snapshot agent
        uses: ./.github/actions/build-deploy-component
        with:
          component: snapshot
          image_tag: ${{ github.sha }}-snapshot-agent
          builder_name: ${{ needs.changed-files.outputs.builder_name }}
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}

# ============================================================================
# FRAMEWORK PIPELINES (Build → Test → Copy)
# ============================================================================
  # ============================================================================
  # BUILD PIPELINES
  # ============================================================================

  vllm-build:
    name: vllm-runtime # This name overlaps with other vllm jobs to group them in the UI
    needs: [changed-files]
    if: needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.vllm == 'true' || needs.changed-files.outputs.deploy == 'true'
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: vllm
      target: runtime
      cuda_version: '["12.9", "13.0"]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: ${{ needs.changed-files.outputs.builder_name }}
      build_timeout_minutes: 60
    secrets: inherit

  vllm-dev-build:
    name: vllm-dev
    needs: [changed-files]
    if: needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.vllm == 'true'
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: vllm
      target: dev
      cuda_version: '["12.9", "13.0"]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: ${{ needs.changed-files.outputs.builder_name }}
      push_image: false
      build_timeout_minutes: 60
    secrets: inherit

  sglang-build:
    name: sglang-runtime # This name overlaps with other sglang jobs to group them in the UI
    needs: [changed-files]
    if: needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.sglang == 'true' || needs.changed-files.outputs.deploy == 'true'
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: sglang
      target: runtime
      cuda_version: '["12.9", "13.0"]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: ${{ needs.changed-files.outputs.builder_name }}
      build_timeout_minutes: 60
    secrets: inherit

  sglang-dev-build:
    name: sglang-dev
    needs: [changed-files]
    if: needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.sglang == 'true'
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: sglang
      target: dev
      cuda_version: '["12.9", "13.0"]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: ${{ needs.changed-files.outputs.builder_name }}
      push_image: false
      build_timeout_minutes: 60
    secrets: inherit

  trtllm-build:
    name: trtllm-runtime # This name overlaps with other trtllm jobs to group them in the UI
    needs: [changed-files]
    if: needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.trtllm == 'true' || needs.changed-files.outputs.deploy == 'true'
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: trtllm
      target: runtime
      cuda_version: '["13.1"]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: ${{ needs.changed-files.outputs.builder_name }}
      build_timeout_minutes: 60
    secrets: inherit

  trtllm-dev-build:
    name: trtllm-dev
    needs: [changed-files]
    if: needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.trtllm == 'true'
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: trtllm
      target: dev
      cuda_version: '["13.1"]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: ${{ needs.changed-files.outputs.builder_name }}
      push_image: false
      build_timeout_minutes: 60
    secrets: inherit

  planner-build:
    name: planner # This name overlaps with other planner jobs to group them in the UI
    needs: [changed-files]
    if: needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.planner == 'true'
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: dynamo
      target: planner
      cuda_version: '[""]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: ${{ needs.changed-files.outputs.builder_name }}
      build_timeout_minutes: 45
    secrets: inherit

  # ============================================================================
  # TEST PIPELINES
  # ============================================================================

  vllm-test:
    name: vllm-runtime # This name overlaps with other vllm jobs to group them in the UI
    needs: [changed-files, vllm-build]
    if: needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.vllm == 'true' || needs.changed-files.outputs.deploy == 'true'
    uses: ./.github/workflows/shared-test.yml
    with:
      test_suite_name: vllm
      test_type: Test
      amd_runner: prod-tester-amd-gpu-v1 # This runner is overridden for ARM platform
      target_tag_plain: ${{ needs.vllm-build.outputs.target_tag_plain }}
      cuda_version: '["12.9", "13.0"]'
      platform: '["amd64", "arm64"]' # arm64 for CPU tests, single GPU tests are skipped
      run_cpu_only_tests: true
      cpu_only_test_markers: pre_merge and vllm and gpu_0
      gpu_test_markers: pre_merge and vllm and gpu_1
      gpu_test_timeout_minutes: 45
    secrets: inherit

  vllm-multi-gpu-test:
    name: vllm-runtime # This name overlaps with other vllm jobs to group them in the UI
    needs: [changed-files, vllm-build]
    if: needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.vllm == 'true' || needs.changed-files.outputs.deploy == 'true'
    uses: ./.github/workflows/shared-test.yml
    with:
      test_suite_name: vllm
      test_type: Multi-GPU Test
      amd_runner: prod-tester-amd-gpu-4-v1
      target_tag_plain: ${{ needs.vllm-build.outputs.target_tag_plain }}
      cuda_version: '["12.9", "13.0"]'
      platform: '["amd64"]' # No ARM GPUs available
      run_sanity_check: false
      gpu_test_markers: pre_merge and vllm and (gpu_2 or gpu_4)
      gpu_test_timeout_minutes: 60
    secrets: inherit

  sglang-test:
    name: sglang-runtime # This name overlaps with other sglang jobs to group them in the UI
    needs: [changed-files, sglang-build]
    if: needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.sglang == 'true' || needs.changed-files.outputs.deploy == 'true'
    uses: ./.github/workflows/shared-test.yml
    with:
      test_suite_name: sglang
      test_type: Test
      amd_runner: prod-tester-amd-gpu-v1 # This runner is overridden for ARM platform
      target_tag_plain: ${{ needs.sglang-build.outputs.target_tag_plain }}
      cuda_version: '["12.9", "13.0"]'
      platform: '["amd64", "arm64"]' # arm64 for CPU tests, single GPU tests are skipped
      run_cpu_only_tests: true
      cpu_only_test_markers: pre_merge and sglang and gpu_0
      gpu_test_markers: pre_merge and sglang and gpu_1
    secrets: inherit

  sglang-multi-gpu-test:
    name: sglang-runtime # This name overlaps with other sglang jobs to group them in the UI
    needs: [changed-files, sglang-build]
    if: needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.sglang == 'true' || needs.changed-files.outputs.deploy == 'true'
    uses: ./.github/workflows/shared-test.yml
    with:
      test_suite_name: sglang
      test_type: Multi-GPU Test
      amd_runner: prod-tester-amd-gpu-4-v1
      target_tag_plain: ${{ needs.sglang-build.outputs.target_tag_plain }}
      cuda_version: '["12.9", "13.0"]'
      platform: '["amd64"]' # No ARM GPUs available
      run_sanity_check: false
      gpu_test_markers: pre_merge and sglang and (gpu_2 or gpu_4)
      gpu_test_timeout_minutes: 60
    secrets: inherit

  # ---------------------------------------------------------------------------
  # TEMPORARY: reproduce the nightly sglang hang in a focused, fast-feedback
  # job so we can capture diagnostics. The nightly `sglang-pipeline Test (amd64)`
  # deadlocks after test_sglang_kv_router_basic[tcp] -> the next test
  # (test_router_decisions_sglang_multiple_workers) never completes. This job
  # runs only the minimum preceding sequence we suspect of leaving orphan GPU
  # state, so we get an answer in ~30-45 minutes instead of 3-5 hours.
  # Delete this job once the hang is understood and fixed.
  # ---------------------------------------------------------------------------
  sglang-hang-repro:
    name: sglang-hang-repro (temp)
    needs: [changed-files, sglang-build]
    if: |
      always() && !cancelled() &&
      needs.sglang-build.result == 'success' &&
      (needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.sglang == 'true')
    runs-on: prod-tester-amd-gpu-v1
    timeout-minutes: 75
    env:
      CONTAINER_NAME: hang-repro-${{ github.run_id }}-${{ github.run_attempt }}-pytest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Calculate test image tag
        id: tag
        shell: bash
        env:
          ECR_REPOSITORY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/ai-dynamo/dynamo
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ github.sha }}-${{ needs.sglang-build.outputs.target_tag_plain }}-cuda12"
          TEST_IMAGE="${ECR_REPOSITORY}:${IMAGE_TAG}-test"
          echo "test_image=${TEST_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Using test image: ${TEST_IMAGE}"
      - name: Docker login
        uses: ./.github/actions/docker-login
        with:
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
      - name: Pull test image
        shell: bash
        run: |
          set -euo pipefail
          docker pull "${{ steps.tag.outputs.test_image }}"
      - name: Run 4-test poisoning sequence
        id: repro
        timeout-minutes: 45
        shell: bash
        run: |
          set -o pipefail
          # Run ONLY the sequence we suspect of triggering the nightly hang.
          # --timeout=300 (pytest-timeout, thread method) kills any single test
          # that exceeds 5 min -- much faster than the 5h nightly timeout.
          docker run --gpus all --network host --rm \
            --name "${CONTAINER_NAME}" \
            -w /workspace \
            -e DYNAMO_TEST_FRAMEWORK=sglang \
            -e DYNAMO_TEST_PLATFORM=amd64 \
            -e DYNAMO_TEST_TYPE=pre_merge_gpu \
            "${{ steps.tag.outputs.test_image }}" \
            sh -c 'umask 0022 && pytest -v --tb=short --timeout=300 --timeout-method=thread \
              -o cache_dir=/tmp/.pytest_cache --basetemp=/tmp/pytest_temp \
              tests/gpu_memory_service/test_quiesce_resume.py::test_gms_basic_quiesce_resume_sglang \
              tests/gpu_memory_service/test_shadow_failover.py::test_gms_shadow_engine_failover_sglang \
              "tests/router/test_router_e2e_with_sglang.py::test_sglang_kv_router_basic[tcp]" \
              "tests/router/test_router_e2e_with_sglang.py::test_router_decisions_sglang_multiple_workers[tcp]"'
      - name: Diagnose on hang or failure
        # Mirrors the diagnostic step in .github/actions/pytest/action.yml but
        # scoped to this job's container. Fires even if the pytest step was
        # cancelled by timeout-minutes.
        if: always()
        shell: bash
        run: |
          set +e
          if ! docker ps --format '{{.Names}}' | grep -qx "${CONTAINER_NAME}"; then
            echo "ℹ️  No lingering ${CONTAINER_NAME} — nothing to diagnose."
            exit 0
          fi
          echo "⚠️  Container ${CONTAINER_NAME} survived the step — gathering diagnostics."
          echo "=== host: docker ps ===";            docker ps --no-trunc
          echo "=== host: nvidia-smi ===";           nvidia-smi || true
          echo "=== host: listening sockets (top 80) ==="
          (ss -tunlp 2>/dev/null || netstat -tunlp 2>/dev/null) | head -80 || true
          echo "=== container: process tree ==="
          docker exec "${CONTAINER_NAME}" sh -c 'ps auxf 2>/dev/null || ps -ef' || true
          echo "=== container: pytest/sglang/dynamo pids ==="
          docker exec "${CONTAINER_NAME}" sh -c "pgrep -af 'pytest|sglang|dynamo' 2>/dev/null" || true
          echo "=== container: per-worker log tails (DYN-2784) ==="
          docker exec "${CONTAINER_NAME}" sh -c '
            set +e
            found=0
            for f in /tmp/dynamo_tests/*/worker_*/python3.log.txt \
                     /tmp/dynamo_tests/*/python3.log.txt; do
              [ -f "$f" ] || continue
              found=1
              echo "--- tail -200 $f ---"
              tail -200 "$f"
            done
            if [ "$found" = "0" ]; then
              echo "(no worker log files under /tmp/dynamo_tests/)"
            fi
          ' || true
          echo "=== container: py-spy dumps ==="
          docker exec "${CONTAINER_NAME}" sh -c '
            command -v py-spy >/dev/null 2>&1 || pip install --quiet --disable-pip-version-check py-spy 2>/dev/null || true
            for pid in $(pgrep -f "pytest|python.*dynamo.sglang" 2>/dev/null); do
              echo "--- py-spy dump --pid $pid ---"
              py-spy dump --pid "$pid" 2>&1 || true
            done
          ' || true
          echo "=== container: /proc/<pid>/stack ==="
          docker exec "${CONTAINER_NAME}" sh -c '
            for pid in $(pgrep -f "pytest|python.*dynamo.sglang" 2>/dev/null); do
              echo "--- /proc/$pid/stack ---"
              cat "/proc/$pid/stack" 2>/dev/null || echo "(kernel stack unavailable)"
            done
          ' || true
          echo "=== cleanup: force-removing ${CONTAINER_NAME} ==="
          docker rm -f "${CONTAINER_NAME}" >/dev/null 2>&1 || true

  trtllm-test:
    name: trtllm-runtime # This name overlaps with other trtllm jobs to group them in the UI
    needs: [changed-files, trtllm-build]
    if: needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.trtllm == 'true' || needs.changed-files.outputs.deploy == 'true'
    uses: ./.github/workflows/shared-test.yml
    with:
      test_suite_name: trtllm
      test_type: Test
      amd_runner: prod-tester-amd-gpu-v1 # This runner is overridden for ARM platform
      target_tag_plain: ${{ needs.trtllm-build.outputs.target_tag_plain }}
      cuda_version: '["13.1"]'
      platform: '["amd64", "arm64"]' # arm64 for CPU tests, single GPU tests are skipped
      run_cpu_only_tests: true
      cpu_only_test_markers: pre_merge and trtllm and gpu_0
      gpu_test_markers: pre_merge and trtllm and gpu_1
    secrets: inherit

  trtllm-multi-gpu-test:
    name: trtllm-runtime # This name overlaps with other trtllm jobs to group them in the UI
    needs: [changed-files, trtllm-build]
    if: needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.trtllm == 'true' || needs.changed-files.outputs.deploy == 'true'
    uses: ./.github/workflows/shared-test.yml
    with:
      test_suite_name: trtllm
      test_type: Multi-GPU Test
      amd_runner: prod-tester-amd-gpu-4-v1
      target_tag_plain: ${{ needs.trtllm-build.outputs.target_tag_plain }}
      cuda_version: '["13.1"]'
      platform: '["amd64"]' # No ARM GPUs available
      run_sanity_check: false
      gpu_test_markers: pre_merge and trtllm and (gpu_2 or gpu_4)
      gpu_test_timeout_minutes: 60
    secrets: inherit

  planner-test:
    name: planner # This name overlaps with other planner jobs to group them in the UI
    needs: [changed-files, planner-build]
    if: needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.planner == 'true'
    uses: ./.github/workflows/shared-test.yml
    with:
      test_suite_name: planner
      test_type: CPU Test
      amd_runner: prod-tester-amd-gpu-v1 # TODO: CPU only DinD runner for dynamo repo
      target_tag_plain: ${{ needs.planner-build.outputs.target_tag_plain }}
      cuda_version: '[""]'
      platform: '["amd64"]'
      run_sanity_check: false
      run_cpu_only_tests: true
      cpu_only_test_markers: 'pre_merge and planner and gpu_0'
      cpu_only_test_timeout_minutes: 30
      run_gpu_tests: false
    secrets: inherit

  # ============================================================================
  # IMAGE COMPLIANCE PIPELINES
  # ============================================================================

  vllm-compliance:
    name: vllm-runtime # This name overlaps with other vllm jobs to group them in the UI
    needs: [changed-files, vllm-build]
    if: needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.vllm == 'true' || needs.changed-files.outputs.deploy == 'true'
    uses: ./.github/workflows/shared-compliance.yml
    with:
      framework: vllm
      target: runtime
      target_tag_plain: ${{ needs.vllm-build.outputs.target_tag_plain }}
      cuda_version: '["12.9", "13.0"]'
      platform: '["amd64"]'
    secrets: inherit

  sglang-compliance:
    name: sglang-runtime # This name overlaps with other sglang jobs to group them in the UI
    needs: [changed-files, sglang-build]
    if: needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.sglang == 'true' || needs.changed-files.outputs.deploy == 'true'
    uses: ./.github/workflows/shared-compliance.yml
    with:
      framework: sglang
      target: runtime
      target_tag_plain: ${{ needs.sglang-build.outputs.target_tag_plain }}
      cuda_version: '["12.9", "13.0"]'
      platform: '["amd64"]'
    secrets: inherit

  trtllm-compliance:
    name: trtllm-runtime # This name overlaps with other trtllm jobs to group them in the UI
    needs: [changed-files, trtllm-build]
    if: needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.trtllm == 'true' || needs.changed-files.outputs.deploy == 'true'
    uses: ./.github/workflows/shared-compliance.yml
    with:
      framework: trtllm
      target: runtime
      target_tag_plain: ${{ needs.trtllm-build.outputs.target_tag_plain }}
      cuda_version: '["13.1"]'
      platform: '["amd64"]'
    secrets: inherit

  planner-compliance:
    name: planner # This name overlaps with other planner jobs to group them in the UI
    needs: [changed-files, planner-build]
    if: needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.planner == 'true'
    uses: ./.github/workflows/shared-compliance.yml
    with:
      framework: dynamo
      target: planner
      target_tag_plain: ${{ needs.planner-build.outputs.target_tag_plain }}
      cuda_version: '[""]'
      platform: '["amd64"]'
    secrets: inherit

  # ============================================================================
  # IMAGE COPY PIPELINES
  # ============================================================================

  vllm-copy-to-acr:
    name: vllm-runtime # This name overlaps with other vllm jobs to group them in the UI
    needs: [changed-files, vllm-build, vllm-test]
    if: |
      always() && !cancelled() &&
      (needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.vllm == 'true' || needs.changed-files.outputs.deploy == 'true') &&
      needs.vllm-build.result == 'success' &&
      (needs.vllm-test.result == 'success' || needs.vllm-test.result == 'skipped')
    uses: ./.github/workflows/shared-copy.yml
    with:
      target_tag_plain: ${{ needs.vllm-build.outputs.target_tag_plain }}
      cuda_version: '["12.9", "13.0"]'
      override_arch: amd64 # We are using AMD64 images only on the rest of the clusters.
      copy_timeout_minutes: 10
    secrets: inherit

  sglang-copy-to-acr:
    name: sglang-runtime # This name overlaps with other sglang jobs to group them in the UI
    needs: [changed-files, sglang-build, sglang-test]
    if: |
      always() && !cancelled() &&
      (needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.sglang == 'true' || needs.changed-files.outputs.deploy == 'true') &&
      needs.sglang-build.result == 'success' &&
      (needs.sglang-test.result == 'success' || needs.sglang-test.result == 'skipped')
    uses: ./.github/workflows/shared-copy.yml
    with:
      target_tag_plain: ${{ needs.sglang-build.outputs.target_tag_plain }}
      cuda_version: '["12.9", "13.0"]'
      override_arch: amd64 # We are using AMD64 images only on the rest of the clusters.
      copy_timeout_minutes: 10
    secrets: inherit

  trtllm-copy-to-acr:
    name: trtllm-runtime # This name overlaps with other trtllm jobs to group them in the UI
    needs: [changed-files, trtllm-build, trtllm-test]
    if: |
      always() && !cancelled() &&
      (needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.trtllm == 'true' || needs.changed-files.outputs.deploy == 'true') &&
      needs.trtllm-build.result == 'success' &&
      (needs.trtllm-test.result == 'success' || needs.trtllm-test.result == 'skipped')
    uses: ./.github/workflows/shared-copy.yml
    with:
      target_tag_plain: ${{ needs.trtllm-build.outputs.target_tag_plain }}
      cuda_version: '["13.1"]'
      override_arch: amd64 # We are using AMD64 images only on the rest of the clusters.
      copy_timeout_minutes: 10
    secrets: inherit

  # ============================================================================
  # DEPLOY TEST PIPELINES
  # ============================================================================

  deploy-operator:
    if: |
      !cancelled() && !failure() &&
      (needs.changed-files.outputs.vllm == 'true' ||
       needs.changed-files.outputs.sglang == 'true' ||
       needs.changed-files.outputs.trtllm == 'true' ||
       needs.changed-files.outputs.deploy == 'true') &&
      (needs.operator.result == 'success' || needs.operator.result == 'skipped')
    needs: [changed-files, operator]
    runs-on: prod-default-small-v2
    outputs:
      namespace: ${{ steps.setup.outputs.namespace }}
      vcluster_name: ${{ steps.setup.outputs.vcluster_name }}
      operator_tag: ${{ steps.setup.outputs.operator_tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Setup vCluster and operator
        id: setup
        uses: ./.github/actions/setup-dynamo-operator
        with:
          kubeconfig_base64: ${{ secrets.AZURE_AKS_CI_KUBECONFIG_B64 }}
          registry: ${{ secrets.AZURE_ACR_HOSTNAME }}
          operator_tag: ${{ needs.operator.result == 'success' && needs.operator.outputs.operator_default_tag || 'main-operator' }}
          hf_token: ${{ secrets.HF_TOKEN }}
          dockerhub_username: ${{ secrets.DOCKERHUB_LOGIN_USER }}
          dockerhub_password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

  deploy-test-vllm:
    name: vllm Deploy Test
    needs: [changed-files, deploy-operator, vllm-copy-to-acr, vllm-multi-gpu-test]
    if: |
      !cancelled() && !failure() &&
      (needs.changed-files.outputs.vllm == 'true' || needs.changed-files.outputs.deploy == 'true')
    uses: ./.github/workflows/shared-deploy-test.yml
    with:
      framework: vllm
      profiles: '["agg", "agg_router", "disagg", "disagg_router"]'
      image_suffix: vllm-runtime-cuda12
      namespace: ${{ needs.deploy-operator.outputs.namespace }}
      vcluster_name: ${{ needs.deploy-operator.outputs.vcluster_name }}
      operator_tag: ${{ needs.deploy-operator.outputs.operator_tag }}
    secrets: inherit

  deploy-test-sglang:
    name: sglang Deploy Test
    needs: [changed-files, deploy-operator, sglang-copy-to-acr, sglang-multi-gpu-test]
    if: |
      !cancelled() && !failure() &&
      (needs.changed-files.outputs.sglang == 'true' || needs.changed-files.outputs.deploy == 'true')
    uses: ./.github/workflows/shared-deploy-test.yml
    with:
      framework: sglang
      profiles: '["agg", "agg_router"]'
      image_suffix: sglang-runtime-cuda12
      namespace: ${{ needs.deploy-operator.outputs.namespace }}
      vcluster_name: ${{ needs.deploy-operator.outputs.vcluster_name }}
      operator_tag: ${{ needs.deploy-operator.outputs.operator_tag }}
    secrets: inherit

  deploy-test-trtllm:
    name: trtllm Deploy Test
    needs: [changed-files, deploy-operator, trtllm-copy-to-acr, trtllm-multi-gpu-test]
    if: |
      !cancelled() && !failure() &&
      (needs.changed-files.outputs.trtllm == 'true' || needs.changed-files.outputs.deploy == 'true')
    uses: ./.github/workflows/shared-deploy-test.yml
    with:
      framework: trtllm
      profiles: '["agg", "agg_router"]'
      image_suffix: trtllm-runtime-cuda13
      namespace: ${{ needs.deploy-operator.outputs.namespace }}
      vcluster_name: ${{ needs.deploy-operator.outputs.vcluster_name }}
      operator_tag: ${{ needs.deploy-operator.outputs.operator_tag }}
    secrets: inherit

  deploy-cleanup:
    if: always()
    needs: [deploy-operator, deploy-test-vllm, deploy-test-sglang, deploy-test-trtllm]
    runs-on: prod-default-small-v2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Teardown vCluster
        if: needs.deploy-operator.outputs.namespace != '' && needs.deploy-operator.outputs.vcluster_name != ''
        uses: ./.github/actions/teardown-dynamo-operator
        with:
          kubeconfig_base64: ${{ secrets.AZURE_AKS_CI_KUBECONFIG_B64 }}
          vcluster_name: ${{ needs.deploy-operator.outputs.vcluster_name }}
          vcluster_namespace: ${{ needs.deploy-operator.outputs.namespace }}

  clean-k8s-builder:
    name: Clean K8s builder if exists
    runs-on: prod-default-small-v2
    if: always()
    needs:
      - changed-files
      - operator
      - planner-test
      - vllm-copy-to-acr
      - vllm-multi-gpu-test
      - sglang-copy-to-acr
      - sglang-multi-gpu-test
      - trtllm-copy-to-acr
      - trtllm-multi-gpu-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Create K8s builders (skip bootstrap)
        uses: ./.github/actions/bootstrap-buildkit
        continue-on-error: true
        with:
          builder_name: ${{ needs.changed-files.outputs.builder_name }}
          buildkit_worker_addresses: ''
          skip_bootstrap: true
      - name: Builder Cleanup in case of k8s builder
        shell: bash
        run: |
          docker buildx rm ${{ needs.changed-files.outputs.builder_name }} || true

  # ============================================================================
  # ALLURE REPORT
  # Generate Allure test report and deploy to GitHub Pages
  # ============================================================================

  allure-report:
    needs:
      - changed-files
      - operator
      - vllm-build
      - vllm-test
      - vllm-multi-gpu-test
      - vllm-copy-to-acr
      - sglang-build
      - sglang-test
      - sglang-multi-gpu-test
      - sglang-copy-to-acr
      - trtllm-build
      - trtllm-test
      - trtllm-multi-gpu-test
      - trtllm-copy-to-acr
      - deploy-test-vllm
      - deploy-test-sglang
      - deploy-test-trtllm
    if: false
    # Disabled: gh-pages branch bloated to ~1GB after 72 commits of Allure reports
    # if: ${{ !cancelled() }}
    uses: ./.github/workflows/generate-allure-report.yml
    with:
      run_id: ${{ github.run_id }}
      subdir: pr
      workflow_label: PR
    permissions:
      contents: write
      actions: read
