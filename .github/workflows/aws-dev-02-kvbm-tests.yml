name: aws-dev-02 kvbm tests

# Temporary push harness for validating the marker-driven KVBM post-merge job
# before relying on it from the main post-merge workflow.
on:
  push:
    branches: [test/aws-dev-02-runner-smoke]
  workflow_dispatch:
    inputs:
      framework:
        description: 'Framework to validate'
        type: choice
        options: [all, vllm]
        default: all

permissions:
  contents: read

jobs:
  config:
    name: Config
    runs-on: ubuntu-latest
    outputs:
      run_vllm: ${{ steps.flags.outputs.run_vllm }}
    steps:
      - id: flags
        shell: bash
        env:
          FW: ${{ github.event.inputs.framework || 'all' }}
        run: |
          if [[ "$FW" == "all" || "$FW" == "vllm" ]]; then
            echo "run_vllm=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_vllm=false" >> "$GITHUB_OUTPUT"
          fi

  vllm-build:
    name: vllm-runtime
    needs: [config]
    if: github.event_name != 'workflow_dispatch' || needs.config.outputs.run_vllm == 'true'
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: vllm
      target: runtime
      cuda_version: '["13.0"]'
      platform: 'linux/amd64'
      builder_name: b-${{ github.run_id }}-${{ github.run_attempt }}
      inline_compliance: true
      build_timeout_minutes: 120
      archive_sources: false
    secrets: inherit

  kvbm-tests:
    name: kvbm (${{ matrix.name }})
    needs: [config, vllm-build]
    if: github.event_name != 'workflow_dispatch' || needs.config.outputs.run_vllm == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: consolidator
            pytest_markers: post_merge and h100 and kvbm and kvbm_consolidator and gpu_1
          - name: determinism-cache-reset
            pytest_markers: post_merge and h100 and kvbm and kvbm_determinism and gpu_1
          - name: determinism-concurrency
            pytest_markers: post_merge and h100 and kvbm_concurrency and kvbm_determinism and gpu_1
    runs-on: aws-dev-02-tester-amd-gpu-v2
    container:
      image: ${{ vars.RUNNERS_REGISTRY }}/ai-dynamo/dynamo:${{ github.sha }}-${{ needs.vllm-build.outputs.target_tag_plain }}-test
      env:
        # Required: dynamo image user is UID 1000, runner job pod runs as UID 1001.
        HOME: /__w/dynamo/dynamo
        USER: dynamo
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Environment
        run: |
          id
          nvidia-smi -L
          df -h "$GITHUB_WORKSPACE"
      - name: KVBM integration test (${{ matrix.name }})
        env:
          HF_HOME: /scratch/hf
          # These jobs run on H100 nodes; use the deterministic MLA backend for
          # DeepSeek-V2-Lite instead of the portable fallback.
          KVBM_MLA_BACKEND: FLASH_ATTN_MLA
        run: |
          cd "$GITHUB_WORKSPACE"
          python -m pytest tests/kvbm_integration -m "${{ matrix.pytest_markers }}" -v -s -p no:cacheprovider
      - name: Dump per-process test logs
        if: always()
        run: |
          root="${DYN_TEST_OUTPUT_PATH:-/tmp/dynamo_tests}"
          echo "===== worker error scan under $root ====="
          find "$root" -type f -name 'python.log.txt' \
            \( -path '*/vllm/*' -o -path '*/trtllm/*' \) 2>/dev/null \
            | while read -r f; do
                echo ""
                echo "######################## $f ########################"
                echo "----- error / traceback lines -----"
                grep -nE 'Error|Traceback|Exception|raise |CUDA|out of memory|max_model_len|KV cache|num_gpu_blocks|num_blocks|ValueError|RuntimeError|assert|panic|Caused by' "$f" \
                  || echo "(no error-pattern lines matched)"
                echo "----- last 80 lines -----"
                tail -n 80 "$f"
              done || true
