# TEMPORARY test harness for the reusable Slack notifier — DELETE before merge.
# workflow_dispatch can't be used from a feature branch (GitHub only dispatches
# workflows present on the default branch), so this triggers on push to the
# branch (scoped to this file) to exercise the notifier against a real failed run.
name: _test-notify-slack

on:
  push:
    branches: [ci/centralize-slack-notifier]
    paths: ['.github/workflows/_test-notify-slack.yml']

jobs:
  notify:
    uses: ./.github/workflows/notify-slack.yml
    with:
      pipeline_name: "TEST · reusable notifier"
      runs_on: ubuntu-slim
      run_id: "28834174736"   # a real historical run with failed jobs
    secrets: inherit
