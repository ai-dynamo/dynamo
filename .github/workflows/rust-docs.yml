# Rust API Documentation
#
# Builds workspace docs via `cargo doc` and deploys to GitHub Pages.
# Hosted at: https://ai-dynamo.github.io/dynamo/
#
# Triggers:
#   - Push to main when Rust source files change
#   - Manual dispatch
#
# The workflow uses GitHub's built-in Pages deployment action,
# which requires Pages to be configured for "GitHub Actions" source
# in repo Settings > Pages.

name: Rust API Docs

on:
  push:
    branches: [main]
    paths:
      - 'lib/**/*.rs'
      - 'lib/**/Cargo.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: rust-docs
  cancel-in-progress: true

jobs:
  build:
    name: Build Rust docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-doc-

      - name: Build documentation
        env:
          RUSTDOCFLAGS: >-
            --enable-index-page
            -Zunstable-options
            -D warnings
        run: cargo +nightly doc --no-deps --workspace 2>&1 || cargo doc --no-deps --workspace

      - name: Add redirect index.html
        run: |
          echo '<meta http-equiv="refresh" content="0; url=dynamo_runtime/index.html">' \
            > target/doc/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
