name: Shared Compliance Scan

on:
  workflow_call:
    inputs:
      framework:
        description: 'Framework name (vllm, sglang, trtllm)'
        required: true
        type: string
      target:
        description: 'Target docker stage'
        required: true
        type: string
      target_tag_plain:
        description: 'Plain runtime image tag prefix from the build workflow'
        required: true
        type: string
      version_selector:
        description: 'Runtime version selectors to test as a JSON array (e.g. cuda versions, cpu, xpu)'
        required: true
        type: string
      platform:
        description: 'Target platforms to test as a JSON array'
        required: true
        type: string
    secrets:
      AWS_DEFAULT_REGION:
        required: true
      AWS_ACCOUNT_ID:
        required: true
      AZURE_ACR_HOSTNAME:
        required: true
      AZURE_ACR_USER:
        required: true
      AZURE_ACR_PASSWORD:
        required: true

jobs:
  compliance:
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(inputs.platform) }}
        version_selector: ${{ fromJson(inputs.version_selector) }}
        exclude:
          - version_selector: xpu
            platform: arm64
    runs-on: prod-builder-v3
    # version_selector xpu -- name: xpu, linux/amd64
    # version_selector cpu -- name: cpu, linux/amd64
    # version_selector 12.9 -- name: cuda12.9, linux/amd64
    name: Compliance ${{ matrix.version_selector == 'xpu' && 'xpu' || matrix.version_selector == 'cpu' && 'cpu' || format('cuda{0}', matrix.version_selector) }}, ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # v4.3.0
      - name: Docker Login
        uses: ./.github/actions/docker-login
        with:
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          azure_acr_hostname: ${{ secrets.AZURE_ACR_HOSTNAME }}
          azure_acr_user: ${{ secrets.AZURE_ACR_USER }}
          azure_acr_password: ${{ secrets.AZURE_ACR_PASSWORD }}
      - name: Calculate target tag
        id: calculate-target-tag
        shell: bash
        env:
          ECR_REPOSITORY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/ai-dynamo/dynamo
        run: |
          if [[ "${{ matrix.version_selector }}" == "xpu" ]]; then
            IMAGE_TAG=${{ github.sha }}-${{ inputs.target_tag_plain }}-xpu
          elif [[ "${{ inputs.target_tag_plain }}" == *"planner"* || "${{ matrix.version_selector }}" == "cpu" ]]; then
            IMAGE_TAG=${{ github.sha }}-${{ inputs.target_tag_plain }}
          else
            CUDA_VERSION="${{ matrix.version_selector }}"
            CUDA_MAJOR=${CUDA_VERSION%%.*}
            IMAGE_TAG=${{ github.sha }}-${{ inputs.target_tag_plain }}-cuda${CUDA_MAJOR}
          fi

          RUNTIME_IMAGE=${ECR_REPOSITORY}:${IMAGE_TAG}
          echo "runtime_image=${RUNTIME_IMAGE}" >> $GITHUB_OUTPUT
      - name: Compliance scan
        uses: ./.github/actions/compliance-scan
        with:
          image: ${{ steps.calculate-target-tag.outputs.runtime_image }}
          artifact_name: compliance-${{ inputs.target_tag_plain }}-${{ matrix.version_selector == 'xpu' && 'xpu' || matrix.version_selector == 'cpu' && 'cpu' || format('cuda{0}', matrix.version_selector) }}-${{ matrix.platform }}
          arch: ${{ matrix.platform }}
          framework: ${{ inputs.framework }}
          target: ${{ inputs.target }}
          cuda_version: ${{ startsWith(matrix.version_selector, 'cuda') && matrix.version_selector || '' }}