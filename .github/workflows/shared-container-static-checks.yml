# Shared Container Static Checks
#
# Both jobs here (rust-gpu-checks, mypy) deliberately run *inside* the dynamo
# runtime / test images instead of on plain ubuntu-latest runners. Reasons:
#
#   rust-gpu-checks  — cargo clippy + test with features
#                      `block-manager,media-ffmpeg,testing-nixl,integration`
#                      plus the `kvbm-physical` crate. These depend on native
#                      libs (NIXL, ffmpeg, CUDA), a pinned Rust toolchain, and
#                      a real NVIDIA GPU for the integration tests — all of
#                      which are baked into the runtime image.
#
#   mypy             — depends on the exact pinned versions of pydantic,
#                      msgspec, nixl, the pyo3-generated `dynamo._core` /
#                      `dynamo._internal` stubs, and other internal packages.
#                      Reproducing that set on ubuntu-latest would require
#                      `maturin develop` + a big pip install, and even then
#                      package-version drift surfaces spurious errors. Running
#                      inside the test image guarantees the same resolver state
#                      as the container we ship.
#
# Lightweight rust-tests / rust-clippy jobs already run on ubuntu-latest in
# pre-merge.yml; this workflow is for the feature-gated + GPU-dependent
# checks only.

name: Shared Container Static Checks

on:
  workflow_call:
    inputs:
      target_tag_plain:
        description: 'Plain runtime image tag prefix from the build workflow (e.g. dynamo-runtime)'
        required: true
        type: string
      cuda_version:
        description: 'CUDA version (e.g. 12.9) used to compute the -cudaNN suffix'
        required: false
        type: string
        default: '12.9'
      rust_runner:
        description: 'GPU-equipped runner to execute rust-gpu-checks on'
        required: false
        type: string
        default: 'prod-tester-amd-gpu-v1'
      rust_timeout_minutes:
        description: 'Timeout in minutes for rust-gpu-checks'
        required: false
        type: number
        default: 30
      mypy_runner:
        description: 'Runner to execute mypy on (CPU-only is fine)'
        required: false
        type: string
        default: 'prod-tester-amd-v1'
      mypy_timeout_minutes:
        description: 'Timeout in minutes for mypy'
        required: false
        type: number
        default: 15
      include_sglang:
        description: 'Include components/src/dynamo/sglang in the mypy target list'
        required: false
        type: boolean
        default: true
      include_vllm:
        description: 'Include components/src/dynamo/vllm in the mypy target list'
        required: false
        type: boolean
        default: true
      include_trtllm:
        description: 'Include components/src/dynamo/trtllm in the mypy target list'
        required: false
        type: boolean
        default: true
    secrets:
      AWS_DEFAULT_REGION:
        required: true
      AWS_ACCOUNT_ID:
        required: true
      SCCACHE_S3_BUCKET:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false

jobs:
  rust-gpu-checks:
    name: Rust GPU Checks
    runs-on: ${{ inputs.rust_runner }}
    timeout-minutes: ${{ inputs.rust_timeout_minutes }}
    env:
      CONTAINER_ID: test_${{ github.run_id }}_${{ github.run_attempt }}_rust_dynamo
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Calculate image tag
        id: image
        shell: bash
        env:
          ECR_REPOSITORY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/ai-dynamo/dynamo
        run: |
          CUDA_VERSION="${{ inputs.cuda_version }}"
          CUDA_MAJOR=${CUDA_VERSION%%.*}
          IMAGE_TAG=${{ github.sha }}-${{ inputs.target_tag_plain }}-cuda${CUDA_MAJOR}
          echo "runtime_image=${ECR_REPOSITORY}:${IMAGE_TAG}" >> $GITHUB_OUTPUT
      - name: Docker Login
        uses: ./.github/actions/docker-login
        with:
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
      - name: Pull runtime image
        run: |
          source ./.github/scripts/retry_docker.sh
          retry_pull ${{ steps.image.outputs.runtime_image }}
      - name: Run Rust checks (block-manager + media-ffmpeg + integration tests)
        run: |
          docker run --rm --runtime=nvidia --gpus all --user root -w /workspace/lib/llm \
            --name ${{ env.CONTAINER_ID }}_rust_checks \
            -e SCCACHE_BUCKET=${{ secrets.SCCACHE_S3_BUCKET }} \
            -e SCCACHE_REGION=${{ secrets.AWS_DEFAULT_REGION }} \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            ${{ steps.image.outputs.runtime_image }} \
            bash -ec 'ARCH_ALT=x86_64 /workspace/container/use-sccache.sh install && \
                      eval $(/workspace/container/use-sccache.sh setup-env) && \
                      rustup component add rustfmt clippy && \
                      cargo fmt -- --check && \
                      cargo clippy --features block-manager,media-ffmpeg,testing-nixl,integration --no-deps --all-targets -- -D warnings && \
                      cargo test --locked --all-targets --features=block-manager,media-ffmpeg,testing-nixl,integration -- --nocapture && \
                      cargo clippy -p kvbm-physical --no-deps --all-targets -- -D warnings && \
                      cargo test --locked -p kvbm-physical --features testing-kvbm -- --nocapture --test-threads=4 && \
                      /workspace/container/use-sccache.sh show-stats "Rust Checks"'

  mypy:
    name: Mypy
    runs-on: ${{ inputs.mypy_runner }}
    timeout-minutes: ${{ inputs.mypy_timeout_minutes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Calculate image tag
        id: image
        shell: bash
        env:
          ECR_REPOSITORY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/ai-dynamo/dynamo
        run: |
          CUDA_VERSION="${{ inputs.cuda_version }}"
          CUDA_MAJOR=${CUDA_VERSION%%.*}
          IMAGE_TAG=${{ github.sha }}-${{ inputs.target_tag_plain }}-cuda${CUDA_MAJOR}-test
          echo "test_image=${ECR_REPOSITORY}:${IMAGE_TAG}" >> $GITHUB_OUTPUT
      - name: Docker Login
        uses: ./.github/actions/docker-login
        with:
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
      - name: Pull test image
        run: |
          source ./.github/scripts/retry_docker.sh
          retry_pull ${{ steps.image.outputs.test_image }}
      - name: Run mypy (components)
        # Always type-check shared (non-backend) code; conditionally include
        # sglang/vllm/trtllm so unrelated backend breakage doesn't block PRs
        # that don't touch those dirs. Caller pipes the inclusion flags.
        run: |
          docker run --rm -w /workspace \
            --name mypy_${{ github.run_id }}_${{ github.run_attempt }} \
            ${{ steps.image.outputs.test_image }} \
            bash -c '
              MYPYPATH=components/src:lib/bindings/python/src

              TARGETS=$(find components/src/dynamo -maxdepth 1 -mindepth 1 -type d ! -name sglang ! -name vllm ! -name trtllm | sort | tr "\n" " ")

              ${{ inputs.include_sglang && 'TARGETS="$TARGETS components/src/dynamo/sglang"' || ':' }}
              ${{ inputs.include_vllm   && 'TARGETS="$TARGETS components/src/dynamo/vllm"'   || ':' }}
              ${{ inputs.include_trtllm && 'TARGETS="$TARGETS components/src/dynamo/trtllm"' || ':' }}

              MYPYPATH=$MYPYPATH mypy --explicit-package-bases $TARGETS
            '
      - name: Run mypy (bindings)
        run: |
          docker run --rm -w /workspace \
            --name mypy_bindings_${{ github.run_id }}_${{ github.run_attempt }} \
            ${{ steps.image.outputs.test_image }} \
            bash -c 'MYPYPATH=lib/bindings/python/src mypy -p dynamo'
