name: Update Community Events

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: update-community-events
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install node-ical@0.20.0
      - run: node .github/scripts/update-events.js
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update community events from Google Calendar [skip ci]"
          git push
