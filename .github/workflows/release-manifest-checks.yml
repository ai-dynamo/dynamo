# PR-time checks for the release-pin manifest: unit tests for the
# validator plus a structural lint (every pin path still resolves in
# the tree). Catches manifest rot - e.g. a renamed container/context.yaml
# key - at PR time instead of on cut day. Deliberately runs --lint, not
# --check: main legitimately drifts from the manifest between releases.

name: Release Manifest Checks

on:
  pull_request:
    paths:
      - '.github/release-manifest.yaml'
      - '.github/scripts/release_manifest/**'
      - 'container/context.yaml'
      - '.github/workflows/release-manifest-checks.yml'

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint manifest and run unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Unit tests
        run: |
          pip install pyyaml
          python3 -m unittest discover -s .github/scripts/release_manifest/tests -v

      - name: Lint manifest
        run: python3 .github/scripts/release_manifest/check_release_pins.py --lint
