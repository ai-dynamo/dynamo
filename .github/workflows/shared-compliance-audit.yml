# Independent compliance completeness audit. Syft-scans the FINAL pushed image,
# subtracts the baseline SBOM, and reports any shipped component missing from the
# build's unified osrb-deps.csv — the authoritative "did the generators miss
# anything" check that verify_sbom_diff never was (it only compared our own
# outputs). Runs as a sibling job (needs:[<fw>-build]) IN PARALLEL with the test
# jobs so the slow syft pull+scan never blocks testing. SOFT GATE: report-only
# (no --fail-on-findings) until the name-normalization is proven low-noise; the
# job is not a required check.
name: Shared Compliance Audit

on:
  workflow_call:
    inputs:
      framework:
        description: 'Framework (vllm, sglang, trtllm, dynamo)'
        required: true
        type: string
      target:
        description: 'Docker target (runtime, planner, frontend)'
        required: true
        type: string
      cuda_version:
        description: 'Single CUDA version (e.g. 13.0); empty for cpu targets'
        required: false
        type: string
        default: ''
      target_tag_plain:
        description: 'Plain image tag prefix from the build job (also the compliance artifact prefix)'
        required: true
        type: string
      baseline_sbom_file:
        description: 'Baseline SBOM stem from the build job (needs.<fw>-build.outputs.baseline_sbom_file); we append -amd64.cdx.json. Empty = audit full image.'
        required: false
        type: string
        default: ''
    secrets:
      AWS_DEFAULT_REGION:
        required: true
      AWS_ACCOUNT_ID:
        required: true

jobs:
  audit:
    name: Compliance audit
    # syft pulls the FULL multi-GB image (from our ECR) and catalogs it.
    # Runner history (every PR pool has a distinct wall for 15-20GB CUDA images):
    #   small-v2       : disk too small (dies on all large images)
    #   prod-default-v2: disk short for ~20GB (frontend/planner OK, big CUDA die)
    #   deploy-tester-v1: IRSA role lacks ECR -> NoCredentials (Azure ACR + vCluster)
    #   prod-builder-v3: 482GB disk but the runner pod OOMs syft on large images
    #                    (sized to orchestrate REMOTE BuildKit, not scan locally)
    # prod-tester-amd-v2 RUNS these images for tests, so it has the memory the
    # builder lacked. Open risk: PR-path tester jobs pull via RUNNERS_REGISTRY
    # (a mirror), not ECR, so ECR-IRSA here is unconfirmed — this run proves it.
    # Non-GPU tester (syft needs no GPU); registry scan is daemon-independent.
    runs-on: prod-tester-amd-v2
    # Safety net: if a scan still runs away, fail cleanly instead of holding a
    # runner for the 360-min default. A healthy scan completes in <20 min.
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Docker Login
        # Best-effort: prod-builder-v3 builds via remote BuildKit and may have no
        # usable local docker daemon, so `docker login` can fail. That's fine —
        # the scan auths to ECR directly via SYFT_REGISTRY_AUTH_* (see below),
        # so this step must never block the job.
        continue-on-error: true
        uses: ./.github/actions/docker-login
        with:
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
      - name: Install syft
        shell: bash
        run: |
          # The runner doesn't allow writing to /usr/local/bin without sudo, so
          # install into a runner-writable dir and put it on PATH.
          mkdir -p "${RUNNER_TEMP}/bin"
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b "${RUNNER_TEMP}/bin"
          echo "${RUNNER_TEMP}/bin" >> "$GITHUB_PATH"
      - name: Resolve image ref, baseline + artifact name
        id: resolve
        shell: bash
        env:
          ECR: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com
        run: |
          set -euo pipefail
          CUDA="${{ inputs.cuda_version }}"
          # Image tag — keep in sync with shared-copy.yml/shared-build-image.yml:
          # cuda13 is implicit (no suffix); other majors keep -cuda<major>.
          IMAGE_TAG="${{ github.sha }}-${{ inputs.target_tag_plain }}"
          if [ -n "${CUDA}" ] && [ "${CUDA%%.*}" != "13" ]; then
            IMAGE_TAG="${IMAGE_TAG}-cuda${CUDA%%.*}"
          fi
          echo "image_ref=${ECR}/ai-dynamo/dynamo:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          # Compliance artifact name — compliance-<git-sha>-<container>, matching
          # compliance-extract's upload (target_tag_plain == container name). For
          # PR (the only caller), git_sha == github.sha.
          echo "artifact=compliance-${{ github.sha }}-${{ inputs.target_tag_plain }}" >> "$GITHUB_OUTPUT"
          # Baseline SBOM stem comes from the build job's output (it rendered the
          # Dockerfile with the deps it has), so the audit runner needs no
          # render.py / PyYAML / pip. Append -amd64 to match the amd64 scan.
          STEM="${{ inputs.baseline_sbom_file }}"
          if [ -n "${STEM}" ] && [ -f "container/compliance/base_sboms/${STEM}-amd64.cdx.json" ]; then
            echo "baseline=container/compliance/base_sboms/${STEM}-amd64.cdx.json" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::no amd64 baseline SBOM for stem '${STEM}'; auditing full image"
            echo "baseline=" >> "$GITHUB_OUTPUT"
          fi
      - name: Download build compliance artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: ${{ steps.resolve.outputs.artifact }}
          path: /tmp/compliance
      - name: Reclaim disk before scan
        continue-on-error: true   # best-effort; never block the audit
        shell: bash
        run: |
          # The runner is shared/reused — stale docker images + build cache from
          # prior jobs can leave too little room for a 15-20GB CUDA image pull.
          # Same prune pattern as .github/actions/docker-build. Best-effort
          # (no-op / failure tolerated if there's no local docker daemon).
          echo "::group::disk before prune"; df -h; echo "::endgroup::"
          docker system prune -af || true
          echo "::group::disk after prune"; df -h; echo "::endgroup::"
      - name: Syft scan (amd64) + audit vs osrb-deps.csv
        continue-on-error: true   # soft gate — never block tests/merge
        shell: bash
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          ECR_HOSTNAME: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com
        run: |
          set -euo pipefail
          # Daemon-independent: scan straight from the registry (syft pulls image
          # layers from ECR to a temp dir — no docker daemon / DinD needed, which
          # matters on prod-builder-v3). Auth via SYFT_REGISTRY_AUTH_* from an ECR
          # token (aws ecr get-login-password works here via the builder's IRSA
          # role). Keeps creds out of docker config so it works with no daemon.
          SYFT_REGISTRY_AUTH_PASSWORD="$(aws ecr get-login-password --region "${AWS_DEFAULT_REGION}")"
          export SYFT_REGISTRY_AUTH_AUTHORITY="${ECR_HOSTNAME}"
          export SYFT_REGISTRY_AUTH_USERNAME="AWS"
          export SYFT_REGISTRY_AUTH_PASSWORD
          # syft materializes the full image to disk. If a large CUDA image still
          # exhausts the runner, the post-pull snapshot pinpoints it (a sudden
          # 100% on the work mount = disk ceiling too low even for the builder).
          syft "registry:${{ steps.resolve.outputs.image_ref }}" --platform linux/amd64 \
            -o cyclonedx-json=/tmp/syft.cdx.json
          echo "::group::disk after scan"; df -h; echo "::endgroup::"
          OUR_CSV=$(find /tmp/compliance -path '*linux_amd64*' -name 'osrb-*.csv' | head -1)
          [ -z "${OUR_CSV}" ] && OUR_CSV=$(find /tmp/compliance -name 'osrb-*.csv' | head -1)
          echo "auditing against ${OUR_CSV}"
          BASE_ARG=""
          [ -n "${{ steps.resolve.outputs.baseline }}" ] && BASE_ARG="--base-sbom ${{ steps.resolve.outputs.baseline }}"
          PYTHONPATH=container python3 -m compliance.audit_image_sbom \
            --syft-sbom /tmp/syft.cdx.json \
            ${BASE_ARG} \
            --our-csv "${OUR_CSV}" \
            --image "${{ steps.resolve.outputs.image_tag }}" \
            --report /tmp/audit-report.txt -v
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          # compliance-audit-<git-sha>-<container>[-cudaN] (image_tag already carries all three).
          name: compliance-audit-${{ steps.resolve.outputs.image_tag }}
          path: /tmp/audit-report.txt
          retention-days: 7
          if-no-files-found: ignore
