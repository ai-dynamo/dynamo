name: POC PR

on:
  push:
    branches:
      - "pull-request/[0-9]+"

concurrency:
  # The group name is the ref_name, so that workflows on the same PR/branch have the same group name for cancelling.
  group: docker-build-test-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # SETUP & DETECTION JOBS
  # ============================================================================
  changed-files:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && 'protected-deploy' || '' }}
    outputs:
      core: ${{ steps.changes.outputs.core }}
      operator: ${{ steps.changes.outputs.operator }}
      deploy: ${{ steps.changes.outputs.deploy }}
      vllm: ${{ steps.changes.outputs.vllm }}
      sglang: ${{ steps.changes.outputs.sglang }}
      trtllm: ${{ steps.changes.outputs.trtllm }}
      builder_name: ${{ steps.export-builder-name.outputs.builder_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # v4.3.0
        with:
          fetch-depth: 0
      - name: Check for changes
        id: changes
        uses: ./.github/actions/changed-files
        with:
          gh_token: ${{ github.token }}
      - name: Export builder name
        id: export-builder-name
        run: |
          echo "builder_name=${{ env.BUILDER_NAME }}" >> $GITHUB_OUTPUT

  # backend-status-check:
  #   runs-on: ubuntu-latest
  #   needs:
  #     - changed-files, vllm-pipeline, sglang-pipeline, trtllm-pipeline, operator]  # THIS list determines blocking jobs
  #   if: always()
  #   steps:
  #     - name: "Check all dependent jobs"
  #       run: |
  #         echo '${{ toJson(needs) }}' | jq -e 'to_entries | map(.value.result) | all(. as $result | ["success", "skipped"] | any($result == .))'

  # deploy-status-check:
  #   runs-on: ubuntu-latest
  #   needs: [deploy-operator, deploy-test-vllm, deploy-test-sglang, deploy-test-trtllm]
  #   if: always()
  #   steps:
  #     - name: "Check all deploy test jobs"
  #       run: |
  #         echo '${{ toJson(needs) }}' | jq -e 'to_entries | map(.value.result) | all(. as $result | ["success", "skipped"] | any($result == .))'

  # ============================================================================
  # BUILD PIPELINES
  # ============================================================================

  vllm-build:
    name: vllm
    needs: [changed-files]
    if: needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.vllm == 'true' || needs.changed-files.outputs.deploy == 'true'
    strategy:
        matrix:
          cuda_version: [ '12.9', '13.0' ]
          platform: [ amd64, arm64 ]
    uses: ./.github/workflows/build-image.yml
    with:
      framework: vllm
      cuda_version: ${{ matrix.cuda_version }}
      platform: ${{ matrix.platform }}
    secrets: inherit

  sglang-build:
    name: sglang
    needs: [changed-files]
    if: needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.sglang == 'true' || needs.changed-files.outputs.deploy == 'true'
    strategy:
        matrix:
          cuda_version: [ '12.9', '13.0' ]
          platform: [ amd64, arm64 ]
    uses: ./.github/workflows/build-image.yml
    with:
      framework: sglang
      cuda_version: ${{ matrix.cuda_version }}
      platform: ${{ matrix.platform }}
    secrets: inherit

  trtllm-build:
    name: trtllm
    needs: [changed-files]
    if: needs.changed-files.outputs.core == 'true' || needs.changed-files.outputs.trtllm == 'true' || needs.changed-files.outputs.deploy == 'true'
    strategy:
        matrix:
          cuda_version: [ '13.1' ]
          platform: [ amd64, arm64 ]
    uses: ./.github/workflows/build-image.yml
    with:
      framework: trtllm
      cuda_version: ${{ matrix.cuda_version }}
      platform: ${{ matrix.platform }}
    secrets: inherit

  # ============================================================================
  # TEST PIPELINES
  # ============================================================================

  vllm-test:
    name: vllm Test
    needs: [vllm-build]
    strategy:
        matrix:
          cuda_version: [ '12.9', '13.0' ]
          platform: [ amd64, arm64 ]
    uses: ./.github/workflows/single-gpu-test.yml
    with:
      framework: vllm
      cuda_version: ${{ matrix.cuda_version }}
      platform: ${{ matrix.platform }}
    secrets: inherit

  sglang-test:
    name: sglang Test
    needs: [sglang-build]
    strategy:
        matrix:
          cuda_version: [ '12.9', '13.0' ]
          platform: [ amd64, arm64 ]
    uses: ./.github/workflows/single-gpu-test.yml
    with:
      framework: sglang
      cuda_version: ${{ matrix.cuda_version }}
      platform: ${{ matrix.platform }}
    secrets: inherit

  trtllm-test:
    name: trtllm Test
    needs: [trtllm-build]
    strategy:
        matrix:
          cuda_version: [ '13.1' ]
          platform: [ amd64, arm64 ]
    uses: ./.github/workflows/single-gpu-test.yml
    with:
      framework: trtllm
      cuda_version: ${{ matrix.cuda_version }}
      platform: ${{ matrix.platform }}
    secrets: inherit

  # ============================================================================
  # IMAGE COPY PIPELINES
  # ============================================================================

  vllm-copy-to-acr:
    name: vllm Copy to ACR
    needs: [vllm-test]
    strategy:
        matrix:
          cuda_version: [ '12.9', '13.0' ]
          platform: [ amd64, arm64 ]
    uses: ./.github/workflows/copy-to-acr.yml
    with:
      framework: vllm
      cuda_version: ${{ matrix.cuda_version }}
      platform: ${{ matrix.platform }}
    secrets: inherit

  sglang-copy-to-acr:
    name: sglang Copy to ACR
    needs: [sglang-test]
    strategy:
        matrix: 
          cuda_version: [ '12.9', '13.0' ]
          platform: [ amd64, arm64 ]
    uses: ./.github/workflows/copy-to-acr.yml
    with:
      framework: sglang
      cuda_version: ${{ matrix.cuda_version }}
      platform: ${{ matrix.platform }}
    secrets: inherit

  trtllm-copy-to-acr:
    name: trtllm Copy to ACR
    needs: [trtllm-test]
    strategy:
        matrix:
          cuda_version: [ '13.1' ]
          platform: [ amd64, arm64 ]
    uses: ./.github/workflows/copy-to-acr.yml
    with:
      framework: trtllm
      cuda_version: ${{ matrix.cuda_version }}
      platform: ${{ matrix.platform }}
    secrets: inherit

  # ============================================================================
  # DEPLOY TEST PIPELINES
  # ============================================================================

  vllm-deploy-test:
    name: vllm Deploy Test
    needs: [vllm-copy-to-acr]
    strategy:
        matrix:
          cuda_version: [ '12.9', '13.0' ]
          platform: [ amd64, arm64 ]
    uses: ./.github/workflows/deploy-test.yml
    with:
      framework: vllm
      cuda_version: ${{ matrix.cuda_version }}
      platform: ${{ matrix.platform }}
    secrets: inherit

  sglang-deploy-test:
    name: sglang Deploy Test
    needs: [sglang-copy-to-acr]
    strategy:
        matrix:
          cuda_version: [ '12.9', '13.0' ]
          platform: [ amd64, arm64 ]
    uses: ./.github/workflows/deploy-test.yml
    with:
      framework: sglang
      cuda_version: ${{ matrix.cuda_version }}
      platform: ${{ matrix.platform }}
    secrets: inherit

  trtllm-deploy-test:
    name: trtllm Deploy Test
    needs: [trtllm-copy-to-acr]
    strategy:
        matrix:
          cuda_version: [ '13.1' ]
          platform: [ amd64, arm64 ]
    uses: ./.github/workflows/deploy-test.yml
    with:
      framework: trtllm
      cuda_version: ${{ matrix.cuda_version }}
      platform: ${{ matrix.platform }}
    secrets: inherit
