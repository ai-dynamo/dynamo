name: Shared Deploy Test

on:
  push:
    branches:
      - rrubin/remove-dind-runners
  workflow_call:
    inputs:
      framework:
        description: 'Framework to test (vllm, sglang, trtllm)'
        type: string
        required: true
      profiles:
        description: 'JSON array of deployment profiles to test'
        type: string
        required: true
      image_suffix:
        description: 'Image suffix (e.g. vllm-runtime-cuda12-amd64)'
        type: string
        required: true
      namespace:
        description: 'Host namespace where the vCluster lives'
        type: string
        required: true
      vcluster_name:
        description: 'Name of the vCluster'
        type: string
        required: true
      operator_tag:
        description: 'Operator image tag'
        type: string
        required: true

jobs:
  deploy-test:
    runs-on: prod-default-small-v2
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        profile: ${{ fromJSON(inputs.profiles) }}
    name: ${{ matrix.profile }}
    steps:
    - name: Setup Kubeconfig
      id: setup-kubeconfig
      shell: bash
      env:
        NAMESPACE: ${{ inputs.namespace }}
        KUBECONFIG_BASE64: ${{ secrets.AZURE_AKS_CI_KUBECONFIG_B64 }}
      run: |
        set +x
        echo "$KUBECONFIG_BASE64" | base64 -d > ${{ github.workspace }}/.kubeconfig
        chmod 600 ${{ github.workspace }}/.kubeconfig
        echo "KUBECONFIG=${{ github.workspace }}/.kubeconfig" >> $GITHUB_ENV

        export KUBECONFIG=${{ github.workspace }}/.kubeconfig
        kubectl config set-context --current --namespace=${NAMESPACE}
        kubectl config get-contexts
        kubectl config view --minify -o jsonpath='{.contexts[0].context.user}'
