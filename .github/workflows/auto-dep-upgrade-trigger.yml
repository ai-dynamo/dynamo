#
# HACKY E2E TEST - DO NOT MERGE
# Push trigger on phase 2 branch + checkout phase 2 (instead of main) so the
# dep branch inherits the modified post-merge-ci.yml (with the deps/upgrade-*
# push trigger). The final dispatch step is removed; user re-pushes the dep
# branch from local to fire post-merge-ci (GITHUB_TOKEN pushes don't fire
# downstream workflows).

name: Auto Dependency Upgrade - Trigger

on:
  push:
    branches: [anants/auto-dep-upgrade-trtllm]
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      framework:
        description: 'Framework to attempt upgrade for'
        type: choice
        options: [trtllm]
        default: trtllm

permissions:
  contents: write
  actions:  write

jobs:
  upgrade:
    name: ${{ matrix.framework }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: [trtllm]
    steps:
      - name: Checkout phase 2 branch (HACK)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: anants/auto-dep-upgrade-trtllm
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Detect latest version
        id: detect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUT=$(python3 .github/scripts/dep_upgrade/detect_latest_versions.py \
                  --framework ${{ matrix.framework }})
          echo "$OUT"
          {
            echo "current=$(echo "$OUT" | jq -r .current)"
            echo "latest=$(echo "$OUT" | jq -r .latest)"
            echo "upgrade_needed=$(echo "$OUT" | jq -r .upgrade_needed)"
          } >> "$GITHUB_OUTPUT"

      - name: Already up to date
        if: steps.detect.outputs.upgrade_needed != 'true'
        run: echo "No upgrade needed (current=${{ steps.detect.outputs.current }}, latest=${{ steps.detect.outputs.latest }})."

      - name: Compute branch name + idempotency check
        if: steps.detect.outputs.upgrade_needed == 'true'
        id: branch
        run: |
          BRANCH="deps/upgrade-${{ matrix.framework }}-v${{ steps.detect.outputs.latest }}"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Branch $BRANCH already exists on origin; skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply bump
        if: steps.detect.outputs.upgrade_needed == 'true' && steps.branch.outputs.exists == 'false'
        run: |
          python3 .github/scripts/dep_upgrade/bump_dependency.py \
            --framework ${{ matrix.framework }} \
            --version ${{ steps.detect.outputs.latest }}
          git status --short

      - name: Commit + push upgrade branch
        if: steps.detect.outputs.upgrade_needed == 'true' && steps.branch.outputs.exists == 'false'
        run: |
          git config user.name  "dynamo-dep-bot"
          git config user.email "dynamo-dep-bot@users.noreply.github.com"
          git checkout -b "${{ steps.branch.outputs.name }}"
          git add container/context.yaml pyproject.toml docs/reference/support-matrix.md
          git commit -s -m "chore: bump ${{ matrix.framework }} to v${{ steps.detect.outputs.latest }}"
          git push origin "${{ steps.branch.outputs.name }}"

      # HACKY E2E TEST: dispatch step removed.
      # Instead, push an empty commit from local to fire post-merge-ci's push
      # trigger on deps/upgrade-* (GITHUB_TOKEN pushes won't fire it):
      #   git fetch origin "${BRANCH}" && git checkout "${BRANCH}" \
      #     && git commit --allow-empty -s -m "fire CI" && git push origin "${BRANCH}"
