name: Shared Local GPU and CPU Test

on:
  workflow_call:
    inputs:
      test_suite_name:
        description: 'Test suite name (vllm, sglang, trtllm)'
        required: true
        type: string
      test_type:
        description: 'Test type (e.g. single-gpu, multi-gpu)'
        required: true
        type: string
      amd_runner:
        description: 'Runner to execute tests on (amd64 only)'
        required: true
        type: string
      container_image_tag:
        description: 'Container image tag to use for the test'
        required: true
        type: string
      cuda_version:
        description: 'CUDA versions to test as a JSON array'
        required: true
        type: string
      platform:
        description: 'Target platforms to test as a JSON array'
        required: true
        type: string
      enable_coverage:
        description: 'Enable coverage collection (true/false)'
        required: false
        type: string
        default: 'false'
      run_sanity_check:
        description: 'Whether to run sanity check on the runtime image before executing tests'
        required: false
        type: boolean
        default: true
      run_cpu_only_tests:
        description: 'Whether to run CPU-only tests'
        required: false
        type: boolean
        default: false
      cpu_only_test_markers:
        description: 'CPU-only pytest markers'
        required: false
        type: string
      cpu_only_test_timeout_minutes:
        description: 'Timeout in minutes for CPU tests'
        required: false
        type: number
        default: 10
      cpu_parallel_mode:
        description: 'pytest-xdist mode for CPU-only tests: auto, none/0, or a worker count'
        required: false
        type: string
        default: 'auto'
      run_gpu_tests:
        description: 'Whether to run GPU tests'
        required: false
        type: boolean
        default: true
      gpu_test_markers:
        description: 'GPU pytest markers'
        required: false
        type: string
      gpu_test_timeout_minutes:
        description: 'Timeout in minutes for GPU tests'
        required: false
        type: number
        default: 30
      seed_model_names:
        description: 'Space-delimited list of HuggingFace hub model directory names to copy from local_models_dir to NVMe before GPU tests (e.g. "models--Org--Name"). When empty, no seed is performed.'
        required: false
        type: string
        default: >-
          models--Qwen--Qwen3-0.6B
          models--deepseek-ai--DeepSeek-R1-Distill-Llama-8B
          models--openai--gpt-oss-20b
          models--Qwen--Qwen3-Embedding-4B
          models--silence09--DeepSeek-R1-Small-2layers
          models--Wan-AI--Wan2.1-T2V-1.3B-Diffusers
          models--Wan-AI--Wan2.2-TI2V-5B-Diffusers
          models--Tongyi-MAI--Z-Image-Turbo
          models--Qwen--Qwen3-VL-2B-Instruct
          models--Qwen--Qwen2-VL-7B-Instruct
          models--codelion--Qwen3-0.6B-accuracy-recovery-lora
          models--llava-hf--llava-1.5-7b-hf
    secrets:
      AWS_DEFAULT_REGION:
        required: true
      AWS_ACCOUNT_ID:
        required: true
      AZURE_ACR_HOSTNAME:
        required: true
      AZURE_ACR_USER:
        required: true
      AZURE_ACR_PASSWORD:
        required: true
      HF_TOKEN:
        required: false

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(inputs.platform) }}
    name: ${{ inputs.test_type }} ${{ inputs.cuda_version == '' && 'cpu' || format('cuda{0}', inputs.cuda_version) }}, ${{ matrix.platform }}
    runs-on: ${{ matrix.platform == 'amd64' && inputs.amd_runner || 'stg-tester-arm-v2' }}
    container:
      image: ${{ vars.RUNNERS_REGISTRY }}/ai-dynamo/dynamo:${{ inputs.container_image_tag }}
      env:
        # The image creates user 'dynamo' at uid 1000, but the ARC k8s runner
        # executes the job pod as uid 1001 (runner's uid). Overriding HOME and
        # USER here sidesteps two symptoms of that mismatch:
        #   * actions/checkout probing $HOME/.gitconfig (owned by 1000, unreadable by 1001)
        #   * torch._inductor calling getpass.getuser() -> pwd.getpwuid(1001) -> KeyError
        HOME: /__w/dynamo/dynamo
        USER: dynamo
    permissions:
      contents: read
    services:
      minio:
        image: ${{ vars.RUNNERS_REGISTRY }}/quay/minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_VOLUMES: /tmp/minio-data
          MINIO_CONSOLE_ADDRESS: ':9001'
        ports:
          - 9000:9000
          - 9001:9001
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Run Sanity Check on Runtime Image
        shell: bash
        # Run from the container's baked-in workspace, not the GHA checkout,
        # so the sanity check reflects what the image actually ships.
        working-directory: /workspace
        run: |
          set +e
          python ./deploy/sanity_check.py --runtime-check --no-gpu-check
          SANITY_CHECK_EXIT_CODE=$?
          if [ ${SANITY_CHECK_EXIT_CODE} -ne 0 ]; then
            echo "ERROR: Sanity check failed - ai-dynamo packages not properly installed"
            exit ${SANITY_CHECK_EXIT_CODE}
          else
            echo "✅ Sanity check passed"
          fi
      - name: Run CPU-only tests (parallelized) from /workspace
        if: ${{ inputs.run_cpu_only_tests }}
        timeout-minutes: ${{ inputs.cpu_only_test_timeout_minutes }}
        # pytest runs from the container's baked-in /workspace (see action's
        # container_workspace input below), NOT from the GHA checkout at
        # $GITHUB_WORKSPACE. Composite-action steps don't inherit the caller's
        # working-directory, so it is passed as an explicit input instead.
        uses: ./.github/actions/pytest-local
        with:
          container_workspace: /workspace
          pytest_marks: ${{ inputs.cpu_only_test_markers }}
          test_suite_name: ${{ inputs.test_suite_name }}
          test_type: "pre_merge_cpu"
          platform_arch: ${{ matrix.platform }}
          hf_token: ${{ secrets.HF_TOKEN }}
          parallel_mode: ${{ inputs.cpu_parallel_mode }}
          framework: ${{ inputs.test_suite_name }}
          enable_coverage: ${{ inputs.enable_coverage }}
      - name: Run GPU tests (sequential) from /workspace
        timeout-minutes: ${{ inputs.gpu_test_timeout_minutes }}
        if: ${{ matrix.platform == 'amd64' && inputs.run_gpu_tests }}
        uses: ./.github/actions/pytest-local
        with:
          container_workspace: /workspace
          pytest_marks: ${{ inputs.gpu_test_markers }}
          test_suite_name: ${{ inputs.test_suite_name }}
          test_type: "pre_merge_gpu"
          platform_arch: ${{ matrix.platform }}
          hf_token: ${{ secrets.HF_TOKEN }}
          framework: ${{ inputs.test_suite_name }}
          enable_coverage: ${{ inputs.enable_coverage }}
          parallel_mode: 'none'
          gpu_tests: 'true'
          seed_model_names: ${{ inputs.seed_model_names }}
