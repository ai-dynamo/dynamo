# On-demand release: branch from main / a release branch / a main commit SHA,
# set the release version, commit it to a new release/<version> branch (which
# triggers post-merge CI to build the images), then stage all artifacts and
# trigger the GitLab release-automation pipeline via release.yml.

name: On-Demand Release

on:
  # TEMPORARY: push to the dev branch runs the throwaway test flow — push events
  # have no inputs, so prepare-branch falls back to creating release/0.0.0test
  # (stamped 0.0.0). That branch matches release/*.*.* so post-merge + the other
  # release-branch checks run on it; this workflow's publish jobs skip (they're
  # gated on workflow_dispatch + a real release/X.Y.Z branch). Remove before merging.
  push:
    branches:
      - pvijayakrish/on-demand-release
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Branch to fork from: 'main', a 'release/x.y.z' branch, or a 40-char main commit SHA."
        required: false
        type: string
        default: main
      release_version:
        description: 'Version to STAMP into the tree, X.Y.Z[.postN] (must be valid SemVer/PEP 440, e.g. 0.0.0). Not the branch name.'
        required: true
        type: string
      release_branch:
        description: 'Branch to create (default release/<version>). For a throwaway run use e.g. release/0.0.0test — it still matches release/*.*.* so post-merge + release-branch checks run, but the publish jobs skip.'
        required: false
        type: string
        default: ''
      containers:
        description: 'Containers to release: all | none | csv of vllm[:runtime|:efa],sglang[...],trtllm[...],frontend,operator,planner,snapshot.'
        required: false
        type: string
        default: all
      wheels:
        description: 'Wheels to release: all | none | csv of ai-dynamo,ai-dynamo-runtime,kvbm.'
        required: false
        type: string
        default: all
      crates:
        description: 'Crates to release: all | none | csv of crate names (must be dependency-closed).'
        required: false
        type: string
        default: all
      helm:
        description: 'Helm charts to release: all | none | csv of platform,snapshot.'
        required: false
        type: string
        default: all
      selection:
        description: 'Optional JSON overriding the four fields, e.g. {"containers":["vllm:runtime"],"wheels":"all","crates":"none","helm":[]}. When non-empty it takes precedence.'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Create the branch + version bump only; skip staging and the GitLab trigger.'
        required: false
        type: boolean
        default: false
      skip_gitlab_pipeline:
        description: 'Skip the GitLab release automation pipeline trigger. Emergency use only.'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ============================================================================
  # CREATE RELEASE BRANCH + VERSION BUMP
  # Pushes with a dedicated token (not GITHUB_TOKEN) so the push triggers
  # post-merge CI, which builds the release images for the bump commit.
  # ============================================================================
  prepare-branch:
    name: Create release branch + version bump
    runs-on: prod-default-small-v2
    environment: automated-release
    permissions:
      contents: read
    outputs:
      branch: ${{ steps.bump.outputs.branch }}
      bump_sha: ${{ steps.bump.outputs.bump_sha }}
      is_test: ${{ steps.bump.outputs.is_test }}
      containers: ${{ steps.resolve.outputs.containers }}
      wheels: ${{ steps.resolve.outputs.wheels }}
      crates: ${{ steps.resolve.outputs.crates }}
      helm: ${{ steps.resolve.outputs.helm }}
    steps:
      - name: Validate inputs
        env:
          RELEASE_VERSION: ${{ inputs.release_version || '0.0.0' }}
          SOURCE_REF: ${{ inputs.source_ref || 'main' }}
          RELEASE_BRANCH: ${{ inputs.release_branch || (github.event_name == 'push' && 'release/0.0.0test' || '') }}
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.post[0-9]+)?$ ]]; then
            echo "::error::release_version must be X.Y.Z[.postN] (got '${RELEASE_VERSION}')"
            exit 1
          fi
          if [[ -n "${RELEASE_BRANCH}" && ! "${RELEASE_BRANCH}" =~ ^release/[A-Za-z0-9._-]+$ ]]; then
            echo "::error::release_branch must look like release/<name> (got '${RELEASE_BRANCH}')"
            exit 1
          fi
          if [[ ! "${SOURCE_REF}" =~ ^(main|release/[0-9]+\.[0-9]+\.[0-9]+(\.post[0-9]+)?|[0-9a-f]{40})$ ]]; then
            echo "::error::source_ref must be 'main', a release/x.y.z branch, or a 40-char SHA (got '${SOURCE_REF}')"
            exit 1
          fi

      # Normalize the per-type fields (or the JSON override) into canonical subset
      # strings (all|none|csv of normalized tokens) consumed by the bump, release.yml,
      # and the GitLab trigger. The container grammar expands <fw>[:runtime|:efa]
      # (bare fw = both) and validates every token; unknown tokens fail fast.
      - name: Resolve artifact selection
        id: resolve
        env:
          SELECTION: ${{ inputs.selection }}
          CONTAINERS: ${{ inputs.containers || 'all' }}
          WHEELS: ${{ inputs.wheels || 'all' }}
          CRATES: ${{ inputs.crates || 'all' }}
          HELM: ${{ inputs.helm || 'all' }}
        run: |
          set -euo pipefail
          python3 <<'PY' > "${RUNNER_TEMP}/selection.env"
          import json, os, sys

          FRAMEWORKS = {"vllm", "sglang", "trtllm"}
          VARIANTS = {"runtime", "efa"}
          COMPONENTS = {"frontend", "operator", "planner", "snapshot"}
          WHEEL_TOKENS = {"ai-dynamo", "ai-dynamo-runtime", "kvbm"}
          HELM_TOKENS = {"platform", "snapshot"}

          def fail(msg):
              print(f"::error::{msg}", file=sys.stderr)
              sys.exit(1)

          def dedupe(xs):
              seen = []
              for x in xs:
                  if x not in seen:
                      seen.append(x)
              return seen

          def as_spec(v):
              # A JSON value: list -> csv ('none' if empty); scalar -> str.
              if isinstance(v, list):
                  return ",".join(str(x) for x in v) if v else "none"
              return str(v).strip()

          def norm_containers(spec):
              spec = (spec or "all").strip()
              if spec == "all":
                  return "all"
              if spec in ("", "none"):
                  return "none"
              out = []
              for tok in (t.strip() for t in spec.split(",") if t.strip()):
                  if tok in COMPONENTS:
                      out.append(tok)
                      continue
                  fw, _, var = tok.partition(":")
                  if fw not in FRAMEWORKS:
                      fail(f"unknown container token '{tok}'")
                  if var == "":
                      out += [f"{fw}-runtime", f"{fw}-efa"]
                  elif var in VARIANTS:
                      out.append(f"{fw}-{var}")
                  else:
                      fail(f"unknown variant in '{tok}' (use runtime|efa)")
              return ",".join(dedupe(out))

          def norm_simple(spec, universe, label):
              spec = (spec or "all").strip()
              if spec == "all":
                  return "all"
              if spec in ("", "none"):
                  return "none"
              sel = [t.strip() for t in spec.split(",") if t.strip()]
              bad = [t for t in sel if t not in universe]
              if bad:
                  fail(f"unknown {label} token(s) {bad}; valid: {sorted(universe)}")
              return ",".join(dedupe(sel))

          def norm_crates(spec):
              spec = (spec or "all").strip()
              if spec == "all":
                  return "all"
              if spec in ("", "none"):
                  return "none"
              # Crate names are validated (and closure-checked) by stage_crates.py.
              return ",".join(dedupe(t.strip() for t in spec.split(",") if t.strip()))

          sel = os.environ.get("SELECTION", "").strip()
          if sel:
              try:
                  d = json.loads(sel)
              except Exception as e:
                  fail(f"selection is not valid JSON: {e}")
              if not isinstance(d, dict):
                  fail("selection JSON must be an object")
              c, w, cr, h = (as_spec(d.get(k, "all")) for k in ("containers", "wheels", "crates", "helm"))
          else:
              c = os.environ.get("CONTAINERS", "all")
              w = os.environ.get("WHEELS", "all")
              cr = os.environ.get("CRATES", "all")
              h = os.environ.get("HELM", "all")

          print(f"containers={norm_containers(c)}")
          print(f"wheels={norm_simple(w, WHEEL_TOKENS, 'wheel')}")
          print(f"crates={norm_crates(cr)}")
          print(f"helm={norm_simple(h, HELM_TOKENS, 'helm')}")
          PY
          echo "Resolved selection:"
          cat "${RUNNER_TEMP}/selection.env"
          cat "${RUNNER_TEMP}/selection.env" >> "$GITHUB_OUTPUT"

      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.source_ref || 'main' }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set version and create branch
        id: bump
        env:
          RELEASE_VERSION: ${{ inputs.release_version || '0.0.0' }}
          RELEASE_BRANCH: ${{ inputs.release_branch || (github.event_name == 'push' && 'release/0.0.0test' || '') }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CONTAINERS: ${{ steps.resolve.outputs.containers }}
          HELM: ${{ steps.resolve.outputs.helm }}
        run: |
          set -euo pipefail

          BRANCH="${RELEASE_BRANCH:-release/${RELEASE_VERSION}}"
          # A pure release/X.Y.Z[.postN] branch is a real release; anything else
          # (e.g. release/0.0.0test) is a throwaway test branch.
          if [[ "${BRANCH}" =~ ^release/[0-9]+\.[0-9]+\.[0-9]+(\.post[0-9]+)?$ ]]; then
            IS_TEST=false
          else
            IS_TEST=true
          fi

          if git ls-remote --exit-code --heads origin "${BRANCH}" >/dev/null 2>&1; then
            # Branch exists: reuse it if it already carries the target version
            # (idempotent re-run, no push); otherwise fail — we don't delete/clobber.
            git fetch origin "${BRANCH}"
            EXISTING_VER=$(git show FETCH_HEAD:pyproject.toml | awk '/^version = /{gsub(/"/,"",$3); print $3; exit}')
            if [ "${EXISTING_VER}" = "${RELEASE_VERSION}" ]; then
              echo "${BRANCH} already at ${RELEASE_VERSION}; reusing it (no push)."
              {
                echo "branch=${BRANCH}"
                echo "bump_sha=$(git rev-parse FETCH_HEAD)"
                echo "is_test=${IS_TEST}"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::${BRANCH} exists with version '${EXISTING_VER}' (expected '${RELEASE_VERSION}'); delete it and re-run."
            exit 1
          fi

          # New branch: set the version from THIS workflow's script (GITHUB_SHA, not
          # source_ref which may predate --set-version), sync the lockfile, push.
          git show "${GITHUB_SHA}:.github/scripts/apply_dev_version.py" > "${RUNNER_TEMP}/apply_dev_version.py"
          python3 "${RUNNER_TEMP}/apply_dev_version.py" "" . --set-version "${RELEASE_VERSION}" \
            --containers "${CONTAINERS}" --helm "${HELM}"

          if ! command -v cargo >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 --retry 5 --retry-delay 2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --profile minimal --default-toolchain stable
            source "${HOME}/.cargo/env"
          fi
          # Keep Cargo.lock in sync so post-merge `cargo test --locked` passes.
          cargo update --workspace

          APP_USER_ID=$(curl -fsSL --retry 3 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/${APP_SLUG}%5Bbot%5D" \
            | python3 -c "import sys,json;print(json.load(sys.stdin)['id'])")
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add -A
          git commit -s -m "release: set version ${RELEASE_VERSION}"
          git push origin "${BRANCH}"

          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "bump_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "is_test=${IS_TEST}" >> "$GITHUB_OUTPUT"
          echo "Created ${BRANCH} @ $(git rev-parse HEAD) (is_test=${IS_TEST})"

  # ============================================================================
  # WAIT FOR POST-MERGE CI
  # The branch push above triggers post-merge-ci.yml, which builds + pushes the
  # release images to ECR for the bump commit. release.yml then copies them.
  # ============================================================================
  await-post-merge:
    name: Wait for post-merge CI
    needs: [prepare-branch]
    # TEMPORARY(test): run the full chain on push/test runs too, so the await->approval->release linkage executes on release/0.0.0test. REVERT to the commented line.
    if: ${{ !inputs.dry_run }}
    # if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run && needs.prepare-branch.outputs.is_test != 'true' }}
    runs-on: prod-default-small-v2
    permissions:
      contents: read
      actions: read
    steps:
      - name: Poll post-merge CI for the bump commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ needs.prepare-branch.outputs.bump_sha }}
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 7200 ))
          echo "Waiting for post-merge CI on ${SHA}..."
          while :; do
            RUNS=$(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/actions/workflows/post-merge-ci.yml/runs?head_sha=${SHA}&per_page=1")
            STATUS=$(echo "${RUNS}" | jq -r '.workflow_runs[0].status // "pending"')
            CONCLUSION=$(echo "${RUNS}" | jq -r '.workflow_runs[0].conclusion // ""')
            echo "status=${STATUS} conclusion=${CONCLUSION}"
            if [ "${STATUS}" = "completed" ]; then
              # Proceed once post-merge completes regardless of conclusion: the
              # builds are what release.yml consumes (release-publish fails if the
              # images it needs are absent), so ancillary failures (xpu runner
              # unavailable, flaky tests) must not block a human-approved release.
              if [ "${CONCLUSION}" != "success" ]; then
                echo "::warning::post-merge CI concluded '${CONCLUSION}' for ${SHA}; continuing (release.yml verifies its artifacts; the approval gate is the human checkpoint)."
              fi
              break
            fi
            if [ "$(date +%s)" -ge "${deadline}" ]; then
              echo "::error::timed out waiting for post-merge CI on ${SHA}"
              exit 1
            fi
            sleep 60
          done

  # ============================================================================
  # MANUAL APPROVAL GATE before publishing.
  # ============================================================================
  release-approval:
    name: Release approval gate
    needs: [prepare-branch, await-post-merge]
    # TEMPORARY(test): run the full chain on push/test runs too, so the await->approval->release linkage executes on release/0.0.0test. REVERT to the commented line.
    if: ${{ !inputs.dry_run }}
    # if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run && needs.prepare-branch.outputs.is_test != 'true' }}
    runs-on: prod-default-small-v2
    environment: manual-release-approval
    permissions:
      contents: read
    steps:
      - name: Record approval
        run: echo "On-demand release ${{ needs.prepare-branch.outputs.branch }} approved by ${{ github.actor }}"

  # ============================================================================
  # STAGE ARTIFACTS + TRIGGER GITLAB (release.yml in on-demand mode)
  # ============================================================================
  invoke-release:
    name: Stage release
    needs: [prepare-branch, await-post-merge, release-approval]
    # TEMPORARY(test): run the full chain on push/test runs too, so the await->approval->release linkage executes on release/0.0.0test. REVERT to the commented line.
    if: ${{ !inputs.dry_run }}
    # if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run && needs.prepare-branch.outputs.is_test != 'true' }}
    uses: ./.github/workflows/release.yml
    with:
      commit_sha: ${{ needs.prepare-branch.outputs.bump_sha }}
      on_demand: true
      # TEMPORARY(test): || default lets push/test runs (no inputs) reach release.yml. REVERT to bare inputs.release_version .
      release_version: ${{ inputs.release_version || '0.0.0' }}
      # Normalized subsets from resolve-selection (always set, even on push/test).
      containers: ${{ needs.prepare-branch.outputs.containers }}
      wheels: ${{ needs.prepare-branch.outputs.wheels }}
      crates: ${{ needs.prepare-branch.outputs.crates }}
      helm: ${{ needs.prepare-branch.outputs.helm }}
      skip_gitlab_pipeline: ${{ inputs.skip_gitlab_pipeline || false }}
    secrets: inherit
