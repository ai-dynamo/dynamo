# On-demand release: branch from main / a release branch / a main commit SHA,
# set the release version, commit it to a new release/<version> branch (which
# triggers post-merge CI to build the images), then stage all artifacts and
# trigger the GitLab release-automation pipeline via release.yml.

name: On-Demand Release

on:
  # TEMPORARY: push to the dev branch runs the throwaway test flow — push events
  # have no inputs, so prepare-branch falls back to creating release/0.0.0test
  # (stamped 0.0.0). That branch matches release/*.*.* so post-merge + the other
  # release-branch checks run on it; this workflow's publish jobs skip (they're
  # gated on workflow_dispatch + a real release/X.Y.Z branch). Remove before merging.
  push:
    branches:
      - pvijayakrish/on-demand-release
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Branch to fork from: 'main', a 'release/x.y.z' branch, or a 40-char main commit SHA."
        required: false
        type: string
        default: main
      release_version:
        description: 'Version to STAMP into the tree, X.Y.Z[.devN|.postN] (PEP 440; .devN = pre-release, .postN = post-release; e.g. 0.0.0, 0.0.0.dev3). Not the branch name.'
        required: true
        type: string
      release_branch:
        description: 'Branch to create (default release/<version>). For a throwaway run use e.g. release/0.0.0test — it still matches release/*.*.* so post-merge + release-branch checks run, but the publish jobs skip.'
        required: false
        type: string
        default: ''
      containers:
        description: 'Containers to release: all | none | csv of vllm[:runtime|:efa],sglang[...],trtllm[...],frontend,operator,planner,snapshot.'
        required: false
        type: string
        default: all
      wheels:
        description: 'Wheels to release: all | none | csv of ai-dynamo,ai-dynamo-runtime,kvbm.'
        required: false
        type: string
        default: all
      crates:
        description: 'Crates to release: all | none | csv of crate names (must be dependency-closed).'
        required: false
        type: string
        default: all
      helm:
        description: 'Helm charts to release: all | none | csv of platform,snapshot.'
        required: false
        type: string
        default: all
      selection:
        description: 'Optional JSON overriding the four fields, e.g. {"containers":["vllm:runtime"],"wheels":"all","crates":"none","helm":[]}. When non-empty it takes precedence.'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Create the branch + version bump only; skip staging and the GitLab trigger.'
        required: false
        type: boolean
        default: false
      skip_gitlab_pipeline:
        description: 'Skip the GitLab release automation pipeline trigger. Emergency use only.'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ============================================================================
  # CREATE RELEASE BRANCH + VERSION BUMP
  # Pushes with a dedicated token (not GITHUB_TOKEN) so the push triggers
  # post-merge CI, which builds the release images for the bump commit.
  # ============================================================================
  prepare-branch:
    name: Create release branch + version bump
    runs-on: prod-default-small-v2
    environment: automated-release
    permissions:
      contents: read
    outputs:
      branch: ${{ steps.bump.outputs.branch }}
      bump_sha: ${{ steps.bump.outputs.bump_sha }}
      is_test: ${{ steps.bump.outputs.is_test }}
      rc_number: ${{ steps.rc.outputs.rc_number }}
      containers: ${{ steps.resolve.outputs.containers }}
      wheels: ${{ steps.resolve.outputs.wheels }}
      crates: ${{ steps.resolve.outputs.crates }}
      helm: ${{ steps.resolve.outputs.helm }}
    steps:
      - name: Validate inputs
        env:
          RELEASE_VERSION: ${{ inputs.release_version || '1.3.0' }}
          SOURCE_REF: ${{ inputs.source_ref || 'main' }}
          RELEASE_BRANCH: ${{ inputs.release_branch || (github.event_name == 'push' && 'release/1.3.0' || '') }}
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.(dev|post)[0-9]+)?$ ]]; then
            echo "::error::release_version must be X.Y.Z[.devN|.postN] (got '${RELEASE_VERSION}')"
            exit 1
          fi
          if [[ -n "${RELEASE_BRANCH}" && ! "${RELEASE_BRANCH}" =~ ^release/[A-Za-z0-9._-]+$ ]]; then
            echo "::error::release_branch must look like release/<name> (got '${RELEASE_BRANCH}')"
            exit 1
          fi
          if [[ ! "${SOURCE_REF}" =~ ^(main|release/[0-9]+\.[0-9]+\.[0-9]+(\.(dev|post)[0-9]+)?|[0-9a-f]{40})$ ]]; then
            echo "::error::source_ref must be 'main', a release/x.y.z branch, or a 40-char SHA (got '${SOURCE_REF}')"
            exit 1
          fi

      # Normalize the per-type fields (or the JSON override) into canonical subset
      # strings (all|none|csv of normalized tokens) consumed by the bump, release.yml,
      # and the GitLab trigger. The container grammar expands <fw>[:runtime|:efa]
      # (bare fw = both) and validates every token; unknown tokens fail fast.
      - name: Resolve artifact selection
        id: resolve
        env:
          SELECTION: ${{ inputs.selection }}
          CONTAINERS: ${{ inputs.containers || 'all' }}
          WHEELS: ${{ inputs.wheels || 'all' }}
          # MAX publishable set = the full dependency closure of the intended public
          # crates (runtime, memory, tokens, kv-router, protocols, parsers, llm, mocker),
          # all at 1.3.0. Includes the transitive deps (rl, kv-hashing, data-gen, renderer,
          # tokenizers, kvbm-*) since --only is strict/dependency-closed. dynamo-mocker's
          # aiconfigurator-core git dep is stripped at publish by stage_crates.py
          # (strip_git_deps). Excludes kvbm-consolidator (still 1.2.0 -> would trip the
          # expect-version gate) and the non-public bench/ext-proc/backend-common crates.
          # 'dynamo-configs' is not a workspace crate (no such package).
          CRATES: ${{ inputs.crates || 'dynamo-runtime,dynamo-memory,dynamo-tokens,dynamo-protocols,dynamo-parsers,dynamo-tokenizers,dynamo-renderer,dynamo-kv-hashing,dynamo-kv-router,dynamo-rl,dynamo-data-gen,kvbm-common,kvbm-config,kvbm-kernels,kvbm-logical,kvbm-physical,kvbm-engine,dynamo-mocker,dynamo-llm' }}
          HELM: ${{ inputs.helm || 'all' }}
        run: |
          set -euo pipefail
          python3 <<'PY' > "${RUNNER_TEMP}/selection.env"
          import json, os, sys

          FRAMEWORKS = {"vllm", "sglang", "trtllm"}
          VARIANTS = {"runtime", "efa"}
          COMPONENTS = {"frontend", "operator", "planner", "snapshot"}
          WHEEL_TOKENS = {"ai-dynamo", "ai-dynamo-runtime", "kvbm"}
          HELM_TOKENS = {"platform", "snapshot"}

          def fail(msg):
              print(f"::error::{msg}", file=sys.stderr)
              sys.exit(1)

          def dedupe(xs):
              seen = []
              for x in xs:
                  if x not in seen:
                      seen.append(x)
              return seen

          def as_spec(v):
              # A JSON value: list -> csv ('none' if empty); scalar -> str.
              if isinstance(v, list):
                  return ",".join(str(x) for x in v) if v else "none"
              return str(v).strip()

          def norm_containers(spec):
              spec = (spec or "all").strip()
              if spec == "all":
                  return "all"
              if spec in ("", "none"):
                  return "none"
              out = []
              for tok in (t.strip() for t in spec.split(",") if t.strip()):
                  if tok in COMPONENTS:
                      out.append(tok)
                      continue
                  fw, _, var = tok.partition(":")
                  if fw not in FRAMEWORKS:
                      fail(f"unknown container token '{tok}'")
                  if var == "":
                      out += [f"{fw}-runtime", f"{fw}-efa"]
                  elif var in VARIANTS:
                      out.append(f"{fw}-{var}")
                  else:
                      fail(f"unknown variant in '{tok}' (use runtime|efa)")
              return ",".join(dedupe(out))

          def norm_simple(spec, universe, label):
              spec = (spec or "all").strip()
              if spec == "all":
                  return "all"
              if spec in ("", "none"):
                  return "none"
              sel = [t.strip() for t in spec.split(",") if t.strip()]
              bad = [t for t in sel if t not in universe]
              if bad:
                  fail(f"unknown {label} token(s) {bad}; valid: {sorted(universe)}")
              return ",".join(dedupe(sel))

          def norm_crates(spec):
              spec = (spec or "all").strip()
              if spec == "all":
                  return "all"
              if spec in ("", "none"):
                  return "none"
              # Crate names are validated (and closure-checked) by stage_crates.py.
              return ",".join(dedupe(t.strip() for t in spec.split(",") if t.strip()))

          sel = os.environ.get("SELECTION", "").strip()
          if sel:
              try:
                  d = json.loads(sel)
              except Exception as e:
                  fail(f"selection is not valid JSON: {e}")
              if not isinstance(d, dict):
                  fail("selection JSON must be an object")
              c, w, cr, h = (as_spec(d.get(k, "all")) for k in ("containers", "wheels", "crates", "helm"))
          else:
              c = os.environ.get("CONTAINERS", "all")
              w = os.environ.get("WHEELS", "all")
              cr = os.environ.get("CRATES", "all")
              h = os.environ.get("HELM", "all")

          print(f"containers={norm_containers(c)}")
          print(f"wheels={norm_simple(w, WHEEL_TOKENS, 'wheel')}")
          print(f"crates={norm_crates(cr)}")
          print(f"helm={norm_simple(h, HELM_TOKENS, 'helm')}")
          PY
          echo "Resolved selection:"
          cat "${RUNNER_TEMP}/selection.env"
          cat "${RUNNER_TEMP}/selection.env" >> "$GITHUB_OUTPUT"

      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.source_ref || 'main' }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set version and create branch
        id: bump
        env:
          RELEASE_VERSION: ${{ inputs.release_version || '1.3.0' }}
          RELEASE_BRANCH: ${{ inputs.release_branch || (github.event_name == 'push' && 'release/1.3.0' || '') }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CONTAINERS: ${{ steps.resolve.outputs.containers }}
          HELM: ${{ steps.resolve.outputs.helm }}
        run: |
          set -euo pipefail

          BRANCH="${RELEASE_BRANCH:-release/${RELEASE_VERSION}}"
          # A pure release/X.Y.Z[.devN|.postN] branch is a real release; anything
          # else (e.g. release/0.0.0test) is a throwaway test branch.
          if [[ "${BRANCH}" =~ ^release/[0-9]+\.[0-9]+\.[0-9]+(\.(dev|post)[0-9]+)?$ ]]; then
            IS_TEST=false
          else
            IS_TEST=true
          fi

          if git ls-remote --exit-code --heads origin "${BRANCH}" >/dev/null 2>&1; then
            # Branch exists: reuse it if it already carries the target version
            # (idempotent re-run, no push); otherwise fail — we don't delete/clobber.
            git fetch origin "${BRANCH}"
            EXISTING_VER=$(git show FETCH_HEAD:pyproject.toml | awk '/^version = /{gsub(/"/,"",$3); print $3; exit}')
            if [ "${EXISTING_VER}" = "${RELEASE_VERSION}" ]; then
              echo "${BRANCH} already at ${RELEASE_VERSION}; reusing it (no push)."
              {
                echo "branch=${BRANCH}"
                echo "bump_sha=$(git rev-parse FETCH_HEAD)"
                echo "is_test=${IS_TEST}"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::${BRANCH} exists with version '${EXISTING_VER}' (expected '${RELEASE_VERSION}'); delete it and re-run."
            exit 1
          fi

          # New branch: set the version from THIS workflow's script (GITHUB_SHA, not
          # source_ref which may predate --set-version), sync the lockfile, push.
          git show "${GITHUB_SHA}:.github/scripts/apply_dev_version.py" > "${RUNNER_TEMP}/apply_dev_version.py"
          python3 "${RUNNER_TEMP}/apply_dev_version.py" "" . --set-version "${RELEASE_VERSION}" \
            --containers "${CONTAINERS}" --helm "${HELM}"

          if ! command -v cargo >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 --retry 5 --retry-delay 2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --profile minimal --default-toolchain stable
            source "${HOME}/.cargo/env"
          fi
          # Keep Cargo.lock in sync so post-merge `cargo test --locked` passes.
          cargo update --workspace

          APP_USER_ID=$(curl -fsSL --retry 3 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/${APP_SLUG}%5Bbot%5D" \
            | python3 -c "import sys,json;print(json.load(sys.stdin)['id'])")
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add -A
          # --allow-empty: cutting release/1.3.0 from a main already at 1.3.0 makes the
          # version bump a near-no-op, so the branch is still created and post-merge fires.
          git commit -s --allow-empty -m "release: set version ${RELEASE_VERSION}"
          git push origin "${BRANCH}"

          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "bump_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "is_test=${IS_TEST}" >> "$GITHUB_OUTPUT"
          echo "Created ${BRANCH} @ $(git rev-parse HEAD) (is_test=${IS_TEST})"

      - name: Compute and tag internal staging rc
        id: rc
        # A dry run sets up the branch/bump only — don't consume an rc or push a tag.
        if: ${{ !inputs.dry_run }}
        env:
          RELEASE_VERSION: ${{ inputs.release_version || '1.3.0' }}
          BUMP_SHA: ${{ steps.bump.outputs.bump_sha }}
        run: |
          set -euo pipefail
          # Internal staging registries (crates/helm/wheels) are immutable, so each
          # (re-)stage of the same version needs a distinct rc. Count existing
          # v<version>-rc<N> tags, take the next N, and tag THIS bump commit so the
          # next stage increments. GA promotion (GitLab) still uses the clean version.
          # The 'origin' remote is already authed with the app token from checkout.
          git fetch --tags --quiet origin || true
          EXISTING=$(git tag -l "v${RELEASE_VERSION}-rc*" | grep -E "^v${RELEASE_VERSION}-rc[0-9]+$" | sort -V || true)
          if [ -z "${EXISTING}" ]; then
            NEXT_RC=0
          else
            LAST="$(echo "${EXISTING}" | tail -1)"
            NEXT_RC=$(( ${LAST##*-rc} + 1 ))
          fi
          TAG="v${RELEASE_VERSION}-rc${NEXT_RC}"
          git tag "${TAG}" "${BUMP_SHA}"
          if ! git push origin "${TAG}"; then
            echo "::error::failed to push tag ${TAG} (the release branch was already pushed). The release App may lack permission to create v* tags — check tag protection / rulesets."
            exit 1
          fi
          echo "rc_number=${NEXT_RC}" >> "$GITHUB_OUTPUT"
          echo "Internal staging rc=${NEXT_RC} (tagged ${TAG} -> ${BUMP_SHA})"

  # ============================================================================
  # WAIT FOR POST-MERGE BUILDS (not tests)
  # The branch push above triggers post-merge-ci.yml, which builds + pushes the
  # release images to ECR for the bump commit. We wait only for the ECR images the
  # SELECTED artifacts consume, so we proceed as soon as those builds finish —
  # WITHOUT waiting for post-merge tests/compliance/deploy. Tests don't push images,
  # and the bump SHA is unique, so a present tag is unambiguously this run's build
  # output. Runs on an ECR-capable runner (same IRSA path as stage-wheels).
  # ============================================================================
  await-post-merge:
    name: Wait for post-merge builds
    needs: [prepare-branch]
    # TEMPORARY(test): run the full chain on push/test runs too, so the await->approval->release linkage executes on release/0.0.0test. REVERT to the commented line.
    if: ${{ !inputs.dry_run }}
    # if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run && needs.prepare-branch.outputs.is_test != 'true' }}
    runs-on: prod-tester-amd-v1
    environment: automated-release
    permissions:
      contents: read
      actions: read
    steps:
      - name: Wait for the selected artifacts' build images in ECR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ needs.prepare-branch.outputs.bump_sha }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          CONTAINERS: ${{ needs.prepare-branch.outputs.containers }}
          WHEELS: ${{ needs.prepare-branch.outputs.wheels }}
          CRATES: ${{ needs.prepare-branch.outputs.crates }}
        run: |
          set -euo pipefail
          aws sts get-caller-identity >/dev/null || { echo "::error::no AWS credentials on this runner"; exit 1; }

          # ECR tags this release will consume, derived from the selection. The
          # container token -> source tag map mirrors release.yml's copy step; wheels
          # come from the dynamo-runtime image, crates from dynamo-runtime-test.
          CSET="${CONTAINERS:-all}"
          ctr_selected() {
            [ "${CSET}" = "all" ] && return 0
            [ "${CSET}" = "none" ] && return 1
            case ",${CSET}," in *,"$1",*) return 0 ;; esac
            return 1
          }
          declare -A CTR=(
            [vllm-runtime]=vllm-runtime     [vllm-efa]=vllm-runtime-efa
            [sglang-runtime]=sglang-runtime [sglang-efa]=sglang-runtime-efa
            [trtllm-runtime]=trtllm-runtime [trtllm-efa]=trtllm-runtime-efa
            [frontend]=dynamo-frontend [operator]=operator [planner]=dynamo-planner [snapshot]=snapshot-agent
          )
          declare -a TAGS=()
          for tok in "${!CTR[@]}"; do
            if ctr_selected "${tok}"; then TAGS+=("${SHA}-${CTR[$tok]}"); fi
          done
          if [ "${WHEELS:-all}" != "none" ]; then TAGS+=("${SHA}-dynamo-runtime"); fi
          if [ "${CRATES:-all}" != "none" ]; then TAGS+=("${SHA}-dynamo-runtime-test"); fi

          if [ ${#TAGS[@]} -eq 0 ]; then
            echo "No ECR build artifacts selected (helm-only); nothing to wait for."
            exit 0
          fi

          echo "Waiting for post-merge builds to publish ${#TAGS[@]} ECR tag(s): ${TAGS[*]}"
          deadline=$(( $(date +%s) + 7200 ))
          while :; do
            missing=()
            for TAG in "${TAGS[@]}"; do
              if ! aws ecr describe-images --repository-name "ai-dynamo/dynamo" \
                     --image-ids imageTag="${TAG}" --region "${AWS_DEFAULT_REGION}" >/dev/null 2>&1; then
                missing+=("${TAG}")
              fi
            done
            if [ ${#missing[@]} -eq 0 ]; then
              echo "All ${#TAGS[@]} required build images are in ECR; proceeding (not waiting for post-merge tests)."
              break
            fi
            echo "still missing ${#missing[@]}/${#TAGS[@]}: ${missing[*]}"

            # Fast-fail: if post-merge has finished and the images still aren't here,
            # the builds we need failed/were skipped — don't burn the full timeout.
            RUNS=$(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/actions/workflows/post-merge-ci.yml/runs?head_sha=${SHA}&per_page=1" || echo '{}')
            STATUS=$(echo "${RUNS}" | jq -r '.workflow_runs[0].status // "pending"')
            if [ "${STATUS}" = "completed" ]; then
              echo "::error::post-merge CI completed but required image(s) still missing: ${missing[*]}"
              exit 1
            fi

            if [ "$(date +%s)" -ge "${deadline}" ]; then
              echo "::error::timed out waiting for post-merge build images: ${missing[*]}"
              exit 1
            fi
            sleep 30
          done

  # ============================================================================
  # MANUAL APPROVAL GATE before publishing.
  # ============================================================================
  release-approval:
    name: Release approval gate
    needs: [prepare-branch, await-post-merge]
    # TEMPORARY(test): run the full chain on push/test runs too, so the await->approval->release linkage executes on release/0.0.0test. REVERT to the commented line.
    if: ${{ !inputs.dry_run }}
    # if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run && needs.prepare-branch.outputs.is_test != 'true' }}
    runs-on: prod-default-small-v2
    environment: manual-release-approval
    permissions:
      contents: read
    steps:
      - name: Record approval
        run: echo "On-demand release ${{ needs.prepare-branch.outputs.branch }} approved by ${{ github.actor }}"

  # ============================================================================
  # STAGE ARTIFACTS + TRIGGER GITLAB (release.yml in on-demand mode)
  # ============================================================================
  invoke-release:
    name: Stage release
    needs: [prepare-branch, await-post-merge, release-approval]
    # TEMPORARY(test): run the full chain on push/test runs too, so the await->approval->release linkage executes on release/0.0.0test. REVERT to the commented line.
    if: ${{ !inputs.dry_run }}
    # if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run && needs.prepare-branch.outputs.is_test != 'true' }}
    uses: ./.github/workflows/release.yml
    with:
      commit_sha: ${{ needs.prepare-branch.outputs.bump_sha }}
      on_demand: true
      # TEMPORARY(test): || default lets push/test runs (no inputs) reach release.yml. REVERT to bare inputs.release_version .
      release_version: ${{ inputs.release_version || '1.3.0' }}
      # Auto-incrementing internal-staging rc (immutable registries can't be overwritten).
      rc_number: ${{ needs.prepare-branch.outputs.rc_number }}
      # Normalized subsets from resolve-selection (always set, even on push/test).
      containers: ${{ needs.prepare-branch.outputs.containers }}
      wheels: ${{ needs.prepare-branch.outputs.wheels }}
      crates: ${{ needs.prepare-branch.outputs.crates }}
      helm: ${{ needs.prepare-branch.outputs.helm }}
      skip_gitlab_pipeline: ${{ inputs.skip_gitlab_pipeline || false }}
    secrets: inherit
