# On-demand release: branch from main / a release branch / a main commit SHA,
# set the release version, commit it to a new release/<version> branch (which
# triggers post-merge CI to build the images), then stage all artifacts and
# trigger the GitLab release-automation pipeline via release.yml.

name: On-Demand Release

on:
  # TEMPORARY: push to the dev branch runs the throwaway test flow — push events
  # have no inputs, so prepare-branch falls back to creating release/0.0.0test
  # (stamped 0.0.0). That branch matches release/*.*.* so post-merge + the other
  # release-branch checks run on it; this workflow's publish jobs skip (they're
  # gated on workflow_dispatch + a real release/X.Y.Z branch). Remove before merging.
  push:
    branches:
      - pvijayakrish/on-demand-release
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Branch to fork from: 'main', a 'release/x.y.z' branch, or a 40-char main commit SHA."
        required: false
        type: string
        default: main
      release_version:
        description: 'Version to STAMP into the tree, X.Y.Z[.postN] (must be valid SemVer/PEP 440, e.g. 0.0.0). Not the branch name.'
        required: true
        type: string
      release_branch:
        description: 'Branch to create (default release/<version>). For a throwaway run use e.g. release/0.0.0test — it still matches release/*.*.* so post-merge + release-branch checks run, but the publish jobs skip.'
        required: false
        type: string
        default: ''
      artifacts:
        description: 'Artifacts to release (comma-separated): crate,container,wheel,helm.'
        required: false
        type: string
        default: crate,container,wheel,helm
      dry_run:
        description: 'Create the branch + version bump only; skip staging and the GitLab trigger.'
        required: false
        type: boolean
        default: false
      skip_gitlab_pipeline:
        description: 'Skip the GitLab release automation pipeline trigger. Emergency use only.'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ============================================================================
  # CREATE RELEASE BRANCH + VERSION BUMP
  # Pushes with a dedicated token (not GITHUB_TOKEN) so the push triggers
  # post-merge CI, which builds the release images for the bump commit.
  # ============================================================================
  prepare-branch:
    name: Create release branch + version bump
    runs-on: prod-default-small-v2
    # The PAT (OPS_BOT_PAT) authenticates the push; the job's GITHUB_TOKEN is not
    # used to write, so it stays read-only.
    permissions:
      contents: read
    outputs:
      branch: ${{ steps.bump.outputs.branch }}
      bump_sha: ${{ steps.bump.outputs.bump_sha }}
      is_test: ${{ steps.bump.outputs.is_test }}
    steps:
      - name: Validate inputs
        env:
          RELEASE_VERSION: ${{ inputs.release_version || '0.0.0' }}
          SOURCE_REF: ${{ inputs.source_ref || 'main' }}
          RELEASE_BRANCH: ${{ inputs.release_branch || (github.event_name == 'push' && 'release/0.0.0test' || '') }}
          OPS_BOT_PAT: ${{ secrets.OPS_BOT_PAT }}
        run: |
          set -euo pipefail
          if [[ -z "${OPS_BOT_PAT}" ]]; then
            echo "::error::OPS_BOT_PAT is not set. The dynamo-ops PAT is required to create release/* (the github-actions token is not a ruleset bypass actor and its push won't trigger post-merge CI)."
            exit 1
          fi
          if [[ ! "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.post[0-9]+)?$ ]]; then
            echo "::error::release_version must be X.Y.Z[.postN] (got '${RELEASE_VERSION}')"
            exit 1
          fi
          if [[ -n "${RELEASE_BRANCH}" && ! "${RELEASE_BRANCH}" =~ ^release/[A-Za-z0-9._-]+$ ]]; then
            echo "::error::release_branch must look like release/<name> (got '${RELEASE_BRANCH}')"
            exit 1
          fi
          if [[ ! "${SOURCE_REF}" =~ ^(main|release/[0-9]+\.[0-9]+\.[0-9]+(\.post[0-9]+)?|[0-9a-f]{40})$ ]]; then
            echo "::error::source_ref must be 'main', a release/x.y.z branch, or a 40-char SHA (got '${SOURCE_REF}')"
            exit 1
          fi

      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.source_ref || 'main' }}
          fetch-depth: 0
          # dynamo-ops PAT: must be a bypass actor on the release/* ruleset to
          # create the branch, and (being a PAT, not github.token) its push
          # triggers post-merge CI. Same identity used by auto-dep-upgrade.
          # Swap to a GitHub App installation token here when the App is set up.
          token: ${{ secrets.OPS_BOT_PAT }}

      - name: Set version and create branch
        id: bump
        env:
          RELEASE_VERSION: ${{ inputs.release_version || '0.0.0' }}
          RELEASE_BRANCH: ${{ inputs.release_branch || (github.event_name == 'push' && 'release/0.0.0test' || '') }}
        run: |
          set -euo pipefail

          BRANCH="${RELEASE_BRANCH:-release/${RELEASE_VERSION}}"
          # A pure release/X.Y.Z[.postN] branch is a real release; anything else
          # (e.g. release/0.0.0test) is a throwaway test branch.
          if [[ "${BRANCH}" =~ ^release/[0-9]+\.[0-9]+\.[0-9]+(\.post[0-9]+)?$ ]]; then
            IS_TEST=false
          else
            IS_TEST=true
          fi

          if git ls-remote --exit-code --heads origin "${BRANCH}" >/dev/null 2>&1; then
            if [[ "${IS_TEST}" == "true" ]]; then
              echo "Test branch ${BRANCH} exists; deleting it for a clean re-run"
              git push origin --delete "${BRANCH}"
            else
              echo "::error::${BRANCH} already exists; refusing to clobber"
              exit 1
            fi
          fi

          # Run the version-set script from THIS workflow's commit (GITHUB_SHA),
          # not from source_ref — source_ref (main, or an old release/* branch)
          # may predate the --set-version support. Applied to the source tree (.).
          git show "${GITHUB_SHA}:.github/scripts/apply_dev_version.py" > "${RUNNER_TEMP}/apply_dev_version.py"
          python3 "${RUNNER_TEMP}/apply_dev_version.py" "" . --set-version "${RELEASE_VERSION}"

          if ! command -v cargo >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 --retry 5 --retry-delay 2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --profile minimal --default-toolchain stable
            source "${HOME}/.cargo/env"
          fi
          # Keep Cargo.lock in sync so post-merge `cargo test --locked` passes.
          cargo update --workspace

          # Commit as the pushing principal (dynamo-ops); -s satisfies the
          # repo-wide DCO check (.github/dco.yml require: members: false).
          git config user.name "dynamo-ops"
          git config user.email "170655669+dynamo-ops@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add -A
          git commit -s -m "release: set version ${RELEASE_VERSION}"
          git push origin "${BRANCH}"

          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "bump_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "is_test=${IS_TEST}" >> "$GITHUB_OUTPUT"
          echo "Created ${BRANCH} @ $(git rev-parse HEAD) (is_test=${IS_TEST})"

  # ============================================================================
  # WAIT FOR POST-MERGE CI
  # The branch push above triggers post-merge-ci.yml, which builds + pushes the
  # release images to ECR for the bump commit. release.yml then copies them.
  # ============================================================================
  await-post-merge:
    name: Wait for post-merge CI
    needs: [prepare-branch]
    if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run && needs.prepare-branch.outputs.is_test != 'true' }}
    runs-on: prod-default-small-v2
    permissions:
      contents: read
      actions: read
    steps:
      - name: Poll post-merge CI for the bump commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ needs.prepare-branch.outputs.bump_sha }}
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 7200 ))
          echo "Waiting for post-merge CI on ${SHA}..."
          while :; do
            RUNS=$(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/actions/workflows/post-merge-ci.yml/runs?head_sha=${SHA}&per_page=1")
            STATUS=$(echo "${RUNS}" | jq -r '.workflow_runs[0].status // "pending"')
            CONCLUSION=$(echo "${RUNS}" | jq -r '.workflow_runs[0].conclusion // ""')
            echo "status=${STATUS} conclusion=${CONCLUSION}"
            if [ "${STATUS}" = "completed" ]; then
              if [ "${CONCLUSION}" = "success" ]; then
                echo "post-merge CI succeeded"
                break
              fi
              echo "::error::post-merge CI concluded '${CONCLUSION}' for ${SHA}"
              exit 1
            fi
            if [ "$(date +%s)" -ge "${deadline}" ]; then
              echo "::error::timed out waiting for post-merge CI on ${SHA}"
              exit 1
            fi
            sleep 60
          done

  # ============================================================================
  # MANUAL APPROVAL GATE before publishing.
  # ============================================================================
  release-approval:
    name: Release approval gate
    needs: [prepare-branch, await-post-merge]
    if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run && needs.prepare-branch.outputs.is_test != 'true' }}
    runs-on: prod-default-small-v2
    environment: manual-release-approval
    permissions:
      contents: read
    steps:
      - name: Record approval
        run: echo "On-demand release ${{ needs.prepare-branch.outputs.branch }} approved by ${{ github.actor }}"

  # ============================================================================
  # STAGE ARTIFACTS + TRIGGER GITLAB (release.yml in on-demand mode)
  # ============================================================================
  invoke-release:
    name: Stage release
    needs: [prepare-branch, await-post-merge, release-approval]
    if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run && needs.prepare-branch.outputs.is_test != 'true' }}
    uses: ./.github/workflows/release.yml
    with:
      commit_sha: ${{ needs.prepare-branch.outputs.bump_sha }}
      on_demand: true
      release_version: ${{ inputs.release_version }}
      artifacts: ${{ inputs.artifacts }}
      skip_gitlab_pipeline: ${{ inputs.skip_gitlab_pipeline }}
    secrets: inherit
