# CI Filter Patterns - See FILTERS.md for documentation
#
# Filters that trigger CI jobs:
#   core     -> dynamo build-test, all backend builds (vllm/sglang/trtllm)
#   operator -> operator build and test
#   snapshot -> snapshot-agent build and test
#   power_agent -> power-agent image build
#   deploy   -> deploy tests
#   planner  -> dynamo build-test
#   vllm     -> vllm build and test
#   sglang   -> sglang build and test
#   trtllm   -> trtllm build and test
#   frontend -> frontend EPP image build, dynamo build-test
#   benchmarks -> dynamo build-test (runs tests/benchmarks/** pytest suite)
#   aic      -> runtime, planner, and frontend AIC contract tests
#   efa      -> all framework EFA runtime image builds (changes to container/templates/aws.Dockerfile)
#   docs     -> fern docs lint, sync, and version release (docs/ directory)
#
# Filters for coverage only (no CI triggered):
#   examples, ignore

all:
  - '**'

docs:
  - 'docs/**'
  - 'fern/**'
  - '.github/workflows/fern-docs.yml'
  - '**/*.md'
  - '**/*.txt'
  - '**/.gitignore'
  - '**/.helmignore'
  - '**/.gitattributes'
  - 'LICENSE'
  - 'CODEOWNERS'
  - '.coveragerc'
  - '.claude/**'
  - '.agents/**'
  # Canonical agent skills live in .agents/skills; root skills/ is a symlink there.
  - 'skills/**'

examples:
  - 'recipes/**'
  - 'examples/**'
  - '.devcontainer/**'
  - 'deploy/discovery/**'
  - 'deploy/inference-gateway/**'
  - 'dev/observability/**'
  - 'deploy/observability/**'
  - 'deploy/pre-deployment/**'

ignore:
  - '.lycheeignore'
  - '.pre-commit-config.yaml'
  - '.coderabbit.yaml'
  - '.clang-format'
  - 'dynamo.code-workspace'
  - 'deploy/*'
  # Standalone CRD apiVersion converter: classification-only so it satisfies
  # the changed-files coverage check without triggering the operator deploy
  # pipeline (it is excluded from the `deploy` filter below).
  - 'deploy/utils/convert_api_version.py'
  - 'deploy/utils/tests/**'
  - 'dev/*'
  - '.github/scripts/**'
  - '.github/ISSUE_TEMPLATE/**'
  - '.github/pull_request_template.md'
  - '.github/labeler.yml'
  - '.github/release.yml'
  - '.github/copy-pr-bot.yaml'
  - '.github/dco.yml'
  - '.github/allurerc.mjs'
  - 'container/Dockerfile.docs'
  - 'container/run.sh'
  - 'container/use-sccache.sh'
  - 'container/dev/**'
  - 'container/templates/local_dev.Dockerfile'
  - 'container/templates/dev.Dockerfile'
  # Removed by trtllm upstream-base migration; claim here so changed-files
  # validation passes on the deletion diff without triggering trtllm CI.
  - 'container/build_trtllm_wheel.sh'
  - 'container/deps/trtllm/**'
  - 'scripts/dco_check.py'

ci: &ci
  - '.github/workflows/**'
  - '.github/filters.yaml'
  - '.github/actions/**'
  - '.github/scripts/parse_buildkit_output.py'
  - '.github/scripts/route_buildkit.sh'
  - 'container/Dockerfile.test'

core:
  - *ci
  - 'container/render.py'
  - 'container/Dockerfile.template'
  - 'container/context.yaml'
  - 'container/templates/args.Dockerfile'
  - 'container/templates/dynamo_*'
  - 'container/templates/wheel_builder.Dockerfile'
  - 'container/templates/compliance.Dockerfile'
  - '.dockerignore'
  - 'container/deps/*'
  - 'container/compliance/**'
  - '.cargo/config.toml'
  - 'lib/**'
  - 'tests/**'
  - 'components/src/dynamo/router/**'
  - 'components/src/dynamo/thunderagent_router/**'
  - 'components/src/dynamo/mocker/**'
  - 'components/src/dynamo/replay/**'
  - 'components/src/dynamo/frontend/**'
  - 'components/src/dynamo/common/**'
  - 'components/src/dynamo/gpu_memory_service/**'
  # TODO(will): Move TokenSpeed to a dedicated framework filter once CI has
  # TokenSpeed Docker images and backend-specific build/test jobs.
  - 'components/src/dynamo/tokenspeed/**'
  - '*.toml'
  - '*.lock'
  - '*.py'
  - '*.rs'
  - 'scripts/report_pytest_markers.py'
  # Negation patterns MUST come after positive patterns — micromatch processes
  # patterns left-to-right, so negations only filter matches accumulated by
  # preceding patterns. Placing them first has no effect.
  - '!**/*.md'
  - '!**/*.rst'
  - '!**/*.txt'

aic:
  - 'Cargo.toml'
  - 'Cargo.lock'
  - 'lib/bindings/python/Cargo.toml'
  - 'lib/bindings/python/Cargo.lock'
  - 'pyproject.toml'
  - 'benchmarks/pyproject.toml'
  - 'container/deps/requirements.planner.txt'
  - 'container/templates/frontend.Dockerfile'
  - 'container/templates/planner.Dockerfile'
  - 'container/templates/wheel_builder.Dockerfile'
  - 'lib/mocker/src/common/engine_perf.rs'
  - 'lib/mocker/src/common/perf_model.rs'
  - 'lib/mocker/src/common/protocols.rs'
  - 'lib/bindings/python/rust/llm/aic_callback.rs'
  - 'lib/bindings/python/rust/llm/engine_perf.rs'
  - 'lib/bindings/python/src/dynamo/_internal/aic.py'
  - 'lib/bindings/python/tests/**/*aic*'
  - 'lib/bindings/python/tests/test_engine_perf_model.py'
  - 'lib/kv-router/src/scheduling/config.rs'
  - 'components/src/dynamo/common/configuration/groups/aic_perf_args.py'
  - 'components/src/dynamo/frontend/frontend_args.py'
  - 'components/src/dynamo/planner/**/*aic*'
  - 'components/src/dynamo/planner/config/planner_config.py'
  - 'components/src/dynamo/planner/core/perf_model/rust_adapter.py'
  - 'components/src/dynamo/profiler/**/*aic*'
  - 'components/src/dynamo/profiler/rapid.py'
  - 'components/src/dynamo/profiler/thorough.py'
  - 'components/src/dynamo/profiler/utils/replay_optimize/**'
  - 'components/src/dynamo/profiler/tests/test_replay_optimize.py'
  - 'components/src/dynamo/profiler/tests/unit/test_rapid_planner_replicas.py'
  - 'components/src/dynamo/replay/api.py'
  - 'components/src/dynamo/replay/main.py'
  - 'tests/dependencies/test_aiconfigurator_consistency.py'
  - 'tests/frontend/aic_image_smoke.py'
  - 'tests/report_pytest_markers.py'
  - 'tests/router/mocker_process.py'
  - 'tests/router/test_router_e2e_with_mockers.py'
  - 'tests/wheels/smoke_install.py'
  - 'tests/wheels/test_dynamo_wheel_smoke.py'
  - '.github/filters.yaml'
  - '.github/actions/changed-files/action.yml'
  - '.github/workflows/pr.yaml'
  - '.github/workflows/pre-merge.yml'
  - '.github/workflows/dynamo-pipeline.yml'
  - '.github/workflows/shared-test.yml'

operator:
  - *ci
  - 'deploy/operator/**'
  - 'deploy/operator/.*'
  # Operator imports the local snapshot module.
  - 'deploy/snapshot/**'
  - 'docs/kubernetes/api-reference.md'
  - 'deploy/helm/charts/platform/**'
  - 'components/src/dynamo/profiler/utils/dgdr_*'

snapshot:
  - 'deploy/snapshot/**'
  - 'deploy/snapshot/.*'
  - 'components/src/dynamo/common/snapshot/**'
  - 'deploy/operator/internal/checkpoint/**'
  - 'tests/deploy/test_dynamocheckpoint.py'

power_agent:
  - *ci
  - 'deploy/power-agent/**'
  - 'deploy/helm/charts/power-agent/**'
  - '!**/*.md'
  - '!**/*.rst'

deploy:
  - *ci
  - 'deploy/helm/**'
  - 'deploy/utils/**'
  - 'deploy/snapshot/**'
  - 'tests/deploy/**'
  - 'tests/utils/managed_deployment.py'
  # Standalone CRD apiVersion converter: not used by the deploy-test harness and
  # has no CI test wiring, so it should not trigger the operator deploy pipeline.
  - '!deploy/utils/convert_api_version.py'
  - '!deploy/utils/tests/**'
  - '!**/*.md'
  - '!**/*.rst'

planner:
  - 'container/templates/planner.Dockerfile'
  - 'components/src/dynamo/planner/**'
  - 'components/src/dynamo/global_planner/**'
  - 'components/src/dynamo/profiler/**'
  - 'components/src/dynamo/global_router/**'
  # Power-aware planner (PR #9369): per-node power agent component
  - 'deploy/power-agent/**'
  - 'deploy/helm/charts/power-agent/**'

vllm:
  - 'container/deps/requirements.vllm.txt'
  - 'container/deps/vllm/**'
  - 'examples/backends/vllm/**'
  - 'components/src/dynamo/vllm/**'
  - 'container/templates/vllm_*'
  - '!**/*.md'
  - '!**/*.rst'

sglang:
  - 'container/deps/sglang/**'
  - 'examples/backends/sglang/**'
  - 'components/src/dynamo/sglang/**'
  - 'container/templates/sglang_*'
  - 'container/deps/sglang/**'
  - '!**/*.md'
  - '!**/*.rst'

trtllm:
  - 'container/deps/requirements.trtllm.txt'
  - 'examples/backends/trtllm/**'
  - 'components/src/dynamo/trtllm/**'
  - 'container/templates/trtllm_*'
  - '!**/*.md'
  - '!**/*.rst'

# sample -> sample-unified-test (framework-agnostic CPU-only backend
# reference implementation). Piggybacks on the vllm image, so a sample-only
# change triggers vllm-build + sample-unified-test. The common/backend ABC
# already triggers `core`; this filter is for the launch scripts and tests
# that are specific to the sample backend.
sample:
  - 'examples/backends/sample/**'
  - '!**/*.md'
  - '!**/*.rst'

frontend:
  - *ci
  - '.cargo/config.toml'
  - 'lib/**'
  - '*.toml'
  - '*.lock'
  - 'container/deps/*'
  - 'container/compliance/**'
  - 'components/src/dynamo/router/**'
  - 'components/src/dynamo/thunderagent_router/**'
  - 'components/src/dynamo/mocker/**'
  - 'components/src/dynamo/replay/**'
  - 'components/src/dynamo/frontend/**'
  - 'components/src/dynamo/common/**'
  - 'deploy/inference-gateway/**'
  - 'container/templates/frontend.Dockerfile'
  - '!**/*.md'
  - '!**/*.rst'

rust:
  - '.github/workflows/pre-merge.yml'
  - '**/*.rs'
  - '**/Cargo.toml'
  - '**/Cargo.lock'
  - 'deny.toml'

benchmarks:
  - 'benchmarks/**'
  - '!**/*.md'
  - '!**/*.rst'

efa:
  - 'container/templates/aws.Dockerfile'
