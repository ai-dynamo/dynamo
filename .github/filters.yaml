# CI Filter Patterns - See FILTERS.md for documentation
#
# Filters that trigger CI jobs:
#   core     -> dynamo build-test, all backend builds (vllm/sglang/trtllm)
#   operator -> operator build and test
#   snapshot -> snapshot-agent build and test
#   deploy   -> deploy tests
#   planner  -> dynamo build-test
#   vllm     -> vllm build and test
#   sglang   -> sglang build and test
#   trtllm   -> trtllm build and test
#   frontend -> frontend EPP image build, dynamo build-test
#   parser   -> parser-only runtime build and Dynamo parser parity pytest
#   parser_vllm -> vLLM runtime build and vLLM parser parity pytest
#   parser_sglang -> SGLang runtime build and SGLang parser parity pytest
#   parser_rust -> targeted dynamo-parsers Rust checks
#   benchmarks -> dynamo build-test (runs tests/benchmarks/** pytest suite)
#   docs     -> fern docs lint, sync, and version release (docs/ directory)
#
# Filters for coverage only (no CI triggered):
#   examples, ignore

all:
  - '**'

docs:
  - 'docs/**'
  - 'fern/**'
  - '.ai/**'
  - '.github/workflows/fern-docs.yml'
  - '.github/FILTERS.md'
  - '**/*.md'
  - '**/*.txt'
  - '**/.gitignore'
  - '**/.helmignore'
  - '**/.gitattributes'
  - 'LICENSE'
  - 'CODEOWNERS'
  - '.coveragerc'
  - '.claude/**'
  - '.agents/**'

examples:
  - 'recipes/**'
  - 'examples/**'
  - 'examples/**/.dockerignore'
  - 'examples/**/.gitkeep'
  - '.devcontainer/**'
  - 'deploy/discovery/**'
  - 'deploy/inference-gateway/**'
  - 'dev/observability/**'
  - 'deploy/observability/**'
  - 'deploy/pre-deployment/**'

ignore:
  - '.lycheeignore'
  - '.pre-commit-config.yaml'
  - '.coderabbit.yaml'
  - '.clang-format'
  - 'dynamo.code-workspace'
  - 'deploy/*'
  - 'dev/*'
  - '.github/scripts/**'
  - '.github/ISSUE_TEMPLATE/**'
  - '.github/pull_request_template.md'
  - '.github/labeler.yml'
  - '.github/release.yml'
  - '.github/copy-pr-bot.yaml'
  - '.github/dco.yml'
  - '.github/allurerc.mjs'
  - '**/.claude/**'
  - 'tests/parity/parser/PARITY*.html'
  - 'container/Dockerfile.docs'
  - 'container/run.sh'
  - 'container/use-sccache.sh'
  - 'container/dev/**'
  - 'container/templates/aws.Dockerfile'
  - 'container/templates/local_dev.Dockerfile'
  - 'container/templates/dev.Dockerfile'
  # Removed by trtllm upstream-base migration; claim here so changed-files
  # validation passes on the deletion diff without triggering trtllm CI.
  - 'container/build_trtllm_wheel.sh'
  - 'container/deps/trtllm/**'

ci: &ci
  - '.github/workflows/**'
  - '.github/filters.yaml'
  - '.github/actions/**'
  - '.github/scripts/parse_buildkit_output.py'
  - '.github/scripts/route_buildkit.sh'
  - 'container/Dockerfile.test'

core:
  - *ci
  - 'container/render.py'
  - 'container/Dockerfile.template'
  - 'container/context.yaml'
  - 'container/templates/args.Dockerfile'
  - 'container/templates/dynamo_*'
  - 'container/templates/wheel_builder.Dockerfile'
  - '.dockerignore'
  - 'container/deps/*'
  - 'container/compliance/**'
  - '.cargo/config.toml'
  - 'lib/bindings/python/.cargo/**'
  - 'lib/**'
  - 'tests/**'
  - 'components/src/dynamo/router/**'
  - 'components/src/dynamo/mocker/**'
  - 'components/src/dynamo/frontend/**'
  - 'components/src/dynamo/common/**'
  - 'components/src/dynamo/gpu_memory_service/**'
  # TODO(will): Move TokenSpeed to a dedicated framework filter once CI has
  # TokenSpeed Docker images and backend-specific build/test jobs.
  - 'components/src/dynamo/tokenspeed/**'
  - '*.toml'
  - '*.lock'
  - '*.py'
  - '*.rs'
  - 'scripts/report_pytest_markers.py'
  # Negation patterns MUST come after positive patterns — micromatch processes
  # patterns left-to-right, so negations only filter matches accumulated by
  # preceding patterns. Placing them first has no effect.
  - '!**/*.md'
  - '!**/*.rst'
  - '!**/*.txt'
  - '!lib/parsers/**'
  - '!lib/bindings/python/rust/parsers.rs'
  - '!lib/bindings/python/src/dynamo/_core.pyi'
  - '!lib/bindings/python/tests/test_parsers.py'
  - '!tests/parity/__init__.py'
  - '!tests/parity/common.py'
  - '!tests/parity/generate_parity_table.py'
  - '!tests/parity/parity_table.html.j2'
  - '!tests/parity/parser/**'

operator:
  - *ci
  - 'deploy/operator/**'
  - 'deploy/operator/.*'
  # Operator imports the local snapshot module.
  - 'deploy/snapshot/**'
  - 'docs/kubernetes/api-reference.md'
  - 'deploy/helm/charts/platform/**'
  - 'components/src/dynamo/profiler/utils/dgdr_*'

snapshot:
  - *ci
  - 'deploy/snapshot/**'
  - 'deploy/snapshot/.*'

deploy:
  - *ci
  - 'deploy/helm/**'
  - 'deploy/utils/**'
  - 'deploy/snapshot/**'
  - 'tests/deploy/**'
  - 'tests/utils/managed_deployment.py'
  - '!**/*.md'
  - '!**/*.rst'

planner:
  - 'container/templates/planner.Dockerfile'
  - 'components/src/dynamo/planner/**'
  - 'components/src/dynamo/global_planner/**'
  - 'components/src/dynamo/profiler/**'
  - 'components/src/dynamo/global_router/**'

vllm:
  - 'container/deps/requirements.vllm.txt'
  - 'container/deps/vllm/**'
  - 'examples/backends/vllm/**'
  - 'components/src/dynamo/vllm/**'
  - 'container/templates/vllm_*'
  - '!**/*.md'
  - '!**/*.rst'

sglang:
  - 'examples/backends/sglang/**'
  - 'components/src/dynamo/sglang/**'
  - 'container/templates/sglang_*'
  - '!**/*.md'
  - '!**/*.rst'

trtllm:
  - 'container/deps/requirements.trtllm.txt'
  - 'examples/backends/trtllm/**'
  - 'components/src/dynamo/trtllm/**'
  - 'container/templates/trtllm_*'
  - '!**/*.md'
  - '!**/*.rst'

# sample -> sample-unified-test (framework-agnostic CPU-only backend
# reference implementation). Piggybacks on the vllm image, so a sample-only
# change triggers vllm-build + sample-unified-test. The common/backend ABC
# already triggers `core`; this filter is for the launch scripts and tests
# that are specific to the sample backend.
sample:
  - 'examples/backends/sample/**'
  - '!**/*.md'
  - '!**/*.rst'

frontend:
  - *ci
  - '.cargo/config.toml'
  - 'lib/**'
  - '*.toml'
  - '*.lock'
  - 'container/deps/*'
  - 'container/compliance/**'
  - 'components/src/dynamo/router/**'
  - 'components/src/dynamo/mocker/**'
  - 'components/src/dynamo/frontend/**'
  - 'components/src/dynamo/common/**'
  - 'deploy/inference-gateway/**'
  - 'container/templates/frontend.Dockerfile'
  - '!**/*.md'
  - '!**/*.rst'
  - '!lib/parsers/**'
  - '!lib/bindings/python/rust/parsers.rs'
  - '!lib/bindings/python/src/dynamo/_core.pyi'
  - '!lib/bindings/python/tests/test_parsers.py'
  - '!tests/parity/__init__.py'
  - '!tests/parity/common.py'
  - '!tests/parity/generate_parity_table.py'
  - '!tests/parity/parity_table.html.j2'
  - '!tests/parity/parser/**'

parser:
  - 'lib/parsers/**'
  - '!lib/parsers/**/*.md'
  - '!lib/parsers/**/*.txt'
  - 'lib/bindings/python/rust/parsers.rs'
  - 'lib/bindings/python/src/dynamo/_core.pyi'
  - 'lib/bindings/python/tests/test_parsers.py'
  - 'tests/parity/__init__.py'
  - 'tests/parity/common.py'
  - 'tests/parity/generate_parity_table.py'
  - 'tests/parity/parity_table.html.j2'
  - 'tests/parity/parser/**'
  - '!tests/parity/parser/vllm.py'
  - '!tests/parity/parser/sglang.py'
  - '!tests/parity/parser/PARITY*.html'
  - '!tests/parity/parser/PARITY*.md'

parser_vllm:
  - 'tests/parity/common.py'
  - 'tests/parity/parser/fixtures/**'
  - 'tests/parity/parser/test_parity_parser.py'
  - 'tests/parity/parser/vllm.py'
  - '!tests/parity/parser/PARITY*.html'
  - '!tests/parity/parser/PARITY*.md'

parser_sglang:
  - 'tests/parity/common.py'
  - 'tests/parity/parser/fixtures/**'
  - 'tests/parity/parser/test_parity_parser.py'
  - 'tests/parity/parser/sglang.py'
  - '!tests/parity/parser/PARITY*.html'
  - '!tests/parity/parser/PARITY*.md'

parser_rust:
  - 'lib/parsers/**'
  - '!lib/parsers/**/*.md'
  - '!lib/parsers/**/*.txt'

rust:
  - '.github/workflows/pre-merge.yml'
  - 'lib/bindings/python/.cargo/**'
  - '**/*.rs'
  - '**/Cargo.toml'
  - '**/Cargo.lock'
  - 'deny.toml'
  - '!lib/parsers/**'

benchmarks:
  - 'benchmarks/**'
  - '!**/*.md'
  - '!**/*.rst'
