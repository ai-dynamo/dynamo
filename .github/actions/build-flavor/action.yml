name: 'Build Flavor'
description: 'Build a single Dynamo framework image (checkout → login → tag → builder → dockerfile → build → test image → summary)'
inputs:
  framework:
    description: 'Framework name (e.g. dynamo, vllm, sglang, trtllm)'
    required: true
  builder_flavor:
    description: 'Optional BuildKit routing flavor override (vllm, sglang, trtllm, general)'
    required: false
    default: ''
  target:
    description: 'Target stage for Docker rendering'
    required: true
  platform:
    description: 'Docker platform string (e.g. linux/amd64, linux/amd64,linux/arm64)'
    required: true
  cuda_version:
    description: 'CUDA version to build (e.g., 12.9, 13.0)'
    required: false
    default: ''
  cpu_only:
    description: 'Build and tag this image as CPU-only. The shared container render/build path still requires a default CUDA version internally.'
    required: false
    default: 'false'
  builder_name:
    description: 'Buildkit builder name'
    required: true
  aws_default_region:
    description: 'AWS Default Region'
    required: true
  aws_account_id:
    description: 'AWS Account ID'
    required: true
  azure_acr_hostname:
    description: 'Azure ACR Hostname'
    required: true
  azure_acr_user:
    description: 'Azure ACR Username'
    required: true
  azure_acr_password:
    description: 'Azure ACR Password'
    required: true
  sccache_s3_bucket:
    description: 'SCCache S3 Bucket'
    required: false
    default: ''
  hf_token:
    description: 'HuggingFace token'
    required: false
    default: ''
  build_timeout_minutes:
    description: 'Timeout value for display/logging only — actual timeout must be set via timeout-minutes at the calling job level'
    required: false
    default: '60'
  push_image:
    description: 'Push image to registry'
    required: false
    default: 'false'
  no_load:
    description: 'Do not load the image into docker'
    required: false
    default: 'true'
  no_cache:
    description: 'Disable Docker build cache'
    required: false
    default: 'false'
  make_efa:
    description: 'Enable AWS EFA support in the build'
    required: false
    default: 'false'
  extra_tags:
    description: 'Additional tags (newline-separated)'
    required: false
    default: ''
  show_summary:
    description: 'Show build summary (caller decides when to show)'
    required: false
    default: 'false'
  extra_build_args:
    description: 'Additional Docker build args (newline-separated KEY=VALUE pairs) forwarded to docker-remote-build'
    required: false
    default: ''
  fresh_builder:
    description: 'Always create a fresh K8s BuildKit builder (skip remote worker routing)'
    required: false
    default: 'false'
  builder_requests_cpu:
    description: 'CPU requests for the K8s BuildKit fallback pod (only applies when fresh_builder=true).'
    required: false
    default: ''
  builder_requests_memory:
    description: 'Memory requests for the K8s BuildKit fallback pod (only applies when fresh_builder=true).'
    required: false
    default: ''
  builder_limits_memory:
    description: 'Memory limit for the K8s BuildKit fallback pod (only applies when fresh_builder=true).'
    required: false
    default: ''
  builder_ephemeral_storage:
    description: 'Ephemeral storage request for the K8s BuildKit fallback pod (only applies when fresh_builder=true).'
    required: false
    default: ''
  trtllm_artifact_url:
    description: 'URL to a prebuilt TensorRT-LLM artifact tarball (amd64/x86). When set, the trtllm prebuild step downloads and extracts this tarball instead of compiling the fork from source.'
    required: false
    default: ''
  trtllm_artifact_gh200_url:
    description: 'URL to a prebuilt TensorRT-LLM artifact tarball for GH200 (arm64+Grace).'
    required: false
    default: ''
outputs:
  target_tag_plain:
    description: 'Target tag (without registry prefix)'
    value: ${{ steps.calculate-target-tag.outputs.target_tag_plain }}
  test_tag_plain:
    description: 'Test tag (without registry prefix)'
    value: ${{ steps.calculate-target-tag.outputs.test_tag_plain }}
  cuda_version_plain:
    description: 'CUDA major version (e.g., 12 from 12.9)'
    value: ${{ steps.calculate-target-tag.outputs.cuda_version_plain }}
  image_variant_label:
    description: 'Image variant label used in job names and cache namespaces (e.g. cpu, cuda12)'
    value: ${{ steps.calculate-target-tag.outputs.image_variant_label }}
  image_tag_suffix:
    description: 'Image tag suffix including leading hyphen (e.g. -cpu, -cuda12)'
    value: ${{ steps.calculate-target-tag.outputs.image_tag_suffix }}

runs:
  using: "composite"
  steps:
    - name: Docker Login
      uses: ./.github/actions/docker-login
      with:
        aws_default_region: ${{ inputs.aws_default_region }}
        aws_account_id: ${{ inputs.aws_account_id }}
        azure_acr_hostname: ${{ inputs.azure_acr_hostname }}
        azure_acr_user: ${{ inputs.azure_acr_user }}
        azure_acr_password: ${{ inputs.azure_acr_password }}
    - name: Calculate target tag
      id: calculate-target-tag
      shell: bash
      run: |
        if [[ "${{ inputs.cpu_only }}" == "true" ]]; then
          CUDA_VERSION_RAW="${{ inputs.cuda_version }}"
          if [[ -z "$CUDA_VERSION_RAW" ]]; then
            # Planner still shares the CUDA-backed wheel builder path today even
            # though the final runtime image is CPU-only. Keep that detail
            # internal to the build action instead of surfacing it in job names.
            CUDA_VERSION_RAW="12.9"
          fi
          CUDA_VERSION=${CUDA_VERSION_RAW%%.*}
          IMAGE_VARIANT_LABEL="cpu"
          IMAGE_TAG_SUFFIX="-cpu"
          BUILDER_CUDA_VERSION=""
        else
          CUDA_VERSION_RAW="${{ inputs.cuda_version }}"
          if [[ -z "$CUDA_VERSION_RAW" ]]; then
            echo "cuda_version is required unless cpu_only=true" >&2
            exit 1
          fi
          CUDA_VERSION=${CUDA_VERSION_RAW%%.*}
          IMAGE_VARIANT_LABEL="cuda${CUDA_VERSION}"
          IMAGE_TAG_SUFFIX="-cuda${CUDA_VERSION}"
          BUILDER_CUDA_VERSION="${CUDA_VERSION_RAW}"
        fi
        EFA_SUFFIX=""
        if [ "${{ inputs.make_efa }}" == "true" ]; then
          EFA_SUFFIX="-efa"
        fi
        TARGET_TAG_PLAIN="${{ github.sha }}-${{ inputs.framework }}-${{ inputs.target }}${EFA_SUFFIX}"
        TEST_TAG_PLAIN="${{ github.sha }}-${{ inputs.framework }}-${{ inputs.target }}${EFA_SUFFIX}-test"
        DEFAULT_TARGET_IMAGE_URI="${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_default_region }}.amazonaws.com/ai-dynamo/dynamo:${TARGET_TAG_PLAIN}${IMAGE_TAG_SUFFIX}"
        TEST_IMAGE_URI="${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_default_region }}.amazonaws.com/ai-dynamo/dynamo:${TEST_TAG_PLAIN}${IMAGE_TAG_SUFFIX}"
        echo "default_target_image_uri=${DEFAULT_TARGET_IMAGE_URI}" >> $GITHUB_OUTPUT
        echo "test_image_uri=${TEST_IMAGE_URI}" >> $GITHUB_OUTPUT
        echo "target_tag_plain=${TARGET_TAG_PLAIN}" >> $GITHUB_OUTPUT
        echo "test_tag_plain=${TEST_TAG_PLAIN}" >> $GITHUB_OUTPUT
        echo "cuda_version_plain=${CUDA_VERSION}" >> $GITHUB_OUTPUT
        echo "effective_cuda_version=${CUDA_VERSION_RAW}" >> $GITHUB_OUTPUT
        echo "builder_cuda_version=${BUILDER_CUDA_VERSION}" >> $GITHUB_OUTPUT
        echo "image_variant_label=${IMAGE_VARIANT_LABEL}" >> $GITHUB_OUTPUT
        echo "image_tag_suffix=${IMAGE_TAG_SUFFIX}" >> $GITHUB_OUTPUT
    - name: Initialize Dynamo Builder
      uses: ./.github/actions/init-dynamo-builder
      with:
        builder_name: ${{ inputs.builder_name }}
        flavor: ${{ inputs.builder_flavor != '' && inputs.builder_flavor || inputs.framework }}
        arch: ${{ inputs.platform }}
        cuda_version: ${{ steps.calculate-target-tag.outputs.builder_cuda_version }}
        fresh_builder: ${{ inputs.fresh_builder }}
        requests_cpu: ${{ inputs.builder_requests_cpu != '' && inputs.builder_requests_cpu || '12' }}
        requests_memory: ${{ inputs.builder_requests_memory != '' && inputs.builder_requests_memory || '26Gi' }}
        limits_memory: ${{ inputs.builder_limits_memory != '' && inputs.builder_limits_memory || '29Gi' }}
        ephemeral_storage: ${{ inputs.builder_ephemeral_storage != '' && inputs.builder_ephemeral_storage || '400Gi' }}
    - name: Calculate extra tags
      id: extra-tags
      shell: bash
      env:
        EXTRA_TAGS: ${{ inputs.extra_tags }}
        IMAGE_TAG_SUFFIX: ${{ steps.calculate-target-tag.outputs.image_tag_suffix }}
      run: |
        ECR_REGISTRY="${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_default_region }}.amazonaws.com"
        ACR_REGISTRY="${{ inputs.azure_acr_hostname }}"
        RESULT=""
        if [ -n "$EXTRA_TAGS" ]; then
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              RESULT+="${ECR_REGISTRY}/ai-dynamo/dynamo:${tag}${IMAGE_TAG_SUFFIX}"$'\n'
            fi
          done <<< "$EXTRA_TAGS"
        fi
        if [ -n "$RESULT" ]; then
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        else
          echo "tags=" >> $GITHUB_OUTPUT
        fi
    - name: Print Build Container inputs
      shell: bash
      run: |
        echo "=== Build Container Inputs ==="
        echo "image_tag: ${{ steps.calculate-target-tag.outputs.default_target_image_uri }}"
        echo "framework: ${{ inputs.framework }}"
        echo "target: ${{ inputs.target }}"
        echo "platform: ${{ inputs.platform }}"
        echo "image_variant: ${{ steps.calculate-target-tag.outputs.image_variant_label }}"
        echo "effective_build_cuda_version: ${{ steps.calculate-target-tag.outputs.effective_cuda_version }}"
        echo "no_cache: ${{ inputs.no_cache }}"
        echo "extra_tags: ${{ steps.extra-tags.outputs.tags }}"
        echo "push_image: ${{ inputs.push_image }}"
        echo "no_load: ${{ inputs.no_load }}"
        echo "build_timeout_minutes: ${{ inputs.build_timeout_minutes }}"
    - name: Generate Dockerfile
      shell: bash
      run: |
        echo "Generating Dockerfile for target: ${{ inputs.target }} and framework: ${{ inputs.framework }}"
        MAKE_EFA_FLAG=""
        if [ "${{ inputs.make_efa }}" == "true" ]; then
          MAKE_EFA_FLAG="--make-efa"
        fi
        python ./container/render.py \
            --target=${{ inputs.target }} \
            --framework=${{ inputs.framework }} \
            --platform=${{ inputs.platform }} \
            --cuda-version=${{ steps.calculate-target-tag.outputs.effective_cuda_version }} \
            ${MAKE_EFA_FLAG} \
            --show-result \
            --output-short-filename
    # The TRTLLM framework Dockerfile has a `COPY --from=trtllm_wheel /` that,
    # when container/context.yaml::trtllm.has_trtllm_context is "1", expects
    # the caller to provide a buildx named build context populated with a
    # prebuilt TensorRT-LLM wheel. Build that wheel here using the pinned
    # commit/URL from context.yaml, and then hand the output directory to
    # docker-remote-build as trtllm_wheel_context_path.
    # The TRTLLM framework Dockerfile has a `COPY --from=trtllm_wheel /` that,
    # when container/context.yaml::trtllm.has_trtllm_context is "1", expects
    # the caller to provide a buildx named build context populated with a
    # prebuilt TensorRT-LLM wheel. This step produces that directory.
    #
    # Preferred source: a CI-built artifact tarball from NVIDIA/TensorRT-LLM
    # PR CI (urm.nvidia.com/.../LLM/.../L0_MergeRequest_PR/<PR#>/) passed via
    # the trtllm_artifact_url / trtllm_artifact_gh200_url inputs. This is
    # orders of magnitude faster than compiling the fork from source on a
    # Dynamo BuildKit pod (the from-source path OOMs the default pool at 29Gi
    # when compiling the full cutlass_kernels arch matrix; see
    # container/build_trtllm_wheel.sh).
    #
    # Fallback: compile the fork from source via container/build_trtllm_wheel.sh.
    # Only kicks in when no artifact URL is supplied.
    - name: Prebuild TensorRT-LLM wheel (if required by context)
      id: prebuild-trtllm-wheel
      if: ${{ inputs.framework == 'trtllm' }}
      shell: bash
      env:
        PLATFORM: ${{ inputs.platform }}
        TRTLLM_ARTIFACT_URL: ${{ inputs.trtllm_artifact_url }}
        TRTLLM_ARTIFACT_GH200_URL: ${{ inputs.trtllm_artifact_gh200_url }}
        # Enable BuildKit registry caching for the fork wheel build so the
        # expensive CUDA compile (cutlass kernels etc.) is reused across
        # runs. Only applies to the from-source fallback path.
        TRTLLM_WHEEL_CACHE_REF: ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_default_region }}.amazonaws.com/ai-dynamo/dynamo
      run: |
        set -euo pipefail
        HAS_CONTEXT=$(python3 -c 'import yaml,sys; d=yaml.safe_load(open("container/context.yaml")); print(d.get("trtllm", {}).get("has_trtllm_context", "0"))')
        if [ "${HAS_CONTEXT}" != "1" ]; then
          echo "has_trtllm_context=${HAS_CONTEXT}; skipping TRTLLM wheel prebuild"
          echo "wheel_dir=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Normalize platform -> ARCH.
        case "${PLATFORM}" in
          linux/amd64|amd64) ARCH=amd64 ;;
          linux/arm64|arm64) ARCH=arm64 ;;
          *)
            echo "::error::Cannot prebuild TRTLLM wheel for multi-arch platform '${PLATFORM}'. Dispatch the trtllm pipeline per-arch."
            exit 1
            ;;
        esac

        OUTPUT_DIR="${GITHUB_WORKSPACE}/trtllm_wheel"
        rm -rf "${OUTPUT_DIR}"
        mkdir -p "${OUTPUT_DIR}"

        # Pick the artifact URL appropriate for this arch.
        case "${ARCH}" in
          amd64) ARTIFACT_URL="${TRTLLM_ARTIFACT_URL}" ;;
          arm64) ARTIFACT_URL="${TRTLLM_ARTIFACT_GH200_URL}" ;;
        esac

        if [ -n "${ARTIFACT_URL}" ]; then
          echo "Fetching prebuilt TRTLLM artifact for ${ARCH}: ${ARTIFACT_URL}"
          TARBALL="${RUNNER_TEMP:-/tmp}/trtllm-artifact.tar.gz"
          rm -f "${TARBALL}"
          # Artifactory supports anonymous reads for sw-tensorrt-generic (for
          # public TRTLLM releases). For internal-only artifacts the runner
          # must have been provisioned with a netrc / token ahead of time;
          # curl will pick that up automatically from ~/.netrc.
          AUTH_FLAGS=""
          if [ -n "${URM_NVIDIA_TOKEN:-}" ]; then
            AUTH_FLAGS="--header"
            AUTH_FLAGS+=" Authorization:\ Bearer\ ${URM_NVIDIA_TOKEN}"
          fi
          # shellcheck disable=SC2086
          curl -fsSL --retry 5 --retry-delay 10 --max-time 1200 \
            ${AUTH_FLAGS} \
            -o "${TARBALL}" "${ARTIFACT_URL}"
          echo "Downloaded $(du -h "${TARBALL}" | cut -f1) to ${TARBALL}"

          EXTRACT_DIR="${OUTPUT_DIR}/_extract"
          mkdir -p "${EXTRACT_DIR}"
          tar xzf "${TARBALL}" -C "${EXTRACT_DIR}"
          echo "Tarball contents:"
          find "${EXTRACT_DIR}" -maxdepth 3 -type f | head -30

          # Locate the .whl inside the tarball and copy it both to
          # OUTPUT_DIR/ (top-level glob in trtllm_framework.Dockerfile) and
          # to OUTPUT_DIR/build/ (legacy location matching make-driven output).
          mkdir -p "${OUTPUT_DIR}/build"
          WHEEL_PATH="$(find "${EXTRACT_DIR}" -name 'tensorrt_llm-*.whl' -print -quit)"
          if [ -z "${WHEEL_PATH}" ]; then
            echo "::error::No tensorrt_llm-*.whl found inside ${ARTIFACT_URL}"
            find "${EXTRACT_DIR}" -type f -name '*.whl' | head -10
            exit 1
          fi
          cp -v "${WHEEL_PATH}" "${OUTPUT_DIR}/"
          cp -v "${WHEEL_PATH}" "${OUTPUT_DIR}/build/"
          rm -rf "${EXTRACT_DIR}" "${TARBALL}"

          echo "TRTLLM wheel ready at ${OUTPUT_DIR}:"
          ls -al "${OUTPUT_DIR}"
          echo "wheel_dir=${OUTPUT_DIR}" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "No trtllm_artifact_url provided for ${ARCH}; falling back to from-source build."

        TRTLLM_COMMIT=$(python3 -c 'import yaml; d=yaml.safe_load(open("container/context.yaml")); print(d["trtllm"]["github_trtllm_commit"])')
        if [ -z "${TRTLLM_COMMIT}" ]; then
          echo "::error::github_trtllm_commit missing from container/context.yaml under trtllm"
          exit 1
        fi

        # Allow context.yaml to pin the fork URL explicitly, otherwise fall
        # back to the script's default (galletas1712/TensorRT-LLM).
        TRTLLM_GIT_URL=$(python3 -c 'import yaml; d=yaml.safe_load(open("container/context.yaml")); print(d["trtllm"].get("github_trtllm_git_url", ""))')

        echo "Building TRTLLM wheel from source: commit=${TRTLLM_COMMIT} arch=${ARCH} url=${TRTLLM_GIT_URL:-<default>}"
        URL_FLAG=""
        if [ -n "${TRTLLM_GIT_URL}" ]; then
          URL_FLAG="-u ${TRTLLM_GIT_URL}"
        fi
        bash container/build_trtllm_wheel.sh -c "${TRTLLM_COMMIT}" -a "${ARCH}" -o "${OUTPUT_DIR}" ${URL_FLAG}

        echo "TRTLLM wheel output:"
        ls -al "${OUTPUT_DIR}"
        if ! find "${OUTPUT_DIR}" -maxdepth 2 -name '*.whl' | grep -q .; then
          echo "::error::No .whl produced under ${OUTPUT_DIR}"
          exit 1
        fi
        echo "wheel_dir=${OUTPUT_DIR}" >> "$GITHUB_OUTPUT"
    - name: Build and Push Image
      id: build-image
      uses: ./.github/actions/docker-remote-build
      with:
        image_tag: ${{ steps.calculate-target-tag.outputs.default_target_image_uri }}
        framework: ${{ inputs.framework }}
        target: ${{ inputs.target }}
        platform: ${{ inputs.platform }}
        cuda_version: ${{ steps.calculate-target-tag.outputs.effective_cuda_version }}
        aws_default_region: ${{ inputs.aws_default_region }}
        sccache_s3_bucket: ${{ inputs.sccache_s3_bucket }}
        aws_account_id: ${{ inputs.aws_account_id }}
        no_cache: ${{ inputs.no_cache }}
        extra_tags: ${{ steps.extra-tags.outputs.tags }}
        push_image: ${{ inputs.push_image }}
        no_load: ${{ inputs.no_load }}
        trtllm_wheel_context_path: ${{ steps.prebuild-trtllm-wheel.outputs.wheel_dir }}
        extra_build_args: |
          DYNAMO_COMMIT_SHA=${{ github.sha }}
          ${{ inputs.extra_build_args }}
    - name: Refresh BuildKit builder
      if: ${{ inputs.target != 'dev' }}
      uses: ./.github/actions/builder-refresher
      with:
        builder_name: ${{ inputs.builder_name }}
        flavor: ${{ inputs.builder_flavor != '' && inputs.builder_flavor || inputs.framework }}
        arch: ${{ inputs.platform }}
        cuda_version: ${{ steps.calculate-target-tag.outputs.builder_cuda_version }}
    - name: Build and Push Test Image
      if: ${{ inputs.target != 'dev' }}
      shell: bash
      env:
        ECR_HOSTNAME: ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_default_region }}.amazonaws.com
      run: |
        IMAGE_VARIANT="${{ steps.calculate-target-tag.outputs.image_variant_label }}"
        CACHE_TAG="test-${{ inputs.framework }}-${IMAGE_VARIANT}-cache"
        CACHE_ARGS="--cache-from type=registry,ref=${ECR_HOSTNAME}/ai-dynamo/dynamo:main-${CACHE_TAG}"
        CACHE_ARGS+=" --cache-from type=registry,ref=${ECR_HOSTNAME}/ai-dynamo/dynamo:release-${CACHE_TAG}"
        if [[ "$GITHUB_REF_NAME" == "main" ]]; then
          CACHE_ARGS+=" --cache-to type=registry,ref=${ECR_HOSTNAME}/ai-dynamo/dynamo:main-${CACHE_TAG},mode=max"
        elif [[ "$GITHUB_REF_NAME" =~ ^release ]]; then
          CACHE_ARGS+=" --cache-to type=registry,ref=${ECR_HOSTNAME}/ai-dynamo/dynamo:release-${CACHE_TAG},mode=max"
        fi

        PUSH_ARGS=""
        if [ "${{ inputs.push_image }}" == "true" ]; then
          PUSH_ARGS="--push"
        elif [ "${{ inputs.no_load }}" == "false" ]; then
          PUSH_ARGS="--load"
        fi

        NO_CACHE_ARG=""
        if [ "${{ inputs.no_cache }}" == "true" ]; then
          NO_CACHE_ARG="--no-cache"
        fi

        docker buildx build \
          --progress=plain \
          ${PUSH_ARGS} \
          ${NO_CACHE_ARG} \
          --platform ${{ inputs.platform }} \
          -f container/Dockerfile.test \
          --build-arg BASE_IMAGE=${{ steps.calculate-target-tag.outputs.default_target_image_uri }} \
          ${CACHE_ARGS} \
          -t ${{ steps.calculate-target-tag.outputs.test_image_uri }} .
    - name: Show summary
      shell: bash
      if: ${{ inputs.push_image == 'true' && inputs.show_summary == 'true' }}
      run: |
        echo "### 🐳 ${{ inputs.framework }}-${{ steps.calculate-target-tag.outputs.image_variant_label }} Default Image" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Image URI |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|" >> $GITHUB_STEP_SUMMARY
        echo "| \`${{ steps.calculate-target-tag.outputs.default_target_image_uri }}\` |" >> $GITHUB_STEP_SUMMARY
        EXTRA_TAGS="${{ steps.extra-tags.outputs.tags }}"
        if [ -n "$EXTRA_TAGS" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🏷️ Extra Tags" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image URI |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|" >> $GITHUB_STEP_SUMMARY
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              echo "| \`${tag}\` |" >> $GITHUB_STEP_SUMMARY
            fi
          done <<< "$EXTRA_TAGS"
        fi
