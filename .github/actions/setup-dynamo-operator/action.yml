name: 'Setup Dynamo Operator'
description: 'Create a vCluster, install the Dynamo platform operator inside it via Helm'

inputs:
  kubeconfig_base64:
    description: 'Base64-encoded kubeconfig for host cluster access'
    required: false
    default: ''
  vcluster_name:
    description: 'Name for the vCluster instance (auto-generated from github.run_id if empty)'
    required: false
    default: ''
  vcluster_namespace:
    description: 'Host namespace where the vCluster will be created (auto-generated if empty)'
    required: false
    default: ''
  registry:
    description: 'Container registry hostname (e.g. myregistry.azurecr.io). When empty, the Helm chart default image (nvcr.io/nvidia/ai-dynamo/kubernetes-operator) is used.'
    required: false
    default: ''
  operator_tag:
    description: 'Operator image tag (default: main-operator)'
    required: false
    default: 'main-operator'
  hf_token:
    description: 'HuggingFace token for model access'
    required: false
    default: ''
  dockerhub_username:
    description: 'Docker Hub username for helm registry login'
    required: false
    default: ''
  dockerhub_password:
    description: 'Docker Hub password for helm registry login'
    required: false
    default: ''
  acr_username:
    description: 'Azure Container Registry username. When set alongside acr_password, creates an imagePullSecret inside the vCluster so nodes without managed-identity ACR access can pull the operator image.'
    required: false
    default: ''
  acr_password:
    description: 'Azure Container Registry password.'
    required: false
    default: ''
  vcluster_k8s_version:
    description: 'Kubernetes version for the vCluster control plane (must be supported by kr8s)'
    required: false
    default: 'v1.32.13'
  install_grove:
    description: 'Whether to install the Grove operator via Helm (default: true). Set to false on clusters where Grove is not needed to avoid rollout failures.'
    required: false
    default: 'true'

outputs:
  namespace:
    description: 'Host namespace where the vCluster was created'
    value: ${{ steps.resolve-names.outputs.namespace }}
  vcluster_name:
    description: 'Name of the created vCluster'
    value: ${{ steps.resolve-names.outputs.vcluster_name }}
  operator_tag:
    description: 'Resolved operator tag'
    value: ${{ steps.resolve-names.outputs.operator_tag }}

runs:
  using: "composite"
  steps:
    - name: Resolve names
      id: resolve-names
      shell: bash
      env:
        INPUT_VCLUSTER_NAME: ${{ inputs.vcluster_name }}
      run: |
        if [ -n "${INPUT_VCLUSTER_NAME}" ]; then
          echo "vcluster_name=${INPUT_VCLUSTER_NAME}" >> "$GITHUB_OUTPUT"
        else
          echo "vcluster_name=ci-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
        fi

        echo "namespace=dynamo-deploy-test" >> "$GITHUB_OUTPUT"
        echo "operator_tag=${{ inputs.operator_tag }}" >> "$GITHUB_OUTPUT"

    - name: Setup host kubeconfig
      if: inputs.kubeconfig_base64 != ''
      shell: bash
      run: |
        echo "${{ inputs.kubeconfig_base64 }}" | base64 -d > ${{ github.workspace }}/.kubeconfig-host
        chmod 600 ${{ github.workspace }}/.kubeconfig-host
        echo "KUBECONFIG=${{ github.workspace }}/.kubeconfig-host" >> $GITHUB_ENV

    - name: Install vCluster CLI
      uses: ./.github/actions/install-vcluster-cli

    - name: Create host namespace
      shell: bash
      env:
        NAMESPACE: ${{ steps.resolve-names.outputs.namespace }}
      run: |
        echo "::group::Create host namespace $NAMESPACE"
        set -x
        kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
        kubectl label namespaces ${NAMESPACE} \
          ngc-api=enabled \
          nvcr-imagepull=enabled \
          --overwrite
        echo "::endgroup::"

    - name: Delete any stale vCluster
      shell: bash
      env:
        NAMESPACE: ${{ steps.resolve-names.outputs.namespace }}
      run: |
        echo "::group::Delete stale vClusters in ${NAMESPACE}"
        # vCluster only allows one instance per namespace. If a previous run's
        # cleanup job overlaps with this run's setup, its StatefulSet may still
        # exist when we reach vcluster create, causing a fatal conflict.
        STALE=$(kubectl get statefulsets -n "${NAMESPACE}" \
          --no-headers -o custom-columns=':metadata.name' 2>/dev/null || true)
        for vc in ${STALE}; do
          [ -z "${vc}" ] && continue
          echo "Deleting stale vCluster: ${vc}"
          vcluster delete "${vc}" --namespace "${NAMESPACE}" 2>&1 || \
            kubectl delete statefulset "${vc}" -n "${NAMESPACE}" --ignore-not-found 2>&1 || true
        done
        if [ -n "${STALE}" ]; then
          kubectl wait statefulsets --all -n "${NAMESPACE}" \
            --for=delete --timeout=120s 2>/dev/null || true
        fi
        echo "::endgroup::"

    - name: Create vCluster
      shell: bash
      env:
        VCLUSTER_NAME: ${{ steps.resolve-names.outputs.vcluster_name }}
        NAMESPACE: ${{ steps.resolve-names.outputs.namespace }}
      run: |
        echo "::group::Create vCluster ${VCLUSTER_NAME} in ${NAMESPACE}"
        set -x
        # The K8s version must be supported by the kr8s Python library used in deploy tests.
        # This is independent of the host cluster version.
        vcluster create ${VCLUSTER_NAME} \
          --namespace ${NAMESPACE} \
          --connect=false \
          --upgrade \
          --set controlPlane.distro.k8s.enabled=true \
          --set controlPlane.distro.k8s.version=${{ inputs.vcluster_k8s_version }}
        echo "::endgroup::"

    - name: Wait for vCluster pod to be ready
      shell: bash
      env:
        VCLUSTER_NAME: ${{ steps.resolve-names.outputs.vcluster_name }}
        NAMESPACE: ${{ steps.resolve-names.outputs.namespace }}
      run: |
        echo "::group::Wait for vCluster pod"
        # Give the API server a moment to register the new pod
        sleep 20
        kubectl wait --for=condition=ready pod \
          -l app=vcluster,release=${VCLUSTER_NAME} \
          -n ${NAMESPACE} \
          --timeout=900s
        echo "::endgroup::"

    - name: Connect to vCluster
      id: connect-vcluster
      uses: ./.github/actions/connect-vcluster
      with:
        host_kubeconfig_base64: ${{ inputs.kubeconfig_base64 }}
        vcluster_name: ${{ steps.resolve-names.outputs.vcluster_name }}
        vcluster_namespace: ${{ steps.resolve-names.outputs.namespace }}

    - name: Create HF token secret
      if: inputs.hf_token != ''
      shell: bash
      env:
        HF_TOKEN: ${{ inputs.hf_token }}
      run: |
        echo "::group::Create HF token secret inside vCluster"
        kubectl --kubeconfig=${{ github.workspace }}/.kubeconfig-vcluster \
          create secret generic hf-token-secret \
          --from-literal=HF_TOKEN=${HF_TOKEN} \
          -n default || true
        echo "::endgroup::"

    - name: Create ACR image pull secret in vCluster
      if: inputs.acr_username != '' && inputs.acr_password != '' && inputs.registry != ''
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
        ACR_USER: ${{ inputs.acr_username }}
        ACR_PASS: ${{ inputs.acr_password }}
      run: |
        echo "::group::Create ACR pull secret inside vCluster"
        kubectl --kubeconfig=${{ github.workspace }}/.kubeconfig-vcluster \
          create secret docker-registry acr-pull-secret \
          --docker-server="${REGISTRY}" \
          --docker-username="${ACR_USER}" \
          --docker-password="${ACR_PASS}" \
          -n default --dry-run=client -o yaml | \
          kubectl --kubeconfig=${{ github.workspace }}/.kubeconfig-vcluster apply -f -
        echo "::endgroup::"

    - name: Login to Docker Hub for Helm
      if: inputs.dockerhub_username != '' && inputs.dockerhub_password != ''
      shell: bash
      env:
        DOCKERHUB_USER: ${{ inputs.dockerhub_username }}
        DOCKERHUB_PASS: ${{ inputs.dockerhub_password }}
      run: |
        echo "${DOCKERHUB_PASS}" | helm registry login registry-1.docker.io -u "${DOCKERHUB_USER}" --password-stdin

    - name: Install Dynamo platform via Helm
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
        OPERATOR_TAG: ${{ inputs.operator_tag }}
        ACR_USER: ${{ inputs.acr_username }}
        INSTALL_GROVE: ${{ inputs.install_grove }}
      run: |
        echo "::group::Install Dynamo platform via Helm (inside vCluster)"
        set -x
        helm repo add bitnami https://charts.bitnami.com/bitnami
        cd deploy/helm/charts/platform/
        helm dep build .

        IMAGE_ARGS=""
        if [ -n "${REGISTRY}" ]; then
          OPERATOR_REPO="${REGISTRY}/ai-dynamo/dynamo"
          echo "Using operator image: ${OPERATOR_REPO}:${OPERATOR_TAG}"
          IMAGE_ARGS="--set dynamo-operator.controllerManager.manager.image.repository=${OPERATOR_REPO} --set dynamo-operator.controllerManager.manager.image.tag=${OPERATOR_TAG}"
        else
          echo "Using default operator image from Helm chart (nvcr.io/nvidia/ai-dynamo/kubernetes-operator)"
        fi

        PULL_SECRET_ARGS=""
        if [ -n "${ACR_USER}" ]; then
          PULL_SECRET_ARGS="--set dynamo-operator.imagePullSecrets[0].name=acr-pull-secret"
        fi

        KUBECONFIG=${{ github.workspace }}/.kubeconfig-vcluster \
        helm upgrade --install dynamo-platform . --namespace default \
          ${IMAGE_ARGS} \
          ${PULL_SECRET_ARGS} \
          --set dynamo-operator.gpuDiscovery.enabled=false \
          --set global.grove.install=${INSTALL_GROVE} \
          --set global.kai-scheduler.install=false \
          --set 'nats.container.merge.resources.requests.cpu=100m' \
          --set 'nats.container.merge.resources.requests.memory=128Mi' \
          --set 'nats.container.merge.resources.limits.cpu=500m' \
          --set 'nats.container.merge.resources.limits.memory=512Mi' \
          --set 'nats.reloader.merge.resources.requests.cpu=10m' \
          --set 'nats.reloader.merge.resources.requests.memory=32Mi' \
          --set 'nats.reloader.merge.resources.limits.cpu=100m' \
          --set 'nats.reloader.merge.resources.limits.memory=64Mi' \
          --debug
        echo "::endgroup::"

    - name: Wait for operator CRDs to be established
      shell: bash
      run: |
        echo "::group::Wait for Dynamo operator CRDs inside vCluster"
        # CRDs live in the chart's crds/ directory so Helm installs them before any pod
        # starts. Waiting for Established is independent of vCluster syncer pod-Ready
        # latency, which is unreliable on some clusters (e.g. AWS with LimitRange QoS mismatch).
        kubectl --kubeconfig=${{ github.workspace }}/.kubeconfig-vcluster \
          wait --for=condition=established \
          crd/dynamographdeployments.nvidia.com \
          --timeout=1800s
        echo "::endgroup::"

    - name: Wait for operator pod to be ready
      shell: bash
      env:
        NAMESPACE: ${{ steps.resolve-names.outputs.namespace }}
      run: |
        echo "::group::Wait for operator pod Ready (host namespace)"
        # Phase 1: poll the host namespace. The vCluster syncer on AWS stalls pod-Ready
        # propagation due to a NATS qosClass reconciliation loop, so kubectl wait against
        # the virtual cluster never returns. The host pod status is always accurate.
        end=$((SECONDS + 1800))
        while true; do
          STATUS=$(kubectl get pods -n "${NAMESPACE}" --no-headers 2>/dev/null \
            | grep 'dynamo-platform-dynamo-operator-controller-manager' \
            | awk '{print $2}' | head -1)
          if [ "${STATUS}" = "1/1" ]; then
            echo "Operator pod Ready in host namespace"
            break
          fi
          if [ $SECONDS -ge $end ]; then
            echo "::error::Operator pod not Ready after 1800s (last status: ${STATUS:-not found})"
            exit 1
          fi
          echo "Waiting for operator pod... status=${STATUS:-not found}"
          sleep 15
        done

        # Phase 2: wait for the webhook service endpoint to have ready addresses inside
        # the virtual cluster. Even after the host pod is 1/1, the vCluster syncer needs
        # a moment to sync pod status → virtual endpoint → kube-proxy routing. Without
        # this check the test POST hits the webhook before the ClusterIP is routable.
        VKUBECONFIG=${{ github.workspace }}/.kubeconfig-vcluster
        end=$((SECONDS + 300))
        while true; do
          READY=$(kubectl --kubeconfig="${VKUBECONFIG}" \
            get endpoints dynamo-platform-dynamo-operator-webhook-service -n default \
            -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null || true)
          if [ -n "${READY}" ]; then
            echo "Webhook endpoint ready: ${READY}"
            break
          fi
          if [ $SECONDS -ge $end ]; then
            echo "::error::Webhook endpoint not ready after 300s — syncer may still be stalled"
            kubectl --kubeconfig="${VKUBECONFIG}" \
              get endpoints dynamo-platform-dynamo-operator-webhook-service -n default 2>&1 || true
            exit 1
          fi
          echo "Waiting for webhook endpoint..."
          sleep 5
        done
        echo "::endgroup::"

    - name: Debug deployment failure
      if: failure()
      shell: bash
      env:
        NAMESPACE: ${{ steps.resolve-names.outputs.namespace }}
      run: |
        set +eo pipefail
        VKUBECONFIG=${{ github.workspace }}/.kubeconfig-vcluster

        echo "### VCLUSTER OPERATOR DEPLOYMENT FAILED" | tee -a $GITHUB_STEP_SUMMARY

        echo "::group::Pod status (host namespace)"
        kubectl get pods -n ${NAMESPACE} -o wide 2>&1 || true
        echo "::endgroup::"

        echo "::group::Events (host namespace)"
        kubectl get events -n ${NAMESPACE} --sort-by='.lastTimestamp' 2>&1 || true
        echo "::endgroup::"

        echo "::group::Describe pods (host namespace)"
        kubectl describe pods -n ${NAMESPACE} 2>&1 || true
        echo "::endgroup::"

        if [ ! -f "${VKUBECONFIG}" ]; then
          echo "::warning::vCluster kubeconfig not found — vCluster never connected successfully"
          echo "- **vCluster kubeconfig missing** — connect-vcluster step failed before writing .kubeconfig-vcluster" >> $GITHUB_STEP_SUMMARY
          exit 0
        fi

        echo "::group::Pod status (vCluster)"
        kubectl --kubeconfig=${VKUBECONFIG} get pods -A -o wide 2>&1 || true
        echo "::endgroup::"

        NOT_READY=$(kubectl --kubeconfig=${VKUBECONFIG} get pods -n default --no-headers 2>/dev/null \
          | awk -F'[/ ]+' '$2 != $3 || ($4 != "Running" && $4 != "Completed")')
        if [ -n "$NOT_READY" ]; then
          echo "$NOT_READY" | awk '{print "- **" $1 "** | Ready: `" $2 "` | Status: `" $3 "`"}' >> $GITHUB_STEP_SUMMARY
          echo "$NOT_READY" | awk '{print $1}' | while read POD; do
            echo "::group::describe pod/$POD"
            kubectl --kubeconfig=${VKUBECONFIG} describe pod "$POD" -n default 2>&1
            echo "::endgroup::"
            echo "::group::logs pod/$POD"
            kubectl --kubeconfig=${VKUBECONFIG} logs "$POD" -n default --all-containers --tail=80 2>&1
            echo "::endgroup::"
          done
        fi

        echo "::group::Events (vCluster default namespace)"
        kubectl --kubeconfig=${VKUBECONFIG} get events -n default --sort-by='.lastTimestamp' 2>&1
        echo "::endgroup::"
