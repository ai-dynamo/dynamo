name: 'Build Deploy Component'
description: 'Build and push a deploy component container (operator or snapshot)'

inputs:
  component:
    description: 'Component to build: operator or snapshot'
    required: true
  image_tag:
    description: 'Image tag to apply to built images'
    required: true
  target:
    description: 'Dockerfile target to build. Defaults to agent for snapshot and the default target for operator.'
    required: false
    default: ''
  builder_name:
    description: 'Buildx builder name'
    required: true
  aws_default_region:
    description: 'AWS Default Region'
    required: true
  aws_account_id:
    description: 'AWS Account ID'
    required: true
  azure_acr_hostname:
    description: 'Optional Azure ACR hostname for docker login'
    required: false
    default: ''
  azure_acr_user:
    description: 'Optional Azure ACR username for docker login'
    required: false
    default: ''
  azure_acr_password:
    description: 'Optional Azure ACR password for docker login'
    required: false
    default: ''
  ngc_ci_access_token:
    description: 'Optional NGC CI access token for nvcr.io login'
    required: false
    default: ''
  extra_tags:
    description: 'Optional newline-separated list of fully-qualified extra image URIs to also tag and push'
    required: false
    default: ''
  archive_sources:
    description: |
      When 'true', build with ENABLE_SOURCE_ARCHIVAL=true and extract
      /sources/ as a workflow artifact. Off by default — top-level
      callers opt-in (post-merge-ci.yml sets true for push to main /
      release branches).
    required: false
    default: 'false'
  extra_build_args:
    description: 'Optional newline-separated KEY=VALUE build args'
    required: false
    default: ''

outputs:
  image_tag:
    description: 'The image tag applied to built images'
    value: ${{ inputs.image_tag }}

runs:
  using: composite
  steps:
    - name: Determine build settings
      id: settings
      shell: bash
      run: |
        if [[ "${{ inputs.component }}" == "operator" ]]; then
          echo "build_platforms=linux/amd64,linux/arm64" >> $GITHUB_OUTPUT
        else
          echo "build_platforms=linux/amd64" >> $GITHUB_OUTPUT
        fi

    - name: Initialize Dynamo Builder
      uses: ./.github/actions/init-dynamo-builder
      with:
        builder_name: ${{ inputs.builder_name }}
        flavor: general
        arch: ${{ steps.settings.outputs.build_platforms }}

    - name: Docker Login
      uses: ./.github/actions/docker-login
      with:
        aws_default_region: ${{ inputs.aws_default_region }}
        aws_account_id: ${{ inputs.aws_account_id }}
        azure_acr_hostname: ${{ inputs.azure_acr_hostname }}
        azure_acr_user: ${{ inputs.azure_acr_user }}
        azure_acr_password: ${{ inputs.azure_acr_password }}
        ngc_ci_access_token: ${{ inputs.ngc_ci_access_token }}

    - name: Build and push Container
      shell: bash
      working-directory: ./deploy/${{ inputs.component }}
      env:
        ECR_HOSTNAME: ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_default_region }}.amazonaws.com
        IMAGE_REGISTRY: ai-dynamo
        IMAGE_REPOSITORY: dynamo
      run: |
        ECR_DEFAULT_IMAGE_BASE="${ECR_HOSTNAME}/${IMAGE_REGISTRY}/${IMAGE_REPOSITORY}"
        IMAGE_URIS=("${ECR_DEFAULT_IMAGE_BASE}:${{ inputs.image_tag }}")

        # Append optional full extra image URIs provided by caller.
        while IFS= read -r extra_image; do
          if [[ -n "$extra_image" ]]; then
            IMAGE_URIS+=("$extra_image")
          fi
        done <<< "${{ inputs.extra_tags }}"

        TAGGING_FLAGS=$(printf -- '-t %s ' "${IMAGE_URIS[@]}")
        echo "flags for docker buildx: ${TAGGING_FLAGS}"

        TARGET="${{ inputs.target }}"
        if [[ -z "${TARGET}" && "${{ inputs.component }}" == "snapshot" ]]; then
          TARGET="agent"
        fi

        TARGET_FLAG=""
        if [[ -n "${TARGET}" ]]; then
          TARGET_FLAG="--target ${TARGET}"
        fi

        # Baseline SBOM *stem* used by each component's licenses stage to
        # subtract upstream-owned components from generated NOTICES. The stage
        # appends -${TARGETARCH}.cdx.json so each arch subtracts its own floor
        # (mirrors container/context.yaml's per-template baseline_sbom stems).
        BASELINE_SBOM_FILE=""
        if [[ "${{ inputs.component }}" == "operator" ]]; then
          BASELINE_SBOM_FILE="go@e86c88d0"
        elif [[ "${{ inputs.component }}" == "snapshot" ]]; then
          BASELINE_SBOM_FILE="cuda-dl-base@8315e245"
        fi

        # Source archival is opt-in per top-level caller (see the
        # `archive_sources` input above). Default off; post-merge-ci.yml
        # flips it on for push to main + release/*.*.* branches.
        ENABLE_SOURCE_ARCHIVAL="${{ inputs.archive_sources }}"

        BUILD_ARGS=("--build-arg" "DOCKER_PROXY=${ECR_HOSTNAME}/dockerhub/")
        BUILD_ARGS+=("--build-arg" "BASELINE_SBOM_FILE=${BASELINE_SBOM_FILE}")
        BUILD_ARGS+=("--build-arg" "ENABLE_SOURCE_ARCHIVAL=${ENABLE_SOURCE_ARCHIVAL}")
        while IFS= read -r build_arg; do
          if [[ -n "${build_arg}" ]]; then
            BUILD_ARGS+=("--build-arg" "${build_arg}")
          fi
        done <<< "${{ inputs.extra_build_args }}"

        docker buildx build --push \
            --platform ${{ steps.settings.outputs.build_platforms }} \
            "${BUILD_ARGS[@]}" \
            --build-context snapshot=../snapshot \
            --build-context compliance=../../container/compliance \
            ${TARGET_FLAG} \
            ${TAGGING_FLAGS} -f Dockerfile .

        DISPLAY_NAME="${{ inputs.component }}"
        echo "### 🐳 ${DISPLAY_NAME^} Container Images" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Image URI |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|" >> $GITHUB_STEP_SUMMARY
        for image_uri in "${IMAGE_URIS[@]}"; do
          echo "| \`${image_uri}\` |" >> $GITHUB_STEP_SUMMARY
        done

    # Inline-compliance extraction: reuses the warm BuildKit cache from the
    # push step above. Both targets are FROM scratch so the export is a few
    # MB regardless of runtime image size.
    - name: Compliance extract + verify
      if: ${{ inputs.component == 'operator' || inputs.component == 'snapshot' }}
      shell: bash
      working-directory: ./deploy/${{ inputs.component }}
      env:
        ECR_HOSTNAME: ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_default_region }}.amazonaws.com
      run: |
        mkdir -p /tmp/legal /tmp/sboms
        # Baseline SBOM resolution: mirror the build-and-push step so the
        # extracted NOTICES reflect subtraction the same way the pushed
        # image does. Keep these two if-blocks in sync.
        BASELINE_SBOM_FILE=""
        if [[ "${{ inputs.component }}" == "operator" ]]; then
          BASELINE_SBOM_FILE="go@e86c88d0.cdx.json"
        elif [[ "${{ inputs.component }}" == "snapshot" ]]; then
          BASELINE_SBOM_FILE="cuda-dl-base@8315e245.cdx.json"
        fi
        # Extraction runs on a single platform (lint platform) — both /legal
        # and /sboms are platform-invariant for a Go-only build.
        docker buildx build \
            --platform ${{ steps.settings.outputs.lint_platform }} \
            --build-arg DOCKER_PROXY=${ECR_HOSTNAME}/dockerhub/ \
            --build-arg BASELINE_SBOM_FILE="${BASELINE_SBOM_FILE}" \
            --build-context snapshot=../snapshot \
            --build-context compliance=../../container/compliance \
            --target legal \
            --output type=local,dest=/tmp/legal \
            --progress=plain \
            -f Dockerfile .
        docker buildx build \
            --platform ${{ steps.settings.outputs.lint_platform }} \
            --build-arg DOCKER_PROXY=${ECR_HOSTNAME}/dockerhub/ \
            --build-arg BASELINE_SBOM_FILE="${BASELINE_SBOM_FILE}" \
            --build-context snapshot=../snapshot \
            --build-context compliance=../../container/compliance \
            --target sboms \
            --output type=local,dest=/tmp/sboms \
            --progress=plain \
            -f Dockerfile .

    # /sources/ extraction: opt-in via archive_sources input. PR / on-demand
    # / nightly leave it false; post-merge-ci.yml sets it true for push to
    # main + release/*.*.* so RC promotions inherit the archive.
    - name: Extract /sources/ (opt-in via archive_sources)
      if: ${{ (inputs.component == 'operator' || inputs.component == 'snapshot') && inputs.archive_sources == 'true' }}
      shell: bash
      working-directory: ./deploy/${{ inputs.component }}
      env:
        ECR_HOSTNAME: ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_default_region }}.amazonaws.com
      run: |
        mkdir -p /tmp/sources
        BASELINE_SBOM_FILE=""
        if [[ "${{ inputs.component }}" == "operator" ]]; then
          BASELINE_SBOM_FILE="go@e86c88d0.cdx.json"
        elif [[ "${{ inputs.component }}" == "snapshot" ]]; then
          BASELINE_SBOM_FILE="cuda-dl-base@8315e245.cdx.json"
        fi
        docker buildx build \
            --platform ${{ steps.settings.outputs.lint_platform }} \
            --build-arg DOCKER_PROXY=${ECR_HOSTNAME}/dockerhub/ \
            --build-arg BASELINE_SBOM_FILE="${BASELINE_SBOM_FILE}" \
            --build-arg ENABLE_SOURCE_ARCHIVAL=true \
            --build-context snapshot=../snapshot \
            --build-context compliance=../../container/compliance \
            --target sources_archive \
            --output type=local,dest=/tmp/sources \
            --progress=plain \
            -f Dockerfile .

    - name: Upload /legal/ NOTICES artifact
      if: ${{ (inputs.component == 'operator' || inputs.component == 'snapshot') && always() }}
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        name: compliance-${{ inputs.component }}-${{ inputs.image_tag }}-legal
        path: /tmp/legal/
        retention-days: 90

    - name: Upload /sboms/ artifact
      if: ${{ (inputs.component == 'operator' || inputs.component == 'snapshot') && always() }}
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        name: compliance-${{ inputs.component }}-${{ inputs.image_tag }}-sboms
        path: /tmp/sboms/
        retention-days: 90

    - name: Upload /sources/ tarball (post-merge / RC / release only)
      if: ${{ (inputs.component == 'operator' || inputs.component == 'snapshot') && (github.event_name == 'push' || github.event_name == 'release' || github.event_name == 'workflow_dispatch') && always() }}
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        name: compliance-${{ inputs.component }}-${{ inputs.image_tag }}-sources
        path: /tmp/sources/sources.zip
        retention-days: 365   # OSRB submissions retain longer than NOTICES/SBOMs
