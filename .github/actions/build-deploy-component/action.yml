name: 'Build Deploy Component'
description: 'Build and push a deploy component container (operator, snapshot, or power-agent)'

inputs:
  component:
    description: 'Component to build: operator, snapshot, or power-agent'
    required: true
  image_tag:
    description: 'Image tag to apply to built images'
    required: true
  target:
    description: 'Dockerfile target to build. Defaults to agent for snapshot and the default target for operator.'
    required: false
    default: ''
  builder_name:
    description: 'Buildx builder name'
    required: true
  aws_default_region:
    description: 'AWS Default Region'
    required: true
  aws_account_id:
    description: 'AWS Account ID'
    required: true
  azure_acr_hostname:
    description: 'Optional Azure ACR hostname for docker login'
    required: false
    default: ''
  azure_acr_user:
    description: 'Optional Azure ACR username for docker login'
    required: false
    default: ''
  azure_acr_password:
    description: 'Optional Azure ACR password for docker login'
    required: false
    default: ''
  ngc_ci_access_token:
    description: 'Optional NGC CI access token for nvcr.io login'
    required: false
    default: ''
  extra_tags:
    description: 'Optional newline-separated list of fully-qualified extra image URIs to also tag and push'
    required: false
    default: ''
  extra_build_args:
    description: 'Optional newline-separated KEY=VALUE build args'
    required: false
    default: ''
  archive_sources:
    description: |
      When 'true', build with ENABLE_SOURCE_ARCHIVAL=true and extract /sources/
      as a workflow artifact. Off by default — top-level callers opt in
      (post-merge-ci.yml sets true for push to main / release branches).
      Applies to the inline-compliance components (operator, snapshot); no
      effect for power-agent.
    required: false
    default: 'false'

outputs:
  image_tag:
    description: 'The image tag applied to built images'
    value: ${{ inputs.image_tag }}

runs:
  using: composite
  steps:
    - name: Determine build settings
      id: settings
      shell: bash
      run: |
        if [[ "${{ inputs.component }}" == "operator" ]]; then
          echo "build_platforms=linux/amd64,linux/arm64" >> $GITHUB_OUTPUT
        else
          echo "build_platforms=linux/amd64" >> $GITHUB_OUTPUT
        fi
        # Compliance /legal + /sboms are captured on a single platform: the
        # operator's Go-only build is arch-invariant, and snapshot ships amd64
        # only (cuda-checkpoint has no arm64 binary). Both baselines have an
        # -amd64 variant.
        echo "compliance_platform=linux/amd64" >> $GITHUB_OUTPUT
        # Per-component inline-compliance baseline *stem* + whether to run the
        # inline license/SBOM stages. The licenses stage appends
        # -${TARGETARCH}.cdx.json to subtract each arch's own floor.
        #
        # run_compliance gates the extract/upload steps: it is true only for the
        # shipped, /legal-bearing stage. The snapshot `placeholder` target is a
        # restore image built FROM an arbitrary framework runtime (not
        # cuda-dl-base) and carries no /legal, so it must NOT run compliance —
        # only the default `agent` build does. power-agent has no baseline at all.
        EFFECTIVE_TARGET="${{ inputs.target }}"
        if [[ -z "${EFFECTIVE_TARGET}" && "${{ inputs.component }}" == "snapshot" ]]; then
          EFFECTIVE_TARGET="agent"
        fi
        BASELINE_STEM=""
        RUN_COMPLIANCE=""
        case "${{ inputs.component }}" in
          operator)
            BASELINE_STEM="go@e86c88d0"
            [[ -z "${{ inputs.target }}" ]] && RUN_COMPLIANCE="true" ;;
          snapshot)
            BASELINE_STEM="cuda-dl-base@8315e245"
            [[ "${EFFECTIVE_TARGET}" == "agent" ]] && RUN_COMPLIANCE="true" ;;
        esac
        echo "baseline_stem=${BASELINE_STEM}" >> $GITHUB_OUTPUT
        echo "run_compliance=${RUN_COMPLIANCE}" >> $GITHUB_OUTPUT

    - name: Initialize Dynamo Builder
      uses: ./.github/actions/init-dynamo-builder
      with:
        builder_name: ${{ inputs.builder_name }}
        flavor: general
        arch: ${{ steps.settings.outputs.build_platforms }}

    - name: Docker Login
      uses: ./.github/actions/docker-login
      with:
        aws_default_region: ${{ inputs.aws_default_region }}
        aws_account_id: ${{ inputs.aws_account_id }}
        azure_acr_hostname: ${{ inputs.azure_acr_hostname }}
        azure_acr_user: ${{ inputs.azure_acr_user }}
        azure_acr_password: ${{ inputs.azure_acr_password }}
        ngc_ci_access_token: ${{ inputs.ngc_ci_access_token }}

    - name: Build and push Container
      shell: bash
      working-directory: ./deploy/${{ inputs.component }}
      env:
        ECR_HOSTNAME: ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_default_region }}.amazonaws.com
        IMAGE_REGISTRY: ai-dynamo
        IMAGE_REPOSITORY: dynamo
      run: |
        ECR_DEFAULT_IMAGE_BASE="${ECR_HOSTNAME}/${IMAGE_REGISTRY}/${IMAGE_REPOSITORY}"
        IMAGE_URIS=("${ECR_DEFAULT_IMAGE_BASE}:${{ inputs.image_tag }}")

        # Append optional full extra image URIs provided by caller.
        while IFS= read -r extra_image; do
          if [[ -n "$extra_image" ]]; then
            IMAGE_URIS+=("$extra_image")
          fi
        done <<< "${{ inputs.extra_tags }}"

        TAGGING_FLAGS=$(printf -- '-t %s ' "${IMAGE_URIS[@]}")
        echo "flags for docker buildx: ${TAGGING_FLAGS}"

        TARGET="${{ inputs.target }}"
        if [[ -z "${TARGET}" && "${{ inputs.component }}" == "snapshot" ]]; then
          TARGET="agent"
        fi

        TARGET_FLAG=""
        if [[ -n "${TARGET}" ]]; then
          TARGET_FLAG="--target ${TARGET}"
        fi

        BUILD_ARGS=("--build-arg" "DOCKER_PROXY=${ECR_HOSTNAME}/dockerhub/")
        # Inline-compliance build args (operator + snapshot). BASELINE_SBOM_FILE
        # is the per-arch baseline *stem*; the licenses stage appends
        # -${TARGETARCH}.cdx.json to subtract each arch's own floor (mirrors
        # container/context.yaml). Empty stem (power-agent) → no compliance.
        if [[ "${{ steps.settings.outputs.run_compliance }}" == "true" ]]; then
          BUILD_ARGS+=("--build-arg" "BASELINE_SBOM_FILE=${{ steps.settings.outputs.baseline_stem }}")
          BUILD_ARGS+=("--build-arg" "ENABLE_SOURCE_ARCHIVAL=${{ inputs.archive_sources }}")
        fi
        while IFS= read -r build_arg; do
          if [[ -n "${build_arg}" ]]; then
            BUILD_ARGS+=("--build-arg" "${build_arg}")
          fi
        done <<< "${{ inputs.extra_build_args }}"

        # operator and snapshot both consume the named `snapshot` build context
        # (deploy/operator/Dockerfile COPYs --from=snapshot; the snapshot image
        # IS that tree). power-agent is self-contained, so omit it there.
        # operator + snapshot additionally consume the `compliance` context for
        # their inline license/SBOM stages (COPY --from=compliance).
        BUILD_CONTEXT_FLAG=""
        if [[ "${{ inputs.component }}" != "power-agent" ]]; then
          BUILD_CONTEXT_FLAG="--build-context snapshot=../snapshot"
        fi
        if [[ "${{ steps.settings.outputs.run_compliance }}" == "true" ]]; then
          BUILD_CONTEXT_FLAG="${BUILD_CONTEXT_FLAG} --build-context compliance=../../container/compliance"
        fi

        docker buildx build --push \
            --platform ${{ steps.settings.outputs.build_platforms }} \
            "${BUILD_ARGS[@]}" \
            ${BUILD_CONTEXT_FLAG} \
            ${TARGET_FLAG} \
            ${TAGGING_FLAGS} -f Dockerfile .

        DISPLAY_NAME="${{ inputs.component }}"
        echo "### 🐳 ${DISPLAY_NAME^} Container Images" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Image URI |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|" >> $GITHUB_STEP_SUMMARY
        for image_uri in "${IMAGE_URIS[@]}"; do
          echo "| \`${image_uri}\` |" >> $GITHUB_STEP_SUMMARY
        done

    # Inline-compliance extraction (operator + snapshot). Reuses the warm BuildKit
    # cache from the push step above; compliance_artifact is FROM scratch so the
    # export is a few MB regardless of runtime image size.
    - name: Compliance extract
      if: ${{ steps.settings.outputs.run_compliance == 'true' }}
      shell: bash
      working-directory: ./deploy/${{ inputs.component }}
      env:
        ECR_HOSTNAME: ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_default_region }}.amazonaws.com
      run: |
        mkdir -p /tmp/compliance
        # Single FROM-scratch compliance_artifact stage → the unified /legal tree
        # (flat NOTICES-<Eco>.txt + osrb-deps.csv + osrb.cdx.json). Runs on one
        # platform, so buildx exports directly into dest. Keep BASELINE_SBOM_FILE
        # in sync with the build-and-push step above.
        BUILD_ARGS=("--build-arg" "DOCKER_PROXY=${ECR_HOSTNAME}/dockerhub/")
        BUILD_ARGS+=("--build-arg" "BASELINE_SBOM_FILE=${{ steps.settings.outputs.baseline_stem }}")
        while IFS= read -r build_arg; do
          if [[ -n "${build_arg}" ]]; then
            BUILD_ARGS+=("--build-arg" "${build_arg}")
          fi
        done <<< "${{ inputs.extra_build_args }}"
        docker buildx build \
            --platform ${{ steps.settings.outputs.compliance_platform }} \
            "${BUILD_ARGS[@]}" \
            --build-context snapshot=../snapshot \
            --build-context compliance=../../container/compliance \
            --target compliance_artifact \
            --output type=local,dest=/tmp/compliance \
            --progress=plain \
            -f Dockerfile .
        # Name the OSRB files: osrb-<component>-<arch>-<sha8>.{csv,cdx.json}.
        SHA8=$(echo "${{ github.sha }}" | cut -c1-8); [ -z "${SHA8}" ] && SHA8="nosha"
        ARCH=$(echo "${{ steps.settings.outputs.compliance_platform }}" | sed 's|.*linux/||')
        for f in /tmp/compliance/osrb-deps.csv /tmp/compliance/osrb.cdx.json; do
          if [ ! -s "${f}" ]; then echo "::error::Missing/empty compliance output: ${f}"; exit 1; fi
        done
        mv /tmp/compliance/osrb-deps.csv "/tmp/compliance/osrb-${{ inputs.component }}-${ARCH}-${SHA8}.csv"
        mv /tmp/compliance/osrb.cdx.json "/tmp/compliance/osrb-${{ inputs.component }}-${ARCH}-${SHA8}.cdx.json"

    # /sources/ extraction: opt-in via archive_sources. PR / on-demand leave it
    # false; post-merge-ci.yml sets it true for push to main + release branches.
    - name: Extract /sources/ (opt-in via archive_sources)
      if: ${{ steps.settings.outputs.run_compliance == 'true' && inputs.archive_sources == 'true' }}
      shell: bash
      working-directory: ./deploy/${{ inputs.component }}
      env:
        ECR_HOSTNAME: ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_default_region }}.amazonaws.com
      run: |
        mkdir -p /tmp/sources
        BUILD_ARGS=("--build-arg" "DOCKER_PROXY=${ECR_HOSTNAME}/dockerhub/")
        BUILD_ARGS+=("--build-arg" "BASELINE_SBOM_FILE=${{ steps.settings.outputs.baseline_stem }}")
        BUILD_ARGS+=("--build-arg" "ENABLE_SOURCE_ARCHIVAL=true")
        while IFS= read -r build_arg; do
          if [[ -n "${build_arg}" ]]; then
            BUILD_ARGS+=("--build-arg" "${build_arg}")
          fi
        done <<< "${{ inputs.extra_build_args }}"
        docker buildx build \
            --platform ${{ steps.settings.outputs.compliance_platform }} \
            "${BUILD_ARGS[@]}" \
            --build-context snapshot=../snapshot \
            --build-context compliance=../../container/compliance \
            --target sources_archive \
            --output type=local,dest=/tmp/sources \
            --progress=plain \
            -f Dockerfile .

    - name: Upload compliance artifact (NOTICES + CSV + CycloneDX)
      if: ${{ steps.settings.outputs.run_compliance == 'true' && always() }}
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        # compliance-<git-sha>-<component> (image_tag is already <github.sha>-<component>),
        # matching the framework images' compliance-<git-sha>-<container> naming.
        name: compliance-${{ inputs.image_tag }}
        path: /tmp/compliance/
        retention-days: 90

    - name: Upload /sources/ archive (opt-in via archive_sources)
      if: ${{ steps.settings.outputs.run_compliance == 'true' && inputs.archive_sources == 'true' }}
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        name: compliance-${{ inputs.image_tag }}-sources
        path: /tmp/sources/
        retention-days: 90
