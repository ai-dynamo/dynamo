name: 'Docker Login'
description: 'Login to multiple container registries (ECR, NGC, ACR)'

inputs:
  ngc_ci_access_token:
    description: 'NGC CI Access Token'
    required: false
  aws_default_region:
    description: 'AWS Default Region'
    required: false
  aws_account_id:
    description: 'AWS Account ID'
    required: false
  azure_acr_hostname:
    description: 'Azure ACR hostname'
    required: false
  azure_acr_user:
    description: 'Azure ACR user'
    required: false
  azure_acr_password:
    description: 'Azure ACR password'
    required: false

runs:
  using: "composite"
  steps:
    - name: ECR Login
      shell: bash
      if: ${{ inputs.aws_default_region != '' && inputs.aws_account_id != '' }}
      env:
        AWS_REGION: ${{ inputs.aws_default_region }}
        ECR_HOSTNAME: ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_default_region }}.amazonaws.com
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../../scripts/retry.sh"
        retry bash -c 'aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${ECR_HOSTNAME}"'
    - name: NGC Login
      shell: bash
      if: ${{ inputs.ngc_ci_access_token != '' }}
      env:
        NGC_TOKEN: ${{ inputs.ngc_ci_access_token }}
        NGC_USER: $oauthtoken
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../../scripts/retry.sh"
        retry bash -c 'echo "${NGC_TOKEN}" | docker login --username "${NGC_USER}" --password-stdin nvcr.io'
    - name: ACR Login
      shell: bash
      if: ${{ inputs.azure_acr_hostname != '' && inputs.azure_acr_user != '' && inputs.azure_acr_password != '' }}
      env:
        ACR_HOSTNAME: ${{ inputs.azure_acr_hostname }}
        ACR_USER: ${{ inputs.azure_acr_user }}
        ACR_PASSWORD: ${{ inputs.azure_acr_password }}
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../../scripts/retry.sh"
        retry bash -c 'echo "${ACR_PASSWORD}" | docker login --username "${ACR_USER}" --password-stdin "${ACR_HOSTNAME}"'
