name: 'Compliance Extract'
description: |
  Extract /legal/ NOTICES tree and /sboms/ per-ecosystem deps CSVs from the
  inline-compliance pipeline of an already-built dynamo container image,
  cross-check them against the FROM base SBOM, and upload as workflow
  artifacts.

  Designed to run as a step INSIDE each <framework>-build job (after
  shared-build-image.yml's "Build and Push Image" step), reusing the
  warm BuildKit cache the build just populated. This is the inline-
  compliance counterpart of the older shared-compliance.yml workflow,
  which created a separate job and thus a cold cache.

inputs:
  framework:
    description: 'Framework name (vllm, sglang, trtllm, dynamo)'
    required: true
  target:
    description: 'Target docker stage (runtime, frontend, planner)'
    required: true
  platform:
    description: 'Single platform string, e.g. linux/amd64'
    required: true
  cuda_version:
    description: 'CUDA version string (e.g. 12.9, 13.0); empty for non-CUDA targets'
    required: false
    default: ''
  builder_name:
    description: 'Name of the existing buildx builder to reuse (set up by shared-build-image.yml)'
    required: true
  artifact_name_prefix:
    description: 'Prefix for the uploaded compliance artifacts (typically the same as the build job target_tag_plain)'
    required: true
  archive_sources:
    description: 'When "true", also extract the source archive (--target sources_archive). Set on post-merge / RC / release pipelines only; PR builds skip to avoid storage cost.'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Render Dockerfile
      id: render
      shell: bash
      run: |
        RENDER_ARGS="--framework ${{ inputs.framework }} --target ${{ inputs.target }} --platform ${{ inputs.platform }}"
        if [ -n "${{ inputs.cuda_version }}" ]; then
          RENDER_ARGS+=" --cuda-version ${{ inputs.cuda_version }}"
        fi
        RENDERED_PATH=$(python3 container/render.py ${RENDER_ARGS} --output-short-filename)
        echo "rendered=${RENDERED_PATH}" >> $GITHUB_OUTPUT

    # /legal/ — NOTICES tree. FROM scratch stage; export bounded by NOTICES file
    # size (a few MB) regardless of runtime image size.
    - name: Extract /legal/ (NOTICES)
      shell: bash
      run: |
        mkdir -p /tmp/legal
        docker buildx build \
            --builder ${{ inputs.builder_name }} \
            --platform ${{ inputs.platform }} \
            --target legal \
            --output type=local,dest=/tmp/legal \
            --progress=plain \
            -f ${{ steps.render.outputs.rendered }} \
            .

    # /sboms/ — per-ecosystem deps CSVs. Also FROM scratch.
    - name: Extract /sboms/
      shell: bash
      run: |
        mkdir -p /tmp/sboms
        docker buildx build \
            --builder ${{ inputs.builder_name }} \
            --platform ${{ inputs.platform }} \
            --target sboms \
            --output type=local,dest=/tmp/sboms \
            --progress=plain \
            -f ${{ steps.render.outputs.rendered }} \
            .

    # SBOM-diff verifier: every package in /sboms/ that isn't in the FROM base
    # must be enumerated in /legal/NOTICES-*.txt. Catches generator bugs (e.g.
    # vendored wheels missed by pip-licenses, dist-info dirs orphaned in
    # site-packages from a prior install). License *policy* enforcement
    # already happened inside the licenses Dockerfile stage during build.
    #
    # Baseline resolution: the rendered Dockerfile already has the per-
    # framework/device baseline_sbom baked in as `ARG BASELINE_SBOM_FILE`
    # (rendered from context.yaml). We parse it back out here so the
    # verifier subtracts against the same file the runtime template used.
    # Graceful skip if empty (xpu, cpu, dynamo cuda12.9 — no capture yet).
    - name: SBOM-diff verifier
      shell: bash
      run: |
        BASE_SBOM=$(grep -E '^ARG BASELINE_SBOM_FILE=' "${{ steps.render.outputs.rendered }}" \
                    | head -1 \
                    | sed -E 's/^ARG BASELINE_SBOM_FILE="?([^"]*)"?$/\1/')
        if [ -z "${BASE_SBOM}" ]; then
          echo "::notice::no baseline_sbom configured for ${{ inputs.framework }}/${{ inputs.target }}/${{ inputs.cuda_version }}; skipping SBOM-diff verification."
          exit 0
        fi
        BASE_SBOM_PATH="container/compliance/base_sboms/${BASE_SBOM}"
        if [ ! -f "${BASE_SBOM_PATH}" ]; then
          echo "::error::baseline SBOM file referenced by rendered Dockerfile not found: ${BASE_SBOM_PATH}"
          exit 1
        fi
        echo "Verifying target SBOM against baseline: ${BASE_SBOM}"
        PYTHONPATH=container python3 -m compliance.verify_sbom_diff \
            --target-sboms-dir   /tmp/sboms \
            --target-notices-dir /tmp/legal \
            --base-sbom "${BASE_SBOM_PATH}"

    # /sources/ — reproducible tarball of source archives for everything we
    # ship on top of the FROM base. Bigger than legal/sboms (typically
    # 50-300 MB), so gated by archive_sources input. Skipped on PR builds.
    - name: Extract /sources/ (post-merge / RC / release only)
      if: ${{ inputs.archive_sources == 'true' }}
      shell: bash
      run: |
        mkdir -p /tmp/sources
        docker buildx build \
            --builder ${{ inputs.builder_name }} \
            --platform ${{ inputs.platform }} \
            --target sources_archive \
            --output type=local,dest=/tmp/sources \
            --progress=plain \
            -f ${{ steps.render.outputs.rendered }} \
            .

    - name: Compute artifact suffix
      id: suffix
      shell: bash
      run: |
        ARCH=$(echo "${{ inputs.platform }}" | sed 's|^linux/||')
        if [ -n "${{ inputs.cuda_version }}" ]; then
          SUFFIX="${{ inputs.cuda_version }}-${ARCH}"
        else
          SUFFIX="cpu-${ARCH}"
        fi
        echo "suffix=${SUFFIX}" >> $GITHUB_OUTPUT

    - name: Upload /legal/ NOTICES artifact
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        name: compliance-${{ inputs.artifact_name_prefix }}-${{ steps.suffix.outputs.suffix }}-legal
        path: /tmp/legal/
        retention-days: 90

    - name: Upload /sboms/ artifact
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        name: compliance-${{ inputs.artifact_name_prefix }}-${{ steps.suffix.outputs.suffix }}-sboms
        path: /tmp/sboms/
        retention-days: 90

    - name: Upload /sources/ tarball (post-merge / RC / release only)
      if: ${{ inputs.archive_sources == 'true' && always() }}
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        name: compliance-${{ inputs.artifact_name_prefix }}-${{ steps.suffix.outputs.suffix }}-sources
        path: /tmp/sources/sources.zip
        retention-days: 365   # OSRB submissions retain longer than NOTICES/SBOMs
