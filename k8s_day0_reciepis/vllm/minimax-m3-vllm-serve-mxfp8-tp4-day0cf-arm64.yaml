apiVersion: apps/v1
kind: Deployment
metadata:
  name: minimax-m3-vllm-serve-mxfp8-tp4-day0cf-arm64
  namespace: ibhosale-dynamo
  labels:
    app: minimax-m3-vllm-serve-mxfp8-tp4-day0cf-arm64
spec:
  replicas: 1
  progressDeadlineSeconds: 7200
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: minimax-m3-vllm-serve-mxfp8-tp4-day0cf-arm64
  template:
    metadata:
      labels:
        app: minimax-m3-vllm-serve-mxfp8-tp4-day0cf-arm64
    spec:
      imagePullSecrets:
        - name: acr-token-secret
      nodeSelector:
        kubernetes.io/arch: arm64
        nvidia.com/gpu.product: NVIDIA-GB200
      tolerations:
        - operator: Exists
      terminationGracePeriodSeconds: 60
      containers:
        - name: vllm
          image: dynamoci.azurecr.io/ai-dynamo/dynamo:ibhosale-minimax-m3-vllm-runtime-cu130-multiarch-day0cf-dyn25ebf1b-ame3b09468-20260610-arm64
          imagePullPolicy: Always
          workingDir: /workspace
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              ulimit -l unlimited || true
              ulimit -n 1048576 || true

              echo "===== MiniMax M3 vLLM serve MXFP8 TP=4 ====="
              date -u +%Y-%m-%dT%H:%M:%SZ
              echo "MODEL_PATH=${MODEL_PATH}"
              readlink -f "${MODEL_PATH}" || true
              find -L "${MODEL_PATH}" -maxdepth 1 -type f -name '*.safetensors' | wc -l || true
              du -shL "${MODEL_PATH}" || true
              nvidia-smi --query-gpu=index,name,memory.total,memory.used --format=csv,noheader || true

              echo "Reinstalling nvidia-cutlass-dsl-libs-cu13==4.5.2"
              pip install --force-reinstall --no-deps nvidia-cutlass-dsl-libs-cu13==4.5.2

              exec vllm serve "${MODEL_PATH}" \
                --served-model-name minimax-m3-vllm-serve-mxfp8 \
                --host 0.0.0.0 \
                --port 8000 \
                --tensor-parallel-size 4 \
                --enable-expert-parallel \
                --block-size 128 \
                --mm-encoder-attn-backend FLASHINFER \
                --mm-processor-cache-type shm \
                --tool-call-parser minimax_m3 \
                --enable-auto-tool-choice \
                --reasoning-parser minimax_m3 \
                --trust-remote-code \
                --no-enable-log-requests
          env:
            - name: MODEL_PATH
              value: /model-cache/ibhosale-custom-model/payload
            - name: HF_HOME
              value: /model-cache
            - name: HF_HUB_CACHE
              value: /model-cache/hub
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: TRANSFORMERS_OFFLINE
              value: "1"
            - name: VLLM_CACHE_ROOT
              value: /vllm-cache
            - name: FLASHINFER_CACHE_DIR
              value: /vllm-cache/flashinfer
            - name: FLASHINFER_CUBIN_DIR
              value: /vllm-cache/flashinfer-cubins
            - name: FLASHINFER_USE_CUDA_NORM
              value: "1"
            - name: NCCL_P2P_LEVEL
              value: NVL
            - name: VLLM_SKIP_P2P_CHECK
              value: "1"
            - name: PYTHONUNBUFFERED
              value: "1"
          envFrom:
            - secretRef:
                name: hf-token-secret
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 720
          resources:
            requests:
              cpu: "32"
              memory: 256Gi
              nvidia.com/gpu: "4"
            limits:
              cpu: "64"
              memory: 512Gi
              nvidia.com/gpu: "4"
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
                - SYS_RESOURCE
          volumeMounts:
            - name: shared-model-cache
              mountPath: /model-cache
            - name: vllm-cache
              mountPath: /vllm-cache
            - name: flashinfer-package-cubins
              mountPath: /usr/local/lib/python3.12/dist-packages/flashinfer_cubin/cubins
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: shared-model-cache
          persistentVolumeClaim:
            claimName: shared-model-cache
        - name: vllm-cache
          emptyDir: {}
        - name: flashinfer-package-cubins
          emptyDir: {}
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 200Gi
---
apiVersion: v1
kind: Service
metadata:
  name: minimax-m3-vllm-serve-mxfp8-tp4-day0cf-arm64
  namespace: ibhosale-dynamo
  labels:
    app: minimax-m3-vllm-serve-mxfp8-tp4-day0cf-arm64
spec:
  type: ClusterIP
  selector:
    app: minimax-m3-vllm-serve-mxfp8-tp4-day0cf-arm64
  ports:
    - name: http
      port: 8000
      targetPort: http
