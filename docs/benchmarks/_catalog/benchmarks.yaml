#
# Machine-readable catalog for the Dynamo Feature Benchmarks docs surface.
# Each entry is a reproducible performance claim about a Dynamo feature,
# topology, or feature stack, with deployable control and treatment configs.
#
# Schema (v1):
#   benchmarks[]:
#     id               stable slug; matches the page slug in docs/index.yml
#     title            display title
#     page             docs-relative path to the rendered MDX page
#     claim            the performance claim under test
#     subtype          ab-test | feature-stack | topology | provider-comparison | hands-on
#     features         Dynamo features/topologies under test
#     model            {name, hf_id}
#     hardware         {gpu, count}
#     traffic          controlled traffic definition
#     arms[]           {role: winner|treatment|baseline, name, deploy, perf}
#                      winner = promoted to a recipe target
#     results          {available, summary?}
#     related_recipes  ids in docs/recipes/_catalog/recipes.yaml
#     maintainer       named maintainer (null = unassigned; tracked as a gap)
#     gaps             known contribution-standard gaps
schema_version: 1
benchmarks:
- id: qwen3-32b-kv-routing
  title: Qwen3-32B KV Routing A/B
  page: benchmarks/qwen3-32b-kv-routing.mdx
  claim: Disaggregated KV-aware routing (6P+2D TP2) reduces TTFT/ITL vs aggregated round-robin (8x TP2) on prefix-reuse conversation
    traffic
  subtype: ab-test
  features:
  - kv-router
  - disaggregated-serving
  model:
    name: Qwen3-32B
    hf_id: Qwen/Qwen3-32B
  hardware:
    gpu: H200
    count: 16
  traffic: Mooncake conversation trace, 12,031 reqs/~59 min, 12,035 avg ISL, 343 avg OSL, 36.64% cache efficiency, fixed-schedule
  arms:
  - role: treatment
    name: Disaggregated KV router
    deploy: recipes/qwen3-32b/vllm/disagg-kv-router/deploy.yaml
    perf: recipes/qwen3-32b/vllm/disagg-kv-router/perf.yaml
  - role: baseline
    name: Aggregated round-robin
    deploy: recipes/qwen3-32b/vllm/agg-round-robin/deploy.yaml
    perf: recipes/qwen3-32b/vllm/agg-round-robin/perf.yaml
  results:
    available: false
    summary: Source has only a results video + directional analysis; no numeric table
  related_recipes:
  - qwen3-32b
  maintainer: null
  gaps:
  - no numeric results in source (video + directional only) — Results omitted
  - maintainer unknown
- id: kimi-k2-5-feature-stack
  title: Kimi-K2.5 Feature-Stack Benchmark
  page: benchmarks/kimi-k2-5-feature-stack.mdx
  claim: Composing disaggregation + Eagle3 + KV routing + KV offload yields ~130 tok/s/user and ~5,400 tok/s/GPU, ~3x the
    per-GPU throughput of agg round-robin
  subtype: feature-stack
  features:
  - disaggregated-serving
  - eagle3
  - kv-router
  - kv-offload
  model:
    name: Kimi-K2.5 NVFP4
    hf_id: nvidia/Kimi-K2.5-NVFP4
  hardware:
    gpu: GB200
    count: 24
  traffic: Mooncake-style agentic coding trace (~200k ctx, multi-turn), 1-hour replay, goodput TTFT 5s / ITL 10ms
  arms:
  - role: winner
    name: Disagg + Eagle3 + KV router + offload
    deploy: recipes/kimi-k2.5/trtllm/disagg-eagle-kv-router/deploy.yaml
    perf: recipes/kimi-k2.5/trtllm/disagg-eagle-kv-router/perf.yaml
  - role: treatment
    name: Agg + Eagle3 + KV router
    deploy: recipes/kimi-k2.5/trtllm/agg-eagle-kv-router/deploy.yaml
    perf: recipes/kimi-k2.5/trtllm/agg-eagle-kv-router/perf.yaml
  - role: treatment
    name: Agg + Eagle3 + round-robin
    deploy: recipes/kimi-k2.5/trtllm/agg-eagle-round-robin/deploy.yaml
    perf: recipes/kimi-k2.5/trtllm/agg-eagle-round-robin/perf.yaml
  - role: baseline
    name: Agg + round-robin (no spec dec)
    deploy: recipes/kimi-k2.5/trtllm/agg-round-robin/deploy.yaml
    perf: recipes/kimi-k2.5/trtllm/agg-round-robin/perf.yaml
  results:
    available: true
    summary: ~130 tok/s/user / ~5,400 tok/s/GPU (winner) vs ~105 / ~1,700 (baseline); full 4-arm table verified against README
  related_recipes: []
  maintainer: null
  gaps:
  - result numbers approximate (~) in source; Pareto plot only as embedded image
  - deploy.yaml image tag placeholder (tensorrtllm-runtime:my-tag)
  - maintainer unknown
  promotion_candidate:
    deferred_recipe_id: kimi-k2-5
    note: winning arm is a recipe-promotion candidate; held back in R1, see deferred_recipes in recipes.yaml
- id: qwen3-6-35b-feature-stack
  title: Qwen3.6 Frontend and Cache Benchmark
  page: benchmarks/qwen3-6-35b-feature-stack.mdx
  claim: Dynamo FD + 8 GiB embedding cache beats vanilla vllm serve by +29.8% RPS / -66.4% TTFT avg (H100) and +31.5% RPS
    / -43.3% TTFT avg (GB200) on a single GPU
  subtype: feature-stack
  features:
  - frontend-decoding
  - multimodal-embedding-cache
  model:
    name: Qwen3.6-35B-A3B FP8
    hf_id: Qwen/Qwen3.6-35B-A3B-FP8
  hardware:
    gpu: H100 or GB200
    count: 1
  traffic: 'Sliding-window multimodal: 30 users x 8 turns (240 reqs), window 5, 2400x1080 base64 images, 8,000 text tokens,
    max_tokens 1024, concurrency 30'
  arms:
  - role: winner
    name: dynamo-fd-ec
    deploy: recipes/qwen3.6-35b/deploy/dynamo-fd-ec.yaml
    perf: recipes/qwen3.6-35b/perf.yaml
  - role: treatment
    name: dynamo-fd
    deploy: recipes/qwen3.6-35b/deploy/dynamo-fd.yaml
    perf: recipes/qwen3.6-35b/perf.yaml
  - role: baseline
    name: vllm-serve
    deploy: recipes/qwen3.6-35b/deploy/vllm-serve.yaml
    perf: recipes/qwen3.6-35b/perf.yaml
  results:
    available: true
    summary: Full H100 + GB200 RPS/ITL/TTFT tables from docs/benchmarks/embedding_cache.md, reproduced on-page
  related_recipes: []
  maintainer: null
  gaps:
  - deploy YAMLs are envsubst templates, not directly kubectl-applicable; reproduce via run-benchmark.sh
  - maintainer unknown
  promotion_candidate:
    deferred_recipe_id: qwen3-6-35b
    note: winning arm is a recipe-promotion candidate; held back in R1, see deferred_recipes in recipes.yaml
- id: qwen3-vl-embedding-cache
  title: Qwen3-VL Embedding Cache A/B
  page: benchmarks/qwen3-vl-embedding-cache.mdx
  claim: Enabling the multimodal embedding cache on one GB200 vLLM replica gives +16.4% output TPS, -27.7% TTFT avg, -13.4%
    request latency on 80%-image-reuse traffic
  subtype: ab-test
  features:
  - multimodal-embedding-cache
  model:
    name: Qwen3-VL-30B-A3B-Instruct FP8
    hf_id: Qwen/Qwen3-VL-30B-A3B-Instruct-FP8
  hardware:
    gpu: GB200
    count: 1
  traffic: 1,000 single-turn multimodal reqs, 1 image each, 200-image pool (80% reuse), 400 text tokens, concurrency 64, forced
    150-token output
  arms:
  - role: treatment
    name: Embedding cache ON (DYN_MULTIMODAL_EMBEDDING_CACHE_GB=10)
    deploy: recipes/qwen3-vl-30b/vllm/agg-embedding-cache/deploy.yaml
    perf: recipes/qwen3-vl-30b/vllm/agg-embedding-cache/perf.yaml
  - role: baseline
    name: Embedding cache OFF (same manifest, cache=0)
    deploy: recipes/qwen3-vl-30b/vllm/agg-embedding-cache/deploy.yaml
    perf: recipes/qwen3-vl-30b/vllm/agg-embedding-cache/perf.yaml
  results:
    available: true
    summary: +16.4% TPS, -27.7% TTFT avg, -30.1% TTFT p50, -8.8% ITL, -13.4% req latency — verified against README
  related_recipes: []
  maintainer: null
  gaps:
  - both arms share one deploy.yaml (cache toggled by env var); baseline has no distinct manifest
  - maintainer unknown
  promotion_candidate:
    deferred_recipe_id: qwen3-vl-30b
    note: winning arm is a recipe-promotion candidate; held back in R1, see deferred_recipes in recipes.yaml
