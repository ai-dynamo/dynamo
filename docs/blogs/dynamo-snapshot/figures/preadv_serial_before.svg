<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-label="Synchronous preadv loop restores one memory region at a time">
<rect width="1280" height="560" fill="#000000"/>
<style>
  .title { font-family: "Helvetica Neue", Helvetica, Geist, Arial, sans-serif; font-size: 36px; font-weight: 300; fill: #ffffff; }
  .subtitle { font-family: "Helvetica Neue", Helvetica, Geist, Arial, sans-serif; font-size: 17px; font-weight: 300; fill: #cdcdcd; }
  .panel-label { font-family: Geist, "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #ffffff; letter-spacing: 0.08em; text-transform: uppercase; }
  .panel-sub { font-family: "Geist Mono", "SF Mono", Menlo, Consolas, monospace; font-size: 12px; font-weight: 400; fill: #8c8c8c; }
  .section-label { font-family: Geist, "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 500; fill: #cdcdcd; letter-spacing: 0.04em; text-transform: uppercase; }
  .card-title { font-family: Geist, "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 500; fill: #ffffff; }
  .card-meta { font-family: "Geist Mono", "SF Mono", Menlo, Consolas, monospace; font-size: 11px; font-weight: 400; fill: #8c8c8c; }
  .item { font-family: "Geist Mono", "SF Mono", Menlo, Consolas, monospace; font-size: 11px; font-weight: 400; fill: #cdcdcd; }
  .vma-label { font-family: Geist, "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 500; fill: #ffffff; }
  .vma-addr { font-family: "Geist Mono", "SF Mono", Menlo, Consolas, monospace; font-size: 10px; font-weight: 400; fill: #8c8c8c; }
  .arrow-label { font-family: Geist, "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 500; fill: #cdcdcd; }
  .arrow-meta { font-family: "Geist Mono", "SF Mono", Menlo, Consolas, monospace; font-size: 10px; font-weight: 400; fill: #8c8c8c; }
</style>
<text class="title" x="40" y="58">Synchronous preadv for anonymous memory restoration</text>
<text class="subtitle" x="40" y="88">Each blocking preadv returns before the next read job can start</text>
<text class="section-label" x="110.0" y="178">JOB LIST &#183; read jobs</text>
<text class="section-label" x="380.0" y="178">KERNEL</text>
<text class="section-label" x="890.0" y="178">PROCESS ADDRESS SPACE</text>
<rect x="110.0" y="190" width="220" height="28" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1"/>
<text class="item" x="122.0" y="208.0">offset 0,    64K -> heap</text>
<rect x="110.0" y="222" width="220" height="28" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1"/>
<text class="item" x="122.0" y="240.0">offset 64K,  128K -> heap</text>
<rect x="110.0" y="254" width="220" height="28" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1"/>
<text class="item" x="122.0" y="272.0">offset 192K, 32K -> stack</text>
<rect x="110.0" y="286" width="220" height="28" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1"/>
<text class="item" x="122.0" y="304.0">offset 224K, 96K -> anon</text>
<rect x="110.0" y="318" width="220" height="28" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1"/>
<text class="item" x="122.0" y="336.0">offset 320K, 64K -> anon</text>
<rect x="110.0" y="350" width="220" height="28" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1"/>
<text class="item" x="122.0" y="368.0">offset 384K, 48K -> cow</text>
<rect x="110.0" y="382" width="220" height="28" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1"/>
<text class="item" x="122.0" y="400.0">...</text>
<rect x="380.0" y="190" width="460" height="224" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1"/>
<text class="card-title" x="610.0" y="226" text-anchor="middle">preadv() blocks per call</text>
<rect x="545.0" y="286.0" width="130" height="30" fill="#b04040"/>
<text class="vma-label" x="610.0" y="305.0" text-anchor="middle" fill="#ffffff">read offset 0, 64K</text>
<text class="arrow-meta" x="610.0" y="338.0" text-anchor="middle" fill="#cdcdcd">caller blocks &#183; remaining jobs stay queued</text>
<rect x="565.0" y="352.0" width="90" height="3" fill="#3a3a3a"/>
<rect x="565.0" y="358.0" width="90" height="3" fill="#3a3a3a"/>
<rect x="565.0" y="364.0" width="90" height="3" fill="#3a3a3a"/>
<text class="arrow-meta" x="610.0" y="376.0" text-anchor="middle" fill="#5a5a5a">queued</text>
<rect x="890.0" y="190.0" width="280" height="40" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1"/>
<text class="vma-label" x="904.0" y="214.0">heap</text>
<text class="vma-addr" x="1156.0" y="214.0" text-anchor="end">0x55...000</text>
<rect x="890.0" y="236.0" width="280" height="40" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1"/>
<text class="vma-label" x="904.0" y="260.0">stack</text>
<text class="vma-addr" x="1156.0" y="260.0" text-anchor="end">0x7ff...000</text>
<rect x="890.0" y="282.0" width="280" height="40" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1"/>
<text class="vma-label" x="904.0" y="306.0">anon mapping</text>
<text class="vma-addr" x="1156.0" y="306.0" text-anchor="end">0x7f1...000</text>
<rect x="890.0" y="328.0" width="280" height="40" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1"/>
<text class="vma-label" x="904.0" y="352.0">anon mapping</text>
<text class="vma-addr" x="1156.0" y="352.0" text-anchor="end">0x7f2...000</text>
<rect x="890.0" y="374.0" width="280" height="40" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1"/>
<text class="vma-label" x="904.0" y="398.0">private cow file</text>
<text class="vma-addr" x="1156.0" y="398.0" text-anchor="end">0x7f3...000</text>
