<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="460" viewBox="0 0 1280 460">
<rect width="1280" height="460" fill="#000000"/>
<style>
  .title { font-family: "Helvetica Neue", Helvetica, Geist, Arial, sans-serif; font-size: 36px; font-weight: 300; fill: #ffffff; }
  .subtitle { font-family: "Helvetica Neue", Helvetica, Geist, Arial, sans-serif; font-size: 17px; font-weight: 300; fill: #cdcdcd; }
  .row-label { font-family: Geist, "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #ffffff; letter-spacing: 0.08em; text-transform: uppercase; }
  .row-total { font-family: "Geist Mono", "SF Mono", Menlo, Consolas, monospace; font-size: 13px; font-weight: 500; fill: #cdcdcd; }
  .seg-big { font-family: Geist, "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 500; fill: #ffffff; }
  .seg-ghost { font-family: Geist, "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #6a6a6a; font-style: italic; }
  .callout { font-family: "Geist Mono", "SF Mono", Menlo, Consolas, monospace; font-size: 11px; font-weight: 400; fill: #cdcdcd; }
  .callout-green { font-family: "Geist Mono", "SF Mono", Menlo, Consolas, monospace; font-size: 11px; font-weight: 500; fill: #74b711; }
  .footer { font-family: "Geist Mono", "SF Mono", Menlo, Consolas, monospace; font-size: 12px; font-weight: 400; fill: #8c8c8c; }
</style>

<text class="title" x="40" y="58">Unmapping the KV cache before snapshot</text>
<text class="subtitle" x="40" y="86">cuMemUnmap + cuMemRelease before CRIU runs &#8212; otherwise the snapshot has to capture ~180 GiB of unused buffer.</text>

<!-- BEFORE UNMAP -->
<text class="row-label" x="60" y="146">Before unmap</text>
<text class="row-total" x="1220" y="146" text-anchor="end">~182 GiB resident</text>
<rect x="60" y="166" width="7" height="60" fill="#5a5a5a"/>
<rect x="67" y="166" width="1143" height="60" fill="#4a4a4a"/>
<rect x="1210" y="166" width="10" height="60" fill="#5a5a5a"/>
<text class="seg-big" x="638" y="203" text-anchor="middle">KV cache &#183; 180 GiB</text>

<line x1="63.5" y1="228" x2="63.5" y2="244" stroke="#5a5a5a" stroke-width="1"/>
<text class="callout" x="74" y="258">Weights &#183; 1.1 GiB</text>
<line x1="1215" y1="228" x2="1215" y2="244" stroke="#5a5a5a" stroke-width="1"/>
<text class="callout" x="1207" y="258" text-anchor="end">CUDA graph + buffers &#183; 1.5 GiB</text>

<!-- AFTER UNMAP -->
<text class="row-label" x="60" y="310">After unmap</text>
<text class="row-total" x="1220" y="310" text-anchor="end">~2.6 GiB resident</text>
<rect x="60" y="330" width="7" height="60" fill="#74b711"/>
<rect x="67" y="330" width="1143" height="60" fill="none" stroke="#3a3a3a" stroke-width="1" stroke-dasharray="6 6"/>
<rect x="1210" y="330" width="10" height="60" fill="#74b711"/>
<text class="seg-ghost" x="638" y="367" text-anchor="middle">KV cache &#183; virtual addresses kept, physical pages released</text>

<line x1="63.5" y1="392" x2="63.5" y2="408" stroke="#74b711" stroke-width="1"/>
<text class="callout-green" x="74" y="422">Weights &#183; 1.1 GiB &#183; survives</text>
<line x1="1215" y1="392" x2="1215" y2="408" stroke="#74b711" stroke-width="1"/>
<text class="callout-green" x="1207" y="422" text-anchor="end">CUDA graph + buffers &#183; 1.5 GiB &#183; survives</text>

<!-- Footer (setup details at bottom) -->
<text class="footer" x="40" y="450">Qwen3 0.6B BF16 &#183; NVIDIA B200, 192 GiB HBM &#183; vLLM gpu_memory_utilization=0.95 &#183; on-disk checkpoint artifact after unmap: ~6 GiB</text>
</svg>
