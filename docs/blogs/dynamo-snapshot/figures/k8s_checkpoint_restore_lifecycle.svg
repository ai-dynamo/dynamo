<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
<rect width="1280" height="720" fill="#000000"/>
<style>
  .title { font-family: "Helvetica Neue", Helvetica, Geist, Arial, sans-serif; font-size: 36px; font-weight: 300; fill: #ffffff; }
  .subtitle { font-family: "Helvetica Neue", Helvetica, Geist, Arial, sans-serif; font-size: 17px; font-weight: 300; fill: #cdcdcd; }
  .node-label { font-family: Geist, "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 500; fill: #cdcdcd; letter-spacing: 0.02em; }
  .role-label { font-family: Geist, "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
  .card-title { font-family: Geist, "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 500; fill: #ffffff; }
  .card-meta { font-family: "Geist Mono", "SF Mono", Menlo, Consolas, monospace; font-size: 12px; font-weight: 400; fill: #8c8c8c; }
  .step-num { font-family: "Geist Mono", "SF Mono", Menlo, Consolas, monospace; font-size: 13px; font-weight: 600; fill: #000000; }
  .step-num-green { font-family: "Geist Mono", "SF Mono", Menlo, Consolas, monospace; font-size: 13px; font-weight: 600; fill: #ffffff; }
  .arrow-label { font-family: Geist, "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 500; fill: #cdcdcd; }
  .arrow-meta { font-family: "Geist Mono", "SF Mono", Menlo, Consolas, monospace; font-size: 10px; font-weight: 400; fill: #8c8c8c; }
  .legend { font-family: Geist, "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #cdcdcd; }
</style>
<text class="title" x="60" y="60">Kubernetes checkpoint and restore lifecycle</text>
<text class="subtitle" x="60" y="88">A privileged DaemonSet observes the workload pod, writes the artifact to shared storage, and restores into a placeholder pod on another node</text>
<rect x="80.0" y="150" width="420" height="460" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4 4"/>
<text class="node-label" x="96.0" y="172">Node 0</text>
<text class="role-label" x="484.0" y="172" text-anchor="end" fill="#8c8c8c">checkpoint</text>
<rect x="110.0" y="200" width="360" height="210" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1"/>
<text class="card-title" x="156.0" y="228">Workload pod</text>
<text class="card-meta" x="156.0" y="248">checkpoint target</text>
<rect x="130.0" y="270" width="320" height="120" fill="#000000" stroke="#2a2a2a" stroke-width="1"/>
<text class="card-title" x="290.0" y="334.0" text-anchor="middle">Workload runtime</text>
<text class="card-meta" x="290.0" y="354.0" text-anchor="middle">vLLM &#183; SGLang &#183; TensorRT-LLM</text>
<circle cx="130.0" cy="224" r="11" fill="#5a5a5a"/>
<text class="step-num" x="130.0" y="228" text-anchor="middle">1</text>
<rect x="110.0" y="440" width="360" height="90" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1"/>
<text class="card-title" x="156.0" y="470">snapshot-agent</text>
<text class="card-meta" x="156.0" y="492">privileged DaemonSet</text>
<circle cx="130.0" cy="466" r="11" fill="#5a5a5a"/>
<text class="step-num" x="130.0" y="470" text-anchor="middle">2</text>
<circle cx="450.0" cy="466" r="11" fill="#5a5a5a"/>
<text class="step-num" x="450.0" y="470" text-anchor="middle">3</text>
<rect x="780.0" y="150" width="420" height="460" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4 4"/>
<text class="node-label" x="796.0" y="172">Node 1</text>
<text class="role-label" x="1184.0" y="172" text-anchor="end" fill="#74b711">restore</text>
<rect x="810.0" y="200" width="360" height="210" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1"/>
<text class="card-title" x="856.0" y="228">Placeholder pod</text>
<text class="card-meta" x="856.0" y="248">restore target</text>
<rect x="830.0" y="270" width="320" height="120" fill="#000000" stroke="#2a2a2a" stroke-width="1"/>
<text class="card-title" x="990.0" y="334.0" text-anchor="middle">Placeholder</text>
<text class="card-meta" x="990.0" y="354.0" text-anchor="middle">sleep &#8734;</text>
<rect x="810.0" y="440" width="360" height="90" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1"/>
<text class="card-title" x="856.0" y="470">snapshot-agent</text>
<text class="card-meta" x="856.0" y="492">privileged DaemonSet</text>
<circle cx="830.0" cy="466" r="11" fill="#74b711"/>
<text class="step-num-green" x="830.0" y="470" text-anchor="middle">1</text>
<circle cx="1150.0" cy="466" r="11" fill="#74b711"/>
<text class="step-num-green" x="1150.0" y="470" text-anchor="middle">2</text>
<line x1="180.0" y1="410" x2="180.0" y2="432" stroke="#5a5a5a" stroke-width="1" stroke-dasharray="3 3"/>
<polygon points="175.0,432 185.0,432 180.0,440" fill="#5a5a5a"/>
<text class="arrow-meta" x="192.0" y="429.0">Observe from host</text>
<line x1="880.0" y1="440" x2="880.0" y2="418" stroke="#74b711" stroke-width="1.5"/>
<polygon points="875.0,418 885.0,418 880.0,410" fill="#74b711"/>
<circle cx="902.0" cy="425.0" r="11" fill="#74b711"/>
<text class="step-num-green" x="902.0" y="429.0" text-anchor="middle">3</text>
<text class="arrow-meta" x="920.0" y="429.0">Enter and restore inside NS</text>
<rect x="570.0" y="430.0" width="140" height="110" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1"/>
<text class="card-title" x="640.0" y="481.0" text-anchor="middle">PVC</text>
<text class="card-meta" x="640.0" y="505.0" text-anchor="middle">shared storage</text>
<line x1="470.0" y1="485.0" x2="560.0" y2="485.0" stroke="#7a7a7a" stroke-width="2"/>
<polygon points="560.0,478.0 570.0,485.0 560.0,492.0" fill="#7a7a7a"/>
<text class="arrow-meta" x="515.0" y="475.0" text-anchor="middle">dump artifact</text>
<text class="arrow-meta" x="515.0" y="500.0" text-anchor="middle" fill="#5a5a5a">+ overlay diff</text>
<line x1="710.0" y1="485.0" x2="800.0" y2="485.0" stroke="#74b711" stroke-width="2"/>
<polygon points="800.0,478.0 810.0,485.0 800.0,492.0" fill="#74b711"/>
<text class="arrow-meta" x="755.0" y="475.0" text-anchor="middle">restore artifact</text>
<circle cx="553.5" cy="676" r="6" fill="#5a5a5a"/>
<text class="legend" x="567.5" y="680">checkpoint</text>
<circle cx="671.5" cy="676" r="6" fill="#74b711"/>
<text class="legend" x="685.5" y="680">restore</text>
</svg>