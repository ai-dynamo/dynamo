<text class="title" x="40" y="58">Parallel AIO restores memory regions concurrently</text>
<text class="subtitle" x="40" y="88">Before: one preadv at a time blocks on storage. After: a 128-deep AIO context overlaps reads across all VMAs.</text>
<text class="panel-label" x="60" y="140" fill="#cdcdcd">BEFORE</text>
<text class="panel-sub" x="60" y="160">Serial preadv() calls block one at a time</text>
<text class="section-label" x="110.0" y="178">JOB LIST &#183; iocbs</text>
<text class="section-label" x="380.0" y="178">KERNEL</text>
<text class="section-label" x="890.0" y="178">PROCESS ADDRESS SPACE</text>
<rect x="110.0" y="190" width="220" height="28" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1"/>
<text class="item" x="122.0" y="208.0">offset 0,    64K -> heap</text>
