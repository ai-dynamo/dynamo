#
# Figure-generator manifest for the blog-figures skill.
#
# A browsable, machine-readable catalog of every reusable figure GENERATOR in
# the skill and its digest exemplars. To build a new figure, scan `kinds:` for
# the closest visual grammar, find the matching entry under `generators:`, and
# pull that generator as a starting template. Every field reflects what the
# generator actually does (read from the source), not an aspiration.
#
# Human index + how-to-pull: reference/README.md.

version: 1
family: Dynamo Dark
token_source: docs/digest/flash-indexer/tools/design_tokens.yaml
generated: 2026-07-16

# How `lint_score` was captured. Run per generator against its own sibling
# design_tokens.yaml so the number reflects that one figure:
#   python3 docs/skills/blog-figures/tools/lint_figures.py <generator.py> \
#       --tokens <sibling>/design_tokens.yaml --score
# `lint_score` is the linter's overall_measured (0-100); `ship_ready` is the
# linter's >= 85 verdict. The measured score covers palette/typography/contrast/
# variety/label-structure only; the judged dimensions still need eyes on the
# rendered PNG (see RATINGS.md).

# Renderer enum (pathway the generator uses to emit pixels).
renderers:
  plotly: "Python + Plotly through the shared plotly_dynamo template (load_tokens / build_template)."
  html-css: "HTML + CSS source screenshotted to PNG via Playwright (headless Chromium)."
  dsvg: "dynamo-svg manifest or hand-crafted SVG rendered via rsvg-convert. No generator of this kind is cataloged yet."

# Title-treatment enum (from the seven non-negotiables; both top-left, one family).
title_treatments:
  display: "Hero / section-anchor scale. Helvetica Neue Light, title case, with a muted one-line subtitle."
  compact: "Dense / inline-chart scale. Arial, 18 px, weight 700, uppercase, 0.08em."

# Controlled vocabulary for `kind`. Only the kinds actually found in this branch
# are enumerated; add a new key here before introducing a new `kind` value.
kinds:
  chart.bar: "Sorted single-series bar scoreboard; one green accent on the winner, values labeled in-bar."
  chart.stacked-bar: "Multi-row segmented bars comparing a phase or time budget across configs (Gantt-style rows)."
  chart.timeline-anatomy: "Single-row stacked timeline decomposing one run or total into labeled sequential phases, anchored by a KPI and a grouping bracket."
  chart.line: "Line or connected-scatter series across a swept axis (often log), with peak-value or Nx bracket callouts."
  chart.small-multiples: "Two or more panels sharing one series encoding (for example a sweep panel plus a Pareto panel)."
  chart.heatmap: "Diverging matrix of entities by time with a zero-centered colorbar."
  diagram.sequence: "UML-style lifelines and messages showing an ordered protocol exchange."
  diagram.architecture: "Orthogonal component boxes wired into planes or a pipeline to show data flow."
  diagram.loop: "Closed-loop pipeline: forward stages plus a squared feedback or return edge."
  diagram.decision-cascade: "A decision chain that ends in two outcome chips joined by a delta bracket."
  hero.flow: "Full-width, display-title flow or path diagram carrying a giant editorial stat (the win as art)."
  hero.scatter: "Full-width, display-title scatter cloud bounded by a Pareto frontier curve."
  cards.comparison: "HTML + CSS comparison card grid (typography-heavy), rendered to PNG."

# Collections group generators by where they live and what role they play.
collections:
  modelexpress-coldstart:
    root: drafts/modelexpress-coldstart/
    note: "ModelExpress cold-start figure set, the newest end-to-end exemplars (all measure 100/100). One figure per fig-N/ directory plus a standalone hero."
  skill-examples:
    root: docs/skills/blog-figures/examples/
    note: "Runnable pattern exemplars shipped with the skill. Deterministic, hard-coded sample data; swap in a source of truth before shipping."
  digest:
    root: docs/digest/
    note: "Generators behind published digest posts. These predate the 100/100 exemplars, so two carry known raw-hex lint flags."

