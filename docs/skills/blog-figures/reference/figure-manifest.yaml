    shows: "Three lifelines (source replica, ModelExpress server, new replica) across register / discover / transfer phases; the single green RDMA weight read crosses the metadata-server spine without terminating on it."
    data: "Illustrative. Protocol and API labels only (PublishMetadata, ListSources, GetMetadata, NIXL, mx_source_id); no measured numbers."
