#
# Machine-readable catalog for the Dynamo Recipes docs surface.
# This file is the stable contract for humans, validation automation, and
# agentic harnesses: what recipes exist, how to deploy and benchmark them,
# how they were validated, and what performance to expect.
#
# Schema (v1):
#   recipes[]:
#     id                  stable slug; matches the page slug in docs/index.yml
#     title               display title
#     page                docs-relative path to the rendered MDX page
#     provider            model provider key used by landing-page filters
#     model               {name, hf_id, precision}
#     status              validated | experimental
#     targets[]           deployable recipe targets (recommended targets only;
#                         benchmark control arms live in benchmarks.yaml)
#       id                target slug
#       recommended       true for the primary target(s)
#       hardware          {gpu, count}
#       runtime           {framework, image?}
#       topology          aggregated | disaggregated
#       techniques        list of serving-technique keys
#       workload          {type, traffic, sla?}
#       deploy            {asset: repo-relative path}
#       benchmark         {tool, asset} — omitted when no benchmark exists
#       expected_performance {available, summary?}
#     related_benchmarks  ids in docs/benchmarks/_catalog/benchmarks.yaml
#     maintainer          named maintainer (null = unassigned; tracked as a gap)
#     gaps                known contribution-standard gaps, tracked here so the
#                         rendered pages stay customer-facing
#
# deferred_recipes: assets held back from the rendered R1 surface with the
# reason recorded; they are not customer-visible and have no rendered page.
