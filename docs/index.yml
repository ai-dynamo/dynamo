# Navigation structure for Dynamo docs
# Tab-based navigation: Home, User Guide, Use Cases, Well-Lit Paths, Recipes, Developer Guide, Reference, Blog, Community.
# Each content tab sets skip-slug: true so page URLs derive from the file path and stay
# independent of which tab a page lives in. The recipes tab keeps its recipes/ URL prefix.

tabs:
  home:
    display-name: Home
    icon: house
    skip-slug: true
  user-guide:
    display-name: User Guide
    icon: book-open
    skip-slug: true
  use-cases:
    display-name: Use Cases
    icon: magnifying-glass-chart
    skip-slug: true
  well-lit-paths:
    display-name: Well-Lit Paths
    icon: road
    skip-slug: true
  recipes:
    display-name: Recipes
    icon: flask
  developer-guide:
    display-name: Developer Guide
    icon: code
    skip-slug: true
  reference:
    display-name: Reference
    icon: book
    skip-slug: true
  blog:
    display-name: Blog
    icon: newspaper
    skip-slug: true
  community:
    display-name: Community
    icon: users
    skip-slug: true

