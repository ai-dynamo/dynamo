# Navigation structure for Dynamo docs
# Tab-based navigation: Home, User Guide, Developer Guide, Recipes, Reference, Blog, Community.
# Each content tab sets skip-slug: true so page URLs derive from the file path and stay
# independent of which tab a page lives in. The recipes tab keeps its recipes/ URL prefix.

tabs:
  home:
    display-name: Home
    icon: house
    skip-slug: true
  user-guide:
    display-name: User Guide
    icon: book-open
    skip-slug: true
  recipes:
    display-name: Recipes
    icon: flask
  developer-guide:
    display-name: Developer Guide
    icon: code
    skip-slug: true
  blog:
    display-name: Blog
    icon: newspaper
    skip-slug: true
  community:
    display-name: Community
    icon: users
    skip-slug: true

