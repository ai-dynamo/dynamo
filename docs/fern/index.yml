# Navigation structure for Dynamo docs
# Tab-based navigation: Home, User Guide, Features, Walkthroughs, Recipes, Developer Guide,
# Reference, Blog, and Community. Each content tab sets skip-slug: true so page URLs stay
# independent of which tab contains them. The Recipes tab keeps its recipes/ URL prefix.

tabs:
  home:
    display-name: Home
    icon: house
    skip-slug: true
  user-guide:
    display-name: User Guide
    icon: book-open
    skip-slug: true
  use-cases:
    display-name: Features
    icon: puzzle-piece
    skip-slug: true
  well-lit-paths:
    display-name: Walkthroughs
    icon: compass
    skip-slug: true
  recipes:
    display-name: Recipes
    icon: file-code
  developer-guide:
    display-name: Developer Guide
    icon: code
    skip-slug: true
  reference:
    display-name: Reference
    icon: book
    skip-slug: true
  blog:
    display-name: Blog
    icon: newspaper
    skip-slug: true
  community:
    display-name: Community
    icon: users
    skip-slug: true

