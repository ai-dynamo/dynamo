# Navigation structure for Dynamo docs
# Tab-based navigation: Home, User Guide, Use Cases, Well-Lit Paths, Recipes, Developer Guide, Reference, Blog, Community.
# Each content tab sets skip-slug: true so page URLs derive from the file path and stay
# independent of which tab a page lives in. The recipes tab keeps its recipes/ URL prefix.

tabs:
  home:
    display-name: Home
    icon: house
    skip-slug: true
  user-guide:
    display-name: Kubernetes Guide
    icon: fa-brands fa-kubernetes
    skip-slug: true
  cli-guide:
    display-name: CLI Guide
    icon: rectangle-terminal
    slug: cli
  use-cases:
    display-name: Features
    icon: puzzle-piece
    skip-slug: true
  well-lit-paths:
    display-name: Walkthroughs
    icon: compass
    skip-slug: true
  recipes:
    display-name: Recipes
    icon: flask
  developer-guide:
    display-name: Developer Guide
    icon: code
    skip-slug: true
  reference:
    display-name: Reference
    icon: book
    skip-slug: true
  blog:
    display-name: Blog
    icon: newspaper
    skip-slug: true
  community:
    display-name: Community
    icon: users
    skip-slug: true

