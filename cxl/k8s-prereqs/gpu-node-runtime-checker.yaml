apiVersion: v1
kind: Namespace
metadata:
  name: gpu-runtime-check
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-node-runtime-checker
  namespace: gpu-runtime-check
spec:
  selector:
    matchLabels:
      app: gpu-node-runtime-checker
  template:
    metadata:
      labels:
        app: gpu-node-runtime-checker
    spec:
      tolerations:
        - operator: Exists
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - yj-testaiinfragpu-01
                      - yj-testaiinfragpu-02
                      - yj-testaiinfragpu-03
      containers:
        - name: checker
          image: harbor.weizhipin.com/arsenal-ai/busybox
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              echo "node=${NODE_NAME}"
              for f in \
                /host/usr/bin/nvidia-container-runtime \
                /host/usr/bin/nvidia-ctk \
                /host/usr/bin/nvidia-smi \
                /host/usr/local/bin/nvidia-container-runtime \
                /host/usr/local/bin/nvidia-ctk \
                /host/usr/local/nvidia/toolkit/nvidia-container-runtime
              do
                if [ -e "$f" ]; then
                  echo "FOUND $f"
                else
                  echo "MISSING $f"
                fi
              done
              if [ -f /host/etc/containerd/config.toml ]; then
                echo "FOUND /etc/containerd/config.toml"
                if grep -n "nvidia" /host/etc/containerd/config.toml; then
                  true
                else
                  echo "NO_NVIDIA_RUNTIME_IN_CONTAINERD_CONFIG"
                fi
              else
                echo "MISSING /etc/containerd/config.toml"
              fi
              sleep 36000
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: host-root
              mountPath: /host
              readOnly: true
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
