[package]
name = "kvbm-physical"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
dynamo-memory = { workspace = true }
kvbm-common = { workspace = true }
kvbm-kernels = { workspace = true }
velo-events = { workspace = true }

aligned-vec = "0.6.4"
anyhow = { workspace = true }
bincode = { version = "2.0.0", features = ["serde", "derive"] }
blake3 = { version = "1" }
cudarc = { workspace = true }
derive_builder = { workspace = true }
futures = { workspace = true }
derive-getters = { version = "0.5" }
parking_lot = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
validator = { workspace = true }
syclrc = { path = "../../../zxue2_syclrc", optional = true }
clap = { version = "4", features = ["derive"], optional = true }

[features]
default = []
collectives = []
testing = []
testing-kvbm = []
testing-nixl-gds = []
level-zero = ["dynamo-memory/level-zero", "dep:syclrc", "kvbm-kernels/level-zero"]
sycl-kernel = ["level-zero", "kvbm-kernels/sycl-kernel"]
bench-xpu = ["level-zero", "dep:clap"]
# Skip CUDA compilation/linking — forward to kvbm-kernels/no-cuda
no-cuda = ["kvbm-kernels/no-cuda"]

[dev-dependencies]
dynamo-memory = { workspace = true, features = ["unsafe-slices"] }
rstest = "0.26"
tokio = { workspace = true, features = ["test-util"] }

[[example]]
name = "bench_xpu_transfer"
required-features = ["bench-xpu"]
