[package]
name = "dynamo-sglang-mocker"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Mocker-backed implementation of SGLang's native gRPC API"
readme = "README.md"

[[bin]]
name = "dynamo-sglang-mocker-server"
path = "src/main.rs"

[dependencies]
dynamo-mocker = { workspace = true }
dynamo-sglang-grpc = { workspace = true }

anyhow = { workspace = true }
async-stream = { workspace = true }
clap = { version = "4", features = ["derive", "env"] }
futures = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tonic = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
dynamo-backend-common = { workspace = true, features = ["testing"] }
dynamo-sglang-sidecar = { path = "../sglang" }
tokio-stream = { workspace = true, features = ["net"] }
