[package]
name = "dynamo-openengine-sidecar"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Engine-neutral Dynamo backend for out-of-process OpenEngine servers."
build = "build.rs"

[package.metadata.openengine]
commit = "cea19cb06acf03c911b84d5c147e519b60dd92a6"

[[bin]]
name = "dynamo-openengine-sidecar"
path = "src/main.rs"

[dependencies]
dynamo-backend-common = { workspace = true }
dynamo-kv-router = { workspace = true }
dynamo-llm = { workspace = true }
dynamo-protocols = { workspace = true }
dynamo-runtime = { workspace = true }
openengine-proto = { version = "0.2.0", path = "../../../openengine-trtllm/packages/rust/openengine-proto" }

anyhow = { workspace = true }
async-stream = { workspace = true }
async-trait = { workspace = true }
base64 = "0.22"
clap = { version = "4", features = ["derive", "env"] }
futures = { workspace = true }
parking_lot = { workspace = true }
prost-types = "0.14.4"
serde_json = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tonic = "0.14.6"
tracing = { workspace = true }

[dev-dependencies]
dynamo-backend-common = { workspace = true, features = ["testing"] }
tokio-stream = { workspace = true, features = ["net"] }
