[project]
name = "dynamo-profiler"
version = "0.1.0"
description = "Distributed profiling and bottleneck attribution for Dynamo inference deployments"
authors = [{ name = "NVIDIA Dynamo Team" }, { name = "Sarvam AI" }]
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Topic :: System :: Monitoring",
]

[project.scripts]
dynamo-sysprofile-report = "dynamo_profiler.cli:main"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["dynamo_profiler*"]
