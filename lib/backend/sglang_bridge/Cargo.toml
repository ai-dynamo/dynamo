[package]
name = "dynamo-sglang-bridge"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Dynamo sidecar bridge to SGLang's native gRPC server (sglang.runtime.v1)."

[[bin]]
name = "dynamo-sglang-bridge"
path = "src/main.rs"

[dependencies]
dynamo-backend-common = { workspace = true }

anyhow = { workspace = true }
async-stream = { workspace = true }
async-trait = { workspace = true }
clap = { version = "4", features = ["derive", "env"] }
futures = { workspace = true }
libc = { workspace = true }
prost = { version = "0.13.5" }
prost-types = { version = "0.13.5" }
rand = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tokio-stream = { workspace = true }
tonic = { version = "0.13.1", features = ["transport"] }
tracing = { workspace = true }

[build-dependencies]
tonic-build = { version = "0.13.1" }
