[project]
name = "ai-dynamo-sglang-remote"
version = "1.3.0"
description = "Native Dynamo remote backend for SGLang's gRPC service"
readme = "README.md"
authors = [
    { name = "NVIDIA Inc.", email = "sw-dl-dynamo@nvidia.com" },
]
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Rust",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
keywords = ["dynamo", "inference", "llm", "sglang"]

[project.urls]
Repository = "https://github.com/ai-dynamo/dynamo.git"

[tool.maturin]
bindings = "bin"
manifest-path = "Cargo.toml"
strip = true

[build-system]
requires = ["maturin>=1.0,<2.0", "patchelf"]
build-backend = "maturin"

[tool.uv]
config-settings = { build-args = '--auditwheel repair --manylinux' }
