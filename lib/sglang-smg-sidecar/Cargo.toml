[package]
name = "dynamo-sglang-smg-sidecar"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Dynamo SGLang SMG sidecar backend — drives an out-of-process upstream SGLang --grpc scheduler through the backend-common LLMEngine trait."

[[bin]]
name = "dynamo-sglang-smg-sidecar"
path = "src/main.rs"

[dependencies]
dynamo-backend-common = { workspace = true }
dynamo-llm = { workspace = true }

anyhow = { workspace = true }
async-stream = { workspace = true }
async-trait = { workspace = true }
clap = { version = "4", features = ["derive", "env"] }
futures = { workspace = true }
prost = { workspace = true }
prost-types = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tonic = { workspace = true }
tracing = { workspace = true }

[build-dependencies]
protobuf-src = "2"
tonic-build = { workspace = true }

[dev-dependencies]
dynamo-backend-common = { workspace = true, features = ["testing"] }
dynamo-llm = { workspace = true }
dynamo-runtime = { workspace = true }
tokio-stream = { workspace = true, features = ["net"] }
