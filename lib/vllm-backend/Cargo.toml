[package]
name = "dynamo-vllm-backend"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Dynamo Rust backend for vLLM engine-core integration."

[[bin]]
name = "dynamo-vllm-backend"
path = "src/main.rs"

[dependencies]
dynamo-backend-common = { workspace = true }
dynamo-runtime = { workspace = true }

anyhow = { workspace = true }
async-stream = { workspace = true }
async-trait = { workspace = true }
clap = { version = "4", features = ["derive", "env"] }
futures = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
vllm-engine-core-client = { git = "https://github.com/vllm-project/vllm.git", tag = "v0.22.0" }
vllm-llm = { git = "https://github.com/vllm-project/vllm.git", tag = "v0.22.0" }
vllm-managed-engine = { git = "https://github.com/vllm-project/vllm.git", tag = "v0.22.0" }
vllm-metrics = { git = "https://github.com/vllm-project/vllm.git", tag = "v0.22.0" }

[dev-dependencies]
dynamo-backend-common = { workspace = true, features = ["testing"] }
