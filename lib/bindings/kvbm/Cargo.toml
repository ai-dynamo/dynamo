[workspace]

[package]
name = "kvbm-py3"
version = "1.2.0"
edition = "2024"
authors = ["NVIDIA"]
license = "Apache-2.0"
homepage = "https://github.com/ai-dynamo/dynamo"
repository = "https://github.com/ai-dynamo/dynamo.git"

[lib]
path = "src/lib.rs"
name = "_core"
# "cdylib" is necessary to produce a shared library for Python to import from.
# "rlib" is necessary to support doctests.
crate-type = ["cdylib", "rlib"]

[features]
# `default = ["v2", "cuda"]` keeps the historical default — a CUDA build of
# the v2 connector — without surprising existing CI / wheel pipelines.
# A SYCL/XPU build is opt-in via:
#   --no-default-features --features v2,xpu-sycl
# `v2` carries the connector dep; `cuda` and `xpu-sycl` only forward the
# backend selection. Mutual exclusion is enforced one level down by
# kvbm-connector/src/lib.rs (compile_error! on cfg(all(cuda, xpu-sycl))).
default = ["v2", "cuda", "hub"]
v2 = [
    "dep:kvbm-connector",
    "kvbm-connector/static-kernels",
    "dep:kvbm-common",
]
cuda = ["kvbm-connector/cuda", "dynamo-device/cuda"]
xpu-sycl = [
    "kvbm-connector/xpu-sycl",
    "dynamo-device/xpu-sycl",
    "kvbm-kernels?/xpu-sycl-permute",
]
kernels = ["dep:kvbm-kernels", "dep:cudarc", "dep:once_cell", "dep:dynamo-device"]
# Hub-facing pyclasses: `PrefillRouterHandler` + `CompletionEvent`. Pulls
# kvbm-hub + velo. Independent of the v2 connector, so a slim hub-only
# wheel is possible by disabling the v2 default feature.
hub = [
    "dep:kvbm-hub",
    "dep:kvbm-protocols",
    "dep:velo",
    "dep:velo-ext",
    "dep:tokio",
    "dep:parking_lot",
    "dep:pythonize",
]

[dependencies]
# v2 deps (optional). `default-features = false` prevents kvbm-connector's
# own `default = ["cuda", "testing"]` from forcibly turning on CUDA — the
# backend is selected explicitly by py3's `cuda` / `xpu-sycl` features
# above. `testing` is not on the bindings hot path (no test harness), so
# it's intentionally NOT re-added here.
kvbm-common = { path = "../../kvbm-common", optional = true }
kvbm-connector = { path = "../../kvbm-connector", optional = true, default-features = false }

# kernels deps (optional)
kvbm-kernels = { path = "../../kvbm-kernels", optional = true }
dynamo-device = { path = "../../device", optional = true, default-features = false }

# hub deps (optional)
kvbm-hub = { path = "../../kvbm-hub", optional = true }
kvbm-protocols = { path = "../../kvbm-protocols", optional = true }
velo = { version = "0.4.1", optional = true }
velo-ext = { version = "0.2.0", optional = true }
tokio = { version = "1.46", features = ["rt-multi-thread", "sync", "macros", "time"], optional = true }
parking_lot = { version = "0.12.4", optional = true }
pythonize = { version = "0.28", optional = true }

anyhow = { version = "1" }
serde = { version = "1" }
serde_json = { version = "1.0.138" }
tracing = { version = "0" }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1.17", features = ["v4", "serde"] }

# "extension-module" tells pyo3 we want to build an extension module (skips linking against libpython.so)
# "abi3-py310" tells pyo3 (and maturin) to build using the stable ABI with minimum Python version 3.10
pyo3 = { version = "0.28.3", default-features = false, features = [
  "macros",
  "experimental-async",
  "experimental-inspect",
  "extension-module",
  "py-clone",
  "abi3-py310",
] }

# pyo3-async-runtimes = { version = "0.23.0", default-features = false, features = [
#   "attributes",
#   "testing",
#   "tokio-runtime",
#   "unstable-streams",
# ] }

once_cell = { version = "1", optional = true }
cudarc = { version = "=0.19.3", features = ["cuda-version-from-build-system", "fallback-latest"], optional = true }

[dev-dependencies]
rstest = "0.26"
