[package]
name = "dynamo-sysprofile"
version.workspace = true
edition.workspace = true
description = "System-level distributed profiler for Dynamo inference benchmarking"
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
keywords = ["profiling", "tracing", "perfetto", "nvtx", "distributed"]

[[bin]]
name = "dynamo-sysprofile-merge"
path = "src/bin/merge.rs"

[[bin]]
name = "dynamo-sysprofile-demo"
path = "src/bin/demo.rs"

[features]
default = []
nvtx = ["dep:cudarc"]

[dependencies]
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }
async-nats = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
flate2 = "1"
libc = { workspace = true }
petgraph = "0.7"
urlencoding = "2"
rusqlite = { version = "0.34", features = ["bundled"], optional = true }

# NVTX support (requires CUDA toolkit at runtime)
cudarc = { workspace = true, features = ["nvtx"], optional = true }

[dev-dependencies]
tempfile = { workspace = true }
