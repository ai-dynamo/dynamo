[build-system]
requires = ["maturin>=1.3,<2.0"]
build-backend = "maturin"

[project]
name = "gms_rust_ring"
version = "0.1.0"
description = "Crash-safe shared-memory KV lease atomics for GMS"
requires-python = ">=3.12"

[tool.maturin]
features = ["pyo3/extension-module"]
module-name = "gms_rust_ring"
