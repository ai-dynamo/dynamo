[package]
name = "dynamo-memory"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Memory management library for Dynamo"

[features]
default = []

# feature to enable unsafe slices of memory descriptors
# for advanced testing in other crates
unsafe-slices = []

# test features for hardware-specific tests
testing-cuda = []
testing-nixl = []
testing-xpu-sycl = ["xpu-sycl"]
testing-all = ["testing-cuda", "testing-nixl", "testing-xpu-sycl"]

# Production xpu-sycl gate — pulls SyclMemPool / SyclMemPoolBuilder via
# the `pool::sycl` submodule. dynamo-memory keeps cudarc unconditionally
# because `pool::cuda::CudaMemPool` is core production code; oneapi-rs
# is opt-in because the SYCL pool is the only consumer.
xpu-sycl = ["dep:oneapi-rs"]

[dependencies]
anyhow = { workspace = true }
cudarc = { workspace = true }
nixl-sys = { version = "=1.1.0" }
oneapi-rs = { workspace = true, optional = true }
serde = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

libc = { version = "0.2" }
libloading = "0.8"
nix = { version = "0.30", features = ["fs"] }
offset-allocator = "0.2"

# validate_numa_placement bin (engine-service) deferred — depends on the
# CUDA-only PinnedStorage::new_for_device API. The XPU re-enablement
# moved PinnedStorage to an allocator-based constructor; restoring this
# bin would require porting it to that API and is out of scope for the
# initial XPU re-enablement on engine-service.
[[bin]]
name = "inspect_resources"
path = "bin/inspect_resources.rs"

[dev-dependencies]
serde_json = { workspace = true }
tempfile = "3"
