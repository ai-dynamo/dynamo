[package]
name = "dynamo-rotating-tokens"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Reference Rust backend that emits rotating token IDs — a minimal LLMEngine implementation against dynamo-backend-common."

[[bin]]
name = "dynamo-rotating-tokens"
path = "src/main.rs"

[dependencies]
dynamo-backend-common = { workspace = true }

anyhow = { workspace = true }
async-stream = { workspace = true }
async-trait = { workspace = true }
clap = { version = "4", features = ["derive", "env"] }
futures = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
dynamo-backend-common = { workspace = true, features = ["testing"] }
dynamo-runtime = { workspace = true }
